# Tier-B data: KEY-name fragments that mark a `<KEY>=<value>` line as a PUBLIC
# blockchain / network identifier (wallet, contract, pubkey, node/peer id), not
# a credential. The entropy path uses these to route such lines to the
# BlockchainOrNetworkAddress shape stage instead of flagging them.
#
# Entries are matched against the UPPERCASED line via substring `contains`, so
# the trailing boundary char (`=`, space, `"`, `:`) is SIGNIFICANT — it anchors
# the match to a real assignment and is preserved exactly. Single-quoted TOML
# literals keep the trailing space / quote bytes intact.
#
# Schema: keywords = ["FRAGMENT", ...]

keywords = [
  '_ADDR=',
  '_ADDR ',
  '_ADDR"',
  '_ADDR:',
  '_ADDRS=',
  '_ADDRS ',
  '_ADDRS"',
  '_ADDRESS=',
  '_ADDRESS ',
  '_ADDRESS"',
  '_WALLET=',
  '_WALLET ',
  '_WALLET"',
  '_MINT_ADDR',
  '_PUBKEY=',
  '_PUBKEY ',
  '_PUBLIC_KEY=',
  '_PUBLIC_KEY ',
  '_PUBLIC_KEY"',
  '_CONTRACT=',
  '_CONTRACT ',
  '_OWNER=',
  '_ACCOUNT_ID=',
  '_PEER_ID=',
  '_NODE_ID=',
]
