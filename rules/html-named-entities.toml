# Tier-B HTML named-entity -> replacement decode table for the URL/HTML decoder
# (scanner/src/decode/url.rs `html_named_entity_decode`).
#
# Key   = the entity body INCLUDING its terminating `;`, exactly as scanned
#         (`&amp;` is scanned as the key `amp;`).
# Value = the single replacement character the entity decodes to.
#
# Decoding an entity reveals its plaintext to the scanner, so extending this
# table with more standard HTML5 named entities is a RECALL lever (a secret
# hidden behind `&#...;`/`&name;` encoding becomes visible). Any addition is a
# detection change — validate on the CredData corpus before shipping. Each value
# MUST be exactly one character; the table must be non-empty (build-time panic).

[entities]
"amp;" = "&"
"lt;" = "<"
"gt;" = ">"
"quot;" = "\""
"apos;" = "'"
"nbsp;" = " "
