# Detector credential shape constraints.
#
# Schema:
# - detector: detector id from detectors/*.toml.
# - exact_length: optional full credential byte length.
# - prefix: optional literal prefix. Body length constraints only apply when
#   the candidate starts with this prefix.
# - body_min_length/body_max_length: optional byte-length bounds for the
#   candidate suffix after prefix.

[[shape]]
detector = "aws-access-key"
exact_length = 20

[[shape]]
detector = "anthropic-api-key"
prefix = "sk-ant-api03-"
body_min_length = 80
body_max_length = 120
