# Detector classification overrides.
#
# Schema:
# - weak_anchor: detector ids whose regex captures are service-anchored but
#   still structurally collide with generic values, so scanner suppression keeps
#   generic shape gates active for them.
# - private_key_block: detector ids whose match spans represent enclosing
#   private-key blocks; resolution suppresses lower-specificity child findings
#   fully nested inside those spans.
# - stripe_hot_confirmed_prefix: Stripe secret-key regex prefixes that overlap
#   the direct hot-path detector; confirmed extraction uses them to skip
#   duplicate anchored candidates when the hot path already emitted the same
#   offset.

weak_anchor = [
