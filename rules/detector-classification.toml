# Detector classification overrides (Tier-B).
#
# Schema:
# - stripe_hot_confirmed_prefix: Stripe secret-key regex prefixes that overlap
#   the direct hot-path detector; confirmed extraction uses them to skip
#   duplicate anchored candidates when the hot path already emitted the same
#   offset. This is a genuine PREFIX list (not a per-detector property), so it
#   stays centralized here.
#
# MIGRATED OUT (DET-0 architecture law: "a detector's TOML is the whole story"):
#   - weak_anchor        -> per-detector `DetectorSpec::weak_anchor = true`
#   - private_key_block  -> per-detector `DetectorSpec::private_key_block = true`
# Both were per-DETECTOR properties (they answer a question about ONE detector),
# so they now live in that detector's own `detectors/<id>.toml`, next to its
# patterns and keywords, read one file to understand one detector. The exact
# family membership is pinned by the `weak_anchor_family_is_toml_declared` and
# `private_key_block_family_is_toml_declared` drift-guard tests
# (crates/scanner/src/detector_ids.rs), which read it back from the embedded
# corpus so the "see the whole family at a glance" view the lists gave is kept.
#
# NOTE (weak_anchor rationale, retained for context): the "structural password
# slot" family: `url-credentials`, `sql-password`, `cli-password-flag`,
# `bearer-authorization`: is deliberately NOT weak_anchor. Their syntactic slot
# (`scheme://user:<x>@host`, `IDENTIFIED BY '<x>'`, `--password <x>`,
# `Bearer <x>`) is strong STRUCTURAL evidence, and the bulk of the real CredData
# passwords there are SHORT all-lowercase random strings (`pxidztpv`, `argriyjqr`)
# that the Tier-B random-vs-dictionary FLOOR would decline, yet they ARE
# credentials by structure. Those detectors declare `structural_password_slot =
# true` instead (skips the Tier-B floor via `apply_tier_b=false`); precision
# against placeholders is held by the `dictionary_word_placeholder` gate.

stripe_hot_confirmed_prefix = [
  "sk_live_",
  "sk_test_",
  "rk_live_",
  "rk_test_",
]
