# Detector classification overrides.
#
# Schema:
# - weak_anchor: detector ids whose regex captures are service-anchored but
#   still structurally collide with generic values, so scanner suppression keeps
#   generic shape gates active for them.
# - private_key_block: detector ids whose match spans represent enclosing
#   private-key blocks; resolution suppresses lower-specificity child findings
#   fully nested inside those spans.
# - stripe_hot_confirmed_prefix: Stripe secret-key regex prefixes that overlap
#   the direct hot-path detector; confirmed extraction uses them to skip
#   duplicate anchored candidates when the hot path already emitted the same
#   offset.

weak_anchor = [
  "aerisweather-api-credentials",
  "base-api-credentials",
  "flickr-api-key",
  "census-api-key",
  "workato-api-credentials",
  "adobe-api-key",
  "alchemy-api-key",
  "azure-openai-api-key",
  "datadog-api-key",
  "etherscan-api-key",
  "spotify-client-credentials",
  "bamboohr-api-key",
  "calendly-api-key",
  "crowdin-api-token",
  "github-oauth-secret",
  "sonarcloud-token",
  "activecampaign-api-key",
  "chef-automate-token",
  "foundation-api-key",
  "getresponse-api-key",
  "rudder-api-token",
]
# NOTE: the "structural password slot" family — `url-credentials`,
# `sql-password`, `cli-password-flag` — is deliberately NOT weak_anchor. Their
# syntactic slot (`scheme://user:<x>@host`, `IDENTIFIED BY '<x>'`,
# `--password <x>`) is strong STRUCTURAL evidence, and the bulk of the real
# CredData passwords there are SHORT all-lowercase random strings (`pxidztpv`,
# `argriyjqr`) that the Tier-B random-vs-dictionary FLOOR would decline — yet
# they ARE credentials by structure. Keeping them strong-anchor skips that floor
# (`apply_tier_b=false`) so those surface; precision against placeholders is held
# WITHOUT the floor by the `dictionary_word_placeholder` gate (suppression/api.rs,
# scoped via `detector_ids::is_structural_password_slot_detector`) which drops a
# value the English bigram model is confident is a real word (`password`,
# `secret`), the `{6,128}` value floor in each regex (drops short placeholders
# `pass`/`admin`), the `<>` exclusion (templates), and the Tier-A `$VAR` marker.

private_key_block = [
  "private-key",
  "ssh-private-key",
  "github-app-private-key",
]

stripe_hot_confirmed_prefix = [
  "sk_live_",
  "sk_test_",
  "rk_live_",
  "rk_test_",
]
