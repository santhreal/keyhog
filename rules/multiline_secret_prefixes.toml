# Tier-B data: distinctive vendor secret PREFIXES that route a no-phase-1-trigger
# chunk into the multiline reassembly path (`has_secret_keyword_fast`).
#
# Schema:
#   [multiline_secret_prefixes]
#   prefixes = ["exact-vendor-prefix", ...]
#
# Semantics:
# - This is a DETECTION-trigger vocabulary for the MULTILINE gate: a prefix here
#   means "if these bytes appear in a chunk that produced no phase-1 hit, the
#   secret may be SPLIT across lines, so reassemble and re-scan it." A silent drop
#   from this list is a direct false-negative on split secrets.
# - Matched CASE-SENSITIVELY, with EXACT vendor casing, via an `AhoCorasick::new`
#   automaton (NOT case-folded, contrast the case-insensitive generic
#   assignment-keyword prefilter derived from the generic detector specs).
#   `HRKU-` is genuinely uppercase; every other
#   entry is the vendor's real lowercase spelling. Preserve casing exactly: an
#   uppercased `SK-PROJ-` is not a real key and must not trigger.
# - Entries are ASCII and may carry `-`, `_`, or `.` (e.g. `github_pat_`,
#   `.iam.gserviceaccount.com`).
# - Curation rule: entries must be DISTINCTIVE and long enough to rarely collide
#   with fixtures/docs. SHORT prefixes that flood fixtures (`AKIA` the AWS
#   access-key id, `eyJ` the base64 `{"` JWT header) are DELIBERATELY EXCLUDED 
#   re-adding them would swamp the phase-2 tail with fixture noise. The behavioral
#   lock in engine/scan_filters.rs pins both the inclusions and these exclusions.
# - Adding a prefix here widens split-secret recall without a recompile.

[multiline_secret_prefixes]
prefixes = [
  # OpenAI
  "sk-proj-",
  "sk-svcacct-",
  "sk-admin-",
  # Stripe
  "sk_live_",
  "sk_test_",
  "rk_live_",
  "pk_live_",
  # GitHub (all installation variants)
  "ghp_",
  "ghs_",
  "gho_",
  "ghu_",
  "ghr_",
  "github_pat_",
  # Slack
  "xoxb-",
  "xoxp-",
  "xoxa-",
  "xoxr-",
  "xoxs-",
  "xapp-",
  # Anthropic
  "sk-ant-",
  # HuggingFace
  "hf_",
  # GCP service-account email shard (rarely splits, but cheap)
  ".iam.gserviceaccount.com",
  # GitLab
  "glpat-",
  # npm
  "npm_",
  # Heroku UUID-style key family (genuinely uppercase)
  "HRKU-",
]
