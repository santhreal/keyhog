# Tier-B "universal rejection" value prefixes for the entropy plausibility gate
# (scanner/src/entropy/plausibility.rs `matches_universal_rejection`). A candidate
# whose value STARTS WITH any of these is never a plaintext secret, so it is
# rejected up front. Two intents share the list (both mean "reject"):
#
#   structural non-secrets : paths (`/`, `./`, `../`), templating (`${`, `{{`,
#     `${{`), regex (`(?`, `^`), markdown/dividers (```` ``` ````, `---`, `===`).
#   encrypted/wrapped secrets : the value is an ENCRYPTED blob or key HANDLE, not
#     a plaintext secret (`ssh-`, `ecdsa-`, `$ANSIBLE_VAULT`, `ENC[`, `age1`,
#     `vault:`, `AQI`, `CiQ`).
#
# Add a prefix to reject a new structured/encrypted format. (Compound rejections
# that need more than a prefix — JWT 3-part, PEM blocks, `Ag`+length, Windows
# drive paths, and the `://` substring — stay in code, not here.) Non-empty
# required (build-time panic). Any addition affects precision — bench on CredData.
prefixes = [
    "/",
    "./",
    "../",
    "${{",
    "{{",
    "${",
    "(?",
    "^",
    "ssh-",
    "ecdsa-",
    "$ANSIBLE_VAULT",
    "ENC[",
    "age1",
    "vault:",
    "AQI",
    "CiQ",
    "```",
    "---",
    "===",
]
