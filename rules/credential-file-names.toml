# Tier-B credential-store filenames the entropy fallback treats as secret files
# (scanner/src/entropy/mod.rs). Two match policies:
#
# prefix_match        = names matched case-insensitively as a filename PREFIX, so
#   legitimate variants still count (`.env-staging`, `.env.production`, `.envfile`).
#   These are dotfiles that inherently hold secrets.
# exact_or_config_ext = credential basenames matched EXACTLY, or as a prefix
#   FOLLOWED BY a known config extension (`secrets.yaml`, `credentials.env`,
#   `apikeys.toml`). The trailing-extension gate keeps source files that merely
#   talk ABOUT credentials (`secrets.rs`, `credentials.py`) on the source-code
#   path (scanned only under --entropy-source-files).
#
# Extend either list to teach the entropy fallback a new credential-file name.
# Both lists MUST stay non-empty (a parse error / empty list fails the build).

prefix_match = [".env", ".npmrc", ".pypirc", ".netrc"]
exact_or_config_ext = ["credentials", "secrets", "apikeys", "docker-compose"]
