# Tier-B data (user-extensible): AWS canary-token issuer account IDs.
#
# keyhog ships a baseline canary list compiled into the scanner
# (crates/scanner/data/aws-canary-accounts.toml). This repo-root file documents
# the schema and is the recommended place to record additional canary accounts
# you discover in your own environment.
#
# To extend the list at SCAN TIME without rebuilding, point the
# `KEYHOG_AWS_CANARY_ACCOUNTS` environment variable at a TOML file with this
# exact shape; its accounts are unioned with the compiled-in baseline:
#
#     KEYHOG_AWS_CANARY_ACCOUNTS=/path/to/extra-canaries.toml keyhog scan .
#
# When a detected AWS access key's offline-decoded 12-digit account ID is in the
# union, the finding is marked `metadata.is_canary=true` and `keyhog --verify`
# refuses to send a live probe for it (verifying a canary alerts whoever planted
# it). Account IDs are 12-digit zero-padded strings.
#
# Baseline source: https://trufflesecurity.com/blog/canaries

# canarytokens.org / Thinkst first-party canary issuer accounts.
[canary]
accounts = [
    "052310077262",
    "171436882533",
    "534261010715",
