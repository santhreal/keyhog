# Tier-B data: credential anchors that let an ENCODED printable-text value reach
# the scorer (`is_strong_keyword_anchored_encoded_text_secret` in
# `crates/scanner/src/engine/phase2_generic/keywords.rs`).
#
# Schema:
#   [encoded_text_secret_anchors]
#   anchors = ["compact-lowercase-keyword", ...]
#
# Semantics:
# - When the generic bridge captures a base64/encoded value that DECODES to
#   printable text (e.g. `password: <base64("SuperSecret...")>`), these keywords
#   mark it as a real encoded secret rather than a random protobuf/base64 blob, so
#   it is not suppressed by the binary-payload shape gate. The decode-to-printable
#   check still runs (this list only gates WHICH keywords earn the lift).
# - This list is consulted IN ADDITION to the structural secret-suffix test
#   (`normalized_assignment_keyword_has_secret_suffix`): a key ending in
#   `key`/`secret`/`token`/`password`/`passwd`/`pwd` already qualifies; these are
#   the extra bare anchors that do not end in one of those suffixes on their own.
# - Entries are the COMPACT form: lowercase ASCII alphanumerics with NO separators.
#   The captured keyword is normalized (case-folded, separators collapsed) before
#   comparison.
# - Invalid data (non-lowercase, non-alphanumeric, duplicate, empty) fails CLOSED
#   at load (panic): compiled into the binary, so a bad entry is a build defect.

[encoded_text_secret_anchors]
anchors = [
  "password",
  "passwd",
  "pwd",
  "passphrase",
  "token",
  "secret",
  "credential",
]
