# Tier-B import/module-declaration LINE prefixes. A line opening with one of
# these is a language import/use/include/package statement, never a credential
# assignment, so the entropy generic path skips it.
#
# Each prefix is deliberately space- or paren-TERMINATED so an identifier that
# merely begins with the keyword (`important_key`, `package_secret`,
# `requireAuth`) is NOT matched. PRESERVE the trailing space or `(` when adding a
# language's import syntax — dropping it would reject real credential lines.
prefixes = [
    "import ",
    "package ",
    "use ",
    "from ",
    "require(",
    "include ",
    "#include ",
]
