name: 'KeyHog Secret Scanner'
description: 'Scan source code for leaked secrets with KeyHog.'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan (file or directory).'
    default: '.'
  severity:
    description: 'Minimum severity to report: info | low | medium | high | critical.'
    default: 'high'
  format:
    description: 'Output format: text | json | sarif | jsonl.'
    default: 'sarif'
  verify:
    description: 'Run live credential verification on findings ("true" enables --verify).'
    default: 'false'
  version:
    description: |
      KeyHog version to use. Matched against a published GitHub Release tag
      (e.g. "0.5.12" expects asset `keyhog-linux-x86_64` on tag `v0.5.12`).
      When unset, derives from the action ref (`@v0.5.12` → "0.5.12"); when no
      matching release asset exists, falls back to a source build.
    default: ''
  upload-sarif:
    description: 'When format=sarif, upload via github/codeql-action/upload-sarif@v3.'
    default: 'true'
  fail-on-findings:
    description: |
      Fail the workflow when any finding at or above `severity` is reported.
      Set to "false" to keep the job green and rely on the uploaded SARIF
      surfacing in code-scanning instead.
    default: 'true'
  baseline:
    description: |
      Path to a keyhog baseline file (produced by
      `keyhog scan --format json --output baseline.json` and committed to the
      repo). Findings already present in the baseline are suppressed, so the
      job blocks only NEW secrets. This is the standard way to adopt keyhog in
      a repo that already has findings, without a noisy failing first run.
    default: ''

outputs:
  findings:
    description: 'Number of findings at or above `severity` (parsed from the report).'
    value: ${{ steps.scan.outputs.findings }}
  report:
    description: 'Path to the produced scan report (relative to the workspace).'
    value: ${{ steps.outfile.outputs.name }}

runs:
  using: 'composite'
  steps:
    - name: Resolve KeyHog version
      id: version
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.version }}" ]]; then
          v="${{ inputs.version }}"
        else
          # GITHUB_ACTION_REF is e.g. "v0.5.12", "main", a SHA, or a branch.
          # Tagged refs: strip the leading "v"; everything else falls
          # through and the download will miss, triggering source build.
          ref="${GITHUB_ACTION_REF:-main}"
          v="${ref#v}"
        fi
        echo "version=$v" >> "$GITHUB_OUTPUT"
        echo "Resolved keyhog version: $v"

    - name: Detect platform asset name
      id: asset
      shell: bash
      run: |
        set -euo pipefail
        os="$(uname -s)"
        arch="$(uname -m)"
        case "$os/$arch" in
          Linux/x86_64)   name="keyhog-linux-x86_64" ;;
          Darwin/x86_64)  name="keyhog-macos-x86_64" ;;
          Darwin/arm64)   name="keyhog-macos-aarch64" ;;
          *)              name="" ;;
        esac
        echo "name=$name" >> "$GITHUB_OUTPUT"
        echo "Asset name for $os/$arch: ${name:-<none — source build>}"

    - name: Try downloading prebuilt binary
      id: download
      shell: bash
      run: |
        set -euo pipefail
        asset="${{ steps.asset.outputs.name }}"
        version="${{ steps.version.outputs.version }}"
        if [[ -z "$asset" ]] || [[ -z "$version" ]]; then
          echo "no asset name / version — skipping download"
          echo "found=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        url="https://github.com/santhsecurity/keyhog/releases/download/v${version}/${asset}"
        echo "Trying $url"
        if curl -fL --retry 2 "$url" -o "$RUNNER_TEMP/keyhog" 2>/dev/null; then
          chmod +x "$RUNNER_TEMP/keyhog"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Downloaded prebuilt $asset for v$version"
        else
          echo "Release asset missing at $url — falling back to source build"
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Rust toolchain (source-build fallback)
      if: steps.download.outputs.found != 'true'
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry/build (source-build fallback)
      if: steps.download.outputs.found != 'true'
      uses: Swatinem/rust-cache@v2

    - name: Install Vectorscan/Hyperscan (Linux source-build only)
      if: steps.download.outputs.found != 'true' && runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config

    - name: Build keyhog from source (fallback)
      if: steps.download.outputs.found != 'true'
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ github.action_path }}/../../.."
        # Only Linux ships keyhog's default `simd` feature (libhyperscan-dev).
        # macOS has no homebrew formula for libhyperscan; Windows has no
        # libhyperscan at all. Both fall to the `portable` feature subset
        # which keeps every scanner-data and source-backend feature minus
        # the Hyperscan link. Before this guard the Windows + macOS
        # source-build path crashed at link time on a missing `-lhs`.
        case "$(uname -s)" in
          Linux*)
            cargo build --release -p keyhog
            ;;
          *)
            cargo build --release -p keyhog --no-default-features --features portable
            ;;
        esac
        bin="target/release/keyhog"
        [[ -x "$bin" ]] || bin="target/release/keyhog.exe"
        cp "$bin" "$RUNNER_TEMP/$(basename "$bin")"

    - name: Add keyhog to PATH
      shell: bash
      run: echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

    - name: Compute output filename
      id: outfile
      shell: bash
      run: |
        set -euo pipefail
        ext="json"
        case "${{ inputs.format }}" in
          sarif) ext="sarif" ;;
          jsonl) ext="jsonl" ;;
          text)  ext="txt" ;;
        esac
        echo "name=keyhog-results.${ext}" >> "$GITHUB_OUTPUT"

    - name: Run scan
      id: scan
      shell: bash
      run: |
        set -uo pipefail
        # Assemble args as an array so paths with spaces stay intact and
        # optional flags are only appended when set.
        args=(scan
          --path "${{ inputs.path }}"
          --severity "${{ inputs.severity }}"
          --format "${{ inputs.format }}"
          --output "${{ steps.outfile.outputs.name }}")
        if [[ "${{ inputs.verify }}" == "true" ]]; then
          args+=(--verify)
        fi
        # Wire the documented `baseline` input through to --baseline. Before
        # this it was silently ignored, so adopters who set `baseline:` still
        # had the job fail on every PRE-EXISTING finding instead of only NEW
        # ones - the exact opposite of what the input promises.
        if [[ -n "${{ inputs.baseline }}" ]]; then
          args+=(--baseline "${{ inputs.baseline }}")
        fi
        # Run scan but DON'T exit on non-zero so we can count findings
        # before deciding whether to fail the job.
        set +e
        keyhog "${args[@]}"
        keyhog_exit=$?
        set -e

        count_from_report() {
          local format="$1"
          local report="$2"
          case "$format" in
            sarif)
              if command -v jq >/dev/null 2>&1; then
                jq '[.runs[].results[]] | length' "$report"
              elif command -v python3 >/dev/null 2>&1; then
                python3 - "$report" <<'PY'
        import json
        import sys
        with open(sys.argv[1], "r", encoding="utf-8") as f:
            sarif = json.load(f)
        print(sum(len(run.get("results", [])) for run in sarif.get("runs", [])))
        PY
              else
                return 2
              fi
              ;;
            json)
              if command -v jq >/dev/null 2>&1; then
                jq 'length' "$report"
              elif command -v python3 >/dev/null 2>&1; then
                python3 - "$report" <<'PY'
        import json
        import sys
        with open(sys.argv[1], "r", encoding="utf-8") as f:
            report = json.load(f)
        if not isinstance(report, list):
            raise SystemExit("keyhog JSON report must be a top-level array")
        print(len(report))
        PY
              else
                return 2
              fi
              ;;
            jsonl)
              awk 'END { print NR + 0 }' "$report"
              ;;
            text)
              grep -cE '^[[:space:]]+\xe2\x94\x8c' "$report" 2>/dev/null || true
              ;;
          esac
        }

        # Count findings from the report regardless of exit code. This must
        # fail closed: if the scanner returned a findings exit code but the
        # report parser is unavailable or the report is malformed, expose at
        # least one finding instead of silently reporting zero.
        report="${{ steps.outfile.outputs.name }}"
        findings=0
        if [[ -f "$report" ]]; then
          if parsed_findings="$(count_from_report "${{ inputs.format }}" "$report" 2>/dev/null)"; then
            findings="$parsed_findings"
          elif [[ "$keyhog_exit" == "1" || "$keyhog_exit" == "10" ]]; then
            findings=1
            echo "::warning title=KeyHog::Could not parse '$report'; keyhog exited $keyhog_exit, so treating the scan as having findings."
          else
            echo "::error title=KeyHog::Could not parse clean scan report '$report'."
            exit 3
          fi
        elif [[ "$keyhog_exit" == "1" || "$keyhog_exit" == "10" ]]; then
          echo "::error title=KeyHog::keyhog reported findings but did not write '$report'."
          exit 3
        fi
        echo "findings=$findings" >> "$GITHUB_OUTPUT"
        echo "::notice title=KeyHog::Found $findings finding(s) at or above '${{ inputs.severity }}' severity."

        # 0 = clean, 1 = findings, 10 = LIVE credentials confirmed under
        # --verify - all "the scan ran, here is the result", handled by the
        # findings / fail-on-findings logic in the next step. Anything else
        # (2 user error, 3 system error, 11 scanner panic) is a genuine
        # failure. Without the `!= 10` guard a --verify run that CONFIRMS a
        # live leak would be mislabeled "Scanner crashed" and skip the findings
        # path - the worst outcome reported as a tooling bug.
        if [[ "$keyhog_exit" != "0" && "$keyhog_exit" != "1" && "$keyhog_exit" != "10" ]]; then
          echo "::error title=KeyHog::keyhog exited $keyhog_exit (not a findings code) - treating as a scan failure"
          exit "$keyhog_exit"
        fi
        if [[ "$keyhog_exit" == "10" ]]; then
          echo "::error title=KeyHog::LIVE credential(s) confirmed by --verify (exit 10)."
        fi

        if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          {
            echo "### KeyHog scan"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Path | \`${{ inputs.path }}\` |"
            echo "| Severity floor | \`${{ inputs.severity }}\` |"
            echo "| Format | \`${{ inputs.format }}\` |"
            echo "| Report | \`${report}\` |"
            echo "| Findings | \`${findings}\` |"
            echo "| Exit code | \`${keyhog_exit}\` |"
            if [[ -n "${{ inputs.baseline }}" ]]; then
              echo "| Baseline | \`${{ inputs.baseline }}\` |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Check report exists before SARIF upload
      id: report-check
      if: always()
      shell: bash
      run: |
        if [[ -f "${{ steps.outfile.outputs.name }}" ]]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::warning title=KeyHog::Scan report '${{ steps.outfile.outputs.name }}' missing; skipping SARIF + artifact upload."
        fi

    - name: Upload SARIF to code-scanning
      # Fork PRs get a restricted GITHUB_TOKEN without security-events:write,
      # so codeql-action/upload-sarif 403s. Without continue-on-error the
      # whole external contributor PR fails on this step instead of just
      # missing the code-scanning surface. The downloadable workflow artifact
      # below stays available either way, so reviewers can grab the SARIF.
      if: inputs.format == 'sarif' && inputs.upload-sarif == 'true' && steps.report-check.outputs.exists == 'true'
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.outfile.outputs.name }}

    - name: Upload scan report as workflow artifact
      if: steps.report-check.outputs.exists == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: keyhog-report
        path: ${{ steps.outfile.outputs.name }}
        if-no-files-found: warn

    - name: Fail when findings reported
      if: inputs.fail-on-findings == 'true' && steps.scan.outputs.findings != '0'
      shell: bash
      run: |
        echo "::error title=KeyHog::${{ steps.scan.outputs.findings }} finding(s) at or above '${{ inputs.severity }}' severity. Set fail-on-findings:false to ignore."
        exit 1
