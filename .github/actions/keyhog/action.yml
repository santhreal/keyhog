name: 'KeyHog Secret Scanner'
description: 'Scan source code for leaked secrets with KeyHog.'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan (file or directory).'
    default: '.'
  severity:
    description: 'Minimum severity to report: info | low | medium | high | critical.'
    default: 'high'
  format:
    description: 'Output format: text | json | sarif | jsonl.'
    default: 'sarif'
  verify:
    description: 'Run live credential verification on findings ("true" enables --verify).'
    default: 'false'
  version:
    description: |
      KeyHog version to use. Matched against a published GitHub Release tag
      (e.g. "0.5.12" expects asset `keyhog-linux-x86_64` on tag `v0.5.12`).
      When unset, derives from the action ref (`@v0.5.12` → "0.5.12").
      Explicit versions and semver action tags require a matching release asset;
      branch/SHA refs build from source.
    default: ''
  upload-sarif:
    description: 'When format=sarif, upload via the GitHub Code Scanning SARIF action.'
    default: 'true'
  analysis-category:
    description: |
      Stable lowercase identity for this analysis partition. Use a distinct
      value for each monorepo slice or matrix partition scanned on one commit.
      Allowed: 1-64 lowercase letters, digits, dot, underscore, or dash. Start
      and end with a letter or digit.
    default: 'keyhog'
  fail-on-findings:
    description: |
      Fail the workflow when any finding at or above `severity` is reported.
      Set to "false" to keep the job green and rely on the uploaded SARIF
      surfacing in code-scanning instead. Verified-live credentials under
      `verify: "true"` always fail after reports are uploaded.
    default: 'true'
  baseline:
    description: |
      Path to a keyhog baseline file (produced by
      `keyhog scan --create-baseline baseline.json` and committed to the
      repo). Findings already present in the baseline are suppressed, so the
      job blocks only NEW secrets. This is the standard way to adopt keyhog in
      a repo that already has findings, without a noisy failing first run.
    default: ''
  backend:
    description: |
      Optional scan backend: auto | simd | cpu | gpu-cuda | gpu-wgpu. Leave
      unset or choose auto to calibrate this workload; explicit backends are
      for diagnostics.
    default: ''

outputs:
  findings:
    description: 'Number of findings at or above `severity` (parsed from the report).'
    value: ${{ steps.scan.outputs.findings }}
  exit-code:
    description: 'Raw keyhog process exit code: 0 clean, 1 findings, 10 live findings under --verify.'
    value: ${{ steps.scan.outputs.exit-code }}
  duration-ms:
    description: 'Wall-clock scan duration in milliseconds, measured by the Action wrapper.'
    value: ${{ steps.scan.outputs.duration-ms }}
  report:
    description: 'Path to the produced scan report (relative to the workspace).'
    value: ${{ steps.outfile.outputs.name }}
  analysis-category:
    description: 'Validated Code Scanning and report partition identity.'
    value: ${{ steps.outfile.outputs.category }}

runs:
  using: 'composite'
  steps:
    - name: Compute output filename
      id: outfile
      shell: bash
      env:
        ACTION_FORMAT: ${{ inputs.format }}
        ACTION_ANALYSIS_CATEGORY: ${{ inputs.analysis-category }}
      run: |
        set -euo pipefail
        category="${ACTION_ANALYSIS_CATEGORY:-}"
        if [[ -z "$category" || ${#category} -gt 64 || ! "$category" =~ ^[a-z0-9]([a-z0-9._-]*[a-z0-9])?$ ]]; then
          echo "::error title=KeyHog::Invalid analysis-category. Use 1-64 lowercase letters, digits, dot, underscore, or dash; start and end with a letter or digit."
          exit 2
        fi
        if [[ -n "${RUNNER_TEMP:-}" && -n "${GITHUB_RUN_ID:-}" && -n "${GITHUB_JOB:-}" ]]; then
          identity_root="${RUNNER_TEMP}/keyhog-analysis-categories/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT:-1}-${GITHUB_JOB}"
          mkdir -p -- "$identity_root"
          if ! mkdir -- "${identity_root}/${category}" 2>/dev/null; then
            echo "::error title=KeyHog::Conflicting analysis-category. Every KeyHog scan in one job must use a distinct category."
            exit 2
          fi
        fi
        ext="json"
        case "${ACTION_FORMAT:-sarif}" in
          sarif) ext="sarif" ;;
          jsonl) ext="jsonl" ;;
          text)  ext="txt" ;;
        esac
        printf 'category=%s\n' "$category" >> "$GITHUB_OUTPUT"
        printf 'name=keyhog-results-%s.%s\n' "$category" "$ext" >> "$GITHUB_OUTPUT"

    - name: Resolve KeyHog version
      id: version
      shell: bash
      env:
        ACTION_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        release_required=false
        if [[ -n "${ACTION_VERSION:-}" ]]; then
          v="${ACTION_VERSION#v}"
          if ! [[ "$v" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "::error title=KeyHog::Invalid version. Explicit version must be MAJOR.MINOR.PATCH with an optional prerelease suffix."
            exit 2
          fi
          release_required=true
        else
          # GITHUB_ACTION_REF is e.g. "v0.5.12", "main", a SHA, or a branch.
          ref="${GITHUB_ACTION_REF:-main}"
          v="${ref#v}"
          if [[ "$ref" == v* && "$v" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            release_required=true
          fi
        fi
        case "$v" in
          "" | *[!A-Za-z0-9._/-]*)
            echo "::error title=KeyHog::Invalid version. Use only letters, digits, dot, dash, underscore, or slash."
            exit 2
            ;;
        esac
        printf 'version=%s\n' "$v" >> "$GITHUB_OUTPUT"
        printf 'release_required=%s\n' "$release_required" >> "$GITHUB_OUTPUT"
        printf 'Resolved keyhog version: %s\n' "$v"
        printf 'Release asset required: %s\n' "$release_required"

    - name: Detect platform asset name
      id: asset
      shell: bash
      run: |
        set -euo pipefail
        os="$(uname -s)"
        arch="$(uname -m)"
        case "$os/$arch" in
          Linux/x86_64)    name="keyhog-linux-x86_64" ;;
          Darwin/x86_64)  name="keyhog-macos-x86_64" ;;
          Darwin/arm64)   name="keyhog-macos-aarch64" ;;
          MINGW*/x86_64 | MSYS*/x86_64 | CYGWIN*/x86_64)
                           name="keyhog-windows-x86_64.exe" ;;
          *)              name="" ;;
        esac
        echo "name=$name" >> "$GITHUB_OUTPUT"
        echo "Asset name for $os/$arch: ${name:-<none, source build>}"

    - name: Install Vectorscan/Hyperscan runtime (Linux prebuilt)
      if: startsWith(steps.asset.outputs.name, 'keyhog-linux-x86_64')
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends libhyperscan5 || \
          sudo apt-get install -y --no-install-recommends libhyperscan-dev

    # Verification model: this step checks the release asset against its
    # published SHA-256 only. That is deliberately weaker than install.sh /
    # install.ps1 (which also verify a minisign signature against a pinned
    # public key): the checksum lives next to the asset, so it proves
    # download integrity but would not catch a fully compromised GitHub
    # release. The trade-off is accepted here because (a) the action already
    # trusts github.com for its own composite source via the action ref,
    # (b) installing minisign portably on all three runner OSes adds its own
    # unpinned supply-chain dependency, and (c) failure stays closed, a
    # missing or mismatched checksum on a required release errors out, never
    # falls back silently. If GitHub-release compromise is in your threat
    # model, install with install.sh (full signature verification) and run
    # `keyhog` directly instead of this action.
    - name: Try downloading prebuilt binary
      id: download
      shell: bash
      env:
        ACTION_ASSET_NAME: ${{ steps.asset.outputs.name }}
        ACTION_RESOLVED_VERSION: ${{ steps.version.outputs.version }}
        ACTION_RELEASE_REQUIRED: ${{ steps.version.outputs.release_required }}
      run: |
        set -euo pipefail
        asset="${ACTION_ASSET_NAME:-}"
        version="${ACTION_RESOLVED_VERSION:-}"
        release_required="${ACTION_RELEASE_REQUIRED:-false}"
        if [[ -z "$asset" ]] || [[ -z "$version" ]]; then
          if [[ "$release_required" == "true" ]]; then
            echo "::error title=KeyHog::No published asset is available for this runner/version; refusing source-build fallback for a required release."
            exit 2
          fi
          echo "no asset name / version - source build allowed for branch/SHA ref"
          echo "found=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        url="https://github.com/santhreal/keyhog/releases/download/v${version}/${asset}"
        echo "Trying $url"
        if curl -fL --retry 2 "$url" -o "$RUNNER_TEMP/$asset" &&
           curl -fL --retry 2 "$url.sha256" -o "$RUNNER_TEMP/$asset.sha256"; then
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$RUNNER_TEMP" && sha256sum -c "$asset.sha256")
          elif command -v shasum >/dev/null 2>&1; then
            (cd "$RUNNER_TEMP" && shasum -a 256 -c "$asset.sha256")
          else
            if [[ "$release_required" == "true" ]]; then
              echo "::error title=KeyHog::No SHA256 verifier on runner; refusing source-build fallback for a required release."
              exit 2
            fi
            echo "::warning title=KeyHog::No SHA256 verifier on runner; source build allowed for branch/SHA ref."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bin_name="keyhog"
          case "$asset" in
            *.exe) bin_name="keyhog.exe" ;;
          esac
          cp "$RUNNER_TEMP/$asset" "$RUNNER_TEMP/$bin_name"
          chmod +x "$RUNNER_TEMP/$bin_name"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Downloaded and verified prebuilt $asset for v$version"
        else
          if [[ "$release_required" == "true" ]]; then
            echo "::error title=KeyHog::Release asset or checksum missing at $url; refusing source-build fallback for a required release."
            exit 2
          fi
          echo "Release asset or checksum missing at $url - source build allowed for branch/SHA ref"
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Rust toolchain (source-build fallback)
      if: steps.download.outputs.found != 'true'
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

    - name: Cache cargo registry/build (source-build fallback)
      if: steps.download.outputs.found != 'true'
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

    - name: Install Vectorscan/Hyperscan (Linux source-build only)
      if: steps.download.outputs.found != 'true' && runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config

    - name: Build keyhog from source (fallback)
      if: steps.download.outputs.found != 'true'
      shell: bash
      env:
        ACTION_SOURCE_ROOT: ${{ github.action_path }}/../../..
        ACTION_ASSET_NAME: ${{ steps.asset.outputs.name }}
      run: |
        set -euo pipefail
        cd "$ACTION_SOURCE_ROOT"
        # Only the Linux Action asset ships the default `simd` feature. Manual
        # macOS builds can link Homebrew Vectorscan, but this fallback matches
        # the portable macOS release asset; Windows has no supported Hyperscan
        # package. Portable keeps every scanner data path and its portable
        # source-backend set without the Hyperscan link.
        case "$(uname -s)" in
          Linux*) cargo build --locked --release -p keyhog ;;
          *)
            cargo build --locked --release -p keyhog --no-default-features --features portable
            ;;
        esac
        bin="target/release/keyhog"
        [[ -x "$bin" ]] || bin="target/release/keyhog.exe"
        cp "$bin" "$RUNNER_TEMP/$(basename "$bin")"

    - name: Add keyhog to PATH
      shell: bash
      run: echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

    - name: Calibrate autoroute for this scan
      if: inputs.backend == '' || inputs.backend == 'auto'
      shell: bash
      env:
        ACTION_SCAN_PATH: ${{ inputs.path }}
        ACTION_SEVERITY: ${{ inputs.severity }}
        ACTION_BASELINE: ${{ inputs.baseline }}
      run: |
        set -euo pipefail
        probe="${RUNNER_TEMP}/keyhog-autoroute-probe-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-0}.json"
        trap 'rm -f -- "$probe"' EXIT
        config_args=(
          config
          --effective
          --path "$ACTION_SCAN_PATH"
          --severity "$ACTION_SEVERITY"
          --format json
        )
        args=(
          scan
          --autoroute-calibrate
          --autoroute-gpu
          --path "$ACTION_SCAN_PATH"
          --severity "$ACTION_SEVERITY"
          --format json
          --output "$probe"
        )
        if [[ -n "${ACTION_BASELINE:-}" ]]; then
          config_args+=(--baseline "$ACTION_BASELINE")
          args+=(--baseline "$ACTION_BASELINE")
        fi
        set +e
        keyhog "${config_args[@]}" >/dev/null
        config_exit=$?
        set -e
        if [[ "$config_exit" != "0" ]]; then
          echo "::error title=KeyHog::Could not resolve the exact scan configuration before autoroute calibration. Run keyhog config --effective with the same path and policy inputs."
          exit "$config_exit"
        fi
        keyhog "${args[@]}"

    - name: Run scan
      id: scan
      shell: bash
      env:
        ACTION_SCAN_PATH: ${{ inputs.path }}
        ACTION_SEVERITY: ${{ inputs.severity }}
        ACTION_FORMAT: ${{ inputs.format }}
        ACTION_VERIFY: ${{ inputs.verify }}
        ACTION_BASELINE: ${{ inputs.baseline }}
        ACTION_BACKEND: ${{ inputs.backend }}
        ACTION_OUTPUT: ${{ steps.outfile.outputs.name }}
        ACTION_FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        ACTION_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
      run: |
        set -euo pipefail
        args=(
          --print-effective-config
          --path "$ACTION_SCAN_PATH"
          --severity "$ACTION_SEVERITY"
          --format "$ACTION_FORMAT"
          --output "$ACTION_OUTPUT"
          --verify "$ACTION_VERIFY"
          --fail-on-findings "$ACTION_FAIL_ON_FINDINGS"
          --upload-sarif "$ACTION_UPLOAD_SARIF"
        )
        if [[ -n "${ACTION_BASELINE:-}" ]]; then
          args+=(--baseline "$ACTION_BASELINE")
        fi
        if [[ -n "${ACTION_BACKEND:-}" ]]; then
          args+=(--backend "$ACTION_BACKEND")
        fi
        bash "${{ github.action_path }}/run-scan.sh" "${args[@]}"

    - name: Check report exists before SARIF upload
      id: report-check
      if: always()
      shell: bash
      env:
        ACTION_REPORT_NAME: ${{ steps.outfile.outputs.name }}
      run: |
        if [[ -f "$ACTION_REPORT_NAME" ]]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::warning title=KeyHog::Scan report '$ACTION_REPORT_NAME' missing; skipping SARIF + artifact upload."
        fi

    - name: Upload SARIF to code-scanning
      # Fork PRs get a restricted GITHUB_TOKEN without security-events:write,
      # so codeql-action/upload-sarif 403s. Without continue-on-error the
      # whole external contributor PR fails on this step instead of just
      # missing the code-scanning surface. The downloadable workflow artifact
      # below stays available either way, so reviewers can grab the SARIF.
      # Trusted pushes/PRs are different: upload-sarif=true is an explicit
      # production CI contract, so upload failures must fail closed instead
      # of silently passing without Code Scanning annotations.
      if: inputs.format == 'sarif' && inputs.upload-sarif == 'true' && steps.report-check.outputs.exists == 'true'
      continue-on-error: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
      with:
        sarif_file: ${{ steps.outfile.outputs.name }}
        category: ${{ steps.outfile.outputs.category }}

    - name: Upload scan report as workflow artifact
      if: always() && steps.report-check.outputs.exists == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: keyhog-report-${{ steps.outfile.outputs.category }}-${{ github.job }}-${{ strategy.job-index || '0' }}-${{ github.run_attempt }}
        path: ${{ steps.outfile.outputs.name }}
        if-no-files-found: warn

    - name: Fail when findings reported
      if: steps.scan.outputs.findings != '' && steps.scan.outputs.exit-code != '' && ((inputs.fail-on-findings == 'true' && steps.scan.outputs.findings != '0') || steps.scan.outputs.exit-code == '10')
      shell: bash
      env:
        ACTION_FINDINGS: ${{ steps.scan.outputs.findings }}
        ACTION_EXIT_CODE: ${{ steps.scan.outputs.exit-code }}
        ACTION_SEVERITY: ${{ inputs.severity }}
      run: |
        case "${ACTION_FINDINGS:-}" in
          "" | *[!0-9]*)
            echo "::error title=KeyHog::Invalid findings output."
            exit 3
            ;;
        esac
        case "${ACTION_EXIT_CODE:-}" in
          0 | 1 | 10) ;;
          "" | *[!0-9]*)
            echo "::error title=KeyHog::Invalid exit-code output."
            exit 3
            ;;
          *)
            echo "::error title=KeyHog::Unexpected scan exit code ${ACTION_EXIT_CODE}."
            exit "$ACTION_EXIT_CODE"
            ;;
        esac
        if [[ "$ACTION_EXIT_CODE" == "10" ]]; then
          echo "::error title=KeyHog::LIVE credential(s) confirmed by --verify (exit 10)."
          exit 10
        fi
        echo "::error title=KeyHog::${ACTION_FINDINGS} finding(s) at or above '${ACTION_SEVERITY}' severity. Set fail-on-findings:false to ignore."
        exit 1
