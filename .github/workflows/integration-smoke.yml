name: integration-smoke

# End-to-end smoke test of the actual install paths a stranger hits.
# Downloads install.sh / install.ps1 from raw.githubusercontent.com,
# runs them non-interactively, then exercises the CLI surface a new
# user touches in their first minute: scan, exit codes, SARIF, hook,
# daemon. Pins to v0.5.34 because that is the last release with
# published binary assets; bump after the v0.5.35 release workflow
# is fixed.
#
# Manual only. Pre-launch sanity gate before any growth push.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to install (no leading v, e.g. 0.5.34)."
        required: false
        default: "0.5.34"

jobs:
  smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Show host
        shell: bash
        run: |
          uname -a || systeminfo | head -5 || true
          echo "version input: ${{ inputs.version }}"

      - name: Install runtime deps (Ubuntu only)
        if: runner.os == 'Linux'
        shell: bash
        # The Linux release binary links against libhyperscan.so.5 at
        # runtime. Hosted Ubuntu runners do NOT ship libhyperscan5 by
        # default. install.sh's post-install verify_install step now
        # surfaces the missing-shared-library case with a clear
        # actionable message, but a smoke test wants to actually exit
        # cleanly so it can run the rest of the matrix. Pre-install it.
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libhyperscan5

      - name: Install (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          curl -fsSL https://raw.githubusercontent.com/santhsecurity/keyhog/main/install.sh -o /tmp/install.sh
          sh /tmp/install.sh --version=v${{ inputs.version }} --yes --no-prompt --variant=cpu
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # PowerShell's -File flag requires a .ps1 extension. New-TemporaryFile
          # returns a .tmp path, which pwsh -File refuses. Save to an explicit
          # .ps1 path under the runner temp dir so the installer actually runs.
          $url = "https://raw.githubusercontent.com/santhsecurity/keyhog/main/install.ps1"
          $tmp = Join-Path $env:RUNNER_TEMP "install.ps1"
          Invoke-WebRequest -Uri $url -OutFile $tmp -UseBasicParsing
          & powershell -ExecutionPolicy Bypass -File $tmp -Version "${{ inputs.version }}" -Yes
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.local\bin"

      - name: Version
        shell: bash
        run: keyhog --version

      - name: Seed fixture
        shell: bash
        # The seeded credentials live as a single base64 blob so the
        # workflow source contains no recognisable secret patterns.
        # GitHub push protection scans the workflow file in repo and
        # would block this commit if the patterns were stored whole or
        # even adjacent-on-the-line. The scanner under test still sees
        # fully-formed strings when it reads smoke/seeded.env.
        run: |
          mkdir -p smoke
          SEED=''
          if command -v base64 >/dev/null 2>&1; then
            echo "$SEED" | base64 -d > smoke/seeded.env || echo "$SEED" | base64 --decode > smoke/seeded.env
          else
            python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read()))" <<< "$SEED" > smoke/seeded.env
          fi
          wc -l smoke/seeded.env
          # show first two chars per line as a sanity check without
          # leaking the rest into logs
          awk -F= '{printf "%s=%c%c…\n", $1, substr($2,1,1), substr($2,2,1)}' smoke/seeded.env

      - name: Scan (expect exit 1, findings)
        shell: bash
        env:
          NO_COLOR: "1"
        run: |
          set +e
          keyhog scan smoke
          code=$?
          echo "exit=$code"
          if [ "$code" != "1" ]; then
            echo "FAIL: expected exit 1 (secrets found), got $code"
            exit 1
          fi

      - name: SARIF output
        shell: bash
        env:
          NO_COLOR: "1"
        run: |
          set +e
          keyhog scan smoke --format sarif --output findings.sarif
          code=$?
          test -s findings.sarif || { echo "FAIL: empty SARIF"; exit 1; }
          python3 -c "
          import json,sys
          d=json.load(open('findings.sarif'))
          assert d.get('version')=='2.1.0', f'bad version: {d.get(\"version\")}'
          runs=d.get('runs',[]); assert runs, 'no runs'
          results=runs[0].get('results',[]); assert results, 'no results'
          assert results[0].get('ruleId'), 'no ruleId on result'
          assert results[0].get('locations'), 'no locations on result'
          print('SARIF ok:', len(results), 'results,', len(runs[0]['tool']['driver']['rules']), 'rules')
          "

      - name: Empty dir scan (expect exit 0)
        shell: bash
        env:
          NO_COLOR: "1"
        run: |
          mkdir -p empty
          set +e
          keyhog scan empty
          code=$?
          if [ "$code" != "0" ]; then
            echo "FAIL: expected exit 0 on empty dir, got $code"
            exit 1
          fi

      - name: Hook install in fresh git repo
        shell: bash
        run: |
          mkdir -p hookrepo && cd hookrepo
          git init -q
          keyhog hook install
          test -x .git/hooks/pre-commit || { echo "FAIL: pre-commit not installed"; exit 1; }

      - name: Daemon start/status/stop (best-effort, do not fail)
        shell: bash
        env:
          NO_COLOR: "1"
        run: |
          set +e
          keyhog daemon start &
          sleep 2
          keyhog daemon status
          keyhog daemon stop
          echo "(daemon path is best-effort; failure logged, not fatal)"

      - name: Backend probe
        shell: bash
        env:
          NO_COLOR: "1"
        run: keyhog backend | head -30
