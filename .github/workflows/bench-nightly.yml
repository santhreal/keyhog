name: bench-nightly

# Runs the unified benchmark package (benchmarks/bench) over the synthetic
# mirror corpus once a day and runs KeyHog's P0-P12 recovery matrix: generates
# both corpora, runs the scanners, scores them with the single canonical
# scorer, renders the mirror leaderboard and per-detector reports, and uploads
# the results. A `workflow_dispatch` run accepts mirror corpus-size + seed
# overrides so a reviewer can reproduce a specific scoreboard locally.
#
# This replaces the retired tools/secretbench scoring scripts: benchmarks/bench
# is the ONE source of accuracy truth (corpus generation, scoring, leaderboard,
# report, and the regression/differential gate). See benchmarks/README.md.

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      positives:
        description: "Number of labeled positive fixtures"
        type: number
        default: 3000
      negatives:
        description: "Number of labeled negative fixtures"
        type: number
        default: 12000
      seed:
        description: "RNG seed for the mirror corpus"
        type: number
        default: 0

env:
  CC: ""
  # Survive intermittent mid-stream crates.io download drops on hosted runners
  # (curl [55] SSL_ERROR_SYSCALL); cargo's default of 3 retries is not enough.
  CARGO_NET_RETRY: "10"

jobs:
  leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Per-job permissions, see keyhog.yml header note. Top-level
    # `permissions:` rejected at dispatch time on this repo.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: bench-nightly

      # keyhog's default build links Hyperscan (hyperscan-sys -> pkg-config
      # libhs), so building the release binary from source needs the dev
      # package, not just the runtime. Mirrors ci.yml / runners-nightly.yml.
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done

      - name: Build keyhog release binary
        run: cargo build --release -p keyhog --bin keyhog

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install bench test deps
        run: python3 -m pip install pytest

      - name: Benchmark regression tests
        env:
          KEYHOG_BIN: ${{ github.workspace }}/target/release/keyhog
        run: cd benchmarks && PYTHONDONTWRITEBYTECODE=1 python3 -B -m pytest -p no:cacheprovider -q -m 'not target_spec' bench/tests

      - name: Generate mirror corpus
        env:
          POSITIVES: ${{ inputs.positives || 3000 }}
          NEGATIVES: ${{ inputs.negatives || 12000 }}
          SEED: ${{ inputs.seed || 0 }}
        run: |
          cd benchmarks && python3 -m bench.corpora.mirror --ensure \
            --positives "$POSITIVES" --negatives "$NEGATIVES" --seed "$SEED"

      - name: Run leaderboard (keyhog + trufflehog)
        env:
          KEYHOG_BIN: ${{ github.workspace }}/target/release/keyhog
        run: |
          cd benchmarks && python3 -m bench leaderboard \
            --corpus mirror --scanners keyhog,trufflehog --out results

      - name: Generate exact recovery corpus
        run: make -C benchmarks ioc-recovery-corpus

      - name: Enforce exact deep recovery target
        env:
          KEYHOG_BIN: ${{ github.workspace }}/target/release/keyhog
        run: |
          cd benchmarks && PYTHONDONTWRITEBYTECODE=1 python3 -B -m pytest \
            -p no:cacheprovider -q -m target_spec \
            bench/tests/test_ioc_recovery_target_spec.py

      - name: Run exact recovery mode matrix
        env:
          KEYHOG_BIN: ${{ github.workspace }}/target/release/keyhog
        run: make -C benchmarks ioc-recovery

      - name: Render leaderboard + per-detector reports
        run: |
          cd benchmarks && python3 -m bench report \
            --results results --reports reports --corpus mirror

      - name: Upload benchmark results and reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bench-unified-results
          path: |
            benchmarks/results/**
            benchmarks/results-ioc-recovery/**
            benchmarks/reports/**
          retention-days: 30
