name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Cancel older in-flight CI when a newer push lands on the same ref.
# Without this a rapid succession of pushes stacks 5+ deep — each one
# burning ~25 minutes of macOS + linux runner time on already-stale
# code. Burned through that 5-deep queue 2026-05-23.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # PR gate: the four highest-signal contract multipliers in strict mode.
  # The remaining ~10 runners run nightly (runners-nightly.yml) because
  # the full matrix is ~100k+ cases and would stack ~45+ minutes on
  # every push. This job requires `lfs: true` checkout — the contract
  # corpus and several runner fixtures are LFS-tracked.
  strict-runners:
    name: Strict adversarial runners
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # PR + main gate. contracts_runner is always strict (no env var); the
    # three multiplier runners honor KEYHOG_*_STRICT=1 (see TESTING_PROGRAM.md
    # §3.1). Remaining strict env vars run nightly in runners-nightly.yml.
    env:
      KEYHOG_ADVERSARIAL_STRICT: "1"
      KEYHOG_ENCODING_STRICT: "1"
      KEYHOG_PATH_SHAPE_STRICT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          # Same LFS requirement as the Test job: tests/contracts/*.toml
          # and readme_claims.rs are pointer-tracked. Without lfs:true the
          # tree has 3-line LFS stubs and every runner that parses TOML
          # or rust source fixtures fails immediately.
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Vectorscan
        run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
      - name: Strict runner gate (PR subset)
        run: |
          cargo test -p keyhog-scanner --profile release-fast \
            --test contracts_runner \
            --test adversarial_explosion_runner \
            --test encoding_explosion_runner \
            --test path_shape_runner

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # crates/scanner/tests/contracts/*.toml and
          # crates/scanner/tests/readme_claims.rs are LFS-tracked (the
          # fixtures look like real secrets to push-protection; storing
          # them as LFS pointers is the only way to keep the contract
          # corpus pushable). Without this checkout option the working
          # tree has 3-line LFS pointer files instead of the actual
          # fixture content and contracts_runner crashes parsing them
          # as TOML.
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Vectorscan
        run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
      - run: cargo test -p keyhog-core --lib
      - run: cargo test -p keyhog-scanner --lib
      - run: cargo test -p keyhog --lib

      # End-to-end tests against the built binary. Exercises the
      # full CLI surface (JSON shape, exit codes, --no-suppress-
      # test-fixtures Tier-B flag, README banner count pin).
      - name: E2E binary tests
        run: cargo test -p keyhog --test e2e_binary --profile release-fast

      # Per-detector contract gate lives in strict-runners (with the
      # adversarial/encoding/path multipliers under KEYHOG_*_STRICT=1).

      # Property tests (10 000+ cases per invariant). The proptest
      # regression file (scanner_fuzz.proptest-regressions) re-runs
      # every historical failure first — adding a new failure mode
      # there permanently gates the suite.
      - name: Property tests
        run: cargo test -p keyhog-scanner property::scanner_fuzz --profile release-fast

  # Integration aggregators. Every crate ships a `tests/all_tests.rs` that
  # pulls in its `unit/ adversarial/ contract/ gap/ gate/ integration/
  # property/ regression/ concurrent/` modules - ~3900 tests total. Before
  # this job CI ran only `--lib` plus a handful of named `--test` runners, so
  # NOTHING built the `all_tests` targets: a unit test under tests/unit/ that
  # stopped compiling (e.g. the LazyRegex CompiledPattern field change) sailed
  # through every gate because no CI step ever built that target. This job is
  # the gate that turns "the integration suite is green on my box" into "green
  # in CI". lfs:true + Hyperscan mirror the `test` job - the contract corpus
  # and several fixtures are LFS-tracked and the default build links Hyperscan.
  integration-tests:
    name: Integration test aggregators
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Vectorscan
        run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
      # Default features (Hyperscan/simd + simdsieve hot path) - the exact
      # engine configuration the Linux release ships, so these aggregators
      # exercise the same detection path users get rather than a feature
      # subset. Each crate's `all_tests` is one binary; run them per crate so
      # a failure names the crate.
      - name: core all_tests
        run: cargo test -p keyhog-core --test all_tests --profile release-fast
      - name: scanner all_tests
        run: cargo test -p keyhog-scanner --test all_tests --profile release-fast
      - name: sources all_tests
        run: cargo test -p keyhog-sources --test all_tests --profile release-fast
      - name: verifier all_tests
        run: cargo test -p keyhog-verifier --test all_tests --profile release-fast
      - name: cli all_tests
        run: cargo test -p keyhog --test all_tests --profile release-fast
      # Detector-corpus integrity: every embedded detector must load, compile
      # into the scanner backend, declare a >=3-char keyword, carry metadata +
      # >=1 pattern, and the canonical-shape smoke set must fire. A detector
      # whose regex fails to compile degrades to a never-match LazyRegex with
      # only an error! log - silent recall loss this gate is the only thing
      # that catches.
      - name: detector self-validation
        run: cargo test -p keyhog-scanner --test all_detectors_self_validate --profile release-fast

  macos-build:
    name: macOS Build
    runs-on: macos-latest
    # macOS lacks Vectorscan/Hyperscan in its package repos — vendoring
    # it would balloon CI minutes for marginal value. We instead run
    # the no-default-features build path which is the production
    # configuration on machines without Hyperscan available. The lib
    # tests here cover the same code paths the Windows/Linux jobs do
    # except for the simd-feature-gated Hyperscan path.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p keyhog-core -p keyhog-scanner --no-default-features
      - run: cargo test -p keyhog-core --lib
      - run: cargo test -p keyhog-scanner --lib --no-default-features --features "entropy,multiline,ml"
      - run: cargo test -p keyhog-sources --lib
      # Lock the EXACT invocation the release workflow uses. The release
      # tag flow runs `cargo build --release -p keyhog --no-default-features
      # --features portable`; if that ever breaks (e.g. because someone
      # moved a feature flag between crates), this lane catches it on PR
      # instead of on a tag push. v0.5.11 + v0.5.12 both failed because
      # this lane didn't exist.
      - run: cargo build --release -p keyhog --no-default-features --features portable

  feature-matrix:
    name: Feature matrix sanity check
    runs-on: ubuntu-latest
    # Cross-package feature combinations the release workflows and the
    # composite Action depend on. Anything anyone might `cargo install`
    # has to compile cleanly with the documented feature set.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Vectorscan
        run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
      - name: portable (no system libs)
        run: cargo check -p keyhog --no-default-features --features portable
      - name: default (full)
        run: cargo check -p keyhog
      - name: full (everything except Ghidra/CUDA)
        run: cargo check -p keyhog --features full
      - name: minimal (no defaults, no features)
        run: cargo check -p keyhog --no-default-features
      - name: scanner standalone, all data features
        run: cargo check -p keyhog-scanner --features "entropy,multiline,ml,decode"

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    # Clippy is ADVISORY, not a gate. `-D warnings` made every stylistic lint a
    # release blocker, which pushed us toward churn-y renames and `#[allow]`
    # suppressions that obscured real code more than the lints helped. Clippy
    # still runs on every push so the lints stay visible in the log, but it
    # never fails CI (`continue-on-error`) and no job `needs` it. Genuine bugs
    # are caught by the test gates; clippy is a suggestion, not a verdict.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Vectorscan
        run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
      # No `-D warnings`: lints are reported but do not fail the step.
      - run: cargo clippy -p keyhog-core -p keyhog-scanner -p keyhog

  install-scripts:
    name: Install scripts (install.sh edge cases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No Rust build needed: both harnesses mock curl / uname / nvidia-smi /
      # ldconfig / ldd and the downloaded binary, so install.sh runs fully
      # offline. The hosted runner has no CUDA stack, so the CUDA-detection
      # cases that get skipped on a developer's GPU box all execute here -
      # full coverage of every mode, flag, detection branch, and failure path.
      - name: install.sh syntax
        run: sh -n install.sh
      - name: install.ps1 parse check
        shell: pwsh
        # No Windows runner needed to catch a syntax error: parse the script
        # with the PowerShell language parser on the (pwsh-equipped) Linux
        # runner. Guards the install.ps1 recoverability edits from shipping
        # un-parseable. Behaviour is smoke-tested on Windows in
        # integration-smoke.yml.
        run: |
          $tokens = $null; $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ./install.ps1), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "ERROR: $($_.Message) @ line $($_.Extent.StartLineNumber)" }
            exit 1
          }
          Write-Host "install.ps1 parsed cleanly ($($tokens.Count) tokens)."
      - name: Detection-path scenarios
        run: bash tests/install/scenarios.sh
      - name: Edge-case battery (incl. recoverability matrix)
        run: bash tests/install/edge_cases.sh
      - name: Docs CLI-claim gate (no hallucinated flags in docs/site)
        run: bash tests/docs/cli_claims_check.sh

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # cargo fmt walks every .rs file under tests/, including
          # readme_claims.rs and diagnose_84_divergence.rs which are
          # LFS-stored (they contain credential-shaped strings that
          # push-protection rejects). Without lfs:true those files
          # arrive as 3-line LFS pointer text starting with
          # `version https://git-lfs.github.com/spec/v1`, which
          # rustfmt cannot parse ("expected one of `!` or `::`,
          # found `https`").
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Scope fmt to keyhog's own crates. The vendored vyre tree under
      # vendor/vyre/ has tests/ subtrees excluded by keyhog's root
      # .gitignore — cargo fmt --all walks those `mod tests;` decls and
      # fails on missing files. vyre's own CI formats vyre.
      - run: cargo fmt -p keyhog-core -p keyhog-scanner -p keyhog -p keyhog-verifier -p keyhog-sources -- --check

  deny:
    name: Supply-chain (cargo deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      # `cargo deny check` walks up the directory tree looking for the
      # nearest deny.toml; without an explicit --config it would find
      # the Santh-monorepo policy at /media/.../Santh/deny.toml which
      # rejects MPL-2.0 + duplicate versions. Pinning the local one is
      # what keeps the gate honest.
      - name: Run cargo deny
        working-directory: .
        run: cargo deny check --config deny.toml

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      # The four `--ignore` flags below match the four
      # accept-with-rationale advisories in `audit.toml` (the workspace
      # root file that documents the security review). Adding a fifth
      # ignore without a corresponding SECURITY.md rationale block is
      # a CI failure waiting to happen — please update both files.
      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2025-0141

  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Vectorscan
        run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
      - run: cargo build --release -p keyhog
      - name: Smoke test
        run: |
          set +e
          # Synthesize the Stripe demo key at runtime so the literal
          # never lives in tracked source. (Bare literal trips push-
          # protection on the test-fixture suppression match AND third-
          # party content-scanners that grep CI yamls for credential
          # shapes.) The demo key is on the bundled test-fixture
          # suppression list (crates/cli/data/suppressions/test-fixtures.toml),
          # so the smoke test must opt out via
          # --no-suppress-test-fixtures to surface the finding —
          # otherwise default-mode correctly returns zero matches
          # and the smoke test would mis-assert "scanner broken."
          prefix="sk_$(printf live)"
          body="4eC39HqLyjWDarjtT1zdp7dc"
          printf 'API_KEY="%s_%s"\n' "$prefix" "$body" \
            | ./target/release/keyhog scan --stdin --min-confidence 0.0 \
                --no-suppress-test-fixtures
          test $? -eq 1  # exit 1 = findings detected (expected)

  publish:
    name: Publish to crates.io
    # Clippy is intentionally NOT a publish gate (it is advisory; see the
    # clippy job). Release correctness is gated by test/strict-runners/fmt/build.
    needs: [test, strict-runners, fmt, build]
    # Only attempt publish on an explicit `v*` tag push. Running on
    # every main push churned the CI red because keyhog-core depends
    # on the vendored vyre-libs (not yet on crates.io), so `cargo
    # publish` fails the "Updating crates.io index" step. Tag-gating
    # also matches the conventional release flow: bump the version,
    # tag, push the tag, publish.
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vectorscan
        run: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config

      - name: Publish subcrates then CLI
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          for pkg in keyhog-core keyhog-scanner keyhog-verifier keyhog-sources keyhog; do
            echo "Publishing $pkg..."
            # --no-verify: already tested in the build job above
            # Capture stderr so "already published" is a no-op but
            # any other failure (network, auth, schema) fails the job
            # instead of silently swallowing.
            if out=$(cargo publish -p "$pkg" --no-verify 2>&1); then
              echo "$out"
            else
              echo "$out"
              if echo "$out" | grep -q "is already uploaded"; then
                echo "  → $pkg already at this version; continuing"
              else
                echo "  → $pkg publish failed with unexpected error"
                exit 1
              fi
            fi
            # Wait for crates.io index propagation between dependent crates
            sleep 30
          done
