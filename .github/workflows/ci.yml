name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Cancel older in-flight CI when a newer push lands on the same ref.
# Without this a rapid succession of pushes stacks 5+ deep, each one
# burning ~25 minutes of macOS + linux runner time on already-stale
# code. Burned through that 5-deep queue 2026-05-23.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CC: ""
  # crates.io downloads on the hosted runners intermittently drop mid-stream
  # ("curl failed: [55] ... OpenSSL SSL_read: SSL_ERROR_SYSCALL"), which cargo's
  # default of 3 retries does not reliably survive, it has red-failed otherwise
  # green Test runs on unrelated crates (base64, gix-protocol). Ten retries makes
  # a transient peer reset a non-event for every cargo invocation in every job.
  CARGO_NET_RETRY: "10"

jobs:
  # Prevention-gate aggregator. `scripts/gates/run_all.sh` is the ONE entrypoint
  # that invokes every audit keyhog has: the 3 source/org prevention gates
  # (no_silent_fallbacks #1, surface_coverage #4, complexity_budget #5), the vyre
  # pin-consistency gate, org_audit.py, the docs CLI-claim + integration
  # entry-point shell gates, cargo audit, and (when their corpus/results/binary
  # assets are present) the backend-parity + recall-floor pytests, the
  # differential bench gate, and the ML feature-parity gate. Before this job the
  # 3 source prevention gates ran ONLY in the pre-commit hook / locally, a
  # contributor without the hook could land a new silent fallback, an
  # untested subcommand, or an over-budget engine file with green CI. This is
  # the gate that turns "I ran the gates on my box" into "green in CI on every
  # push". The asset-bearing gates LOUD-SKIP here (this runner has no CredData
  # corpus, no competitor binaries, no results/, no prebuilt dump_features), the
  # full asset run lives in bench-nightly.yml / differential-bench.yml. cargo
  # audit DOES run (the advisory DB is fetched), centralizing what the separate
  # `audit` job does. Mostly Python + shell + cargo-audit, plus the lightweight
  # standalone CI-operability Rust test crate.
  audit-gates:
    name: Prevention gates (run_all.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-audit
      - name: Run all prevention gates
        run: bash scripts/gates/run_all.sh

  # PR gate: all strict contract multipliers in strict mode. This job requires
  # `lfs: true` checkout, the contract corpus and several runner fixtures are
  # LFS-tracked.
  strict-runners:
    name: Strict adversarial runners
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # PR + main gate. contracts_runner is always strict (no env var); the
    # multiplier runners honor KEYHOG_*_STRICT=1.
    env:
      KEYHOG_ADVERSARIAL_STRICT: "1"
      KEYHOG_ENCODING_STRICT: "1"
      KEYHOG_PATH_SHAPE_STRICT: "1"
      KEYHOG_NOISE_STRICT: "1"
      KEYHOG_UNICODE_STRICT: "1"
      KEYHOG_WHITESPACE_STRICT: "1"
      KEYHOG_LINE_LEN_STRICT: "1"
      KEYHOG_ENTROPY_STRICT: "1"
      KEYHOG_MULTI_STRICT: "1"
      KEYHOG_COMPOUND_STRICT: "1"
      KEYHOG_COMMENT_STRICT: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Same LFS requirement as the Test job: tests/contracts/*.toml
          # and readme_claims.rs are pointer-tracked. Without lfs:true the
          # tree has 3-line LFS stubs and every runner that parses TOML
          # or rust source fixtures fails immediately.
          lfs: true
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done
      - name: Strict runner gate (PR subset)
        # KH-1302: CPU-only ubuntu-latest cannot load libcuda; ci-lean keeps
        # adversarial contracts off the GPU default feature set.
        run: |
          cargo test -p keyhog-scanner --profile release-fast \
            --no-default-features --features ci-lean \
            --test contracts_runner \
            --test adversarial_explosion_runner \
            --test encoding_explosion_runner \
            --test path_shape_runner \
            --test noise_injection_runner \
            --test unicode_confusable_runner \
            --test whitespace_normalization_runner \
            --test line_length_runner \
            --test entropy_edge_runner \
            --test compound_encoding_runner \
            --test multi_secret_runner \
            --test comment_embed_runner \
            --test companion_contracts_runner \
            --test cve_replay_runner

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # crates/scanner/tests/contracts/*.toml and
          # crates/scanner/tests/readme_claims.rs are LFS-tracked (the
          # fixtures look like real secrets to push-protection; storing
          # them as LFS pointers is the only way to keep the contract
          # corpus pushable). Without this checkout option the working
          # tree has 3-line LFS pointer files instead of the actual
          # fixture content and contracts_runner crashes parsing them
          # as TOML.
          lfs: true
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done
      - run: cargo test -p keyhog-core --lib
      - run: cargo check -p keyhog-core --all-targets
      # Hosted runners have no accelerator. Keep this broad library gate on the
      # complete CPU/SIMD detection stack; real GPU execution and parity belong
      # to the GPU-labelled fleet lane, where an unavailable adapter is a hard
      # configuration failure instead of a false failure on GitHub hardware.
      - run: cargo test -p keyhog-scanner --lib --no-default-features --features ci-lean
      - run: cargo test -p keyhog --lib
      # verifier + sources inline unit tests: previously only their `--test`
      # aggregators ran in CI, so a lib-internal unit test (e.g. the
      # verification-cache eviction contracts) was never executed on the
      # default build.
      - run: cargo test -p keyhog-verifier --lib
      - run: cargo test -p keyhog-sources --lib

      # End-to-end tests against the built binary. Exercises the
      # full CLI surface (JSON shape, exit codes, --no-suppress-
      # test-fixtures Tier-B flag, README banner count pin).
      - name: E2E binary tests
        run: cargo test -p keyhog --test e2e_binary --profile release-fast

      # SARIF -> GitHub code-scanning compliance (repo-relative URIs +
      # partialFingerprints). Structural validity isn't enough; these are the
      # requirements that decide whether alerts annotate the PR and dedup
      # across runs. Drives the real binary from a repo root like the Action.
      - name: SARIF code-scanning compliance
        run: cargo test -p keyhog --test sarif_github_compliance --profile release-fast

      # Fail-closed security regressions. These spawn the built binary and
      # assert env-guard / allowlist-policy / lockdown / detector-corpus
      # fail-closed contracts + exit codes, so they run as their own bounded
      # targets (NOT folded into all_tests, which would grow the OOM/link
      # footprint). They were CI-orphans (keyhog CI ran only specific `--test`
      # targets), so these fail-closed assertions never ran, un-orphaning them
      # surfaced a real SIGSEGV: a CPU-forced scan hitting an early setup error
      # (expired `.keyhogignore`, missing path) crashed via a leaked GPU/Vulkan
      # probe thread instead of `exit(2)`. `regression_scan_setup_error_exits_cleanly`
      # is the durable lock for that (exit-by-code, never by signal).
      - name: Fail-closed security regressions
        run: >
          cargo test -p keyhog --no-fail-fast --profile release-fast
          --test regression_install_insecure_env_removed
          --test regression_invalid_backend_env_fails_closed
          --test regression_invalid_detectors_env_fails_closed
          --test regression_malformed_detector_dir_fails_closed
          --test regression_require_gpu_fails_closed
          --test regression_output_to_dev_null
          --test regression_daemon_relative_path_fail_closed
          --test regression_expired_allowlist_fails_closed
          --test regression_legacy_canary_env_ignored
          --test regression_allowlist_governance
          --test regression_lockdown_custom_incremental_cache
          --test regression_explicit_backend_ignores_autoroute_cache
          --test regression_scan_setup_error_exits_cleanly

      # Per-detector contract gate lives in strict-runners (with the
      # adversarial/encoding/path multipliers under KEYHOG_*_STRICT=1).

      # Property tests (10 000+ cases per invariant). The proptest
      # regression file (scanner_fuzz.proptest-regressions) re-runs
      # every historical failure first, adding a new failure mode
      # there permanently gates the suite.
      - name: Property tests
        run: cargo test -p keyhog-scanner --lib property::scanner_fuzz --profile release-fast

  # Integration aggregators. Every crate ships a `tests/all_tests.rs` that
  # pulls in its `unit/ adversarial/ contract/ gap/ gate/ integration/
  # property/ regression/ concurrent/` modules - ~3900 tests total. Before
  # this job CI ran only `--lib` plus a handful of named `--test` runners, so
  # NOTHING built the `all_tests` targets: a unit test under tests/unit/ that
  # stopped compiling (e.g. the LazyRegex CompiledPattern field change) sailed
  # through every gate because no CI step ever built that target. This job is
  # the gate that turns "the integration suite is green on my box" into "green
  # in CI". lfs:true + Hyperscan mirror the `test` job - the contract corpus
  # and several fixtures are LFS-tracked and the default build links Hyperscan.
  integration-tests:
    name: Integration test aggregators
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done
      # Full detection path (Hyperscan/simd + simdsieve hot path + ML/decode/
      # multiline) MINUS the GPU dispatch stack, via the `ci-lean` feature.
      # These runners are GPU-less, so the GPU dispatch suites
      # (`#![cfg(feature = "gpu")]`) must compile out here and run on
      # runners-nightly (real GPU hosts, `--features gpu`) instead - otherwise
      # they fail for lack of an adapter rather than a code defect. Detection
      # results are identical: a `gpu`-on build on a driverless host falls back
      # to the same CPU path this lean build takes directly. core/sources/
      # verifier have no GPU feature, so they run default features unchanged.
      # Each crate's `all_tests` is one binary; run them per crate so a failure
      # names the crate.
      - name: core all_tests
        run: cargo test -p keyhog-core --test all_tests --profile release-fast
      - name: scanner all_tests
        run: cargo test -p keyhog-scanner --test all_tests --no-default-features --features ci-lean --profile release-fast
      - name: scanner CI target wiring gates
        run: cargo test -p keyhog-scanner --test unit_gates_live ci_scanner --no-default-features --features ci-lean --profile release-fast -- --nocapture
      - name: scanner GPU literal artifact writer
        run: cargo test -p keyhog-scanner --test gpu_literal_artifact_writer --no-default-features --features ci-lean --profile release-fast
      # Dead-corpus adversarial scanner fixtures are a standalone target because
      # the full adversarial directory contains integration-unsafe unit-internal
      # probes. This target keeps the real corpus recall shards live in CI.
      - name: scanner adversarial dead corpus
        run: cargo test -p keyhog-scanner --test adversarial_suite --no-default-features --features ci-lean --profile release-fast
      - name: sources all_tests
        run: cargo test -p keyhog-sources --test all_tests --profile release-fast
      # The opt-in source backends (binary ELF/PE/Mach-O + Ghidra literal
      # extraction; the github/gitlab/bitbucket hosted-Git clients; the slack,
      # azure, gcs, s3 cloud backends; docker image/layer unpacking) are NOT in
      # `default` features, and no other job runs their tests: feature-matrix only
      # `cargo check`s `--features full`, which compiles but never executes them.
      # These two steps run them. No network, daemon, or Ghidra is required:
      # every covered test is in-memory fixtures, mock HTTP (httpmock), a
      # fake-binary script, or source inspection.
      #
      # 1) The binary backend aggregator: ELF/PE/Mach-O section reader + the
      #    byte-exact C-string unescaper that secret recall on compiled binaries
      #    depends on. Deterministic in parallel.
      - name: sources binary backend (all_tests)
        run: cargo test -p keyhog-sources --test all_tests --features binary --profile release-fast
      # 2) Every opt-in backend's `--lib` inline unit tests: hosted-Git SSRF +
      #    credential redaction, cloud request construction, slack/docker helpers.
      #    Restricted to `--lib` on purpose: the `all_tests` aggregator with these
      #    features is NOT yet parallel-deterministic, some integration tests bump
      #    the process-global skip counters through non-`gate_scan` helper calls
      #    that escape the exclusive scan scope, so they race a concurrent
      #    counter-asserting test (e.g. corrupt_zip). The `--lib` inline tests
      #    carry no process-global counter assertions, so they ARE race-free.
      #    (Tracked: route every counter-bumping test path through the scan gate
      #    so the full aggregator can run all backends in parallel.)
      - name: sources opt-in backends (inline unit tests)
        run: cargo test -p keyhog-sources --lib --features "github,gitlab,bitbucket,slack,azure,gcs,s3,docker,binary" --profile release-fast
      # 3) The opt-in backends' INTEGRATION tests (tests/*.rs). Many are
      #    deliberately their OWN test binary, they assert on the process-global
      #    skip counters and keep those assertions out of `all_tests.rs` so a
      #    per-test fixture can reset the atomics without racing sibling tests in
      #    the same process. Their skip-counter, cloud-listing, hosted-git
      #    API-failure, private-key-in-git-history, and slack-pagination locks
      #    were DOUBLE-orphaned before this step: not aggregated into all_tests
      #    AND all_tests never ran with their feature, so they never executed in
      #    CI. This runs `cargo test -p keyhog-sources` with NO `--test` filter,
      #    so EVERY integration target compiles + runs, each standalone file in
      #    its own process (counter-safe by construction), and the `all_tests`
      #    aggregator too. `--test-threads=1` keeps the aggregator's own
      #    process-global-counter tests deterministic (same reason as
      #    `verifier break_it`). `scripts/gates/tests_wired.py` treats this
      #    all-targets step as wiring every sources `tests/*.rs`.
      - name: sources opt-in backends (all standalone targets, serial)
        run: cargo test -p keyhog-sources --features "github,gitlab,bitbucket,slack,azure,gcs,s3,docker,binary" --profile release-fast -- --test-threads=1
      # NOTE: two sources perf tripwires are `#[ignore]`d and NOT run in CI 
      # `perf_io_path` (straces a spawned scan; ptrace-fragile under the parallel
      # test-binary load) and `perf_parallel_cores` (a multicore speedup RATIO,
      # only valid on an otherwise-idle host). Both still COMPILE in the
      # all-targets step above (shown as `ignored`, not orphaned) and run on an
      # idle host via `cargo test -p keyhog-sources --test <name> -- --ignored`.
      # Their thresholds are unchanged; only the CI scheduling is gated.
      - name: verifier all_tests
        run: cargo test -p keyhog-verifier --test all_tests --profile release-fast
      # `break_it.rs` is a fuzz file of engine tests that drive `verify_all`
      # through the process-global rate limiter on a shared service slot with
      # tight watchdogs; it is intentionally NOT in `all_tests` (parallel), it
      # runs as its own SERIAL target so its isolation assumptions hold. Removing
      # this step orphans it (`scripts/gates/tests_wired.py` would flag).
      - name: verifier break_it (serial)
        run: cargo test -p keyhog-verifier --test break_it --profile release-fast -- --test-threads=1
      - name: cli all_tests
        run: cargo test -p keyhog --test all_tests --no-default-features --features ci-lean --profile release-fast
      - name: cli Vyre pin coherence
        run: cargo test -p keyhog --test vyre_pin_coherence_lane3 --no-default-features --features ci-lean --profile release-fast
      # Coherence test binaries: standalone (not in all_tests) so they stay
      # bounded; each drives the real keyhog binary + reads the committed
      # docs/README to pin doc<->binary coherence (format set, exit codes,
      # verify flags, verify-block count). ci-lean includes `verify` so the
      # --verify* flags exist. Named explicitly because nothing else runs these
      # standalone targets in CI.
      - name: cli coherence binaries
        run: cargo test -p keyhog --no-default-features --features ci-lean --profile release-fast --test coherence_wiring_lane7 --test lane10_verification_doc_coherence --test coherence_verify_count
      # Property (proptest) suite - its own bounded binary (was orphaned: empty
      # property/mod.rs + missing proptest dep, so it never compiled or ran).
      - name: cli property
        run: cargo test -p keyhog --test property --profile release-fast
      # Adversarial CLI suite - its own bounded binary because each test spawns
      # keyhog; folding it into all_tests drove OOM/SIGKILL in CI.
      - name: cli adversarial
        run: cargo test -p keyhog --test adversarial --profile release-fast -- --test-threads=4
      # Detector-corpus integrity: every embedded detector must load, compile
      # into the scanner backend, declare a >=3-char keyword, carry metadata +
      # >=1 pattern, and the canonical-shape smoke set must fire. A detector
      # whose regex fails to compile degrades to a never-match LazyRegex with
      # only an error! log - silent recall loss this gate is the only thing
      # that catches.
      - name: detector self-validation
        run: cargo test -p keyhog-scanner --test all_detectors_self_validate --profile release-fast
      # Homoglyph ASCII-skip recall-safety gate. The always-active homoglyph
      # RegexSet variants (the single largest scan line item, ~55% of scan cost)
      # are SKIPPED on pure-ASCII chunks by default. That is sound ONLY if the
      # base AC/confirmed path catches every finding the skipped variant would.
      # `homoglyph_ascii_skip_parity` scans thousands of ASCII inputs with skip
      # ON vs OFF and asserts byte-identical RawMatch sets; `regression_ac_
      # overlap_shadow` pins the overlapping-AC trigger fix that closed the one
      # gap (inner literal `secret` shadowed by `client_secret`). A divergence is
      # a real recall regression to fix at the source, never to weaken here.
      - name: homoglyph ASCII-skip parity + shadow gate
        run: |
          cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test homoglyph_ascii_skip_parity homoglyph_ascii_skip_parity_default
          cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_ac_overlap_shadow shadowed_inner_literal_is_ac_confirmed_with_variant_skipped
      # Finding-set determinism gate. `ScanState::push_match` keeps the top-N by
      # `RawMatch::Ord` when a chunk overflows `max_matches_per_chunk`; the kept set
      # must not depend on insertion order (== fallback extraction order, and
      # HashMap-/thread-nondeterministic in production), or the reported findings
      # flicker run-to-run. `push_match_eviction_set_is_insertion_order_independent`
      # drives the eviction boundary directly with all-tied-but-offset candidates,
      # pinning that `RawMatch::Ord` stays total down to (offset, line). The corpus
      # `fallback_order_independence` test in the same file is `#[ignore]` (needs the
      # mirror corpus); this invocation runs only the corpus-free boundary gate.
      - name: finding-set eviction order-independence
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test fallback_order_independence push_match_eviction_set_is_insertion_order_independent
      # Basic-Auth detector recall contract. `basic-auth-credentials` closes the
      # Auth:Basic-Authorization CredData category (0 -> 491 TP, recall 0.824);
      # this pins that a realistic `Basic <base64>` blob surfaces, the curl-shape
      # surfaces, and the English word `basically` does NOT trip the `\b`-anchored
      # detector: a recall regression here is a real detection loss to fix at the
      # source, never to weaken.
      - name: basic-auth detector recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test basic_auth_credentials_recall
      # Named-detector anchor-floor recall contract. `compute_confidence` is a
      # *normalized* signal sum, so a keyword-anchored service detector match
      # (`Splunk=<uuid>`) that can only earn the context-anchor weight scored
      # below the 0.40 floor and was dropped as `below_min_confidence`: the
      # dominant cause of 538 strict contract-positive misses. The floor lifts
      # such matches; this pins the lift is named+anchor-gated (FP-safe: generic
      # / entropy / weak-anchor detectors keep the full gate stack), a recovered
      # positive surfaces, and a bare value without the keyword does not claim
      # the named detector. A regression here is a real detection loss to fix at
      # the source, never to weaken.
      - name: named-detector anchor-floor recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_named_detector_anchor_floor_recall
      # Canonical-hex service-key recall contract. A weak_anchor service detector
      # (alchemy/datadog/crowdin/…) whose regex REQUIRED its service keyword and
      # captured canonical-length pure hex (32/40/48/64) had the value dropped by
      # the bare-hex-digest shape gate BEFORE confidence, defeating its own
      # min_confidence=0.2. The KH-L-0110 allow_canonical_hex_key escape hatch is
      # now keyed on the service anchor; this pins a keyword-anchored hex key
      # surfaces, a bare hex without the keyword does not claim the detector, and
      # an all-zero placeholder stays suppressed (decoy gates still run).
      - name: named-detector canonical-hex-key recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_named_canonical_hex_key_recall
      # Per-pattern weak-anchor recall contract. The weak_anchor classification
      # (which keeps the Tier-B shape gates engaged for collision-prone captures)
      # is resolved per MATCHED PATTERN, not per detector: a strong pattern
      # (servicenow `instance=…\.service-now\.com`) must not inherit a sibling
      # broad-identifier pattern's (`user=([\w-]+)`) gates. This pins the strong
      # pattern surfaces and the bare-host precision twin (no keyword → no claim).
      - name: per-pattern weak-anchor recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_per_pattern_weak_anchor_recall
      # Character-class prefix expansion recall contract. A regex opening with a
      # literal run interrupted by a small enumerable class (`dd[npc]_[a-f0-9]{64}`)
      # carries no extractable single prefix, so the plural extractor enumerates
      # the class into one concrete prefix per member (`ddn_`/`ddp_`/`ddc_`) to
      # earn each branch its AC trigger + literal-prefix anchor. Pins the member
      # tokens surface and the faithful-expansion twin (non-member `ddz_` → no claim).
      - name: char-class prefix expansion recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_charclass_prefix_expansion_recall
      # Leading-construct prefix recall contract. A leading zero-width assertion
      # (`\bser\.…`, flagsmith) and a leading short-literal alternation extended
      # by a trailing literal (`(?:pk|sk)\.…`, locationiq) previously defeated
      # prefix extraction; the assertion is stripped and the post-group literal
      # is carried onto each branch. Pins both surface plus the precision twins
      # (word-internal `ser.` and a too-short locationiq body → no claim).
      - name: leading-construct prefix recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_leading_assertion_and_alternation_prefix_recall
      # Distinctive required-infix anchor recall contract. A named detector whose
      # regex opens with a class (no prefix) and captures the whole match (no
      # keyword group) but REQUIRES a distinctive literal infix (terraform
      # `\.atlasv1\.`) earns the anchor floor on that infix. Pins the token
      # surfaces and the soundness twin (same shape without `.atlasv1.` → no claim).
      - name: distinctive-infix anchor recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_distinctive_infix_anchor_recall
      # Checksum boundary no-downgrade recall contract. A known-prefix boundary
      # extension (provider-token bytes / base64 `=` padding) must never turn a
      # checksum-VALID token into a non-valid one, e.g. a `pypi-…` token abutted
      # by a `="…"` separator must not absorb the `=` and fail its checksum.
      - name: checksum boundary no-downgrade recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_checksum_boundary_no_downgrade
      # Inter-keyword separator policy: every detector's separator class collapses
      # to the single canonical `[_\-\s]*` at spec-load, so `api  key`, `client
      # id`, and `last fm` are never missed because an author allowed only one
      # underscore (or over-escaped `\s`). Audits the live corpus + proves the
      # recall gain end to end.
      - name: keyword-separator canonicalization recall contract
        run: cargo test -p keyhog-scanner --no-default-features --features ci-lean --profile release-fast --test regression_detector_owned_keyword_separators
      - name: RawMatch total-order gate
        run: cargo test -p keyhog-core --test new_core_finding_dedup --profile release-fast

  macos-build:
    name: macOS Build
    runs-on: macos-latest
    # macOS must exercise both the default Vectorscan/Hyperscan path and the
    # portable release asset path.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Vectorscan
        run: brew update && brew install vectorscan pkg-config
      # Prove the documented Homebrew Vectorscan path builds the actual CLI,
      # not only the scanner library. The portable release build remains below.
      - run: cargo build -p keyhog
      - run: cargo test -p keyhog-core --lib
      - run: cargo test -p keyhog-scanner --lib
      - run: cargo test -p keyhog-sources --lib
      # Lock the EXACT invocation the release workflow uses. The release
      # tag flow runs `cargo build --release -p keyhog --no-default-features
      # --features portable`; if that ever breaks (e.g. because someone
      # moved a feature flag between crates), this lane catches it on PR
      # instead of on a tag push. v0.5.11 + v0.5.12 both failed because
      # this lane didn't exist.
      - run: cargo build --release -p keyhog --no-default-features --features portable
      # Prove the freshly-built macOS binary actually INSTALLS and RUNS via
      # install.sh's --from-file path: doctor self-test (exit 0), seeded scan
      # (exit 1 + findings), SARIF, and the local-checksum gate. The mocked
      # detection scenarios never touch a real binary, and integration-smoke is
      # manual + installs a published release; this is the only gate that proves
      # current-source -> install -> working binary on macOS, every push.
      - name: install-from-build proof (macOS)
        run: bash tests/install/macos/install_from_local_build.sh target/release/keyhog

  windows-build:
    name: Windows portable release build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Keep both Windows feature closures used by the tag workflow green on
      # every change instead of discovering platform failures after tagging.
      - name: Build portable CLI
        run: cargo build --locked --release -p keyhog --no-default-features --features portable
      - name: Build GPU literal artifacts
        run: cargo build --locked --release -p keyhog-scanner --bin keyhog-scanner-artifacts --no-default-features --features ml,entropy,decode,multiline

  feature-matrix:
    name: Feature matrix sanity check
    runs-on: ubuntu-latest
    # Cross-package feature combinations the release workflows and the
    # composite Action depend on. Anything anyone might `cargo install`
    # has to compile cleanly with the documented feature set.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done
      - name: portable (no Hyperscan or GPU build libraries)
        run: cargo check -p keyhog --no-default-features --features portable
      - name: portable runtime dogfood (scalar CPU, real exclusions)
        run: |
          cargo build --profile release-fast -p keyhog --no-default-features --features portable
          tests/dogfood/repository_scan.sh ./target/release-fast/keyhog cpu json \
            "$RUNNER_TEMP/keyhog-portable-dogfood.json"
          tests/dogfood/product_matrix.sh ./target/release-fast/keyhog cpu
      - name: CI profile runtime dogfood (documented feature profile build)
        run: |
          cargo build --profile release-fast -p keyhog --no-default-features --features ci
          tests/dogfood/repository_scan.sh ./target/release-fast/keyhog cpu json \
            "$RUNNER_TEMP/keyhog-ci-profile-dogfood.json"
          tests/dogfood/product_matrix.sh ./target/release-fast/keyhog cpu
      - name: default (full)
        run: cargo check -p keyhog
      - name: default plus full source/decompiler and accelerator features
        run: cargo check -p keyhog --features full
      - name: minimal (no defaults, no features)
        run: cargo check -p keyhog --no-default-features
      # EVERY feature of the two richest feature-gated crates, compiled IN
      # ISOLATION. Checking features only in combination (the `default`/`full`
      # steps above, or a hand-picked `entropy,ml,decode` set) MASKS the
      # cross-feature coupling bug this job exists to catch: a helper / re-export
      # hosted in, or gated to, one feature's module but CALLED by code active
      # under another feature breaks a single-feature build while every combined
      # build stays green. Three such bugs shipped precisely because this job
      # only spot-checked a subset (sources `media_type` gated to cloud yet
      # called by `web`; the scanner `entropy::scanner` re-export gated to
      # simd/gpu/entropy yet used by the unconditional testing facade under
      # ml/decode/multiline/simdsieve). Loop the FULL feature list per crate so a
      # narrower-than-its-callers gate can never regress a single-feature
      # consumer again. Keep these green.
      - name: keyhog-sources, every feature compiles standalone
        run: |
          set -euo pipefail
          # ZERO features: the always-on filesystem/PDF/HAR path must build with
          # no source features enabled (the minimal-consumer contract).
          echo "::group::keyhog-sources --no-default-features (zero features)"
          cargo check -p keyhog-sources --no-default-features
          echo "::endgroup::"
          for f in git web github gitlab bitbucket slack azure gcs s3 docker binary; do
            echo "::group::keyhog-sources --features $f"
            cargo check -p keyhog-sources --no-default-features --features "$f"
            echo "::endgroup::"
          done
      - name: keyhog-scanner, every CPU feature compiles standalone
        run: |
          set -euo pipefail
          # ZERO features first: `entropy`/`decode`/… are declared OPTIONAL, so
          # the lib MUST build with none of them, else the optional-feature
          # claim is a lie (the entropy::scanner re-export was once gated
          # narrower than the unconditional testing facade, breaking this).
          echo "::group::keyhog-scanner --no-default-features (zero features)"
          cargo check -p keyhog-scanner --no-default-features
          echo "::endgroup::"
          for f in ml entropy decode multiline simd simdsieve ci-lean; do
            echo "::group::keyhog-scanner --features $f"
            cargo check -p keyhog-scanner --no-default-features --features "$f"
            echo "::endgroup::"
          done
      # The INSTALLABLE BINARY with each user-facing source feature alone, the
      # surface a user actually gets from `cargo install keyhog
      # --no-default-features --features github`. The lib loops above cover the
      # library layer; this catches the CLI layer, where a shared clap
      # value-parser / arg helper hosted behind one source feature is referenced
      # by another's args (e.g. `parse_positive_limit_count` was gated to `git`
      # yet used by the s3/gcs/azure and github/gitlab/bitbucket limit args, so
      # `--features github` alone failed to compile).
      - name: keyhog binary, every user-facing source feature compiles standalone
        run: |
          set -euo pipefail
          for f in git web github gitlab bitbucket azure gcs s3 docker binary verify; do
            echo "::group::keyhog --features $f"
            cargo check -p keyhog --no-default-features --features "$f"
            echo "::endgroup::"
          done
      - name: scanner artifact writer release command
        run: cargo run -p keyhog-scanner --bin keyhog-scanner-artifacts --no-default-features --features ml,entropy,decode,multiline,simdsieve,simd -- --out-dir "$RUNNER_TEMP/keyhog-gpu-literals"

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    # Clippy is ADVISORY, not a gate. `-D warnings` made every stylistic lint a
    # release blocker, which pushed us toward churn-y renames and `#[allow]`
    # suppressions that obscured real code more than the lints helped. Clippy
    # still runs on every push so the lints stay visible in the log, but it
    # never fails CI (`continue-on-error`) and no job `needs` it. Genuine bugs
    # are caught by the test gates; clippy is a suggestion, not a verdict.
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done
      # No `-D warnings`: lints are reported but do not fail the step.
      - run: cargo clippy -p keyhog-core -p keyhog-scanner -p keyhog

  install-scripts:
    name: Install scripts (install.sh edge cases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install install-script linters
        run: |
          for i in 1 2 3 4 5; do
            sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck shfmt && break
            sleep $((i * 2))
            if [ "$i" -eq 5 ]; then exit 1; fi
          done
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force
      - name: Static analysis (install scripts)
        env:
          REQUIRE_INSTALL_LINTERS: '1'
        run: bash scripts/gates/install_static_analysis.sh
      # No Rust build needed: both harnesses mock curl / uname / nvidia-smi /
      # ldconfig / ldd and the downloaded binary, so install.sh runs fully
      # offline. The hosted runner has no CUDA stack, so the CUDA-detection
      # cases that get skipped on a developer's GPU box all execute here -
      # full coverage of every mode, flag, detection branch, and failure path.
      - name: install.sh syntax
        run: sh -n install.sh
      - name: install.ps1 parse check
        shell: pwsh
        # No Windows runner needed to catch a syntax error: parse the script
        # with the PowerShell language parser on the (pwsh-equipped) Linux
        # runner. Guards the install.ps1 recoverability edits from shipping
        # un-parseable. Behaviour is smoke-tested on Windows in
        # integration-smoke.yml.
        run: |
          $tokens = $null; $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ./install.ps1), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "ERROR: $($_.Message) @ line $($_.Extent.StartLineNumber)" }
            exit 1
          }
          Write-Host "install.ps1 parsed cleanly ($($tokens.Count) tokens)."
      - name: Detection-path scenarios
        run: bash tests/install/linux/scenarios.sh
      - name: Edge-case battery (incl. recoverability matrix)
        run: bash tests/install/linux/edge_cases.sh
      - name: Calibration probe flag-compat + error surfacing (Law 10)
        run: bash tests/install/linux/calibration_probe_flag_compat.sh
      - name: Docs CLI-claim gate (no hallucinated flags in docs/site)
        run: bash tests/docs/cli_claims_check.sh
      - name: Integration entry-point gate (pre-commit hook + Action)
        run: bash tests/integration/entrypoints_check.sh

  fuzz-smoke:
    name: Fuzz target smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done
      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked
      - name: Run bounded fuzz smoke
        run: |
          cargo +nightly fuzz run decode_target -- -runs=64
          cargo +nightly fuzz run scanner_target -- -runs=32

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # cargo fmt walks every .rs file under tests/, including
          # readme_claims.rs and diagnose_84_divergence.rs which are
          # LFS-stored (they contain credential-shaped strings that
          # push-protection rejects). Without lfs:true those files
          # arrive as 3-line LFS pointer text starting with
          # `version https://git-lfs.github.com/spec/v1`, which
          # rustfmt cannot parse ("expected one of `!` or `::`,
          # found `https`").
          lfs: true
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      # Scope fmt to keyhog's own crates so fmt remains tied to this workspace's
      # public build surface and does not pick up generated or fixture trees.
      - run: cargo fmt -p keyhog-core -p keyhog-scanner -p keyhog -p keyhog-verifier -p keyhog-sources -- --check

  deny:
    name: Supply-chain (cargo deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-deny
      # `cargo deny check` walks up the directory tree looking for the
      # nearest deny.toml; without an explicit --config it would find
      # the Santh-monorepo policy at /media/.../Santh/deny.toml which
      # rejects MPL-2.0 + duplicate versions. Pinning the local one is
      # what keeps the gate honest.
      - name: Run cargo deny
        working-directory: .
        run: cargo deny check --config deny.toml

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-audit
      # The five `--ignore` flags below match the five
      # accept-with-rationale advisories in `audit.toml` (the workspace
      # root file that documents the security review). Adding a fifth
      # ignore without a corresponding SECURITY.md rationale block is
      # an invalid security gate (update both files together).
      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2025-0141

  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done
      # release-fast (thin LTO, codegen-units=16) is the profile built for
      # exactly this gate: -O3 validation + smoke without the multi-minute
      # fat-LTO link. The shipped fat-LTO `--release` build is still gated on
      # every PR by the macos-build job (portable variant) and produced for
      # real at tag time by release.yml, so this loses no fat-LTO coverage.
      - run: cargo build --profile release-fast -p keyhog
      - name: Smoke test
        run: |
          set +e
          # Synthesize the Stripe demo key at runtime so the literal
          # never lives in tracked source. (Bare literal trips push-
          # protection on the test-fixture suppression match AND third-
          # party content-scanners that grep CI yamls for credential
          # shapes.) The demo key is on the bundled test-fixture
          # suppression list (crates/cli/data/suppressions/test-fixtures.toml),
          # so the smoke test must opt out via
          # --no-suppress-test-fixtures to surface the finding 
          # otherwise default-mode correctly returns zero matches
          # and the smoke test would mis-assert "scanner broken."
          prefix="sk_$(printf live)"
          body="4eC39HqLyjWDarjtT1zdp7dc"
          if printf 'API_KEY="%s_%s"\n' "$prefix" "$body" \
            | ./target/release-fast/keyhog scan --stdin --no-config \
                --backend cpu --daemon=off --min-confidence 0.0 \
                --no-suppress-test-fixtures; then
            dogfood_status=0
          else
            dogfood_status=$?
          fi
          test "$dogfood_status" -eq 1  # exit 1 = findings detected (expected)

      # Prove current-source -> install -> working binary on Linux via
      # install.sh's --from-file path (doctor self-test, seeded scan, SARIF,
      # local-checksum gate). `expect` enables the premium interactive case.
      - name: install-from-build proof (Linux)
        run: |
          for i in 1 2 3 4 5; do
            sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends expect && break
            sleep $((i * 2))
            if [ "$i" -eq 5 ]; then exit 1; fi
          done
          bash tests/install/linux/install_from_local_build.sh target/release-fast/keyhog

      # Dogfood the installed product paths, not only scanner unit tests. Each
      # repository route consumes the real committed .keyhogignore policy and
      # proves complete raw-source coverage; the bounded product matrix proves
      # decode-through, exclusions, baselines, stdin, and reporters without the
      # repository's intentional decoder stress corpora exhausting safety caps.
      # Explicit routes keep this independent of host-local autoroute state while
      # the dedicated autoroute suites prove calibrated selection.
      - name: Dogfood self-scan matrix (CPU, Hyperscan, presets, reporters)
        run: |
          set -euo pipefail
          bin=./target/release-fast/keyhog

          tests/dogfood/repository_scan.sh "$bin" cpu json \
            "$RUNNER_TEMP/keyhog-dogfood-cpu-default.json"
          tests/dogfood/repository_scan.sh "$bin" simd json \
            "$RUNNER_TEMP/keyhog-dogfood-simd-default.json"
          cmp "$RUNNER_TEMP/keyhog-dogfood-cpu-default.json" \
            "$RUNNER_TEMP/keyhog-dogfood-simd-default.json"

          tests/dogfood/product_matrix.sh "$bin" cpu
          tests/dogfood/product_matrix.sh "$bin" simd

  publish:
    name: Publish to crates.io
    # Clippy is intentionally NOT a publish gate (it is advisory; see the
    # clippy job). Release correctness is gated by test/strict-runners/fmt/fuzz/build.
    needs: [test, strict-runners, fmt, fuzz-smoke, build]
    # Only attempt publish on an explicit `v*` tag push. Tag-gating matches the
    # release flow: bump the version, tag, push the tag, publish.
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install Vectorscan
        run: |

          for i in 1 2 3 4 5; do

            sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config && break

            sleep $((i * 2))

            if [ "$i" -eq 5 ]; then exit 1; fi

          done

      - name: Publish subcrates then CLI
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          for pkg in keyhog-core keyhog-scanner keyhog-verifier keyhog-sources keyhog; do
            echo "Publishing $pkg..."
            # --no-verify: already tested in the build job above
            # Capture stderr so "already published" is a no-op but
            # any other failure (network, auth, schema) fails the job
            # instead of silently swallowing.
            if out=$(cargo publish -p "$pkg" --no-verify 2>&1); then
              echo "$out"
            else
              echo "$out"
              if echo "$out" | grep -q "is already uploaded"; then
                echo "  → $pkg already at this version; continuing"
              else
                echo "  → $pkg publish failed with unexpected error"
                exit 1
              fi
            fi
            # Wait for crates.io index propagation between dependent crates
            sleep 30
          done
