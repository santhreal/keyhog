name: Docker integration matrix

# Builds keyhog in a clean container per libc family and runs the scenario
# battery (tests/docker/scenarios.sh) against the real binary under spoofed
# hardware/env/edge cases. The (image x scenario) product is the matrix; see
# tests/docker/ for how to add a row.

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'detectors/**'
      - 'tests/docker/**'
      - 'Cargo.*'
      - '.github/workflows/integration-docker.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'tests/docker/**'
      - 'Cargo.*'
  workflow_dispatch:

# A new push to main supersedes the prior image, so cancel any in-flight run on
# the same ref rather than letting glibc+musl fat-LTO rebuilds pile up. This was
# the source of the multi-hour "queued" backlog: no concurrency gate meant every
# push to crates/** stacked a fresh from-scratch matrix behind the previous one.
concurrency:
  group: docker-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: ${{ matrix.variant }} integration
    runs-on: ubuntu-latest
    # Build times: glibc builds full default features under release-fast (thin
    # LTO); musl builds `--release` (fat LTO) but with the small `--features
    # portable` dep graph, which links fast. Both land ~15-25 min. (The glibc
    # leg formerly built full default features under fat-LTO `--release` and was
    # cancelled at this cap EVERY run; see Dockerfile.glibc.) 45 caps a hung job
    # well under the 6h default that let runs sit queued.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        variant: [glibc, musl]
    steps:
      - uses: actions/checkout@v4
      - name: Run ${{ matrix.variant }} Docker integration matrix
        run: bash tests/docker/run.sh ${{ matrix.variant }}
