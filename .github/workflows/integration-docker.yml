name: Docker integration matrix

# Builds keyhog in a clean container per libc family and runs the scenario
# battery (tests/docker/scenarios.sh) against the real binary under spoofed
# hardware/env/edge cases. The (image x scenario) product is the matrix; see
# tests/docker/ for how to add a row.

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'detectors/**'
      - 'tests/docker/**'
      - 'Cargo.*'
      - '.github/workflows/integration-docker.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'tests/docker/**'
      - 'Cargo.*'
  workflow_dispatch:

# A new push to main supersedes the prior image, so cancel any in-flight run on
# the same ref rather than letting glibc+musl fat-LTO rebuilds pile up. This was
# the source of the multi-hour "queued" backlog: no concurrency gate meant every
# push to crates/** stacked a fresh from-scratch matrix behind the previous one.
concurrency:
  group: docker-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: ${{ matrix.variant }} integration
    runs-on: ubuntu-latest
    # Build times: glibc builds `--features ci-lean` (Hyperscan ON, GPU stack
    # OFF) under release-fast (thin LTO); musl builds `--features portable`
    # under `--release`. Both drop the wgpu/vyre/cuda graph, so both link in
    # ~11-20 min. (The glibc leg formerly built FULL DEFAULT features - which
    # pull `gpu` = wgpu + the 26-crate vyre graph + cuda + naga - and was
    # cancelled at this 45-min cap EVERY run, e.g. run 26865967197 ran the full
    # 45 min then died while musl finished in 11; see Dockerfile.glibc for why
    # ci-lean is the right feature set here.) 45 caps a hung job well under the
    # 6h default that let runs sit queued.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        variant: [glibc, musl]
    steps:
      - uses: actions/checkout@v4
      - name: Run ${{ matrix.variant }} Docker integration matrix
        run: bash tests/docker/run.sh ${{ matrix.variant }}
