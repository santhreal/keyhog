name: keyhog

# Run keyhog secret scanner on every push + PR through the bundled composite
# Action. Runtime errors fail the job. Findings upload to Code Scanning and
# fail only when `.github/keyhog-strict` is present.
#
# Hosted GitHub runners have no usable GPU. Use explicit scan arguments such as
# `--no-gpu` for CPU/SIMD-only hosted CI, or `--require-gpu` on self-hosted GPU
# runners where a driver regression should fail closed.

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-flight scans for the same ref when a new push lands.
concurrency:
  group: keyhog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: keyhog scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Per-job permissions instead of workflow-level, some org/repo
    # policy configurations reject dispatch of any workflow that
    # declares top-level `permissions:`. Per-job is equivalent in
    # effect, dispatch-safe everywhere.
    permissions:
      contents: read
      security-events: write   # upload SARIF to Code Scanning
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # full history for git-source scans

      - name: scan
        id: keyhog
        uses: ./.github/actions/keyhog
        with:
          # No version override: a branch/SHA action ref builds and exercises
          # this exact checkout. Release artifacts have separate signed smokes.
          path: .
          severity: high
          format: sarif
          upload-sarif: 'true'
          fail-on-findings: 'false'

      - name: fail on findings (opt-in via .github/keyhog-strict)
        if: steps.keyhog.outputs.findings != '0'
        env:
          ACTION_FINDINGS: ${{ steps.keyhog.outputs.findings }}
          ACTION_EXIT_CODE: ${{ steps.keyhog.outputs.exit-code }}
        run: |
          set -euo pipefail
          case "${ACTION_FINDINGS:-}" in
            "" | *[!0-9]*)
              echo "::error title=KeyHog::Invalid findings output."
              exit 3
              ;;
          esac
          case "${ACTION_EXIT_CODE:-}" in
            0 | 1 | 10) ;;
            "" | *[!0-9]*)
              echo "::error title=KeyHog::Invalid exit-code output."
              exit 3
              ;;
            *)
              echo "::error title=KeyHog::Unexpected scan exit code ${ACTION_EXIT_CODE}."
              exit "$ACTION_EXIT_CODE"
              ;;
          esac
          echo "keyhog reported $ACTION_FINDINGS finding(s); exit code $ACTION_EXIT_CODE"
          if [ -f .github/keyhog-strict ]; then
            echo "  .github/keyhog-strict present - failing CI on findings"
            exit 1
          fi
          echo "  .github/keyhog-strict absent - findings visible in Code Scanning"
          echo "  (touch .github/keyhog-strict to make findings block CI)"
