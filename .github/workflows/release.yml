name: Release

# Tag-driven binary build + upload. Push a `v*` tag and this workflow
# compiles `keyhog` for each supported target and attaches the binary
# to the existing draft/published GitHub Release for that tag.
#
# Downstream consumers of the `.github/actions/keyhog/action.yml`
# composite action look for these binaries first and only fall back to
# a source build when an asset is missing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build assets for (e.g. v0.5.7). Manual re-run.'
        required: true

jobs:
  build:
    name: Build ${{ matrix.asset }}
    # Per-job permissions: see keyhog.yml header note. Top-level
    # `permissions:` rejected at dispatch time on this repo.
    permissions:
      contents: write  # required by gh release upload to attach assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: keyhog-linux-x86_64
            # libhyperscan-dev is what the `simd` feature links against
            # on Linux. Ship a default-feature build matching the
            # crates.io release. This is the fallback when the host
            # has no NVIDIA GPU / no libcuda.so: WGPU still drives any
            # compatible adapter, SIMD covers the CPU path.
            install: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
            features: ''
            cuda_toolkit: false
          # CUDA-enabled Linux build. install.sh prefers this asset
          # when nvidia-smi + libcuda.so are both present at install
          # time, since the CUDA backend is meaningfully faster than
          # the WGPU fallback on large (>=256 MiB) scans. Requires
          # libcuda.so at RUNTIME (which is what we detect for); the
          # CUDA toolkit is only needed at LINK time, which we
          # provision here on the GH runner via the official action.
          - os: ubuntu-latest
            asset: keyhog-linux-x86_64-cuda
            install: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
            features: '--features cuda'
            cuda_toolkit: true
          # macOS: no `libhyperscan-dev` in the homebrew repo, so the
          # default `cargo build` fails on the simd feature. We ship a
          # feature-subset binary (no Hyperscan) for now. The `portable`
          # alias in `crates/cli/Cargo.toml` enables every keyhog-scanner
          # data feature plus every git/web/github/s3/docker/verify
          # source backend, just without the Hyperscan / Ghidra / CUDA
          # system-lib paths. Users who need the Hyperscan-accelerated
          # path on macOS still source-build via the action's fallback.
          - os: macos-latest
            asset: keyhog-macos-aarch64
            install: ''
            features: '--no-default-features --features portable'
          # macOS x86_64 (Intel): same feature subset as Apple Silicon.
          # macos-15-intel is GitHub's supported x86_64 runner after the
          # macos-13 retirement (2026-04). actionlint flags `macos-13`
          # as an unknown label and the matrix arm silently fails to
          # dispatch, which loses the Intel-mac asset on every tag push.
          - os: macos-15-intel
            asset: keyhog-macos-x86_64
            install: ''
            features: '--no-default-features --features portable'
          # Windows MSVC: same portable subset. Hyperscan is not
          # shipped on Windows, and daemon IPC is Unix-socket-only
          # (already gated with #[cfg(unix)]), so the portable
          # surface compiles natively here.
          - os: windows-latest
            asset: keyhog-windows-x86_64.exe
            install: ''
            features: '--no-default-features --features portable'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Building release assets for $tag"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install build deps
        if: matrix.install != ''
        shell: bash
        run: ${{ matrix.install }}

      # CUDA toolkit (link-time only). The runtime libcuda.so requirement
      # is checked by install.sh on the user's machine, not on the GH
      # runner. Pinning 12.6 because that's what vyre-driver-cuda's
      # `cuda` feature is tested against.
      - name: Install CUDA toolkit
        if: matrix.cuda_toolkit == true
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.6.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "nvrtc", "nvrtc-dev"]'

      - name: Build keyhog
        shell: bash
        run: cargo build --release -p keyhog ${{ matrix.features }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          # cargo writes `keyhog.exe` on Windows hosts; `keyhog`
          # elsewhere. Either source is fine; the destination name
          # comes from matrix.asset (already carries .exe on Windows).
          if [[ -f target/release/keyhog.exe ]]; then
            cp target/release/keyhog.exe "${{ matrix.asset }}"
          else
            cp target/release/keyhog "${{ matrix.asset }}"
          fi
          # Per-asset SHA256 checksum. install.sh verifies this when
          # downloading the binary so a partial transfer / tampered
          # mirror / corrupted CDN cache surfaces loudly instead of
          # silently installing garbage. Portable across the three
          # runner OSes: ubuntu has sha256sum, macOS has shasum, Git
          # Bash on Windows ships sha256sum via msys2.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            echo "ERROR: no sha256 tool found on $(uname -s)" >&2
            exit 1
          fi
          cat "${{ matrix.asset }}.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # Create the release if it doesn't already exist; `|| true`
          # silently no-ops the create when the tag-trigger has already
          # produced a draft release.
          # Two matrix jobs (linux + macos) race here. If both see "release
          # does not exist" they BOTH call `gh release create`; the second
          # one fails with "already_exists" and the shell aborts on
          # `set -euo pipefail`, dropping the upload for that matrix arm.
          # The trailing `|| true` on the create swallows the "second to
          # try wins" no-op so both arms reach the upload step.
          gh release view "${{ steps.tag.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "${{ steps.tag.outputs.tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "${{ steps.tag.outputs.tag }}" \
              --notes "Prebuilt keyhog binaries for ${{ steps.tag.outputs.tag }}. See CHANGELOG.md." || true
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "${{ matrix.asset }}" \
            "${{ matrix.asset }}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
