name: Release

# Tag-driven binary build + upload. Push a `v*` tag and this workflow
# compiles `keyhog` for each supported target and attaches the binary
# to the existing draft/published GitHub Release for that tag.
#
# Downstream consumers of the `.github/actions/keyhog/action.yml`
# composite action look for these binaries first and only fall back to
# a source build when an asset is missing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build assets for (e.g. v0.5.7). Manual re-run.'
        required: true

env:
  CC: ""

jobs:
  build:
    name: Build ${{ matrix.asset }}
    # Per-job permissions: see keyhog.yml header note. Top-level
    # `permissions:` rejected at dispatch time on this repo.
    permissions:
      contents: write  # required by gh release upload to attach assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: keyhog-linux-x86_64
            # libhyperscan-dev is what the `simd` feature links against
            # on Linux. Ship a default-feature build matching the
            # crates.io release. This is the fallback when the host
            # has no NVIDIA GPU / no libcuda.so: WGPU still drives any
            # compatible adapter, SIMD covers the CPU path.
            install: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
            features: ''
            cuda_toolkit: false
          # CUDA-enabled Linux build. install.sh prefers this asset
          # when nvidia-smi + libcuda.so are both present at install
          # time, since the CUDA backend is meaningfully faster than
          # the WGPU fallback on large (>=256 MiB) scans. Requires
          # libcuda.so at RUNTIME (which is what we detect for); the
          # CUDA toolkit is only needed at LINK time, which we
          # provision here on the GH runner via the official action.
          - os: ubuntu-latest
            asset: keyhog-linux-x86_64-cuda
            install: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
            features: '--features cuda'
            cuda_toolkit: true
          # macOS: no `libhyperscan-dev` in the homebrew repo, so the
          # default `cargo build` fails on the simd feature. We ship a
          # feature-subset binary (no Hyperscan) for now. The `portable`
          # alias in `crates/cli/Cargo.toml` enables every keyhog-scanner
          # data feature plus every git/web/github/s3/docker/verify
          # source backend, just without the Hyperscan / Ghidra / CUDA
          # system-lib paths. Users who need the Hyperscan-accelerated
          # path on macOS still source-build via the action's fallback.
          - os: macos-latest
            asset: keyhog-macos-aarch64
            install: ''
            features: '--no-default-features --features portable'
          # macOS x86_64 (Intel): same feature subset as Apple Silicon.
          # macos-15-intel is GitHub's supported x86_64 runner after the
          # macos-13 retirement (2026-04). actionlint flags `macos-13`
          # as an unknown label and the matrix arm silently fails to
          # dispatch, which loses the Intel-mac asset on every tag push.
          - os: macos-15-intel
            asset: keyhog-macos-x86_64
            install: ''
            features: '--no-default-features --features portable'
          # Windows MSVC: same portable subset. Hyperscan is not
          # shipped on Windows, and daemon IPC is Unix-socket-only
          # (already gated with #[cfg(unix)]), so the portable
          # surface compiles natively here.
          - os: windows-latest
            asset: keyhog-windows-x86_64.exe
            install: ''
            features: '--no-default-features --features portable'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          KEYHOG_RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYHOG_RELEASE_INPUT_TAG:-}" ]]; then
            tag="$KEYHOG_RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          case "$tag" in
            v[0-9]*) ;;
            *)
              echo "::error title=KeyHog::Release tag must start with v followed by a digit."
              exit 2
              ;;
          esac
          case "$tag" in
            *[!A-Za-z0-9._-]*)
              echo "::error title=KeyHog::Release tag contains an invalid character."
              exit 2
              ;;
          esac
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          echo "Building release assets for $tag"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install build deps
        if: matrix.install != ''
        shell: bash
        run: ${{ matrix.install }}

      # CUDA toolkit (link-time only). The runtime libcuda.so requirement
      # is checked by install.sh on the user's machine, not on the GH
      # runner. Pinning 12.6 because that's what vyre-driver-cuda's
      # `cuda` feature is tested against.
      - name: Install CUDA toolkit
        if: matrix.cuda_toolkit == true
        uses: Jimver/cuda-toolkit@4bd727d5619dc6fa323b1e76c3aa5dca94f5ec6d # v0.2.19
        with:
          cuda: '12.6.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "nvrtc", "nvrtc-dev"]'

      - name: Build keyhog
        shell: bash
        run: cargo build --release -p keyhog ${{ matrix.features }}

      - name: Build GPU literal artifacts
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="${{ matrix.asset }}.gpu-literals"
          rm -rf "$bundle_dir" "$bundle_dir.tar.gz"
          cargo run --release \
            -p keyhog-scanner \
            --bin keyhog-scanner-artifacts \
            --no-default-features \
            --features ml,entropy,decode,multiline \
            -- \
            --out-dir "$bundle_dir"
          tar -czf "$bundle_dir.tar.gz" "$bundle_dir"

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          # cargo writes `keyhog.exe` on Windows hosts; `keyhog`
          # elsewhere. Either source is fine; the destination name
          # comes from matrix.asset (already carries .exe on Windows).
          if [[ -f target/release/keyhog.exe ]]; then
            cp target/release/keyhog.exe "${{ matrix.asset }}"
          else
            cp target/release/keyhog "${{ matrix.asset }}"
          fi
          # Per-asset SHA256 checksums. install.sh verifies the binary checksum
          # today; the shipped GPU literal sidecar is checksummed and signed now
          # so installer/runtime consumption can fail closed instead of trusting
          # a detached blob once the runtime loader lands.
          assets=(
            "${{ matrix.asset }}"
            "${{ matrix.asset }}.gpu-literals.tar.gz"
          )
          # Portable across the three runner OSes: ubuntu has sha256sum,
          # macOS has shasum, Git Bash on Windows ships sha256sum via msys2.
          for asset in "${assets[@]}"; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$asset" > "$asset.sha256"
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$asset" > "$asset.sha256"
            else
              echo "ERROR: no sha256 tool found on $(uname -s)" >&2
              exit 1
            fi
            cat "$asset.sha256"
          done

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          KEYHOG_RELEASE_ASSET: ${{ matrix.asset }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$KEYHOG_RELEASE_TAG"
          asset="$KEYHOG_RELEASE_ASSET"
          # Two matrix jobs can race on release creation. If create loses that
          # race, prove the release now exists; any other failure stays fatal.
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if ! gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes "Prebuilt keyhog binaries for $tag. See CHANGELOG.md."; then
              gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null
            fi
          fi
          gh release upload "$tag" \
            "$asset" \
            "$asset.sha256" \
            "$asset.gpu-literals.tar.gz" \
            "$asset.gpu-literals.tar.gz.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  # Sign every uploaded binary/sidecar with the keyhog minisign secret key. Runs once
  # on a single runner after all build arms finish, so the signing secret is
  # exposed to exactly one job. `keyhog update` verifies these `.minisig`
  # files against the embedded public key (installer::RELEASE_PUBLIC_KEY)
  # before self-replacing.
  sign:
    name: Sign release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release upload to attach the .minisig files
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          KEYHOG_RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYHOG_RELEASE_INPUT_TAG:-}" ]]; then
            tag="$KEYHOG_RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          case "$tag" in
            v[0-9]*) ;;
            *)
              echo "::error title=KeyHog::Release tag must start with v followed by a digit."
              exit 2
              ;;
          esac
          case "$tag" in
            *[!A-Za-z0-9._-]*)
              echo "::error title=KeyHog::Release tag contains an invalid character."
              exit 2
              ;;
          esac
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install rsign2
        shell: bash
        run: cargo install rsign2 --version 0.6.6 --locked

      - name: Sign release assets and upload signatures
        env:
          GH_TOKEN: ${{ github.token }}
          KEYHOG_MINISIGN_SECRET_KEY: ${{ secrets.KEYHOG_MINISIGN_SECRET_KEY }}
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${KEYHOG_MINISIGN_SECRET_KEY:-}" ]]; then
            echo "ERROR: KEYHOG_MINISIGN_SECRET_KEY secret is not configured; cannot sign." >&2
            echo "Set it with: gh secret set KEYHOG_MINISIGN_SECRET_KEY --repo $GITHUB_REPOSITORY" >&2
            exit 1
          fi
          tag="$KEYHOG_RELEASE_TAG"
          workdir="$(mktemp -d)"
          cd "$workdir"
          # Pull the just-uploaded binaries (and their .sha256 siblings).
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern 'keyhog-*' --dir .
          # The stored secret is base64 of the minisign .key file.
          printf '%s' "$KEYHOG_MINISIGN_SECRET_KEY" | base64 -d > sec.key
          trap 'shred -u sec.key 2>/dev/null || rm -f sec.key' EXIT
          shopt -s nullglob
          for f in keyhog-*; do
            case "$f" in
              *.sha256|*.minisig) continue ;;
            esac
            rsign sign -W -s sec.key -x "$f.minisig" "$f" </dev/null
            gh release upload "$tag" "$f.minisig" --repo "$GITHUB_REPOSITORY" --clobber
            echo "signed + uploaded $f.minisig"
          done

  # Publish the container image to GHCR so `docker run ghcr.io/santhsecurity/
  # keyhog:<ver>` (and `:latest`) works - the third consumption mode alongside
  # the prebuilt binary and `cargo install`. Standalone (not in any `needs`):
  # a registry hiccup must not block the binary release. Builds from the
  # repo Dockerfile (multi-stage, non-root runtime, embedded detector corpus).
  docker:
    name: Publish container image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          KEYHOG_RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYHOG_RELEASE_INPUT_TAG:-}" ]]; then
            tag="$KEYHOG_RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          case "$tag" in
            v[0-9]*) ;;
            *)
              echo "::error title=KeyHog::Release tag must start with v followed by a digit."
              exit 2
              ;;
          esac
          case "$tag" in
            *[!A-Za-z0-9._-]*)
              echo "::error title=KeyHog::Release tag contains an invalid character."
              exit 2
              ;;
          esac
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${tag#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Move the floating major tag (e.g. `v0`) to this release so adopters can
  # pin `uses: santhsecurity/keyhog/.github/actions/keyhog@v0` and always get
  # the latest release without editing their workflow - and our own docs stop
  # drifting to dead exact tags (the @v0.5.36 incident). Lightweight tag, force
  # -moved each release. Standalone so a tag-push failure never blocks assets.
  major-tag:
    name: Update floating major tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          KEYHOG_RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYHOG_RELEASE_INPUT_TAG:-}" ]]; then
            tag="$KEYHOG_RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          case "$tag" in
            v[0-9]*) ;;
            *)
              echo "::error title=KeyHog::Release tag must start with v followed by a digit."
              exit 2
              ;;
          esac
          case "$tag" in
            *[!A-Za-z0-9._-]*)
              echo "::error title=KeyHog::Release tag contains an invalid character."
              exit 2
              ;;
          esac
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0
      - name: Force-move v<major> to this release
        shell: bash
        env:
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          tag="$KEYHOG_RELEASE_TAG"
          major="${tag%%.*}"   # v0.5.35 -> v0
          git tag -f "$major" "${tag}^{}"
          git push -f origin "refs/tags/$major"
          echo "moved $major -> $tag"
