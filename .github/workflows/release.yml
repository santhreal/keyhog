name: Release

# Tag-driven binary build + upload. Push a `v*` tag and this workflow
# compiles `keyhog` for each supported target and attaches the binary
# to the existing draft/published GitHub Release for that tag.
#
# Downstream consumers of the `.github/actions/keyhog/action.yml`
# composite action look for these binaries first and only fall back to
# a source build when an asset is missing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build assets for (e.g. v0.5.7). Manual re-run.'
        required: true

env:
  CC: ""
  # Survive intermittent mid-stream crates.io download drops on hosted runners
  # (curl [55] SSL_ERROR_SYSCALL); cargo's default of 3 retries is not enough.
  CARGO_NET_RETRY: "10"

jobs:
  build:
    name: Build ${{ matrix.asset }}
    # Per-job permissions: see keyhog.yml header note. Top-level
    # `permissions:` rejected at dispatch time on this repo.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: keyhog-linux-x86_64
            # libhyperscan-dev is what the `simd` feature links against
            # on Linux. Ship a default-feature build matching the
            # crates.io release. The one Linux artifact probes CUDA and WGPU at
            # runtime; SIMD remains the CPU candidate on every host.
            install: sudo apt-get update -qq && sudo apt-get install -y libhyperscan-dev pkg-config
            features: ''
            artifact_features: 'ml,entropy,decode,multiline,simdsieve,simd'
          # macOS: no `libhyperscan-dev` in the homebrew repo, so the
          # default `cargo build` fails on the simd feature. We ship a
          # feature-subset binary (no Hyperscan) for now. The `portable`
          # alias in `crates/cli/Cargo.toml` enables every keyhog-scanner
          # data feature plus every git/web/github/s3/docker/verify
          # source backend, just without the Hyperscan / Ghidra / CUDA
          # system-lib paths. Users who need the Hyperscan-accelerated
          # path on macOS still source-build via the action's fallback.
          - os: macos-latest
            asset: keyhog-macos-aarch64
            install: ''
            features: '--no-default-features --features portable'
            artifact_features: 'ml,entropy,decode,multiline'
          # macOS x86_64 (Intel): same feature subset as Apple Silicon.
          # macos-15-intel is GitHub's supported x86_64 runner after the
          # macos-13 retirement (2026-04). actionlint flags `macos-13`
          # as an unknown label and the matrix arm silently fails to
          # dispatch, which loses the Intel-mac asset on every tag push.
          - os: macos-15-intel
            asset: keyhog-macos-x86_64
            install: ''
            features: '--no-default-features --features portable'
            artifact_features: 'ml,entropy,decode,multiline'
          # Windows MSVC: same portable subset. Hyperscan is not
          # shipped on Windows, and daemon IPC is Unix-socket-only
          # (already gated with #[cfg(unix)]), so the portable
          # surface compiles natively here.
          - os: windows-latest
            asset: keyhog-windows-x86_64.exe
            install: ''
            features: '--no-default-features --features portable'
            artifact_features: 'ml,entropy,decode,multiline'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          KEYHOG_RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYHOG_RELEASE_INPUT_TAG:-}" ]]; then
            tag="$KEYHOG_RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error title=KeyHog::Release tag must be exact semver (vMAJOR.MINOR.PATCH with an optional prerelease suffix)."
            exit 2
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          echo "Building release assets for $tag"

      - name: Prove the release ref is a tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          ref="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$KEYHOG_RELEASE_TAG" --jq '.ref')"
          if [[ "$ref" != "refs/tags/$KEYHOG_RELEASE_TAG" ]]; then
            echo "ERROR: release input does not resolve to the exact tag refs/tags/$KEYHOG_RELEASE_TAG" >&2
            exit 2
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned action
        with:
          toolchain: '1.89'
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install build deps
        if: matrix.install != ''
        shell: bash
        run: ${{ matrix.install }}

      - name: Build keyhog
        shell: bash
        run: cargo build --locked --release -p keyhog ${{ matrix.features }}

      - name: Build GPU literal artifacts
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="${{ matrix.asset }}.gpu-literals"
          rm -rf "$bundle_dir" "$bundle_dir.tar.gz"
          cargo run --locked --release \
            -p keyhog-scanner \
            --bin keyhog-scanner-artifacts \
            --no-default-features \
            --features "${{ matrix.artifact_features }}" \
            -- \
            --out-dir "$bundle_dir"
          tar -czf "$bundle_dir.tar.gz" "$bundle_dir"

      - name: Stage binary
        env:
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          # cargo writes `keyhog.exe` on Windows hosts; `keyhog`
          # elsewhere. Either source is fine; the destination name
          # comes from matrix.asset (already carries .exe on Windows).
          if [[ -f target/release/keyhog.exe ]]; then
            cp target/release/keyhog.exe "${{ matrix.asset }}"
          else
            cp target/release/keyhog "${{ matrix.asset }}"
          fi
          reported="$("./${{ matrix.asset }}" --version)"
          expected="KeyHog ${KEYHOG_RELEASE_TAG}"
          if [[ "$reported" != *"$expected"* ]]; then
            echo "ERROR: staged binary version does not match release tag: expected '$expected', got '$reported'" >&2
            exit 1
          fi
          # Per-asset SHA256 checksums. install.sh verifies the binary checksum
          # and the Rust update/repair path verify both payload checksums and
          # signatures before installing the binary and seeding the scanner cache.
          assets=(
            "${{ matrix.asset }}"
            "${{ matrix.asset }}.gpu-literals.tar.gz"
          )
          # Portable across the three runner OSes: ubuntu has sha256sum,
          # macOS has shasum, Git Bash on Windows ships sha256sum via msys2.
          for asset in "${assets[@]}"; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$asset" > "$asset.sha256"
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$asset" > "$asset.sha256"
            else
              echo "ERROR: no sha256 tool found on $(uname -s)" >&2
              exit 1
            fi
            cat "$asset.sha256"
          done

      - name: Stage unsigned release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unsigned-${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
            ${{ matrix.asset }}.gpu-literals.tar.gz
            ${{ matrix.asset }}.gpu-literals.tar.gz.sha256

  # Sign every staged binary/sidecar with the keyhog minisign secret key. Runs once
  # on a single runner after all build arms finish, so the signing secret is
  # exposed to exactly one job. `keyhog update` verifies these `.minisig`
  # files against the embedded public key (installer::RELEASE_PUBLIC_KEY)
  # before self-replacing.
  sign:
    name: Sign release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # publish the complete signed draft manifest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          KEYHOG_RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYHOG_RELEASE_INPUT_TAG:-}" ]]; then
            tag="$KEYHOG_RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error title=KeyHog::Release tag must be exact semver (vMAJOR.MINOR.PATCH with an optional prerelease suffix)."
            exit 2
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned action
        with:
          toolchain: '1.89'
      - name: Download staged release bundles
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: unsigned-*
          path: dist
          merge-multiple: true
      - name: Install rsign2
        shell: bash
        run: cargo install rsign2 --version 0.6.6 --locked

      - name: Sign, validate, and publish the exact release manifest
        env:
          GH_TOKEN: ${{ github.token }}
          KEYHOG_MINISIGN_SECRET_KEY: ${{ secrets.KEYHOG_MINISIGN_SECRET_KEY }}
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${KEYHOG_MINISIGN_SECRET_KEY:-}" ]]; then
            echo "ERROR: KEYHOG_MINISIGN_SECRET_KEY secret is not configured; cannot sign." >&2
            echo "Set it with: gh secret set KEYHOG_MINISIGN_SECRET_KEY --repo $GITHUB_REPOSITORY" >&2
            exit 1
          fi
          tag="$KEYHOG_RELEASE_TAG"
          workdir="$(mktemp -d)"
          cp -a "$GITHUB_WORKSPACE/dist/." "$workdir/"
          cd "$workdir"
          bases=(
            keyhog-linux-x86_64
            keyhog-macos-aarch64
            keyhog-macos-x86_64
            keyhog-windows-x86_64.exe
          )
          expected=()
          payloads=()
          for base in "${bases[@]}"; do
            payloads+=("$base" "$base.gpu-literals.tar.gz")
            expected+=(
              "$base" "$base.sha256"
              "$base.gpu-literals.tar.gz" "$base.gpu-literals.tar.gz.sha256"
            )
          done
          for asset in "${expected[@]}"; do
            if [[ ! -f "$asset" ]]; then
              echo "ERROR: staged release manifest is missing $asset" >&2
              exit 1
            fi
          done
          # The stored secret is base64 of the minisign .key file.
          printf '%s' "$KEYHOG_MINISIGN_SECRET_KEY" | base64 -d > sec.key
          trap 'shred -u sec.key 2>/dev/null || rm -f sec.key' EXIT
          for f in "${payloads[@]}"; do
            rsign sign -W -s sec.key -x "$f.minisig" "$f" </dev/null
            echo "signed $f.minisig"
          done

          # Every release stays private while its asset set is mutated. This
          # includes reruns: leaving an existing release published while assets
          # are deleted/replaced exposes a transient partial or mixed manifest.
          created_draft=false
          republish=false
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # A draft left by an interrupted publication must also become
            # public once this run proves the complete signed manifest.
            republish=true
            is_draft="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" != true ]]; then
              gh release edit "$tag" --draft=true --repo "$GITHUB_REPOSITORY"
            fi
          else
            create_args=(--draft --title "$tag" \
              --notes "Prebuilt keyhog binaries for $tag. See CHANGELOG.md.")
            if [[ "$tag" == *-* ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "$tag" "${create_args[@]}" --repo "$GITHUB_REPOSITORY"
            created_draft=true
          fi

          mapfile -t published < <(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/releases/tags/$tag" \
            --jq '.assets[].name')
          final=("${expected[@]}")
          for payload in "${payloads[@]}"; do
            final+=("$payload.minisig")
          done
          for asset in "${published[@]}"; do
            keep=false
            for wanted in "${final[@]}"; do
              if [[ "$asset" == "$wanted" ]]; then
                keep=true
                break
              fi
            done
            if [[ "$asset" == keyhog-* && "$keep" == false ]]; then
              gh release delete-asset "$tag" "$asset" \
                --repo "$GITHUB_REPOSITORY" --yes
            fi
          done
          gh release upload "$tag" "${final[@]}" \
            --repo "$GITHUB_REPOSITORY" --clobber

          mapfile -t actual < <(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/releases/tags/$tag" \
            --jq '.assets[].name' | sort)
          mapfile -t wanted < <(printf '%s\n' "${final[@]}" | sort)
          if [[ "${actual[*]}" != "${wanted[*]}" ]]; then
            echo "ERROR: published release manifest does not equal the signed expected manifest" >&2
            printf 'expected: %s\n' "${wanted[*]}" >&2
            printf 'actual:   %s\n' "${actual[*]}" >&2
            exit 1
          fi
          if [[ "$created_draft" == true || "$republish" == true ]]; then
            gh release edit "$tag" --draft=false --repo "$GITHUB_REPOSITORY"
          fi

  # Publish the container image to GHCR so `docker run ghcr.io/santhsecurity/
  # keyhog:<ver>` (and `:latest`) works - the third consumption mode alongside
  # the prebuilt binary and `cargo install`. Standalone (not in any `needs`):
  # a registry hiccup must not block the binary release. Builds from the
  # repo Dockerfile (multi-stage, non-root runtime, embedded detector corpus).
  docker:
    name: Publish container image (GHCR)
    # Gate on the build: the container bundles the release binaries, so it must
    # not publish before those artifacts exist (a race that could ship an empty
    # or stale image on a parallel-job run).
    needs: sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          KEYHOG_RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYHOG_RELEASE_INPUT_TAG:-}" ]]; then
            tag="$KEYHOG_RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error title=KeyHog::Release tag must be exact semver (vMAJOR.MINOR.PATCH with an optional prerelease suffix)."
            exit 2
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${tag#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.tag }}
          fetch-depth: 0
      - name: Decide whether this is the newest stable release
        id: floating
        shell: bash
        env:
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          tag="$KEYHOG_RELEASE_TAG"
          advance=false
          if [[ "$tag" != *-* ]]; then
            git fetch --force --tags origin
            newest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -n 1)"
            if [[ "$tag" == "$newest" ]]; then
              advance=true
            fi
          fi
          echo "advance=$advance" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Advance latest image for the newest stable release
        if: steps.floating.outputs.advance == 'true'
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/${{ github.repository }}:latest" \
            "ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}"

  # Move the floating major tag (e.g. `v0`) to this release so adopters can
  # pin `uses: santhsecurity/keyhog/.github/actions/keyhog@v0` and always get
  # the latest release without editing their workflow - and our own docs stop
  # drifting to dead exact tags (the @v0.5.36 incident). Lightweight tag, force
  # -moved each release. Standalone so a tag-push failure never blocks assets.
  major-tag:
    name: Update floating major tag
    # Gate on the build: the floating major tag (e.g. `v1`) must not move to a
    # release ref until that release has actually built, so consumers pinning
    # `@v1` never resolve to a half-published or failed build.
    needs: sign
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          KEYHOG_RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYHOG_RELEASE_INPUT_TAG:-}" ]]; then
            tag="$KEYHOG_RELEASE_INPUT_TAG"
          else
            tag="${GITHUB_REF##refs/tags/}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error title=KeyHog::Release tag must be exact semver (vMAJOR.MINOR.PATCH with an optional prerelease suffix)."
            exit 2
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.tag }}
          fetch-depth: 0
      - name: Decide whether this is the newest stable release
        id: floating
        shell: bash
        env:
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          tag="$KEYHOG_RELEASE_TAG"
          advance=false
          if [[ "$tag" != *-* ]]; then
            git fetch --force --tags origin
            newest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -n 1)"
            if [[ "$tag" == "$newest" ]]; then
              advance=true
            fi
          fi
          echo "advance=$advance" >> "$GITHUB_OUTPUT"
      - name: Force-move v<major> to this release
        if: steps.floating.outputs.advance == 'true'
        shell: bash
        env:
          KEYHOG_RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          tag="$KEYHOG_RELEASE_TAG"
          major="${tag%%.*}"   # v0.5.35 -> v0
          git tag -f "$major" "${tag}^{}"
          git push -f origin "refs/tags/$major"
          echo "moved $major -> $tag"
