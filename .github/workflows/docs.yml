name: docs

# Build the mdBook docs site and deploy to GitHub Pages.
#
# Runs on push to main (live updates) and on PR (build-check only,
# no deploy). The deploy step is gated on a successful build AND
# the push-to-main trigger, so PR runs never publish.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Don't queue parallel deploys -- the latest push wins.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    # Per-job permissions: this repo rejects dispatch of any workflow that
    # declares a TOP-LEVEL `permissions:` block (1-3s exit, 0 jobs -- see
    # health-check.yml / keyhog.yml). Per-job is equivalent and dispatch-safe.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mdBook
        run: |
          mkdir -p $HOME/.local/bin
          # Pin to v0.5.2 (matches local build environment). Update by
          # bumping the version string in two places below.
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/mdbook --version

      - name: Test and build site
        run: |
          cd docs
          mdbook test
          mdbook build
          # mdbook emits to docs/book/. Move CNAME / .nojekyll if present.
          [ -f CNAME ] && cp CNAME book/CNAME || true
          touch book/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/book

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    # Pages deploy needs write + OIDC; scoped to this job only (top-level
    # permissions is rejected at dispatch on this repo, which is why the
    # docs site stopped publishing).
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
