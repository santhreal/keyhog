name: docs

# Build the mdBook docs site and deploy to GitHub Pages.
#
# Runs on push to main (live updates) and on PR (build-check only,
# no deploy). The deploy step is gated on a successful build AND
# the push-to-main trigger, so PR runs never publish.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Tokens for the deploy job. Pages deploys need write access to the
# Pages-managed branch + an OIDC token; we scope tightly so a malicious
# docs PR cannot escalate.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue parallel deploys -- the latest push wins.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p $HOME/.local/bin
          # Pin to v0.5.2 (matches local build environment). Update by
          # bumping the version string in two places below.
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/mdbook --version

      - name: Build site
        run: |
          cd docs
          mdbook build
          # mdbook emits to docs/book/. Move CNAME / .nojekyll if present.
          [ -f CNAME ] && cp CNAME book/CNAME || true
          touch book/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
