name: differential-bench

# Differential precision / recall / speed gate: run the unified benchmark
# package (benchmarks/bench) over the synthetic mirror corpus with keyhog plus
# required competitors, then assert keyhog leads on F1. `bench gate` exits
# non-zero unless BetterLeaks and Kingfisher both produce usable rows and
# keyhog's F1 is STRICTLY better.
#
# This replaces the retired tools/diff_bench runner: the bench package's
# scanner adapters + canonical scorer + `gate` subcommand are the single
# source of differential truth. The corpus is generated at runtime (gitignored,
# never committed) so no literal credential lands in a tracked file or trips
# GitHub push-protection. See benchmarks/README.md.

on:
  schedule:
    # 03:11 UTC nightly, staggered off the hour to avoid the queue
    # spike for actions/runner-images cache.
    - cron: "11 3 * * *"
  workflow_dispatch:
    inputs:
      positives:
        description: "Labeled positive fixtures (smaller = smoke)."
        required: false
        default: "3000"
      negatives:
        description: "Labeled negative fixtures."
        required: false
        default: "12000"

env:
  # Survive intermittent mid-stream crates.io download drops on hosted runners
  # (curl [55] SSL_ERROR_SYSCALL); cargo's default of 3 retries is not enough.
  CARGO_NET_RETRY: "10"

jobs:
  gate:
    name: keyhog vs required competitors (F1 gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Per-job permissions, see keyhog.yml header note. Top-level
    # `permissions:` rejected at dispatch time on this repo.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: install vectorscan runtime
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libhyperscan5 || \
            sudo apt-get install -y --no-install-recommends libhyperscan-dev

      - name: install keyhog (release binary)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          # Track the latest release rather than pinning a version 
          # the bench is intentionally measuring "current production
          # keyhog" not a specific tag.
          tag=$(curl -fsSL https://api.github.com/repos/santhsecurity/keyhog/releases/latest | \
                python3 -c 'import json,sys;print(json.load(sys.stdin)["tag_name"])')
          echo "using keyhog $tag"
          asset="keyhog-linux-x86_64"
          url="https://github.com/santhsecurity/keyhog/releases/download/${tag}/${asset}"
          curl --proto '=https' --tlsv1.2 --retry 5 --retry-connrefused \
               --location --silent --show-error --fail \
               -o "$RUNNER_TEMP/$asset" "$url"
          curl --proto '=https' --tlsv1.2 --retry 5 --retry-connrefused \
               --location --silent --show-error --fail \
               -o "$RUNNER_TEMP/$asset.sha256" "$url.sha256"
          (cd "$RUNNER_TEMP" && sha256sum -c "$asset.sha256")
          install -m 0755 "$RUNNER_TEMP/$asset" "$HOME/.local/bin/keyhog"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: install trufflehog
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"

      - name: install required competitors
        run: |
          set -euo pipefail
          go install github.com/betterleaks/betterleaks@latest
          cargo install --locked --git https://github.com/mongodb/kingfisher kingfisher
          cp "$HOME/go/bin/betterleaks" "$HOME/.local/bin/betterleaks"
          cp "$HOME/.cargo/bin/kingfisher" "$HOME/.local/bin/kingfisher"

      - name: scanner versions
        run: |
          set -euo pipefail
          keyhog --version
          betterleaks --version
          kingfisher --version
          trufflehog --version

      - name: keyhog smoke check (broken binary != F1 regression)
        # A broken install / unsatisfied libhyperscan runtime makes `keyhog scan`
        # find nothing, which the downstream gate would misreport as
        # "keyhog F1 0.0000 regressed below baseline". Catch it here with a
        # distinct, actionable signal so an infra failure is never confused with
        # a recall regression. ldd output aids diagnosis of the lib state.
        run: |
          set -euo pipefail
          echo "ldd $(command -v keyhog):"
          ldd "$(command -v keyhog)" 2>&1 || true
          tmp="$(mktemp -d)"
          printf 'aws = "AKIAJP3GG7XYRIBQXOLA"\nstripe = "sk_live_4eC39HqLyjWDarjtT1zdp7dc"\n' > "$tmp/smoke.txt"
          report="$tmp/smoke.json"
          stdout_log="$tmp/smoke.stdout"
          stderr_log="$tmp/smoke.stderr"
          set +e
          keyhog scan "$tmp/smoke.txt" --no-suppress-test-fixtures --format json --output "$report" >"$stdout_log" 2>"$stderr_log"
          rc=$?
          set -e
          case "$rc" in
            1 | 10) ;;
            *)
              echo "::error::keyhog smoke scan exited $rc; expected findings exit 1 or live-credential exit 10."
              sed -n '1,80p' "$stderr_log"
              exit 1
              ;;
          esac
          n="$(python3 - "$report" <<'PY'
          import json
          import pathlib
          import sys

          report = pathlib.Path(sys.argv[1])
          data = json.loads(report.read_text())
          if isinstance(data, list):
              findings = data
          elif isinstance(data, dict):
              findings = data.get("findings", [])
          else:
              raise SystemExit(f"unexpected JSON root {type(data).__name__}")
          print(len(findings))
          PY
          )"
          echo "smoke findings: $n"
          if [ "${n:-0}" -lt 1 ]; then
            echo "::error::keyhog smoke check found 0 secrets in a known-positive fixture. The installed binary is broken (libhyperscan/runtime), NOT a recall regression. Failing before the differential gate so the F1=0.0 result is not misread as a regression."
            exit 1
          fi

      - name: generate mirror corpus
        env:
          POSITIVES: ${{ inputs.positives || '3000' }}
          NEGATIVES: ${{ inputs.negatives || '12000' }}
        run: |
          set -euo pipefail
          cd benchmarks && python3 -m bench.corpora.mirror --ensure \
            --positives "$POSITIVES" --negatives "$NEGATIVES" --seed 0

      - name: run leaderboard (keyhog + required competitors)
        # Scanner adapters resolve binaries from PATH.
        run: |
          set -euo pipefail
          cd benchmarks && python3 -m bench leaderboard \
            --corpus mirror --scanners keyhog,betterleaks,kingfisher --out results

      - name: differential + regression gate (keyhog must lead and not regress)
        # Fails red if a competitor overtakes keyhog on F1 OR keyhog's F1 drops
        # more than --epsilon below the committed baseline anchor.
        run: |
          set -euo pipefail
          cd benchmarks && python3 -m bench gate \
            --corpus mirror --results results \
            --require-competitors betterleaks,kingfisher \
            --baseline baselines/mirror-keyhog-baseline.json --epsilon 0.005

      - name: upload results artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: differential-results
          path: benchmarks/results/**
          if-no-files-found: error
