name: differential-bench

# Differential precision / recall / speed gate: run the unified benchmark
# package (benchmarks/bench) over the synthetic mirror corpus with keyhog +
# trufflehog, then assert keyhog leads on F1. `bench gate` exits non-zero
# unless keyhog's F1 is STRICTLY better than every available competitor's, so
# a regression turns this workflow red and lights the badge in README.
#
# This replaces the retired tools/diff_bench runner: the bench package's
# scanner adapters + canonical scorer + `gate` subcommand are the single
# source of differential truth. The corpus is generated at runtime (gitignored,
# never committed) so no literal credential lands in a tracked file or trips
# GitHub push-protection. See benchmarks/README.md.

on:
  schedule:
    # 03:11 UTC nightly — staggered off the hour to avoid the queue
    # spike for actions/runner-images cache.
    - cron: "11 3 * * *"
  workflow_dispatch:
    inputs:
      positives:
        description: "Labeled positive fixtures (smaller = smoke)."
        required: false
        default: "3000"
      negatives:
        description: "Labeled negative fixtures."
        required: false
        default: "12000"

jobs:
  gate:
    name: keyhog vs trufflehog (F1 gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Per-job permissions — see keyhog.yml header note. Top-level
    # `permissions:` rejected at dispatch time on this repo.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: install vectorscan runtime
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libhyperscan5 || \
            sudo apt-get install -y --no-install-recommends libhyperscan-dev

      - name: install keyhog (release binary)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          # Track the latest release rather than pinning a version —
          # the bench is intentionally measuring "current production
          # keyhog" not a specific tag.
          tag=$(curl -fsSL https://api.github.com/repos/santhsecurity/keyhog/releases/latest | \
                python3 -c 'import json,sys;print(json.load(sys.stdin)["tag_name"])')
          echo "using keyhog $tag"
          curl --proto '=https' --tlsv1.2 --retry 5 --retry-connrefused \
               --location --silent --show-error --fail \
               -o "$HOME/.local/bin/keyhog" \
               "https://github.com/santhsecurity/keyhog/releases/download/${tag}/keyhog-linux-x86_64"
          chmod +x "$HOME/.local/bin/keyhog"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: install trufflehog
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"

      - name: scanner versions
        run: |
          set +e
          keyhog --version
          trufflehog --version || true

      - name: generate mirror corpus
        env:
          POSITIVES: ${{ inputs.positives || '3000' }}
          NEGATIVES: ${{ inputs.negatives || '12000' }}
        run: |
          set -euo pipefail
          cd benchmarks && python3 -m bench.corpora.mirror --ensure \
            --positives "$POSITIVES" --negatives "$NEGATIVES" --seed 0

      - name: run leaderboard (keyhog + trufflehog)
        # keyhog + trufflehog are both on $HOME/.local/bin (added to
        # $GITHUB_PATH above); the scanner adapters resolve them from PATH.
        run: |
          set -euo pipefail
          cd benchmarks && python3 -m bench leaderboard \
            --corpus mirror --scanners keyhog,trufflehog --out results

      - name: differential + regression gate (keyhog must lead and not regress)
        # Fails red if a competitor overtakes keyhog on F1 OR keyhog's F1 drops
        # more than --epsilon below the committed baseline anchor.
        run: |
          set -euo pipefail
          cd benchmarks && python3 -m bench gate \
            --corpus mirror --results results \
            --baseline baselines/mirror-keyhog-baseline.json --epsilon 0.005

      - name: upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: differential-results
          path: benchmarks/results/**
          if-no-files-found: error
