# Docs: https://developers.miro.com/docs/rest-api-reference-guide
# Format: Bearer token - typically a long alphanumeric string
# Verify: GET /v2/boards with Bearer token
# Prefix: none (standard OAuth2 bearer token)

[detector]
id = "miro-api-token"
name = "Miro API Access Token"
service = "miro"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["MIRO", "miro"]

[[detector.patterns]]
regex = '''(?:MIRO|miro)[._-]?(?:TOKEN|token|ACCESS|access|API|api)[=:\s"']+(eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*)'''
description = "Miro access token with context anchor (JWT format)"
group = 1

[[detector.patterns]]
regex = '''(?:MIRO|miro)[._-]?(?:TOKEN|token|ACCESS|access|API|api)[=:\s"']+([a-zA-Z0-9_-]{40,})'''
description = "Miro access token with context anchor (opaque format)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.miro.com/v2/boards"
allowed_domains = ["api.miro.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "MIRO_TOKEN=xqqrnTQ9zmXf4THQ2PtTcMPcajfl0YZ1MENUO2Paabcdefghijklmnop"
test_negative = "MIRO_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
