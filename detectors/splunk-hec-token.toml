# Docs: https://docs.splunk.com/Documentation/Splunk/9.4.2/Data/UsetheHTTPEventCollector
# Format: 32-36 character GUID (8-4-4-4-12 hex pattern with dashes, or 32 hex chars)
# Verify: POST /services/collector/event with Authorization: Splunk <token> returns 200 if valid
# Prefix: none (GUID format, requires keyword context)

[detector]
id = "splunk-hec-token"
name = "Splunk HEC Token"
service = "splunk"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["Splunk", "SPLUNK_HEC_TOKEN", "splunk_hec_token", "hec token", "HTTP Event Collector", "services/collector"]

[[detector.patterns]]
regex = "(?:Splunk|SPLUNK_HEC_TOKEN|splunk_hec_token)[=:\\s\"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Splunk HEC token (GUID format with dashes) with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization:\\s*Splunk\\s+([a-f0-9]{32})"
description = "Splunk HEC token in Authorization header (32 hex chars)"
group = 1

[[detector.patterns]]
regex = "(?:splunk|hec)[._]?(?:token|key)[=:\\s\"']+([a-f0-9]{32})"
description = "Splunk HEC token (32 hex chars) with context anchor"
group = 1

[[detector.tests]]
test_positive = "Splunk=70977ea1-11e0-e768-18f3-48ab955cd5fc"
test_negative = "Splunk=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
