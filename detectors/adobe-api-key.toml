# Docs: https://developer.adobe.com/developer-console/docs/guides/authentication/
# Format: Hexadecimal string, typically 32-40 characters
# Verify: POST /ims/token/v3 for OAuth Server-to-Server
# Prefix: none (requires context anchoring)

[detector]
id = "adobe-api-key"
name = "Adobe API Key (Client ID)"
service = "adobe"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
min_confidence = 0.2
# "CLIENT_ID" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["ADOBE", "adobe_io"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32, 40] }]

[[detector.patterns]]
regex = '''(?:ADOBE|adobe)[._-]?(?:CLIENT|client)[._-]?(?:ID|id)[=:\s"']+([a-f0-9]{32,40})'''
description = "Adobe Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:ADOBE|adobe)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\s"']+([a-f0-9]{32,40})'''
description = "Adobe API Key with context anchor"
group = 1

[[detector.companions]]
name = "adobe-client-secret"
regex = '''(?:ADOBE|adobe)[._-]?(?:CLIENT|client)[._-]?(?:SECRET|secret)[=:\s"']+[a-f0-9]{32,48}'''
within_lines = 5

[[detector.tests]]
test_positive = "ADOBE_CLIENT_ID=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ADOBE_CLIENT_ID=short"
