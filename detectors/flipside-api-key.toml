# Docs: https://flipsidecrypto.xyz/
# Format: UUID format (8-4-4-4-12 hex characters)
# Verify: no public verification endpoint
# Prefix: none (UUID format, requires context anchoring)

[detector]
id = "flipside-api-key"
name = "Flipside Crypto API Key"
service = "flipside"
severity = "high"
# "api_key", "apikey" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["flipside", "FLIPSIDE"]

[[detector.patterns]]
regex = "(?:FLIPSIDE|flipside)[_a-zA-Z0-9]*[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Flipside Crypto API key (UUID format) with context anchor"
group = 1

[[detector.tests]]
test_positive = "flipside_api_key=7b3e5d8c-a9f4-e2b6-c8d3-a5e9f1b7c4d2"
test_negative = "flipside_api_key=7b3e5d8c-a9f4-e2b6-c8d3-a5e9f1b7c4d"
