# Docs: https://foundation.app/ (no public API documentation available)
# Format: API credentials for foundation.app (primarily wallet-based)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "foundation-api-key"
name = "Foundation API Key"
service = "foundation"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["foundation", "FOUNDATION", "foundation.app"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:foundation|FOUNDATION)[_\-\s]*(?:API[_\-\s]*)?KEY[_\-\s]*[=:][\s]*["'']+([a-zA-Z0-9_-]{20,})["'']+'''
description = "Foundation API key in assignment context"
group = 1

[[detector.tests]]
test_positive = "foundation API KEY= \"M9TBrKrmGsNmjQ8mT3OA12345678\""
test_negative = "foundation=short"
