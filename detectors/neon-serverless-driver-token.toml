# Docs: https://neon.com/docs/serverless/serverless-driver
# Format: PostgreSQL connection string with neon.tech hostname containing password
# Verify: no public verification endpoint (requires database connection)
# Prefix: none (requires context anchoring)

[detector]
id = "neon-serverless-driver-token"
name = "Neon Serverless Driver Token"
service = "neon"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["neon", "neon.tech", "DATABASE_URL", "POSTGRES_URL"]

[[detector.patterns]]
regex = "postgres(?:ql)?://[^\\s:@]+:([^\\s@]+)@[a-z0-9-]+\\.neon\\.tech(:\\d+)?/[^\\s\"'']*"
description = "Neon PostgreSQL connection string with password"
group = 1

[[detector.patterns]]
regex = '''(?:NEON[_\-\s]*(?:DATABASE[_\-\s]*URL|POSTGRES[_\-\s]*URL|URL))[=:\s"'']+(postgres(?:ql)?://[^\s"'']+)'''
description = "Neon connection string with context anchor"
group = 1

[[detector.tests]]
test_positive = "NEON_DATABASE_URL=postgresql://neondb:SecretPass123456@ep-demo.us-east-2.aws.neon.tech/neondb"
test_negative = "NEON_DATABASE_URL=postgresql://neondb:YOUR_API_KEY_HERE_PLACEHOLDER_VALUE@ep-demo.us-east-2.aws.neon.tech/neondb"
