# Docs: https://developers.weixin.qq.com/miniprogram/dev/OpenApiDoc/
# Format: AppID starts with 'wx' followed by 16 alphanumeric; AppSecret is 32-char hex
# Verify: https://developers.weixin.qq.com/miniprogram/dev/OpenApiDoc/getAccessToken/
# Prefix: wx (for AppID only)

[detector]
id = "wechat-api-credentials"
name = "WeChat API Credentials"
service = "wechat"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["wechat", "WECHAT", "we_chat", "wx", "appid", "appsecret"]

[[detector.patterns]]
regex = "(?:wechat|WECHAT|we_chat)[_\\-\\s]*(?:app[_\\-\\s]*secret|APP[_\\-\\s]*SECRET)[=: \\s\"'']+([a-f0-9]{32})"
description = "WeChat AppSecret with context anchor"
group = 1

[[detector.companions]]
name = "appid"
# Anchored to a `WECHAT_APPID=` / `appid:` declaration so a stray `wx`-
# prefixed 16-hex string in unrelated code doesn't qualify (the 2-char
# literal prefix isn't strong enough on its own; validator flagged it).
# Auto-detected capture group resolves `{{companion.appid}}` to just the
# `wx...` value embedded into the verify URL query string.
regex = '''(?:wechat|WECHAT|we_chat|app[_\-\s]*id|APP[_\-\s]*ID|appid|appId)[\s"'_=:-]+(wx[a-f0-9]{16})'''
within_lines = 5
[detector.verify]
method = "GET"
# Earlier template used single-brace `{companion.appid}` and `{match}` -
# interpolate.rs only honors `{{...}}` so the URL went out with the
# literal placeholder text. The host is fixed (api.weixin.qq.com), so the
# `wechat` builtin allowlist suffices.
url = "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid={{companion.appid}}&secret={{match}}"
allowed_domains = ["api.weixin.qq.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200
json_path = "$.access_token"

[[detector.tests]]
test_positive = "WECHAT_APPID=wxb044e1c1cb3f7ece\nwechat app_secret=a1b2c3d4e5f678901234567890123456"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
