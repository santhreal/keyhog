# Docs: https://uidai.gov.in/images/resource/aadhaar_authentication_api_2_5.pdf
# Format: AUA license key and ASA license key for UIDAI authentication
# Verify: No public verification endpoint (requires authorized AUA/ASA status)
# Prefix: none (requires context anchoring)

[detector]
id = "india-aadhaar-api-credentials"
name = "India Aadhaar API Credentials"
service = "india-aadhaar"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["UIDAI", "AADHAAR", "AUA_LICENSE", "ASA_LICENSE", "aadhaar_auth"]

[[detector.patterns]]
regex = '''(?:UIDAI|AADHAAR|aadhaar)[_.-]?(?:AUA[_\-\s]*LICENSE|aua_license)[\s"''=:]+([A-Z0-9]{10,20})'''
description = "UIDAI AUA (Authentication User Agency) license key"
group = 1

[[detector.patterns]]
regex = '''(?:UIDAI|AADHAAR|aadhaar)[_.-]?(?:ASA[_\-\s]*LICENSE|asa_license)[\s"''=:]+([A-Z0-9]{10,20})'''
description = "UIDAI ASA (Authentication Service Agency) license key"
group = 1

[[detector.patterns]]
regex = '''(?:UIDAI|AADHAAR)[_.-]?(?:API[_\-\s]*KEY|api_key|AUTH|auth)[\s"''=:]+([a-zA-Z0-9]{16,32})'''
description = "UIDAI API authentication key"
group = 1

[[detector.patterns]]
regex = "(?:uidai|aadhaar)[_.-]?sign[\\s\"''=:]+([a-zA-Z0-9+/]{40,}={0,2})"
description = "UIDAI digital signature certificate"
group = 1

[[detector.tests]]
test_positive = "AADHAARaua_license=BSBI4M5E5W"
test_negative = "AADHAARaua_license=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
