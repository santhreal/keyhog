# Docs: https://www.weatherapi.com/docs/
# Format: Alphanumeric API key passed as 'key' parameter
# Verify: GET /v1/current.json with key parameter returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "weatherapi-api-key"
name = "WeatherAPI.com API Key"
service = "weatherapi"
severity = "medium"
keywords = ["WEATHERAPI", "weatherapi", "WEATHER_API_KEY"]

[[detector.patterns]]
regex = "(?:WEATHERAPI|weatherapi)[_\\s]*(?:API[_\\s]*)?KEY[=:\\s\"'']+([a-zA-Z0-9]{20,})"
description = "WeatherAPI.com API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:key|KEY)[=:\\s\"'']+([a-zA-Z0-9]{20,})[^a-zA-Z0-9].*(?:weatherapi|api\\.weatherapi)"
description = "WeatherAPI.com key parameter with URL context"
group = 1

[[detector.patterns]]
# Canonical curl/SDK shape: `https://api.weatherapi.com/v1/...?key=<key>`
# where the domain appears BEFORE the key in the URL. The previous
# `key=...weatherapi` pattern only fires when the domain comes
# AFTER the key, missing the standard curl invocation. `[?&]` so
# we only fire on URL-style query parameters (avoids matching
# `weatherapi.com/key=...` host literal which is not a real shape).
regex = "(?:weatherapi\\.com|api\\.weatherapi\\.com)[^\"'\\s]*[?&](?:key|KEY)[=:]([a-zA-Z0-9]{20,})"
description = "WeatherAPI.com URL with key query param (domain-before-key shape)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.weatherapi.com/v1/current.json?q=London&key={{match}}"
allowed_domains = ["api.weatherapi.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "WEATHERAPI           _       _ __    _       _           _   _    _ _      _ __     _ _     _      _ API _       KEY =   =\"' \" =           \"    :   == \":  = : : ': =    =='\"  \"\"='  = '  :  : '::' \"  =\"   : wlTYc8i0vvSM1qBeVx9Rw"
test_negative = "WEATHERAPI           _       _ __    _       _           _   _    _ _      _ __     _ _     _      _ API _       KEY =   =\"' \" =           \"    :   == \":  = : : ': =    =='\"  \"\"='  = '  :  : '::' \"  =\"   : YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
