# Docs: https://docs.anthropic.com/en/api/getting-started
# Format: sk-ant-api03- followed by a variable-length URL-safe token body.
# Verify: GET request to Anthropic messages endpoint with x-api-key header
# Prefix: sk-ant-api03-

[detector]
id = "anthropic-api-key"
name = "Anthropic API Key"
service = "anthropic"
severity = "critical"
keywords = ["sk-ant-", "anthropic"]

# This constraint owns the legacy api03 family only. Other sk-ant- forms pass
# through because body bounds apply only when the declared prefix matches.
[detector.credential_shape]
prefix = "sk-ant-api03-"
body_min_length = 80
body_max_length = 120

[[detector.patterns]]
# The `regex` crate has no lookahead/lookbehind, so a pure non-consuming boundary
# anchor is not possible. The length cap `{80,120}` provides a soft boundary:
# a key body longer than 120 chars would be caught only up to 120 chars, which
# is still a valid-looking api03 key. The risk is negligible because the prefix
# `sk-ant-api03-` is a vendor-specific 13-char literal with no documented
# collisions; the verifier would fail on a truncated key. The modern sk-ant-
# pattern below excludes api03- bodies, so both patterns together give full
# coverage without overlap.
regex = 'sk-ant-api03-[A-Za-z0-9_-]{80,120}'
description = "Anthropic API key (sk-ant-api03-... legacy form, kept for forward compat)"
group = 0

[[detector.patterns]]
# Modern Anthropic key shape: `sk-ant-<80-120 url-safe chars>` with no
# `api03-` infix. Every recent SecretBench fixture (and the contributor
# shape from task #95) follows this form; the api03- regex above matched
# zero of the 40 modern sk-ant- fixtures, leaving them to fall through
# to the generic-secret path. `sk-ant-` is a vendor-specific 7-char
# prefix with no documented collisions.
regex = 'sk-ant-(?:[A-Z0-9_b-z-][A-Za-z0-9_-]{79,119}|a[A-Z0-9_a-oq-z-][A-Za-z0-9_-]{78,118}|ap[A-Z0-9_a-hj-z-][A-Za-z0-9_-]{77,117}|api[A-Za-z1-9_-][A-Za-z0-9_-]{76,116}|api0[A-Za-z0-24-9_-][A-Za-z0-9_-]{75,115}|api03[A-Za-z0-9_][A-Za-z0-9_-]{74,114})'
description = "Anthropic API key (modern sk-ant-<url-safe>...)"
group = 0

[detector.verify]
method = "GET"
url = "https://api.anthropic.com/v1/messages"

[detector.verify.auth]
type = "header"
name = "x-api-key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ANTHROPIC_API_KEY=sk-ant-api03-abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_-abcdefghijklmnopqrstuvwx"
test_negative = "SOME_RANDOM_KEY=not_anthropic_related"
