# Docs: https://devcenter.heroku.com/articles/platform-api-quickstart#authentication
# Format: UUID format (8-4-4-4-12 hex digits), used with HTTP Basic Auth username
# Verify: GET /account with Basic auth (username=key, password=empty) returns 200
# Prefix: none (UUID format, requires keyword context)

[detector]
id = "heroku-api-key"
name = "Heroku API Key"
service = "heroku"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.2
keywords = ["HEROKU_API_KEY", "heroku_api_key", "Heroku API Key", "herokuApiKey"]

[[detector.patterns]]
regex = '''(?i)(?:HEROKU_API_KEY|heroku_api_key|herokuApiKey|heroku-api-key)["']?\s*[=:]\s*["']?([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})["']?'''
description = "Heroku API key in env/yaml/json/kebab/camelCase context, UUID format."
group = 1

[[detector.patterns]]
regex = '''(?:heroku\.api\.key)\s*=\s*([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "Heroku API key in INI/properties dotted-key context."
group = 1

[detector.verify]
method = "GET"
url = "https://api.heroku.com/account"
allowed_domains = ["api.heroku.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "email"
json_path = "$.email"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "HEROKU_API_KEY=9a3b7c2e-4d1f-6a8b-0c5d-9e3f7a1b4c2d"
test_negative = "9a3b7c2e-4d1f-6a8b-0c5d-9e3f7a1b4c2d"
