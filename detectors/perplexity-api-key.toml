# Docs: https://docs.perplexity.ai/guides/getting-started
# Format: pplx- prefix followed by alphanumeric characters (typically 64 chars)
# Verify: POST /chat/completions with Bearer token returns 200 if valid
# Prefix: pplx-

[detector]
id = "perplexity-api-key"
name = "Perplexity API Key"
service = "perplexity"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["pplx-"]

[[detector.patterns]]
regex = 'pplx-[a-zA-Z0-9_-]{32,}'
description = "Perplexity API key (pplx- prefix)"

[detector.verify]
method = "POST"
url = "https://api.perplexity.ai/chat/completions"
allowed_domains = ["api.perplexity.ai"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pplx-Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb"
test_negative = "pplx-short"
