# Docs: https://docs.perplexity.ai/guides/getting-started
# Format: pplx- prefix followed by alphanumeric characters (typically 64 chars)
# Verify: POST /chat/completions with Bearer token returns 200 if valid
# Prefix: pplx-

[detector]
id = "perplexity-api-key"
name = "Perplexity API Key"
service = "perplexity"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["pplx-"]

[[detector.patterns]]
regex = 'pplx-[a-zA-Z0-9_-]{32,}'
description = "Perplexity API key (pplx- prefix)"

[detector.verify]
method = "POST"
url = "https://api.perplexity.ai/chat/completions"
allowed_domains = ["api.perplexity.ai"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pplx-Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb"
test_negative = "pplx-short"
