# Docs: https://developers.messagemedia.com/
# Format: API Key and API Secret pair used for HTTP Basic Auth or HMAC
# Verify: GET /v1/messages with Basic Auth returns 200 if valid
# Prefix: none (generic alphanumeric, requires keyword context)

[detector]
id = "messagemedia-api-key"
name = "MessageMedia API Key"
service = "messagemedia"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["MESSAGEMEDIA", "messagemedia", "MessageMedia", "API_KEY", "API_SECRET", "basicAuthUserName", "basicAuthPassword"]

[[detector.patterns]]
regex = '''(?:MESSAGEMEDIA|messagemedia|MessageMedia)[_\-\s]*(?:API[_\-\s]*)?(?:KEY|USER|USERNAME)[=:\s"']+([a-zA-Z0-9]{20,})'''
description = "MessageMedia API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:basicAuthUserName|hmacAuthUserName)[=:\\s\"']+([a-zA-Z0-9]{20,})"
description = "MessageMedia SDK API key"
group = 1

[detector.verify]
method = "GET"
url = "https://api.messagemedia.com/v1/messages"
allowed_domains = ["api.messagemedia.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "MESSAGEMEDIA_API_KEY=SqLjEPwwDKhgVlj98M2q"
test_negative = "MESSAGEMEDIA_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
