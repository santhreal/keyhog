# Docs: https://dev.bandwidth.com/docs/account/credentials/legacy/
# Format: Client ID and Client Secret pair used for Basic Auth or OAuth2 token generation
# Verify: POST /api/v1/oauth2/token with Basic Auth returns 200 if valid
# Prefix: none (generic alphanumeric, requires keyword context)

[detector]
id = "bandwidth-api-key"
name = "Bandwidth API Credentials"
service = "bandwidth"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["BANDWIDTH", "BANDWIDTH_API_USER", "BANDWIDTH_API_TOKEN", "BANDWIDTH_USERNAME", "BANDWIDTH_PASSWORD"]

[[detector.patterns]]
regex = '''(?:BANDWIDTH|bandwidth)[_\-\s]*(?:API[_\-\s]*)?(?:USER|USERNAME|TOKEN|PASSWORD|SECRET)[=:\s"']+([a-zA-Z0-9_-]{20,})'''
description = "Bandwidth API credential with context anchor"
group = 1

# Removed the bare `(?:ClientID|ClientSecret)` pattern - `ClientID` /
# `ClientSecret` are generic OAuth2 terminology, not Bandwidth-specific.
# alist's drivers/pikpak/util.go, drivers/thunder/driver.go,
# drivers/pcloud/util.go all have `ClientSecret = "..."` for Xunlei /
# PikPak / PCloud OAuth flows; attributing those to Bandwidth was
# wrong (the values ARE leaked client secrets, but for entirely
# different services). The generic-secret fallback catches the same
# values via the `client[_-]?secret` keyword in its alternation, so
# recall is preserved at correct service attribution.

[detector.verify]
method = "POST"
url = "https://id.voxbone.com/api/v1/oauth2/token"
allowed_domains = ["id.voxbone.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "BANDWIDTH_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx"
test_negative = "BANDWIDTH_TOKEN=short"
