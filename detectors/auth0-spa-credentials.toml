# Docs: https://auth0.com/docs/quickstart/spa
# Format: Auth0 SPA client_id and client_secret pair, or domain with client_id
# Verify: no public verification endpoint (requires Auth0 domain)
# Prefix: none (requires context anchoring)

[detector]
id = "auth0-spa-credentials"
name = "Auth0 SPA Application Credentials"
service = "auth0"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "client_secret" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["auth0", "AUTH0_API_KEY", "AUTH0_CLIENT_SECRET", "client_id", "domain", "AUTH0_CLIENT"]

[[detector.patterns]]
regex = "(?:auth0|AUTH0)[\\s\\S]{0,100}?client_id[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]{20,})[\"\\']"
description = "Auth0 SPA client ID with context"
group = 1

[[detector.patterns]]
regex = "(?i)auth0[._-]?api[._-]?key\\s*[:=]\\s*[\"']?([a-zA-Z0-9_-]{32,128})[\"']?"
description = "Auth0 API key assignment"
group = 1

[[detector.patterns]]
regex = "(?i)auth0[._-]?client[._-]?secret\\s*[:=]\\s*[\"']?([a-zA-Z0-9_-]{32,128})[\"']?"
description = "Auth0 client secret assignment"
group = 1

[[detector.companions]]
name = "auth0_domain"
regex = "(?:domain|AUTH0_DOMAIN)[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]+\\.auth0\\.com)[\"\\']"
within_lines = 5

[[detector.tests]]
test_positive = "auth0 config client_id: 'Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn'"
test_negative = "auth0 client_id: 'short'"
