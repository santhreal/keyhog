# Docs: https://www.twilio.com/docs/flex/end-user-authentication
# Format: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9... JWT token for Flex WebChat
# Verify: no public verification endpoint
# Prefix: eyJ (JWT header, requires context anchoring)

[detector]
id = "twilio-flex-token"
name = "Twilio Flex Token"
service = "twilio"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["flex", "twilio_flex", "TWILIO_FLEX"]

[[detector.patterns]]
regex = "(?i)(?:flex|twilio.?flex)[=:\\s\"'']+(eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*)"
description = "Twilio Flex JWT token with context anchor"
group = 1

[[detector.tests]]
test_positive = "twilioDflex :  \" ': : =  ':    \"\"   ==\"         :\" \"   \": ' :   'eyJ8Sdnjlthi-XczKoljLbAYLECQBxxg7HTvLp0-qoCBrfR.eyJvOcBY7raPA9IwOEfZnL42ebCZEeIwhQQ5VuQXVx0VuoBR2vkocOacxfPTOjit3clhsu92beRjIWFKPKTvtD.5SGklxl0z3USPUl2DX3P7kDIIIW4Fbmpng61tb5Y"
test_negative = "twilioDflex :  \" ': : =  ':    \"\"   ==\"         :\" \"   \": ' :   'YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
