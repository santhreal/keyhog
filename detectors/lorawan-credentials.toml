# Docs: https://lora-alliance.org/about-lorawan/
# Format: DevEUI, AppEUI/AppKey for LoRaWAN device activation
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "lorawan-credentials"
name = "LoRaWAN Network Server Credentials"
service = "lorawan"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["LORAWAN", "lorawan", "DevEUI", "AppEUI", "AppKey", "DevAddr"]

[[detector.patterns]]
regex = "(?:LORAWAN|lorawan)[._-]?DEVEUI[=:\\s\"'']+([a-fA-F0-9]{16})"
description = "LoRaWAN DevEUI (64-bit device identifier)"
group = 1

[[detector.patterns]]
regex = "(?:LORAWAN|lorawan)[._-]?APPEUI[=:\\s\"'']+([a-fA-F0-9]{16})"
description = "LoRaWAN AppEUI/JoinEUI (64-bit application identifier)"
group = 1

[[detector.patterns]]
regex = "(?:LORAWAN|lorawan)[._-]?APPKEY[=:\\s\"'']+([a-fA-F0-9]{32})"
description = "LoRaWAN AppKey (128-bit application key)"
group = 1

[[detector.patterns]]
regex = "(?:LORAWAN|lorawan)[._-]?DEVADDR[=:\\s\"'']+([a-fA-F0-9]{8})"
description = "LoRaWAN DevAddr (32-bit device address)"
group = 1

[[detector.patterns]]
regex = '''(?:LORAWAN|lorawan)[._-]?NWK[_\-\s]*SKEY[=:\s"'']+([a-fA-F0-9]{32})'''
description = "LoRaWAN Network Session Key"
group = 1

[[detector.patterns]]
regex = '''(?:LORAWAN|lorawan)[._-]?APP[_\-\s]*SKEY[=:\s"'']+([a-fA-F0-9]{32})'''
description = "LoRaWAN Application Session Key"
group = 1

[[detector.tests]]
test_positive = "LORAWANDEVEUI=65FC2B90Bd21cD54"
test_negative = "LORAWANDEVEUI=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
