# Docs: https://www.ibm.com/cloud/financial-services
# Format: IBM Cloud Government uses same API key format as commercial
# Verify: GET /v1/identity/token with API key returns token if valid
# Prefix: none (requires context anchoring)

[detector]
id = "ibm-cloud-government-credentials"
name = "IBM Cloud Government Credentials"
service = "ibm-cloud-government"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["IBM_CLOUD_GOV", "IBMCLOUD_GOV", "financial-services", "gov.ibm"]

[[detector.patterns]]
regex = '''(?:IBM[_\-\s]*CLOUD[_\-\s]*GOV|IBMCLOUD[_\-\s]*GOV)[_\-\s]*(?:API[_\-\s]*KEY)[=:\s"'']+([a-zA-Z0-9_-]{44})(?:[^a-zA-Z0-9_-]|$)'''
description = "IBM Cloud Government API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "IBM_CLOUD_GOV API_KEY=\"AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCdEfGh\""
test_negative = "IBM_CLOUD_GOV API_KEY=\"AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCdEfGhIj\""

[[detector.patterns]]
regex = '''(?:IBM[_\-\s]*CLOUD[_\-\s]*GOV|IBMCLOUD[_\-\s]*GOV)[_\-\s]*(?:REGION)[=:\s"'']+(us-south|us-east|eu-gb|eu-de|jp-tok|au-syd)'''
description = "IBM Cloud Government region"
group = 1
