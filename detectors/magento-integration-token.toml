# Docs: https://developer.adobe.com/commerce/webapi/get-started/authentication/gs-authentication-token/
# Format: 32 hexadecimal characters (no distinctive prefix - requires context anchoring)
# Verify: POST /rest/V1/integration/admin/token returns token if valid credentials provided
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "magento-integration-token"
name = "Magento Integration Token"
service = "magento"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["magento", "integration", "MAGE", "MAGENTO", "access_token"]

[[detector.patterns]]
regex = "(?:magento|integration|MAGE|MAGENTO)[_=:\\s\"']+(?:token|access_token)?[=:\\s\"']*([a-f0-9]{32})"
description = "Magento integration/admin access token with context anchor"
group = 1

[[detector.tests]]
test_positive = "magento=e32420577b893886ed061724f6c4474e"
test_negative = "magento=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
