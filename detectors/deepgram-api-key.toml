# Docs: https://developers.deepgram.com/docs/create-additional-api-keys
# Format: 40-character hexadecimal string with no unique prefix
# Verify: GET /v1/projects with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "deepgram-api-key"
name = "Deepgram API Key"
service = "deepgram"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.3
keywords = ["DEEPGRAM_API_KEY", "deepgram"]

[[detector.patterns]]
regex = "(?i)deepgram[_.]?(?:api[_.]?key|token|key)?[=:\\s\"']+([a-f0-9]{40})"
description = "Deepgram API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.deepgram.com/v1/projects"
allowed_domains = ["api.deepgram.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Token {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "DEEPGRAM_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3ea9e2"
test_negative = "DEEPGRAM_API_KEY=short"
