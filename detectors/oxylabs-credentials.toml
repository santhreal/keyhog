# Docs: https://developers.oxylabs.io/
# Format: Username:password OR customer-USERNAME format for proxy auth
# Verify: Basic auth request to proxy endpoint
# Prefix: customer- or user-

[detector]
id = "oxylabs-credentials"
name = "Oxylabs Credentials"
service = "oxylabs"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["oxylabs", "OXylabs", "customer-", "pr.oxylabs.io", "dc.oxylabs.io"]

[[detector.patterns]]
regex = "customer-[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+"
description = "Oxylabs customer username:password format"

# Removed `user-X:X` pattern - matched every CSS `user-select:none`,
# `user-modify:read-write`, `user-drag:auto` declaration (font-awesome
# alone fires it 6+ times per file). Real Oxylabs `user-PREFIX:`
# accounts are still caught by the oxylabs.io / OXYLABS context
# anchor below when devs use that naming, and the customer- variant
# above covers the dominant Oxylabs format. CSS FPs: 20+ in
# store-brave-com bundle.css / pdf.js viewer.css / font-awesome.

[[detector.patterns]]
regex = "(?:oxylabs|OXYLABS|pr\\.oxylabs\\.io|dc\\.oxylabs\\.io)[=:\\s\"'']+([a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+)"
description = "Oxylabs credentials with context anchor"
group = 1

[[detector.tests]]
test_positive = "customer-ytESOCaL1aAHcTJ8N:3zAAw4x0g2B7ztTxjFoc3"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
