# Docs: https://techdocs.akamai.com/linode-api/reference/post-object-storage-keys
# Format: 20 alphanumeric characters for Access Key, 40 base64 characters for Secret Key
# Verify: none (S3-compatible services require signature-based auth, no simple endpoint)
# Prefix: none (generic S3-like format, requires context anchoring)

[detector]
id = "linode-object-storage-access-key"
name = "Linode Object Storage Access Key"
service = "linode"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["LINODE_OBJECT_STORAGE", "linode_object_storage", "LINODE_ACCESS_KEY", "linodeobjects.com"]

[[detector.patterns]]
regex = "(?:LINODE|linode)[._-]?(?:OBJECT[._-]?STORAGE|object[._-]?storage)?[._-]?(?:ACCESS[._-]?)?(?:KEY|key)[=:\\s\"'']+((?-i:[A-Z0-9]{20}))"
description = "Linode Object Storage access key ID with context anchor"
group = 1

[[detector.companions]]
name = "secret_access_key"
regex = '''(?:LINODE[_\-\s]*SECRET(?:[_\-\s]*KEY)?|linode[_\-\s]*object[_\-\s]*storage[_\-\s]*secret|secret[_\-\s]*access[_\-\s]*key|aws[_\-\s]*secret[_\-\s]*access[_\-\s]*key)[=:\s"']+([A-Za-z0-9/+=]{40})'''
within_lines = 5

[[detector.tests]]
test_positive = "LINODE_OBJECT_STORAGE_ACCESS_KEY=KPQXRMSNTBVWYZK4Q7M2\nLINODE_OBJECT_STORAGE_SECRET_KEY=Vk9Bn3Lp7Qm2Rs5Tw8/+Vk9Bn3Lp7Qm2Rs5Tw8=A"
test_negative = "linode_access_key=kpqxrmsntbvwyzk4q7m2"
