# Docs: https://usefathom.com/docs/api-reference/authentication
# Format: Alphanumeric string, typically 32+ characters, used as Bearer token
# Verify: GET /api/v1/account with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "fathom-api-key"
name = "Fathom Analytics API Key"
service = "fathom"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["FATHOM_API_KEY", "fathom_api_key", "usefathom"]

[[detector.patterns]]
regex = "(?:FATHOM[_\\-\\s]?API[_\\-\\s]?KEY|fathom[_\\-\\s]?api[_\\-\\s]?key)[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "Fathom API key with context anchor"
group = 1

[[detector.patterns]]
regex = "https://api\\.usefathom\\.com.*Authorization[=:\\s\"'']+Bearer[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "Fathom API call with Bearer token"
group = 1

[detector.verify]
method = "GET"
url = "https://api.usefathom.com/v1/account"
allowed_domains = ["api.usefathom.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "fathom_api_key=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "fathom_api_key=short"
