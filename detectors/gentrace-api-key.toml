# Docs: https://gentrace.ai/docs/
# Format: Bearer token format, typically 64+ hex characters
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "gentrace-api-key"
name = "Gentrace API Key"
service = "gentrace"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["GENTRACE_API_KEY", "gentrace", "GENTRACE_PIPELINE_ID"]

[[detector.patterns]]
regex = "(?:GENTRACE_API_KEY|gentrace.api.key)[=:\\s\"'']+([a-zA-Z0-9]{40,})"
description = "Gentrace API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:Authorization)[=:\\s\"'']+(?:Bearer\\s+)?([a-zA-Z0-9]{40,})"
description = "Potential Gentrace Bearer token"
group = 1

[[detector.tests]]
test_positive = "GENTRACE_API_KEY=gZsBR3cpTBBZqmJqeUvRZDGSzZDL95OkEUPtSwRW"
test_negative = "GENTRACE_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
