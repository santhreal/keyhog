# Docs: https://github.com/500px/api-documentation
# Format: OAuth Consumer Key (alphanumeric string)
# Verify: no public verification endpoint (requires OAuth flow)
# Prefix: none (requires context anchoring)

[detector]
id = "500px-api-key"
name = "500px API Key"
service = "500px"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["500PX", "500px"]

[[detector.patterns]]
regex = '''(?:500PX|500px)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\s"']+([a-zA-Z0-9_-]{32,})'''
description = "500px API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:500PX|500px)[._-]?(?:CONSUMER|consumer)[._-]?(?:KEY|key)[=:\s"']+([a-zA-Z0-9_-]{32,})'''
description = "500px consumer key with context anchor"
group = 1

[[detector.companions]]
name = "500px-consumer-secret"
regex = '''(?:500PX|500px)[._-]?(?:CONSUMER|consumer)[._-]?(?:SECRET|secret)[=:\s"']+[a-zA-Z0-9_-]{32,}'''
within_lines = 5

[[detector.tests]]
test_positive = "500PX_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "500PX_API_KEY=short"
