# Docs: https://cloud.google.com/vertex-ai/docs/authentication
# Format: Service account JSON with type, project_id, private_key, client_email fields
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "vertexai-service-account"
name = "Google Vertex AI Service Account"
service = "vertexai"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["service_account", "vertex-ai", "GOOGLE_APPLICATION_CREDENTIALS", "project_id", "private_key_id"]

[[detector.patterns]]
# Bridges between the three anchor fields are `[\s\S]{0,256}?` - LAZY and
# length-bounded. They MUST allow newlines: the canonical artifact is the
# pretty-printed JSON `gcloud iam service-accounts keys create` writes, where
# `type`, `project_id`, `private_key_id`, and `private_key` each sit on their
# own line. The previous `[^\n]{0,128}` could not cross those line breaks, so
# it only matched MINIFIED service-account JSON and silently missed every real
# downloaded key file (the dominant form). `[\s\S]` crosses the newlines; the
# `{0,256}?` lazy bound keeps the match span local (real service-account JSON
# keeps all four fields within ~400 bytes, and the project_id→private_key
# bridge only spans the 40-char private_key_id line) so the engine cannot drag
# a single match across an entire file - preserving the O(bounded)-per-attempt
# guarantee a kimi audit flagged on 2026-05-23. project_id is capped at 30
# chars per the GCP project-id spec.
regex = "(?i)(?:type[\"\\']?\\s*[:=]\\s*[\"\\']?service_account[\"\\']?[\\s\\S]{0,256}?project_id[\"\\']?\\s*[:=]\\s*[\"\\']?[a-z0-9-]{1,30}[\"\\']?[\\s\\S]{0,256}?private_key[\"\\']?\\s*[:=]\\s*[\"\\']?-----BEGIN PRIVATE KEY-----)"
description = "Google Vertex AI service account JSON with private key"

# Removed the env-var-name-only pattern - matched the literal
# strings `GOOGLE_APPLICATION_CREDENTIALS`, `GOOGLE_CLOUD_PROJECT`,
# `VERTEXAI_PROJECT`, `VERTEXAI_LOCATION` in code, which are env-var
# NAMES, not credentials. Any source file referencing these env vars
# (claude-code's api/client.ts, every gcloud-shaped tool) became a
# Critical "vertexai-service-account" finding in v0.5.19 dogfood.
# Real Vertex AI credentials are the JSON service-account file matched
# by pattern 1 above; the env var names themselves carry no secret
# value to leak.

# Author-shipped self-test. The positive is the canonical PRETTY-PRINTED
# (multi-line) service-account key file - the form the old `[^\n]` bridge
# missed - so it pins the newline-crossing fix. The negative is the env-var
# reference that must NOT fire (the v0.5.19 dogfood FP).
[[detector.tests]]
test_positive = '''
{
  "type": "service_account",
  "project_id": "demo-proj-001",
  "private_key_id": "0123456789abcdef0123456789abcdef01234567",
  "private_key": "-----BEGIN PRIVATE KEY-----\nMIIEvAIBADANBgkqhkiG\n-----END PRIVATE KEY-----\n",
  "client_email": "svc@demo-proj-001.iam.gserviceaccount.com"
}
'''
test_negative = '''
const credPath = process.env.GOOGLE_APPLICATION_CREDENTIALS;
const projectId = process.env.GOOGLE_CLOUD_PROJECT;
'''
