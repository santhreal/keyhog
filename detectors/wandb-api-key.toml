# Docs: https://docs.wandb.ai/quickstart
# Format: 40- or 32-character hexadecimal string (no unique prefix)
# Verify: GET /viewer with Bearer auth
# Prefix: none (requires context anchoring)

[detector]
id = "wandb-api-key"
name = "Weights & Biases API Key"
service = "wandb"
severity = "high"
keywords = ["WANDB_API_KEY", "wandb"]

[[detector.patterns]]
regex = "(?:WANDB_API_KEY|wandb.api.key)[=: \\s\"'']+([a-f0-9]{40}|[a-f0-9]{32})"
description = "Weights & Biases API key with context anchor (40- or 32-char hex)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.wandb.ai/viewer"
allowed_domains = ["api.wandb.ai"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "Bearer {{match}}"

[[detector.tests]]
test_positive = "WANDB_API_KEY=034b1509e9cb1c6131ba5ee7dc30a6d542944a55"
test_negative = "WANDB_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
