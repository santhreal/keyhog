# Docs: https://kafka.apache.org/documentation/#security_sasl
# Format: JAAS config with SASL mechanism (PLAIN, SCRAM-SHA-256, SCRAM-SHA-512)
# Verify: none (requires Kafka broker connection, no standard HTTP API)
# Prefix: none (context-anchored via JAAS/SASL keywords)

[detector]
id = "kafka-sasl-credentials"
name = "Kafka SASL Credentials"
service = "kafka"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["sasl.jaas.config", "SASL_PLAINTEXT", "SASL_SSL", "org.apache.kafka.common.security", "username", "password"]

[[detector.patterns]]
regex = "sasl\\.jaas\\.config\\s*=\\s*[\"']?org\\.apache\\.kafka\\.common\\.security\\.plain\\.PlainLoginModule\\s+required\\s+username\\s*=\\s*[\"']([^\"']+)[\"']\\s+password\\s*=\\s*[\"']([^\"']+)[\"'];?"
description = "Kafka SASL/PLAIN JAAS configuration with username and password"
group = 2

[[detector.patterns]]
regex = "sasl\\.jaas\\.config\\s*=\\s*[\"']?org\\.apache\\.kafka\\.common\\.security\\.scram\\.ScramLoginModule\\s+required\\s+username\\s*=\\s*[\"']([^\"']+)[\"']\\s+password\\s*=\\s*[\"']([^\"']+)[\"'];?"
description = "Kafka SASL/SCRAM JAAS configuration with username and password"
group = 2

[[detector.patterns]]
regex = "sasl\\.mechanism\\s*=\\s*[\"']?(PLAIN|SCRAM-SHA-256|SCRAM-SHA-512)[\"']?"
description = "Kafka SASL mechanism configuration (companion pattern)"

[[detector.patterns]]
regex = "(?:kafka|KAFKA)_(?:SASL_)?(?:PASSWORD|PASS|SECRET)[=:\\s\"']+([^\"'\\s]{8,})"
description = "Kafka password from environment variable"
group = 1

[[detector.patterns]]
regex = "(?:kafka|KAFKA)_(?:SASL_)?USERNAME[=:\\s\"']+([^\"'\\s]+)"
description = "Kafka username from environment variable"
group = 1

[[detector.tests]]
test_positive = "KAFKA_SASL_PASSWORD=SecretPass123456"
test_negative = "SASL_PLAINTEXT=short"
