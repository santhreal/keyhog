# Docs: https://hologram.io/docs/reference/cloud/http/#/introduction/authentication
# Format: API key starting with specific prefixes for device/cloud API
# Verify: GET /api/1/users/me/ with X-Api-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "hologram-api-key"
name = "Hologram API Key"
service = "hologram"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["HOLOGRAM", "hologram", "HOLOGRAM_API", "hologram.io"]

[[detector.patterns]]
regex = '''(?:HOLOGRAM|hologram)[._-]?API[_\-\s]*KEY[=:\s"'']+([a-zA-Z0-9]{32,64})'''
description = "Hologram API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:HOLOGRAM|hologram)[._-]?DEVICE[_\-\s]*KEY[=:\s"'']+([a-zA-Z0-9]{16,32})'''
description = "Hologram device key"
group = 1

[detector.verify]
method = "GET"
url = "https://dashboard.hologram.io/api/1/users/me/"
allowed_domains = ["dashboard.hologram.io"]

[detector.verify.auth]
type = "header"
name = "X-Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "HOLOGRAM_API_KEY=0hJbPI18aekE205Bq4osIbrsNwBPn5EaLtbbmfpG"
test_negative = "HOLOGRAM_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
