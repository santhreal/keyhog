# Docs: https://automate.io/docs/api (service discontinued/acquired by Notion)
# Format: API key for legacy Automate.io service
# Verify: no public verification endpoint (service discontinued)
# Prefix: none (requires context anchoring)

[detector]
id = "automate-io-credentials"
name = "Automate.io API Credentials"
service = "automate.io"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["AUTOMATE_IO", "automate.io", "automateio", "AUTOMATEIO"]

[[detector.patterns]]
regex = "(?:AUTOMATE[_\\.]?IO|automate[_\\.]?io)[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "Automate.io API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:AUTOMATEIO|automateio)[_\\.]?(?:API[_\\.]?)?(?:KEY|TOKEN)[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "Automate.io API key alternative pattern"
group = 1

[[detector.tests]]
test_positive = "AUTOMATE_IO=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "AUTOMATE_IO=short"
