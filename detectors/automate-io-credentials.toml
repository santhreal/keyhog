# Docs: https://automate.io/docs/api (service discontinued/acquired by Notion)
# Format: API key for legacy Automate.io service
# Verify: no public verification endpoint (service discontinued)
# Prefix: none (requires context anchoring)

[detector]
id = "automate-io-credentials"
name = "Automate.io API Credentials"
service = "automate.io"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["AUTOMATE_IO", "automate.io", "automateio", "AUTOMATEIO"]

[[detector.patterns]]
regex = "(?:AUTOMATE[_\\.]?IO|automate[_\\.]?io)[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "Automate.io API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:AUTOMATEIO|automateio)[_\\.]?(?:API[_\\.]?)?(?:KEY|TOKEN)[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "Automate.io API key alternative pattern"
group = 1

[[detector.tests]]
test_positive = "AUTOMATE_IO=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "AUTOMATE_IO=short"
