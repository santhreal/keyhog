# Docs: https://supabase.com/docs/guides/realtime
# Format: JWT token (eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...) with Realtime URL
# Verify: WebSocket connection to Realtime endpoint
# Prefix: service-owned Realtime URLs; JWT keys require context anchoring

[detector]
id = "supabase-realtime-credentials"
name = "Supabase Realtime Credentials"
service = "supabase"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SUPABASE_REALTIME_URL", "SUPABASE_REALTIME_KEY", "realtime.supabase.co"]

[[detector.patterns]]
regex = "SUPABASE_REALTIME_URL[=:\\s\"'']+(wss?://[a-z0-9-]+\\.supabase\\.co[:/]realtime[/v0-9]*)"
description = "Supabase Realtime WebSocket URL with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:^|[^A-Za-z0-9_])(wss?://[a-z0-9-]+\\.supabase\\.co[:/]realtime[/v0-9]*)(?:$|[^A-Za-z0-9_/])"
required_literals = [".supabase.co"]
description = "Bare Supabase Realtime WebSocket URL"
group = 1

[[detector.patterns]]
regex = "SUPABASE_REALTIME_KEY[=:\\s\"'']+(eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*)"
description = "Supabase Realtime JWT key with context anchor"
group = 1

[[detector.patterns]]
# Bounded the bridge between the `realtime` keyword and the `url`
# field to 64 non-newline chars (Supabase env files keep
# `REALTIME_URL` on a single ALL_CAPS line). The captured URL keeps
# the unbounded `+` because `[^\s"']` is a ~250-char negated class
# and bounding it (e.g. `{1,2048}`) explodes the regex-crate DFA
# past its 1 MiB size limit (caught by e2e_binary tests after
# commit c6d0511 tried to bound it). The `realtime + url` anchor
# pair already prevents unbounded matching of the regex as a whole.
# kimi-4 audit; DFA-size regression rolled back after fix attempt.
regex = "realtime[^\\n]{0,64}url[=:\\s\"'']+(wss?://[^\\s\"'']+)"
description = "Supabase Realtime URL with loose context anchor"
group = 1

[[detector.tests]]
test_positive = "SUPABASE_REALTIME_URL=wss://ipg2a9-ngmylpjv4aehcd1-1j-uwny4tclky1o-0g116jav27ks54kvji44iytbjq.supabase.co:realtime2329865///951463v449/4v2510//047/95/2332/34v170/"
test_negative = "SUPABASE_REALTIME_URL=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
