# Docs: https://docs.neptune.ai/api_token
# Format: Base64-encoded string (no unique prefix)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "neptune-api-token"
name = "Neptune.ai API Token"
service = "neptune"
severity = "high"
keywords = ["NEPTUNE_API_TOKEN", "neptune"]

[[detector.patterns]]
regex = "(?:NEPTUNE_API_TOKEN|neptune.api.token)[=: \\s\"'']+([A-Za-z0-9+/]{40,}={0,2})"
description = "Neptune.ai API token with context anchor"
group = 1

[[detector.tests]]
test_positive = "NEPTUNE_API_TOKEN=L2Vq6GK3z1UsQ5g8jBQmYXxTC0cEJcZ83n2tcOhktobehu8/ZtSIy8bEB/EJ3yPB+U="
test_negative = "NEPTUNE_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
