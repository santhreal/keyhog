# Docs: https://www.geocod.io/docs/
# Format: API key is a 40+ character alphanumeric string (no unique prefix)
# Verify: GET /v1.7/geocode with api_key parameter
# Prefix: none (requires context anchoring)

[detector]
id = "geocodio-api-key"
name = "Geocodio API Key"
service = "geocodio"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["GEOCODIO_API_KEY", "geocodio.api.key", "geocodio_api_key"]

[[detector.patterns]]
regex = "(?:GEOCODIO[_-]?API[_-]?KEY|geocodio[_-]?api[_-]?key|geocodio\\.api\\.key)[=:\\s\"'']+([A-Za-z0-9]{40,})"
description = "Geocodio API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.geocod.io/v1.7/geocode"
allowed_domains = ["api.geocod.io"]

[detector.verify.auth]
type = "query"
param = "api_key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "GEOCODIO_API_KEY=3nHvnPWgQka0Qs6ZHb74Yc1xf9uTN3ejCrjuLNGs"
test_negative = "GEOCODIO_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
