# Docs: https://docs.docker.com/security/access-tokens/
# Format: dckr_pat_ prefix followed by alphanumeric characters (27+ chars)
# Verify: HTTP GET to /v2/access-tokens with Bearer token authentication
# Prefix: dckr_pat_

[detector]
id = "dockerhub-pat"
name = "Docker Hub Personal Access Token"
service = "dockerhub"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["dckr_pat_", "docker"]

[[detector.patterns]]
regex = 'dckr_pat_[a-zA-Z0-9_-]{27,64}'
description = "Docker Hub personal access token (dckr_pat_, 27-64 chars)"

[detector.verify]
method = "GET"
url = "https://hub.docker.com/v2/access-tokens"
allowed_domains = ["hub.docker.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "dckr_pat_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn"
test_negative = "dckr_pat_short"
