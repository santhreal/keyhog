# Docs: https://developer.hashicorp.com/consul/docs/secure/acl/token
# Format: UUID format (e.g., 86cddfb9-2760-d947-358d-a2811156bf31) - bootstrap and management tokens
# Verify: GET /v1/acl/token/self with X-Consul-Token header returns 200 if valid
# Prefix: none (requires context anchoring with UUID format)

[detector]
id = "consul-acl-token"
name = "Consul ACL Token"
service = "consul"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["CONSUL_HTTP_TOKEN", "consul_token", "CONSUL_TOKEN", "bootstrap_token"]

[[detector.patterns]]
regex = "(?:CONSUL_HTTP_TOKEN|CONSUL_TOKEN|consul_token|bootstrap_token)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Consul ACL token in environment variable (UUID format)"
group = 1

# The bare `token:\s*<uuid>` config-file pattern was dropped 2026-05-29.
# YAML `token: <uuid>` is ubiquitous across Kubernetes secrets, Vault
# config, Linkerd service tokens, Istio meshes, Helm values, etc. -
# every random UUID in a `token:` YAML field was being attributed to
# Consul. Mirror v23 traced 70 FPs to this single pattern. The CLI-
# anchored `SecretID:` pattern below (Consul's actual CLI output
# format) carries the Consul-specific marker and stays. Every other
# Consul code path uses `CONSUL_HTTP_TOKEN` / `CONSUL_TOKEN` /
# `consul_token` / `bootstrap_token`, all handled by pattern #1.

[[detector.patterns]]
regex = "SecretID:\\s+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Consul ACL token from CLI output"
group = 1

[[detector.tests]]
test_positive = "CONSUL_HTTP_TOKEN=\"7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d\""
test_negative = "CONSUL_HTTP_TOKEN=short"
