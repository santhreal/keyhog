# Docs: https://www.e-stat.go.jp/en/developer
# Format: e-Stat API key for Japanese government statistics (appId parameter)
# Verify: GET /api/1.0/app/getStatsList with appId parameter
# Prefix: none (requires context anchoring)

[detector]
id = "japan-egov-api-key"
name = "Japan e-Gov e-Stat API Key"
service = "japan-egov"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["e-Stat", "ESTAT", "e_stat", "e-gov", "appId", "e-stat.go.jp"]

[[detector.patterns]]
regex = '''(?:e-Stat|ESTAT|e_stat|e-gov)[_.-]?(?:APP[_\-\s]*ID|appid|API[_\-\s]*KEY|api_key)[\s"''=:]+([a-zA-Z0-9]{20,40})'''
description = "Japan e-Stat API application ID"
group = 1

[[detector.patterns]]
regex = "(?:e-stat\\.go\\.jp).{0,30}appId[\\s\"''=:]+([a-zA-Z0-9]{20,40})"
description = "Japan e-Stat appId in URL or code"
group = 1

[[detector.patterns]]
regex = "appId[\\s\"''=:]+([a-zA-Z0-9]{20,40}).{0,30}(?:e-stat|stat\\.go\\.jp)"
description = "Japan e-Stat appId with trailing context"
group = 1

[[detector.tests]]
test_positive = "e-Statapi_key=8K2IWCe8Ib6RIp7hlOzI"
test_negative = "e-Statapi_key=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
