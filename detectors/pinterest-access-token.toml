# Docs: https://developers.pinterest.com/docs/getting-started/set-up-authentication-and-authorization
# Format: 64-character alphanumeric string (OAuth2 access token)
# Verify: GET /v5/user_account with Bearer token returns 200 if valid
# Prefix: none (generic alphanumeric, requires keyword context)

[detector]
id = "pinterest-access-token"
name = "Pinterest Access Token"
service = "pinterest"
severity = "medium"
# "access_token" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["PINTEREST", "pinterest", "PINTEREST_TOKEN", "pinterest_token"]

[[detector.patterns]]
regex = "(?:PINTEREST|pinterest)[._]?(?:ACCESS|access)?[._]?(?:TOKEN|token)?[=:\\s\"']+([A-Za-z0-9]{64})"
description = "Pinterest API v5 OAuth access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.pinterest.com/v5/user_account"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "PINTEREST=cvxs2sDMfkbwkGohlpD2BuQhAcqkYTI0nCInqbKrMfyX87TPRTfNvVVq89b9VGLi"
test_negative = "PINTEREST=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
