# Docs: https://docs.akoya.com/docs/getting-started
# Format: client_id and client_secret for OAuth2 authentication
# Verify: POST /token with Basic Auth to obtain access token
# Prefix: none (requires context anchoring)

[detector]
id = "akoya-client-credentials"
name = "Akoya Client Credentials"
service = "akoya"
severity = "critical"
# "client_id", "client_secret" removed: over-broad generic prefilter(s) the regex does NOT need — every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["AKOYA_CLIENT_ID", "AKOYA_CLIENT_SECRET", "akoya"]

[[detector.patterns]]
regex = "AKOYA[._-]?(?:CLIENT)?[._-]?ID[=:\\s\"'']+([a-zA-Z0-9_-]{10,40})"
description = "Akoya Client ID for OAuth2 authentication"
group = 1

# OAuth2 client_secret companion. Auto-detected capture group resolves
# `{{companion.akoya_client_secret}}` to just the secret value used as the
# basic-auth password. The verify spec referenced this companion before
# the spec was declared - every probe shipped the literal string
# "companion.akoya_client_secret" as the password and 401'd.
[[detector.companions]]
name = "akoya_client_secret"
# Companion regexes compile case-sensitively, unlike primary detector patterns.
# Keep the Akoya field name explicitly caseless so mixed-case config keys cannot
# satisfy the primary pattern and then silently lose their required companion.
regex = "(?i:AKOYA[._-]?(?:CLIENT)?[._-]?SECRET)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
within_lines = 5
required = true

[detector.verify]
method = "POST"
url = "https://sandbox-idp.ddp.akoya.com/token"
body = "grant_type=client_credentials&scope=openid"

[detector.verify.auth]
type = "basic"
username = "match"
password = "companion.akoya_client_secret"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AKOYA_CLIENT_ID=Kp4Qx7Rm2Sn\nAKOYA_CLIENT_SECRET=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5"
test_negative = "AKOYA_CLIENT_ID=Kp4Qx7Rm2Sn"

[[detector.tests]]
test_positive = "Akoya_Client_Id=Kp4Qx7Rm2Sn\nAkoya_Client_Secret=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5"
