# Docs: https://docs.fireworks.ai/getting-started/introduction
# Format: fw_ prefix followed by 40 alphanumeric characters
# Verify: GET request to Fireworks /models endpoint with Bearer token
# Prefix: fw_

[detector]
id = "fireworks-ai-api-key"
name = "Fireworks AI API Key"
service = "fireworks"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["fw_", "fireworks"]

[[detector.patterns]]
regex = 'fw_[a-zA-Z0-9]{40}'
description = "Fireworks AI API key (fw_)"

[detector.verify]
method = "GET"
url = "https://api.fireworks.ai/inference/v1/models"
allowed_domains = ["api.fireworks.ai"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "fw_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "fw_short"
