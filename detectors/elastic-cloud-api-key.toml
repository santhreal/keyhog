# Docs: https://www.elastic.co/guide/en/cloud/current/ec-api-authentication.html
# Format: id:key format (20+ alphanumeric, colon, 16+ alphanumeric) or base64
# Verify: GET /api/v1/deployments with ApiKey authorization header
# Prefix: none (id:key format, requires context anchoring)

[detector]
id = "elastic-cloud-api-key"
name = "Elastic Cloud API Key"
service = "elastic"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["ELASTIC_CLOUD_API_KEY", "elastic-cloud", "api.elastic-cloud.com"]

[[detector.patterns]]
regex = "(?:ELASTIC_CLOUD_API_KEY|elastic_cloud_api_key)[=:\\s\"']+([A-Za-z0-9]{20,}:[A-Za-z0-9]{16,})"
description = "Elastic Cloud API key in id:key format with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ELASTIC_CLOUD_API_KEY|elastic_cloud_api_key)[=:\\s\"']+([A-Za-z0-9_-]{40,}==?)"
description = "Elastic Cloud API key base64 encoded with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.elastic-cloud.com/api/v1/deployments"
allowed_domains = ["api.elastic-cloud.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "ApiKey {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ELASTIC_CLOUD_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz:Kp4Qx7Rm2Sn5Tb8V"
test_negative = "ELASTIC_CLOUD_API_KEY=short"
