# Docs: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/authorizing-oauth-apps
# Format: OAuth client secret - 40 hexadecimal characters
# Verify: POST to github.com/login/oauth/access_token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "github-oauth-secret"
name = "GitHub OAuth Client Secret"
service = "github"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
min_confidence = 0.2
keywords = ["GITHUB_CLIENT_SECRET", "github_client_secret", "GH_CLIENT_SECRET"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [40] }]

[[detector.patterns]]
regex = "(?:GITHUB|github|GH)[_.]?(?:CLIENT|client)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-f0-9]{40})"
required_literals = ["SECRET"]
description = "GitHub OAuth client secret with context anchor"
group = 1

[[detector.companions]]
name = "client_id"
regex = "(?:GITHUB|github|GH)[_.]?(?:CLIENT|client)[_.]?(?:ID|id)[=:\\s\"'']+([A-Za-z0-9_\\.]{8,64})"
within_lines = 5

[[detector.tests]]
test_positive = "GITHUBCLIENTSECRET=435cd3e0afae058598381e2e78433a8627569f8b"
test_negative = "GITHUBCLIENTSECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
