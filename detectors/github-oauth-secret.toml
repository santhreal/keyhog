# Docs: https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/authorizing-oauth-apps
# Format: OAuth client secret - 40 hexadecimal characters
# Verify: POST to github.com/login/oauth/access_token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "github-oauth-secret"
name = "GitHub OAuth Client Secret"
service = "github"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
min_confidence = 0.2
keywords = ["GITHUB_CLIENT_SECRET", "github_client_secret", "GH_CLIENT_SECRET"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:GITHUB|github|GH)[_.]?(?:CLIENT|client)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-f0-9]{40})"
description = "GitHub OAuth client secret with context anchor"
group = 1

[[detector.companions]]
name = "client_id"
regex = "(?:GITHUB|github|GH)[_.]?(?:CLIENT|client)[_.]?(?:ID|id)[=:\\s\"'']+([A-Za-z0-9_\\.]{8,64})"
within_lines = 5

[[detector.tests]]
test_positive = "GITHUBCLIENTSECRET=435cd3e0afae058598381e2e78433a8627569f8b"
test_negative = "GITHUBCLIENTSECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
