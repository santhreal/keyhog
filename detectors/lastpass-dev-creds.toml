[detector]
id = "lastpass-dev-creds"
name = "LastPass 2022 Developer Credentials"
service = "lastpass"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["lastpass", "LastPass", "LASTPASS"]

[[detector.patterns]]
regex = '(?i)lastpass[\s_\-:.=]*\bid[=:]\s*([0-9]{7,})'
group = 1

[[detector.tests]]
test_positive = "lastpass id=9860386"
test_negative = "microsoft_advertising client_id=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
