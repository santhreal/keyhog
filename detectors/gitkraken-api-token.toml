# Docs: https://www.gitkraken.com/faq
# Format: GitKraken uses OAuth for API access, no fixed token format
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "gitkraken-api-token"
name = "GitKraken API Token"
service = "gitkraken"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["gitkraken", "GITKRAKEN", "gk_token"]

[[detector.patterns]]
regex = "(?:gitkraken|GITKRAKEN)[_-]?(?:api|API)?[_-]?(?:token|TOKEN|key|KEY)[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "GitKraken API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:gk_|GK_)[a-zA-Z0-9_-]{32,}"
description = "GitKraken token with gk_ prefix"

[[detector.tests]]
test_positive = "GITKRAKEN_API_TOKEN=kNs3EZ4wEbUKziWzK4NuOvNHax3qKZLS"
test_negative = "GITKRAKEN_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
