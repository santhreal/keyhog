# Docs: https://developer.playstation.com/ps5-devkit/docs/
# Format: 64 character hex string, no unique prefix
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "playstation-api-key"
name = "PlayStation Network API Key"
service = "playstation"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["PSN_API_KEY", "PLAYSTATION_API", "psn_client_secret", "NPSSO"]

[[detector.patterns]]
regex = '''(?:PSN_API_KEY|PLAYSTATION_API|psn_client_secret|NPSSO)[=:\s"']+([a-f0-9]{64})'''
description = "PlayStation Network API key (64 hex chars with context anchor)"
group = 1

[[detector.tests]]
test_positive = "PSN_API_KEY=39ff7f8437d8ac46e79536bc00e27c0a367fbb9357961603fddf2b5706196f97"
test_negative = "PSN_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
