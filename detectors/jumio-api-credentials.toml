# Docs: https://documentation.jumio.ai/
# Format: OAuth2 Client ID and Client Secret, or Basic Auth with API token/secret
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "jumio-api-credentials"
name = "Jumio API Credentials"
service = "jumio"
severity = "high"
# "api_token", "client_id", "client_secret" removed: over-broad generic prefilter(s) the regex does NOT need — every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["jumio"]

[[detector.patterns]]
regex = "(?i)(?:jumio)[_\\s]*(api[_\\s]*token|client[_\\s]*id)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Jumio API token or Client ID with context anchor"
group = 2

[[detector.patterns]]
regex = "(?i)(?:jumio)[_\\s]*(api[_\\s]*secret|client[_\\s]*secret)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Jumio API or client secret with context anchor"
group = 2

[[detector.companions]]
name = "jumio_secret"
regex = "(?i)(?:jumio)[_\\s]*(api[_\\s]*secret|client[_\\s]*secret)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
within_lines = 5

[[detector.tests]]
test_positive = "jumio client_secret LwJodFX1GOZrhrztAQpiN0k8s0Rc3VgTg9abcd"
test_negative = "jumio client_secret short"
