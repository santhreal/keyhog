# Docs: https://docs.helicone.ai/helicone-headers/helicone-auth
# Format: sk-* for read keys, pk-* for write keys, eu-* for EU region keys
# Verify: no public verification endpoint
# Prefix: sk-, pk-, or eu-

[detector]
id = "helicone-api-key"
name = "Helicone API Key"
service = "helicone"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["sk-", "pk-", "eu-", "HELICONE_API_KEY", "Helicone-Auth"]

# Anchor each short prefix to start-of-string or a non-identifier byte.
# Unanchored, `sk-` / `pk-` / `eu-` match mid-identifier in C/JS/Go
# source and inside Caesar-decoded natural-language runs (sqlite
# GNUmakefile via /caesar fired 1 FP in dogfood 2026-05-26).
[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(sk-[a-zA-Z0-9]{20,})'
description = "Helicone read API key (sk- prefix, anchored)"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(pk-[a-zA-Z0-9]{20,})'
description = "Helicone write API key (pk- prefix, anchored)"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(eu-[a-zA-Z0-9]{20,})'
description = "Helicone EU region API key (eu- prefix, anchored)"
group = 1

[[detector.tests]]
test_positive = "sk-0ocqX7mxUDlWFHzlNiC0oKONoezJ9vAX"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
