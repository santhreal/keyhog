# Docs: https://docs.sendgrid.com/for-developers/tracking-events/getting-started-event-webhook-security-features
# Format: 32-48 character hexadecimal string used for HMAC-SHA256 signature verification
# Verify: no public verification endpoint (local signature verification only)
# Prefix: none (requires context anchoring)

[detector]
id = "sendgrid-webhook-signing-secret"
name = "SendGrid Webhook Signing Secret"
service = "sendgrid"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SENDGRID_WEBHOOK_SECRET", "sendgrid_webhook_secret", "webhook_secret", "X-Twilio-Email-Event-Webhook-Signature"]

[[detector.patterns]]
regex = "(?:SENDGRID|sendgrid)[._-]?(?:WEBHOOK|webhook)[._-]?(?:SECRET|secret|SIGNING|signing)[=:\\s\"'']+([a-f0-9]{32,48})"
description = "SendGrid webhook signing secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:SENDGRID|sendgrid)[._-]?(?:PUBLIC|public)[._-]?(?:KEY|key)[=:\\s\"'']+([a-f0-9]{32,48})"
description = "SendGrid webhook public key for signature verification"
group = 1

[[detector.tests]]
test_positive = "SENDGRIDWEBHOOKSIGNING=fcbd4f520552bce529c480d614790d74"
test_negative = "SENDGRIDWEBHOOKSIGNING=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
