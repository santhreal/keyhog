# Docs: https://planetscale.com/docs/api/reference/service-tokens
# Format: API token for PlanetScale platform access with pscale_tkn_ prefix
# Verify: GET /v1/organizations with Authorization header returns 200 if valid
# Prefix: pscale_tkn_

[detector]
id = "planetscale-api-token-v2"
name = "PlanetScale API Token v2"
service = "planetscale"
severity = "high"
keywords = ["pscale_tkn", "planetscale", "PLANETSCALE_API_TOKEN"]

[[detector.patterns]]
regex = "pscale_tkn_[a-zA-Z0-9_-]{32,}"
description = "PlanetScale API token v2 (pscale_tkn_ prefix, URL-safe body)"

[[detector.patterns]]
regex = "(?:PLANETSCALE|planetscale)[_\\s]?API[_\\s]?TOKEN[=:\\s\"'']+(pscale_tkn_[a-zA-Z0-9_-]{32,})"
description = "PlanetScale API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.planetscale.com/v1/organizations"
allowed_domains = ["api.planetscale.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pscale_tkn_93iwbHaZKAmZqjeAwhEWgwf3zowdD5bu"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
