# Docs: https://planetscale.com/docs/api/reference/service-tokens
# Format: API token for PlanetScale platform access with pscale_tkn_ prefix
# Verify: GET /v1/organizations with Authorization header returns 200 if valid
# Prefix: pscale_tkn_

[detector]
id = "planetscale-api-token-v2"
name = "PlanetScale API Token v2"
service = "planetscale"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["pscale_tkn", "planetscale", "PLANETSCALE_API_TOKEN"]

[[detector.patterns]]
regex = "pscale_tkn_[a-zA-Z0-9_-]{32,}"
description = "PlanetScale API token v2 (pscale_tkn_ prefix, URL-safe body)"

[[detector.patterns]]
regex = '''(?:PLANETSCALE|planetscale)[_\-\s]*API[_\-\s]*TOKEN[=:\s"'']+(pscale_tkn_[a-zA-Z0-9_-]{32,})'''
description = "PlanetScale API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.planetscale.com/v1/organizations"
allowed_domains = ["api.planetscale.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pscale_tkn_93iwbHaZKAmZqjeAwhEWgwf3zowdD5bu"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
