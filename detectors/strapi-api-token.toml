# Docs: https://docs.strapi.io/dev-docs/configurations/api-tokens
# Format: API token generated via admin panel, passed as bearer token in Authorization header
# Verify: GET /api/users/me with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "strapi-api-token"
name = "Strapi API Token"
service = "strapi"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["STRAPI_API_TOKEN", "strapi", "API_TOKEN_SALT"]

[[detector.patterns]]
regex = '''(?:STRAPI|strapi)[_\-\s]*API[_\-\s]*TOKEN[=:\s"'']+([a-zA-Z0-9]{20,})'''
description = "Strapi API token with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization:\\s*[Bb]earer\\s+([a-zA-Z0-9]{30,})[^\\n]*strapi"
description = "Strapi bearer token with context"
group = 1

[[detector.tests]]
test_positive = "STRAPI_API_TOKEN=OrJrppxooyD3eXgeGAD6"
test_negative = "STRAPI_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
