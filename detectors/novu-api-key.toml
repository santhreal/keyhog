# Docs: https://docs.novu.co/api-reference/overview
# Format: nvu_ prefix followed by alphanumeric characters (typically 40+ chars)
# Verify: GET /v1/environments/me with ApiKey header returns 200 if valid
# Prefix: nvu_

[detector]
id = "novu-api-key"
name = "Novu API Key"
service = "novu"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["nvu_"]

[[detector.patterns]]
regex = 'nvu_[a-zA-Z0-9]{30,}'
description = "Novu API key (nvu_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.novu.co/v1/environments/me"
allowed_domains = ["api.novu.co"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "ApiKey {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "nvu_JYpcTUFDffTRWNapX7YqCQNvLP5lpJRX"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
