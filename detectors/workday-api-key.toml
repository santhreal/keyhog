# Docs: https://docs.workday.com/en-us/admin_guide/ch_api_rest_api.html
# Format: Base64 encoded credentials or bearer token for REST API
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "workday-api-key"
name = "Workday API Key"
service = "workday"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["workday", "WD_HOST", "WD_USER", "WD_PASSWORD"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:workday|WD)[._-]?(?:host|tenant|instance)[=:\\s\"'']+([a-z0-9-]+\\.workday\\.com)"
required_literals = [".workday.com"]
description = "Workday tenant hostname"
group = 1

[[detector.patterns]]
regex = "(?:workday|WD)[._-]?(?:user|username)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
required_literals = ["user"]
description = "Workday username with context anchor"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:workday|WD)[._-]?(?:pass|password|pwd)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "Workday password with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:workday|WD)[._-]?(?:token|api[_\-\s]*key|bearer)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Workday API token/bearer with context anchor"
group = 1

[[detector.tests]]
test_positive = "WD.tenant :'   \"\"':'      '            :  \"' :54mjwwtk73-7zxl11dknajfhduuh2afa51xv6hqbd9rzkboo2a0tqfke6a9zxu7poeyzriabsbi3-qxkd2z00m2ynphds.workday.com"
test_negative = "WD.tenant :'   \"\"':'      '            :  \"' :YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
