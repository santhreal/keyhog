# Docs: https://docs.sonarsource.com/sonarqube-server/latest/extension-guide/web-api/
# Format: 40-character alphanumeric string (SHA-1 hash style)
# Verify: GET /api/server/version with Authorization: Bearer header
# Prefix: none (40 char hex/alphanumeric, requires context anchoring)

[detector]
id = "sonarqube-token"
name = "SonarQube API Token"
service = "sonarqube"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SONARQUBE", "sonarqube", "SONAR_TOKEN", "SONARQUBE_TOKEN", "SONAR_HOST_URL"]

[[detector.patterns]]
regex = "(?:SONAR|sonar)(?:_?QUBE|_?qube)?(?:_?TOKEN|_?token)?[=:\\s\"'']+([a-f0-9]{40})"
description = "SonarQube API token with context anchor (40 hex characters)"
group = 1

[detector.verify]
method = "GET"
url = "https://sonarcloud.io/api/server/version"
allowed_domains = ["sonarcloud.io"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "SONAR=204f1387a0335f63afce7b2685befb39f7cf1d26"
test_negative = "SONAR=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
