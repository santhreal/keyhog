# Docs: https://cloud.google.com/source-repositories/docs/authentication
# Format: Service account JSON key or SSH key for Cloud Source Repositories
# Verify: gcloud source repos list or git authentication
# Prefix: none (requires context anchoring)

[detector]
id = "google-cloud-source-repos-credentials"
name = "Google Cloud Source Repositories Credentials"
service = "google-cloud"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["source.developers.google.com", "cloud-source-repos", "source.repos"]

[[detector.patterns]]
regex = "source\\.developers\\.google\\.com/p/[a-z0-9-]+/r/[a-zA-Z0-9_-]+"
description = "Google Cloud Source Repositories URL"

[[detector.patterns]]
regex = '''(?:cloud[_\-\s]*source[_\-\s]*repos|CLOUD[_\-\s]*SOURCE[_\-\s]*REPOS)[=:\s"'']+(?:https?://)?(?:[^\s"'']*@)?source\.developers\.google\.com'''
description = "Google Cloud Source Repositories reference with context anchor"

[[detector.companions]]
name = "service_account"
regex = "[a-zA-Z0-9_-]+@[a-zA-Z0-9_-]+\\.iam\\.gserviceaccount\\.com"
within_lines = 10

[[detector.tests]]
test_positive = "source.developers.google.com/p/99d4n72n2dr6cv241hz6prw9qqzlcgi4q7is3vpoc3abr33sa5x7efkl95hkpn2u6ysbth94/r/0_cx3NR0Uib50rRy5SY1JsOQHhNUl9mkCF5zNsFbn8QEE19d"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
