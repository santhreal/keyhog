# Docs: https://www.git-tower.com/help/guides/integration/services
# Format: Tower is a Git client that stores service credentials, no unique API format
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "tower-api-credentials"
name = "Tower API Credentials"
service = "tower"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["tower", "TOWER", "gittower", "git-tower"]

[[detector.patterns]]
regex = "(?:tower|TOWER)[_-]?(?:api|API|service|SERVICE)?[_-]?(?:token|TOKEN|key|KEY|password|PASSWORD)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*+=/-]{16,})"
description = "Tower API credentials with context anchor"
group = 1

[[detector.tests]]
test_positive = "towerSERVICEtoken\"  :\" ''  :  \"\"' :'=  = :=@gAdtFo%B!tcnSl+A-Rt5xEuxu&LLVA0y+@oNZhSj4EWn1nb"
test_negative = "towerSERVICEtoken\"  :\" ''  :  \"\"' :'=  = :=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
