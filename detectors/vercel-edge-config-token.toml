# Docs: https://vercel.com/docs/storage/edge-config
# Format: ecfg_ prefix followed by 64 alphanumeric characters
# Verify: no public verification endpoint
# Prefix: ecfg_

[detector]
id = "vercel-edge-config-token"
name = "Vercel Edge Config Token"
service = "vercel"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ecfg_", "EDGE_CONFIG", "edge_config"]

[[detector.patterns]]
regex = 'ecfg_[a-zA-Z0-9]{64}'
description = "Vercel Edge Config connection string token"

[[detector.tests]]
test_positive = "ecfg_FW0BvtwcVjSHNW3E6sEiFh0poCf29bK44SnLZMBrT1n50X5B4rwblqa1FZS2k64F"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
