# Docs: https://www.backblaze.com/docs/cloud-storage-application-keys
# Format: K00M prefix followed by 25+ alphanumeric/base64 characters for v2 keys
# Verify: POST /b2api/v2/b2_authorize_account with Basic auth - no simple public verification
# Prefix: K00M

[detector]
id = "backblaze-b2-app-key-v2"
name = "Backblaze B2 Application Key (v2)"
service = "backblaze"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["K00M", "K00N", "b2_app_key", "B2_APP_KEY", "backblaze_v2"]

[[detector.patterns]]
regex = 'K00[MN][a-zA-Z0-9_-]{20,}'
description = "Backblaze B2 v2 application key (K00M/K00N prefix)"

# Companion: Application Key ID (needed alongside the application key)
[[detector.companions]]
name = "application_key_id"
regex = '[0-9a-f]{20,24}'
within_lines = 5

[[detector.tests]]
test_positive = "K00MKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx"
test_negative = "K00Mshort"
