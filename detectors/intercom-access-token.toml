# Docs: https://developers.intercom.com/docs/build-an-integration/learn-more/authentication
# Format: Base64 encoded string starting with dG9r (token prefix)
# Verify: GET request to Intercom API /me endpoint with Bearer authorization
# Prefix: dG9r

[detector]
id = "intercom-access-token"
name = "Intercom Access Token"
service = "intercom"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["dG9r"]

# Real Intercom tokens are base64 strings whose underlying bytes
# start with the ASCII "tok" - so `dG9r` IS the literal first four
# characters of the token. The original pattern matched `dG9r`
# anywhere in a base64 blob, which fires inside any macaroon /
# JWT / arbitrary protobuf whose base64 encoding happens to spell
# "tok" at the right 3-byte alignment.  bat-go's services/skus/
# skus.go ships 9 Brave SKU macaroons that contain `dG9r` (= "tok"
# in macaroon's `... sku token v1` identifier string).  Anchor the
# pattern to the start of a quote/equals/colon-bounded literal so
# it only fires on actual leading-`dG9r` strings.
[[detector.patterns]]
# Triple-quoted literal so the single-quote inside the character
# class (`["='\s]`) doesn't collapse a TOML basic literal string.
# The previous form `'...["''\s]...'` is a TOML parse error - a
# single-quoted literal cannot contain `'`. The detector silently
# vanished from the embedded corpus (the build counted 891 but
# 890 actually loaded). 2026-05-26.
regex = '''(?:^|[="'\s])(dG9r[a-zA-Z0-9+/]{100,}={0,2})'''
description = "Intercom access token (base64 encoded, anchored to start)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.intercom.io/me"
allowed_domains = ["api.intercom.io"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "dG9rKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpTr"
test_negative = "dG9rshort"
