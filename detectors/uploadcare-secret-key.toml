# Docs: https://uploadcare.com/docs/keys/
# Format: 32 hexadecimal characters (hex string, no dashes)
# Verify: none (requires public key pair for verification)
# Prefix: none (generic hex, requires context anchoring)

[detector]
id = "uploadcare-secret-key"
name = "Uploadcare Secret Key"
service = "uploadcare"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["UPLOADCARE_SECRET", "UPLOADCARE_SECRET_KEY", "secret_key", "demosecretkey"]

[[detector.patterns]]
regex = "(?:UPLOADCARE|uploadcare)[._-]?(?:SECRET)[=:\\s\"']+([a-f0-9]{32})"
description = "Uploadcare secret key (32 hex chars) with context anchor"
group = 1

# Companion: Public key (required for REST API authentication). Public/secret
# pairs live next to each other in env config; within_lines=5 is the
# natural anchor and satisfies the pure-character-class validator rule.
[[detector.companions]]
name = "public_key"
regex = "(?:UPLOADCARE|uploadcare)[._-]?(?:PUBLIC)[=:\\s\"']+([a-f0-9]{32})"
within_lines = 5

[[detector.tests]]
test_positive = "UPLOADCARESECRET=4cced4550e9d69a5dd31e9633b313a70"
test_negative = "UPLOADCARESECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
