# Docs: https://www.openssh.com/manual.html
# Format: PEM-encoded private key block (RSA, EC, DSA, ED25519, OpenSSH)
# Verify: none (private keys have no service-owned network endpoint)
# Prefix: -----BEGIN (distinctive PEM header)

[detector]
id = "ssh-private-key"
name = "SSH Private Key"
service = "ssh"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["BEGIN", "PRIVATE KEY", "OPENSSH", "RSA", "EC PRIVATE", "DSA"]
# Private-key block: the match span is an enclosing PEM/OpenSSH key body, so
# resolution suppresses lower-specificity findings nested inside it through this
# detector-owned flag.
private_key_block = true

# Capture the full BEGIN/END block, not just the header marker. Header-only
# captures are identical across distinct keys of the same type and collapse
# under credential-scope dedup. BEGIN/END variants are paired explicitly so
# adjacent or malformed PEM blocks cannot over-capture across mismatched ends.
[[detector.patterns]]
regex = '(?:-----BEGIN RSA PRIVATE KEY-----[\s\S]*?-----END RSA PRIVATE KEY-----|-----BEGIN EC PRIVATE KEY-----[\s\S]*?-----END EC PRIVATE KEY-----|-----BEGIN DSA PRIVATE KEY-----[\s\S]*?-----END DSA PRIVATE KEY-----|-----BEGIN OPENSSH PRIVATE KEY-----[\s\S]*?-----END OPENSSH PRIVATE KEY-----|-----BEGIN PRIVATE KEY-----[\s\S]*?-----END PRIVATE KEY-----)'
description = "SSH/TLS private key in PEM format (full BEGIN/END block)"

[[detector.patterns]]
regex = '-----BEGIN ENCRYPTED PRIVATE KEY-----[\s\S]*?-----END ENCRYPTED PRIVATE KEY-----'
description = "Encrypted private key, full block (still sensitive - password may be weak)"

[[detector.tests]]
test_positive = "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASC\n-----END PRIVATE KEY-----"
test_negative = "-----BEGIN EC PRIVATE KEY-----"
