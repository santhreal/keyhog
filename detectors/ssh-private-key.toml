# Docs: https://www.openssh.com/manual.html
# Format: PEM-encoded private key block (RSA, EC, DSA, ED25519, OpenSSH)
# Verify: Parse key to check validity (no remote endpoint needed)
# Prefix: -----BEGIN (distinctive PEM header)

[detector]
id = "ssh-private-key"
name = "SSH Private Key"
service = "ssh"
severity = "critical"
keywords = ["BEGIN", "PRIVATE KEY", "OPENSSH", "RSA", "EC PRIVATE", "DSA"]

# Capture the full BEGIN/END block, not just the header marker. Header-only
# captures are identical across distinct keys of the same type and collapse
# under credential-scope dedup. BEGIN/END variants are paired explicitly so
# adjacent or malformed PEM blocks cannot over-capture across mismatched ends.
[[detector.patterns]]
regex = '(?:-----BEGIN RSA PRIVATE KEY-----[\s\S]*?-----END RSA PRIVATE KEY-----|-----BEGIN EC PRIVATE KEY-----[\s\S]*?-----END EC PRIVATE KEY-----|-----BEGIN DSA PRIVATE KEY-----[\s\S]*?-----END DSA PRIVATE KEY-----|-----BEGIN OPENSSH PRIVATE KEY-----[\s\S]*?-----END OPENSSH PRIVATE KEY-----|-----BEGIN PRIVATE KEY-----[\s\S]*?-----END PRIVATE KEY-----)'
description = "SSH/TLS private key in PEM format (full BEGIN/END block)"

[[detector.patterns]]
regex = '-----BEGIN ENCRYPTED PRIVATE KEY-----[\s\S]*?-----END ENCRYPTED PRIVATE KEY-----'
description = "Encrypted private key, full block (still sensitive - password may be weak)"

[detector.verify]
method = "GET"
url = "https://localhost:0/health"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASC\n-----END PRIVATE KEY-----"
test_negative = "-----BEGIN EC PRIVATE KEY-----"
