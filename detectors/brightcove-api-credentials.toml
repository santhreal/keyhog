# Docs: https://apis.support.brightcove.com/getting-started/authentication-brightcove-apis.html
# Format: Client ID is 40 hex characters; Client Secret is 40+ hex characters
# Verify: POST to OAuth endpoint to get access token
# Prefix: none (requires context anchoring)

[detector]
id = "brightcove-api-credentials"
name = "Brightcove API Credentials"
service = "brightcove"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["brightcove", "BRIGHTCOVE", "BC_CLIENT_ID", "BC_CLIENT_SECRET", "brightcove.com"]

[[detector.patterns]]
regex = '''(?:brightcove|BRIGHTCOVE)[_\-\s]*(?:client_id|CLIENT_ID)[=:\s"'']+([a-f0-9]{40})'''
description = "Brightcove OAuth Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:brightcove|BRIGHTCOVE)[_\-\s]*(?:client_secret|CLIENT_SECRET)[=:\s"'']+([a-f0-9]{40,64})'''
description = "Brightcove OAuth Client Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "BC_CLIENT_ID[=:\\s\"'']+([a-f0-9]{40})"
description = "Brightcove Client ID from environment variable"
group = 1

[[detector.patterns]]
regex = "BC_CLIENT_SECRET[=:\\s\"'']+([a-f0-9]{40,64})"
description = "Brightcove Client Secret from environment variable"
group = 1

[[detector.tests]]
test_positive = "brightcove_client_id=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d3a5e9f1b"
test_negative = "brightcove_client_id=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d3a5e9f"
