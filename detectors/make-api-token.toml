# Docs: https://www.make.com/en/help/api/authentication
# Format: <32 hex chars>-<4 hex chars>-<4 hex chars>-<4 hex chars>-<12 hex chars>
# Verify: GET /users/me with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "make-api-token"
name = "Make (Integromat) API Token"
service = "make"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["MAKE_API_KEY", "INTEGROMAT_API_KEY", "make.com", "integromat"]

[[detector.patterns]]
regex = "(?:MAKE_API_KEY|INTEGROMAT_API_KEY|make|integromat)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Make/Integromat API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://us1.make.com/api/v2/users/me"
allowed_domains = ["us1.make.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Token {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "MAKE_API_KEY=14609521-cd2f-544c-595f-3590c5bafa3e"
test_negative = "MAKE_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
