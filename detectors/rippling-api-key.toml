# Docs: https://developer.rippling.com/documentation/rest-api
# Format: Bearer token - starts with 'rpl_' prefix for new tokens, or specific alphanumeric patterns
# Verify: GET /platform/api/me with Bearer token returns 200 if valid
# Prefix: rpl_ (new format), or context-anchored only for legacy

[detector]
id = "rippling-api-key"
name = "Rippling API Key"
service = "rippling"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["RIPPLING_API_KEY", "RIPPLING_TOKEN", "rippling_api_key", "rpl_"]

[[detector.patterns]]
regex = "(?:RIPPLING_API_KEY|RIPPLING_TOKEN|rippling_api_key)[=:\\s\"'\\']+(rpl_[a-zA-Z0-9]{40,})"
description = "Rippling API key with rpl_ prefix (new format)"
group = 1

[[detector.patterns]]
regex = "(?:Authorization:[\\s]*)Bearer[\\s]+(rpl_[a-zA-Z0-9]{40,})"
description = "Rippling bearer token with rpl_ prefix in Authorization header"
group = 1

[detector.verify]
method = "GET"
url = "https://api.rippling.com/platform/api/me"
allowed_domains = ["api.rippling.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "RIPPLING_API_KEY=rpl_pg0ojWl4O6csMlO2HpDTI3SSFHHWXK1qPljpRyeP"
test_negative = "RIPPLING_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
