# Docs: https://docs.budibase.com/docs/budibase-cli-reference
# Format: BUDIBASE_ prefixed environment variables with API keys and internal tokens
# Verify: no public verification endpoint (self-hosted)
# Prefix: BUDIBASE_

[detector]
id = "budibase-credentials"
name = "Budibase Credentials"
service = "budibase"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["BUDIBASE", "budibase", "INTERNAL_API_KEY"]

[[detector.patterns]]
regex = "BUDIBASE_[A-Z_]*(?:API_KEY|SECRET|PASSWORD|TOKEN)[=:\\s\"'']+([a-zA-Z0-9_\\-]{20,})"
description = "Budibase API key or secret environment variable"
group = 1

[[detector.patterns]]
regex = "INTERNAL_API_KEY[=:\\s\"'']+([a-zA-Z0-9_\\-]{16,})"
description = "Budibase internal API key"
group = 1

[[detector.patterns]]
regex = "(?:JWT_SECRET|API_ENCRYPTION_KEY)[=:\\s\"'']+([a-zA-Z0-9_\\-\\/\\+]{20,}={0,2})"
description = "Budibase encryption or JWT secret"
group = 1

[[detector.patterns]]
regex = "(?:COUCH_DB|MINIO|REDIS)_(?:PASSWORD|SECRET_KEY)[=:\\s\"'']+([a-zA-Z0-9_\\-]{12,})"
description = "Budibase infrastructure credentials"
group = 1

[[detector.tests]]
test_positive = "BUDIBASE_INTERNAL_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "BUDIBASE_API_KEY=Kp4Qx7Rm"
