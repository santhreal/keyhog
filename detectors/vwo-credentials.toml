# Docs: https://developers.vwo.com/reference/introduction-1
# Format: numeric account ID paired with API token
# Verify: GET /v2/accounts/{account_id}/campaigns with token
# Prefix: none (requires context anchoring)

[detector]
id = "vwo-credentials"
name = "VWO Credentials"
service = "vwo"
severity = "high"
keywords = ["VWO", "vwo", "VWO_TOKEN"]

[[detector.patterns]]
regex = "(?:VWO|vwo)[_:](?:API_TOKEN|api_token|TOKEN|token)[=:][\\s\"'']*([a-zA-Z0-9_-]{20,})"
description = "VWO API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:VWO|vwo)[_:](?:ACCOUNT_ID|account_id)[=:][\\s\"'']*(\\d{5,})"
description = "VWO account ID"
group = 1

[detector.verify]
method = "GET"
url = "https://vwo.com/api/v2/accounts/me"
allowed_domains = ["vwo.com"]

[detector.verify.auth]
type = "header"
name = "token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "vwo_api_token=     \"      '    BRFwNZRamze6JYOspg3DmD"
test_negative = "vwo_api_token=     \"      '    YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
