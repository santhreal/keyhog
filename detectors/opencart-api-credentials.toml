# Docs: https://docs.opencart.com/en-gb/system/users/api/
# Format: API key (128+ character string) with associated username
# Verify: POST to /index.php?route=api/login with api_id and key
# Prefix: none (requires context anchoring)

[detector]
id = "opencart-api-credentials"
name = "OpenCart API Credentials"
service = "opencart"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["opencart", "OPENCART", "api_id", "opencart_api"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:opencart|OPENCART)[_=:\\s\"'']+(?:api[_-]?key|key)[=:\\s\"'']+([a-zA-Z0-9]{128,})"
description = "OpenCart API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:opencart|OPENCART)[_=:\\s\"'']+(?:api[_-]?username|username)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "OpenCart API username with context anchor"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "OPENCART_api_key=Aa9Fz3Lm7Qp2Rv8Wx4Nc6Yt1Bd5Gh0Ks9Pu3Vq7Jm2Te8Ln4Rx6Cy1Hw5Da0Fp9Uz3Mk7Qb2Vs8Nw4Xe6Cr1Gy5Ld0Hp9Ta3Kq7Mb2Vz8Rn4Wc6Fx1Jy5Sd0Lu9Pb3Qe7Xm2Vt8Nk4"
test_negative = "OPENCART_api_key=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
