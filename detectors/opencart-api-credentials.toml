# Docs: https://docs.opencart.com/en-gb/system/users/api/
# Format: API key (128+ character string) with associated username
# Verify: POST to /index.php?route=api/login with api_id and key
# Prefix: none (requires context anchoring)

[detector]
id = "opencart-api-credentials"
name = "OpenCart API Credentials"
service = "opencart"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["opencart", "OPENCART", "api_id", "opencart_api"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:opencart|OPENCART)[_=:\s"'']+(?:api[_\-\s]*key|key)[=:\s"'']+([a-zA-Z0-9]{128,})'''
description = "OpenCart API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:opencart|OPENCART)[_=:\s"'']+(?:api[_\-\s]*username|username)[=:\s"'']+([a-zA-Z0-9_-]+)'''
description = "OpenCart API username with context anchor"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "OPENCART_api_key=Aa9Fz3Lm7Qp2Rv8Wx4Nc6Yt1Bd5Gh0Ks9Pu3Vq7Jm2Te8Ln4Rx6Cy1Hw5Da0Fp9Uz3Mk7Qb2Vs8Nw4Xe6Cr1Gy5Ld0Hp9Ta3Kq7Mb2Vz8Rn4Wc6Fx1Jy5Sd0Lu9Pb3Qe7Xm2Vt8Nk4"
test_negative = "OPENCART_api_key=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
