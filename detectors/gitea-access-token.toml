# Docs: https://docs.gitea.com/development/api-usage (access token)
# Format: lowercase hex, keyword-anchored on `gitea`. Two real shapes in the
#   betterleaks homefield ground truth: `GITEA_TOKEN=<32–40 hex>` assignment and
#   a `gitea@<40 hex>` git-remote URL form. No unique prefix, so `gitea` anchors it.
# Verify: none (self-hosted; host varies (never send to a fake verifier)).
# Prefix: none (keyword-anchored on `gitea`).

[detector]
id = "gitea-access-token"
name = "Gitea Access Token"
service = "gitea"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["gitea"]

[[detector.patterns]]
regex = '''(?i)gitea[_-]?token['"\s]*[:=]['"\s]*([a-f0-9]{32,40})'''
description = "Gitea access token in a GITEA_TOKEN assignment"
group = 1

[[detector.patterns]]
regex = '''(?i)gitea@([a-f0-9]{40})'''
description = "Gitea access token embedded in a gitea@<token> git-remote URL"
group = 1

[[detector.tests]]
test_positive = "GITEA_TOKEN=5aab40e433037523cc70af7d3894a0fa"
test_negative = "GITEA_TOKEN=deadbeef"
