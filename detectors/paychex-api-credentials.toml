# Docs: https://developer.paychex.com/documentation
# Format: OAuth 2.0 Client ID and Client Secret (alphanumeric strings)
# Verify: POST /auth/oauth/v2/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "paychex-api-credentials"
name = "Paychex API Credentials"
service = "paychex"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["PAYCHEX_CLIENT_ID", "PAYCHEX_CLIENT_SECRET", "paychex"]

[[detector.patterns]]
regex = "(?:PAYCHEX_CLIENT_ID|paychex_client_id)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Paychex API client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PAYCHEX_CLIENT_SECRET|paychex_client_secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Paychex API client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PAYCHEX_API_KEY|paychex_api_key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Paychex API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "PAYCHEX_CLIENT_ID=L979NZXDahGSlqozkR8h"
test_negative = "PAYCHEX_CLIENT_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
