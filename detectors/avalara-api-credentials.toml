# Docs: https://developer.avalara.com/avatax/authentication-in-rest/
# Format: Account ID (numeric) + License Key (alphanumeric). No unique prefix for license key.
# Verify: Basic auth to AvaTax API with account_id:license_key
# Prefix: none (requires context anchoring)

[detector]
id = "avalara-api-credentials"
name = "Avalara API Credentials"
service = "avalara"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "account_id" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept). Recall-neutral.
keywords = ["AVALARA", "avatax", "license_key"]


[[detector.companions]]
name = "account_id"
regex = "(?:AVALARA|AVATAX|avalara)[._]?(?:ACCOUNT|account)[._]?(?:ID|id)[=:\\s\"'']+(\\d{6,})"
within_lines = 5
required = false

[[detector.patterns]]
regex = "\\b(?:AVALARA|AVATAX|avalara)[._]?(?:LICENSE|license)[._]?KEY[=:\\s\"'']+([a-zA-Z0-9]{16,})"
description = "Avalara license key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://rest.avatax.com/api/v2/utilities/ping"
allowed_domains = ["rest.avatax.com"]
[detector.verify.success]
status = 200

[detector.verify.auth]
type = "basic"
username = "companion.account_id"
password = "match"

[[detector.tests]]
test_positive = "AVALARA_ACCOUNT_ID=1234567\nAVALARA_LICENSE_KEY=Kp4Qx7Rm2Sn5Tb8V"
test_negative = "LICENSE_KEY=Kp4Qx7Rm2Sn5Tb8V"
