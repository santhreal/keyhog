# Docs: https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-envvars.html
# Format: Session token emitted with temporary AWS credentials; typically long base64-like text
# Verify: none (a session token is not safely verifiable without the matching access key ID and secret key)
# Prefix: none (requires AWS-specific env/header/query anchors)

[detector]
id = "aws-session-token"
name = "AWS Session Token"
service = "aws"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.25
keywords = ["AWS_SESSION_TOKEN", "aws_session_token", "X-Amz-Security-Token"]

[[detector.patterns]]
regex = "\\bAWS_SESSION_TOKEN[=:\\s\"']+([A-Za-z0-9/+=]{64,})[\"']?"
description = "AWS session token with uppercase environment variable anchor"
group = 1

[[detector.patterns]]
regex = "\\baws_session_token[=:\\s\"']+([A-Za-z0-9/+=]{64,})[\"']?"
description = "AWS session token with lowercase environment variable anchor"
group = 1

[[detector.patterns]]
regex = "\\bX-Amz-Security-Token[=:\\s\"']+([A-Za-z0-9%/+_=-]{64,})[\"']?"
description = "AWS session token with SigV4 header anchor"
group = 1

[[detector.tests]]
test_positive = "AWS_SESSION_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw"
test_negative = "AWS_SESSION_TOKEN=short"
