# Docs: https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-envvars.html
# Format: Session token emitted with temporary AWS credentials; typically long base64-like text
# Verify: none (a session token is not safely verifiable without the matching access key ID and secret key)
# Prefix: none (requires AWS-specific env/header/query anchors)

[detector]
id = "aws-session-token"
name = "AWS Session Token"
service = "aws"
severity = "high"
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.25
keywords = ["AWS_SESSION_TOKEN", "aws_session_token", "X-Amz-Security-Token"]

[[detector.patterns]]
regex = "\\bAWS_SESSION_TOKEN[=:\\s\"']+([A-Za-z0-9/+=]{80,})[\"']?"
description = "AWS session token with uppercase environment variable anchor"
group = 1

[[detector.patterns]]
regex = "\\baws_session_token[=:\\s\"']+([A-Za-z0-9/+=]{80,})[\"']?"
description = "AWS session token with lowercase environment variable anchor"
group = 1

[[detector.patterns]]
regex = "\\bX-Amz-Security-Token[=:\\s\"']+([A-Za-z0-9%/+_=-]{80,})[\"']?"
description = "AWS session token with SigV4 header anchor"
group = 1
