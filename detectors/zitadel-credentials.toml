# Docs: https://zitadel.com/docs/guides/integrate/service-accounts/client-credentials
# Format: Client ID and Client Secret pair or JWT profile key
# Verify: POST to /oauth/v2/token endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "zitadel-credentials"
name = "Zitadel Credentials"
service = "zitadel"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["ZITADEL_CLIENT_ID", "ZITADEL_CLIENT_SECRET", "zitadel"]

[[detector.patterns]]
regex = '''(?:ZITADEL[_\-\s]*CLIENT[_\-\s]*ID)[=:\s"'']+([0-9]+@[a-zA-Z0-9_-]+)'''
description = "Zitadel client ID (numeric ID with domain suffix)"
group = 1

[[detector.patterns]]
regex = '''(?:ZITADEL[_\-\s]*CLIENT[_\-\s]*SECRET)[=:\s"'']+([a-zA-Z0-9_-]{40,})'''
description = "Zitadel client secret with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:ZITADEL[_\-\s]*PAT|ZITADEL[_\-\s]*TOKEN)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Zitadel Personal Access Token with context anchor"
group = 1

[[detector.tests]]
test_positive = "ZITADEL_CLIENT_ID'=: \"   = :' '\"  \"'= ' : :: '=026872073025511376316550890476800291616585578763991404020219251215888264506326@oH4gu9Jx3tiTyHELUTtq5vprbVJFH-8BPOJ1mKZtbFSvNKKeTdvgJG4"
test_negative = "ZITADEL_CLIENT_ID'=: \"   = :' '\"  \"'= ' : :: '=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
