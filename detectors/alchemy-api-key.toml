# Docs: https://www.alchemy.com/docs/how-to-create-access-keys
# Format: 32 character hexadecimal string (no prefix)
# Verify: POST to eth_blockNumber endpoint with Bearer token returns 200 if valid
# Prefix: none (32 hex chars, requires context keywords)

[detector]
id = "alchemy-api-key"
name = "Alchemy API Key"
service = "alchemy"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
min_confidence = 0.2
keywords = ["alchemy", "ALCHEMY_API_KEY", "ALCHEMY_APIKEY", "alchemy_api_key", "alchemy.com"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32] }]

[[detector.patterns]]
regex = "(?:ALCHEMY|alchemy)[_\\-\\.]?(?:API[_\\-\\.]?KEY|api[_\\-\\.]?key)[=:\\s\\\"']+([a-f0-9]{32})"
description = "Alchemy API key with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "https://eth-mainnet.g.alchemy.com/v2/{{match}}"
allowed_domains = ["eth-mainnet.g.alchemy.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ALCHEMY_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ALCHEMY_API_KEY=short"
