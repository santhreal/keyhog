# Docs: https://www.alchemy.com/docs/how-to-create-access-keys
# Format: 32 character hexadecimal string (no prefix)
# Verify: POST to eth_blockNumber endpoint with Bearer token returns 200 if valid
# Prefix: none (32 hex chars, requires context keywords)

[detector]
id = "alchemy-api-key"
name = "Alchemy API Key"
service = "alchemy"
severity = "critical"
min_confidence = 0.2
keywords = ["alchemy", "ALCHEMY_API_KEY", "ALCHEMY_APIKEY", "alchemy_api_key", "alchemy.com"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED for it (per-detector, DetectorSpec::weak_anchor;
# was rules/detector-classification.toml weak_anchor list).
weak_anchor = true

[[detector.patterns]]
regex = "(?:ALCHEMY|alchemy)[_\\-\\.]?(?:API[_\\-\\.]?KEY|api[_\\-\\.]?key)[=:\\s\\\"']+([a-f0-9]{32})"
description = "Alchemy API key with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "https://eth-mainnet.g.alchemy.com/v2/{{match}}"
allowed_domains = ["eth-mainnet.g.alchemy.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ALCHEMY_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ALCHEMY_API_KEY=short"
