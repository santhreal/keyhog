# Docs: https://docs.testomat.io/reference/reporter/playwright.html
# Format: Environment variables for test execution with Testomat.io or similar
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "playwright-test-credentials"
name = "Playwright Test Credentials"
service = "playwright"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
min_confidence = 0.25
keywords = ["TESTOMATIO", "PLAYWRIGHT_TEST", "testomat.io"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:TESTOMATIO|TESTOMATIO_API_KEY)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Testomat.io API key for Playwright test reporting"
group = 1

[[detector.patterns]]
regex = "(?:TESTOMATIO_PROJECT|testomatio_project)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Testomat.io project identifier"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "TESTOMATIO=K5PenZeiZ_96EL2sMNKu"
test_negative = "TESTOMATIO=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
