# Docs: https://developers.kakao.com/docs/latest/en/rest-api/getting-started
# Format: REST API key is 32-char hex; Admin key starts with 'KakaoAK'
# Verify: GET /v2/user/me with Authorization: KakaoAK header
# Prefix: KakaoAK (for Admin keys)

[detector]
id = "kakaotalk-api-credentials"
name = "KakaoTalk API Credentials"
service = "kakaotalk"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["kakao", "KAKAO", "kakaotalk", "KAKAOTALK", "KakaoAK"]

[[detector.patterns]]
regex = "KakaoAK [a-f0-9]{32}"
description = "Kakao Admin key with KakaoAK prefix"

[[detector.patterns]]
regex = "(?:kakao|KAKAO)[_\\-\\s]*(?:rest[_\\-\\s]*api[_\\-\\s]*key|REST[_\\-\\s]*API[_\\-\\s]*KEY)[=: \\s\"'']+([a-f0-9]{32})"
description = "Kakao REST API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:kakao|KAKAO)[_\\-\\s]*(?:javascript[_\\-\\s]*key|JAVASCRIPT[_\\-\\s]*KEY)[=: \\s\"'']+([a-f0-9]{32})"
description = "Kakao JavaScript key with context anchor"
group = 1

[[detector.tests]]
test_positive = "KakaoAK 5d72afa427ade31a777ec0e7ec6b303e"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
