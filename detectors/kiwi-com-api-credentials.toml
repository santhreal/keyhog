# Docs: https://tequila.kiwi.com/portal/docs/tequila_api
# Format: API key (alphanumeric string) and optional partner ID
# Verify: GET /v2/search with apikey header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "kiwi-com-api-credentials"
name = "Kiwi.com (Tequila) API Credentials"
service = "kiwi-com"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["KIWI", "kiwi", "TEQUILA", "tequila", "KIWI_API_KEY"]

[[detector.patterns]]
regex = '''(?:KIWI|kiwi|TEQUILA|tequila)[_\-\s]*(?:API_KEY|api_key|KEY|key|APIKEY|apikey)[=:\s"'']+([A-Za-z0-9_-]{20,50})'''
description = "Kiwi.com/Tequila API key with context"
group = 1

# Pattern 2 used to be a bare `apikey: VALUE` match with no kiwi
# keyword in the regex; the "apikey" keyword was also on the keywords
# list, so any codebase containing "apikey" anywhere triggered this
# detector. Caught on a v0.5.33 dogfood scan of facebook/react where
# the react-mcp-server's Algolia config `apiKey: '...'` matched as
# Kiwi credentials. The pattern had zero positive-test coverage in
# tests/contracts/kiwi-com-api-credentials.toml so removal is net-
# positive on F1. "apikey" is also pulled from the keywords list so
# the keyword pre-filter no longer fires on every file containing
# the bare word.

[detector.verify]
method = "GET"
url = "https://api.tequila.kiwi.com/v2/search?fly_from=PRG&fly_to=LON&date_from=01/01/2025&date_to=01/02/2025&limit=1"
allowed_domains = ["api.tequila.kiwi.com"]

[detector.verify.auth]
type = "header"
name = "apikey"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "KIWI_API_KEY=02S8iA1Ph_XiON5roA687aQoJCEu"
test_negative = "KIWI_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
