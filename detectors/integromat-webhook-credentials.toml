# Docs: https://www.make.com/en/help/apps/webhooks
# Format: hook.make.com or hook.integromat.com URLs with unique paths
# Verify: POST to webhook with test payload
# Prefix: hook.make.com

[detector]
id = "integromat-webhook-credentials"
name = "Integromat/Make Webhook Credentials"
service = "integromat"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["hook.make.com", "hook.integromat.com", "integromat", "make.com"]

[[detector.patterns]]
regex = "https?://hook\\.(?:make|integromat)\\.com/[a-zA-Z0-9]{20,}"
description = "Integromat/Make webhook URL"

[[detector.patterns]]
regex = "(?:INTEGROMAT|integromat|MAKE[_\\.]?API)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Integromat/Make API key with context anchor"
group = 1

[[detector.patterns]]
regex = "x-make-apikey[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Make API key header"
group = 1

[[detector.tests]]
test_positive = "https://hook.make.com/Qf0zdjh24ijmAisscM87yqLBR61oGXwXY2BvfnOfb66JyaER9qY7kVJg06d"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
