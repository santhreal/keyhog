# Docs: https://www.datocms.com/docs/content-delivery-api
# Format: CDA (read-only) and CMA (full-access) tokens are 30+ character alphanumeric
# Verify: GET /site with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "datocms-api-token"
name = "DatoCMS API Token"
service = "datocms"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["datocms", "DATOCMS_API_TOKEN", "DATOCMS_READWRITE_TOKEN", "dato"]

[[detector.patterns]]
regex = '''(?:DATOCMS|datocms)[_\-\s]*(?:API[_\-\s]*TOKEN|READWRITE[_\-\s]*TOKEN|READONLY[_\-\s]*TOKEN)[=:\s"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}|[a-zA-Z0-9_-]{30,50})'''
description = "DatoCMS API token with context anchor (UUID or alphanumeric format)"
group = 1

[[detector.patterns]]
regex = "Authorization[=:\\s\"']+Bearer\\s+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}|[a-zA-Z0-9_-]{30,50})[^\\n]*dato"
description = "DatoCMS bearer token with context"
group = 1

[detector.verify]
method = "GET"
url = "https://site-api.datocms.com/site"
allowed_domains = ["site-api.datocms.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "DATOCMS_API_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "DATOCMS_API_TOKEN=Kp4Qx7Rm"
