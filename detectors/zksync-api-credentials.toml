# Docs: https://docs.zksync.io/
# Format: zkSync RPC endpoints use API keys in URL path or x-api-key header
# Verify: no public verification endpoint
# Prefix: service-owned zkSync RPC URLs; generic hex API keys require context anchoring

[detector]
id = "zksync-api-credentials"
name = "zkSync API Credentials"
service = "zksync"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["zksync", "ZKSYNC", "zk-sync", "ZK-SYNC", "zksync.io", "era.zksync"]

[[detector.patterns]]
regex = '(?:zksync|ZKSYNC|zk-sync|ZK-SYNC)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+\.zksync\.[a-z]+/[a-zA-Z0-9_-]+)'
description = "zkSync RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(https?://[a-zA-Z0-9._-]+\.zksync\.[a-z]+/[a-zA-Z0-9_-]+)(?:$|[^A-Za-z0-9_-])'
description = "Bare zkSync RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:zksync|ZKSYNC|zk-sync|ZK-SYNC)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/zksync/[a-zA-Z0-9_-]+)'
description = "zkSync RPC URL with path-based access token"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(https?://[a-zA-Z0-9._-]+/zksync/[a-zA-Z0-9_-]+)(?:$|[^A-Za-z0-9_-])'
description = "Bare zkSync path RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:zksync|ZKSYNC|zk-sync|ZK-SYNC)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/324/[a-zA-Z0-9_-]+)'
description = "zkSync Era RPC URL with chain ID and API key"
group = 1

[[detector.patterns]]
regex = '(?:zksync|ZKSYNC|zk-sync|ZK-SYNC)[._-]?(?:api|API)[._-]?key[=:"	\s]+([a-f0-9]{32})'
description = "zkSync API key (32 hex characters)"
group = 1

[[detector.tests]]
test_positive = "zk-sync.rpcurl =  =    http://1BqNk6h5cxHl.bNCrdjL7jUs5wZUxXEQuOAzaIjtptWbqn0_EKXlEvmjYD4Oq.zksync.gmhaenthcnqggidysvuwbqwodugreafnero/t7S1VhmjZmLSpyxdlyuXJlFA21JpVQXbYQ5TFtWLODfccxyk7HngYKls7-r9ErqEoJ68fwDTalxhIisyCNIgyJ"
test_negative = "zk-sync.rpcurl =  =    YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
