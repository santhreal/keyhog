# Docs: https://www.assemblyai.com/docs/api-reference/overview
# Format: lowercase hex (24–32 chars) with no unique prefix; keyword-anchored.
#   Real keys are 32-hex; betterleaks homefield ground-truth carries a 24-hex form.
# Verify: GET /v2/transcript with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "assemblyai-api-key"
name = "AssemblyAI API Key"
service = "assemblyai"
severity = "high"
keywords = ["ASSEMBLYAI_API_KEY", "assemblyai"]

[[detector.patterns]]
regex = "(?i)assemblyai[_.]?(?:api[_.]?key|token|key)?[=:\\s\"']+([a-f0-9]{24,32})"
description = "AssemblyAI API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.assemblyai.com/v2/transcript"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ASSEMBLYAI_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ASSEMBLYAI_API_KEY=short"
