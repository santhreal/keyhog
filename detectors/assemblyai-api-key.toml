# Docs: https://www.assemblyai.com/docs/api-reference/overview
# Format: lowercase hex (24–32 chars) with no unique prefix; keyword-anchored.
#   Real keys are 32-hex; betterleaks homefield ground-truth carries a 24-hex form.
# Verify: GET /v2/transcript with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "assemblyai-api-key"
name = "AssemblyAI API Key"
service = "assemblyai"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["ASSEMBLYAI_API_KEY", "assemblyai"]

[[detector.patterns]]
regex = "(?i)assemblyai[_.]?(?:api[_.]?key|token|key)?[=:\\s\"']+([a-f0-9]{24,32})"
description = "AssemblyAI API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.assemblyai.com/v2/transcript"
allowed_domains = ["api.assemblyai.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ASSEMBLYAI_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ASSEMBLYAI_API_KEY=short"
