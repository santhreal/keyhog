# Docs: https://docs.ibm.com/en/watson-iot-platform
# Format: org ID, API key, and authentication token
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "ibm-watson-iot-credentials"
name = "IBM Watson IoT Platform Credentials"
service = "ibm-watson-iot"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["WATSON_IOT", "WATSON-IoT", "internetofthings", "WIoTP"]

[[detector.patterns]]
regex = '''(?:WATSON[_\-\s]*IOT|watson[_\-\s]*iot)[._-]?ORG[=:\s"'']+([a-z]{6})'''
description = "IBM Watson IoT 6-character organization ID"
group = 1

[[detector.patterns]]
regex = '''(?:WATSON[_\-\s]*IOT|watson[_\-\s]*iot)[._-]?API[_\-\s]*KEY[=:\s"'']+(a-[a-z0-9]{6}-[a-z0-9]{10,})'''
description = "IBM Watson IoT API key"
group = 1

[[detector.patterns]]
regex = '''(?:WATSON[_\-\s]*IOT|watson[_\-\s]*iot)[._-]?AUTH[_\-\s]*TOKEN[=:\s"'']+([a-zA-Z0-9_-]{18,})'''
description = "IBM Watson IoT authentication token"
group = 1

[[detector.patterns]]
regex = "(?:internetofthings|INTERNETOFTHINGS)\\.ibmcloud\\.com"
description = "IBM Watson IoT platform endpoint URL"

[[detector.tests]]
test_positive = "INTERNETOFTHINGS.ibmcloud.com"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
