# Docs: https://www.loc.gov/apis/
# Format: API key obtained via api.data.gov, passed as query parameter
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "library-of-congress-api-key"
name = "Library of Congress API Key"
service = "library-of-congress"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["LOC_API_KEY", "LIBRARY_OF_CONGRESS", "congress.gov", "loc.gov", "library_of_congress"]

[[detector.patterns]]
regex = "(?:LOC|LIBRARY_OF_CONGRESS)_API_KEY[=:\\s\"'\\']+([a-zA-Z0-9_-]{20,50})"
description = "Library of Congress API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:loc\\.gov|congress\\.gov).*[?&]api_key=([a-zA-Z0-9_-]{20,50})"
description = "Library of Congress API key in URL query parameter"
group = 1

[[detector.tests]]
test_positive = "LIBRARY_OF_CONGRESS_API_KEY=7SV8BoWRCkMYwW_50l67mLp7zeC1"
test_negative = "LIBRARY_OF_CONGRESS_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
