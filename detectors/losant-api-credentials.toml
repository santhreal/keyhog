# Docs: https://docs.losant.com/
# Format: Application Access Key and Secret pair (24+ char alphanumeric)
# Verify: POST to auth endpoint with LosantAccessKey and LosantAccessSecret
# Prefix: none (requires context anchoring)

[detector]
id = "losant-api-credentials"
name = "Losant API Credentials"
service = "losant"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["losant", "access_key", "access_secret", "losant.com"]

[[detector.patterns]]
regex = '''(?:losant|LOSANT)[._-]?(?:ACCESS[_\-\s]*KEY|access[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Losant application access key"
group = 1

[[detector.patterns]]
regex = '''(?:losant|LOSANT)[._-]?(?:ACCESS[_\-\s]*SECRET|access[_\-\s]*secret)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Losant application access secret"
group = 1

[[detector.tests]]
test_positive = "LOSANT_ACCESS_KEY=FJkepLYelHEQDonIVhEJ"
test_negative = "LOSANT_ACCESS_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
