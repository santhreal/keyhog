# Docs: https://developers.notion.com/guides/get-started/authorization
# Format: OAuth client secret with 'secret_' prefix followed by 43-50 alphanumeric characters
# Verify: POST to api.notion.com/v1/oauth/token with Basic auth (client_id:client_secret)
# Prefix: secret_

[detector]
id = "notion-oauth-secret"
name = "Notion OAuth Client Secret"
service = "notion"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["NOTION_CLIENT_SECRET", "notion_client_secret", "secret_"]

[[detector.patterns]]
regex = "(?:NOTION|notion)[_.]?(?:CLIENT|client)[_.]?(?:SECRET|secret)[=:\\s\"'']+(secret_[a-zA-Z0-9]{43,50})"
description = "Notion OAuth client secret with context anchor"
group = 1

[[detector.companions]]
name = "client_id"
regex = "(?:NOTION|notion)[_.]?(?:CLIENT|client)[_.]?(?:ID|id)[=:\\s\"'']+([A-Za-z0-9_\\-]{8,64})"
within_lines = 5
[detector.verify]
method = "POST"
url = "https://api.notion.com/v1/oauth/token"
allowed_domains = ["api.notion.com"]
body = "{\"grant_type\":\"authorization_code\",\"code\":\"keyhog-invalid-code\",\"redirect_uri\":\"https://example.com\"}"

[detector.verify.auth]
type = "basic"
username = "companion.client_id"
password = "match"

[[detector.verify.headers]]
name = "Content-Type"
value = "application/json"

[detector.verify.success]
status = 400
body_contains = "invalid_grant"

[[detector.tests]]
test_positive = "NOTION_CLIENT_SECRET=secret_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpRm"
test_negative = "NOTION_CLIENT_SECRET=secret_short"
