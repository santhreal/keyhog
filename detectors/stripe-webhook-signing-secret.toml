# Docs: https://docs.stripe.com/webhooks#secure-webhook
# Format: String starting with 'whsec_' followed by 32-64 alphanumeric characters
# Verify: no public verification endpoint (local signature verification using Stripe-Signature header)
# Prefix: whsec_

[detector]
id = "stripe-webhook-signing-secret"
name = "Stripe Webhook Signing Secret"
service = "stripe"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["whsec_", "STRIPE_WEBHOOK_SECRET", "stripe_webhook_secret", "webhook_secret"]

[[detector.patterns]]
regex = "whsec_[a-zA-Z0-9]{32,64}"
description = "Stripe webhook signing secret (whsec_ prefix)"

[[detector.patterns]]
regex = "(?:STRIPE|stripe)[._-]?(?:WEBHOOK|webhook)[._-]?(?:SECRET|secret|KEY|key)[=:\\s\"'']+(whsec_[a-zA-Z0-9]{32,64})"
description = "Stripe webhook signing secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "whsec_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb"
test_negative = "whsec_short"
