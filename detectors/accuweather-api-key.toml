# Docs: https://developer.accuweather.com/documentation/authentication
# Format: API key passed in Authorization header as Bearer token
# Verify: GET /currentconditions/v1/349727 with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "accuweather-api-key"
name = "AccuWeather API Key"
service = "accuweather"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ACCUWEATHER", "accuweather", "ACCU_WEATHER_API_KEY"]

[[detector.patterns]]
regex = "(?:ACCUWEATHER|accuweather)[_\\s]*(?:API[_\\s]*)?KEY[=:\\s\"'']+([a-zA-Z0-9]{20,})"
description = "AccuWeather API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://dataservice.accuweather.com/currentconditions/v1/349727"
allowed_domains = ["dataservice.accuweather.com"]

[detector.verify.auth]
type = "query"
param = "apikey"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ACCUWEATHER_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
test_negative = "ACCUWEATHER_API_KEY=short"
