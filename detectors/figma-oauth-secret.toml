# Docs: https://developers.figma.com/docs/rest-api/authentication/
# Format: OAuth client secret - 20-40 alphanumeric characters (no unique prefix)
# Verify: POST to api.figma.com/v1/oauth/token with Basic auth
# Prefix: none (requires context anchoring)

[detector]
id = "figma-oauth-secret"
name = "Figma OAuth Client Secret"
service = "figma"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["FIGMA_CLIENT_SECRET", "figma_client_secret", "FIGMA_OAUTH"]

[[detector.patterns]]
regex = "(?:FIGMA|figma)[_.]?(?:CLIENT|client|OAUTH|oauth)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,40})"
description = "Figma OAuth client secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "FIGMA_CLIENT_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
test_negative = "FIGMA_CLIENT_SECRET=short"
