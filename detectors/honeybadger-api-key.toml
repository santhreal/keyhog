# Docs: https://docs.honeybadger.io/api/getting-started/
# Format: 32 or 48 hexadecimal characters
# Verify: GET /v2/projects with HTTP Basic Auth (token as username) returns 200 if valid
# Prefix: none (hex characters, requires keyword context)

[detector]
id = "honeybadger-api-key"
name = "Honeybadger API Key"
service = "honeybadger"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# Drop the bare `api_key` keyword: it attributed any `api_key=<32hex>`
# (Datadog DD_API_KEY, generic SDK keys, etc.) to honeybadger, driving
# the named-detector FP rise. Attribution now requires an explicit
# `honeybadger` token in the AC window, which is the real vendor anchor.
keywords = ["HONEYBADGER_API_KEY", "honeybadger_api_key", "HONEYBADGER-API-KEY", "honeybadger"]

[[detector.patterns]]
# Honeybadger keys are EXACTLY 32 or 48 hex chars per the docs,
# not "32 to 48". The previous `{32,48}` quantifier was a greedy
# range that captured the first 48 hex chars of any longer hex
# span (e.g. it grabbed 48 of a 64-char sha256 hash, defeating
# the bare-hash suppression which requires the FULL hash length).
# Anchor with a non-hex lookaround so the capture only fires on
# values whose length is exactly 32 or 48 and which are bounded
# by a non-hex character (quote, whitespace, eol, punctuation).
regex = "(?i)honeybadger[._\\-]?(?:api[._\\-]?)?key[=:\\s\\\"']+([a-f0-9]{32}|[a-f0-9]{48})(?:[^a-f0-9]|$)"
description = "Honeybadger API key (exactly 32 or 48 hex chars, terminated by non-hex)"
group = 1

[detector.verify]
method = "GET"
url = "https://app.honeybadger.io/v2/projects"
allowed_domains = ["app.honeybadger.io"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "HONEYBADGER_API_KEY=eb9bba259a9ddafe89e911d116ebdf68"
test_negative = "api_key=eb9bba259a9ddafe89e911d116ebdf68"
