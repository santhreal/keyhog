# Docs: https://checkmarx.com/resource/api-authentication-types/
# Format: OAuth2 client_id and client_secret pair, or API key (UUID format)
# Verify: POST /auth/identity/connect/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "checkmarx-api-credentials"
name = "Checkmarx API Credentials"
service = "checkmarx"
severity = "critical"
keywords = ["CHECKMARX", "cx-client-id", "cx-client-secret", "checkmarx.com"]

[[detector.patterns]]
regex = "(?i)(?:checkmarx|cx)[_.-]client[_.-]?id[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})(?:[^a-f0-9]|$)"
description = "Checkmarx client ID with context anchor (UUID format)"
group = 1

[[detector.patterns]]
regex = "(?i)checkmarx[_.-](?:client[_.-]?)?secret[=:\\s\"'']+([a-zA-Z0-9_-]{40,})(?:[^a-zA-Z0-9_-]|$)"
description = "Checkmarx client secret with context anchor"
group = 1

[[detector.companions]]
name = "checkmarx_client_secret"
regex = "(?i)checkmarx[_.-](?:client[_.-]?)?secret[=:\\s\"'']+([a-zA-Z0-9_-]{40,})(?:[^a-zA-Z0-9_-]|$)"
within_lines = 5

[[detector.tests]]
test_positive = "CHECKMARX_CLIENT_ID=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "CHECKMARX_CLIENT_ID=short"

[[detector.tests]]
test_positive = "cx-client-id=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "CHECKMARX_CLIENT_ID=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d0"
