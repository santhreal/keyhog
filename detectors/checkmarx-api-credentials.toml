# Docs: https://docs.checkmarx.com/en/34965-68612-creating-oauth-clients.html
# Format: OAuth2 client ID and confidential client secret
# Verify: POST /auth/identity/connect/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "checkmarx-api-credentials"
name = "Checkmarx API Credentials"
service = "checkmarx"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["CHECKMARX", "CX_CLIENT_SECRET", "cx-client-secret", "checkmarx.com"]

[[detector.patterns]]
regex = '''(?i)(?:checkmarx|cx)[_.-](?:client[_.-]?)?secret[=:\s"']+([a-z0-9_-]{40,128})(?:[^a-z0-9_-]|$)'''
required_literals = ["secret"]
description = "Checkmarx client secret with context anchor"
group = 1

[[detector.companions]]
name = "checkmarx_client_id"
regex = '''(?i)(?:checkmarx|cx)[_.-]client[_.-]?id[=:\s"']+([a-z0-9][a-z0-9._(){}\[\]-]{2,127})(?:[^a-z0-9._(){}\[\]-]|$)'''
within_lines = 5

[[detector.tests]]
test_positive = "CHECKMARX_CLIENT_SECRET=AfON5YGWmLgetXDb6QNi3S5L5ftbh3U-AiYvaExsnWNoFTAeY"
test_negative = "CHECKMARX_CLIENT_ID=release-scanner"

[[detector.tests]]
test_positive = "CX_CLIENT_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
test_negative = "CX_CLIENT_SECRET=short"
