# Docs: https://learn.microsoft.com/en-us/entra/identity-platform/quickstart-register-app
# Format: Entra (Azure AD) app-registration client-secret "Value" - shown once at
#         creation; modern secrets are ~40 chars over a base64-ish charset that
#         also uses `~ . _ -`. The body alone is indistinguishable from arbitrary
#         base64, so this detector is STRICTLY anchored on the canonical
#         service-principal env-var / config-key names.
# Verify: POST https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token with a
#         client_credentials grant - needs the matching tenant + client_id too, so
#         a lone secret reports unverified (same half-leak rationale as
#         aws-secret-access-key). No constant-time HTTP probe is templated here.
# Prefix: none (anchor-driven).

[detector]
id = "azure-client-secret"
name = "Azure AD / Entra Client Secret"
service = "azure"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# DET-18 floor override: the AZURE_/ARM_/AAD_ + CLIENT_SECRET anchor carries the
# specificity, while the value body (punctuated base64) scores below the 0.40
# global entropy floor and drops a real service-principal secret as a false
# negative. Declare a floor under the observed score; FP risk is bounded by the
# mandatory Azure-scoped anchor (same rationale as azure-storage-account-key /
# azure-service-bus-connection-string / aws-secret-access-key).
min_confidence = 0.25
keywords = [
    "AZURE_CLIENT_SECRET",
    "ARM_CLIENT_SECRET",
    "AAD_CLIENT_SECRET",
    "AZURE_AD_CLIENT_SECRET",
    "azure_client_secret",
    "arm_client_secret",
    "servicePrincipalKey",
]

[[detector.patterns]]
# Canonical service-principal secret env-var / config-key. The AZURE_/ARM_/AAD_
# prefix makes `client_secret` unambiguously Azure (Google/Okta/Keycloak/OneLogin
# client secrets have their own detectors and would otherwise collide on a bare
# `client_secret`). `AZURE(?:[_-]?AD)?` optionally consumes the `_AD` in
# `AZURE_AD_CLIENT_SECRET`. The value runs to the closing quote, whitespace, or
# end of line; `{24,80}` drops short placeholders. `(?i)` (compiled default)
# also matches the lowercase `azure_client_secret` / `arm_client_secret` forms.
regex = '''(?:ARM|AAD|AZURE(?:[_-]?AD)?)[_-]?CLIENT[_-]?SECRET\s*[=:]\s*["']?([A-Za-z0-9+/=~._-]{24,80})'''
description = "Azure AD / Entra service-principal client secret (env-var / config-key anchor)"
group = 1

[[detector.patterns]]
# Azure DevOps service-connection / azure-pipelines authorization field. ARM CI
# commonly emits the service-principal secret under `servicePrincipalKey` rather
# than an `AZURE_*` env var, so anchor on that distinctive field name too.
regex = '''servicePrincipalKey\s*[=:]\s*["']?([A-Za-z0-9+/=~._-]{24,80})'''
description = "Azure service-principal key (Azure DevOps service-connection field)"
group = 1

# Author-shipped self-test: the canonical env-var form MUST fire; a sub-floor
# placeholder (`changeme`, 8 chars < the {24,} floor) MUST NOT - proving the
# detector keys on a real value, not the anchor word alone.
[[detector.tests]]
test_positive = '''AZURE_CLIENT_SECRET=Xy8Q~kPv3mNz.aB7dEfGhIjKlMnOpQrStUvWxYz1'''
test_negative = '''AZURE_CLIENT_SECRET=changeme'''
