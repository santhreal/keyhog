# Docs: https://docs.newrelic.com/docs/apis/intro-apis/new-relic-api-keys/
# Format: 40 hex characters for license key, 64 for user key
# Verify: none (license keys are for ingestion, not API access)
# Prefix: none (40/64 hex, requires keyword context)

[detector]
id = "newrelic-license-key"
name = "New Relic License Key"
service = "newrelic"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["NEW_RELIC_LICENSE_KEY", "license_key", "NEWRELIC_LICENSE", "NR_LICENSE"]

[[detector.patterns]]
regex = '''(?:NEW_RELIC|new_relic|NEWRELIC|newrelic|NR|nr|license)[_\-\s]*(?:LICENSE|license)?[_\-\s]*(?:KEY|key)?[=:\s"']+([a-f0-9]{40})'''
description = "New Relic license key (40 hex) with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:NEW_RELIC|new_relic|NEWRELIC|newrelic)[_\-\s]*(?:USER|user)?[_\-\s]*(?:KEY|key|API|api)?[=:\s"']+([a-f0-9]{64})'''
description = "New Relic user API key (64 hex) with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "https://log-api.newrelic.com/log/v1"
allowed_domains = ["log-api.newrelic.com"]
body = "[{\"message\":\"keyhog verification\"}]"

[detector.verify.auth]
type = "header"
name = "X-License-Key"
template = "{{match}}"

[[detector.verify.headers]]
name = "Content-Type"
value = "application/json"

[detector.verify.success]
status = 202

[[detector.tests]]
test_positive = "NEW_RELIC_LICENSE_KEY=5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3ea9e2f5b8"
test_negative = "NEW_RELIC_LICENSE_KEY=short"
