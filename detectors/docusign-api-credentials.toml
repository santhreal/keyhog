# Docs: https://developers.docusign.com/docs/esign-rest-api/authentication/
# Format: Integration Key (GUID), RSA Private Key, or Legacy API Password
# Verify: POST to https://account.docusign.com/oauth/token (JWT grant)
# Prefix: none for Integration Key (requires context anchoring)

[detector]
id = "docusign-api-credentials"
name = "DocuSign API Credentials"
service = "docusign"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["DOCUSIGN_INTEGRATION_KEY", "DOCUSIGN_USER_ID", "DOCUSIGN_API_PASSWORD", "docusign_integration_key"]

[[detector.patterns]]
regex = '''(?:DOCUSIGN|docusign)[_\-\s]*(?:INTEGRATION[_\-\s]*KEY)[=:\s"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "DocuSign Integration Key (UUID format)"
group = 1

[[detector.patterns]]
regex = '''(?:DOCUSIGN|docusign)[_\-\s]*(?:USER[_\-\s]*ID)[=:\s"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "DocuSign User ID (UUID format for JWT)"
group = 1

[[detector.patterns]]
regex = '''(?:DOCUSIGN|docusign)[_\-\s]*(?:API[_\-\s]*PASSWORD|PWD)[=:\s"'']+([a-zA-Z0-9!@#$%^&*._\-]{16,})'''
description = "DocuSign Legacy API Password"
group = 1

[[detector.companions]]
name = "rsa_private_key"
regex = "BEGIN RSA PRIVATE KEY"
within_lines = 10

[[detector.tests]]
test_positive = "DOCUSIGN_INTEGRATION_KEY=0a82d930-0311-5873-e7cb-7c3a6be1eacf"
test_negative = "DOCUSIGN_INTEGRATION_KEY=short"
