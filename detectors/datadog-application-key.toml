# Docs: https://docs.datadoghq.com/account_management/api-app-keys/
# Format: 40 character hex string
# Verify: GET /api/v1/current_user with DD-API-Key and DD-APPLICATION-Key headers
# Prefix: none (40 char hex, requires context anchoring)

[detector]
id = "datadog-application-key"
name = "Datadog Application Key"
service = "datadog"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.3
keywords = ["DD-APP-Key", "DD_APP_KEY", "DATADOG_APP_KEY", "datadog_app_key"]

[[detector.patterns]]
regex = "(?:DD.APP.KEY|DATADOG_APP_KEY|datadog_app_key)[=:\\s\"']+([a-f0-9]{40})"
description = "Datadog application key with context anchor"
group = 1

[[detector.companions]]
name = "datadog_api_key"
regex = "(?:DD-API-KEY|DD_API_KEY|DATADOG_API_KEY|datadog_api_key)[=:\\s\"']+([a-f0-9]{32})"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.datadoghq.com/api/v2/current_user"
allowed_domains = ["api.datadoghq.com"]

[detector.verify.auth]
type = "header"
name = "DD-APPLICATION-KEY"
template = "{{match}}"

[[detector.verify.headers]]
name = "DD-API-KEY"
value = "{{companion.datadog_api_key}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "DATADOG_APP_KEY=3b70df2c347b7e02b642198793dc0b8a9827bb4c"
test_negative = "datadog_app_key=1234"
