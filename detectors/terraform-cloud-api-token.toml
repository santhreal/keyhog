# Docs: https://developer.hashicorp.com/terraform/cloud-docs/api-docs
# Format: {id}.atlasv1.{secret} - atlasv1 suffix identifies TFC tokens
# Verify: GET /api/v2/account/details with Bearer token
# Prefix: .atlasv1. (infix)

[detector]
id = "terraform-cloud-api-token"
name = "Terraform Cloud API Token"
service = "terraform-cloud"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = [".atlasv1.", "TFE_TOKEN", "tfe_token", "TERRAFORM_TOKEN", "terraform_token", "app.terraform.io"]

[[detector.patterns]]
regex = "[a-zA-Z0-9]{14}\\.atlasv1\\.[a-zA-Z0-9]{67,}"
description = "Terraform Cloud API token (atlasv1 infix format)"

[detector.verify]
method = "GET"
url = "https://app.terraform.io/api/v2/account/details"
allowed_domains = ["app.terraform.io"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "9X3kQp7VbT2hYR.atlasv1.NcMfWj4DgEsLuHaIoBnVkPxKqRtYwMPqW3rTaB1yIoX0aBcDeFgHiJkLmNoPqRsTuVwXy"
test_negative = "abc.atlasv1.short"
