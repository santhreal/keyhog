# Docs: https://www.covalenthq.com/docs/unified-api/
# Format: cqt_ prefix followed by 32 alphanumeric characters
# Verify: GET /v1/chains/ with key query param, returns 200 if valid
# Prefix: cqt_

[detector]
id = "covalent-api-key"
name = "Covalent API Key"
service = "covalent"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["cqt_", "covalent", "COVALENT"]

[[detector.patterns]]
regex = 'cqt_[a-zA-Z0-9]{32}'
description = "Covalent API key (cqt_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.covalenthq.com/v1/chains/"
allowed_domains = ["api.covalenthq.com"]

[detector.verify.auth]
type = "query"
param = "key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "cqt_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "cqt_Kp4Qx7Rm2Sn5Tb8Vw3Yz"
