# Docs: https://documentation.mailgun.com/docs/mailgun/user-manual/webhooks/#securing-webhooks
# Format: 32-64 character alphanumeric string used for HMAC-SHA256 signature verification
# Verify: no public verification endpoint (local signature verification using timestamp + token + signature)
# Prefix: none (requires context anchoring)

[detector]
id = "mailgun-webhook-signing-key"
name = "Mailgun Webhook Signing Key"
service = "mailgun"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.2
keywords = ["MAILGUN_WEBHOOK_KEY", "mailgun_webhook_key", "webhook_signing_key", "X-Mailgun-Signature"]

[[detector.patterns]]
regex = "(?:MAILGUN|mailgun)[._-]?(?:WEBHOOK|webhook)[._-]?(?:KEY|key|SECRET|secret|SIGNING|signing)[=:\\s\"'']+([a-zA-Z0-9]{32,64})"
description = "Mailgun webhook signing key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:MAILGUN|mailgun)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\\s\"'']+(key-[a-f0-9]{32})"
description = "Mailgun API key (companion for webhook verification)"
group = 1

[[detector.tests]]
test_positive = "MAILGUNWEBHOOKSIGNING=7Mx3bxEAyReNbK3gqOQNcp7nWrfTFS6n"
test_negative = "MAILGUNWEBHOOKSIGNING=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
