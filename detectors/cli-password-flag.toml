# Command-line `--password <value>` credential, a login password passed as a
# CLI flag in a shell script, Dockerfile, CI step, README command, or process
# invocation (`mysql --password s3cr3t`, `deploy --password 7m7j5u`, PowerShell
# `-Password Rcuhxw1486`).
#
# Why this detector:
#   On the CredData benchmark the "CMD Password" class is ~25 labeled positives
#   whose value is the token immediately after a `--password` / `-Password` /
#   `--passwd` flag (`--password giuomr`, `-Password Rcuhxw1486`,
#   `--username jdoe --password 7m7j5u`). keyhog caught 0 of them: a
#   space-separated flag value is NOT a `keyword=value` assignment, so the
#   generic bridge never produced a candidate. The explicit `--password` flag is
#   a strong credential context; the token after it is a precise anchor. As a
#   strong-anchor member of the structural-password-slot family (NOT weak_anchor),
#   the Tier-B randomness floor is skipped so short low-alpha passwords surface;
#   placeholder/variable values (`--password welcome`, `--password <PASSWORD>`,
#   `--password $DB_PASS`) are dropped by the `dictionary_word_placeholder` gate,
#   the `{6,128}` floor, and the Tier-A `$VAR` marker.
#
# The captured group is the password (the credential). Bare `-p` is deliberately
# NOT matched, it is overloaded across CLIs (`-p 8080`, `-p ./path`) and would
# dilute precision; only the unambiguous `--password` / `--passwd` long flags and
# the PowerShell `-Password` form are anchored.
#
# Verify: no verification endpoint (the target service is unknown).

[detector]
id = "cli-password-flag"
name = "Command-line Password Flag"
service = "generic"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["password", "Password", "passwd"]
# Strong-anchor free-form password slot: apply the placeholder-word gate, skip
# the Tier-B randomness floor (family declared per-detector, see DetectorSpec).
structural_password_slot = true

[[detector.patterns]]
# `--password VALUE`, `--passwd VALUE`, PowerShell `-Password VALUE`, or the
# `=`-joined `--password=VALUE`. `--?` allows the single-dash PowerShell form and
# the double-dash GNU form; `[=\s]+` covers both separators; `\S{6,128}` is the
# non-whitespace value (placeholders/`$var`/`<PASSWORD>` are dropped downstream).
regex = '''(?i)--?(?:password|passwd)[=\s]+(\S{6,128})'''
required_literals = ["password", "passwd"]
description = "value following a --password / -Password / --passwd command-line flag"
group = 1

# No verify block (generic detector, target service unknown).

[[detector.tests]]
test_positive = "mysql -u root --password Xy9KmPq2LvWnB7tR -e 'SELECT 1'"
test_negative = "mytool deploy --password changeme"
