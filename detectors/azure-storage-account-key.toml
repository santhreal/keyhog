# Docs: https://learn.microsoft.com/en-us/azure/storage/common/storage-account-keys-manage
# Format: Standard base64, 86 chars + 2 chars '=' padding = 88 chars total.
# Verify: GET https://<account>.blob.core.windows.net/?comp=list with Shared Key auth.
# Prefix: none (the key body itself has no prefix; we anchor on the
#         many AZURE_*-style env-var/keyword surfaces it appears under).

[detector]
id = "azure-storage-account-key"
name = "Azure Storage Account Key"
service = "azure"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.28
# Public Azurite/devstoreaccount1 emulator key. It is intentionally published
# in SDK fixtures and must never be reported as a live Azure credential.
allowlist_values = ["^Vgs4slS82kICttQnzVfKBVypCjxXMNK2BEvHC52zXVZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==$"]
keywords = [
    "AZURE_STORAGE_KEY",
    "AZURE_STORAGE_ACCOUNT_KEY",
    "AZURE_STORAGE_CONNECTION_STRING",
    "AccountKey",
    "DefaultEndpointsProtocol",
    "storage_account_key",
    "STORAGE_ACCOUNT_KEY",
    "AzureWebJobsStorage",
]

[[detector.patterns]]
# `AZURE_STORAGE_KEY=<88-char b64>` env / properties / yaml / json
regex = "(?:AZURE_STORAGE_KEY|AZURE_STORAGE_ACCOUNT_KEY|STORAGE_ACCOUNT_KEY|storage_account_key)[=:\\s\"']+([A-Za-z0-9+/]{86}={1,2})"
description = "Azure Storage account key with env-var/key-name anchor"
group = 1

[[detector.patterns]]
# `AccountKey=<88-char b64>;` connection-string form (most common in code)
regex = "AccountKey=([A-Za-z0-9+/]{86}={1,2})"
description = "Azure Storage connection-string AccountKey segment"
group = 1

[[detector.patterns]]
# `AzureWebJobsStorage=DefaultEndpointsProtocol=https;...AccountKey=...;`
regex = "AzureWebJobsStorage[=:\\s\"']+[^\"']*AccountKey=([A-Za-z0-9+/]{86}={1,2})"
description = "Azure WebJobs storage AccountKey"
group = 1

# NOTE: no `[detector.verify]` block - Azure Shared Key auth requires
# HMAC-SHA256 of a canonicalized request signed with the key. That sign
# algorithm isn't an `AuthSpec::Bearer|Basic|Query|AwsV4|Header|Script`
# variant; until a dedicated `AuthSpec::AzureSharedKey` lands, this
# detector reports unverified. The key is still flagged.

[[detector.tests]]
test_positive = "AZURE_STORAGE_KEY=to8PuP8XWbrLmr4e+y/DLH/Hhsl6ArMtSIkCSqL7lSJOrb59CUVd0Hqb0tV/RxYsX8L5UrwFv1eFWPQ9pE++O/=="
test_negative = "AZURE_STORAGE_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
