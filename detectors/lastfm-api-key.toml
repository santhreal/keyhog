# Docs: https://www.last.fm/api
# Format: 32 character hex string API key
# Verify: GET /2.0/?method=auth.getToken with api_key param returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "lastfm-api-key"
name = "Last.fm API Key"
service = "lastfm"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["LASTFM", "lastfm", "LAST_FM", "last_fm", "LASTFM_API_KEY"]

[[detector.patterns]]
regex = '''(?:LAST[_\-\s]*FM|last[_\-\s]*fm)[_\-\s]*(?:API|api)?[_\-\s]*(?:KEY|key|SECRET|secret)?[=:\s"'']+([a-f0-9]{32})'''
description = "Last.fm API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:LAST[_\-\s]*FM|last[_\-\s]*fm)[_\-\s]*(?:SHARED|shared)?[_\-\s]*(?:SECRET|secret)[=:\s"'']+([a-f0-9]{32})'''
description = "Last.fm shared secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "LASTFM=e7a40edf8635d0cdb47ea9f156d972bc"
test_negative = "LASTFM=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
