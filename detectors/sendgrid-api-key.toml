# Docs: https://docs.sendgrid.com/api-reference/how-to-use-the-sendgrid-v3-api/authentication
# Format: API key starting with 'SG.' followed by 22 Base64 chars, a dot, and 43 more Base64 chars
# Verify: Bearer token sent to api.sendgrid.com/v3/scopes, returns 200 on success
# Prefix: SG.

[detector]
id = "sendgrid-api-key"
name = "SendGrid API Key"
service = "sendgrid"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
decode_transforms = { reverse_prefixes = ["SG."], caesar_prefixes = ["SG."] }
keywords = ["SG."]
simdsieve_prefixes = ["SG."]

[[detector.patterns]]
regex = 'SG\.[a-zA-Z0-9_-]{22,32}\.[a-zA-Z0-9_-]{43,47}'
description = "SendGrid API key (tightened segment lengths)"

[detector.verify]
method = "GET"
url = "https://api.sendgrid.com/v3/scopes"
allowed_domains = ["api.sendgrid.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "SG.9X3kQp7VbT2hYRzNcMfWj4.DgEsLuHaIoBnVkPxKqRtYwMPqW3rTaB1yIoX0aBcDeF"
test_negative = "SG.short.short"
