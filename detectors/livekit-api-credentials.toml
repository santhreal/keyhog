# Docs: https://docs.livekit.io/guides/access-tokens
# Format: API Key is "API" + 8+ alphanumeric chars, API Secret is 32+ alphanumeric chars
# Verify: POST to LiveKit server with token signed by secret - requires server URL
# Prefix: API

[detector]
id = "livekit-api-credentials"
name = "LiveKit API Key and Secret"
service = "livekit"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["LIVEKIT_API_KEY", "LIVEKIT_API_SECRET", "livekit", "API"]

[[detector.patterns]]
regex = "LIVEKIT_API_KEY[\"\\'\\s]*[=:]\\s*[\"\\']?(API[a-zA-Z0-9]{8,})[\"\\']?"
description = "LiveKit API Key with context anchor"
group = 1

[[detector.patterns]]
regex = "LIVEKIT_API_SECRET[\"\\'\\s]*[=:]\\s*[\"\\']?([a-zA-Z0-9]{32,})[\"\\']?"
description = "LiveKit API Secret with context anchor"
group = 1

[[detector.companions]]
name = "livekit_api_secret"
# Companion patterns are case-sensitive even though primary patterns are not.
# Fold the field-name anchor and capture only the secret body; a long API key
# must never attach itself as its own secret companion.
regex = "(?i:LIVEKIT_API_SECRET)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-zA-Z0-9]{32,})[\"\\']?"
within_lines = 5

[[detector.tests]]
test_positive = "LIVEKIT_API_KEY=APIcXfzjJ8K"
test_negative = "LIVEKIT_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"

[[detector.tests]]
test_positive = "livekit_api_key=APIcXfzjJ8K"
