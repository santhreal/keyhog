# Docs: https://developer.salesforce.com/docs/marketing/pardot/guide/authentication.html
# Format: Salesforce OAuth access token with Pardot Business Unit ID (starts with 0Uv, 18 chars)
# Verify: GET /api/v5/objects/prospects with Bearer token and Pardot-Business-Unit-Id header
# Prefix: none (requires context anchoring)

[detector]
id = "pardot-api-credentials"
name = "Salesforce Pardot API Credentials"
service = "pardot"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["pardot", "PARDOT", "business_unit_id", "0Uv"]

[[detector.patterns]]
regex = "PARDOT_BUSINESS_UNIT_ID=(0Uv[a-zA-Z0-9]{15})"
description = "Pardot Business Unit ID (starts with 0Uv, 18 chars)"
group = 1

[[detector.patterns]]
regex = '(?:PARDOT|pardot)[_\-\s]*(?:CONSUMER[_\-\s]*KEY|consumer[_\-\s]*key)[=: ]+([a-zA-Z0-9._-]{20,})'
description = "Pardot OAuth Consumer Key"
group = 1

[[detector.patterns]]
regex = '(?:PARDOT|pardot)[_\-\s]*(?:CONSUMER[_\-\s]*SECRET|consumer[_\-\s]*secret)[=: ]+([a-zA-Z0-9_-]{20,})'
description = "Pardot OAuth Consumer Secret"
group = 1

[[detector.tests]]
test_positive = "PARDOT_BUSINESS_UNIT_ID=0UvKp4mN8qR2sT6vX0"
test_negative = "PARDOT=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
