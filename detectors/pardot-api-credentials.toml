# Docs: https://developer.salesforce.com/docs/marketing/pardot/guide/authentication.html
# Format: Salesforce OAuth access token with Pardot Business Unit ID (starts with 0Uv, 18 chars)
# Verify: GET /api/v5/objects/prospects with Bearer token and Pardot-Business-Unit-Id header
# Prefix: none (requires context anchoring)

[detector]
id = "pardot-api-credentials"
name = "Salesforce Pardot API Credentials"
service = "pardot"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["pardot", "PARDOT", "business_unit_id", "0Uv"]

[[detector.patterns]]
regex = "PARDOT_BUSINESS_UNIT_ID=(0Uv[a-zA-Z0-9]{15})"
description = "Pardot Business Unit ID (starts with 0Uv, 18 chars)"
group = 1

[[detector.patterns]]
regex = '(?:PARDOT|pardot)[_-]*(?:CONSUMER[_-]*KEY|consumer[_-]*key)[=: ]+([a-zA-Z0-9._-]{20,})'
description = "Pardot OAuth Consumer Key"
group = 1

[[detector.patterns]]
regex = '(?:PARDOT|pardot)[_-]*(?:CONSUMER[_-]*SECRET|consumer[_-]*secret)[=: ]+([a-zA-Z0-9_-]{20,})'
description = "Pardot OAuth Consumer Secret"
group = 1

[[detector.tests]]
test_positive = "PARDOT_BUSINESS_UNIT_ID=0UvKp4mN8qR2sT6vX0"
test_negative = "PARDOT=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
