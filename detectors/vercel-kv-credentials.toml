# Docs: https://vercel.com/docs/storage/vercel-kv
# Format: Redis connection string with rediss:// protocol and .kv.vercel-storage.com host
# Verify: Redis PING command returns PONG (requires Redis client)
# Prefix: rediss:// (requires context anchoring for token)

[detector]
id = "vercel-kv-credentials"
name = "Vercel KV Credentials"
service = "vercel"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["KV_URL", "KV_REST_API_URL", ".kv.vercel-storage.com"]

[[detector.patterns]]
regex = "rediss://default:([A-Za-z0-9_-]{40,})@[a-z0-9-]+\\.kv\\.vercel-storage\\.com:\\d+"
description = "Vercel KV Redis connection string with embedded token"
group = 1

[[detector.patterns]]
regex = "KV_REST_API_TOKEN[=:\\s\"'']+([A-Za-z0-9_-]{40,})"
description = "Vercel KV REST API token with context anchor"
group = 1

[[detector.tests]]
test_positive = "rediss://default:zOYzlRaA8bp9U1E7qoRp3yCQWE7plXt7L1hz4eHmmlHJjLoWRE-zuhgmhW6lE5Jxta9dI7Cm8sVze9mpIvw@p53nar82r-wovjxqtuh9q3d0c9lxbj7xvcaw79o3fp54t3j32vtm4duqj-q6qavhwb5l0kc5krb2q3hyy-cfkpx.kv.vercel-storage.com:2332318582679547000738265301191677548565193813563001"
test_negative = "rediss://default:YOUR_API_KEY_HERE_PLACEHOLDER_VALUE@p53nar82r-wovjxqtuh9q3d0c9lxbj7xvcaw79o3fp54t3j32vtm4duqj-q6qavhwb5l0kc5krb2q3hyy-cfkpx.kv.vercel-storage.com:2332318582679547000738265301191677548565193813563001"
