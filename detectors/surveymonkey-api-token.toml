# Docs: https://developer.surveymonkey.com/api/v3/
# Format: OAuth2 access token or long alphanumeric string
# Verify: GET /v3/users/me with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "surveymonkey-api-token"
name = "SurveyMonkey API Token"
service = "surveymonkey"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["surveymonkey", "SURVEYMONKEY_API_KEY", "SurveyMonkey"]

[[detector.patterns]]
regex = "(?:surveymonkey|SurveyMonkey|SURVEYMONKEY)[_.\\s]*(?:api[_\\-\\s]*token|api[_\\-\\s]*key|access[_\\-\\s]*token)[\\s\"''']+([a-zA-Z0-9_-]{20,})"
description = "SurveyMonkey API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.surveymonkey.com/v3/users/me"
allowed_domains = ["api.surveymonkey.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "SurveyMonkey .        _      _   .      ..   _  _    ._ .._      _    .___  .  _  api     _             _        _          _   _   _ _                __ _  _      _ key             '\"  ' ' \"   \"     '      '        \"           ' \"\"    '  ''  \"\"  o2y1LDibIOSdNQZA1XyFNFSLTuKMIJn"
test_negative = "SurveyMonkey .        _      _   .      ..   _  _    ._ .._      _    .___  .  _  api     _             _        _          _   _   _ _                __ _  _      _ key             '\"  ' ' \"   \"     '      '        \"           ' \"\"    '  ''  \"\"  YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
