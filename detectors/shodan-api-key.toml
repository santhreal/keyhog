# Docs: https://developer.shodan.io/api
# Format: 32 alphanumeric characters
# Verify: GET /api-info with key query parameter returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "shodan-api-key"
name = "Shodan API Key"
service = "shodan"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SHODAN_API_KEY", "shodan", "SHODAN_KEY"]

[[detector.patterns]]
regex = "(?:SHODAN|shodan)(?:_API)?(?:_KEY)?[=:\\s\"'']+([a-zA-Z0-9]{32})"
description = "Shodan API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.shodan.io/api-info?key={{match}}"
allowed_domains = ["api.shodan.io"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "SHODAN=NEnz4Vvb0QWNU48mVysPth7YaJJXUrHz"
test_negative = "SHODAN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
