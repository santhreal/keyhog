# Docs: https://shopify.dev/docs/apps/build/webhooks/subscribe
# Format: 32-64 character hexadecimal string used for HMAC-SHA256 verification
# Verify: no public verification endpoint (used for local webhook validation)
# Prefix: none (requires context anchoring)

[detector]
id = "shopify-webhook-secret"
name = "Shopify Webhook Secret"
service = "shopify"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SHOPIFY_WEBHOOK_SECRET", "webhook_secret", "shopify_webhook", "hmac", "X-Shopify-Hmac-Sha256"]

[[detector.patterns]]
regex = '''(?:SHOPIFY_WEBHOOK_SECRET|shopify[_\-\s]*webhook[_\-\s]*secret)[=:\s"'']+([a-f0-9]{32,64})'''
description = "Shopify webhook secret with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:webhook[_\-\s]*secret|hmac[_\-\s]*key)[=:\s"'']+(?:shopify)?[=:\s"'']*([a-f0-9]{32,64})'''
description = "Generic webhook secret that may be Shopify"
group = 1

[[detector.tests]]
test_positive = "SHOPIFY_WEBHOOK_SECRET=28bda45ee8d94d15c3aadcf94e59f0d6e63244c0"
test_negative = "SHOPIFY_WEBHOOK_SECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
