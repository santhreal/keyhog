# Docs: https://developer.adobe.com/marketo-apis/api/authentication/
# Format: OAuth 2.0 client ID and client secret pair, plus Munchkin account ID
# Verify: POST /identity/oauth/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "marketo-api-credentials"
name = "Marketo API Credentials"
service = "marketo"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["marketo", "munchkin", "client_id", "client_secret"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = 'MARKETO_CLIENT_ID=([a-zA-Z0-9]{20,})'
description = "Marketo Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = 'MARKETO_CLIENT_SECRET=([a-zA-Z0-9_-]{20,})'
description = "Marketo Client Secret with context anchor"
group = 1

[[detector.patterns]]
regex = '(?:MUNCHKIN|munchkin)[_\-\s]*(?:ACCOUNT|account)?[_\-\s]*(?:ID|id)?[=: ]+([a-zA-Z0-9]+)'
description = "Marketo Munchkin Account ID"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "MARKETO_CLIENT_ID=abcdefghijklmnopqrstuvwx12"
test_negative = "MARKETO_CLIENT_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
