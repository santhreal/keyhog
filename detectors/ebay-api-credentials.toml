# Docs: https://developer.ebay.com/api-docs/static/oauth-client-credentials-grant.html
# Format: OAuth 2.0 credentials - App ID (Client ID) and Cert ID (Client Secret)
# Verify: POST /identity/v1/oauth2/token with Basic auth
# Prefix: none (requires context anchoring)

[detector]
id = "ebay-api-credentials"
name = "eBay API Credentials"
service = "ebay"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["EBAY_APP_ID", "EBAY_CERT_ID", "EBAY_CLIENT_ID", "EBAY_CLIENT_SECRET", "ebay", "AppId", "CertId"]

[[detector.patterns]]
regex = "(?:EBAY_APP_ID|EBAY_CLIENT_ID|ebay_app_id|ebay_client_id)[=:\\s\"'']+([a-zA-Z0-9-]{20,})"
description = "eBay App ID (Client ID) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:EBAY_CERT_ID|EBAY_CLIENT_SECRET|ebay_cert_id|ebay_client_secret)[=:\\s\"'']+([a-zA-Z0-9-]{20,})"
description = "eBay Cert ID (Client Secret) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ebay|EBAY)[_=:\\s\"'']+(?:app_id|appId|client_id|clientId)[=:\\s\"'']+([a-zA-Z0-9-]{20,})"
description = "eBay Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ebay|EBAY)[_=:\\s\"'']+(?:cert_id|certId|client_secret|clientSecret)[=:\\s\"'']+([a-zA-Z0-9-]{20,})"
description = "eBay Client Secret with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "https://api.ebay.com/identity/v1/oauth2/token"
allowed_domains = ["api.ebay.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "EBAY_APP_ID=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "EBAY_APP_ID=short"
