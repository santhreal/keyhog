# Docs: https://api-docs.logz.io/docs/logz/create-api-token-request/
# Format: 32-character hexadecimal string (no specific prefix)
# Verify: GET /v1/account-management/whoami with X-API-Token header returns 200 if valid
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "logz-io-api-token"
name = "Logz.io API Token"
service = "logz.io"
severity = "high"
keywords = ["LOGZIO_API_TOKEN", "logzio_api_token", "X-API-Token", "api.logz.io"]

[[detector.patterns]]
regex = "(?:LOGZIO_API_TOKEN|logzio_api_token|X-API-Token)[=:\\s\"']+([a-f0-9]{32})"
description = "Logz.io API token (32 hex chars) with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.logz.io/v1/account-management/whoami"

[detector.verify.auth]
type = "header"
name = "X-API-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "LOGZIO_API_TOKEN=ea3a3ee0cee5c612686ea0c6af0baffc"
test_negative = "LOGZIO_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
