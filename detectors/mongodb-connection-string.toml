# Docs: https://www.mongodb.com/docs/manual/reference/connection-string/
# Format: mongodb://user:pass@host.domain or mongodb+srv://user:pass@host.domain
# Prefix: mongodb

[detector]
id = "mongodb-connection-string"
name = "MongoDB Connection String"
service = "mongodb"
severity = "critical"
keywords = ["mongodb", "mongo"]

[[detector.patterns]]
# Widen the host class to accept Kubernetes service names (`mongo`) and
# docker hostnames, not just dotted-FQDN hosts. Empty username
# (`mongodb://:pass@host`) is also accepted for parity with redis.
# The capture deliberately stops at the host (excludes the trailing
# `/db?retryWrites=true`) so the credential surface matches the existing
# contract harness; SecretBench scoring uses substring containment, so
# the host-bounded capture remains contained in the labeled full URL.
regex = '''mongodb(?:\+srv)?://[^:]*:[^@\s"'']+@[a-zA-Z0-9._-]+'''
description = "MongoDB connection string with credentials (host-bounded capture)"
