# Docs: https://www.mongodb.com/docs/manual/reference/connection-string/
# Format: mongodb://user:pass@host.domain or mongodb+srv://user:pass@host.domain
# Prefix: mongodb

[detector]
id = "mongodb-connection-string"
name = "MongoDB Connection String"
service = "mongodb"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["mongodb", "mongo"]

[[detector.patterns]]
# Require a non-empty username and a dotted-FQDN host (at least one `.`
# in the host part). Dropping the mandatory dot let bare `mongo` /
# `localhost` k8s/docker hostnames and empty-user `mongodb://:pass@host`
# strings match, which were the FP driver. Restoring `[^:@\s"']+` for the
# user and a `host(.host)+` shape re-anchors to a real connection string.
# The capture stops at the host (excludes the trailing `/db?...`) so the
# credential surface matches the existing contract harness; SecretBench
# scoring uses substring containment, so the host-bounded capture remains
# contained in the labeled full URL.
regex = '''mongodb://[^:@\s"']+:[^@\s"'']+@[a-zA-Z0-9_-]+\.[a-zA-Z0-9._-]+'''
description = "MongoDB connection string with credentials (standard scheme, dotted host, non-empty user)"

[[detector.patterns]]
regex = '''mongodb\+srv://[^:@\s"']+:[^@\s"'']+@[a-zA-Z0-9_-]+\.[a-zA-Z0-9._-]+'''
description = "MongoDB SRV connection string with credentials (dotted host, non-empty user)"

[[detector.tests]]
test_positive = "mongodb://dbuser:R7VXNPLMQ3HSKWJT@cluster0.mongodb.net"
test_negative = "mongodb://localhost"
