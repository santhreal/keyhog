# Docs: https://developers.cloudflare.com/kv/
# Format: Cloudflare KV namespace binding with account ID and API token
# Verify: GET /accounts/{account_id}/storage/kv/namespaces with Bearer auth
# Prefix: none (uses account ID + API token combination)

[detector]
id = "cloudflare-kv-credentials"
name = "Cloudflare KV Credentials"
service = "cloudflare"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["CF_ACCOUNT_ID", "CLOUDFLARE_KV", "KV_NAMESPACE", "CF_API_TOKEN"]

[[detector.patterns]]
regex = "(?:CF_ACCOUNT_ID|CLOUDFLARE_ACCOUNT_ID)[=:\\s\"'']+([a-f0-9]{32})"
description = "Cloudflare account ID for KV access"
group = 1

[[detector.companions]]
name = "api_token"
regex = "CF_API_TOKEN[=:\\s\"'']+([a-zA-Z0-9_-]{40})"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.cloudflare.com/client/v4/accounts/{{match}}/storage/kv/namespaces"
allowed_domains = ["api.cloudflare.com"]

[detector.verify.auth]
type = "bearer"
field = "companion.api_token"

[detector.verify.success]
status = 200
json_path = "$.success"
equals = "true"

[[detector.tests]]
test_positive = "CF_ACCOUNT_ID=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "CF_ACCOUNT_ID=short"
