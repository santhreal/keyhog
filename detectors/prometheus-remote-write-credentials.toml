# Docs: https://prometheus.io/docs/practices/remote_write/
# Format: remote_write configuration with basic_auth or bearer_token
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "prometheus-remote-write-credentials"
name = "Prometheus Remote Write Credentials"
service = "prometheus"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["remote_write", "prometheus", "basic_auth"]

[[detector.patterns]]
# Bounded the three `.*` segments that previously spanned newlines.
# Real prometheus.yml puts remote_write -> url -> basic_auth on
# adjacent lines, so 128 non-newline chars per segment is comfortable
# slack without letting the regex match a remote_write block on
# line 1 against a basic_auth block on line 5000. kimi-4 audit.
# Also bounded the captured username to 256 chars.
regex = 'remote_write[^\n]{0,128}\n[^\n]{0,128}url[^\n]{0,128}\n[^\n]{0,128}basic_auth:\s*\n\s*username:\s*([^\s]{1,256})'
description = "Prometheus remote_write basic auth username"
group = 1

[[detector.companions]]
name = "prometheus_remote_write_password"
regex = 'password:\s*([^\s]+)'
within_lines = 6

[[detector.tests]]
test_positive = "remote_write:\n  - url: https://prom.example.com/api/v1/write\n    basic_auth:\n      username: prom_remote_user\n      password: s3cr3t"
test_negative = "remote_write:\n  - url: https://prom.example.com/api/v1/write\n    basic_auth:\n      username: YOUR_API_KEY_HERE_PLACEHOLDER_VALUE\n      password: s3cr3t"
