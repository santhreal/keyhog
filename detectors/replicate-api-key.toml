# Docs: https://replicate.com/docs/reference/http#authentication
# Format: API token starting with 'r8_' followed by 37 alphanumeric characters
# Verify: Bearer token sent to api.replicate.com/v1/models, returns 200 on success
# Prefix: r8_

[detector]
id = "replicate-api-key"
name = "Replicate API Key"
service = "replicate"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["r8_"]

[[detector.patterns]]
regex = 'r8_[a-zA-Z0-9]{37}'
description = "Replicate API token (r8_)"

[detector.verify]
method = "GET"
url = "https://api.replicate.com/v1/models"
allowed_domains = ["api.replicate.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "r8_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw"
test_negative = "r8_short"
