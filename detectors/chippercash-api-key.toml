# Docs: https://www.chippercash.com/api
# Format: API key for Chipper Network API, JWT-based authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "chippercash-api-key"
name = "Chipper Cash API Key"
service = "chippercash"
severity = "critical"
keywords = ["CHIPPER", "chipper", "CHIPPER_CASH", "chipper_cash", "CHIPPER_API_KEY"]

[[detector.patterns]]
regex = "(?:CHIPPER|chipper|CHIPPER_CASH|chipper_cash)[_.]?(?:API_KEY|api_key|TOKEN|token|SECRET|secret|KEY|key)[=:\\s\"']+([a-zA-Z0-9_-]{32,})"
description = "Chipper Cash API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:Chipper)['\"\\s]*[=:]+[\\s]*[\"']?([A-Za-z0-9_-]{32,})[\"']?"
description = "Chipper Cash key with context anchor"
group = 1

[[detector.tests]]
test_positive = "CHIPPER_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "CHIPPER_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
