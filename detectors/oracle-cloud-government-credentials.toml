# Docs: https://docs.oracle.com/en-us/iaas/Content/General/Concepts/govoverview.htm
# Format: Oracle Cloud Government uses same OCID format as commercial but with government-specific regions
# Verify: No public verification endpoint
# Prefix: ocid1

[detector]
id = "oracle-cloud-government-credentials"
name = "Oracle Cloud Government Credentials"
service = "oracle-cloud-government"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["OCI_GOVERNMENT", "ORACLE_CLOUD_GOV", "ocid1", "us-gov-ashburn-1", "us-gov-chicago-1"]

[[detector.patterns]]
regex = '''(?:OCI[_\-\s]*GOVERNMENT|ORACLE[_\-\s]*CLOUD[_\-\s]*GOV)[_\-\s]*(?:FINGERPRINT)[=:\s"'']+([a-f0-9]{2}(?::[a-f0-9]{2}){15})'''
description = "Oracle Cloud Government API key fingerprint"
group = 1

[[detector.patterns]]
regex = '''(?:OCI[_\-\s]*GOVERNMENT|ORACLE[_\-\s]*CLOUD[_\-\s]*GOV)[_\-\s]*(?:REGION)[=:\s"'']+(us-gov-[a-z]+-[0-9])'''
description = "Oracle Cloud Government region"
group = 1

[[detector.patterns]]
regex = '''(?:OCI[_\-\s]*GOVERNMENT|ORACLE[_\-\s]*CLOUD[_\-\s]*GOV)[_\-\s]*(?:TENANCY)[=:\s"'']+(ocid1\.tenancy\.oc1\.[a-z0-9]+\.[a-z0-9]{60,})'''
description = "Oracle Cloud Government tenancy OCID"
group = 1

[[detector.patterns]]
regex = '''(?:OCI[_\-\s]*GOVERNMENT|ORACLE[_\-\s]*CLOUD[_\-\s]*GOV)[_\-\s]*(?:USER[_\-\s]*ID)[=:\s"'']+(ocid1\.user\.oc1\.[a-z0-9]+\.[a-z0-9]{60,})'''
description = "Oracle Cloud Government user OCID"
group = 1

[[detector.tests]]
test_positive = "OCI_GOVERNMENT TENANCY=ocid1.tenancy.oc1.phx1a.oipheifdkpancllhjoeikifkgkaignkcggcdmciaadkmkllnhbbmfmabfmoi"
test_negative = "OCI_GOVERNMENT TENANCY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
