# Docs: https://dev.loom.com/docs/record-sdk/details/key-pair-authentication/
# Format: OAuth2 access token - JWT format or opaque string
# Verify: GET /v1/videos with Bearer token
# Prefix: none (OAuth2 standard token)

[detector]
id = "loom-api-token"
name = "Loom API Access Token"
service = "loom"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["LOOM", "loom"]

[[detector.patterns]]
regex = '''(?:LOOM|loom)[._-]?(?:TOKEN|token|ACCESS|access)[=:\s"']+(eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*)'''
description = "Loom access token with context anchor (JWT format)"
group = 1

[[detector.patterns]]
regex = '''(?:LOOM|loom)[._-]?(?:API|api)[._-]?(?:KEY|key|TOKEN|token)[=:\s"']+([a-zA-Z0-9_-]{30,})'''
description = "Loom API key/token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.loom.com/v1/videos"
allowed_domains = ["api.loom.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "LOOM_API_TOKEN=abgfAPVXbb5fupwJ2p-m_0cpaYef-z"
test_negative = "LOOM_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
