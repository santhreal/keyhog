# Docs: https://dev.loom.com/docs/record-sdk/details/key-pair-authentication/
# Format: OAuth2 access token - JWT format or opaque string
# Verify: GET /v1/videos with Bearer token
# Prefix: none (OAuth2 standard token)

[detector]
id = "loom-api-token"
name = "Loom API Access Token"
service = "loom"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["LOOM", "loom"]

[[detector.patterns]]
regex = '''(?:LOOM|loom)[._-]?(?:TOKEN|token|ACCESS|access)[=:\s"']+(eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*)'''
description = "Loom access token with context anchor (JWT format)"
group = 1

[[detector.patterns]]
regex = '''(?:LOOM|loom)[._-]?(?:API|api)[._-]?(?:KEY|key|TOKEN|token)[=:\s"']+([a-zA-Z0-9_-]{30,})'''
description = "Loom API key/token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.loom.com/v1/videos"
allowed_domains = ["api.loom.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "LOOM_API_TOKEN=abgfAPVXbb5fupwJ2p-m_0cpaYef-z"
test_negative = "LOOM_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
