# Docs: https://linear.app/developers/graphql
# Format: lin_api_ prefix followed by 40 alphanumeric characters
# Verify: POST request to Linear GraphQL API with Authorization header
# Prefix: lin_api_

[detector]
id = "linear-api-key"
name = "Linear API Key"
service = "linear"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["lin_api_"]

[[detector.patterns]]
regex = 'lin_api_[a-zA-Z0-9]{40}'
description = "Linear API key (lin_api_ prefix, 40 chars)"

[detector.verify]
method = "POST"
url = "https://api.linear.app/graphql"
allowed_domains = ["api.linear.app"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "lin_api_9X3kQp7VbT2hYRzNcMfWj4DgEsLuHaIoBnVkPxKq"
test_negative = "lin_api_short"
