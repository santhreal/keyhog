# Docs: https://developer.mastercard.com/open-finance-us/documentation/
# Format: Partner ID is numeric, Partner Secret is alphanumeric (typically 32+ chars), App Key is alphanumeric
# Verify: POST /aggregation/v2/partners/authentication with Partner ID/Secret
# Prefix: none (requires context anchoring)

[detector]
id = "finicity-partner-credentials"
name = "Finicity Partner Credentials"
service = "finicity"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["FINICITY_PARTNER_ID", "FINICITY_PARTNER_SECRET", "FINICITY_APP_KEY", "partnerId", "partnerSecret"]

[[detector.patterns]]
regex = "(?:FINICITY|finicity)[._-]?(?:PARTNER|partner)?[._-]?(?:ID|id)[=:\\s\"'']+(\\d{6,10})"
description = "Finicity Partner ID (numeric identifier)"
group = 1

[[detector.patterns]]
regex = "(?:FINICITY|finicity)[._-]?(?:PARTNER|partner)?[._-]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9]{32,40})"
description = "Finicity Partner Secret (alphanumeric string)"
group = 1

[[detector.patterns]]
regex = "(?:FINICITY|finicity)[._-]?(?:APP|app)?[._-]?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9]{20,40})"
description = "Finicity App Key (alphanumeric string)"
group = 1

[[detector.tests]]
test_positive = "FINICITY_PARTNER_ID=1234567"
test_negative = "FINICITY_PARTNER_ID=short"
