# Docs: https://docs.logz.io/docs/log-shipping/
# Format: 32-character hexadecimal string (no specific prefix)
# Verify: POST to listener.logz.io:8071 with token returns 200 if valid
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "logz-io-shipping-token"
name = "Logz.io Shipping Token"
service = "logz.io"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["LOGZIO_TOKEN", "logzio_token", "logz.io", "LOGZIO_SHIPPING_TOKEN", "listener.logz.io"]

[[detector.patterns]]
regex = "(?:LOGZIO_TOKEN|logzio_token|LOGZIO_SHIPPING_TOKEN)[=:\\s\"']+([a-f0-9]{32})"
description = "Logz.io log shipping token (32 hex chars) with context anchor"
group = 1

[[detector.tests]]
test_positive = "LOGZIO_TOKEN=f2fa077663b2c802ba773043ea4c1058"
test_negative = "LOGZIO_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
