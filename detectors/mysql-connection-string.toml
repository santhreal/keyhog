# Docs: https://dev.mysql.com/doc/connector-j/en/
# Format: mysql://user:pass@host.domain:port/db
# Prefix: mysql

[detector]
id = "mysql-connection-string"
name = "MySQL Connection String"
service = "mysql"
severity = "critical"
keywords = ["mysql", "DATABASE_URL"]
min_confidence = 0.2

[[detector.patterns]]
# Widen the host class to accept Kubernetes service names (`mysql-db`),
# docker hostnames (`mysql`), and IP literals, not just dotted-FQDN
# hosts. Empty username (`mysql://:pass@host`) is also accepted for
# parity with redis. The capture deliberately stops at the host
# (excludes the trailing `/db?query`) so the credential surface matches
# the existing contract harness.
regex = '''mysql://[^:]*:[^@\s"'']+@[a-zA-Z0-9._-]+'''
description = "MySQL connection string with credentials (host-bounded capture)"
