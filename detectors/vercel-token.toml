# Docs: https://vercel.com/docs/rest-api
# Format: 24 character alphanumeric string (no unique prefix)
# Verify: GET /v9/user with Bearer token returns 200 if valid
# Prefix: none (24 char alphanumeric, requires keyword context)

[detector]
id = "vercel-token"
name = "Vercel Token"
service = "vercel"
severity = "critical"
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.3
keywords = ["vercel", "VERCEL", "VERCEL_TOKEN", "vercel_token", "VERCEL_API_TOKEN"]

[[detector.patterns]]
regex = "(?:vercel|VERCEL)[_\\-\\s]*(?:token|TOKEN|api[_\\-\\s]*token|API[_\\-\\s]*TOKEN)[=:\\s\\\"']+([a-zA-Z0-9]{24})"
description = "Vercel API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.vercel.com/v9/user"
allowed_domains = ["api.vercel.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "VERCEL_TOKEN=Xh7QkP4mZ2sBvR9aT5fN8cWy"
test_negative = "VERCEL_TOKEN=short"
