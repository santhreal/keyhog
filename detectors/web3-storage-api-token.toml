# Docs: https://web3.storage/docs/
# Format: UCAN-based token starting with 'z' followed by base58btc-encoded data (no 0, O, I, l)
# Verify: https://web3.storage/docs/reference/http-api/
# Prefix: z (for UCAN tokens), but must be context-anchored

[detector]
id = "web3-storage-api-token"
name = "Web3.Storage API Token"
service = "web3storage"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["WEB3_STORAGE", "web3.storage", "WEB3STORAGE", "w3s", "w3up"]

[[detector.patterns]]
regex = "(?:WEB3|web3)[._-]?(?:STORAGE|storage)[._-]?(?:TOKEN|token|API|api)[=:\\s\"'\\']+(z[1-9A-HJ-NP-Za-km-z]{80,})"
description = "Web3.Storage UCAN token with context anchor and base58btc character set"
group = 1

[detector.verify]
method = "GET"
url = "https://api.web3.storage/user/info"
allowed_domains = ["api.web3.storage"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "WEB3_STORAGE_api\" :''= :  : =  =:' '    '     =':  :  =  ' ' :  :=   ' :' '   :  :  = \" = ztBgX8885i7cJJ3AFamWevxVwRRNP17GA1vuF3j6uPcjvc5i7NBFchxP2Cf8izK47yUGqPT3x8aDqrxeX"
test_negative = "WEB3_STORAGE_api\" :''= :  : =  =:' '    '     =':  :  =  ' ' :  :=   ' :' '   :  :  = \" = YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
