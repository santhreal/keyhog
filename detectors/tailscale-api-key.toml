# Docs: https://tailscale.com/docs/reference/key-prefixes
# Format: tskey-api- prefix followed by alphanumeric characters (e.g., tskey-api-kAbCdEfGhIjKlMnOpQrStUvWxYz)
# Verify: GET /api/v2/tailnet/-/devices with Bearer token returns 200 if valid
# Prefix: tskey-api-

[detector]
id = "tailscale-api-key"
name = "Tailscale API Key"
service = "tailscale"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["tskey-api-"]

[[detector.patterns]]
regex = 'tskey-api-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
description = "Tailscale API access token (tskey-api- prefix)"

[detector.verify]
method = "GET"
url = "https://api.tailscale.com/api/v2/tailnet/-/devices"
allowed_domains = ["api.tailscale.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "tskey-api-bHbEzy1zf6wCro8yiOZ8HEFGG742OVcXgVErdxjAWQUaHqRRfdcjvAe-UZ2bOS0aRNzaoiZNmL3QqvhSyYOPeMhhlFrr7U3l"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
