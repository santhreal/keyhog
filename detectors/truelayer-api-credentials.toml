# Docs: https://docs.truelayer.com/
# Format: client_id and client_secret for OAuth2, plus signing keys for payments
# Verify: POST /connect/token with client credentials
# Prefix: sandbox-, live- (for some client IDs)

[detector]
id = "truelayer-api-credentials"
name = "TrueLayer API Credentials"
service = "truelayer"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["TRUELAYER_CLIENT_ID", "TRUELAYER_CLIENT_SECRET", "client_id", "client_secret"]

[[detector.patterns]]
regex = "(?:TRUELAYER|truelayer)[._-]?(?:CLIENT|client)?[._-]?(?:ID|id)[=:\\s\"'']+((?:sandbox-|live-)?[a-z0-9-]{20,50})"
description = "TrueLayer Client ID with optional sandbox/live prefix"
group = 1

[[detector.patterns]]
regex = "(?:TRUELAYER|truelayer)[._-]?(?:CLIENT|client)?[._-]?(?:SECRET|secret)[=:\\s\"'']+([a-z0-9]{20,60})"
description = "TrueLayer Client Secret"
group = 1

[[detector.tests]]
test_positive = "TRUELAYERID=gxay7pfmbpynabqmuwle"
test_negative = "TRUELAYERID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
