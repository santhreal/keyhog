# Docs: https://docs.abuseipdb.com/
# Format: 80 alphanumeric characters
# Verify: GET /api/v2/check with Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "abuseipdb-api-key"
name = "AbuseIPDB API Key"
service = "abuseipdb"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
min_confidence = 0.25
keywords = ["ABUSEIPDB_API_KEY", "ABUSEIPDB", "abuseipdb"]

[[detector.patterns]]
regex = "(?:ABUSEIPDB|abuseipdb)[_a-zA-Z0-9]*[=:\\s\"'']+([a-zA-Z0-9]{80})"
description = "AbuseIPDB API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.abuseipdb.com/api/v2/check?ipAddress=8.8.8.8"
allowed_domains = ["api.abuseipdb.com"]

[detector.verify.auth]
type = "header"
name = "Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ABUSEIPDB_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "ABUSEIPDB_API_KEY=short"
