# Docs: https://www.contentful.com/developers/docs/references/authentication/
# Format: CFPAT- prefix followed by 43 alphanumeric, underscore, or hyphen chars
# Verify: GET request to Contentful users/me endpoint with Bearer token
# Prefix: CFPAT-

[detector]
id = "contentful-management-token"
name = "Contentful Management Token"
service = "contentful"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CFPAT-", "contentful"]

[[detector.patterns]]
regex = 'CFPAT-[a-zA-Z0-9_-]{43}'
description = "Contentful Personal Access Token (Management API)"

[detector.verify]
method = "GET"
url = "https://api.contentful.com/users/me"
allowed_domains = ["api.contentful.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "CFPAT-Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4"
test_negative = "CFPAT-Kp4Qx7Rm2Sn5Tb8Vw3Yz"
