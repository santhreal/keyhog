# Docs: https://docs.hetzner.com/cloud/api/faq/
# Format: 64 character alphanumeric string (32 byte prefix + 32 byte secret)
# Verify: GET /v1/servers with Authorization: Bearer token returns 200 if valid
# Prefix: none (64 character hex-like string, requires context anchoring)

[detector]
id = "hetzner-api-token"
name = "Hetzner Cloud API Token"
service = "hetzner"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["HCLOUD_TOKEN", "hetzner", "hcloud"]

[[detector.patterns]]
regex = "(?:HCLOUD_TOKEN|hetzner|hcloud)[=:\\s\"'']+([a-f0-9]{64})"
description = "Hetzner Cloud API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.hetzner.cloud/v1/servers"
allowed_domains = ["api.hetzner.cloud"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "HCLOUD_TOKEN=c5fd1aee81e06b2f61bfe276214ca7aa8f6051ea71dcaa2e40187610db9d78db"
test_negative = "HCLOUD_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
