# Docs: https://docs.scalr.io/reference/overview-1
# Format: JWT-style token (Bearer token) or Personal Access Token
# Verify: GET /api/iacp/v3/account with Authorization: Bearer header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "scalr-api-token"
name = "Scalr API Token"
service = "scalr"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["SCALR_TOKEN", "scalr.io", "Authorization", "Bearer"]

[[detector.patterns]]
regex = '''(?:SCALR[_\-\s]*TOKEN|SCALR[_\-\s]*API[_\-\s]*TOKEN)[=:\s"'']+(eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*)'''
description = "Scalr API JWT token with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:SCALR[_\-\s]*HOSTNAME)[=:\s"'']+([a-zA-Z0-9_-]+\.scalr\.io)'''
description = "Scalr hostname for API endpoint"
group = 1

[[detector.patterns]]
regex = "Authorization[=:\\s\"'']+[Bb]earer\\s+(eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*)"
description = "Scalr Bearer JWT token"
group = 1

[[detector.tests]]
test_positive = "SCALR_TOKEN=eyJqEn0DWRqaI8.eyJ2EZmQ0rQI1KS2vAHKhbVxPEJrwHqJUcpDGcDzG5b6ZjeO_rTJlAFLwM_mj9M4z90pm5indkRJqaMe_7qcLhcbk.zatKoCFZ3LnYyOgxIRh6SRcFLfddJzxS8Kk2_emw-BnII8IGYXfjppfEeEqE_K0IGediMBiPhaX7Te67vFmO6XL7wc-93hJ"
test_negative = "SCALR_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
