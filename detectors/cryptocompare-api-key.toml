# Docs: https://min-api.cryptocompare.com/documentation
# Format: Variable length alphanumeric string (no distinctive prefix)
# Verify: GET /data/price with Authorization header returns 200 if valid
# Prefix: none (alphanumeric string, requires context keywords)

[detector]
id = "cryptocompare-api-key"
name = "CryptoCompare API Key"
service = "cryptocompare"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["cryptocompare", "CRYPTOCOMPARE", "CRYPTOCOMPARE_API_KEY", "cryptocompare_api_key", "min-api.cryptocompare.com"]

[[detector.patterns]]
regex = "(?:CRYPTOCOMPARE|cryptocompare)[_\\-\\.]?(?:API[_\\-\\.]?KEY|api[_\\-\\.]?key)[=:\\s\\\"']+([a-zA-Z0-9]{20,})"
description = "CryptoCompare API key with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization[=:\\s\\\"']+(?:Apikey\\s+)?([a-zA-Z0-9]{20,})[^\\n]*cryptocompare"
description = "CryptoCompare API key in Authorization header (same-line cryptocompare anchor; a bare Authorization header value is not service-attributable)"
group = 1

[detector.verify]
method = "GET"
url = "https://min-api.cryptocompare.com/data/price?fsym=BTC&tsyms=USD"
allowed_domains = ["min-api.cryptocompare.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Apikey {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "cryptocompare-apikey:I0KlQV3zt8j3ItZqVtLrUbpqepvgWw1r"
test_negative = "cryptocompare key short"
