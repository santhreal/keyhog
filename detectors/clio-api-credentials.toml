# Docs: https://docs.clio.com/api-reference/authentication/
# Format: OAuth 2.0 client credentials - Client ID is UUID, Client Secret is hex
# Verify: POST to token endpoint with client_credentials grant
# Prefix: none (requires context anchoring)

[detector]
id = "clio-api-credentials"
name = "Clio API Credentials"
service = "clio"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["CLIO_CLIENT_ID", "CLIO_CLIENT_SECRET", "clio_client_id", "clio_client_secret"]

[[detector.patterns]]
regex = '''(?:CLIO|clio)[_\-\s]*(?:CLIENT[_\-\s]*ID|client[_\-\s]*id)[=:\s"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "Clio OAuth Client ID (UUID format)"
group = 1

[[detector.patterns]]
regex = '''(?:CLIO|clio)[_\-\s]*(?:CLIENT[_\-\s]*SECRET|client[_\-\s]*secret)[=:\s"'']+([a-f0-9]{32,64})'''
description = "Clio OAuth Client Secret (hex string)"
group = 1

[[detector.tests]]
test_positive = "CLIO_CLIENT_ID=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "CLIO_CLIENT_SECRET=short"
