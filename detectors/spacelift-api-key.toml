# Docs: https://docs.spacelift.io/concepts/spacectl
# Format: API key ID and secret pair, plus JWT tokens (SPACELIFT_API_KEY_ID, SPACELIFT_API_KEY_SECRET)
# Verify: POST /graphql with apiKeyUser mutation returns JWT if valid
# Prefix: none (requires context anchoring)

[detector]
id = "spacelift-api-key"
name = "Spacelift API Key"
service = "spacelift"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["SPACELIFT_API_KEY", "spacectl", "SPACELIFT_TOKEN"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:SPACELIFT[_\-\s]*API[_\-\s]*KEY[_\-\s]*ID)[=:\s"'']+([a-zA-Z0-9_-]+)'''
description = "Spacelift API Key ID"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = '''(?:SPACELIFT[_\-\s]*API[_\-\s]*KEY[_\-\s]*SECRET)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Spacelift API Key Secret"
group = 1

[[detector.patterns]]
regex = '''(?:SPACELIFT[_\-\s]*API[_\-\s]*TOKEN|SPACELIFT[_\-\s]*TOKEN)[=:\s"'']+(eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*)'''
description = "Spacelift JWT API token"
group = 1

[[detector.patterns]]
regex = "apiKeyUser\\s*\\(\\s*id\\s*:\\s*\"([a-zA-Z0-9_-]+)\""
description = "Spacelift API Key ID in GraphQL mutation"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "SPACELIFT_TOKEN=eyJlh4gmpKuEvkwmoEhlBA1QPdLCTuoARuZx70KNqa6sYa6CucvELAWX-rSml4JuHm66N5_FJv7ONZs3urH.eyJ_Y-lC08IeiZDhXg-1jL475aE_LHd7Uu1E5C9N1.682JzA4aHBY6IEDHZhBz9uu2yN3cULBuNnWy"
test_negative = "SPACELIFT_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
