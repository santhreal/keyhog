# Docs: https://www.twilio.com/docs/usage/webhooks/webhooks-security
# Format: 32-40 character alphanumeric string used for HMAC-SHA256 signature verification
# Verify: no public verification endpoint (local signature verification using X-Twilio-Signature header)
# Prefix: none (requires context anchoring)

[detector]
id = "twilio-webhook-signing-secret"
name = "Twilio Webhook Signing Secret"
service = "twilio"
severity = "high"
keywords = ["TWILIO_WEBHOOK_SECRET", "twilio_webhook_secret", "X-Twilio-Signature"]

[[detector.patterns]]
regex = "(?:TWILIO|twilio)[_.\\-]?(?:WEBHOOK|webhook)[_.\\-]?(?:SECRET|secret|AUTH|auth)[=:\\s\"']+([a-zA-Z0-9]{32,40})"
description = "Twilio webhook signing secret with context anchor"
group = 1

# The `twilio_auth_token=` shape is the Twilio AUTH TOKEN, owned by the
# `twilio-auth-token` detector - NOT a webhook signing secret. A second pattern
# matching `(?:twilio)?[_-]?auth[_-]?token=...` lived here and mis-attributed
# every leaked auth token as a "Twilio Webhook Signing Secret" (wrong service
# label + wrong remediation). Removed: the auth token is fully covered by
# twilio-auth-token; the webhook secret is set via `TWILIO_WEBHOOK_SECRET` /
# the `X-Twilio-Signature` flow, which regex 1 above anchors on.
