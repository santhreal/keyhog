# Docs: https://docs.autoblocks.ai/
# Format: AB- prefix followed by alphanumeric characters
# Verify: GET /prompts/types with Bearer auth
# Prefix: AB-

[detector]
id = "autoblocks-api-key"
name = "Autoblocks API Key"
service = "autoblocks"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["AB-", "AUTOBLOCKS_V2_API_KEY", "AUTOBLOCKS_API_KEY", "autoblocks"]

[[detector.patterns]]
# (?-i): the AB- prefix is uppercase (canonical positive AB-Kp4Qx7Rm2Sn5...).
# keyhog's default case-insensitive compile matched lowercase `ab-...`
# identifiers (config keys, doc slugs, manpage tokens) - 25 FPs on a stock
# /usr/share + /usr/include scan. Dogfood 2026-05-29.
regex = "(?-i)AB-[a-zA-Z0-9_-]{20,}"
description = "Autoblocks API key (AB- prefix)"

[[detector.patterns]]
regex = "(?:AUTOBLOCKS_V2_API_KEY|AUTOBLOCKS_API_KEY)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Autoblocks API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api-v2.autoblocks.ai/prompts/types"
allowed_domains = ["api-v2.autoblocks.ai"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "Bearer {{match}}"

[[detector.tests]]
test_positive = "AB-Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "AB-short"
