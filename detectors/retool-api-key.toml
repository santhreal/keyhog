# Docs: https://docs.retool.com/data/api
# Format: retool_api_<32+ alphanumeric characters>
# Verify: none (Retool deployments are organization-specific; generic verification is unsafe)
# Prefix: retool_api_

[detector]
id = "retool-api-key"
name = "Retool API Key"
service = "retool"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["retool_api_", "RETOOL_API_KEY", "retool"]

[[detector.patterns]]
regex = 'retool_api_[a-zA-Z0-9]{32,}'
description = "Retool API key (retool_api_ prefix)"

[[detector.tests]]
test_positive = "retool_api_0sI0n2TSM9vvCvZmGeP8eoWow4CByclT"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
