# Docs: https://www.postman.com/sovos-compliance/sovos-developer-guide-public/
# Format: API Key and Secret used for Basic authentication
# Verify: POST /oauth/token with Basic auth (key:secret) to get access token
# Prefix: none (requires context anchoring)

[detector]
id = "sovos-api-key"
name = "Sovos API Key"
service = "sovos"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["SOVOS", "sovos", "api_secret"]

[[detector.patterns]]
regex = "(?:SOVOS|sovos)[._]?(?:API|api)?[._]?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Sovos API key with context anchor"
group = 1

[[detector.companions]]
name = "sovos_api_secret"
regex = "(?:SOVOS|sovos)[._]?(?:API|api)?[._]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
within_lines = 5

[[detector.tests]]
test_positive = "SOVOS_API_KEY=Z5bJgWzWferfBeuIonJB"
test_negative = "SOVOS_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
