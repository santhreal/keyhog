# Docs: https://docs.delinea.com/online-help/secret-server/api-overview.htm
# Format: Delinea uses OAuth2 or API tokens, typically with /oauth2/token or /api/v1 endpoints
# Verify: POST /oauth2/token with credentials returns access token
# Prefix: none (requires context anchoring)

[detector]
id = "delinea-secret-server-credentials"
name = "Delinea Secret Server Credential"
service = "delinea"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["DELINEA", "delinea", "SECRET_SERVER", "secretserver", "thycotic"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32, 40, 48, 64] }]

[[detector.patterns]]
# Bounded the captured credential length to 256 chars; the original
# `+` had no upper bound and a malformed config dump could trigger
# a multi-KB capture. kimi-4 audit.
regex = '''(?:DELINEA|delinea|THYCOTIC|thycotic)[._](?:USERNAME|username|PASSWORD|password|TOKEN|token)[=:\s"']+([a-zA-Z0-9!@#$%^&*._-]{1,256})'''
description = "Delinea Secret Server credential with context anchor"
group = 1
weak_anchor = true

[[detector.patterns]]
# Bounded the hostname-to-path bridge to 128 non-newline chars. The
# Delinea endpoint shape is always `https://secretserver.<host>/...`
# so the literal and the path live on the same URL - they're never
# megabytes apart. kimi-4 audit.
regex = 'secretserver[^\n]{0,128}(?:/oauth2/token|/api/v1)'
description = "Delinea Secret Server API endpoint reference"

[[detector.tests]]
test_positive = "DELINEA.TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "DELINEA.TOKEN="
