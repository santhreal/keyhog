# Docs: https://www.algolia.com/doc/guides/security/api-keys/
# Format: 32 character hexadecimal string (search-only key)
# Verify: none (requires paired application ID for verification)
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "algolia-api-key"
name = "Algolia API Key"
service = "algolia"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
min_confidence = 0.20
keywords = ["ALGOLIA_API_KEY", "algolia_api_key", "search_api_key", "ALGOLIA_SEARCH_KEY"]

[[detector.patterns]]
regex = "(?i)algolia[_.-]?(?:api|search)[_.-]?key[=:\\s\"']+([a-f0-9]{32})"
description = "Algolia API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?i)search[_\-\s]*api[_\-\s]*key[=:\s"']+([a-f0-9]{32})'''
description = "Algolia search_api_key YAML/env form"
group = 1

[[detector.companions]]
name = "application_id"
regex = '''(?:ALGOLIA_APP(?:LICATION)?_ID|algolia[_\-\s]*app(?:lication)?[_\-\s]*id|app[_\-\s]*id)[=:\s"']+([A-Z0-9]{10})'''
within_lines = 5
[detector.verify]
method = "GET"
url = "https://{{companion.application_id}}-dsn.algolia.net/1/indexes"
# `{{companion.application_id}}` fills the subdomain only; pin the apex.
allowed_domains = ["algolia.net"]

[detector.verify.auth]
type = "header"
name = "X-Algolia-API-Key"
template = "{{match}}"

[[detector.verify.headers]]
name = "X-Algolia-Application-Id"
value = "{{companion.application_id}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ALGOLIA_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ALGOLIA_API_KEY=short"
