# Docs: https://shopify.dev/docs/apps/build/authentication-authorization/access-tokens
# Format: Prefix shpca_ followed by 32 hex chars (custom app access token)
# Verify: API call to {{shop}}.myshopify.com/admin/api/{version}/shop.json
# Prefix: shpca_
#
# Scope: this detector owns ONLY the `shpca_` (custom app) token shape.
# The `shpat_` (admin API) and `shpss_` (storefront) shapes have their own
# dedicated detectors - `shopify-admin-api-token` and
# `shopify-storefront-api-token`. Patterns for those two prefixes lived here
# too and made every admin/storefront token report twice (once as the
# specific type, once as the generic "Shopify Access Token"): identical
# offset + value, two detector names. Removed so each Shopify prefix maps to
# exactly one detector. This file now matches its own contract, which has
# always declared `shpca_` only.

[detector]
id = "shopify-access-token"
name = "Shopify Access Token"
service = "shopify"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
decode_transforms = { reverse_prefixes = ["shpca_"], caesar_prefixes = ["shpca_"] }
keywords = ["shpca_", "shopify"]

[[detector.patterns]]
regex = 'shpca_[a-f0-9]{32}'
description = "Shopify custom app access token"

# NOTE: live verification disabled. `{{shop}}` was never defined as a
# capture group or companion. kimi-wave3 §1. To re-enable, add a
# companion `shop` constrained to actual store handles.

[[detector.tests]]
test_positive = "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"
test_negative = "shpca_short"
