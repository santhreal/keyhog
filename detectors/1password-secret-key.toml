# Docs: https://developer.1password.com/docs/connect/get-started/
# Format: A3- followed by five or six uppercase alpha-numeric segments.
# Prefix: A3-

[detector]
id = "1password-secret-key"
name = "1Password Secret Key"
service = "1password"
severity = "critical"
keywords = ["A3-"]
simdsieve_prefixes = ["A3-"]

[[detector.patterns]]
regex = 'A3-[A-Z0-9]{6,8}(?:-[A-Z0-9]{4,12}){4,5}'
description = "1Password account secret key"

[[detector.tests]]
test_positive = "A3-ASWWYB-798JRYLJVD-23DC2-86TVM-H43EB"
test_negative = "A3-short-placeholder"
