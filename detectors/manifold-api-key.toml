# Docs: https://docs.manifold.markets/api
# Format: API key passed as "Authorization: Key {key}" header
# Verify: GET /v0/me with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "manifold-api-key"
name = "Manifold API Key"
service = "manifold"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["manifold", "MANIFOLD", "manifold.markets"]

[[detector.patterns]]
regex = '''(?:manifold|MANIFOLD)[_\-\s]*(?:API[_\-\s]*)?KEY[_\-\s]*[=:][\s]*["'']+([a-zA-Z0-9_-]{20,})["'']+'''
description = "Manifold API key in assignment context"
group = 1

[[detector.patterns]]
regex = "Authorization[\\s]*:[\\s]*Key[\\s]+([a-zA-Z0-9_-]{20,})"
description = "Manifold API key in Authorization header"
group = 1

[[detector.tests]]
test_positive = "MANIFOLD_API_KEY=\"O9EkRvoos0MLOSBAcw3v\""
test_negative = "MANIFOLD_API_KEY=\"YOUR_API_KEY_HERE_PLACEHOLDER_VALUE\""
