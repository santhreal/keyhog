# Docs: https://developer.typeform.com/get-started/
# Format: 40 character hex string (OAuth2 access token)
# Verify: GET /forms with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "typeform-api-token"
name = "Typeform API Token"
service = "typeform"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["typeform", "TYPEFORM_API_TOKEN", "typeform_token"]

[[detector.patterns]]
regex = "(?:typeform|TYPEFORM)[_.\\s]*(?:api[_\\-\\s]*token|api[_\\-\\s]*key|token|TOKEN)[\\s\"''']+([a-f0-9]{40})"
description = "Typeform API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.typeform.com/forms"
allowed_domains = ["api.typeform.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "TYPEFORM       _    ..   _ . .         _     .  .           .  _  __.._ .     ._   _   _   ..__ _ _      api _   ___ _      _  _     _        _   _ __    _        _          _                 _   _ token'    '      \"      \"      \"      ''   ' \"                  \"   93c8225363ba8480f1cdaad7c91d23f71d6c7902"
test_negative = "TYPEFORM       _    ..   _ . .         _     .  .           .  _  __.._ .     ._   _   _   ..__ _ _      api _   ___ _      _  _     _        _   _ __    _        _          _                 _   _ token'    '      \"      \"      \"      ''   ' \"                  \"   YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
