# Docs: https://docs.defined.fi/
# Format: 64 character hexadecimal string
# Verify: no public verification endpoint
# Prefix: none (64 char hex, requires context anchoring)

[detector]
id = "definedfi-api-key"
name = "Defined.fi API Key"
service = "definedfi"
severity = "medium"
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["defined", "DEFINED", "definedfi"]

[[detector.patterns]]
regex = "(?:DEFINED|defined)[_=:\\s\"'']+(?:api[_-]?)?key[=:\\s\"'']+([a-f0-9]{64})"
description = "Defined.fi API key (64 char hex) with context anchor"
group = 1

[[detector.tests]]
test_positive = "defined_api_key=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "defined_key=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
