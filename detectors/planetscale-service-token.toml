# Docs: https://planetscale.com/docs/concepts/service-tokens
# Format: Service token starting with 'pscale_tkn_' followed by a 43-character URL-safe body
# Verify: Sent in Authorization header to api.planetscale.com/v1/organizations, returns 200 on success
# Prefix: pscale_tkn_

[detector]
id = "planetscale-service-token"
name = "PlanetScale Service Token"
service = "planetscale"
severity = "high"
keywords = ["pscale_tkn", "planetscale", "PLANETSCALE_SERVICE_TOKEN"]

[[detector.patterns]]
regex = 'pscale_tkn_[a-zA-Z0-9_-]{43}'
description = "PlanetScale service token (pscale_tkn_ prefix, 43 URL-safe chars)"

[detector.verify]
method = "GET"
url = "https://api.planetscale.com/v1/organizations"
allowed_domains = ["api.planetscale.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pscale_tkn_EwD5ne5cVM87vVUvFegDFbHqRWPLuPfgovlAxiHFhIB"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
