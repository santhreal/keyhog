# Docs: https://gotify.net/docs/pushmsg
# Format: Application token is alphanumeric (typically 15+ chars), or X-Gotify-Key header
# Verify: POST to /message with X-Gotify-Key header
# Prefix: none (requires context anchoring)

[detector]
id = "gotify-token"
name = "Gotify Token"
service = "gotify"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["GOTIFY", "gotify", "GOTIFY_TOKEN", "GOTIFY_APP_TOKEN"]

[[detector.patterns]]
regex = '(?:GOTIFY|gotify)[=:][\s"]*([A-Za-z0-9]{15,})'
description = "Gotify application token with context anchor"
group = 1

[[detector.tests]]
test_positive = "GOTIFY=HNGeqyx6CjQ29z3"
test_negative = "GOTIFY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
