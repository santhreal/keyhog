# Docs: https://www.contentful.com/developers/docs/references/authentication/
# Format: 43 character base64url string
# Verify: GET /spaces/{space_id} with Authorization header
# Prefix: none (43 char base64, requires context anchoring)

[detector]
id = "contentful-delivery-token"
name = "Contentful Delivery Token"
service = "contentful"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["CONTENTFUL_DELIVERY_TOKEN", "CONTENTFUL_ACCESS_TOKEN", "contentful"]

[[detector.patterns]]
regex = "(?:CONTENTFUL_DELIVERY_TOKEN|CONTENTFUL_ACCESS_TOKEN|contentful)[=:\\s\"'']+([a-zA-Z0-9_-]{43})"
description = "Contentful Delivery/Preview API token with context anchor"
group = 1

[[detector.companions]]
name = "space_id"
regex = "[a-z0-9]{12}"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://cdn.contentful.com/spaces/{{companion.space_id}}"
allowed_domains = ["cdn.contentful.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "CONTENTFUL_DELIVERY_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4\nspace_id=abc123def456"
test_negative = "CONTENTFUL_ACCESS_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
