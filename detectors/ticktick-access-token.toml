# Docs: https://developer.ticktick.com/docs#/openapi
# Format: OAuth 2.0 access token, variable length alphanumeric
# Verify: GET /api/v2/user/status with Bearer token returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "ticktick-access-token"
name = "TickTick Access Token"
service = "ticktick"
severity = "high"
keywords = ["TICKTICK_ACCESS_TOKEN", "TICKTICK_TOKEN"]

[[detector.patterns]]
regex = "(?:TICKTICK_ACCESS_TOKEN|TICKTICK_TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{40,60})"
description = "TickTick OAuth 2.0 access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.ticktick.com/api/v2/user/status"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "TICKTICK_ACCESS_TOKEN=a6XSuv28Xs8URY6RovRoAkfqsq4yO-r0oI0lsOMO"
test_negative = "TICKTICK_ACCESS_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
