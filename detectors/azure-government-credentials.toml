# Docs: https://learn.microsoft.com/en-us/azure/azure-government/documentation-government-get-started-connect-with-cli
# Format: Azure Government uses same credential format as commercial Azure
# Verify: Token endpoint at login.microsoftonline.us (Azure Government specific)
# Prefix: none (requires context anchoring)

[detector]
id = "azure-government-credentials"
name = "Azure Government Credentials"
service = "azure-government"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["AZURE_GOVERNMENT", "AZURE_US_GOV", "usgovcloudapi", "microsoftonline.us"]

[[detector.patterns]]
regex = '''(?:AZURE[_\-\s]*GOVERNMENT|AZURE[_\-\s]*US[_\-\s]*GOV)[_\-\s]*(?:CLIENT[_\-\s]*SECRET|SECRET)[=:\s"'']+([a-zA-Z0-9~!@#$%^&*()_+\-=]{30,})'''
description = "Azure Government client secret with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:AZURE[_\-\s]*GOVERNMENT|AZURE[_\-\s]*US[_\-\s]*GOV)[_\-\s]*(?:CLIENT[_\-\s]*ID|APP[_\-\s]*ID)[=:\s"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "Azure Government client ID"
group = 1

[[detector.patterns]]
regex = '''(?:AZURE[_\-\s]*GOVERNMENT|AZURE[_\-\s]*US[_\-\s]*GOV)[_\-\s]*(?:TENANT[_\-\s]*ID)[=:\s"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "Azure Government tenant ID"
group = 1

[[detector.patterns]]
regex = '''(?:AZURE[_\-\s]*GOVERNMENT|AZURE[_\-\s]*US[_\-\s]*GOV)[_\-\s]*(?:SUBSCRIPTION[_\-\s]*ID)[=:\s"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "Azure Government subscription ID"
group = 1

[[detector.patterns]]
regex = "(?:core\\.usgovcloudapi\\.net|login\\.microsoftonline\\.us|management\\.usgovcloudapi\\.net)"
description = "Azure Government endpoint URL"

[[detector.tests]]
test_positive = "AZURE_GOVERNMENT_CLIENT_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "AZURE_GOVERNMENT_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2"
