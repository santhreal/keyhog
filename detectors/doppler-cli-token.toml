# Docs: https://docs.doppler.com/reference/api
# Format: dp.ct.{44_char_base58} for CLI tokens, dp.pt.{44_char_base58} for personal tokens
# Verify: GET /v3/workplace with Bearer token returns 200 if valid
# Prefix: dp.ct. or dp.pt.

[detector]
id = "doppler-cli-token"
name = "Doppler CLI Token"
service = "doppler"
severity = "critical"
keywords = ["dp.ct.", "dp.pt.", "dp.sa.", "doppler"]

[[detector.patterns]]
# Cover the full Doppler token-prefix family in one alternation: cli
# tokens (ct), personal tokens (pt), and service-account tokens (sa).
# The `sa` form is the SecretBench session-token category's only
# remaining FN class (3 fixtures: dp.sa.<44 base58>). The doppler-
# service-token.toml file handles `dp.st.` separately; this regex does
# not duplicate that prefix here. Length kept at exactly 44 chars
# (the documented Doppler shape) to avoid runaway captures.
regex = 'dp\.(ct|pt|sa)\.[a-zA-Z0-9]{44}'
description = "Doppler CLI / personal / service-account token (dp.ct./dp.pt./dp.sa.)"

[detector.verify]
method = "GET"
url = "https://api.doppler.com/v3/workplace"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "workplace_name"
json_path = "$.workplace.name"

[[detector.tests]]
test_positive = "doppler dp.ct.NbrnTP3fAbnFbmOHnKYaXRvj7uff0LYTH8xIZM1JRcor"
test_negative = "doppler dp.ct.short"
