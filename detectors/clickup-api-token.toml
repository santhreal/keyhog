# Docs: https://clickup.com/api/developer-portal/authentication/
# Format: pk_ prefix followed by 20-40 alphanumeric characters
# Verify: GET request to ClickUp team endpoint with Authorization header
# Prefix: pk_

[detector]
id = "clickup-api-token"
name = "ClickUp API Token"
service = "clickup"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["pk_", "clickup"]

# Anchor `pk_` to start-of-string or non-identifier byte. The prefix
# is too common in serialized PHP/JS object dumps (e.g. metasploitable3
# wordpress/update_ip.ps1 has `s:10:""""public_key"""";s:32:""""pk_<32hex>"""";`
# where the hex hits 32 alphanumerics) to fire without context.
[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(pk_[a-zA-Z0-9]{20,40})'
description = "ClickUp personal API token (pk_ prefix, anchored)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.clickup.com/api/v2/team"
allowed_domains = ["api.clickup.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pk_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "pk_short"
