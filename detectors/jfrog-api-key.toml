# Docs: https://jfrog.com/help/r/jfrog-platform-administration-documentation/access-tokens
# Format: AKCp8 prefix followed by 32+ alphanumeric characters
# Verify: GET request to JFrog Artifactory API with X-JFrog-Art-Api header
# Prefix: AKCp8

[detector]
id = "jfrog-api-key"
name = "JFrog/Artifactory API Key"
service = "jfrog"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["AKCp8"]

[[detector.patterns]]
regex = 'AKCp8[a-zA-Z0-9]{32,}'
description = "JFrog/Artifactory API key (AKCp8)"

# NOTE: live verification disabled. `{instance}` was single-brace and
# never resolved. kimi-wave3 §1.

[[detector.tests]]
test_positive = "AKCp8RQwP3EiFJyJ7RheUfKWvbbor0VgYr8Sr"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
