# Docs: https://docs.n8n.io/api/
# Format: Bearer token for n8n REST API (v2)
# Verify: none (self-hosted tenant domain is unknown at detection time)
# Prefix: n8n_api_

[detector]
id = "n8n-api-credentials"
name = "n8n API Credentials (v2)"
service = "n8n"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["n8n_api_", "N8N_API", "n8n.cloud", "n8n.io"]

[[detector.patterns]]
regex = "n8n_api_[a-zA-Z0-9]{40,}"
description = "n8n API key (n8n_api_ prefix)"

[[detector.patterns]]
regex = "(?:N8N[_\\.]?API[_\\.]?(?:KEY|TOKEN)|n8n[_\\.]?api[_\\.]?(?:key|token))[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "n8n API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "n8n_api_alFu6SgZhwTbajU4in8ejVeg9ucWprq5qMhFaGXEVtKs02YuWIKgaPLI"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
