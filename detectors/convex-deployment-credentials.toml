# Docs: https://docs.convex.dev/management-api
# Format: Deploy key with format like "prod:project-name|eyJ2..." or "dev:project|token"
# Verify: no public verification endpoint (requires Convex CLI or deployment API)
# Prefix: prod:, dev:, preview: (requires context)

[detector]
id = "convex-deployment-credentials"
name = "Convex Deployment Credentials"
service = "convex"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["CONVEX_DEPLOY_KEY", "convex.cloud", "convex.dev", "prod:", "dev:"]

[[detector.patterns]]
regex = "(?:prod|dev|preview):[a-z0-9-]+\\|[a-zA-Z0-9_-]+\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]+"
description = "Convex deployment key with JWT component"

[[detector.patterns]]
regex = "(?:CONVEX_DEPLOY_KEY|convex.?deploy)[=:\\s\"'']+((?:prod|dev|preview):[a-z0-9-]+\\|[A-Za-z0-9_-]{50,})"
description = "Convex deployment key with context anchor"
group = 1

[[detector.tests]]
test_positive = "CONVEX_DEPLOY_KEY=prod:my-project|Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "convex_deploy=prod:app|Kp4Qx7Rm2Sn5Tb8Vw3Yz"
