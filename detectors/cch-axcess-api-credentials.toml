# Docs: https://developers.cchaxcess.com/
# Format: API key or OAuth 2.0 client_id/client_secret
# Verify: API calls to CCH Axcess endpoints with proper authentication
# Prefix: none (requires context anchoring)

[detector]
id = "cch-axcess-api-credentials"
name = "CCH Axcess API Credentials"
service = "cch-axcess"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "x-api-key", "client_id" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["CCH", "cch", "AXCESS", "axcess"]

[[detector.patterns]]
regex = "(?:CCH_?)?(?:AXCESS|axcess)[._]?(?:API|api)?[._]?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "CCH Axcess API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:CCH_?)?(?:AXCESS|axcess)[._]?(?:CLIENT|client)[._]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9_-]{16,})"
description = "CCH Axcess OAuth client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:CCH_?)?(?:AXCESS|axcess)[._]?(?:CLIENT|client)[._]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "CCH Axcess OAuth client secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "CCH_AXCESS_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "CCH_AXCESS_KEY=short"
