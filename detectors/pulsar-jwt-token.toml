# Docs: https://pulsar.apache.org/docs/security-jwt/
# Format: JWT token with alg and sub claims, used with Pulsar-specific configuration
# Verify: no public verification endpoint
# Prefix: eyJ (JWT header), but requires Pulsar context

[detector]
id = "pulsar-jwt-token"
name = "Apache Pulsar JWT Token"
service = "pulsar"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["pulsar", "authParams", "brokerClientAuthenticationParameters", "PULSAR_TOKEN"]

[[detector.patterns]]
regex = "authParams\\s*=\\s*token:([a-zA-Z0-9_-]+\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]+)"
description = "Pulsar client.conf authParams with JWT token"
group = 1

[[detector.patterns]]
regex = "brokerClientAuthenticationParameters\\s*[=:]\\s*[\"'\\']?(?:\\{[^}]*token[\"'\\']?\\s*:\\s*[\"'\\']?)?(eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]+)"
description = "Pulsar brokerClientAuthenticationParameters JWT token"
group = 1

[[detector.patterns]]
regex = "PULSAR_TOKEN\\s*[=:]\\s*[\"'\\']?(eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]+)"
description = "Pulsar JWT token environment variable"
group = 1

[[detector.patterns]]
# Bounded the cross-line backtracking. Original had `.*pulsar.*\n.*`
# (three unbounded segments) which could span megabytes of haystack
# searching for the JWT. Now: webServiceUrl is followed by at most
# 256 non-newline chars before "pulsar", then at most 256 non-newline
# chars before the newline, then at most 256 non-newline chars before
# the token literal. Multi-line block scan stays valid but worst-case
# input is bounded to ~768 chars per attempt.
regex = "webServiceUrl[^\\n]{0,128}pulsar[^\\n]{0,128}\\n[^\\n]{0,128}token[\"'\\']?\\s*[=:]\\s*[\"'\\']?(eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]+)"
description = "Pulsar client configuration with JWT token"
group = 1

[[detector.tests]]
test_positive = "brokerClientAuthenticationParameters=eyJz71Tv_Gmh0V_KtJCgVbPIexNGw700lJQaTvkQDlJYbgmxsdivQ.eyJ5o-IGUtCapgIby0OMCNwMDpfpR0sWHVAY1_jIzaj6wkLhcJ_sz-kEbf91MNjIR0KKJehwLO.gn_9DfLqm_bwK6rWrjOWWWO2nlhNSIjOV8w_O5AcZswADZYBBW5hTMTDpXMKJIyzb"
test_negative = "brokerClientAuthenticationParameters=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
