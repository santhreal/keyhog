# Docs: https://docs.digitalocean.com/reference/api/spaces/
# Format: 20-character alphanumeric access key ID and 43-character base64 secret key
# Verify: AWS Signature V4 against Spaces endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "digitalocean-spaces-credentials"
name = "DigitalOcean Spaces Credentials"
service = "digitalocean-spaces"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["DO_SPACES", "DIGITALOCEAN_SPACES", "SPACES_ACCESS_KEY", "SPACES_SECRET_KEY"]

[[detector.patterns]]
regex = '''(?:DO[_\-\s]*SPACES|DIGITALOCEAN[_\-\s]*SPACES)[_\-\s]*(?:ACCESS[_\-\s]*KEY|KEY[_\-\s]*ID)[=:\s"'']+((?-i:[A-Z0-9]{20}))'''
required_literals = ["SPACES"]
description = "DigitalOcean Spaces access key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:SPACES[_\-\s]*ENDPOINT|DO[_\-\s]*SPACES[_\-\s]*ENDPOINT)[=:\s"'']+(https?://[a-z0-9]+\.digitaloceanspaces\.com)'''
required_literals = [".digitaloceanspaces.com"]
description = "DigitalOcean Spaces endpoint URL"
group = 1

[[detector.patterns]]
regex = '''(?:SPACES[_\-\s]*REGION|DO[_\-\s]*SPACES[_\-\s]*REGION)[=:\s"'']+(nyc3|ams3|sgp1|fra1|sfo3)'''
required_literals = ["SPACES"]
description = "DigitalOcean Spaces region"
group = 1

[[detector.companions]]
name = "secret_key"
regex = '''(?:SPACES[_\-\s]*SECRET(?:[_\-\s]*KEY)?|DO[_\-\s]*SPACES[_\-\s]*SECRET(?:[_\-\s]*KEY)?|secret[_\-\s]*access[_\-\s]*key)[=:\s"']+([A-Za-z0-9/+=]{40,44})'''
within_lines = 3

[[detector.tests]]
test_positive = "DO_SPACES_ACCESS_KEY=7DUURP7HR3967PXE3R4V"
test_negative = "DO_SPACES_ACCESS_KEY=7duurp7hr3967pxe3r4v"
