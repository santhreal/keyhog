# Docs: https://reference.airbyte.com/reference/using-the-api
# Format: Airbyte API bearer token or OAuth client credentials
# Verify: GET /v1/workspaces with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "airbyte-api-credentials"
name = "Airbyte API Credentials"
service = "airbyte"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["AIRBYTE", "airbyte", "AIRBYTE_API_KEY", "AIRBYTE_TOKEN"]

[[detector.patterns]]
regex = "(?:\\bAIRBYTE)[_.]?(?:API[._-]?KEY|TOKEN)[=:\\s\"'']+([a-zA-Z0-9]{32,})"
description = "Airbyte API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:\\bairbyte)[_.]?(?:api[._-]?key|token)[=:\\s\"'']+([a-zA-Z0-9]{32,})"
description = "Airbyte API key lowercase context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.airbyte.com/v1/workspaces"
allowed_domains = ["api.airbyte.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AIRBYTE_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "AIRBYTE_API_KEY=short"
