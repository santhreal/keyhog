# Docs: https://docs.moralis.io/web3-data-api/solana/reference/authentication
# Format: 64+ character alphanumeric string (no distinctive prefix)
# Verify: GET /api/v2.2/block/1 with X-API-Key header returns 200 if valid
# Prefix: none (long alphanumeric string, requires context keywords)

[detector]
id = "moralis-api-key"
name = "Moralis API Key"
service = "moralis"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["moralis", "MORALIS", "MORALIS_API_KEY", "moralis_api_key", "deep-index.moralis.io"]

[[detector.patterns]]
regex = "(?:MORALIS|moralis)[_\\-\\.]?(?:API[_\\-\\.]?KEY|api[_\\-\\.]?key)[=:\\s\\\"']+([a-zA-Z0-9]{60,})"
description = "Moralis API key with context anchor"
group = 1

# NOTE: a bare `X-API-Key: <60+ alphanumeric>` pattern was removed here.
# `X-API-Key` is a generic HTTP header shared by dozens of services and
# Moralis keys carry no distinctive prefix, so the header pattern matched any
# unrelated service's 60+ char token as a (critical-severity) Moralis key.
# Moralis is the ONLY detector that ever shipped a bare alphanumeric
# `X-API-Key` value pattern; precision-anchored recall is provided by the
# `MORALIS`/`moralis` + API_KEY context pattern above.

[detector.verify]
method = "GET"
url = "https://deep-index.moralis.io/api/v2.2/block/1?chain=eth"
allowed_domains = ["deep-index.moralis.io"]

[detector.verify.auth]
type = "header"
name = "X-API-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "MORALIS_API_KEY=RDcaN0CTOK20ayMWP8e33V2zt9U44WSIdDo1pT8f2R68ugXVO0Lu9kX854Uj"
test_negative = "MORALIS_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
