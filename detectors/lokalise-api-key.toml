# Docs: https://docs.lokalise.com/en/articles/1929556-api-and-ota-tokens
# Format: API token (starts with lol)
# Verify: GET /api2/projects with X-Api-Token header
# Prefix: lol

[detector]
id = "lokalise-api-key"
name = "Lokalise API Key"
service = "lokalise"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["LOKALISE", "LOKALISE_API_KEY", "LOKALISE_TOKEN", "lokalise.com", "X-Api-Token"]

[[detector.patterns]]
regex = "lol[0-9a-f]{40,}"
description = "Lokalise API token (lol prefix)"

[[detector.patterns]]
regex = "(?:LOKALISE|LOKALISE_API)[_\\s]?(?:API[_\\s]?(?:KEY|TOKEN)|TOKEN|KEY)?[=:\\s\"'']+(lol[0-9a-f]{40,})"
description = "Lokalise API token with context anchor"
group = 1

[[detector.patterns]]
regex = "X-Api-Token[:\\s\"'']+(lol[0-9a-f]{40,})"
description = "Lokalise API token in header format"
group = 1

[detector.verify]
method = "GET"
url = "https://api.lokalise.com/api2/projects"
allowed_domains = ["api.lokalise.com"]

[detector.verify.auth]
type = "header"
name = "X-Api-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "lol7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3ea9e2"
test_negative = "lolshort"
