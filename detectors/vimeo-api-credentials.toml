# Docs: https://developer.vimeo.com/api/authentication
# Format: Access tokens start with numbers and are 32+ hex characters; Client IDs are shorter
# Verify: GET /me with Bearer auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "vimeo-api-credentials"
name = "Vimeo API Credentials"
service = "vimeo"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["vimeo", "VIMEO", "VIMEO_ACCESS_TOKEN", "vimeo_access_token", "vimeo.com"]

[[detector.patterns]]
regex = '''(?:vimeo|VIMEO)[_\-\s]*(?:access_token|ACCESS_TOKEN|api_token)[=:\s"'']+([a-f0-9]{32,64})'''
description = "Vimeo access token with context anchor"
group = 1

[[detector.patterns]]
regex = "VIMEO_ACCESS_TOKEN[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Vimeo access token from environment variable"
group = 1

[[detector.patterns]]
regex = '''(?:vimeo|VIMEO)[_\-\s]*(?:client_id|CLIENT_ID)[=:\s"'']+([a-f0-9]{20,40})'''
description = "Vimeo client ID with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:vimeo|VIMEO)[_\-\s]*(?:client_secret|CLIENT_SECRET)[=:\s"'']+([a-f0-9]{32,64})'''
description = "Vimeo client secret with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.vimeo.com/me"
allowed_domains = ["api.vimeo.com"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "Bearer {{match}}"

[[detector.tests]]
test_positive = "vimeoaccess_token=15eed71e4d259e740161a1091da6649b"
test_negative = "vimeoaccess_token=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
