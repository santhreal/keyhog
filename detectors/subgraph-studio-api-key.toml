# Docs: https://thegraph.com/docs/en/querying/subgraph-studio/
# Format: 32 character hexadecimal string
# Verify: Bearer token to api.thegraph.com/subgraphs/name/{subgraph}, returns 200 if valid
# Prefix: none (32 char hex, requires context anchoring)

[detector]
id = "subgraph-studio-api-key"
name = "Subgraph Studio API Key"
service = "subgraph-studio"
severity = "high"
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["subgraph", "studio", "SUBGRAPH_STUDIO"]

[[detector.patterns]]
regex = "(?:SUBGRAPH_STUDIO|subgraph.?studio|studio.?api)[=:\\s\"'']+([a-f0-9]{32})"
description = "Subgraph Studio API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "SUBGRAPH_STUDIO=3e3ccac4f51f88a6dd87cafaf4951d13"
test_negative = "SUBGRAPH_STUDIO=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
