# Docs: https://www.flickr.com/services/api/
# Format: 32 character alphanumeric string
# Verify: GET /services/rest/?method=flickr.test.echo with api_key returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "flickr-api-key"
name = "Flickr API Key"
service = "flickr"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
min_confidence = 0.2
keywords = ["FLICKR", "flickr"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32] }]

[[detector.patterns]]
regex = '(?:FLICKR|flickr)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\s""]+([a-f0-9]{32})\b'
description = "Flickr API key with context anchor"
group = 1

# Bare `api_key=<32hex>` pattern dropped 2026-05-29. It mis-claimed every
# random 32-char hex string in any `api_key=` URL parameter on behalf
# of Flickr. Mirror v23 traced 111 FPs to this single pattern across
# sha256-hex prefixes, sha1-hex digests, and the 32-hex bodies of 113
# unrelated services. Flickr's spec is "32 character alphanumeric string"
# with NO distinctive prefix, so contextless attribution to Flickr is
# never correct, these belong with `generic-secret` / `generic-api-key`,
# where the suppression cascade gates them properly. Keywords list
# narrowed to `FLICKR`/`flickr` so the AC pre-filter no longer admits
# chunks for the generic `api_key` literal.

[[detector.companions]]
name = "flickr-api-secret"
regex = '(?:FLICKR|flickr)[._-]?(?:API|api)[._-]?(?:SECRET|secret)[=:\s""]+[a-f0-9]{16,32}'
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.flickr.com/services/rest/?method=flickr.test.echo&api_key={{match}}"
allowed_domains = ["api.flickr.com"]
[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "flickr_api_key=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "flickr_api_key=short"
