# Docs: https://cloudinary.com/documentation/finding_your_credentials_tutorial
# Format: cloudinary:// protocol with API key, secret, and cloud name in URL format
# Verify: No verify endpoint (credentials used in SDK or URL construction)
# Prefix: cloudinary://

[detector]
id = "cloudinary-api-key"
name = "Cloudinary API Key"
service = "cloudinary"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["cloudinary://", "cloudinary"]

[[detector.patterns]]
regex = '(cloudinary://[0-9]+:[A-Za-z0-9_-]+@[A-Za-z0-9_-]+)(?:[^A-Za-z0-9_.-]|$)'
description = "Cloudinary full URL with API key and secret"
group = 1

[[detector.tests]]
test_positive = "cloudinary://946054033816433664211118670346455:NvXnEzfHQBPE9sQVcnk@rgV7LEbhI1QMVD7lYiBrqFtq3avz_fSEXZpggxdEGkHDnUT3TMXyqaAAPFYT"
test_negative = "cloudinary://123:@cloud"
