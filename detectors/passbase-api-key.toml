# Docs: https://docs.passbase.com/
# Format: X-API-KEY header with Secret or Publishable API key
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "passbase-api-key"
name = "Passbase API Key"
service = "passbase"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["passbase", "PASSBASE"]

[[detector.patterns]]
regex = "(?:passbase|PASSBASE)[_\\s]*(api[_\\s]*key|secret[_\\s]*key)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Passbase API key with context anchor"
group = 2

[[detector.tests]]
test_positive = "PASSBASE_API_KEY=7VVpvY_rJEc_G33gXrRw"
test_negative = "X-API-KEY=7VVpvY_rJEc_G33gXrRw"
