# Docs: https://developers.transifex.com/reference/api-authentication
# Format: Bearer token or username:password (API token acts as password)
# Verify: GET /api/3/ with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "transifex-api-token"
name = "Transifex API Token"
service = "transifex"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["TRANSIFEX", "TRANSIFEX_API_KEY", "TRANSIFEX_TOKEN", "transifex.com"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:TRANSIFEX|TRANSIFEX_API|TRANSIFEX_TOKEN)[_\-\s]*(?:API[_\-\s]*(?:KEY|TOKEN)|TOKEN|KEY)?[=:\s"'']+([a-zA-Z0-9_-]{40,})'''
description = "Transifex API token with context anchor"
group = 1

[[detector.patterns]]
# `[\s\S]` rather than `.` so the domain anchor can be on a separate
# line from the credential - the canonical curl/comment shape is
# `# https://www.transifex.com/api/3/\nAuthorization: Bearer <tok>`,
# which `.*` (no `s` flag in Hyperscan) would not span. Lazy `*?` so
# we don't accidentally swallow trailing tokens on the same chunk.
regex = "transifex\\.com[\\s\\S]*?[=:\\s\"'' ]+([a-zA-Z0-9_-]{40,})"
description = "Transifex API token with domain context (multi-line tolerant)"
group = 1

[[detector.patterns]]
regex = '''(?:TRANSIFEX|TRANSIFEX_API)[_\-\s]*USERNAME[=:\s"'']+([a-zA-Z0-9_-]+)'''
description = "Transifex username for API authentication"
group = 1
weak_anchor = true

[[detector.companions]]
name = "Transifex API Password/Token"
regex = '''(?:TRANSIFEX|TRANSIFEX_API)[_\-\s]*PASSWORD[=:\s"'']+([a-zA-Z0-9_-]{40,})'''
within_lines = 5

[[detector.tests]]
test_positive = "TRANSIFEX_APIAPI KEY=:=  fVhbDg-4JFCsChNTF3Orb3eHG4rmKVZVLSp3B961_xO02X6O3vo_9cpuqmzYJvqEy"
test_negative = "TRANSIFEX_APIAPI KEY=:=  YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
