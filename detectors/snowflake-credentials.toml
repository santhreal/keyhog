# Snowflake secret credentials (password and private key).
# Docs: https://docs.snowflake.com/en/user-guide/security-access-control-overview

[detector]
id = "snowflake-credentials"
name = "Snowflake Credentials"
service = "snowflake"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "private_key" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["SNOWFLAKE", "snowflakecomputing", "SNOWSQL", "password"]

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:password|pwd|pass)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "Snowflake password"
group = 1

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:private[_-]?key|key[_-]?path)[=:\\s\"'']+([a-zA-Z0-9_/.-]+)"
description = "Snowflake private key path"
group = 1

[[detector.tests]]
test_positive = "snowflake.password=SnowFlakePass123!"
test_negative = "snowflake.password=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
