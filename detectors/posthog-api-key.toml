# Docs: https://posthog.com/docs/api
# Format: phc_ prefix followed by 32 alphanumeric characters (project API key) or phx_ for personal API key
# Verify: GET /api/projects with Bearer token returns 200 if valid
# Prefix: phc_, phx_

[detector]
id = "posthog-api-key"
name = "PostHog API Key"
service = "posthog"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["phc_", "phx_", "POSTHOG_API_KEY"]

[[detector.patterns]]
regex = "phc_[a-zA-Z0-9]{32}"
description = "PostHog project API key (phc_ prefix)"
# `phc_*` is the browser/mobile-SDK key - designed to ship in client
# bundles. Project ACL + scope restrictions are the security boundary.
# Personal/admin tokens use `phx_` and stay full-severity.
client_safe = true

[[detector.patterns]]
regex = "phx_[a-zA-Z0-9]{32,48}"
description = "PostHog personal API key (phx_ prefix)"

[detector.verify]
method = "GET"
url = "https://app.posthog.com/api/projects"
allowed_domains = ["app.posthog.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "phc_MHvirLqTJFzNPPkOz9bbFDdyUzG3lD9j"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
