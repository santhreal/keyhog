# Docs: https://redis.io/docs/connect/clients/
# Format: redis://user:pass@host.domain:port
# Prefix: redis

[detector]
id = "redis-connection-string"
name = "Redis Connection String"
service = "redis"
severity = "high"
keywords = ["redis", "REDIS_URL", "requirepass", "masterauth"]
min_confidence = 0.2

[[detector.patterns]]
# Alternation form `(?:rediss|redis)` instead of `rediss?`. The prefix
# extractor walks char-by-char and treats `?` as a break char after
# pushing the preceding `s`, so the previous `rediss?://` regex emitted
# only the AC literal `rediss` and missed every plain `redis://` URL.
# Alternation emits both `rediss` and `redis` as AC literals.
regex = '(?:rediss|redis)://[^:]*:[^@\s]+@[a-zA-Z0-9._:-]+'
description = "Redis connection string with credentials"

[[detector.patterns]]
# redis.conf server-side auth directives, the password is NOT in a URL, so the
# generic `key=value` bridge never produces a candidate and the URI pattern
# above cannot reach it. `requirepass` sets the instance password; `masterauth`
# is the replica's password for authenticating to its primary. Both are
# unambiguous credential contexts (you only write them to set a secret), so the
# token after the directive is a precise anchor. The value runs to the next
# whitespace, quote, or `#` comment; `{6,}` drops the short canonical
# placeholders. `requirepass`/`masterauth` are added to `keywords` so the
# prefilter triggers on a bare `requirepass <pw>` line that contains no `redis`.
regex = '''(?:requirepass|masterauth)[ \t]+["']?([^\s"'#]{6,128})'''
description = "Redis requirepass / masterauth config auth password"
group = 1

# Author-shipped self-test: the directive form MUST fire; a bare mention with a
# sub-floor token MUST NOT (proving it keys on a real value, not the word).
[[detector.tests]]
test_positive = """
requirepass S3cr3tRedisPassValue
"""
test_negative = """
# requirepass foo sets the instance password
"""
