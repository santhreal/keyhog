# Docs: https://firebase.google.com/docs/storage/web/start
# Format: Bucket name with gs:// prefix or Firebase config with storageBucket field
# Verify: no public verification endpoint
# Prefix: gs:// (Firebase Storage bucket)

[detector]
id = "firebase-storage-credentials"
name = "Firebase Storage Credentials"
service = "firebase"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["storageBucket", "firebaseapp.com", "appspot.com", "gs://"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

# `(?-i)` forces case-sensitive matching (keyhog compiles every regex
# case-insensitive by default). GCP project ids / bucket names are lowercase
# by spec; without this the uppercase placeholder bucket
# `gs://MYPROJECT.appspot.com` from documentation matches and surfaces a false
# positive. The gs:// / storageBucket / appspot.com keyword triggers stay
# case-insensitive; the regex is the precise gate.
[[detector.patterns]]
regex = "(?-i)gs://([a-z0-9-]+\\.appspot\\.com)"
description = "Firebase Storage bucket gs:// URL"
group = 1

[[detector.patterns]]
regex = "(?-i)\"storageBucket\"[=:\\s\"'']+([a-z0-9-]+\\.appspot\\.com)"
description = "Firebase config storageBucket field"
group = 1

[[detector.patterns]]
regex = "(?-i)\"storageBucket\"[=:\\s\"'']+([a-z0-9-]+\\.firebaseapp\\.com)"
description = "Firebase config storageBucket field (firebaseapp domain)"
group = 1

[[detector.patterns]]
regex = "(?-i)firebasestorage\\.googleapis\\.com/v0/b/([a-z0-9-]+)"
description = "Firebase Storage REST API bucket reference"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "gs://my-project-12345.appspot.com"
test_negative = "gs://MYPROJECT.appspot.com"
