# Docs: https://docs.netlify.com/api/get-started/
# Format: nfp_ prefix followed by 36-40 alphanumeric characters
# Verify: GET request to Netlify API /sites with Bearer authorization
# Prefix: nfp_

[detector]
id = "netlify-pat"
name = "Netlify Personal Access Token"
service = "netlify"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["nfp", "netlify"]

[[detector.patterns]]
regex = 'nfp_[a-zA-Z0-9]{36,40}'
description = "Netlify Personal Access Token (nfp_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.netlify.com/api/v1/sites"
allowed_domains = ["api.netlify.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "nfp_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "nfp_short"
