# Docs: https://infinitecampus.notion.site/Campus-API-Introduction-38b98c588c204dbfab6c44e4423f8e69
# Format: API key issued by Infinite Campus for district access
# Verify: GET /campus/api/verify with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "infinite-campus-api-key"
name = "Infinite Campus API Key"
service = "infinite-campus"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["infinite", "campus", "INFINITE_CAMPUS", "campus_api", "icampus"]

[[detector.patterns]]
regex = '''(?:infinite[_\-\s]*campus|icampus|campus)[_\s.-]*(?:api[_\s.-]*)?(?:key|token)[=:\s"'']+([a-zA-Z0-9_-]{32,64})'''
description = "Infinite Campus API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:infinite[_\-\s]*campus|icampus)[_\s.-]*(?:client[_\s.-]*id)[=:\s"'']+([a-zA-Z0-9]{20,40})'''
description = "Infinite Campus client ID with context anchor"
group = 1

[[detector.tests]]
test_positive = "icampustoken=ANZcW4wlbGyKxSYTt7tRd9mTWo12cjlV"
test_negative = "icampustoken=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
