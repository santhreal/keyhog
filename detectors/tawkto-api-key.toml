# Docs: https://developer.tawk.to/webhooks/
# Format: Property ID (24+ hex chars) and API key pair
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "tawkto-api-key"
name = "Tawk.to API Key"
service = "tawkto"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["TAWK", "tawk_to", "tawkto", "tawkto_api"]

[[detector.patterns]]
regex = '''(?i)(?:tawk|tawkto|tawk_to)[_\-\s]*(?:api[_\-\s]*key|key|token)[=:\s"'']+([a-f0-9]{32,64})\b(?:[^a-zA-Z0-9_-]|$)'''
description = "Tawk.to API key with context anchor"
group = 1

[[detector.companions]]
name = "tawkto_credentials_pair"
regex = '''(?i)(?:tawk|tawkto|tawk_to)[_\-\s]*(?:property[_\-\s]*id|site[_\-\s]*id)[=:\s"'']+([a-f0-9]{24})\b(?:[^a-zA-Z0-9_-]|$)'''
within_lines = 5

[[detector.tests]]
test_positive = "TAWK_TOTOKEN=6c452aaae4137a470868ddf5d894d06d"
test_negative = "TAWK_TOTOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
