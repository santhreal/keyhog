# Docs: https://developer.paylocity.com/integrations/docs/getting-started
# Format: OAuth 2.0 Client ID and Client Secret with Company ID
# Verify: POST /public/security/v1/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "paylocity-api-credentials"
name = "Paylocity API Credentials"
service = "paylocity"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["PAYLOCITY_CLIENT_ID", "PAYLOCITY_CLIENT_SECRET", "paylocity"]

[[detector.patterns]]
regex = "(?:PAYLOCITY_CLIENT_ID|paylocity_client_id)[=:\\s\"'']+([a-f0-9]{32})"
description = "Paylocity API client ID (32 hex chars) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PAYLOCITY_CLIENT_SECRET|paylocity_client_secret)[=:\\s\"'']+([a-zA-Z0-9]{20,})"
description = "Paylocity API client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PAYLOCITY_COMPANY_ID|paylocity_company_id)[=:\\s\"'']+([A-Z0-9]{5,10})"
description = "Paylocity company ID with context anchor"
group = 1

[[detector.tests]]
test_positive = "PAYLOCITY_CLIENT_ID=3e3a5f82f7d330d5fc3da4cefedc7a9c"
test_negative = "PAYLOCITY_CLIENT_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
