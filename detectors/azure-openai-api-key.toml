# Docs: https://learn.microsoft.com/en-us/azure/ai-services/openai/reference
# Format: 32 hex characters used in api-key header or AZURE_OPENAI_API_KEY
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "azure-openai-api-key"
name = "Azure OpenAI API Key"
service = "azure-openai"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
min_confidence = 0.2
keywords = ["AZURE_OPENAI_API_KEY", "AZURE_OPENAI_ENDPOINT", "azure-openai", "api-key"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32] }]

[[detector.patterns]]
regex = "(?:AZURE_OPENAI_API_KEY|azure-openai|azure_openai)[=:\\s\"\\']+([a-f0-9]{32})"
description = "Azure OpenAI API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:api-key|api_key)[=:\\s\"\\']+([a-f0-9]{32})(?s:.*)\\.openai\\.azure\\.com"
description = "Azure OpenAI api-key header with endpoint context"
group = 1

[detector.verify]
method = "GET"
url = "https://eastus.api.cognitive.microsoft.com/openai/models?api-version=2024-02-01"
allowed_domains = ["eastus.api.cognitive.microsoft.com"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "api-key"
value = "{{match}}"

[[detector.tests]]
test_positive = "AZURE_OPENAI_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "AZURE_OPENAI_API_KEY=short"
