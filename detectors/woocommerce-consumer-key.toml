# Docs: https://woocommerce.github.io/woocommerce-rest-api-docs/#authentication
# Format: ck_ prefix followed by 40 alphanumeric characters (consumer key), cs_ prefix followed by 40 alphanumeric characters (consumer secret)
# Verify: none (requires store URL for verification)
# Prefix: ck_

[detector]
id = "woocommerce-consumer-key"
name = "WooCommerce Consumer Key"
service = "woocommerce"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["ck_", "woocommerce", "consumer_key"]

[[detector.patterns]]
regex = "ck_[a-f0-9]{40}"
description = "WooCommerce REST API consumer key (ck_ prefix)"

[[detector.companions]]
name = "woocommerce_consumer_secret"
regex = "cs_[a-f0-9]{40}"
within_lines = 10

[[detector.tests]]
test_positive = "ck_0a6efc600fa229b936e33cb2e62710fe11c2409e"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
