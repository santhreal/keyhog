# Docs: https://redis.io/docs/latest/operate/oss_and_stack/management/sentinel/
# Format: sentinel auth-pass <master-name> <password> or requirepass in sentinel.conf
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "redis-sentinel-credentials"
name = "Redis Sentinel Credentials"
service = "redis-sentinel"
severity = "high"
keywords = ["sentinel auth-pass", "requirepass", "sentinel-pass", "masterauth"]

[[detector.patterns]]
regex = "sentinel\\s+auth-pass\\s+\\S+\\s+[\"'']?([^\"'']{8,})[\"'']?"
description = "Redis Sentinel auth-pass directive with master name and password"
group = 1

[[detector.patterns]]
regex = "sentinel\\s+sentinel-pass\\s+[\"'']?([^\"'']{8,})[\"'']?"
description = "Redis Sentinel sentinel-pass directive for inter-sentinel auth"
group = 1

[[detector.patterns]]
regex = "sentinel\\s+auth-user\\s+\\S+\\s+[\"'']?([^\"'']{3,})[\"'']?"
description = "Redis Sentinel auth-user directive (username for ACL)"
group = 1

[[detector.patterns]]
regex = "REDIS_SENTINEL_AUTH\\s*=\\s*[\"'']?([^\"'']{8,})[\"'']?"
description = "Redis Sentinel auth in environment variable"
group = 1

[[detector.tests]]
test_positive = "sentinel auth-pass mymaster \"RedisSentPass123\""
test_negative = "sentinel auth-pass mymaster \"YOUR_API_KEY_HERE_PLACEHOLDER_VALUE\""
