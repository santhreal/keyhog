# Docs: https://api.nasa.gov/
# Format: 40-character alphanumeric string, passed as "api_key" query parameter
# Verify: GET request to api.nasa.gov with api_key parameter
# Prefix: none (requires context anchoring)

[detector]
id = "nasa-api-key"
name = "NASA API Key"
service = "nasa"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["NASA_API_KEY", "nasa", "api.nasa.gov"]

[[detector.patterns]]
regex = "(?:NASA_API_KEY|nasa_api_key)[=:\\s\"'\\']+([a-zA-Z0-9]{40})"
description = "NASA API key (40 alphanumeric chars) with context anchor"
group = 1

[[detector.patterns]]
regex = '''api[_\-\s]*key[=:\s"'\']+([a-zA-Z0-9]{40}).*api\.nasa\.gov'''
description = "NASA API key in URL with api.nasa.gov domain"
group = 1

[[detector.tests]]
test_positive = "NASA_API_KEY=Yx482xEg9Fb5nAWX0m3IsojQXbBJgYW38rW9Pz9D"
test_negative = "NASA_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
