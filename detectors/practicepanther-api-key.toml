# Docs: https://practicepanther Support Center (API v2 uses token-based auth)
# Format: API key token - alphanumeric string typically 40+ characters
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "practicepanther-api-key"
name = "PracticePanther API Key"
service = "practicepanther"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["PRACTICEPANTHER_API_KEY", "PRACTICEPANTHER_TOKEN", "practicepanther_api_key", "x-practicepanther-token"]

[[detector.patterns]]
regex = '''(?:PRACTICEPANTHER|practicepanther)[_\-\s]*(?:API[_\-\s]*KEY|TOKEN|token)[=:\s"'']+([a-zA-Z0-9_\-]{40,})'''
description = "PracticePanther API key or token"
group = 1

[[detector.tests]]
test_positive = "PRACTICEPANTHER_API_KEY=7YyNdbgZbHjVYPyfQSEuWajO7Ei3lyUMx24hMWUY"
test_negative = "PRACTICEPANTHER_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
