# Docs: https://documentation.solarwinds.com/en/success_center/loggly/content/admin/customer-token-authentication-token.htm
# Format: UUID format (8-4-4-4-12 hex pattern), example: 69af9e44-e002-4f67-8777-7b3b93ab0297
# Verify: none (token is used in syslog structured data or HTTP URL, no direct validation endpoint)
# Prefix: none (UUID format, requires keyword context)

[detector]
id = "loggly-customer-token"
name = "Loggly Customer Token"
service = "loggly"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["loggly", "LOGGLY_TOKEN", "loggly_token", "customer_token", "loggly.com"]

[[detector.patterns]]
regex = "(?:loggly|LOGGLY_TOKEN|loggly_token|customer_token)[=:\\s\"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Loggly customer token (UUID format) with context anchor"
group = 1

[[detector.tests]]
test_positive = "loggly=c2dc9879-849a-2cf5-83e5-1ad58caad492"
test_negative = "loggly=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
