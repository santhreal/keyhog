# Docs: https://fly.io/docs/security/tokens/
# Format: fo1_ prefix followed by alphanumeric characters (Fly.io deploy token)
# Verify: GET /v1/apps with Bearer token returns 200 if valid
# Prefix: fo1_

[detector]
id = "flyio-deploy-token"
name = "Fly.io Deploy Token"
service = "flyio"
severity = "critical"
# Drop the bare `fly` / `deploy` keywords: they add noise and caused
# pre-filter false negatives when no contextual hint was present (e.g.
# `const TOKEN = "fo1_..."` in source code). The `fo1_` prefix alone is
# vendor-specific enough to be the AC anchor.
keywords = ["fo1_"]

[[detector.patterns]]
# Bound the upper length so we don't latch onto a longer base64url
# run. Real Fly.io deploy tokens are 64 chars after the prefix.
regex = "fo1_[a-zA-Z0-9_-]{40,80}"
description = "Fly.io deploy token (fo1_ prefix, length-bounded)"

[[detector.patterns]]
regex = "(?:FLY|fly)[_\\-\\s]*(?:DEPLOY|deploy)[_\\-\\s]*(?:TOKEN|token)[=:\\s\"'\\']+(fo1_[a-zA-Z0-9_-]{40,})"
description = "Fly.io deploy token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.machines.dev/v1/apps"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
