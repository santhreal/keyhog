# Docs: https://fly.io/docs/security/tokens/
# Format: fo1_ prefix followed by alphanumeric characters (Fly.io deploy token)
# Verify: GET /v1/apps with Bearer token returns 200 if valid
# Prefix: fo1_

[detector]
id = "flyio-deploy-token"
name = "Fly.io Deploy Token"
service = "flyio"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# Drop the bare `fly` / `deploy` keywords: they add noise and caused
# pre-filter false negatives when no contextual hint was present (e.g.
# `const TOKEN = "fo1_..."` in source code). The `fo1_` prefix alone is
# vendor-specific enough to be the AC anchor.
keywords = ["fo1_"]

[[detector.patterns]]
# Bound the upper length so we don't latch onto a longer base64url
# run. Real Fly.io deploy tokens are 64 chars after the prefix.
regex = "fo1_[a-zA-Z0-9_-]{40,80}"
description = "Fly.io deploy token (fo1_ prefix, length-bounded)"

[[detector.patterns]]
regex = "(?:FLY|fly)[_\\-\\s]*(?:DEPLOY|deploy)[_\\-\\s]*(?:TOKEN|token)[=:\\s\"'\\']+(fo1_[a-zA-Z0-9_-]{40,})"
description = "Fly.io deploy token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.machines.dev/v1/apps"
allowed_domains = ["api.machines.dev"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "fo1_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
test_negative = "fo1_short"
