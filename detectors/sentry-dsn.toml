# Docs: https://docs.sentry.io/concepts/key-terms/dsn-explainer/
# Format: URL format: https://{public_key}@{host}/{project_id}
# Verify: None (DSN contains public key only)
# Prefix: https://

[detector]
id = "sentry-dsn"
name = "Sentry DSN"
service = "sentry"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
# "dsn" removed: over-broad (fires on ODBC/`dsn=` connection strings and any
# "dsn" mention) and redundant, both regexes require `.ingest.sentry.io`
# (keyword "sentry.io"), which every real Sentry DSN contains. Recall-neutral.
keywords = ["sentry.io", "sentry_dsn", "o0.ingest", "o1.ingest"]

[[detector.patterns]]
regex = 'https://[a-f0-9]{32}@o[0-9]+\.ingest\.sentry\.io/[0-9]+'
description = "Sentry DSN with organization ID"
# DSN = public key by design. Shipped in every browser-SDK / mobile-SDK
# bundle; the host-side rate-limit + project-scope IS the security
# boundary. `--hide-client-safe` drops these.
client_safe = true

[[detector.patterns]]
regex = 'https://[a-f0-9]{32}@[a-z0-9-]+\.ingest\.sentry\.io/[0-9]+'
description = "Sentry DSN with custom organization subdomain"
client_safe = true

[[detector.tests]]
test_positive = "https://9a3b7c2e4d1f6a8b0c5d9e3f7a1b4c2d@o12345.ingest.sentry.io/67890"
test_negative = "https://abc@o12345.ingest.sentry.io/67890"
