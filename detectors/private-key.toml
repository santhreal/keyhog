# Docs: https://en.wikipedia.org/wiki/PKCS_8, RFC 7468
# Format: PEM-encoded private key block, e.g.
#   -----BEGIN RSA PRIVATE KEY-----
#   <base64 body, multi-line>
#   -----END RSA PRIVATE KEY-----
# Verify: no API endpoint (private keys are not call-time verifiable).
# Prefix: -----BEGIN

# The detector ID is intentionally `private-key`, NOT `generic-private-key` -
# the `generic-` prefix routes findings through the probabilistic-gate
# entropy floor in `scan_filters.rs`, which (correctly) rejects short
# credentials like the bare literal string `PRIVATE KEY`. PEM markers ARE
# the high-confidence signal for this class; we do not want the gate.

[detector]
id = "private-key"
name = "Private Key (PEM)"
service = "crypto"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
decode_transforms = { reverse_prefixes = ["-----BEGIN", "PRIVATE KEY"], caesar_prefixes = ["-----BEGIN", "PRIVATE KEY"] }
keywords = ["BEGIN", "PRIVATE KEY"]
# Private-key block: the match span is an enclosing PEM/OpenSSH key body, so
# resolution suppresses lower-specificity findings nested inside it through this
# detector-owned flag.
private_key_block = true

# Multi-line PEM body capture. `[\s\S]*?` (lazy) keeps the match bounded
# to one BEGIN/END pair - without `?` a file containing two adjacent
# PEM blocks would be captured as one giant credential including the
# `END … BEGIN` text between them. Algorithms enumerated rather than
# captured via `[A-Z ]*` because Hyperscan's NFA can drop OPENSSH
# matches when a greedy character class straddles `PRIVATE` - the
# explicit alternation gives the compiler a fixed branching factor.
# `PGP PRIVATE KEY BLOCK` is the only variant that uses the literal
# `BLOCK` suffix; the `(?: BLOCK)?` group handles it without a
# separate pattern.
[[detector.patterns]]
regex = '-----BEGIN (?:RSA |EC |DSA |OPENSSH |ENCRYPTED |PGP )?PRIVATE KEY(?: BLOCK)?-----[\s\S]*?-----END (?:RSA |EC |DSA |OPENSSH |ENCRYPTED |PGP )?PRIVATE KEY(?: BLOCK)?-----'
description = "Full PEM private-key block (BEGIN…END)"

[[detector.tests]]
test_positive = "-----BEGIN RSA PRIVATE KEY-----\nMIIEpQIBAAKCAQEA7n2K9xR4vQ1mWcZ8hLbF3jD5sT6yU0pN2aG4eH7iO9kB1lM3rV5wX8zC0dQ2fS4gJ6kP8mR0tU2wY4aB6cD8eF0gH2iJ4kL6mN8oP0qR2sT4uV6wX8yZ0aB2cD4eF6gH8iJ0kL2mN4oP6qR8sT0\n-----END RSA PRIVATE KEY-----"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
