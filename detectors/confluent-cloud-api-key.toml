# Docs: https://docs.confluent.io/cloud/current/security/authenticate/workload-identities/service-accounts/api-keys/overview.html
# Format: API key ID (16 alphanumeric) and API secret (cflt- prefix + 60 chars for new format, or 64 chars for legacy)
# Verify: Basic auth with API key ID as username and secret as password to Confluent Cloud API
# Prefix: cflt (for secrets only)

[detector]
id = "confluent-cloud-api-key"
name = "Confluent Cloud API Key"
service = "confluent-cloud"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["cflt", "CONFLUENT", "confluent"]

[[detector.patterns]]
regex = "cflt[A-Za-z0-9+/]{60}"
description = "Confluent Cloud API secret (new format with cflt prefix)"

[[detector.patterns]]
regex = '''(?:CONFLUENT|CONFLUENT_CLOUD|confluent|confluent_cloud)[_\-\s]*(?:API[_\-\s]*)?(?:KEY[_\-\s]*ID|KEY)[=:\s"'']+([a-zA-Z0-9]{16})'''
description = "Confluent Cloud API key ID with context anchor"
group = 1

[[detector.companions]]
name = "confluent_api_secret"
regex = '''(?:CONFLUENT|CONFLUENT_CLOUD|confluent|confluent_cloud)[_\-\s]*(?:API[_\-\s]*)?(?:SECRET|PASSWORD)[=:\s"'']+([a-zA-Z0-9+/]{64}|cflt[A-Za-z0-9+/]{60})'''
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.confluent.cloud/org/v2/organizations"
allowed_domains = ["api.confluent.cloud"]

[detector.verify.auth]
type = "basic"
# `password = "companion"` resolved to the literal "companion" via the
# resolve_field fallthrough - basic_auth would have shipped the wrong
# password. Reference the companion by name.
username = "match"
password = "companion.confluent_api_secret"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "cfltKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "cfltKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
