# Docs: https://docs.env0.com/docs/api-keys
# Format: API Key ID (UUID-like) and API Secret pair used with Basic Auth
# Verify: GET /api/keys with Basic Auth (api_key_id as username, api_secret as password)
# Prefix: none (UUID format for key ID)

[detector]
id = "env0-api-key"
name = "env0 API Key"
service = "env0"
severity = "critical"
keywords = ["ENV0_API_KEY", "ENV0_API_SECRET", "env0_api_key", "env0_api_secret", "apiKeyType"]

[[detector.patterns]]
regex = "(?i)env0_api_key[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})\\b(?:[^a-zA-Z0-9_-]|$)"
description = "env0 API Key ID in environment variable"
group = 1

[[detector.patterns]]
regex = "(?i)env0_api_secret[=:\\s\"'']+([a-zA-Z0-9]{40,})\\b(?:[^a-zA-Z0-9_-]|$)"
description = "env0 API Secret in environment variable"
group = 1

[[detector.patterns]]
regex = "(?i)--apikey[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})\\b(?:[^a-zA-Z0-9_-]|$)"
description = "env0 API Key in CLI"
group = 1

[[detector.companions]]
name = "env0_api_secret"
regex = "(?i)env0_api_secret[=:\\s\"'']+([a-zA-Z0-9]{40,})\\b(?:[^a-zA-Z0-9_-]|$)"
within_lines = 5

[[detector.tests]]
test_positive = "ENV0_API_KEY=a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
test_negative = "ENV0_API_KEY=short"
