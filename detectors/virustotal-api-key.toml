# Docs: https://docs.virustotal.com/reference/overview
# Format: 64 hexadecimal characters
# Verify: GET /api/v3/users/me with x-apikey header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "virustotal-api-key"
name = "VirusTotal API Key"
service = "virustotal"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["VIRUSTOTAL_API_KEY", "virustotal", "VT_API_KEY"]

[[detector.patterns]]
regex = "(?:VIRUSTOTAL|virustotal|VT_)(?:_API)?(?:_KEY)?[=:\\s\"'']+([a-f0-9]{64})"
description = "VirusTotal API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://www.virustotal.com/api/v3/users/me"
allowed_domains = ["www.virustotal.com"]

[detector.verify.auth]
type = "header"
name = "x-apikey"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "VIRUSTOTAL=94006201bd6c02ff2503b0a5791efdf15c370afd7e58806ee5633b46ce6cbdc6"
test_negative = "VIRUSTOTAL=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
