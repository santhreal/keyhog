# Docs: https://docs.turso.tech/api-reference/authentication
# Format: Platform API token - JWT format (eyJ...) for Turso API access
# Verify: GET /v1/organizations with Bearer token returns 200 if valid
# Prefix: eyJ (JWT prefix, requires context for turso-specific)

[detector]
id = "turso-db-token-v2"
name = "Turso Database Token v2"
service = "turso"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["TURSO_AUTH_TOKEN", "turso.io", "TURSO_TOKEN", "api.turso.io"]

[[detector.patterns]]
regex = '''(?:TURSO|turso)[_\-\s]*(?:AUTH|API)[_\-\s]*TOKEN[=:\s"'']+(eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]+)'''
description = "Turso v2 platform API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:turso\\.io|api\\.turso)[^\\n\"'']{0,50}(eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]{50,})"
description = "Turso API token with hostname context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.turso.io/v1/organizations"
allowed_domains = ["api.turso.io"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "TURSOAPI TOKEN   \" ==           :':\" ' : :=  : \"    \" \":  = \"  \"    ' = \"  '  ' \" \"   ' ''   '\"  \": 'eyJU392wf3w4AmX6yLP72s_1rUYhYZWSj9UYKJLuIzr_ulMtybIjXyy1iSP1H_E74oL.eyJB8MkQam9OUqV_yYiSxd32BrO6nOEv_k6I5q_--lX8EmNFFR02589yzf7vs0EprMgUhdZ9lEWu3rKKFnBLuMnZOQBAErME.QQ8ACgDR3OdN5Irt0xYLD93NPc0bD"
test_negative = "TURSOAPI TOKEN   \" ==           :':\" ' : :=  : \"    \" \":  = \"  \"    ' = \"  '  ' \" \"   ' ''   '\"  \": 'YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
