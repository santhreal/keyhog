# Docs: https://developer.twitter.com/en/docs/authentication/oauth-2-0
# Format: OAuth client secret - 32-64 alphanumeric characters (no unique prefix)
# Verify: POST to api.twitter.com/2/oauth2/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "twitter-oauth-secret"
name = "Twitter/X OAuth Client Secret"
service = "twitter"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["TWITTER_CLIENT_SECRET", "twitter_client_secret", "X_CLIENT_SECRET"]

[[detector.patterns]]
regex = "(?:TWITTER|twitter|X)[_.]?(?:CLIENT|client|OAUTH|oauth)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{32,64})"
description = "Twitter/X OAuth client secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "TWITTERCLIENTSECRET=iJ18RC-6VioWCQC0Rs-MVNh9V6Ze8zKO"
test_negative = "TWITTERCLIENTSECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
