# Docs: https://developer.nexmo.com/concepts/guides/authentication
# Format: API Key is 8 hex characters (no unique prefix)
# Verify: https://developer.nexmo.com/api/account#getBalance
# Prefix: none (8 char hex, requires keyword context)

[detector]
id = "vonage-api-key"
name = "Vonage/Nexmo API Key"
service = "vonage"
severity = "critical"
# "api_key", "API_KEY" removed: over-broad generic prefilter the regex does NOT need — every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["vonage", "VONAGE", "nexmo", "NEXMO"]

[[detector.patterns]]
regex = "(?:vonage|VONAGE|nexmo|NEXMO)[_\\-\\s]*(?:api[_\\-\\s]*key|API[_\\-\\s]*KEY)[=:\\s\\\"']+([a-f0-9]{8})"
description = "Vonage/Nexmo API Key with context anchor"
group = 1

[[detector.tests]]
test_positive = "NEXMO_API_KEY=f3ed3778"
test_negative = "NEXMO_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
