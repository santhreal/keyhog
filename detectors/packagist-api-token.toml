# Docs: https://packagist.com/docs/api
# Format: API key and secret pair (HMAC-SHA256) or simple token for auth.json
# Verify: GET /api/packages with api-key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "packagist-api-token"
name = "Packagist API Token"
service = "packagist"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["PACKAGIST", "packagist.com", "auth.json", "composer"]

[[detector.patterns]]
regex = '''(?:PACKAGIST|packagist)[_\-\s]*(?:API[_\-\s]*KEY|TOKEN|token)[=:\s"'']+([a-f0-9]{32,64})'''
description = "Packagist API key/token in configuration"
group = 1

[[detector.patterns]]
regex = "\"packagist\\.com\":\\s*\\{\\s*\"http-basic\":\\s*\\{\\s*\"[^\"]+\":\\s*\"[^\"]+\",\\s*\"password\":\\s*\"([a-f0-9]{32,64})\""
description = "Packagist auth.json credentials"
group = 1

[[detector.tests]]
test_positive = "PACKAGIST_API_KEY=a6a5effa36c91d47cb12be92bd74e20b3148bf5b"
test_negative = "PACKAGIST_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
