# Docs: https://www.activepieces.com/docs/install/configuration/environment-variables
# Format: API key for Activepieces automation platform
# Verify: GET /api/v1/flows with Bearer token
# Prefix: ap_

[detector]
id = "activepieces-api-key"
name = "Activepieces API Key"
service = "activepieces"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["ap_", "activepieces", "ACTIVEPIECES", "AP_API_KEY"]

[[detector.patterns]]
regex = "ap_[a-f0-9]{32,}"
description = "Activepieces API key (ap_ prefix)"

[[detector.patterns]]
regex = "(?:ACTIVEPIECES|activepieces)[_\\.]?(?:API[_\\.]?)?(?:KEY|TOKEN)[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "Activepieces API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://cloud.activepieces.com/api/v1/flows"
allowed_domains = ["cloud.activepieces.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ap_7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ap_short"
