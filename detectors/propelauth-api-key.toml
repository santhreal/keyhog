# Docs: https://docs.propelauth.com/reference/api/getting-started
# Format: 32 hex character string with no unique prefix, used as Bearer token
# Verify: GET /api/backend/v1/user/{userId} with Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "propelauth-api-key"
name = "PropelAuth API Key"
service = "propelauth"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["PROPELAUTH_API_KEY", "PROPELAUTH_AUTH_URL", "propelauth"]

[[detector.patterns]]
regex = '''(?:PROPELAUTH_API_KEY|propelauth[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-f0-9]{32})'''
description = "PropelAuth API key with context anchor (32 hex chars)"
group = 1

[[detector.tests]]
test_positive = "PROPELAUTH_API_KEY=b3265b7c389276d437c18f7c28d04f34"
test_negative = "PROPELAUTH_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
