# Docs: https://developer.tomtom.com/knowledgebase/platform/article/basic-information
# Format: 32+ character alphanumeric API key (no unique prefix)
# Verify: GET /search/2/geocode/{query}.json with key parameter
# Prefix: none (requires context anchoring)

[detector]
id = "tomtom-api-key"
name = "TomTom API Key"
service = "tomtom"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["TOMTOM_API_KEY", "tomtom.api.key", "tomtom_api_key"]

[[detector.patterns]]
regex = '''(?:TOMTOM[_\-\s]*API[_\-\s]*KEY|tomtom[_\-\s]*api[_\-\s]*key|tomtom\.api\.key)[=:\s"'']+([A-Za-z0-9]{32,})'''
description = "TomTom API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.tomtom.com/search/2/geocode/test.json"
allowed_domains = ["api.tomtom.com"]

[detector.verify.auth]
type = "query"
param = "key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "tomtom.api.key ' :    'ddBdrdlALEHmnzSOzuOzYo3W9ZF9T6SF6UzGi4yO0Dp8ABXpW9BUl2rNp2"
test_negative = "tomtom.api.key ' :    'YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
