# Docs: https://docs.appdynamics.com/appd/22.x/latest/en/application-monitoring/using-the-appdynamics-apis
# Format: Account name paired with API key (hex format)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "appdynamics-api-credentials"
name = "AppDynamics API Credentials"
service = "appdynamics"
severity = "critical"
# "api_key" removed: over-broad generic prefilter the regex does NOT need — every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["APPDYNAMICS", "appdynamics", "X-AppD-API-Key", "account_name"]

[[detector.patterns]]
regex = "(?i)(?:x-appd-|appdynamics[_.-]?)api[_.-]?key[=:\\s\"']+([a-f0-9]{32,})"
description = "AppDynamics API key with context anchor"
group = 1

[[detector.companions]]
name = "appdynamics_account"
regex = "(?i)appdynamics[_.-]?(?:account|account[_.-]?name)[=:\\s\"']+([a-zA-Z0-9_-]+)"
within_lines = 5

[[detector.tests]]
test_positive = "X-AppD-API-Key=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "X-AppD-API-Key=short"
