# Docs: https://www.cognitoforms.com/support/475/data-integration/cognito-forms-api
# Format: Bearer token with consistent first 30 characters (alphanumeric with dashes)
# Verify: GET /api/forms with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "cognito-forms-api-key"
name = "Cognito Forms API Key"
service = "cognitoforms"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["cognitoforms", "COGNITO_FORMS", "cognito_forms"]

[[detector.patterns]]
regex = '''(?:cognito[_\-\s]*forms?|COGNITO[_\-\s]*FORMS)[_.\s]*(?:api[_\-\s]*key|api[_\-\s]*token|access[_\-\s]*token)[\s"'']+([A-Za-z0-9_-]{40,})'''
description = "Cognito Forms API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://www.cognitoforms.com/api/forms"
allowed_domains = ["www.cognitoforms.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "cognito_forms_api_key Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2"
test_negative = "cognito_forms_api_key short"
