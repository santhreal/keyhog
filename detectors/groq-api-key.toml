# Docs: https://console.groq.com/docs/overview
# Format: gsk_ prefix followed by 52 alphanumeric characters
# Verify: GET request to Groq API /models endpoint with Bearer token
# Prefix: gsk_

[detector]
id = "groq-api-key"
name = "Groq API Key"
service = "groq"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["gsk_"]

[[detector.patterns]]
regex = 'gsk_[a-zA-Z0-9]{52}'
description = "Groq API key (gsk_)"

[detector.verify]
method = "GET"
url = "https://api.groq.com/openai/v1/models"
allowed_domains = ["api.groq.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "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"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
