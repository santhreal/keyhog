# Docs: https://developer.dhl.com/api-reference/authentication-api-dhl-freight
# Format: API Key and API Secret for OAuth, or DHL-API-Key header
# Verify: POST /auth/v1/token to get bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "dhl-api-credentials"
name = "DHL API Credentials"
service = "dhl"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["DHL_API_KEY", "DHL_API_SECRET", "DHL-API-Key", "developer.dhl.com"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:DHL|dhl)[._](?:API|api)[._](?:KEY|key)[=:\\s\"'']+([A-Za-z0-9_-]{32,64})"
description = "DHL API Key"
group = 1

[[detector.patterns]]
regex = "(?:DHL|dhl)[._](?:API|api)[._](?:SECRET|secret)[=:\\s\"'']+([A-Za-z0-9_-]{32,64})"
description = "DHL API Secret"
group = 1

[[detector.patterns]]
regex = "DHL-API-Key[=:\\s\"'']+([A-Za-z0-9_-]+)"
description = "DHL-API-Key header value"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:DHL|dhl)[._](?:CONSUMER|consumer)[._](?:KEY|key)[=:\\s\"'']+([A-Za-z0-9_-]{32,64})"
description = "DHL Consumer Key"
group = 1

[[detector.tests]]
test_positive = "DHL.API.KEY=ZX0SakOvfcEiU6MgQmtf61SR1jdCcIKr"
test_negative = "DHL.API.KEY=short"
