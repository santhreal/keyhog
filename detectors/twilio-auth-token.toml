# Docs: https://www.twilio.com/docs/iam/credentials/api
# Format: 32 hex characters used as auth token
# Verify: GET /2010-04-01/Accounts with Basic auth
# Prefix: none (requires context anchoring via TWILIO keyword)

[detector]
id = "twilio-auth-token"
name = "Twilio Auth Token"
service = "twilio"
severity = "critical"
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.15
# Add `AC` and `AccountSid` literals so the AC pre-filter routes the
# bare-AccountSid shape into the regex. `AC` is a 2-char literal so
# pair it with the longer `TWILIO_ACCOUNT_SID` / `AccountSid` variants
# to satisfy the AC keyword-length floor.
keywords = ["twilio", "TWILIO", "TWILIO_ACCOUNT_SID", "AccountSid", "accountSid", "account_sid"]

[[detector.patterns]]
regex = "(?i)twilio[_.\\s-]*auth[_.\\s-]*token\\s*[=:]\\s*[\"']?([a-fA-F0-9]{32})[\"']?"
description = "Twilio auth token (32 hex chars with TWILIO_AUTH_TOKEN context)"
group = 1

[[detector.patterns]]
# Twilio AccountSid: `AC` + 32 hex chars is a Twilio-specific vendor
# fingerprint. Fixtures that ship only the AccountSid (no auth_token
# nearby) were previously silent because the AccountSid lived only in
# the companion block. Routing AC[hex32] as a primary pattern surfaces
# those findings; the `AC` prefix plus exactly-32 hex digits avoids
# sha1-hex (40) and uuid (36) collisions.
regex = '(?-i)\bAC[a-f0-9]{32}\b'
description = "Twilio AccountSid (AC + 32 hex, standalone vendor fingerprint)"

[[detector.patterns]]
# `authToken: "..."` / `auth_token = "..."` shape - the Twilio Node /
# Python / Ruby SDK quickstart shape. Re-anchored to a Twilio-fingerprinted
# context: a `twilio` or `AC<32hex>` AccountSid literal must be CONSUMED
# within the preceding window (the regex crate has no lookaround). The bare
# `auth_token=<32hex>` shape on its own matched generic auth tokens from any
# API and was the FP driver; requiring the in-window Twilio fingerprint
# restores attribution without leaning solely on the companion gate.
regex = "(?i)(?:twilio|AC[a-f0-9]{32})[\\sa-z0-9_.:=\"',{}()-]{0,80}?auth[_.-]?token\\s*[=:]\\s*[\"']?([a-fA-F0-9]{32})[\"']?"
description = "Twilio authToken (32 hex) anchored to in-window twilio/AccountSid fingerprint"
group = 1

[[detector.companions]]
name = "account_sid"
# Anchored to a `TWILIO_ACCOUNT_SID=` / `accountSid:` declaration. AC is
# the Twilio AccountSid namespace prefix; `AC` + 32 hex chars is a
# vendor-specific fingerprint, NOT a generic 34-char hex shape, which is
# what makes it safe to use as the gate for the bare-keyword auth_token
# pattern above.
regex = "(?i)(?:twilio[_.\\s-]*)?account[_.-]?sid\\s*[=:]\\s*[\"']?(AC[a-fA-F0-9]{32})[\"']?"
within_lines = 5
required = true

[detector.verify]
method = "GET"
url = "https://api.twilio.com/2010-04-01/Accounts.json"

[detector.verify.auth]
type = "basic"
username = "companion.account_sid"
password = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "TWILIO_ACCOUNT_SID=AC7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d\nTWILIO_AUTH_TOKEN=4c9a8f6e3b7d1a2c5e8f0b9d6a3c4e1f"
test_negative = "TWILIO_AUTH_TOKEN=4c9a8f6e3b7d1a2c5e8f0b9d6a3c4e1f"
