# Docs: https://docs.baseten.co/organization/api-keys
# Format: 40+ alphanumeric characters, used with Api-Key or Authorization header
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "baseten-api-key"
name = "Baseten API Key"
service = "baseten"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["BASETEN_API_KEY", "baseten", "inference.baseten.co", "Api-Key"]

[[detector.patterns]]
regex = "(?:BASETEN_API_KEY)[=:\\s\"\\']+([a-zA-Z0-9_-]{30,})"
description = "Baseten API key from environment variable"
group = 1

[[detector.patterns]]
regex = "Authorization[=:\\s\"\\']*Api-Key[=:\\s\"\\']+([a-zA-Z0-9_-]{30,})"
description = "Baseten Api-Key authorization header"
group = 1

[[detector.tests]]
test_positive = "BASETEN_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn"
test_negative = "BASETEN_API_KEY=short"
