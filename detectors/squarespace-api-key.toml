# Docs: https://developers.squarespace.com/commerce-apis/authentication-and-permissions
# Format: Bearer token format - 40+ character alphanumeric string
# Verify: GET /1.0/commerce/inventory with Authorization: Bearer header
# Prefix: none (requires context anchoring)

[detector]
id = "squarespace-api-key"
name = "Squarespace API Key"
service = "squarespace"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["squarespace", "SQUARESPACE", "Developer API Key"]

[[detector.patterns]]
regex = '''(?:squarespace|SQUARESPACE)[_=:\s"'']+(?:api[_\-\s]*key|key)[=:\s"'']+([a-zA-Z0-9]{40,})'''
description = "Squarespace API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:squarespace|SQUARESPACE)[_=:\\s\"'']+(?:bearer|token)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Squarespace Bearer token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.squarespace.com/1.0/commerce/inventory"
allowed_domains = ["api.squarespace.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "squarespace_api_key=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "SQUARESPACE_API_KEY=short"
