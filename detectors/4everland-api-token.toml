# Docs: https://docs.4everland.org/
# Format: S3-compatible API with Access Key ID and Secret Key
# Verify: none (S3-compatible service, requires signature-based auth)
# Prefix: none (S3-compatible format, requires context anchoring)

[detector]
id = "4everland-api-token"
name = "4everland API Token"
service = "4everland"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["4EVERLAND", "4everland", "EVERLAND", "everland", "4ever", "endpoint.4everland.co"]

[[detector.patterns]]
regex = "(?:4EVER|4ever|EVERLAND|everland)[._-]?(?:ACCESS|access)?[._-]?(?:KEY|key)[=:\\s\"'']+([A-Z0-9]{20,32})"
description = "4everland access key with context anchor"
group = 1

[[detector.companions]]
name = "secret_key"
regex = "(?:4EVER|4ever|EVERLAND|everland|SECRET|secret)[._-]?(?:SECRET|secret)?[._-]?(?:KEY|key)[=:\\s\"'']+([A-Za-z0-9/+=]{40})"
within_lines = 5

[[detector.tests]]
test_positive = "4EVER_ACCESS_KEY=KP4QX7RM2SN5TB8VW3YZ\n4EVER_SECRET_KEY=KP4QX7RM2SN5TB8VW3YZKP4QX7RM2SN5TB8VW3YZK"
test_negative = "4EVER_KEY=KP4QX7RM2SN5TB8VW3Y"
