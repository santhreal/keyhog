# Docs: https://docs.4everland.org/
# Format: S3-compatible API with Access Key ID and Secret Key
# Verify: none (S3-compatible service, requires signature-based auth)
# Prefix: none (S3-compatible format, requires context anchoring)

[detector]
id = "4everland-api-token"
name = "4everland API Token"
service = "4everland"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["4EVERLAND", "4everland", "EVERLAND", "everland", "4ever", "endpoint.4everland.co"]

[[detector.patterns]]
regex = "(?:4EVER|4ever|EVERLAND|everland)[._-]?(?:ACCESS|access)?[._-]?(?:KEY|key)[=:\\s\"'']+([A-Z0-9]{20,32})"
description = "4everland access key with context anchor"
group = 1

[[detector.companions]]
name = "secret_key"
regex = "(?:4EVER|4ever|EVERLAND|everland|SECRET|secret)[._-]?(?:SECRET|secret)?[._-]?(?:KEY|key)[=:\\s\"'']+([A-Za-z0-9/+=]{40})"
within_lines = 5

[[detector.tests]]
test_positive = "4EVER_ACCESS_KEY=KP4QX7RM2SN5TB8VW3YZ\n4EVER_SECRET_KEY=KP4QX7RM2SN5TB8VW3YZKP4QX7RM2SN5TB8VW3YZK"
test_negative = "4EVER_KEY=KP4QX7RM2SN5TB8VW3Y"
