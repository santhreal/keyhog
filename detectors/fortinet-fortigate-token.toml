# Docs: https://docs.fortinet.com/document/fortigate/7.0.0/administration-guide/399768
# Format: API token or admin password for FortiGate REST API
# Verify: GET /api/v2/monitor/system/status with access_token parameter
# Prefix: none (requires context anchoring)

[detector]
id = "fortinet-fortigate-token"
name = "Fortinet FortiGate API Token"
service = "fortinet"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["FORTINET", "fortinet", "FORTIGATE", "fortigate"]

[[detector.patterns]]
regex = '''(?:FORTINET|fortinet|FORTIGATE|fortigate)[_\-\s]*(?:API[_\-\s]*)?(?:TOKEN|KEY)[=:\s"'']+([A-Za-z0-9_-]{32,64})'''
description = "Fortinet FortiGate API token with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:FORTINET|fortinet|FORTIGATE|fortigate)[_\-\s]*(?:HOST|URL|ADDRESS)[=:\s"'']+(https?://[^\s"'']+)'''
description = "Fortinet FortiGate host with context anchor"
group = 1

# NOTE: live verification disabled. Single-brace `{hostname}` was invalid
# template syntax (interpolate.rs only handles `{{...}}`). kimi-wave3 §1.

[[detector.tests]]
test_positive = "FORTINET_API_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "FORTINET_TOKEN=short"
