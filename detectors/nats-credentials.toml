# Docs: https://docs.nats.io/using-nats/developer/connecting/creds
# Format: NATS credentials file with JWT and seed key, or password/token in URL
# Verify: none (requires NATS connection, no standard HTTP API)
# Prefix: -----BEGIN NATS USER JWT----- or NKEY seed starting with SU

[detector]
id = "nats-credentials"
name = "NATS Credentials"
service = "nats"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "SU" removed: it was a 2-char over-trigger (fires on any word containing "SU":
# SUccess/SUbmit/…) yet added nothing, the NKEY SEED regex REQUIRES the
# `-----BEGIN NATS USER NKEY SEED-----` marker, which is already a keyword, and
# the URL/env patterns trigger on `nats://`/`NATS_`. Recall-neutral, cuts FPs+perf.
keywords = ["-----BEGIN NATS USER JWT-----", "-----BEGIN NATS USER NKEY SEED-----", "nats://", "NATS_"]

[[detector.patterns]]
regex = "-----BEGIN NATS USER JWT-----\\s*\n([A-Za-z0-9_-]+={0,2})\\s*\n-----END NATS USER JWT-----"
description = "NATS user JWT token"
group = 1

[[detector.patterns]]
regex = "-----BEGIN NATS USER NKEY SEED-----\\s*\n(SU[A-Za-z0-9]{58})\\s*\n-----END NATS USER NKEY SEED-----"
description = "NATS user NKEY seed (starts with SU)"
group = 1

[[detector.patterns]]
regex = "nats://[^@\\s\"']+@"
description = "NATS URL with embedded token/password"

[[detector.patterns]]
regex = "(?:NATS|nats)_(?:PASSWORD|PASS|TOKEN)[=:\\s\"']+([^\"'\\s]{8,})"
description = "NATS password/token from environment variable"
group = 1

[[detector.patterns]]
regex = "(?:NATS|nats)_CREDENTIALS[=:\\s\"']+([/a-zA-Z0-9._-]+\\.creds)"
description = "NATS credentials file path"
group = 1

[[detector.tests]]
test_positive = "NATS_URL=nats://user:SecretPass123456@nats.example.com:4222"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
