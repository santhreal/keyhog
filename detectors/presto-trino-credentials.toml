# Docs: https://trino.io/docs/current/security/authentication-types.html
# Format: LDAP/kerberos or password file authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "presto-trino-credentials"
name = "Presto/Trino Credentials"
service = "trino"
severity = "critical"
keywords = ["TRINO", "trino", "PRESTO", "presto"]

[[detector.patterns]]
regex = "(?:TRINO|PRESTO)[_\\s]*(?:URL|HOST)[=:\\s\"'']+(?:trino://|presto://)?(?:[^:@]+):([^@]+)@"
description = "Trino/Presto connection string with password"
group = 1

[[detector.companions]]
name = "trino_username"
regex = "(?:TRINO|PRESTO)[_\\s]*(?:USER|USERNAME)[=:\\s\"'']+([^\"'']+)"
within_lines = 5
[[detector.patterns]]
regex = "(?:TRINO|PRESTO)[_\\s]*(?:PASSWORD|PASS)[=:\\s\"'']+([a-zA-Z0-9_!@#$%^&*+=-]{16,})"
description = "Trino/Presto password with context anchor"
group = 1

[[detector.tests]]
test_positive = "TRINO_URL=trino://admin:SecretPass123@trino.example.com:8080"
test_negative = "TRINO_URL=trino://admin:YOUR_API_KEY_HERE_PLACEHOLDER_VALUE@trino.example.com:8080"
