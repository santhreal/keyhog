# Docs: https://www.rabbitmq.com/docs/uri-spec
# Format: amqp(s)://username:password@host:port/vhost
# Verify: none (requires AMQP connection, no standard HTTP API for all deployments)
# Prefix: amqp:// or amqps://

[detector]
id = "rabbitmq-credentials"
name = "RabbitMQ Credentials"
service = "rabbitmq"
severity = "high"
keywords = ["amqp://", "amqps://", "RABBITMQ_URL", "RABBITMQ_URI", "rabbitmq_password", "guest"]

[[detector.patterns]]
regex = "amqps?://([^:@\\s\"']+):([^@\\s\"']+)@[a-zA-Z0-9.-]+(:\\d+)?(/[a-zA-Z0-9._-]*)?"
description = "RabbitMQ AMQP URI with embedded credentials"
group = 2

[[detector.patterns]]
regex = "(?:RABBITMQ|AMQP)_URL[=:\\s\"']+(amqps?://[^@\\s\"']+@[a-zA-Z0-9.-]+)"
description = "RabbitMQ connection URL without embedded password in env var"
group = 1

[[detector.patterns]]
regex = "(?:RABBITMQ|rabbitmq)_(?:PASSWORD|PASS|PWD)[=:\\s\"']+([^\"'\\s]{4,})"
description = "RabbitMQ password from environment variable"
group = 1

[[detector.patterns]]
regex = "(?:RABBITMQ|rabbitmq)_(?:USERNAME|USER)[=:\\s\"']+([^\"'\\s]+)"
description = "RabbitMQ username from environment variable"
group = 1

[[detector.tests]]
test_positive = "amqp://user:SecretPass123456@rabbitmq.example.com:5672/vhost"
test_negative = "amqps://YOUR_API_KEY_HERE_PLACEHOLDER_VALUE:YOUR_API_KEY_HERE_PLACEHOLDER_VALUE@rabbitmq.example.com:5671/vhost"
