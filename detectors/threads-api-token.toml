# Docs: https://developers.facebook.com/docs/threads/get-started
# Format: OAuth2 access token - can be short-lived user token or long-lived token
# Verify: GET /debug_token with app credentials on graph.facebook.com
# Prefix: none (requires context anchoring)

[detector]
id = "threads-api-token"
name = "Threads API Access Token"
service = "threads"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["threads", "THREADS", "thread_id", "THREADS_ACCESS_TOKEN"]

[[detector.patterns]]
regex = '''(?:threads|THREADS|thread[_\-\s]*id|THREADS[_\-\s]*ACCESS[_\-\s]*TOKEN)[=:\s"\']+([a-zA-Z0-9]{100,})'''
description = "Threads API access token with context anchor"
group = 1

[[detector.tests]]
test_positive = "threadid=\":   \"   :=  '   ==\"'  =::      '\"       ' \"'\"  \"    =    :   :          '  '= '   \"  \" \"   \": 7K4lq8YH2dZbHWOzNLjPPa3mCnnalyOSJlEGrPQvurQBHIAR9Y6G1D5CEsBOITC7AbByJxV8ZjRQuFECSQ5GnqrGsRSawQJxGZLH"
test_negative = "threadid=\":   \"   :=  '   ==\"'  =::      '\"       ' \"'\"  \"    =    :   :          '  '= '   \"  \" \"   \": YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
