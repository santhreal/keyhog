# Docs: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-authentication
# Format: ACR access token (JWT-like) or admin password (long base64)
# Verify: az acr login --expose-token or docker login with token
# Prefix: none (requires context anchoring)

[detector]
id = "azure-container-registry-token"
name = "Azure Container Registry Token"
service = "azure-container-registry"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["azurecr.io", "ACR", "azurecr", "ACR_TOKEN", "AZURE_CR"]

[[detector.patterns]]
regex = "(?:azurecr\\.io|ACR|azurecr)[\\w_]*(?:TOKEN|PWD|PASSWORD)[=:\\s\"'']+(eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*)"
description = "Azure Container Registry JWT access token with context anchor"
group = 1

[[detector.patterns]]
# \b before ACR + an 8-char capture floor. The old unanchored, min-1
# capture matched the "ACR" *inside* "MACRO": LLVM's Dwarf.h
# `DW_MACRO_lo_user = 0xe0` parsed as ACR(o_lo_)USER = 0xe0 and surfaced
# `0xe0` as an ACR username (conf 0.8). Dogfood 2026-05-29. The word
# boundary stops mid-word ACR matches; requiring an alpha/underscore first
# byte drops C header constants like `ACR_USER 0x00000000`.
regex = "(?:\\bACR|azurecr)[\\w]*(?:USERNAME|USER)[=:\\s\"'']+([A-Za-z_][A-Za-z0-9_-]{7,})"
description = "Azure Container Registry username with captured token reference"
group = 1

[[detector.patterns]]
regex = "docker login [a-z0-9]+\\.azurecr\\.io.*?(?:password|token)[=:\\s\"'']+([A-Za-z0-9+/=]{50,})"
description = "Azure Container Registry docker login pattern with token"
group = 1

[[detector.tests]]
test_positive = "ACR_TOKEN=eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJrcDRxeDcifQ"
test_negative = "ACR_TOKEN=plain-string-not-jwt"
