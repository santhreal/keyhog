# Docs: https://discord.com/developers/docs/resources/webhook
# Format: https://discord.com/api/webhooks/{id}/{token} or https://discordapp.com/api/webhooks/{id}/{token}
# Verify: GET request to webhook URL returns webhook object if valid
# Prefix: https://discord.com/api/webhooks/

[detector]
id = "discord-webhook-credentials"
name = "Discord Webhook Credentials"
service = "discord"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["discord.com/api/webhooks", "discordapp.com/api/webhooks", "discord_webhook"]

[[detector.patterns]]
regex = "https://(?:discord\\.com|discordapp\\.com)/api/webhooks/[0-9]{17,20}/[a-zA-Z0-9_-]{60,80}"
description = "Discord webhook URL with ID and token"

[[detector.patterns]]
regex = "(?:DISCORD|discord)[._-]?(?:WEBHOOK|webhook)[._-]?(?:URL|url|TOKEN|token)[=:\\s\"'']+(https://(?:discord\\.com|discordapp\\.com)/api/webhooks/[0-9]{17,20}/[a-zA-Z0-9_-]{60,80})"
description = "Discord webhook URL with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "{{match}}"
# Pin to Discord's webhook hosts. The regex constrains {{match}} to these
# domains; the explicit allowlist enforces it at runtime even if a
# downstream edit ever broadens the pattern.
allowed_domains = ["discord.com", "discordapp.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "name"
json_path = "$.name"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "channel_id"
json_path = "$.channel_id"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "https://discord.com/api/webhooks/12345678901234567/IO0l8rdbq6tdAdwgnLsh3gU6UBHE5IxcSHBos0IwhMeZvisjRREI6Flk1z6yxaxa"
test_negative = "https://discord.com/api/webhooks/12345678901234567/short"
