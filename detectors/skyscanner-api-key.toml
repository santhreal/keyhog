# Docs: https://developers.skyscanner.net/docs/getting-started/authentication
# Format: 32-64 character alphanumeric string with no prefix
# Verify: GET /apiservices/v3/cultures with x-api-key header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "skyscanner-api-key"
name = "Skyscanner API Key"
service = "skyscanner"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["SKYSCANNER", "skyscanner"]

[[detector.patterns]]
regex = '''(?:SKYSCANNER|skyscanner)[_\-\s]*(?:API_KEY|api_key|KEY|key)[=:\s"'']+([A-Za-z0-9]{32,64})'''
description = "Skyscanner API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?is)partners\.api\.skyscanner\.net.{0,256}x[_\-\s]*api[_\-\s]*key[=:\s"'']+([A-Za-z0-9]{32,64})'''
required_literals = ["partners.api.skyscanner.net"]
description = "Skyscanner API key header following the Skyscanner API endpoint"
group = 1

[[detector.patterns]]
# Explicit `\x20` keeps this detector-owned bounded shape out of global separator expansion.
regex = "(?is)x[\\x20_\\t\\r\\n-]?api[\\x20_\\t\\r\\n-]?key[=:\\s\"'']+([A-Za-z0-9]{32,64}).{0,256}partners\\.api\\.skyscanner\\.net"
required_literals = ["partners.api.skyscanner.net"]
description = "Skyscanner API key header preceding the Skyscanner API endpoint"
group = 1

[detector.verify]
method = "GET"
url = "https://partners.api.skyscanner.net/apiservices/v3/cultures"
allowed_domains = ["partners.api.skyscanner.net"]

[detector.verify.auth]
type = "header"
name = "x-api-key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "SKYSCANNER_API_KEY=JEA8DfgFxzo9YbHh99eKuvHZUH62tIOeNPCQWBgg"
test_negative = "SKYSCANNER_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"

[[detector.tests]]
test_positive = "https://partners.api.skyscanner.net/apiservices/v3/cultures\nx-api-key: JEA8DfgFxzo9YbHh99eKuvHZUH62tIOeNPCQWBgg"
test_negative = "x-api-key: JEA8DfgFxzo9YbHh99eKuvHZUH62tIOeNPCQWBgg"
