# Docs: https://developer.box.com/guides/authentication/tokens/developer-tokens/
# Format: Short-lived OAuth2 access token, typically base64url-encoded JWT or random string
# Verify: GET /2.0/users/me with Bearer token returns 200 if valid
# Prefix: none (OAuth2 bearer token format)

[detector]
id = "box-developer-token"
name = "Box Developer Token"
service = "box"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["BOX_DEVELOPER_TOKEN", "box_developer_token", "developer_token"]

[[detector.patterns]]
regex = "(?:BOX|box)[._-]?(?:DEVELOPER|developer)[._-]?(?:TOKEN|token)[=:\\s\"']+([a-zA-Z0-9_-]{20,})"
description = "Box Developer Token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.box.com/2.0/users/me"
allowed_domains = ["api.box.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "login"
json_path = "$.login"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "BOX_DEVELOPER_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
test_negative = "BOX_DEVELOPER_TOKEN=short"
