# Docs: https://docs.devcycle.com/docs/sdk/server-side-sdks
# Format: dvc_ or dvc_client_ prefix followed by alphanumeric characters
# Verify: no public verification endpoint
# Prefix: dvc_

[detector]
id = "devcycle-api-credentials"
name = "DevCycle API Credentials"
service = "devcycle"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["dvc_", "dvc_client_", "DEVCYCLE"]

[[detector.patterns]]
regex = 'dvc_[a-zA-Z0-9_-]{20,}'
description = "DevCycle server-side SDK key"

[[detector.patterns]]
regex = 'dvc_client_[a-zA-Z0-9_-]{20,}'
description = "DevCycle client-side SDK key"

[[detector.tests]]
test_positive = "dvc_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "dvc_Kp4Qx7Rm"
