# Docs: https://codesandbox.io/docs/learn/sandboxes/deployment
# Format: CodeSandbox API token with csb_ or csb_api_ prefix
# Verify: GET /api/v1/users/current with Bearer token
# Prefix: csb_, csb_api_

[detector]
id = "codesandbox-api-token"
name = "CodeSandbox API Token"
service = "codesandbox"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["csb_", "csb_api", "CODESANDBOX", "codesandbox"]

[[detector.patterns]]
regex = 'csb_api_[a-zA-Z0-9]{20,}'
description = "CodeSandbox API token with csb_api_ prefix and base62 body"

[[detector.patterns]]
regex = 'csb_[a-zA-Z0-9]{20,}'
description = "CodeSandbox token with csb_ prefix and base62 body"

[detector.verify]
method = "GET"
url = "https://codesandbox.io/api/v1/users/current"
allowed_domains = ["codesandbox.io"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "Bearer {{match}}"

[[detector.tests]]
test_positive = "csb_api_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "csb_api_short"
