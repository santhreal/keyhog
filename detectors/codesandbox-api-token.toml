# Docs: https://codesandbox.io/docs/learn/sandboxes/deployment
# Format: CodeSandbox API token with csb_ or csb_api_ prefix
# Verify: GET /api/v1/users/current with Bearer token
# Prefix: csb_, csb_api_

[detector]
id = "codesandbox-api-token"
name = "CodeSandbox API Token"
service = "codesandbox"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["csb_", "csb_api", "CODESANDBOX", "codesandbox"]

[[detector.patterns]]
regex = 'csb_api_[a-zA-Z0-9]{20,}'
description = "CodeSandbox API token with csb_api_ prefix and base62 body"

[[detector.patterns]]
regex = 'csb_[a-zA-Z0-9]{20,}'
description = "CodeSandbox token with csb_ prefix and base62 body"

[detector.verify]
method = "GET"
url = "https://codesandbox.io/api/v1/users/current"
allowed_domains = ["codesandbox.io"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "Bearer {{match}}"

[[detector.tests]]
test_positive = "csb_api_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "csb_api_short"
