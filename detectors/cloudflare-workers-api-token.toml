# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/#authentication
# Format: 40 character alphanumeric with underscores and hyphens for Workers API
# Verify: GET /client/v4/user/tokens/verify with Bearer auth returns 200 if valid
# Prefix: none (40 char token, requires keyword context)

[detector]
id = "cloudflare-workers-api-token"
name = "Cloudflare Workers API Token"
service = "cloudflare"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["cloudflare", "workers", "CLOUDFLARE_WORKERS"]

# `WORKERS` is MANDATORY here (no trailing `?`). When it was optional this
# pattern collapsed to `cloudflare...api...token=` and matched plain
# `cloudflare_api_token=` shapes - which are owned by the generic
# `cloudflare-api-token` detector - so every Workers-less Cloudflare token
# reported twice under two detector names. Requiring the `workers` keyword
# makes this detector fire only on genuinely Workers-scoped tokens; the
# bare `cloudflare_api_token=` shape now belongs solely to
# `cloudflare-api-token`.
[[detector.patterns]]
regex = "(?:CLOUDFLARE|cloudflare)[._\\-\\s]*(?:WORKERS|workers)[._\\-\\s]*(?:API|api)?[._\\-\\s]*(?:TOKEN|token)[=:\\s\"'\\']+([a-zA-Z0-9_-]{40})"
description = "Cloudflare Workers API token with workers-scoped context anchor"
group = 1

[[detector.patterns]]
regex = "(?:workers|WORKERS)[._\\-\\s]*(?:API|api)?[._\\-\\s]*(?:TOKEN|token)[=:\\s\"'\\']+([a-zA-Z0-9_-]{40})"
description = "Cloudflare Workers token with workers context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.cloudflare.com/client/v4/user/tokens/verify"
allowed_domains = ["api.cloudflare.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "$.success"
equals = "true"

[[detector.tests]]
test_positive = "CLOUDFLARE_WORKERS_API_TOKEN=AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
test_negative = "CLOUDFLARE_WORKERS_API_TOKEN=short"
