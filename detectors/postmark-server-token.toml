# Docs: https://postmarkapp.com/developer/api/server-api
# Format: UUID (8-4-4-4-12 hex segments) used as server token
# Verify: GET /server with X-Postmark-Server-Token header returns 200
# Prefix: none (UUID format, requires keyword context)

[detector]
id = "postmark-server-token"
name = "Postmark Server API Token"
service = "postmark"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["POSTMARK", "postmark", "X-Postmark-Server-Token", "server_token", "POSTMARK_SERVER_TOKEN"]

[[detector.patterns]]
regex = "(?i)(?:x-)?postmark[._-]?(?:server[._-]?)?(?:token|key)[=:\\s\"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
required_literals = ["postmark"]
description = "Postmark server API token with context anchor (UUID format)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.postmarkapp.com/server"
allowed_domains = ["api.postmarkapp.com"]

[detector.verify.auth]
type = "header"
name = "X-Postmark-Server-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "POSTMARK_SERVER_TOKEN=9f3e5b8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "POSTMARK_SERVER_TOKEN=not-a-uuid"
