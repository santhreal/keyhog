# Docs: https://docs.github.com/en/authentication
# Format: ghu_ prefix followed by 36 alphanumeric characters
# Prefix: ghu_

[detector]
id = "github-user-to-server-token"
name = "GitHub User-to-Server Token"
service = "github"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
decode_transforms = { reverse_prefixes = ["ghu_"], caesar_prefixes = ["ghu_"] }
validators = [{ type = "crc32-base62", prefixes = ["ghu_"], entropy_len = 30, checksum_len = 6, reject_overlong = true, confidence_floor = 0.9 }]
keywords = ["ghu_", "GITHUB_TOKEN", "github_token"]

[[detector.patterns]]
regex = 'ghu_[A-Za-z0-9]{36}'
description = "GitHub User-to-Server Token (ghu_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.github.com/user"
allowed_domains = ["api.github.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[[detector.verify.headers]]
name = "User-Agent"
value = "keyhog-secret-scanner/{{version}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ghu_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S3cJfHh"
test_negative = "ghu_short"
