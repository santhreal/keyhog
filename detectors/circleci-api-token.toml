# Docs: https://circleci.com/docs/managing-api-tokens/
# Format: 40 character hexadecimal string (personal API token)
# Verify: GET /api/v2/me with Circle-Token header returns 200 if valid
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "circleci-api-token"
name = "CircleCI Personal API Token"
service = "circleci"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["circleci", "CIRCLECI", "circle_token", "CIRCLE_TOKEN"]

[[detector.patterns]]
regex = "(?i)circleci[_.\\s-]?(?:api[_.-]?)?token[=:\\s\"']+([a-f0-9]{40})"
description = "CircleCI API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)circle[_.-]?token[=:\\s\"']+([a-f0-9]{40})"
description = "CircleCI token from environment variable or Circle-Token header"
group = 1

[detector.verify]
method = "GET"
url = "https://circleci.com/api/v2/me"
allowed_domains = ["circleci.com"]

[detector.verify.auth]
type = "header"
name = "Circle-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "login"
json_path = "$.login"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "CIRCLE_TOKEN=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d8e6a2b9f"
test_negative = "CIRCLE_TOKEN=short"
