# Docs: https://circleci.com/docs/managing-api-tokens/
# Format: 40 character hexadecimal string (personal API token)
# Verify: GET /api/v2/me with Circle-Token header returns 200 if valid
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "circleci-api-token"
name = "CircleCI Personal API Token"
service = "circleci"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["circleci", "CIRCLECI", "circle_token", "CIRCLE_TOKEN"]

[[detector.patterns]]
regex = "(?i)circleci[_.\\s-]?(?:api[_.-]?)?token[=:\\s\"']+([a-f0-9]{40})"
description = "CircleCI API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)circle[_.-]?token[=:\\s\"']+([a-f0-9]{40})"
description = "CircleCI token from environment variable or Circle-Token header"
group = 1

[detector.verify]
method = "GET"
url = "https://circleci.com/api/v2/me"
allowed_domains = ["circleci.com"]

[detector.verify.auth]
type = "header"
name = "Circle-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "login"
json_path = "$.login"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "CIRCLE_TOKEN=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d8e6a2b9f"
test_negative = "CIRCLE_TOKEN=short"
