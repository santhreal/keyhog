# Docs: https://github.com/jet-admin/docs
# Format: JET_ADMIN_ or JET_ prefixed environment variables with API keys
# Verify: no public verification endpoint
# Prefix: JET_ADMIN_ or JET_

[detector]
id = "jetadmin-credentials"
name = "Jet Admin Credentials"
service = "jetadmin"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["JET_ADMIN", "JET_API_KEY", "jetadmin"]

[[detector.patterns]]
regex = "JET[_\\.\\s]*(?:ADMIN[_\\.\\s]*)?(?:API_KEY|api_key|TOKEN|token|SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_\\-]{24,})"
description = "Jet Admin API key or token"
group = 1

[[detector.patterns]]
regex = "JET[_\\.\\s]*(?:ADMIN[_\\.\\s]*)?(?:PASSWORD|password|PWD|pwd)[=:\\s\"'']+([a-zA-Z0-9_!@#$%^&*+=\\-]{12,})"
description = "Jet Admin password"
group = 1

[[detector.patterns]]
regex = "(?:jetadmin|jet[_\\.\\s]*admin)[_\\.\\s]*(?:api[_\\.\\s]*key|secret)[=:\\s\"'']+([a-zA-Z0-9_\\-]{20,})"
description = "Jet Admin credential with context anchor"
group = 1

[[detector.patterns]]
regex = "jet_[a-zA-Z0-9]{24,}"
description = "Jet Admin API key format"

[[detector.tests]]
test_positive = "JETADMIN_API_KEY=n-vvhk24chLYNYgsYTCfMLag"
test_negative = "JETADMIN_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
