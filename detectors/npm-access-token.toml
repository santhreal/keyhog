# Docs: https://docs.npmjs.com/about-access-tokens
# Format: Token starting with 'npm_' followed by 36 alphanumeric characters (Base64 URL-safe)
# Verify: Bearer token sent to registry.npmjs.org/-/whoami endpoint, returns 200 with username
# Prefix: npm_

[detector]
id = "npm-access-token"
name = "npm Access Token"
service = "npm"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
decode_transforms = { reverse_prefixes = ["npm_"], caesar_prefixes = ["npm_"] }
validators = [{ type = "crc32-base62", prefixes = ["npm_"], entropy_len = 30, checksum_len = 6, reject_overlong = false, confidence_floor = 0.9 }]
keywords = ["npm_"]

[[detector.patterns]]
regex = 'npm_[a-zA-Z0-9]{36}'
description = "npm automation or publish token (exactly 36 chars after npm_)"

[detector.verify]
method = "GET"
url = "https://registry.npmjs.org/-/whoami"
allowed_domains = ["registry.npmjs.org"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "username"
json_path = "$.username"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "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"
test_negative = "npm_short"
