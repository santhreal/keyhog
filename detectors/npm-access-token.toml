# Docs: https://docs.npmjs.com/about-access-tokens
# Format: Token starting with 'npm_' followed by 36 alphanumeric characters (Base64 URL-safe)
# Verify: Bearer token sent to registry.npmjs.org/-/whoami endpoint, returns 200 with username
# Prefix: npm_

[detector]
id = "npm-access-token"
name = "npm Access Token"
service = "npm"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
decode_transforms = { reverse_prefixes = ["npm_"], caesar_prefixes = ["npm_"] }
validators = [{ type = "crc32-base62", prefixes = ["npm_"], entropy_len = 30, checksum_len = 6, reject_overlong = false, confidence_floor = 0.9 }]
keywords = ["npm_"]

[[detector.patterns]]
regex = 'npm_[a-zA-Z0-9]{36}'
description = "npm automation or publish token (exactly 36 chars after npm_)"

[detector.verify]
method = "GET"
url = "https://registry.npmjs.org/-/whoami"
allowed_domains = ["registry.npmjs.org"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "username"
json_path = "$.username"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "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"
test_negative = "npm_short"
