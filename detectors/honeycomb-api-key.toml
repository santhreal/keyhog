# Docs: https://docs.honeycomb.io/send-data/opentelemetry/#using-the-honeycomb-opentelemetry-endpoint
# Format: hcai_ prefix followed by 22 alphanumeric characters
# Verify: no public verification endpoint
# Prefix: hcai_

[detector]
id = "honeycomb-api-key"
name = "Honeycomb API Key"
service = "honeycomb"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["hcai_", "honeycomb", "x-honeycomb-team"]

[[detector.patterns]]
regex = 'hcai_[a-zA-Z0-9]{22}'
description = "Honeycomb Ingest API Key (hcai_ prefix)"

[[detector.tests]]
test_positive = "hcai_AbCdEfGhIjKlMnOpQrStUv"
test_negative = "hcai_short"
