# Docs: https://www.developer.tech.gov.sg/products/categories/government/ndaas/overview.html
# Format: API key for Singapore Government Developer Portal services
# Verify: No public verification endpoint (requires government account)
# Prefix: none (requires context anchoring)

[detector]
id = "singapore-govtech-api-key"
name = "Singapore GovTech API Key"
service = "singapore-govtech"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["GOVTECH", "TECH.GOV.SG", "SG-API", "developer.tech.gov.sg"]

[[detector.patterns]]
regex = '''(?:GOVTECH|SG|singapore)[_.-]?(?:API[_\-\s]*KEY|api_key)[\s"''=:]+([a-zA-Z0-9]{32,64})'''
required_literals = ["GOVTECH", "SG", "SINGAPORE"]
description = "Singapore GovTech API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:developer\\.tech\\.gov\\.sg).{0,20}(?:key|token)[\\s\"''=:]+([a-zA-Z0-9]{32,64})"
description = "Singapore Developer Portal API key"
group = 1

[[detector.patterns]]
regex = "(?:SG-API|SG_API|sg-api)[\\s\"''=:]+([a-zA-Z0-9]{32,48})"
description = "Singapore Government API key"
group = 1

[[detector.tests]]
test_positive = "SINGAPORE_GOVTECH_API_KEY=PDsuJtQ1j69J6nI4deWgxnRlCTHmcYgbmcRfsLA4"
test_negative = "SINGAPORE_GOVTECH_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
