# Docs: https://docs.splunk.com/observability/en/incident-intelligence/victorops-resources.html
# Format: Splunk On-Call (formerly VictorOps) API key and ID pair
# Verify: GET /api-public/v1/user with X-VO-Api-Id and X-VO-Api-Key headers
# Prefix: none (requires context anchoring)

[detector]
id = "splunk-victorops-api-key"
name = "Splunk On-Call (VictorOps) API Key"
service = "splunk"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["VICTOROPS_API_ID", "VICTOROPS_API_KEY", "splunk_oncall"]

[[detector.patterns]]
regex = "(?:VICTOROPS_API_KEY|victorops.api.key)[=:\\s\"\\']+([a-f0-9]{40})"
description = "Splunk On-Call (VictorOps) API key with context anchor"
group = 1

[[detector.companions]]
name = "victorops_api_id"
regex = "(?:VICTOROPS_API_ID|victorops.api.id)[=:\\s\"\\']+([a-zA-Z0-9_-]+)"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.victorops.com/api-public/v1/user"
allowed_domains = ["api.victorops.com"]

[detector.verify.auth]
type = "header"
name = "X-VO-Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "VICTOROPS_API_KEY=5f6ecfe44ed06debf36ca32b776b8f61a60221a3"
test_negative = "VICTOROPS_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
