# Docs: https://upstash.com/docs/vector/sdks/ts/getting-started
# Format: UPSTASH_VECTOR_REST_URL (https://*.upstash.io) and UPSTASH_VECTOR_REST_TOKEN (alphanumeric)
# Verify: POST /query with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "upstash-vector-credentials"
name = "Upstash Vector Credentials"
service = "upstash"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["UPSTASH_VECTOR", "VECTOR_REST_URL", "VECTOR_REST_TOKEN"]

[[detector.patterns]]
regex = '''(?:UPSTASH_VECTOR_REST_URL|UPSTASH[_\-\s]*VECTOR[_\-\s]*URL)[=:\s"'']+(https://[a-zA-Z0-9_-]+\.upstash\.io)'''
description = "Upstash Vector REST URL with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:UPSTASH_VECTOR_REST_TOKEN|UPSTASH[_\-\s]*VECTOR[_\-\s]*TOKEN)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Upstash Vector REST token with context anchor"
group = 1

# NOTE: live verification disabled. The token-pattern match isn't a
# host, so `https://{{match}}/stats` produced a URL with the token
# as the host. kimi-wave3 §1.

[[detector.tests]]
test_positive = "UPSTASH_VECTOR-URL \"=      '   \"https://7QMxPzKNb_PISIu317ZHMjQ2K0nB-fQX5oMDl-7ppJfaag3Ml0jzB_yinrD1dgp7FpckOHJPQPGCIJ8DeL5AOtuYurbnUY9HytmP.upstash.io"
test_negative = "UPSTASH_VECTOR-URL \"=      '   \"YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
