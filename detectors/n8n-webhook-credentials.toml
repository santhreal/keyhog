# Docs: https://docs.n8n.io/integrations/builtin/core-nodes/n8n-nodes-base.webhook/
# Format: https://<instance>/webhook/<path>?<param>=<secret>
# Verify: POST to webhook with test payload
# Prefix: /webhook/

[detector]
id = "n8n-webhook-credentials"
name = "n8n Webhook Credentials"
service = "n8n"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["/webhook/", "n8n.io", "n8n.cloud"]

[[detector.patterns]]
regex = 'https?://[a-zA-Z0-9._-]+/webhook/[a-zA-Z0-9_-]+\?[a-zA-Z0-9_]+=[a-zA-Z0-9_-]+'
description = "n8n webhook URL with secret query parameter"

[[detector.tests]]
test_positive = "https://acme.app.n8n.cloud/webhook/8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d?token=8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
