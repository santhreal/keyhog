# Docs: https://docs.transpose.io/
# Format: 32 character hexadecimal string
# Verify: GET /endpoint with X-API-Key header, returns 200 if valid
# Prefix: none (32 char hex, requires context anchoring)

[detector]
id = "transpose-api-key"
name = "Transpose API Key"
service = "transpose"
severity = "high"
# "api_key", "apikey" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["transpose", "TRANSPOSE"]

[[detector.patterns]]
# Anchor must be the literal `TRANSPOSE` token optionally followed by a
# key-ish suffix (API_KEY / KEY / TOKEN / SECRET), NOT an arbitrary word
# continuation. The old `[_a-zA-Z0-9]*` let any identifier *starting* with
# "transpose" (e.g. `transposeMatrixChecksum=<32hex>`) anchor a generic
# 32-hex hash/digest, producing false positives on unrelated code.
regex = "(?:TRANSPOSE|transpose)(?:[_\\-\\.]?(?:API[_\\-\\.]?KEY|api[_\\-\\.]?key|KEY|key|TOKEN|token|SECRET|secret))?[=:\\s\"'']+([a-f0-9]{32})"
description = "Transpose API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "TRANSPOSE=cdce91dd51dd450d5b00d6009adc6429"
test_negative = "TRANSPOSE=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
