# Docs: https://docs.confluent.io/platform/current/security/authentication/http-basic-auth/overview.html
# Format: Basic HTTP authentication with username:password in JAAS config or properties file
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "kafka-connect-credentials"
name = "Apache Kafka Connect Credentials"
service = "kafka-connect"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["connect.password", "KafkaConnect", "kafka.rest", "kafka.connect"]

[[detector.patterns]]
regex = "(?i)(?:KAFKA_CONNECT_|CONNECT_)(?:AUTH|PASSWORD|SECRET)\\s*[=:]\\s*[\"']?([^\\s\"']{12,})[\"']?"
description = "Kafka Connect password with environment variable context"
group = 1

[[detector.patterns]]
regex = "kafka\\.rest\\.authentication\\.password\\s*=\\s*[\"'']?([^\"'']{8,})[\"'']?"
description = "Kafka REST authentication password"
group = 1

[[detector.patterns]]
regex = "(?i)connect\\.password\\s*=\\s*[\"'']?([^\\s\"'']{12,})[\"'']?"
description = "Kafka Connect properties password"
group = 1

[[detector.patterns]]
regex = "(?i)sasl\\.jaas\\.config.*password\\s*=\\s*\"([^\"]{10,})\""
description = "SASL JAAS config password for Kafka Connect with context"
group = 1

[[detector.tests]]
test_positive = "CONNECT_PASSWORD=\"KafkaConnectPass123\""
test_negative = "connect.password=short"
