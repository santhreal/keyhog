# Docs: https://discord.com/developers/docs
# Format: Base64-encoded JWT-like format with three parts separated by dots
# Verify: WebSocket authentication to Discord Gateway
# Prefix: none (starts with base64 encoded values like MTA, MTE, etc)

[detector]
id = "discord-bot-token"
name = "Discord Bot Token"
service = "discord"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# `discord` routes the loose non-[MN] pattern (which now requires the
# literal in-window); the MT*/Mj*/ND*/NT* b64 snowflake prefixes route
# the strict [MN] production form.
keywords = ["discord", "DISCORD", "MTA", "MTE", "MTI", "MTM", "MTQ", "MTU", "MTY", "MTc", "MTg", "MTk", "MjA", "MjE", "MjI", "MjM", "MjQ", "NDA", "NDE", "NDI", "NDM", "NDQ", "NDU", "NDY", "NDc", "NDg", "NDk", "NTA", "NTE", "NTI", "NTM", "NTQ", "NTU", "NTY", "NTc", "NTg", "NTk", "NjA", "NjE", "NjI", "NjM", "NjQ", "NjU", "NjY", "Njc", "Njg", "Njk", "NzA", "NzE", "NzI", "NzM", "NzQ", "NzU", "NzY", "Nzc", "Nzg", "Nzk", "ODA", "ODE", "ODI", "ODM", "ODQ", "ODU", "ODY", "ODc", "ODg", "ODk", "OTA", "OTE", "OTI", "OTM", "OTQ", "OTU", "OTY", "OTc", "OTg", "OTk"]


[[detector.patterns]]
# Strict shape: real Discord production bot tokens have b64-encoded
# snowflake user_ids that start with [MN]. Kept as the primary high-
# confidence pattern so live tokens carry the named-detector floor.
regex = '(?:MTA|MTE|MTI|MTM|MTQ|MTU|MTY|MTc|MTg|MTk|MjA|MjE|MjI|MjM|MjQ|MjU|MjY|Mjc|Mjg|Mjk|MzA|MzE|MzI|MzM|MzQ|MzU|MzY|Mzc|Mzg|Mzk|NDA|NDE|NDI|NDM|NDQ|NDU|NDY|NDc|NDg|NDk|NTA|NTE|NTI|NTM|NTQ|NTU|NTY|NTc|NTg|NTk|NjA|NjE|NjI|NjM|NjQ|NjU|NjY|Njc|Njg|Njk)[A-Za-z0-9_-]{20,25}\.[A-Za-z0-9_-]{6,8}\.[A-Za-z0-9_-]{27,38}'
description = "Discord bot token (production base64 snowflake form, 10-69 prefix)"

[[detector.patterns]]
regex = '(?:NzA|NzE|NzI|NzM|NzQ|NzU|NzY|Nzc|Nzg|Nzk|ODA|ODE|ODI|ODM|ODQ|ODU|ODY|ODc|ODg|ODk|OTA|OTE|OTI|OTM|OTQ|OTU|OTY|OTc|OTg|OTk)[A-Za-z0-9_-]{20,25}\.[A-Za-z0-9_-]{6,8}\.[A-Za-z0-9_-]{27,38}'
description = "Discord bot token (production base64 snowflake form, 70-99 prefix)"

[[detector.patterns]]
# Loose shape: the SecretBench mirror generates synthetic tokens whose
# first segment starts with arbitrary base64url chars (K, 0, x, U, y,
# 8, etc.), not just [MN]. Those FNs share the same `<23-28>.<6-8>.<27-38>`
# 3-dot shape and miss the strict regex. The bare 3-dot shape on its own
# matches huge swaths of dotted base64 (JWTs, hashes, build IDs) and was
# the named-detector FP driver, so a `discord` literal must be CONSUMED
# within a bounded window before the token (the regex crate has no
# lookaround, so the literal is part of the match). The [MN] form is
# already covered by the strict pattern above without a keyword.
regex = '''(?i)discord[A-Za-z0-9_."' :=-]{0,40}?([A-Za-z0-9_-]{23,28}\.[A-Za-z0-9_-]{6,8}\.[A-Za-z0-9_-]{27,38})'''
description = "Discord bot token (synthetic/non-[MN] shape, requires in-window discord literal)"
group = 1

[[detector.tests]]
test_positive = "DISCORD_BOT_TOKEN=MTAxK3p7QxR4mN9sBv2Ta5Yc.Gd7Wx2A.Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
test_negative = "MTAabc.Vk9.Kp4"
