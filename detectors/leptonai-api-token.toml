# Docs: https://www.lepton.ai/docs/welcome/what_is_lepton
# Format: Lepton workspace token or LEPTONAI_API_KEY
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "leptonai-api-token"
name = "Lepton AI API Token"
service = "leptonai"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["LEPTONAI_API_KEY", "LEPTON_WORKSPACE_TOKEN", "lepton.ai", "lepton.run"]

[[detector.patterns]]
regex = "(?:LEPTONAI_API_KEY|LEPTON_WORKSPACE_TOKEN)[=:\\s\"\\']+([a-zA-Z0-9_-]{20,})"
description = "Lepton AI API token from environment variable"
group = 1

[[detector.patterns]]
regex = '''(?:lepton\.(?:ai|run).{0,120}\btoken|\btoken.{0,120}lepton\.(?:ai|run)|LEPTON(?:AI)?[_\-\s]*(?:API[_\-\s]*)?TOKEN)[=:\s"\']+([a-zA-Z0-9_-]{20,})'''
description = "Lepton token with Lepton-specific domain or variable context"
group = 1

[[detector.tests]]
test_positive = "LEPTONAI_API_KEY=7wh1PSp4KeB8aF3mmkib"
test_negative = "LEPTONAI_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
