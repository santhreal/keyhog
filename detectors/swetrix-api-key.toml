# Docs: https://swetrix.com/docs/statistics-api
# Format: 32-character hexadecimal string
# Verify: GET /v1/log with X-Api-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "swetrix-api-key"
name = "Swetrix API Key"
service = "swetrix"
severity = "medium"
keywords = ["SWETRIX_API_KEY", "swetrix"]

[[detector.patterns]]
regex = "(?:SWETRIX[_\\-\\s]?API[_\\-\\s]?KEY|swetrix[_\\-\\s]?api[_\\-\\s]?key)[=:\\s\"'']+([a-f0-9]{32})"
description = "Swetrix API key - 32 hex characters with context anchor"
group = 1

# Split from a single alternation `X-Api-Key(cap1).*swetrix|swetrix.*X-Api-Key(cap2)`
# into two patterns. In that alternation the 32-hex value was capture group 1 in
# the first branch but group 2 in the second, so when the SECOND branch matched
# (swetrix before the header) group 1 never participated and the extractor fell
# back to the whole match, a garbage credential (swetrix…X-Api-Key…<key>) that
# then failed the checksum/entropy checks and silently dropped a real key. Each
# pattern below carries a single group=1 that always participates.
[[detector.patterns]]
regex = "X-Api-Key[=:\\s\"'']+([a-f0-9]{32}).*swetrix"
description = "Swetrix API call: X-Api-Key header followed by swetrix context"
group = 1

[[detector.patterns]]
regex = "swetrix.*X-Api-Key[=:\\s\"'']+([a-f0-9]{32})"
description = "Swetrix API call: swetrix context followed by X-Api-Key header"
group = 1

[[detector.tests]]
test_positive = "X-Api-Key       \"' =  \"\"=  =  b539e4ae802deaca3a83216dd1580f3e xxq<N5%VSp  Cu(#u[ZjLB1Z,[#7TE1Fd+%Npf4-+@@*?\"865 g-swetrix"
test_negative = "X-Api-Key       \"' =  \"\"=  =  YOUR_API_KEY_HERE_PLACEHOLDER_VALUE xxq<N5%VSp  Cu(#u[ZjLB1Z,[#7TE1Fd+%Npf4-+@@*?\"865 g-swetrix"
