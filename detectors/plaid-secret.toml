# Docs: https://plaid.com/docs/api/
# Format: 30-40 character hexadecimal string (sandbox/development/production secrets)
# Verify: POST /sandbox/item/public_token/exchange returns 200
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "plaid-secret"
name = "Plaid Secret"
service = "plaid"
severity = "critical"
keywords = ["PLAID_SECRET", "plaid_secret", "PLAID-SECRET", "plaid"]

[[detector.patterns]]
regex = "(?:PLAID|plaid)[._-]?(?:SECRET|secret)[=:\\s\"']+([a-f0-9]{30,40})"
description = "Plaid API secret (sandbox/development/production) with context anchor"
group = 1

[[detector.companions]]
name = "client_id"
regex = "(?:PLAID|plaid)[._-]?(?:CLIENT|client)?[._-]?(?:ID|id)?[=:\\s\"']+([a-f0-9]{24})"
within_lines = 5
[detector.verify]
method = "POST"
url = "https://sandbox.plaid.com/item/public_token/exchange"
allowed_domains = ["sandbox.plaid.com"]

[detector.verify.auth]
type = "header"
name = "PLAID-SECRET"
template = "{{match}}"

[detector.verify.success]
status = 400

[[detector.tests]]
test_positive = "PLAID_SECRET=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "PLAID_SECRET=tooshort"
