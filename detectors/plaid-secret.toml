# Docs: https://plaid.com/docs/api/
# Format: 30-40 character hexadecimal string (sandbox/development/production secrets)
# Verify: POST /sandbox/item/public_token/exchange returns 200
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "plaid-secret"
name = "Plaid Secret"
service = "plaid"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["PLAID_SECRET", "plaid_secret", "PLAID-SECRET", "plaid"]

[[detector.patterns]]
regex = "(?:PLAID|plaid)[._-]?(?:SECRET|secret)[=:\\s\"']+([a-f0-9]{30,40})"
description = "Plaid API secret (sandbox/development/production) with context anchor"
group = 1

[[detector.companions]]
name = "client_id"
regex = "(?:PLAID|plaid)[._-]?(?:CLIENT|client)?[._-]?(?:ID|id)?[=:\\s\"']+([a-f0-9]{24})"
within_lines = 5
[detector.verify]
method = "POST"
url = "https://sandbox.plaid.com/item/public_token/exchange"
allowed_domains = ["sandbox.plaid.com"]

[detector.verify.auth]
type = "header"
name = "PLAID-SECRET"
template = "{{match}}"

[detector.verify.success]
status = 400

[[detector.tests]]
test_positive = "PLAID_SECRET=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "PLAID_SECRET=tooshort"
