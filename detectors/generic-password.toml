# Generic password detector for config files, docker-compose, and env vars.
# No lookaheads - Rust regex doesn't support them.
# Verify: no verification endpoint (generic detector, service unknown)

[detector]
id = "generic-password"
name = "Generic Password"
service = "generic"
severity = "medium"
keywords = ["password", "passwd", "pwd", "PASSWORD", "REDIS_PASSWORD", "DB_PASSWORD", "MYSQL_PASSWORD", "secret", "token", "api_key", "apikey", "access_key", "client_secret"]
entropy_high = 4.5
entropy_low = 3.0
entropy_very_high = 5.8
mixed_alnum_floor = 4.0
# Human-chosen passwords may intentionally be word-like, so this policy skips
# BPE language-compressibility rejection without invoking the tokenizer.
bpe_enabled = false
keyword_free_min_len = 20
stopwords = ["example", "sample", "test", "dummy", "placeholder", "changeme", "xxxxxxxx", "your_key_here", "000000"]

# Low-entropy floor for this detector, owned HERE (was rules/entropy-floors.toml).
# Human-set passwords are legitimately low-entropy, so this floor is permissive.
entropy_floor = [{ floor = 2.5 }]

[[detector.patterns]]
# PASSWORD=value (12+ chars, alphanumeric + special)
regex = "(?i)(?:_?password|_?passwd|_?pwd)\\s*[:=]\\s*[\"']?([a-zA-Z0-9!@#$%^&*+=/_-]{12,80})[\"']?"
description = "Password assignment with complex value"
group = 1

[[detector.patterns]]
# Inline connection string password: ://user:PASSWORD@host
regex = "://[^:\"'\\s]+:([a-zA-Z0-9!@#$%^&*+=_-]{8,64})@[a-zA-Z0-9._-]"
description = "Password in connection string URL"
group = 1

[[detector.patterns]]
# YAML multiline: password: |\n  VALUE or password: >\n  VALUE
regex = "(?i)(?:password|passwd|secret):\\s*[|>]\\s*\\n\\s+([a-zA-Z0-9/+=_-]{12,80})"
description = "Password in YAML multiline block (| or >)"
group = 1

[[detector.patterns]]
# XML attribute: password="VALUE"
regex = "(?i)(?:password|passwd|secret|token)\\s*=\\s*\"([a-zA-Z0-9/+=_-]{12,80})\""
description = "Password in XML/HTML attribute"
group = 1

[[detector.patterns]]
# JSON object field: "secret": "VALUE" / "token":"VALUE" / "api_key":"VALUE".
# The key is quote-wrapped and followed by a colon, so the XML/`=` pattern
# above (which needs a bare key + `=`) never matched it. This is the most
# common credential-exfil envelope after .env: a secret dropped into a JSON
# field strips every service-specific anchor, so the adversarial `json`
# wrapper class wraps EVERY contract credential as {"secret":"<cred>"}. The
# quoted-key + 12-80 char value keeps this anchored to genuine secret fields.
regex = "(?i)\"(?:password|passwd|secret|token|api[_-]?key|access[_-]?key|client[_-]?secret)\"\\s*:\\s*\"([a-zA-Z0-9/+=_.!@#$%^&*-]{12,80})\""
description = "Secret/token value in a JSON object field"
group = 1

# No verify block - generic detector matches many services, no single verification endpoint
