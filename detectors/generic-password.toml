# Generic password detector for config files, docker-compose, and env vars.
# No lookaheads - Rust regex doesn't support them.
# Verify: no verification endpoint (generic detector, service unknown)

[detector]
id = "generic-password"
name = "Generic Password"
service = "generic"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "authoritative", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, low_promise_confidence = 0.10, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
kind = "phase2-generic"
# Password-family ownership only. Generic API-key, token, secret, access-key,
# and client-secret assignments are owned by their phase-2 generic detector
# TOMLs; claiming them here made backend-specific trigger supersets relabel an
# `apiKey` finding as `generic-password`.
keywords = ["password", "passwd", "pwd", "PASSWORD", "REDIS_PASSWORD", "DB_PASSWORD", "MYSQL_PASSWORD"]
entropy_high = 4.5
entropy_low = 3.0
entropy_very_high = 5.8
# Map this detector's entropy evidence to report confidence without scanner defaults.
entropy_fallback_confidence = { low_entropy_max = 0.55, high_entropy = 0.65, very_high_entropy = 0.75, keyword_lift = 0.1, max_confidence = 0.9 }
sensitive_path_entropy_very_high = 5.8
plausibility = { mixed_alnum_floor = 4.0, symbolic_entropy_floor = 3.5, second_half_entropy_floor = 2.5, second_half_min_len = 17, unique_chars_min_len = 17, min_unique_chars = 8, unanchored_hex_max_len = 10, identical_char_max_len = 4, structured_dotted_min_len = 40, mixed_alnum_min_len = 20, isolated_mixed_entropy_floor = 3.65, isolated_symbolic_min_len = 18, isolated_symbolic_min_symbols = 2, isolated_symbolic_requires_non_underscore = true, isolated_alpha_only_min_symbols = 3, isolated_alpha_only_min_alpha_ratio = 0.5, min_alnum_ratio = 0.5, source_type_name_max_len = 40, source_type_name_min_uppercase = 2, url_path_high_entropy_min_len = 41, isolated_colon_left_min_len = 20, isolated_colon_right_min_len = 16, leading_slash_base64_entropy_floor = 4.8, leading_slash_base64_min_len = 40, reject_repeated_blocks = true, allow_alphabetic_credential = true, reject_program_identifiers = true, reject_source_symbol_identifiers = true, reject_dash_segmented_alnum = true }
# Password policy outranks the broader keyword bridge for shared anchors. This
# precedence is detector data, not detector-ID or loader-order behavior.
entropy_policy_priority = 100
# Human-chosen passwords may intentionally be word-like, so this policy skips
# BPE language-compressibility rejection without invoking the tokenizer.
bpe_enabled = false
# An explicit password-assignment regex is positive evidence, but its normalized
# heuristic score is 0.389 for the 20-byte mixed token contract. Own the 0.35
# reporting floor here so ML refinement cannot erase that anchored match.
min_confidence = 0.35
min_len = 8
# Password/passphrase assignments above this bound are payloads rather than one
# credential. The runtime rejects the whole value and never truncates it.
max_len = 256
keyword_free_min_len = 20
stopwords = ["example", "sample", "test", "dummy", "placeholder", "changeme", "xxxxxxxx", "your_key_here", "000000"]

# Low-entropy floor for this detector, owned HERE (was rules/entropy-floors.toml).
# Human-set passwords are legitimately low-entropy, so this floor is permissive.
entropy_floor = [{ floor = 2.5 }]

[[detector.entropy_shapes]]
charset = "lower-alnum"
entropy_floor = 3.9
special_min_length = 16
grouping = { group_count = 4, group_length = 4, separator = "-" }
require_non_hex_alpha = true
require_group_alpha_digit = true

[detector.generic_assignment_confidence]
ordinary_base = 0.60
test_base = 0.25
documentation_base = 0.30
comment_base = 0.30
scanned_comment_base = 0.60
entropy_reference = 3.5
entropy_gain_per_bit = 0.10
entropy_lift_max = 0.25
length_reference = 16
length_gain_per_byte = 0.005
length_lift_max = 0.15
max_confidence = 0.95

[detector.entropy_fallback]
class = "password"
id = "entropy-password"
name = "Password (Entropy Detected)"
service = "generic"

[[detector.patterns]]
# PASSWORD=value (12+ chars, alphanumeric + special)
regex = "(?i)(?:_?password|_?passwd|_?pwd)\\s*[:=]\\s*[\"']?([a-zA-Z0-9!@#$%^&*+=/_-]{12,80})[\"']?"
description = "Password assignment with complex value"
group = 1

[[detector.patterns]]
# Inline connection string password: ://user:PASSWORD@host
regex = "://[^:\"'\\s]+:([a-zA-Z0-9!@#$%^&*+=_-]{8,64})@[a-zA-Z0-9._-]"
description = "Password in connection string URL"
group = 1

[[detector.patterns]]
# YAML multiline: password: |\n  VALUE or password: >\n  VALUE
regex = "(?i)(?:password|passwd|pwd):\\s*[|>]\\s*\\n\\s+([a-zA-Z0-9/+=_-]{12,80})"
description = "Password in YAML multiline block (| or >)"
group = 1

[[detector.patterns]]
# XML attribute: password="VALUE"
regex = "(?i)(?:password|passwd|pwd)\\s*=\\s*\"([a-zA-Z0-9/+=_-]{12,80})\""
description = "Password in XML/HTML attribute"
group = 1

[[detector.patterns]]
# JSON object password field.
# The key is quote-wrapped and followed by a colon, so the XML/`=` pattern
# above (which needs a bare key + `=`) never matched it. This is the most
# common credential-exfil envelope after .env: a secret dropped into a JSON
# field strips every service-specific anchor. Secret/token/API-key JSON fields
# flow through their own phase-2 generic detector owners instead of being
# mislabeled as passwords.
regex = "(?i)\"(?:password|passwd|pwd)\"\\s*:\\s*\"([a-zA-Z0-9/+=_.!@#$%^&*-]{12,80})\""
description = "Password value in a JSON object field"
group = 1

# No verify block - generic detector matches many services, no single verification endpoint

[[detector.tests]]
test_positive = "password=S4oxj2N-bVEi6ivQsrW3"
test_negative = "password=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
