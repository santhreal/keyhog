# Docs: https://www.mathworks.com/help/thingspeak/rest-api.html
# Format: 16-character alphanumeric Write or Read API Key
# Verify: GET /channels/CHANNEL_ID/feeds.json?api_key=KEY returns data
# Prefix: none (requires context anchoring)

[detector]
id = "thingspeak-api-key"
name = "ThingSpeak API Key"
service = "thingspeak"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["thingspeak", "write_api_key", "read_api_key"]

[[detector.patterns]]
regex = '''(?:thingspeak|THINGSPEAK)[._-]?(?:WRITE[_\-\s]*API[_\-\s]*KEY|write[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9]{16})'''
description = "ThingSpeak channel write API key"
group = 1

[[detector.patterns]]
regex = '''(?:thingspeak|THINGSPEAK)[._-]?(?:READ[_\-\s]*API[_\-\s]*KEY|read[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9]{16})'''
description = "ThingSpeak channel read API key"
group = 1

[[detector.patterns]]
regex = '''(?:thingspeak|THINGSPEAK)[._-]?(?:API[_\-\s]*KEY|api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9]{16})'''
description = "ThingSpeak API key"
group = 1

[[detector.tests]]
test_positive = "THINGSPEAKwrite-apikey   \"     =\"\"' ' =='= \":  = \"' \"= :: ===      \"   wEEelk6NGtXzvcTN"
test_negative = "THINGSPEAKwrite-apikey   \"     =\"\"' ' =='= \":  = \"' \"= :: ===      \"   YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
