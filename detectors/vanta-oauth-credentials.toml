# Docs: https://developer.vanta.com/docs/api-access-setup
# Format: client_id starts with vci_ prefix, client_secret starts with vcs_ prefix
# Verify: POST /oauth/token with client credentials to get access token
# Prefix: vci- (client_id), vcs- (client_secret)

[detector]
id = "vanta-oauth-credentials"
name = "Vanta OAuth Credentials"
service = "vanta"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["vci_", "vcs_", "VANTA_CLIENT_ID", "VANTA_CLIENT_SECRET", "vanta.com"]

[[detector.patterns]]
regex = 'vci_[a-f0-9]{40,}'
description = "Vanta OAuth client ID (vci_ prefix)"

[[detector.companions]]
name = "vanta_client_secret"
regex = 'vcs_[a-f0-9]{40,}'
within_lines = 5

[[detector.tests]]
test_positive = "vci_4ad725523884fe575df3b2df31a8ebcf68656a67e22c3d92f2255"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
