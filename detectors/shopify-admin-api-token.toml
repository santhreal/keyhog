# Docs: https://shopify.dev/docs/apps/build/authentication-authorization/access-tokens
# Format: Prefix shpat_ followed by 32 hexadecimal characters
# Verify: API call to {{shop}}.myshopify.com/admin/api/{version}/shop.json
# Prefix: shpat_

[detector]
id = "shopify-admin-api-token"
name = "Shopify Admin API Token"
service = "shopify"
severity = "critical"
# "admin" removed: over-broad generic prefilter the regex does NOT need — every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["shpat_", "shopify"]

[[detector.patterns]]
regex = 'shpat_[a-f0-9]{32}'
description = "Shopify admin API access token"

# NOTE: live verification disabled. `{{shop}}` was undefined. kimi-wave3 §1.

[[detector.tests]]
test_positive = "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"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
