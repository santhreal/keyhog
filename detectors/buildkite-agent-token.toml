# Docs: https://buildkite.com/docs/agent/v3/tokens
# Format: 40 character alphanumeric string (agent registration token)
# Verify: GET /v2/access-token with Bearer token
# Prefix: none (generic alphanumeric, requires keyword context)

[detector]
id = "buildkite-agent-token"
name = "Buildkite Agent Token"
service = "buildkite"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["buildkite", "BUILDKITE", "agent_token", "agent token"]

[[detector.patterns]]
regex = "(?:buildkite|BUILDKITE)[_\\s]?(?:agent_token|AGENT_TOKEN|token)[=:\\s\"']+([a-zA-Z0-9]{40})"
description = "Buildkite agent registration token with context anchor"
group = 1

[[detector.patterns]]
regex = "BUILDKITE_AGENT_TOKEN[=:\\s\"']+([a-zA-Z0-9]{40})"
description = "Buildkite agent token from environment variable"
group = 1

[detector.verify]
method = "GET"
url = "https://api.buildkite.com/v2/access-token"
allowed_domains = ["api.buildkite.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "BUILDKITE_AGENT_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "BUILDKITE_AGENT_TOKEN=Kp4Qx7Rm"
