# Docs: https://docs.datadoghq.com/account_management/api-app-keys/
# Format: 32 character hex string
# Verify: GET /api/v1/validate with DD-API-Key header
# Prefix: none (32 char hex, requires context anchoring)

[detector]
id = "datadog-api-key"
name = "Datadog API Key"
service = "datadog"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
min_confidence = 0.2
keywords = ["DD-API-Key", "DD_API_KEY", "DATADOG_API_KEY", "datadog_api_key"]
# The explicit `DD_API_KEY` / `DATADOG_API_KEY` assignment is a service-owned
# credential slot. Treat it as a strong named anchor so a legitimate 32-hex key
# is not demoted to an anonymous entropy finding or lost at a chunk seam.
weak_anchor = false

[[detector.patterns]]
regex = "(?i)(?:DD_API_KEY|DD-API-KEY|DATADOG_API_KEY)[=:\\s\"']+([a-f0-9]{32})(?:[^a-f0-9]|$)"
description = "Datadog API key in a documented environment or header slot"
group = 1

[detector.verify]
method = "GET"
url = "https://api.datadoghq.com/api/v1/validate"
allowed_domains = ["api.datadoghq.com"]

[detector.verify.auth]
type = "header"
name = "DD-API-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "DD_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "DD_API_KEY=short"
