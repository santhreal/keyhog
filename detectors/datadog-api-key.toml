# Docs: https://docs.datadoghq.com/account_management/api-app-keys/
# Format: 32 character hex string
# Verify: GET /api/v1/validate with DD-API-Key header
# Prefix: none (32 char hex, requires context anchoring)

[detector]
id = "datadog-api-key"
name = "Datadog API Key"
service = "datadog"
severity = "critical"
min_confidence = 0.2
keywords = ["DD-API-Key", "DD_API_KEY", "DATADOG_API_KEY", "datadog_api_key"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED for it (per-detector, DetectorSpec::weak_anchor;
# was rules/detector-classification.toml weak_anchor list).
weak_anchor = true

[[detector.patterns]]
regex = "(?:DD.API.KEY|DATADOG.API.KEY|datadog.api.key)[=:\\s\"']+([a-f0-9]{32})"
description = "Datadog API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.datadoghq.com/api/v1/validate"

[detector.verify.auth]
type = "header"
name = "DD-API-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "DD_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "DD_API_KEY=short"
