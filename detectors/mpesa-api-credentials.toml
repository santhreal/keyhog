# Docs: https://developer.safaricom.co.ke/
# Format: Consumer Key and Consumer Secret pair for OAuth2 authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "mpesa-api-credentials"
name = "M-Pesa API Credentials"
service = "mpesa"
severity = "critical"
keywords = ["MPESA", "mpesa", "MPESA_CONSUMER_KEY", "MPESA_CONSUMER_SECRET", "Safaricom"]

[[detector.patterns]]
regex = "(?i)m[_.-]?pesa[_.-]?(?:consumer[_.-]?key|api[_.-]?key)[=:\\s\"']+([a-zA-Z0-9]{24,})"
description = "M-Pesa Consumer Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)m[_.-]?pesa[_.-]?(?:consumer[_.-]?secret|api[_.-]?secret)[=:\\s\"']+([a-zA-Z0-9]{24,})"
description = "M-Pesa Consumer Secret with context anchor"
group = 1

[[detector.companions]]
name = "M-Pesa consumer key"
regex = "(?i)m[_.-]?pesa[_.-]?consumer[_.-]?key[=:\\s\"']+([a-zA-Z0-9]{24,})"
within_lines = 5
