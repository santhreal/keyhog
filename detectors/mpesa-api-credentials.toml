# Docs: https://developer.safaricom.co.ke/
# Format: Consumer Key and Consumer Secret pair for OAuth2 authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "mpesa-api-credentials"
name = "M-Pesa API Credentials"
service = "mpesa"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["MPESA", "mpesa", "MPESA_CONSUMER_KEY", "MPESA_CONSUMER_SECRET", "Safaricom"]

[[detector.patterns]]
regex = "(?i)m[_.-]?pesa[_.-]?api[_.-]?key[=:\\s\"']+([a-zA-Z0-9]{24,})(?:[^a-zA-Z0-9_-]|$)"
description = "M-Pesa API Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)m[_.-]?pesa[_.-]?(?:consumer|api)[_.-]?secret[=:\\s\"']+([a-zA-Z0-9]{24,})(?:[^a-zA-Z0-9_-]|$)"
description = "M-Pesa Consumer Secret with context anchor"
group = 1

[[detector.companions]]
name = "M-Pesa consumer key"
regex = "(?i)m[_.-]?pesa[_.-]?consumer[_.-]?key[=:\\s\"']+([a-zA-Z0-9]{24,})(?:[^a-zA-Z0-9_-]|$)"
within_lines = 5

[[detector.tests]]
test_positive = "MPESA_CONSUMER_SECRET=40lryYegedHSfXuz872RgvPu"
test_negative = "MPESA_CONSUMER_SECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
