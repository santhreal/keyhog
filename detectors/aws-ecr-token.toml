# Docs: https://docs.aws.amazon.com/AmazonECR/latest/userguide/registry_auth.html
# Format: Base64-encoded authorization token valid for 12 hours, or docker login password
# Verify: none (safe verification requires the target registry/account/region and cannot be done with a generic HTTP bearer probe)
# Prefix: none (requires context anchoring)

[detector]
id = "aws-ecr-token"
name = "AWS ECR Authorization Token"
service = "aws-ecr"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["AWS_ECR", "ecr.amazonaws.com", "get-login-password", "ECR_PASSWORD", "amazonaws"]

[[detector.patterns]]
regex = "\\b(?:AWS_ECR|ECR|ecr)[\\w_]*(?:PASSWORD|TOKEN|auth)[=:\\s\"'']+([A-Za-z0-9+/=]{90,})"
description = "AWS ECR authorization token (base64 encoded) with context anchor"
group = 1

[[detector.patterns]]
# Bounded the `.*?` between the ECR registry URL and the password
# field to 128 non-newline chars. Real ECR docker-config / Helm value
# files keep the URL and credential within a few lines of each other.
# The captured token keeps the unbounded `{50,}` because tightening
# to `{50,N}` on a 64-char alphabet explodes the Hyperscan DFA
# beyond its 1 MiB-per-pattern budget; the URL anchor + 128-char
# bridge already prevent unbounded matching of the regex AS A WHOLE.
# kimi-4 audit; contracts_runner caught the DFA regression.
regex = "(?:\\.dkr\\.ecr\\.[a-z0-9-]+\\.amazonaws\\.com)[^\\n]{0,128}(?:password|token)[=:\\s\"'']+([A-Za-z0-9+/=]{50,})"
description = "AWS ECR token associated with ECR registry URL"
group = 1

[[detector.patterns]]
# Bounded the two `.*?` segments to 128 non-newline chars each. The
# `aws ecr get-login-password | docker login --password-stdin` idiom
# is always one shell line in practice; the bound stops the regex
# spanning unrelated shell commands in a Makefile/script. kimi-4
# audit.
regex = "aws ecr get-login-password[^\\n]{0,128}\\|\\s*docker login[^\\n]{0,128}--password-stdin"
description = "AWS ECR login command pattern indicating token usage"

[[detector.tests]]
test_positive = "AWS_ECR_PASSWORD=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "ECR_PASSWORD=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
