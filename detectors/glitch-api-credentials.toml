# Docs: https://help.glitch.com/hc/en-us/articles/16287495688717-Project-Tokens
# Format: Glitch project tokens with no unique prefix, typically 32-64 hex characters
# Verify: GET /v1/projects with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "glitch-api-credentials"
name = "Glitch API Credentials"
service = "glitch"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["GLITCH", "glitch", "glitch_token", "GLITCH_TOKEN"]

[[detector.patterns]]
regex = "(?:GLITCH|glitch)[_\\s]*(TOKEN|API|KEY)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Glitch API credential with context anchor"
group = 2

[[detector.patterns]]
regex = "glitch-[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
description = "Glitch UUID-style token"

[[detector.tests]]
test_positive = "glitch-408bfcb0-e673-98bb-2ad8-83dbfdc12d2c"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
