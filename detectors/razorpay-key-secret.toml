# Docs: https://razorpay.com/docs/api/
# Format: 20-40 alphanumeric characters (no distinctive prefix - REQUIRES context)
# Verify: Basic auth with Key ID and Key Secret to GET /v1/orders
# Prefix: none (requires companion Key ID or context anchor)

[detector]
id = "razorpay-key-secret"
name = "Razorpay Key Secret"
service = "razorpay"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["RAZORPAY_KEY_SECRET", "razorpay_key_secret", "RAZORPAY_SECRET", "razorpay_secret"]

[[detector.patterns]]
regex = "(?i)razorpay[_.-]?(?:key[_.-]?)?secret[=:\\s\"']+([a-zA-Z0-9]{20,40})"
description = "Razorpay Key Secret with context anchor (companion to Key ID)"
group = 1

# Razorpay Key ID companion: `rzp_(test|live)_<14 alphanumeric>`, used as
# the basic-auth username paired with the secret as password. Without
# this companion, the previous `username = "companion"` resolved to the
# literal string "companion" via resolve_field fallthrough - every probe
# 401'd.
[[detector.companions]]
name = "razorpay_key_id"
regex = "rzp_(?:test|live)_[A-Za-z0-9]{14}"
within_lines = 5
required = true

[detector.verify]
method = "GET"
url = "https://api.razorpay.com/v1/orders"
allowed_domains = ["api.razorpay.com"]

[detector.verify.auth]
type = "basic"
username = "companion.razorpay_key_id"
password = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "RAZORPAY_KEY_ID=rzp_test_Kp4Qx7Rm2Sn5Tb\nRAZORPAY_KEY_SECRET=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3"
test_negative = "RAZORPAY_KEY_ID=rzp_test_Kp4Qx7Rm2Sn5Tb\nRAZORPAY_KEY_SECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
