# Docs: https://docs.replit.com/replit-cloud-services/cloud-api
# Format: Replit token with replit_token_ prefix or Replit connect tokens
# Verify: no public verification endpoint
# Prefix: replit_

[detector]
id = "replit-api-token"
name = "Replit API Token"
service = "replit"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["replit_token", "REPLIT_TOKEN", "replit_api", "REPLIT_API"]

[[detector.patterns]]
regex = "(?:REPLIT_TOKEN|replit_token|REPLIT_API|replit_api)[=:\\s\"'']+([a-zA-Z0-9_-]{30,})"
description = "Replit API token with context anchor"
group = 1

[[detector.patterns]]
regex = "replit_token_[a-zA-Z0-9_-]{30,}"
description = "Replit token with replit_token_ prefix"

[[detector.tests]]
test_positive = "REPLIT_TOKEN=9qtUzgH7dMqUlSTEoivR8-oPFmpLxB"
test_negative = "REPLIT_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
