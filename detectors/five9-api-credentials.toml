# Docs: https://documentation.five9.com/
# Format: Five9 uses username/password with API key or OAuth client credentials
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "five9-api-credentials"
name = "Five9 API Credentials"
service = "five9"
severity = "critical"
keywords = ["five9", "FIVE9", "Five9", "five9_api"]

[[detector.patterns]]
# Real env-var shapes use separators between tokens
# (`five9_api_key=`, `FIVE9_CLIENT_SECRET=`). The compact
# `five9apikey=` form is rare in real codebases.
regex = "(?i)five9[._\\s-]*(?:api[._\\s-]*key|client[._\\s-]*secret|api[._\\s-]*secret|secret|token|key|password)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Five9 API credential with context anchor"
group = 1

[[detector.companions]]
name = "five9_api_secret"
regex = "(?i)five9[._\\s-]*api[._\\s-]*secret[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
within_lines = 5

[[detector.tests]]
test_positive = "five9_api_key=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn"
test_negative = "five9_api_key=short"
