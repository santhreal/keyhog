# Docs: https://docs.timescale.com/use-timescale/latest/integrations/find-connection-details/
# Format: PostgreSQL connection string or service URL
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "timescaledb-credentials"
name = "TimescaleDB Credentials"
service = "timescaledb"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["TIMESCALE", "timescale", "TIMESCALEDB"]

[[detector.patterns]]
regex = '''(?:TIMESCALE|TIMESCALEDB)[_\-\s]*(?:URL|SERVICE_URL|HOST)[=:\s"'']+(postgres(?:ql)?://[^:]+):([^@]+)@([^"'']+)'''
description = "TimescaleDB connection string with password"
group = 2

[[detector.companions]]
name = "timescaledb_username"
regex = '''(?:TIMESCALE|TIMESCALEDB)[_\-\s]*(?:USER|USERNAME)[=:\s"'']+([^"'']+)'''
within_lines = 5
[[detector.patterns]]
regex = '''(?:TIMESCALE|TIMESCALEDB)[_\-\s]*(?:PASSWORD|PASS|TOKEN)[=:\s"'']+([a-zA-Z0-9_-]{16,})'''
description = "TimescaleDB password/token with context anchor"
group = 1

[[detector.tests]]
test_positive = "TIMESCALEDB PASSWORD=TimescaleDbPass1234"
test_negative = "TIMESCALE_PASSWORD=shortpassword"
