# Docs: https://cloud.google.com/secret-manager/docs/reference/rest
# Format: Secret names follow projects/{project}/secrets/{secret} pattern
# Verify: GET /v1/{name} with GCP access token returns 200 if valid
# Prefix: projects/*/secrets/

[detector]
id = "google-secret-manager-credentials"
name = "Google Secret Manager Secret"
service = "google-secret-manager"
severity = "critical"
keywords = ["projects/", "secrets/", "secretmanager"]

[[detector.patterns]]
regex = 'projects/[a-z0-9-]+/secrets/[a-zA-Z0-9_-]+(?:/versions/\d+)?'
description = "Google Secret Manager secret resource path"

# Companion: GCP service account key
[[detector.companions]]
name = "GCP Service Account Key"
regex = '"type":\s*"service_account"'
within_lines = 15

[[detector.tests]]
test_positive = "projects/6ophb096al79yngveh2oqc89/secrets/MHvnXpCEqVoPK4xfUnMm5LFkLYq_9rtCGq6XW5yYxES/versions/106762524949451616097841508309392488382916883507301034643504464769780915686164596831488843699338"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
