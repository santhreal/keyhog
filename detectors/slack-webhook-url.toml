# Docs: https://api.slack.com/messaging/webhooks
# Format: https://hooks.slack.com/services/T{10-char-team-id}/B{10-char-channel-id}/{24-char-secret}
# Verify: POST to webhook URL returns 200 with "ok" body if valid
# Prefix: https://hooks.slack.com/services/

[detector]
id = "slack-webhook-url"
name = "Slack Webhook URL"
service = "slack"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["hooks.slack.com", "slack-webhook", "SLACK_WEBHOOK"]

[[detector.patterns]]
regex = "https://hooks\\.slack\\.com/services/T[a-zA-Z0-9]{8,10}/B[a-zA-Z0-9]{8,10}/[a-zA-Z0-9]{24}"
description = "Slack incoming webhook URL (full services path)"

[[detector.patterns]]
regex = '''(?:slack[_\-\s]*webhook[_\-\s]*url|SLACK[_\-\s]*WEBHOOK[_\-\s]*URL)["\'\s]*[=:]["\'\s]*(https://hooks\.slack\.com/services/[a-zA-Z0-9/]+)'''
description = "Slack webhook URL with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "{{match}}"
body = "{}"
# {{match}} is the full webhook URL; the regex above pins the host to
# hooks.slack.com, but the validator can't statically prove that. Pin the
# allowlist explicitly to fail-closed if the regex is ever loosened.
allowed_domains = ["hooks.slack.com"]

[detector.verify.auth]
type = "none"

[[detector.verify.headers]]
name = "Content-Type"
value = "application/json"

[detector.verify.success]
status = 400
body_contains = "invalid_payload"

[[detector.tests]]
test_positive = "https://hooks.slack.com/services/T01234567/B98765432/AbCdEfGhIjKlMnOpQrStUvWx"
test_negative = "https://hooks.slack.com/services/T123/B456/secret"
