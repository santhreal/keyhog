# Docs: https://developer.mixpanel.com/reference/project-token
# Format: 32 character hexadecimal string
# Verify: none (no simple verification endpoint available)
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "mixpanel-project-token"
name = "Mixpanel Project Token"
service = "mixpanel"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["mixpanel", "MIXPANEL_TOKEN", "mp_token", "project_token", "mixpanel.init"]

[[detector.patterns]]
regex = "(?:mixpanel|MIXPANEL|mp)[_.]?(?:token|TOKEN|project[_.]?token)[=:\\s\"']+([a-f0-9]{32})"
required_literals = ["token"]
description = "Mixpanel project token with context anchor"
group = 1
# Mixpanel project tokens are shipped client-side via `mixpanel.init`
# - the token IS the project's public identifier for browser/mobile
# tracking. Server-side API access uses the Service Account (not this
# token). `--hide-client-safe` drops these.
client_safe = true

[[detector.tests]]
test_positive = "mixpaneltoken=c3204d9a091c90da70b2eb73d026b376"
test_negative = "mixpaneltoken=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
