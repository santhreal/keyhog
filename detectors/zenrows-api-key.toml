# Docs: https://docs.zenrows.com/
# Format: 32-character alphanumeric string with no unique prefix
# Verify: GET /api/v1/?url=...&api_key=... returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "zenrows-api-key"
name = "ZenRows API Key"
service = "zenrows"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["zenrows", "ZENROWS", "zen_rows"]

[[detector.patterns]]
regex = "(?:zenrows|ZENROWS)[=:\\s\"'']+([a-zA-Z0-9]{32})"
description = "ZenRows API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:api[_\-\s]*key|apikey)[=:\s"'']+([a-zA-Z0-9]{32}).{0,50}(?:zenrows)'''
description = "ZenRows API key with api_key prefix and zenrows context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.zenrows.com/v1/"
allowed_domains = ["api.zenrows.com"]

[detector.verify.auth]
type = "query"
param = "apikey"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "zenrows=M4konqTT3I7XgZ2O6ii284W8pAcp4STn"
test_negative = "zenrows=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
