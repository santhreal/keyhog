# Docs: https://docs.zenrows.com/
# Format: 32-character alphanumeric string with no unique prefix
# Verify: GET /api/v1/?url=...&api_key=... returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "zenrows-api-key"
name = "ZenRows API Key"
service = "zenrows"
severity = "high"
keywords = ["zenrows", "ZENROWS", "zen_rows"]

[[detector.patterns]]
regex = "(?:zenrows|ZENROWS)[=:\\s\"'']+([a-zA-Z0-9]{32})"
description = "ZenRows API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:api[_-]?key|apikey)[=:\\s\"'']+([a-zA-Z0-9]{32}).{0,50}(?:zenrows)"
description = "ZenRows API key with api_key prefix and zenrows context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.zenrows.com/v1/"
allowed_domains = ["api.zenrows.com"]

[detector.verify.auth]
type = "query"
param = "apikey"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "zenrows=M4konqTT3I7XgZ2O6ii284W8pAcp4STn"
test_negative = "zenrows=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
