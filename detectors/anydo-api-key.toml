# Docs: https://docs.any.do/
# Format: API key, variable length alphanumeric string
# Verify: No public verification endpoint available
# Prefix: none (requires context anchoring)

[detector]
id = "anydo-api-key"
name = "Any.do API Key"
service = "anydo"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ANYDO_API_KEY", "ANYDO_KEY", "ANYDO_TOKEN"]

[[detector.patterns]]
regex = "(?:ANYDO_API_KEY|ANYDO_KEY|ANYDO_TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{30,60})"
description = "Any.do API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "ANYDO_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn"
test_negative = "ANYDO_API_KEY=short"
