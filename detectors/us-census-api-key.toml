# Docs: https://www.census.gov/data/developers.html
# Format: 40-character hex string, passed as "&key=" parameter
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "us-census-api-key"
name = "US Census Bureau API Key"
service = "us-census"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["CENSUS_API_KEY", "census", "api.census.gov"]

[[detector.patterns]]
regex = "(?:CENSUS_API_KEY|census)[=:\\s\"'\\']+([a-f0-9]{40})(?:[^a-f0-9]|$)"
description = "US Census API key (40 hex chars) with context anchor"
group = 1

[[detector.patterns]]
regex = "census[a-zA-Z0-9._/?=&%-]{0,200}&key=([a-f0-9]{40})(?:[^a-f0-9]|$)"
description = "US Census API key in URL query parameter"
group = 1

[[detector.tests]]
test_positive = "CENSUS_API_KEY=f009f7236f6fb315ba5bcbffbb3a884b68b8028e"
test_negative = "CENSUS_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
