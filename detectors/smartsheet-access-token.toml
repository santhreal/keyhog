# Docs: https://smartsheet.redoc.ly/
# Format: Variable-length alphanumeric string (example: ll352u9jujauoqz4gstvsae05)
# Verify: GET /sheets with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "smartsheet-access-token"
name = "Smartsheet Access Token"
service = "smartsheet"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SMARTSHEET_ACCESS_TOKEN", "SMARTSHEET_API_TOKEN"]

[[detector.patterns]]
regex = "(?:SMARTSHEET_ACCESS_TOKEN|SMARTSHEET_API_TOKEN)[=:\\s\"'']+([a-z0-9]{20,40})"
description = "Smartsheet API access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.smartsheet.com/2.0/sheets"
allowed_domains = ["api.smartsheet.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "SMARTSHEET_ACCESS_TOKEN=ec97c55tiqen5ckur746w10z78x0"
test_negative = "SMARTSHEET_ACCESS_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
