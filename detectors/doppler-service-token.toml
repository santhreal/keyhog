# Docs: https://docs.doppler.com/docs/service-tokens
# Format: dp.st. prefix followed by alphanumeric characters (40+ chars)
# Verify: HTTP GET to /v3/workplace with Bearer token authentication
# Prefix: dp.st.

[detector]
id = "doppler-service-token"
name = "Doppler Service Token"
service = "doppler"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["dp.st", "doppler"]

[[detector.patterns]]
regex = 'dp\.st\.[a-zA-Z0-9]{40,}'
description = "Doppler service token (dp.st.)"

[detector.verify]
method = "GET"
url = "https://api.doppler.com/v3/workplace"
allowed_domains = ["api.doppler.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "doppler dp.st.cRiCPXCEbAx0HUAk0YxfFEVLFJxdd60s3Gg1K5Qf"
test_negative = "doppler dp.st.short"
