# Docs: https://docs.doppler.com/docs/service-tokens
# Format: dp.st. prefix followed by alphanumeric characters (40+ chars)
# Verify: HTTP GET to /v3/workplace with Bearer token authentication
# Prefix: dp.st.

[detector]
id = "doppler-service-token"
name = "Doppler Service Token"
service = "doppler"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["dp.st", "doppler"]

[[detector.patterns]]
regex = 'dp\.st\.[a-zA-Z0-9]{40,}'
description = "Doppler service token (dp.st.)"

[detector.verify]
method = "GET"
url = "https://api.doppler.com/v3/workplace"
allowed_domains = ["api.doppler.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "doppler dp.st.cRiCPXCEbAx0HUAk0YxfFEVLFJxdd60s3Gg1K5Qf"
test_negative = "doppler dp.st.short"
