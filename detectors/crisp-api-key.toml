# Docs: https://docs.crisp.chat/guides/rest-api/authentication/
# Format: identifier:key pair (UUID:secret key format)
# Verify: GET /v1/website/{website_id} with Basic auth
# Prefix: none (requires context anchoring)

[detector]
id = "crisp-api-key"
name = "Crisp API Key"
service = "crisp"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CRISP", "crisp_api", "crisp_website", "X-Crisp-Tier"]

[[detector.patterns]]
regex = '''(?i)(?:CRISP|crisp)[_\-\s]*(?:API[_\-\s]*KEY|TOKEN|IDENTIFIER|KEY)[=:\s"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Crisp API identifier (UUID format) with context anchor"
group = 1

[[detector.companions]]
name = "crisp_secret"
regex = '''(?i)(?:CRISP|crisp)[_\-\s]*(?:SECRET|API[_\-\s]*SECRET)[=:\s"'']+([a-f0-9a-zA-Z]{32,64})'''
within_lines = 5

[[detector.tests]]
test_positive = "CRISP_API_KEY=a5e95c2c-2e61-575f-5f7f-8f3b3462918d"
test_negative = "crisp_api_key=short"
