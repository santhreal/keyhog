# Docs: https://developer.riotgames.com/docs/portal
# Format: RGAPI- prefix followed by 40+ alphanumeric characters
# Verify: GET https://americas.api.riotgames.com/riot/account/v1/accounts/me with X-Riot-Token header
# Prefix: RGAPI-

[detector]
id = "riotgames-api-key"
name = "Riot Games API Key"
service = "riotgames"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["RGAPI-", "RIOT_API_KEY", "X-Riot-Token"]

[[detector.patterns]]
regex = 'RGAPI-[a-zA-Z0-9]{40,}'
description = "Riot Games API key (RGAPI-)"

[detector.verify]
method = "GET"
url = "https://americas.api.riotgames.com/riot/account/v1/accounts/me"
allowed_domains = ["americas.api.riotgames.com"]

[detector.verify.auth]
type = "header"
name = "X-Riot-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "RGAPI-1x7iIVThNxv00OGy7e01fGwtDdH4q1cEvkyVY5luPUZNG6PPBYspYuVsxZUTn7zML"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
