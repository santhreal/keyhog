# Docs: https://developer.riotgames.com/docs/portal
# Format: RGAPI- prefix followed by 40+ alphanumeric characters
# Verify: GET https://americas.api.riotgames.com/riot/account/v1/accounts/me with X-Riot-Token header
# Prefix: RGAPI-

[detector]
id = "riotgames-api-key"
name = "Riot Games API Key"
service = "riotgames"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["RGAPI-", "RIOT_API_KEY", "X-Riot-Token"]

[[detector.patterns]]
regex = 'RGAPI-[a-zA-Z0-9]{40,}'
description = "Riot Games API key (RGAPI-)"

[detector.verify]
method = "GET"
url = "https://americas.api.riotgames.com/riot/account/v1/accounts/me"
allowed_domains = ["americas.api.riotgames.com"]

[detector.verify.auth]
type = "header"
name = "X-Riot-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "RGAPI-1x7iIVThNxv00OGy7e01fGwtDdH4q1cEvkyVY5luPUZNG6PPBYspYuVsxZUTn7zML"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
