# Docs: https://api.count.ly/reference/authentication
# Format: 32-character hexadecimal string for App Key
# Verify: GET /o/analytics/dashboard with api_key parameter returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "countly-api-key"
name = "Countly API Key"
service = "countly"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["COUNTLY_API_KEY", "COUNTLY_APP_KEY", "countly"]

[[detector.patterns]]
regex = '''(?:COUNTLY[_\-\s]*(?:API|APP)[_\-\s]*KEY|countly[_\-\s]*(?:api|app)[_\-\s]*key)[=:\s"'']+([a-f0-9]{32})'''
description = "Countly API/App key - 32 hex characters with context anchor"
group = 1

[[detector.patterns]]
regex = "Countly\\.init.*app_key[=:\\s\"'']+([a-f0-9]{32})"
description = "Countly SDK initialization with app_key"
group = 1

[[detector.tests]]
test_positive = "COUNTLY_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "COUNTLY_KEY=7b3e5d8c1a9f4e2b6c8d3a5e"
