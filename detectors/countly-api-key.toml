# Docs: https://api.count.ly/reference/authentication
# Format: 32-character hexadecimal string for App Key
# Verify: GET /o/analytics/dashboard with api_key parameter returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "countly-api-key"
name = "Countly API Key"
service = "countly"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["COUNTLY_API_KEY", "COUNTLY_APP_KEY", "countly"]

[[detector.patterns]]
regex = '''(?:COUNTLY[_\-\s]*(?:API|APP)[_\-\s]*KEY|countly[_\-\s]*(?:api|app)[_\-\s]*key)[=:\s"'']+([a-f0-9]{32})'''
description = "Countly API/App key - 32 hex characters with context anchor"
group = 1

[[detector.patterns]]
regex = "Countly\\.init.*app_key[=:\\s\"'']+([a-f0-9]{32})"
description = "Countly SDK initialization with app_key"
group = 1

[[detector.tests]]
test_positive = "COUNTLY_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "COUNTLY_KEY=7b3e5d8c1a9f4e2b6c8d3a5e"
