# Docs: https://rfc.zeromq.org/spec/32/
# Format: 5 characters represent 4 bytes; total length must be a multiple of 5
# Verify: none (Z85 is an encoding, not a specific service credential)
# Prefix: none (Z85 character set is broad)

[detector]
id = "z85-encoded-secret"
name = "Z85 Encoded Secret"
service = "z85"
severity = "info"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["z85", "base85"]

[[detector.patterns]]
# Match strings that look like Z85 and are part of an assignment.
# Dropped the generic `encoded` keyword: Go/JS/Python ubiquitously
# name their base64/hex output variable `encoded` (`encoded :=
# hex.EncodeToString(...)`, `const encoded = JSON.stringify(...)`),
# so anchoring on it produced FPs everywhere a non-z85 base-N
# encoded value happened to live in a value-position alphabet
# (bat-go suggestions_test.go, claude-code yoloClassifier.ts,
# gogs internal/tool/tool.go). Real z85 use-cases (ZeroMQ CurveZMQ
# Z85 keys) reference `z85`/`base85` explicitly.
regex = "(?:z85|base85)[=:\\s\"'']+([0-9a-zA-Z.\\-:+=^!/*?&<>()\\[\\]{}@%$#]{20,})"
description = "Z85 encoded string with z85/base85 keyword anchor"
group = 1

[[detector.tests]]
test_positive = "base85 :: :  = ==: := :'         '  ' =\"   '    :   :    \"     '\" '   \"    \":  '\"'   =  : L+#C(tZc=X2E.]?^72!-TE%0?%[6j)x8OK$41g/RZh{n=G-8X$d1E?JA?cX%tuIXiL[cNggI(TRumPEg[>zq7$*9Oy^Sg"
test_negative = "base85 :: :  = ==: := :'         '  ' =\"   '    :   :    \"     '\" '   \"    \":  '\"'   =  : YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
