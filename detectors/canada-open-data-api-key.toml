# Docs: https://open.canada.ca/en/working-data-api/api
# Format: CKAN-style API key - 36 character UUID format
# Verify: CKAN API key sent via Authorization header to open.canada.ca
# Prefix: none (requires context anchoring)

[detector]
id = "canada-open-data-api-key"
name = "Canada Open Data API Key"
service = "canada-open-data"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["open.canada.ca", "canada_api_key", "CKAN_API_KEY"]

[[detector.patterns]]
regex = '''(?:CANADA|CKAN|open\.canada)[_.-]?(?:API[_\-\s]*KEY|api[_\-\s]*key)[\s"''=:]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Canada Open Data CKAN API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:canada|ckan).{0,20}(?:api[_\-\s]*key|token)[\s"''=:]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Canada Open Data API key with flexible context"
group = 1

[[detector.tests]]
test_positive = "CANADA_API_KEY=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "CANADA_API_KEY=short"
