# Docs: https://docs.ceph.com/en/latest/radosgw/s3/
# Format: 20 alphanumeric chars for Access Key, 40 base64 chars for Secret Key (S3-compatible)
# Verify: none (self-hosted Ceph deployment, no standard verification endpoint)
# Prefix: none (requires context anchoring)

[detector]
id = "ceph-rados-gateway-credentials"
name = "Ceph RADOS Gateway S3 Credentials"
service = "ceph"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CEPH", "ceph", "RADOS", "radosgw", "CEPH_ACCESS_KEY", "CEPH_RGW"]

[[detector.patterns]]
regex = "(?:CEPH|ceph)[._-]?(?:RGW|rgw|RADOS|rados)?[._-]?(?:ACCESS[._-]?)?(?:KEY|key)[=:\\s\"'']+([A-Z0-9]{20})\\b"
description = "Ceph RADOS Gateway access key with context anchor"
group = 1

[[detector.companions]]
name = "secret_key"
regex = "(?:CEPH|ceph)[._-]?(?:RGW|rgw|RADOS|rados)?[._-]?(?:SECRET[._-]?)?(?:KEY|key)[=:\\s\"'']+([A-Za-z0-9/+=]{40})"
within_lines = 5

[[detector.tests]]
test_positive = "CEPH_ACCESS_KEY=KP4QX7RM2SN5TB8VW3YZ"
test_negative = "CEPHKEY=jxZytDQUEy0SrmdAxAoF1PWOn9tOtMcWyHzHeiMK"
