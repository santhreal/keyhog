# Docs: https://developer.apple.com/documentation/usernotifications/setting_up_a_remote_notification_server
# Format: APNs auth key is a JWT starting with eyJ (base64 header), or p8 file format
# Verify: JWT signature validation (no public HTTP endpoint for verification)
# Prefix: eyJ (JWT header)

[detector]
id = "apple-push-notification-key"
name = "Apple Push Notification Key"
service = "apple"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["APNS", "apns", "push notification", "AuthKey_"]

[[detector.patterns]]
regex = '(?:APNS|apns)[=:][\s"]*([A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,})'
description = "APNs authentication token/JWT with context anchor"
group = 1

[[detector.patterns]]
regex = 'AuthKey_[A-Z0-9]{10}\.p8'
description = "Apple Auth Key file reference"

[[detector.tests]]
test_positive = "APNS=Kp4Qx7Rm2Sn5Tb8Vw3Yz.Vk9Bn3Lp7Qm2Rs5Tw8Yz.Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "APNS=Kp4Qx7Rm2Sn5Tb8Vw3Yz.Vk9Bn3Lp7Qm2Rs5Tw8Yz"
