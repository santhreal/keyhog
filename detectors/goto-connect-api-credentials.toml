# Docs: https://developer.goto.com/guides/Get%20Started/02_HOW_createClient/
# Format: OAuth2 Client ID and Client Secret for GoTo Connect
# Verify: POST /oauth/v2/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "goto-connect-api-credentials"
name = "GoTo Connect API Credentials"
service = "goto-connect"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["goto", "GOTO", "goto_connect", "GOTO_CONNECT", "GoToConnect", "logmein"]

[[detector.patterns]]
regex = '''(?i)(?:goto[_\-\s]*connect|gotoconnect)[_\-\s]*(?:client[_\-\s]*secret|clientsecret)[=:\s"'']+([a-zA-Z0-9_-]{20,60})'''
description = "GoTo Connect Client Secret with context anchor"
group = 1

[[detector.companions]]
name = "goto_connect_client_id"
regex = '''(?i)(?:goto[_\-\s]*connect|gotoconnect)[_\-\s]*(?:client[_\-\s]*id|clientid)[=:\s"'']+([a-zA-Z0-9_-]{20,50})'''
within_lines = 5

[[detector.tests]]
test_positive = "gotoconnectclientid=uwtOQIbhxpxmFoKM1Ue8\ngotoconnectclientsecret=SuQuuxx8Mf8HsnQ-IopwByhBoWeESbtTbI"
test_negative = "gotoconnectclientid=uwtOQIbhxpxmFoKM1Ue8"
