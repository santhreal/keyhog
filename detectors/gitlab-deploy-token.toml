# Docs: https://docs.gitlab.com/ee/user/project/deploy_tokens/
# Format: gldt- prefix followed by 20+ alphanumeric characters
# Verify: git ls-remote with token as username or header auth
# Prefix: gldt-

[detector]
id = "gitlab-deploy-token"
name = "GitLab Deploy Token"
service = "gitlab"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["gldt-", "gitlab_deploy", "deploy_token"]

[[detector.patterns]]
regex = 'gldt-[a-zA-Z0-9_-]{20,}'
description = "GitLab deploy token (gldt- prefix)"

[[detector.companions]]
name = "username"
regex = '''(?:GITLAB[_\-\s]*DEPLOY[_\-\s]*TOKEN[_\-\s]*USER|username|user)[=:\s"'']+([a-zA-Z0-9_-]+)'''
within_lines = 5

[[detector.tests]]
test_positive = "gldt-WEB2chP8PWNtgxZLf3EXHXmiDke0c1FH"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
