# Docs: https://docs.gitlab.com/ee/user/project/deploy_tokens/
# Format: gldt- prefix followed by 20+ alphanumeric characters
# Verify: git ls-remote with token as username or header auth
# Prefix: gldt-

[detector]
id = "gitlab-deploy-token"
name = "GitLab Deploy Token"
service = "gitlab"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["gldt-", "gitlab_deploy", "deploy_token"]

[[detector.patterns]]
regex = 'gldt-[a-zA-Z0-9_-]{20,}'
description = "GitLab deploy token (gldt- prefix)"

[[detector.companions]]
name = "username"
regex = '''(?:GITLAB[_\-\s]*DEPLOY[_\-\s]*TOKEN[_\-\s]*USER|username|user)[=:\s"'']+([a-zA-Z0-9_-]+)'''
within_lines = 5

[[detector.tests]]
test_positive = "gldt-WEB2chP8PWNtgxZLf3EXHXmiDke0c1FH"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
