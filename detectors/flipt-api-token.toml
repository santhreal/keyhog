# Docs: https://www.flipt.io/docs/authentication/using-tokens
# Format: flipt_ prefix followed by 40+ alphanumeric characters
# Verify: no public verification endpoint
# Prefix: flipt_

[detector]
id = "flipt-api-token"
name = "Flipt API Token"
service = "flipt"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
decode_transforms = { reverse_prefixes = ["flipt_"], caesar_prefixes = ["flipt_"] }
keywords = ["flipt_", "FLIPT_TOKEN"]

[[detector.patterns]]
regex = 'flipt_[a-f0-9]{40,}'
description = "Flipt API authentication token"

[[detector.tests]]
test_positive = "flipt_7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d3a5e9f1b7"
test_negative = "flipt_short"
