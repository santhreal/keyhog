# Docs: https://surrealdb.com/docs/surrealdb/integration/sdks
# Format: SurrealDB uses connection strings (ws://, wss://, http://, https://) with username/password or JWT tokens
# Verify: POST /signin with credentials returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "surrealdb-credentials"
name = "SurrealDB Credentials"
service = "surrealdb"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["SURREAL", "surrealdb", "SURREALDB_URL", "SURREAL_TOKEN"]

[[detector.patterns]]
regex = '''(?:SURREAL(?:DB)?[_\-\s]*(?:URL|ENDPOINT|CONNECTION))[=:\s"'']+(wss?://[^\s"'']+)'''
description = "SurrealDB WebSocket connection URL with context"
group = 1

[[detector.patterns]]
regex = '''(?:SURREAL(?:DB)?[_\-\s]*(?:URL|ENDPOINT|CONNECTION))[=:\s"'']+(https?://[^\s"'']+)'''
description = "SurrealDB HTTP connection URL with context"
group = 1

[[detector.patterns]]
regex = '''(?:SURREAL(?:DB)?[_\-\s]*TOKEN|NS_TOKEN|DB_TOKEN)[=:\s"'']+(eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*\.?[a-zA-Z0-9_-]*)'''
description = "SurrealDB JWT token with context anchor"
group = 1

[[detector.tests]]
test_positive = "SURREALDB-ENDPOINT=   '= \"     ='  =  \"' :='     =  =   \" :'' \":\"'       = : = \"   ='' ==   =':=   = '  :     : wss://edL;,)JcUe&kEO}IZ#&,#%0w-}#Go=BJHvyT4q):(_pK*A9^o,3[J7"
test_negative = "SURREALDB-ENDPOINT=   '= \"     ='  =  \"' :='     =  =   \" :'' \":\"'       = : = \"   ='' ==   =':=   = '  :     : YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
