# Docs: https://docs.blynk.io/en/getting-started/activating-devices
# Format: 32-character alphanumeric Auth Token (template ID optional)
# Verify: Connection to blynk-cloud.com with token as username
# Prefix: none (requires context anchoring)

[detector]
id = "blynk-api-credentials"
name = "Blynk API Credentials"
service = "blynk"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["blynk", "auth", "BLYNK_AUTH", "blynk-cloud.com"]

[[detector.patterns]]
regex = '''(?:blynk|BLYNK)[._-]?(?:AUTH[_\-\s]*TOKEN|auth[_\-\s]*token|AUTH|auth)[=:\s"'']+([a-f0-9]{32})'''
description = "Blynk device authentication token"
group = 1

[[detector.patterns]]
regex = "char\\s+(?:auth|AUTH)\\[\\]\\s*=\\s*[\"']([a-f0-9]{32})[\"']"
description = "Blynk auth token in Arduino char array format"
group = 1

[detector.verify]
method = "GET"
url = "https://blynk.cloud/external/api/isHardwareConnected"
allowed_domains = ["blynk.cloud"]

[detector.verify.auth]
type = "basic"
# Basic-auth `username` is a *field* reference, not a template. The prior
# value `"{{match}}"` resolved to the literal string "{{match}}" via the
# resolve_field fallthrough - Blynk would have rejected the auth as
# malformed user. Use `"match"` so the credential value flows through.
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "BLYNK_AUTH_TOKEN=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "BLYNK_AUTH=7b3e5d8c1a9f4e2b"
