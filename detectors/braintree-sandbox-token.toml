# Docs: https://developer.paypal.com/braintree/docs/guides/authorization/tokenization-keys
# Format: sandbox_ or production_ followed by alphanumeric string
# Verify: POST to client token endpoint with proper credentials
# Prefix: sandbox_, production_

[detector]
id = "braintree-sandbox-token"
name = "Braintree Tokenization Key"
service = "braintree"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["sandbox_", "production_", "tokenization_key", "BRAINTREE"]

[[detector.patterns]]
regex = "sandbox_[a-z0-9]{8}_[a-z0-9]{8}_[a-z0-9]{8}"
description = "Braintree sandbox tokenization key"

[[detector.patterns]]
regex = "production_[a-z0-9]{8}_[a-z0-9]{8}_[a-z0-9]{8}"
description = "Braintree production tokenization key"

[[detector.patterns]]
regex = "(?:BRAINTREE|braintree)[._-]?(?:TOKENIZATION|tokenization)?[._-]?(?:KEY|key)?[=:\\s\"'']+((?:sandbox|production)_[a-z0-9]{8}_[a-z0-9]{8}_[a-z0-9]{8})"
description = "Braintree tokenization key with context anchor"
group = 1

[[detector.companions]]
name = "braintree_private_key"
# Context-anchored so a wide search radius doesn't false-fire on every
# random hex hash in the file (validator previously flagged this).
regex = "(?:braintree[._-]?private[._-]?key|BRAINTREE_PRIVATE_KEY|private_key)[=:\\s\"']+[a-f0-9]{32,40}"
within_lines = 10

[[detector.tests]]
test_positive = "sandbox_kp4qx7rm_sn5tb8vw_3yzkp4qx"
test_negative = "sandbox_kp4qx7rm_sn5tb8vw_3yzkp4"
