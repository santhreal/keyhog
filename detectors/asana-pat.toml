# Docs: https://developers.asana.com/docs/personal-access-token
# Format: 1/ followed by 16-20 digits, another /, and 32-48 alphanumeric chars
# Verify: GET request to Asana users/me endpoint with Bearer token
# Prefix: 1/

[detector]
id = "asana-pat"
name = "Asana Personal Access Token"
service = "asana"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.12
keywords = [
    "asana",
    "ASANA_ACCESS_TOKEN",
    "ASANA_PAT",
    "ASANA_TOKEN",
    "app.asana.com",
    "asana.com/api",
]

[[detector.patterns]]
regex = '1/[0-9]{16,20}/[a-zA-Z0-9]{32,48}'
description = "Asana personal access token (format: 1/user_id/token)"

[[detector.patterns]]
# Asana legacy PAT shape: `<16-digit-user-id>:<32-hex-secret>` (e.g.
# `0395028979185585:af8dbeb6fd1abfd3ee64efbe9bbb5179`). The shape is
# shared with license-key-style 16:32-hex decoys, so the `asana` /
# `app.asana.com` / `ASANA_PAT` keyword AC pre-filter is the
# attribution gate; bare 16:32-hex without an Asana keyword in the
# scan window will not route through this detector.
regex = '[0-9]{16}:[a-fA-F0-9]{32}'
description = "Asana legacy personal access token (user-id:secret shape)"

[detector.verify]
method = "GET"
url = "https://app.asana.com/api/1.0/users/me"
allowed_domains = ["app.asana.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "name"
json_path = "$.data.name"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "email"
json_path = "$.data.email"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "ASANA_ACCESS_TOKEN=1/4827193056718294/Kp7QxR4mN9sBv2Ta5Yc8Wh3Lj6Dz1FgU"
test_negative = "1/short/short"
