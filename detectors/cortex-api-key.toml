# Docs: https://docs.strangebee.com/cortex/installation-and-configuration/authentication/
# Format: Random alphanumeric API key
# Verify: GET /api/analyzer with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "cortex-api-key"
name = "Cortex API Key"
service = "cortex"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["cortex", "CORTEX_API_KEY", "cortex_key"]

[[detector.patterns]]
regex = '''(?:cortex|CORTEX)[_\-\s]*(?:api[_\-\s]*key|key)[=:\s"'']+([a-zA-Z0-9_-]{20,64})'''
description = "Cortex API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "CORTEX_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "cortex_api_key=Kp4Qx7Rm2Sn5Tb8"
