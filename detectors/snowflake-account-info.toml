# Snowflake account configuration (non-secret identifiers).
# Docs: https://docs.snowflake.com/en/user-guide/security-access-control-overview

[detector]
id = "snowflake-account-info"
name = "Snowflake Account Info"
service = "snowflake"
severity = "info"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SNOWFLAKE", "snowflakecomputing", "SNOWSQL"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
# `(?-i)` forces case-sensitive matching. Account locators are lowercase (e.g.
# xy12345.us-east-1), so the lowercase-only value charset then rejects an
# uppercase placeholder like `YOUR_API_KEY_HERE_PLACEHOLDER_VALUE` (the regex
# would otherwise capture the truncated `YOUR` under the global case-insensitive
# compile). The user / warehouse / database / role patterns below stay
# case-insensitive - those identifiers legitimately carry uppercase.
regex = "(?-i)(?:SNOWFLAKE|snowflake)[._-]?(?:account|acct|accountname)[=:\\s\"'']+([a-z0-9]+(?:\\.[a-z0-9-]+)?)"
description = "Snowflake account identifier"
group = 1

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:user|username|usr)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Snowflake username"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:warehouse|wh)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Snowflake warehouse"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:database|db)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Snowflake database"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:role)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Snowflake role"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "snowflake.account=xy12345.us-east-1"
test_negative = "snowflake.account=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
