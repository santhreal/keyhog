# Docs: https://www.windmill.dev/docs/core_concepts/user_tokens
# Format: Windmill user tokens are JWT-like tokens or wm_ prefixed strings
# Verify: https://www.windmill.dev/docs/advanced/cli/workspace-management
# Prefix: none (JWT format) or wm_

[detector]
id = "windmill-credentials"
name = "Windmill Credentials"
service = "windmill"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["WINDMILL", "windmill", "WM_TOKEN"]

[[detector.patterns]]
regex = "(?:WINDMILL|windmill)[_\\.\\s]*(?:TOKEN|token|secret)[=:\\s\"'']+(eyJ[a-zA-Z0-9_\\-\\/\\+]{20,}={0,2})"
description = "Windmill JWT token"
group = 1

[[detector.patterns]]
regex = "WM_TOKEN[=:\\s\"'']+(eyJ[a-zA-Z0-9_\\-\\/\\+]{20,}={0,2})"
description = "Windmill ephemeral job token"
group = 1

[[detector.patterns]]
regex = "(?:windmill)[_\\.\\s]*(?:db|database)[_\\.\\s]*(?:password|pwd)[=:\\s\"'']+([a-zA-Z0-9_!@#$%^&*+=\\-]{12,})"
description = "Windmill database password"
group = 1

[[detector.patterns]]
regex = "(?-i)wm_[a-zA-Z0-9]{24,}"
description = "Windmill internal token (wm_ prefix)"

[detector.verify]
method = "GET"
url = "https://app.windmill.dev/api/users/whoami"
allowed_domains = ["app.windmill.dev"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "$.email"

[[detector.tests]]
test_positive = "WINDMILL .                _ _      .    . _   . .     .    _. _  ._   _. ._   _secret'  ='     =   =    = \"    =\"'\" \"':\" =    eyJhjpxebJe5m8HmL0-iY/XIJh0LmAr_m_eFIYotxOzUSo6NkkhjAO9X1G-aMZhhIIvaLraHAYYLlY2hulXSW4NZa3sZm8xpv=="
test_negative = "WINDMILL .                _ _      .    . _   . .     .    _. _  ._   _. ._   _secret'  ='     =   =    = \"    =\"'\" \"':\" =    YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
