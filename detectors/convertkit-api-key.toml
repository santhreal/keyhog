# Docs: https://developers.kit.com/api-reference/v3/authentication
# Format: API Secret (formerly called API Key) - alphanumeric string
# Verify: GET /v3/account with api_secret query param or header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "convertkit-api-key"
name = "ConvertKit API Key"
service = "convertkit"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["convertkit", "CONVERTKIT", "api_secret"]

[[detector.patterns]]
regex = '''(?i)convertkit[_\-\s]*(?:api[_\-\s]*)?(?:secret|key)[=:\s"']+([a-zA-Z0-9_-]{20,})'''
description = "ConvertKit API Secret/Key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?i)convertkit[_\-\s]*(?:api[_\-\s]*)?key[_\-\s]*(?:v3)?[=:\s"']+([a-zA-Z0-9_-]{20,})'''
description = "ConvertKit V3 API Key"
group = 1

[[detector.tests]]
test_positive = "CONVERTKIT_API_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "CONVERTKIT_KEY=Kp4Qx7Rm2Sn5Tb8"
