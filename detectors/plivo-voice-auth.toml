# Docs: https://www.plivo.com/docs/voice/api/overview
# Format: Auth ID is a 20-character alphanumeric string, Auth Token is a 40-character alphanumeric string
# Verify: GET /v1/Account/{auth_id}/ with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "plivo-voice-auth"
name = "Plivo Voice Auth Credentials"
service = "plivo"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["PLIVO_AUTH_ID", "PLIVO_AUTH_TOKEN", "plivo", "plivo_auth_id", "plivo_auth_token"]

[[detector.patterns]]
# Tightened: drop the bare `auth_id` alternative. Real Plivo
# integrations always spell `PLIVO_AUTH_ID`/`plivo_auth_id`;
# the catch-all `auth_id` form fired on any 20-char alnum next
# to any field named auth_id (the dominant FP on base64-
# protobuf / k8s fixtures in the SecretBench mirror corpus).
regex = "(?:PLIVO_AUTH_ID|plivo_auth_id)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-zA-Z0-9]{20})[\"\\']?"
description = "Plivo Auth ID with PLIVO-specific anchor"
group = 1

[[detector.patterns]]
regex = "(?:PLIVO_AUTH_TOKEN|plivo_auth_token)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-zA-Z0-9]{40})[\"\\']?"
description = "Plivo Auth Token with PLIVO-specific anchor"
group = 1

# Auth ID and Auth Token are used together as a pair
[[detector.companions]]
name = "plivo_auth_token"
regex = "[a-zA-Z0-9]{40}"
within_lines = 5

[[detector.tests]]
test_positive = "PLIVO_AUTH_ID=XFhdBgXfaJMpNGaxRRsX"
test_negative = "PLIVO_AUTH_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
