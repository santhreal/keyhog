# Docs: https://huggingface.co/docs/hub/en/organizations
# Format: hf_ prefix followed by 34+ alphanumeric characters (organization tokens)
# Verify: GET /api/whoami-v2 with Bearer token returns 200 if valid
# Prefix: hf_

[detector]
id = "huggingface-org-token"
name = "HuggingFace Organization Token"
service = "huggingface"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["hf_"]

[[detector.patterns]]
regex = 'hf_[a-zA-Z0-9]{34,}'
description = "HuggingFace organization access token (hf_ prefix)"

[[detector.patterns]]
regex = 'api_org_[a-zA-Z0-9]{34,}'
description = "Legacy HuggingFace organization token (api_org_ prefix)"

[detector.verify]
method = "GET"
url = "https://huggingface.co/api/whoami-v2"
allowed_domains = ["huggingface.co"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "username"
json_path = "$.name"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "email"
json_path = "$.email"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "organization"
json_path = "$.orgs[0].name"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "hf_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb"
test_negative = "hf_short"

[[detector.tests]]
test_positive = "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"
test_negative = "api_org_short"
