# Docs: https://developers.podio.com/authentication
# Format: OAuth 2.0 access token, alphanumeric string
# Verify: GET /user/status with Authorization header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "podio-access-token"
name = "Podio Access Token"
service = "podio"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["PODIO_ACCESS_TOKEN", "PODIO_TOKEN"]

[[detector.patterns]]
regex = "(?:PODIO_ACCESS_TOKEN|PODIO_TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{40,60})"
description = "Podio OAuth 2.0 access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.podio.com/user/status"
allowed_domains = ["api.podio.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "PODIO_ACCESS_TOKEN=FzJHRZOsYwWCxU45KXdMIyV5CZSTY1DU5bnigGf4UskM4BeF"
test_negative = "PODIO_ACCESS_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
