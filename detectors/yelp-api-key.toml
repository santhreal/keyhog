# Docs: https://docs.developer.yelp.com/reference/authentication
# Format: 128-character alphanumeric string with no prefix
# Verify: GET /v3/businesses/search with Authorization Bearer header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "yelp-api-key"
name = "Yelp Fusion API Key"
service = "yelp"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["YELP_API_KEY", "yelp", "fusion"]

[[detector.patterns]]
regex = '''(?:YELP_API_KEY|yelp[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{100,})'''
description = "Yelp Fusion API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:YELP|yelp)[=:\\s\"'']+([a-zA-Z0-9_-]{100,})"
description = "Yelp API key generic context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.yelp.com/v3/businesses/search?limit=1"
allowed_domains = ["api.yelp.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "yelp_api_key=    ==  =    \"\"  N_spWCVhNNjcvtWAQuULVnPuLZrfBUr4OoP7VfwZmmuRvJ20dan3kFN-XKkKkCRcPvkNkDvIxOztNovUn2TY2lNgvFJDCOuI4Wxh"
test_negative = "yelp_api_key=    ==  =    \"\"  YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
