# Docs: https://weatherstack.com/documentation
# Format: API access key passed as 'access_key' parameter
# Verify: GET /current with access_key parameter returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "weatherstack-access-key"
name = "Weatherstack Access Key"
service = "weatherstack"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["WEATHERSTACK", "weatherstack", "WEATHERSTACK_ACCESS_KEY"]

[[detector.patterns]]
regex = '''(?:WEATHERSTACK|weatherstack)[_\-\s]*(?:ACCESS[_\-\s]*)?KEY[=:\s"'']+([a-zA-Z0-9]{20,})'''
description = "Weatherstack access key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:access_key|ACCESS_KEY)[=:\\s\"'']+([a-zA-Z0-9]{20,})[^a-zA-Z0-9].*weatherstack"
description = "Weatherstack access_key parameter with URL context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.weatherstack.com/current?query=London&access_key={{match}}"
allowed_domains = ["api.weatherstack.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "weatherstack _        _   _   _  ___  _ _        _   _    _  _    __          _        KEY BKe3WCBO8JIILnzQeTQgSIMCOhUAEJcABtxlR7lZST6ju3MBJSPfwjkh2Ek5g2ocLW8SSZg"
test_negative = "weatherstack _        _   _   _  ___  _ _        _   _    _  _    __          _        KEY YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
