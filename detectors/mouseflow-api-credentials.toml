# Docs: https://api-docs.mouseflow.com/
# Format: Email + API key pair for HTTP Basic Auth
# Verify: GET /websites with Basic auth
# Prefix: none (requires context anchoring)

[detector]
id = "mouseflow-api-credentials"
name = "Mouseflow API Credentials"
service = "mouseflow"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["MOUSEFLOW_API_KEY", "mouseflow_api_key", "mouseflow.com", "api-us.mouseflow"]

[[detector.patterns]]
regex = "(?:MOUSEFLOW[_.-]?API[_.-]?KEY|mouseflow[_.-]?api[_.-]?key)[=:\\s\"'']+([a-zA-Z0-9_-]{10,})"
description = "Mouseflow API key with context anchor"
group = 1

[[detector.patterns]]
regex = "api-us\\.mouseflow\\.com[^\\n]{0,100}Authorization[^\\n]{0,50}Basic[^\\n]{0,50}([a-zA-Z0-9+/=]{20,})"
description = "Mouseflow API basic auth header"
group = 1

[[detector.tests]]
test_positive = "MOUSEFLOW_API_KEY=8IhAULcXl1"
test_negative = "MOUSEFLOW_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
