# Docs: https://docs.promptlayer.com/languages/python
# Format: pl_ prefix followed by alphanumeric characters
# Verify: no public verification endpoint
# Prefix: pl_

[detector]
id = "promptlayer-api-key"
name = "PromptLayer API Key"
service = "promptlayer"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["pl_", "PROMPTLAYER_API_KEY", "promptlayer"]

[[detector.patterns]]
regex = '(?-i)pl_[a-zA-Z0-9]{20,}'
description = "PromptLayer API key (pl_ prefix)"

[[detector.tests]]
test_positive = "pl_OhX5esA2JNCvMTNpyfUbF1xLPsfJUnON"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
