# Docs: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
# Format: github_pat_ prefix followed by alphanumeric pattern with underscore separator (82+ chars total)
# Verify: HTTP GET to /user with Bearer token and User-Agent header
# Prefix: github_pat_

[detector]
id = "github-pat-fine-grained"
name = "GitHub Fine-Grained PAT"
service = "github"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
decode_transforms = { reverse_prefixes = ["github_pat_"], caesar_prefixes = ["github_pat_"] }
validators = [{ type = "github-fine-grained-crc32", prefixes = ["github_pat_"], left_len = 22, right_len = 59, checksum_len = 6, confidence_floor = 0.9 }]
keywords = ["github_pat_"]

[[detector.patterns]]
regex = 'github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}'
description = "GitHub fine-grained personal access token"

[detector.verify]
method = "GET"
url = "https://api.github.com/user"
allowed_domains = ["api.github.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[[detector.verify.headers]]
name = "User-Agent"
value = "keyhog-secret-scanner/{{version}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "login"
json_path = "$.login"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "name"
json_path = "$.name"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "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"
test_negative = "github_pat_short"
