# Docs: https://confluence.atlassian.com/sourcetreekb
# Format: Sourcetree stores Bitbucket/GitHub credentials, uses standard OAuth tokens
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "sourcetree-credentials"
name = "Sourcetree Credentials"
service = "sourcetree"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["sourcetree", "SOURCETREE", "source_tree"]

[[detector.patterns]]
regex = '''(?:sourcetree|SOURCETREE)[_\-\s]*(?:password|PASSWORD|token|TOKEN|credential|CREDENTIAL)[=:\s"'']+([a-zA-Z0-9!@#$%^&*+=/-]{16,})'''
description = "Sourcetree stored credentials with context anchor"
group = 1

[[detector.tests]]
test_positive = "SOURCETREE_PASSWORD=SourceTreePass1234!"
test_negative = "SOURCETREE_PASSWORD=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
