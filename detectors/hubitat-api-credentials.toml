# Docs: https://docs2.hubitat.com/apps/maker-api
# Format: Maker API access token (hex string) and App ID (numeric)
# Verify: GET /apps/api/APP_ID/devices with access_token query param
# Prefix: none (requires context anchoring)

[detector]
id = "hubitat-api-credentials"
name = "Hubitat Maker API Credentials"
service = "hubitat"
severity = "high"
# "app_id" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept). Recall-neutral.
keywords = ["hubitat", "maker_api", "access_token"]

[[detector.patterns]]
regex = "(?:hubitat|HUBITAT)[._-]?(?:ACCESS[_-]?TOKEN|access[_-]?token)[=:\\s\"'']+([a-f0-9]{32,40})"
description = "Hubitat Maker API access token"
group = 1

[[detector.patterns]]
regex = "(?:hubitat|HUBITAT)[._-]?(?:APP[_-]?ID|app[_-]?id)[=:\\s\"'']+(\\d+)"
description = "Hubitat Maker API application ID"
group = 1

[[detector.patterns]]
regex = "access_token[=:\\s\"'']+([a-f0-9]{32,40})[\\s\\S]{0,50}hubitat"
description = "Access token near Hubitat context"
group = 1

[[detector.tests]]
test_positive = "HUBITAT_ACCESS_TOKEN=83872b81e8e47b73d953e93a0df6213963265ab6"
test_negative = "HUBITAT_ACCESS_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
