# Docs: https://docs2.hubitat.com/apps/maker-api
# Format: Maker API access token (hex string) and App ID (numeric)
# Verify: GET /apps/api/APP_ID/devices with access_token query param
# Prefix: none (requires context anchoring)

[detector]
id = "hubitat-api-credentials"
name = "Hubitat Maker API Credentials"
service = "hubitat"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
# "app_id" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept). Recall-neutral.
keywords = ["hubitat", "maker_api", "access_token"]

[[detector.patterns]]
regex = '''(?:hubitat|HUBITAT)[._-]?(?:ACCESS[_\-\s]*TOKEN|access[_\-\s]*token)[=:\s"'']+([a-f0-9]{32,40})'''
description = "Hubitat Maker API access token"
group = 1

[[detector.patterns]]
regex = '''(?:hubitat|HUBITAT)[._-]?(?:APP[_\-\s]*ID|app[_\-\s]*id)[=:\s"'']+(\d+)'''
description = "Hubitat Maker API application ID"
group = 1

[[detector.patterns]]
regex = "access_token[=:\\s\"'']+([a-f0-9]{32,40})[\\s\\S]{0,50}hubitat"
description = "Access token near Hubitat context"
group = 1

[[detector.tests]]
test_positive = "HUBITAT_ACCESS_TOKEN=83872b81e8e47b73d953e93a0df6213963265ab6"
test_negative = "HUBITAT_ACCESS_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
