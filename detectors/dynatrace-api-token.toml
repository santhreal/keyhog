# Docs: https://docs.dynatrace.com/docs/manage/identity-access-management/access-tokens-and-oauth-clients/access-tokens
# Format: dt0[a-z]{1}[0-9]{2}.[A-Z0-9]{24}.[A-Z0-9]{64} (three-part dot-separated format)
# Verify: GET /api/v1/tokens with Api-Token authorization header
# Prefix: dt0

[detector]
id = "dynatrace-api-token"
name = "Dynatrace API Token"
service = "dynatrace"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["dt0", "dynatrace", "Api-Token"]

[[detector.patterns]]
regex = "dt0[a-zA-Z][0-9]{2}\\.[A-Z0-9]{24}\\.[A-Z0-9]{64}"
description = "Dynatrace API token (new format with dt0 prefix)"

[[detector.patterns]]
regex = '''(?:dynatrace|DYNATRACE)[_.]?(?:api[_\-\s]*token|token)[=:\s"'']+(dt0[a-zA-Z][0-9]{2}\.[A-Z0-9]{24}\.[A-Z0-9]{64})'''
description = "Dynatrace API token with context anchor"
group = 1

[[detector.tests]]
test_positive = "dt0c01.A9C7E3F1B5D2H8K4N6P0Q8R2.Z3X8N7Y2V6W1H4G9B5D3F8K2L4M6Q1R7T0P3X8N7Y2V6W1H4G9B5D3F8K2L4M6Q1"
test_negative = "dt0c01.SHORT.SHORT"
