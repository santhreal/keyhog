# Docs: https://developer.adobe.com/stock/docs/getting-started/
# Format: Client ID from Adobe Developer Console (32-40 char hex)
# Verify: GET /Rest/Media/1/Search/Files with X-Product header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "adobe-stock-api-key"
name = "Adobe Stock API Key"
service = "adobe-stock"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["ADOBE", "adobe", "STOCK", "stock"]

[[detector.patterns]]
regex = '(?:ADOBE|adobe)[._-]?(?:STOCK|stock)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\s""]+([a-f0-9]{32,40})'
description = "Adobe Stock API key with context anchor"
group = 1

[[detector.patterns]]
regex = '(?:ADOBE|adobe)[._-]?(?:STOCK|stock)[._-]?(?:CLIENT|client)[._-]?(?:ID|id)[=:\s""]+([a-f0-9]{32,40})'
description = "Adobe Stock Client ID with context anchor"
group = 1

[[detector.companions]]
name = "adobe-stock-client-secret"
regex = '(?:ADOBE|adobe)[._-]?(?:STOCK|stock)[._-]?(?:CLIENT|client)[._-]?(?:SECRET|secret)[=:\s""]+[a-f0-9]{32,48}'
within_lines = 5
[detector.verify]
method = "GET"
url = "https://stock.adobe.io/Rest/Media/1/Search/Files?search_parameters[words]=test"
allowed_domains = ["stock.adobe.io"]

[detector.verify.auth]
type = "header"
name = "X-Product"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ADOBE_STOCK_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ADOBE_STOCK_API_KEY=short"
