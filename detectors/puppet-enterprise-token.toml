# Docs: https://help.puppet.com/pe/2023.8/topics/rbac_token_auth_intro.htm
# Format: RBAC token - alphanumeric string used with X-Authentication header
# Verify: GET /rbac-api/v1/users with X-Authentication header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "puppet-enterprise-token"
name = "Puppet Enterprise RBAC Token"
service = "puppet-enterprise"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["puppet-access", "X-Authentication", "puppet.rbac", "PE_TOKEN"]

[[detector.patterns]]
regex = '''(?:PE_TOKEN|PUPPET[_\-\s]*TOKEN|PUPPET[_\-\s]*RBAC[_\-\s]*TOKEN)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Puppet Enterprise RBAC token with context anchor"
group = 1

[[detector.patterns]]
regex = "X-Authentication[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Puppet Enterprise X-Authentication header token"
group = 1

[[detector.patterns]]
regex = "puppet-access\\s+login.*--service-url.*([a-zA-Z0-9_-]{20,})"
description = "Puppet Enterprise token from puppet-access command"
group = 1

[[detector.tests]]
test_positive = "PE_TOKEN=df2C-IwsG2vZK2btF61X"
test_negative = "PE_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
