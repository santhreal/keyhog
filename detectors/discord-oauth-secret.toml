# Docs: https://discord.com/developers/docs/topics/oauth2
# Format: OAuth client secret - 32-64 alphanumeric characters (no unique prefix)
# Verify: POST to discord.com/api/oauth2/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "discord-oauth-secret"
name = "Discord OAuth Client Secret"
service = "discord"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["DISCORD_CLIENT_SECRET", "discord_client_secret", "DISCORD_OAUTH"]

[[detector.patterns]]
regex = "(?:DISCORD|discord)[_.]?(?:CLIENT|client|OAUTH|oauth)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{32,64})"
description = "Discord OAuth client secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "DISCORD_CLIENT_SECRET=ZX0SakOvfcEiU6MgQmtf61SR1jdCcIKr"
test_negative = "DISCORD_CLIENT_SECRET=short"
