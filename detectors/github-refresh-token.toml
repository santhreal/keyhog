# Docs: https://docs.github.com/en/authentication
# Format: ghr_ prefix followed by 36 alphanumeric characters
# Prefix: ghr_

[detector]
id = "github-refresh-token"
name = "GitHub Refresh Token"
service = "github"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ghr_"]

[[detector.patterns]]
regex = 'ghr_[A-Za-z0-9]{36}'
description = "GitHub Refresh Token (ghr_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.github.com/user"
allowed_domains = ["api.github.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[[detector.verify.headers]]
name = "User-Agent"
value = "keyhog-secret-scanner/{{version}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "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"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
