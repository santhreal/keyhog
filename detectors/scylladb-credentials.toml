# Docs: https://cloud.docs.scylladb.com/stable/api-docs/
# Format: ScyllaDB Cloud uses personal access tokens (alphanumeric) for API authentication
# Verify: GET /api/v1/clusters with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "scylladb-credentials"
name = "ScyllaDB Credentials"
service = "scylladb"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["SCYLLADB", "SCYLLA_TOKEN", "SCYLLA_CLOUD", "SCYLLADB_API"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:SCYLLA(?:DB)?[_\-\s]*(?:TOKEN|API[_\-\s]*TOKEN|CLOUD[_\-\s]*TOKEN))[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "ScyllaDB Cloud API token with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:SCYLLA(?:DB)?[_\-\s]*USERNAME)[=:\s"'']+([a-zA-Z0-9_-]+)'''
description = "ScyllaDB username with context anchor"
group = 1
weak_anchor = true

[[detector.companions]]
name = "ScyllaDB Password"
regex = '''(?:SCYLLA(?:DB)?[_\-\s]*PASSWORD)[=:\s"'']+[a-zA-Z0-9_-]+'''
within_lines = 5

[[detector.tests]]
test_positive = "SCYLLA_TOKEN=NUuWFGMt567ege1hrYjO"
test_negative = "SCYLLA_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
