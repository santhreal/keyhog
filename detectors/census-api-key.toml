# Docs: https://docs.getcensus.com/
# Format: Census Organization API token or Personal Access Token
# Verify: GET /api/v1/users with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "census-api-key"
name = "Census API Key"
service = "census"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["CENSUS", "census", "CENSUS_API_KEY", "CENSUS_TOKEN"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32, 40, 48, 64] }]

[[detector.patterns]]
regex = "(?:CENSUS)[_.]?(?:API[._-]?KEY|TOKEN)[=:\\s\"'']+([a-zA-Z0-9]{32,})"
description = "Census API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:census)[_.]?(?:api[._-]?key|token)[=:\\s\"'']+([a-zA-Z0-9]{32,})"
description = "Census API key lowercase context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://app.getcensus.com/api/v1/users"
allowed_domains = ["app.getcensus.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "CENSUS_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "CENSUS_API_KEY=short"
