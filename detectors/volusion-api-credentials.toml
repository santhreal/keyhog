# Docs: https://help.volusion.com/en/articles/1613498-api-overview
# Format: Encrypted password (32 hex chars) + Admin username + Store URL
# Verify: GET to /net/WebService.aspx with encrypted password
# Prefix: none (requires context anchoring)

[detector]
id = "volusion-api-credentials"
name = "Volusion API Credentials"
service = "volusion"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["volusion", "VOLUSION", "encrypted_password", "api_login", "WebService.aspx"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:volusion|VOLUSION)[_=:\s"'']+(?:encrypted[_\-\s]*password|api[_\-\s]*password)[=:\s"'']+([a-f0-9]{32})'''
description = "Volusion API encrypted password with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:volusion|VOLUSION)[_=:\s"'']+(?:api[_\-\s]*login|username)[=:\s"'']+([a-zA-Z0-9._-]+)'''
description = "Volusion API login username with context anchor"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "volusion   _'    :\"__   encryptedpassword'     :             ':  =  \":\"   =  '70e674c07a4711d92a86556ab272a76a"
test_negative = "volusion   _'    :\"__   encryptedpassword'     :             ':  =  \":\"   =  'YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
