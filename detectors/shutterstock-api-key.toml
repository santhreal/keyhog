# Docs: https://developers.shutterstock.com/documentation
# Format: Consumer Key and Consumer Secret (alphanumeric, ~32 chars each)
# Verify: GET /v2/images/search with basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "shutterstock-api-key"
name = "Shutterstock API Key"
service = "shutterstock"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
# "consumer_key", "consumer_secret" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept). Recall-neutral.
keywords = ["SHUTTERSTOCK", "shutterstock"]

[[detector.patterns]]
regex = '(?:SHUTTERSTOCK|shutterstock)[._-]?(?:CONSUMER|consumer)[._-]?(?:KEY|key)[=:\s""]+([a-zA-Z0-9_-]{32,})'
description = "Shutterstock consumer key with context anchor"
group = 1

[[detector.patterns]]
regex = '(?:SHUTTERSTOCK|shutterstock)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\s""]+([a-zA-Z0-9_-]{32,})'
description = "Shutterstock API key with context anchor"
group = 1

[[detector.companions]]
name = "shutterstock-consumer-secret"
regex = '(?:SHUTTERSTOCK|shutterstock)[._-]?(?:CONSUMER|consumer)[._-]?(?:SECRET|secret)[=:\s""]+([a-zA-Z0-9_-]{32,})'
within_lines = 5

[[detector.tests]]
test_positive = "SHUTTERSTOCK_API_KEY=dc14-049UaGtL0KsrlVLnuwXuAU5wooM"
test_negative = "SHUTTERSTOCK_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
