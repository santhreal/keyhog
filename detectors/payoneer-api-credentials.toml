# Docs: https://developer.payoneer.com/psd2/get-started
# Format: Client ID and Client Secret for OAuth2 authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "payoneer-api-credentials"
name = "Payoneer API Credentials"
service = "payoneer"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["PAYONEER", "payoneer", "PayoneerClientId", "PayoneerSecret"]

[[detector.patterns]]
regex = "(?i)payoneer[_.]?(?:client[_.]?secret|api[_.]?secret)[=:\\s\"']+([a-zA-Z0-9_-]{20,})(?:[^a-zA-Z0-9_-]|$)"
description = "Payoneer Client Secret with context anchor"
group = 1

[[detector.companions]]
name = "Payoneer client ID"
regex = "(?i)payoneer[_.]?client[_.]?id[=:\\s\"']+([a-zA-Z0-9_-]{20,})(?:[^a-zA-Z0-9_-]|$)"
within_lines = 5

[[detector.tests]]
test_positive = "PAYONEERCLIENTSECRET=0XDdFBQiYgzN6zGNHJk7ky3v1b89yfc1DIbzaRI_hy"
test_negative = "PAYONEERCLIENTSECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
