# Docs: https://goteleport.com/docs/reference/join-methods/
# Format: Join tokens are random strings or UUID-like, often in tctl commands or config files
# Verify: no public verification endpoint (Teleport is self-hosted)
# Prefix: none (requires context anchoring)

[detector]
id = "teleport-credentials"
name = "Teleport Credentials"
service = "teleport"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# Removed bare `auth_token` keyword: every service emits values
# under that field; the broad shape made teleport-credentials
# the #1 false-positive source on generic protobuf/k8s-shape
# fixtures in the SecretBench mirror corpus. Teleport's real
# surfaces all spell `TELEPORT_*` or use `tctl`/`teleport_token`;
# tighten to those.
keywords = ["TELEPORT_AUTH_TOKEN", "TELEPORT_PROXY_TOKEN", "TELEPORT", "tctl", "teleport_token", "proxy_token"]

[[detector.patterns]]
# Tightened: drop the catch-all `auth_token` alternative. The
# `teleport_token`/`proxy_token` env-var names are uniquely
# teleport's - no other tool ships them under those identifiers.
regex = "(?:TELEPORT_AUTH_TOKEN|TELEPORT_PROXY_TOKEN|teleport_token|proxy_token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Teleport authentication token in environment variable"
group = 1

[[detector.patterns]]
regex = "tctl\\s+(?:tokens\\s+add|auth\\s+sign).{0,100}?(--token|token[=:\\s\"'']+)([a-zA-Z0-9_-]{20,})"
description = "Teleport token in tctl command"
group = 2

[[detector.tests]]
test_positive = "TELEPORT_AUTH_TOKEN= ''=  : \"\"   =    =   =\"    \" \"' = \"   :=   =       =\"\" '\"   =   =' :ZAOruHaF3QjNZzFWmvWmil-gzx1rVJEJumWonOs0RTNf54QVHP3cn8fLFtV5iTuy8ymH2Cn0RnV2ho2aJn7ADtc7ltW"
test_negative = "TELEPORT_AUTH_TOKEN= ''=  : \"\"   =    =   =\"    \" \"' = \"   :=   =       =\"\" '\"   =   =' :YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
