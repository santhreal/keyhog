# Docs: https://docs.joinmastodon.org/api/authentication/
# Format: 64-character hexadecimal string (OAuth access token)
# Verify: GET /api/v1/accounts/verify_credentials with Bearer token
# Prefix: none (64 char hex, requires context anchoring)

[detector]
id = "mastodon-api-token"
name = "Mastodon API Access Token"
service = "mastodon"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["mastodon", "MASTODON", "access_token", "access token"]

[[detector.patterns]]
regex = '''(?:mastodon|MASTODON|access[_\-\s]*token)[=:\s"\']+([a-f0-9]{64})'''
description = "Mastodon OAuth access token with context anchor"
group = 1

[[detector.tests]]
test_positive = "mastodon=ed60ba139c8585a100f4e152ccbb8e98725b17fbddb5169c6d27e2bc86085f9f"
test_negative = "mastodon=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
