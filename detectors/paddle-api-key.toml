# Docs: https://developer.paddle.com/api-reference/about/api-keys
# Format: pdl_live_apikey_ or pdl_sdbx_apikey_ prefix followed by alphanumeric characters and underscores
# Verify: GET /v2/products with Authorization header returns 200 if valid
# Prefix: pdl_live_apikey_, pdl_sdbx_apikey_

[detector]
id = "paddle-api-key"
name = "Paddle API Key"
service = "paddle"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["pdl_live_apikey_", "pdl_sdbx_apikey_", "PADDLE_API_KEY"]

[[detector.patterns]]
regex = 'pdl_(?:live|sdbx)_apikey_[a-zA-Z0-9_]{30,}'
description = "Paddle API key (pdl_live_apikey_ or pdl_sdbx_apikey_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.paddle.com/v2/products"
allowed_domains = ["api.paddle.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pdl_live_apikey_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "pdl_live_apikey_short"
