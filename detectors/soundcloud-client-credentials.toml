# Docs: https://developers.soundcloud.com/docs/api/guide
# Format: OAuth 2.1 client_id and client_secret (alphanumeric strings)
# Verify: POST /oauth/token with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "soundcloud-client-credentials"
name = "SoundCloud Client Credentials"
service = "soundcloud"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SOUNDCLOUD_CLIENT_ID", "SOUNDCLOUD_CLIENT_SECRET", "soundcloud_client_id", "soundcloud_client_secret"]

[[detector.patterns]]
regex = '''(?:SOUNDCLOUD|soundcloud)[_\-\s]*(?:CLIENT|client)[_\-\s]*(?:ID|id)[=:\s"'']+([a-zA-Z0-9]{20,32})'''
description = "SoundCloud client ID with context anchor"
group = 1

[[detector.companions]]
name = "soundcloud_credential_pair"
regex = '''(?:SOUNDCLOUD|soundcloud)[_\-\s]*(?:CLIENT|client)[_\-\s]*(?:SECRET|secret)[=:\s"'']+([a-zA-Z0-9]{20,32})'''
within_lines = 5

[[detector.tests]]
test_positive = "SOUNDCLOUD_CLIENT_ID=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q\nSOUNDCLOUD_CLIENT_SECRET=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn"
test_negative = "soundcloud_client_id=tooShort"
