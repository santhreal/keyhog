# Docs: https://help.xmatters.com/ondemand/xmodwelcome/communicationplanbuilder/appendixrestapi.htm
# Format: API key with xm-api-key- prefix followed by alphanumeric characters
# Verify: GET /api/xm/1/people with Authorization header
# Prefix: xm-api-key-

[detector]
id = "xmatters-api-credentials"
name = "xMatters API Credentials"
service = "xmatters"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["xm-api-key-", "XMATTERS_API_KEY", "xmatters"]

[[detector.patterns]]
regex = 'xm-api-key-[a-zA-Z0-9]{40,}'
description = "xMatters API key with xm-api-key- prefix"

[detector.verify]
method = "GET"
url = "https://company.xmatters.com/api/xm/1/people"
allowed_domains = ["company.xmatters.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "xm-api-key-ses4A0YOsJsXAr9Tkkxaj4Y147YQQK2Ir1T0zvUGxNOWOXcrq21uoRWgJovdAchsBAo"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
