# Docs: https://developers.snapchat.com/api/marketing/
# Format: 64-character hexadecimal string for Marketing API access token
# Verify: GET /me with Authorization: Bearer header
# Prefix: none (64-char hex, requires context anchoring)

[detector]
id = "snapchat-api-token"
name = "Snapchat Marketing API Token"
service = "snapchat"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["snapchat", "SNAPCHAT", "snap_chat", "Snapchat"]

[[detector.patterns]]
regex = "(?:snapchat|SNAPCHAT)[_\\-\\s]*(?:api[_\\-\\s]*key|API[_\\-\\s]*KEY|access[_\\-\\s]*token|ACCESS[_\\-\\s]*TOKEN)[=: \\s\"'']+([a-f0-9]{64})"
description = "Snapchat Marketing API access token (64-char hex) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:snapchat|SNAPCHAT)[_\\-\\s]*(?:client[_\\-\\s]*id|CLIENT[_\\-\\s]*ID)[=: \\s\"'']+([a-f0-9]{32,})"
description = "Snapchat client ID with context anchor"
group = 1

[[detector.tests]]
test_positive = "SNAPCHAT_API_KEY=a573881b385d7370d17ec84d8f8264a6f9a8d7709bc9323e8be592ba1c474c1a"
test_negative = "SNAPCHAT_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
