# Docs: https://cloud.google.com/looker/docs/admin-panel-users#authentication
# Format: Client ID and Client Secret pair, or API3 credentials
# Verify: POST /login with client_id and client_secret
# Prefix: none (requires context anchoring)

[detector]
id = "looker-api-credentials"
name = "Looker API Credentials"
service = "looker"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
min_confidence = 0.20
keywords = ["LOOKER", "looker", "LOOKERSDK", "LOOKER_CLIENT"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:LOOKER|looker|LOOKERSDK)[._-]?(?:base[_\-\s]*url|host|url)[=:\s"'']+(https?://[a-z0-9.-]+\.looker\.com(?::[0-9]+)?)'''
description = "Looker instance URL"
group = 1

[[detector.patterns]]
regex = '''(?:LOOKER|looker|LOOKERSDK)[._-]?(?:client[_\-\s]*id)[=:\s"'']+([a-zA-Z0-9_-]+)'''
description = "Looker API client ID"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = '''(?:LOOKER|looker|LOOKERSDK)[._-]?(?:client[_\-\s]*secret)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Looker API client secret"
group = 1

[[detector.patterns]]
regex = '''(?:LOOKER|looker)[._-]?(?:api[_\-\s]*key|token)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Looker API key/token"
group = 1

[[detector.patterns]]
regex = "(?:LOOKER|looker)[._-]?(?:username|user)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Looker username"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:LOOKER|looker)[._-]?(?:password|pass|pwd)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "Looker password"
group = 1

[[detector.patterns]]
regex = '''(?:LOOKER|looker|LOOKERSDK)[._-]?(?:verify[_\-\s]*ssl)[=:\s"'']+(false|true)'''
description = "Looker SSL verification setting"
group = 1

[[detector.tests]]
test_positive = "LOOKERSDK_base_url=https://demo.cloud.looker.com:19999"
test_negative = "LOOKERSDK_BASE_URL=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
