# Docs: https://developer.spotify.com/documentation/web-api/concepts/authorization
# Format: OAuth 2.0 client_id and client_secret (32 hex chars each)
# Verify: POST /api/token with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "spotify-client-credentials"
name = "Spotify Client Credentials"
service = "spotify"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
min_confidence = 0.2
keywords = ["SPOTIFY_CLIENT_ID", "SPOTIFY_CLIENT_SECRET", "spotify_client_id", "spotify_client_secret"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32] }]

[[detector.patterns]]
regex = "SPOTIFY_CLIENT_ID=([a-f0-9]{32})"
description = "Spotify client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "SPOTIFY_CLIENT_SECRET=([a-f0-9]{32})"
description = "Spotify client secret with context anchor"
group = 1

[[detector.companions]]
name = "spotify_credential_pair"
# Primary patterns are caseless; companion patterns are not. Fold only the
# config-key anchor and capture the secret body so a client-ID finding cannot
# incorrectly attach its own assignment as the supposed credential pair.
regex = "(?i:SPOTIFY[._-]?CLIENT[._-]?SECRET)[=:\\s\"']+([a-f0-9]{32})"
within_lines = 5

[[detector.tests]]
test_positive = "SPOTIFY_CLIENT_ID=25b7136a1e10908bb8e7a0f15e1a29d2"
test_negative = "SPOTIFY_CLIENT_ID=short"

[[detector.tests]]
test_positive = "spotify_client_id=25b7136a1e10908bb8e7a0f15e1a29d2"
