# Docs: https://xata.io/docs/rest-api/authentication
# Format: xau_ prefix followed by 40+ alphanumeric characters
# Verify: GET /db with Authorization header returns 200 if valid
# Prefix: xau_

[detector]
id = "xata-api-key"
name = "Xata API Key"
service = "xata"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["xau_", "XATA_API_KEY", "xata.io"]

[[detector.patterns]]
regex = 'xau_[a-zA-Z0-9_-]{40,}'
description = "Xata API key (xau_ prefix)"

# Each Xata workspace lives under `<workspace>-<region>.xata.sh`. The
# previous verify spec used single-brace `{workspace}.{region}` template
# syntax that the interpolator never honored - every verification hit a
# literal `{workspace}.{region}.xata.sh` and 4xx'd. Capture the workspace
# URL via a companion and template the actual host into the verify URL.
[[detector.companions]]
name = "xata_workspace_url"
regex = 'https://[a-z0-9-]+\.xata\.sh'
within_lines = 5

[detector.verify]
method = "GET"
url = "{{companion.xata_workspace_url}}/db"
allowed_domains = ["xata.sh"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "XATA_API_KEY=xau_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz\nXATA_DATABASE_URL=https://acme-eu-west-1.xata.sh"
test_negative = "xau_short"
