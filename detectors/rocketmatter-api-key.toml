# Docs: https://rocketmatter.com/api-documentation/
# Format: API token - typically alphanumeric string 32+ characters
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "rocketmatter-api-key"
name = "Rocket Matter API Key"
service = "rocketmatter"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["ROCKETMATTER_API_KEY", "ROCKETMATTER_TOKEN", "rocketmatter_api_key", "X-RocketMatter-Token"]

[[detector.patterns]]
regex = '''(?:ROCKETMATTER|rocketmatter)[_\-\s]*(?:API[_\-\s]*KEY|TOKEN)[=:\s"'']+([a-zA-Z0-9_\-]{32,})'''
description = "Rocket Matter API key or token with context anchor"
group = 1

[[detector.tests]]
test_positive = "ROCKETMATTER_API_KEY=I6UVvY8k-yckXfBWAw9l_uB8_PdVm1lU"
test_negative = "ROCKETMATTER_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
