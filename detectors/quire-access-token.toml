# Docs: https://quire.io/dev/api/
# Format: OAuth 2.0 bearer token, variable length alphanumeric
# Verify: GET /api/user/id/me with Bearer token returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "quire-access-token"
name = "Quire Access Token"
service = "quire"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["QUIRE_ACCESS_TOKEN", "QUIRE_TOKEN"]

[[detector.patterns]]
regex = "(?:QUIRE_ACCESS_TOKEN|QUIRE_TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{40,60})"
description = "Quire OAuth 2.0 access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://quire.io/api/user/id/me"
allowed_domains = ["quire.io"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "QUIRE_ACCESS_TOKEN=eE8XKMnpZdyWVAXwaoLEANLxlrPMqNHPvp01FjDSnhwpVmwm"
test_negative = "QUIRE_ACCESS_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
