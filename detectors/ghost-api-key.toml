# Docs: https://ghost.org/docs/admin-api/
# Format: Admin API Key is id:secret pair (both hex), used to generate JWT
# Verify: POST to /admin/session endpoint to generate JWT, then use in subsequent requests
# Prefix: none (id:secret format with context anchoring)

[detector]
id = "ghost-api-key"
name = "Ghost CMS Admin API Key"
service = "ghost"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ghost", "GHOST", "admin_api_key", "ghost_admin"]

[[detector.patterns]]
regex = '''(?:ghost|GHOST|admin[_\-\s]*api[_\-\s]*key|GHOST[_\-\s]*ADMIN)[=:\s"\']+([a-f0-9]{24}:[a-f0-9]{64})'''
description = "Ghost Admin API key in id:secret format"
group = 1

[[detector.tests]]
test_positive = "ghost=7ad8f0e2b92e5ced64d451b1:4cd92e59a6c00bd1bae3cb0e5e60f5fc4caeb9820206cf156659251c39592cb5"
test_negative = "ghost=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
