# Docs: https://dev.clever.com/docs/authentication
# Format: OAuth 2.0 client ID + client secret, or district bearer tokens
# Verify: GET /oauth/tokens with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "clever-api-credentials"
name = "Clever API Credentials"
service = "clever"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["clever", "CLEVER", "clever_api", "clever.com"]

[[detector.patterns]]
regex = "(?:clever)[_\\s.-]*(?:client[_\\s.-]*id)[=:\\s\"'']+([a-f0-9]{24})"
description = "Clever OAuth client ID (24 hex chars) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:clever)[_\\s.-]*(?:client[_\\s.-]*secret)[=:\\s\"'']+([a-f0-9]{64})"
description = "Clever OAuth client secret (64 hex chars) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:clever)[_\\s.-]*(?:token|bearer)[=:\\s\"'']+(TEST|[a-f0-9]{64}|[a-zA-Z0-9_-]{100,})"
description = "Clever API access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.clever.com/v3.0/me"
allowed_domains = ["api.clever.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "clever_client_id=7b3e5d8c1a9f4e2b6c8d3a5e"
test_negative = "clever_client_id=7b3e5d8c1a9f4e2b6c8d3a"
