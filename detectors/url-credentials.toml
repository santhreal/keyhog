# Generic URL userinfo credential: `scheme://[user]:<password>@host`.
#
# Why this detector:
#   On the Samsung/CredData benchmark the "URL Credentials" class is ~210
#   labeled positives whose value is the password embedded in a URI authority
#   (`ftp://user:pxidztpv@host`, `redis://:pw@host`, `amqp://guest:pw@host`,
#   `http://john.doe:pw@proxy`, `mqtt://u:pw@broker`, ...). keyhog already had
#   SCHEME-SPECIFIC connection-string detectors (mongodb/mysql/postgres/redis),
#   but they only cover four database schemes and capture the whole URL â€” every
#   ftp/http/https/amqp/mqtt/git/svn userinfo password fell through. This is the
#   one generic detector for the userinfo password across ANY scheme.
#
# Why it is precise â€” and why it is STRONG-anchor (not weak):
#   The password lives in a structurally fixed slot â€” after the userinfo colon,
#   before `@`. We capture ONLY that slot (group 1), never the host/port/path.
#   The bulk of the real CredData userinfo passwords are SHORT all-lowercase
#   random strings (`pxidztpv`, `zavvfuco`, `vvaitgiz`, `hjxzyi`) that the
#   generic random-vs-dictionary floor DECLINES â€” yet they are credentials by
#   URI structure. So this detector is deliberately strong-anchor (NOT in the
#   `weak_anchor` list): the suppression pipeline then skips the Tier-B
#   randomness floor (`apply_tier_b=false`) and those random values surface.
#   Precision against placeholders is restored without re-imposing that floor:
#     * the value is `{6,128}` â€” the canonical SHORT placeholders (`pass`,
#       `admin`, `root`, `user`) are <6 chars and never match;
#     * the regex excludes `<` `>`, so `user:<password>@` templates never match;
#     * the Tier-A `syntactic_punctuation_marker` gate drops `user:$VAR@`;
#     * the `dictionary_word_placeholder` gate (api.rs, strong-anchor only)
#       drops a value the English bigram model is CONFIDENT is a real word
#       (`user:password@`, `user:secret@`) while keeping random tokens, whose
#       bigrams score below the English threshold.
#
# Mirror safety:
#   The mirror corpus's only userinfo URLs are 268 `mongodb+srv://` planted
#   POSITIVES â€” there are zero `://user:random@` negatives â€” so re-surfacing
#   them (dedup'd by value against the mongodb detector) cannot add a mirror FP.
#
# Verify: no verification endpoint (the protected resource is host-specific).

[detector]
id = "url-credentials"
name = "URL Userinfo Credentials"
service = "generic"
severity = "high"
keywords = ["://"]
# Strong-anchor free-form password slot: apply the placeholder-word gate, skip
# the Tier-B randomness floor (family declared per-detector, see DetectorSpec).
structural_password_slot = true

[[detector.patterns]]
# scheme `://` [user] `:` (password) `@` host-char.
#   - scheme: `[a-z][a-z0-9+.-]*` (case-insensitive; `+` admits `mongodb+srv`)
#   - user:  `[^/@\s:]*` â€” may be empty (`redis://:pw@host`); no colon so the
#            FIRST colon is unambiguously the user/password separator
#   - value: `([^/@\s<>]{6,128})` â€” up to the `@`; `<` `>` excluded so
#            `<password>` templates never match; `/` excluded so the capture
#            stays inside the authority (cannot run into the path); the `6`
#            floor drops the short canonical placeholders (`pass`, `admin`)
#   - the trailing `@[a-z0-9._-]` requires a real host char after `@`, so a
#            stray `foo:bar@` at end of prose does not trip it.
regex = '''(?i)[a-z][a-z0-9+.-]*://[^/@\s:]*:([^/@\s<>]{6,128})@[a-z0-9._-]'''
description = "password embedded in a URL userinfo component (any scheme)"
group = 1

# No verify block â€” generic detector, protected resource is host-specific.

[[detector.tests]]
test_positive = "ftp://deploy:Xy9KmPq2LvWnB7tR@ftp.internal.example.com:8021/release/"
test_negative = "https://username:password@repo.example.org/team/repo.git"
