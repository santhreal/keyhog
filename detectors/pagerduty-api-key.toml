# Docs: https://support.pagerduty.com/main/docs/api-access-keys
# Format: 32-character lowercase alphanumeric string
# Verify: GET /users with Authorization: Token token=<key> returns 200 if valid
# Prefix: none (generic alphanumeric, requires keyword context)

[detector]
id = "pagerduty-api-key"
name = "PagerDuty API Key"
service = "pagerduty"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["PAGERDUTY", "pagerduty", "PD_API_KEY", "PAGERDUTY_API_KEY", "Token token="]

[[detector.patterns]]
regex = "(?:PAGERDUTY|pagerduty)[._]?(?:API|api)?[._]?(?:KEY|key)?[=:\\s\"']+([a-z0-9]{32})"
description = "PagerDuty REST API v2 key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.pagerduty.com/users"
allowed_domains = ["api.pagerduty.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Token token={{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "PAGERDUTY_API_KEY=k7p4qx9rm2sn5tb8vw3yz0a6b8c4d1f3"
test_negative = "PAGERDUTY_API_KEY=short"
