# Docs: https://supabase.com/docs/guides/api/api-keys
# Format: Management API key with sb_publishable_ or sb_secret_ prefix followed by 22 chars and 8-char checksum
# Verify: GET /v1/projects with Authorization header returns 200 if valid
# Prefix: sb_publishable_, sb_secret_

[detector]
id = "supabase-management-api-key"
name = "Supabase Management API Key"
service = "supabase"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["sb_publishable_", "sb_secret_", "SUPABASE_MANAGEMENT", "supabase.co"]

[[detector.patterns]]
regex = "sb_(?:publishable|secret)_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{8}"
description = "Supabase management API key (sb_publishable or sb_secret prefix)"

[[detector.patterns]]
regex = '''(?:SUPABASE|supabase)[_\-\s]*(?:MANAGEMENT|management)[_\-\s]*KEY[=:\s"'']+(sb_(?:publishable|secret)_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{8})'''
description = "Supabase management API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.supabase.com/v1/projects"
allowed_domains = ["api.supabase.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "sb_publishable_aBcDeFgHiJkLmNoPqRsTuV_AbCdEfGh"
test_negative = "sb_other_aBcDeFgHiJkLmNoPqRsTuV_AbCdEfGh"
