# Docs: https://developers.classlink.com/docs/getting-started
# Format: OAuth 2.0 bearer token or API key
# Verify: GET /v2/my/profile with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "classlink-api-credentials"
name = "ClassLink API Credentials"
service = "classlink"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["classlink", "CLASSLINK", "classlink_api", "onedrove"]

[[detector.patterns]]
regex = "(?:classlink|onedrove)[_\\s.-]*(?:api[_\\s.-]*)?(?:key|token)[=:\\s\"'']+([a-zA-Z0-9_-]{40,80})"
description = "ClassLink API key/bearer token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:classlink|onedrove)[_\\s.-]*(?:client[_\\s.-]*id)[=:\\s\"'']+([a-f0-9]{32})"
description = "ClassLink OAuth client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:classlink|onedrove)[_\\s.-]*(?:client[_\\s.-]*secret)[=:\\s\"'']+([a-zA-Z0-9_-]{40,64})"
description = "ClassLink OAuth client secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "classlink_api_key=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn"
test_negative = "classlink_api_key=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
