# Docs: https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm
# Format: RSA key pair with OCID identifiers for Oracle Cloud Infrastructure
# Verify: no public verification endpoint
# Prefix: ocid1

[detector]
id = "oracle-cloud-api-key"
name = "Oracle Cloud API Key"
service = "oracle-cloud"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["ocid1", "OCI_API_KEY", "OCI_FINGERPRINT", "OCI_TENANCY"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(ocid1\\.(?:user|tenancy)\\.oc1\\.[a-z0-9]+\\.[a-z0-9]{60,})"
description = "Oracle Cloud OCID identifier"
group = 1

[[detector.patterns]]
regex = "(?:OCI|oracle)[._-]?(?:fingerprint)[=:\\s\"'']+([a-f0-9]{2}(?::[a-f0-9]{2}){15})"
description = "Oracle Cloud API key fingerprint"
group = 1

[[detector.patterns]]
regex = "(?:OCI|oracle)[._-]?(?:region)[=:\\s\"'']+(us-|eu-|ap-|me-|sa-|ca-|uk-|au-)[a-z0-9-]+"
description = "Oracle Cloud region identifier"
group = 1

[[detector.patterns]]
regex = '''(?:OCI|oracle)[._-]?(?:api[_\-\s]*key|private[_\-\s]*key|key[_\-\s]*file)[=:\s"'']+([a-zA-Z0-9_/.-]+)'''
description = "Oracle Cloud API key file path"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:OCI|oracle)[._-]?(?:passphrase|key_passphrase)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "Oracle Cloud key passphrase"
group = 1

[[detector.tests]]
test_positive = "ocid1.user.oc1.mzks6yx4t4ccgj0myg6d0lm4ox2uush50dkkrmkkyrjn960x7560kzvq1m63t4yk7u2w13lo6hsegd223arj54.gcsxajsz0f04t9fbn8vhlnikxk7fpnge3blz5a53p5z3rp30p4xj851oqsbgruhnhv3ojp2icsyog"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
