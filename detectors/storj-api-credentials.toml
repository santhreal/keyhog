# Docs: https://storj.dev/dcs/access
# Format: S3-compatible access key (20 alphanumeric) and secret key (40 base64)
# Verify: none (decentralized storage, requires signature-based auth)
# Prefix: none (S3-compatible format, requires context anchoring)

[detector]
id = "storj-api-credentials"
name = "StorJ S3 API Credentials"
service = "storj"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["STORJ", "storj", "STORJ_ACCESS_KEY", "STORJ_SECRET", "gateway.storjshare.io"]

[[detector.patterns]]
regex = "(?:STORJ|storj)[._-]?(?:S3|s3)?[._-]?(?:ACCESS[._-]?)?(?:KEY|key)[=:\\s\"'']+([A-Z0-9]{20})"
description = "StorJ S3-compatible access key with context anchor"
group = 1

[[detector.companions]]
name = "secret_access_key"
regex = '''(?:STORJ[_\-\s]*SECRET(?:[_\-\s]*KEY)?|secret[_\-\s]*access[_\-\s]*key|aws[_\-\s]*secret[_\-\s]*access[_\-\s]*key)[=:\s"']+([A-Za-z0-9/+=]{40})'''
within_lines = 5

[[detector.tests]]
test_positive = "STORJ_ACCESS_KEY=RNF1H3ZNBFECPXUNY5EF"
test_negative = "STORJ_ACCESS_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
