# Docs: https://support.sigfox.com/docs/apicredentials
# Format: Login and password/API credentials for Sigfox API
# Verify: no public verification endpoint (discontinued service)
# Prefix: none (requires context anchoring)

[detector]
id = "sigfox-api-credentials"
name = "Sigfox API Credentials"
service = "sigfox"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["SIGFOX", "sigfox", "SIGFOX_API", "backend.sigfox"]

[[detector.patterns]]
regex = '''(?:SIGFOX|sigfox)[._-]?API[_\-\s]*LOGIN[=:\s"'']+([a-z0-9]{8,32})'''
description = "Sigfox API login ID"
group = 1

[[detector.patterns]]
regex = '''(?:SIGFOX|sigfox)[._-]?API[_\-\s]*PASSWORD[=:\s"'']+([a-f0-9]{16,64})'''
description = "Sigfox API password"
group = 1

[[detector.patterns]]
regex = '''(?:SIGFOX|sigfox)[._-]?API[_\-\s]*KEY[=:\s"'']+([a-f0-9]{16,64})'''
description = "Sigfox API key"
group = 1

[[detector.patterns]]
regex = "backend\\.sigfox\\.com/api"
description = "Sigfox backend API endpoint"

[[detector.tests]]
test_positive = "SIGFOXAPILOGIN=ux6ujzpc"
test_negative = "SIGFOXAPILOGIN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
