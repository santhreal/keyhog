# Docs: https://support.atlassian.com/opsgenie/docs/heartbeat-monitoring/
# Format: UUID format (8-4-4-4-12 hex characters)
# Verify: GET /v2/heartbeats with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "opsgenie-heartbeat-api-key"
name = "OpsGenie Heartbeat API Key"
service = "opsgenie"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["OPSGENIE_HEARTBEAT", "opsgenie_heartbeat", "GenieKey"]

[[detector.patterns]]
regex = "(?:OPSGENIE_HEARTBEAT|opsgenie.heartbeat)[=:\\s\"\\']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "OpsGenie heartbeat API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.opsgenie.com/v2/heartbeats"
allowed_domains = ["api.opsgenie.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "GenieKey {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "OPSGENIE_HEARTBEAT=740abf96-f0bb-5397-0c19-8650db0db039"
test_negative = "OPSGENIE_HEARTBEAT=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
