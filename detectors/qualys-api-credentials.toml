# Docs: https://docs.qualys.com/en/devportal/api_overview/
# Format: Username/Password (HTTP Basic Auth) or 32+ char API token
# Verify: GET /qps/rest/portal/version with HTTP Basic Auth
# Prefix: none (requires context anchoring)

[detector]
id = "qualys-api-credentials"
name = "Qualys API Credentials"
service = "qualys"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["QUALYS", "qualys.com", "QUALYS_USERNAME", "QUALYS_PASSWORD"]

[[detector.patterns]]
regex = "(?:QUALYS|qualys)(?:_|-|.)(?:PASS(?:WORD)?|pass(?:word)?)?[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*]{12,})"
description = "Qualys API password with context anchor"
group = 1

[[detector.companions]]
name = "qualys_username"
regex = "(?:QUALYS|qualys)(?:_|-|.)(?:USER(?:NAME)?|user(?:name)?)?[=:\\s\"'']+[a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+\\.[a-zA-Z]{2,}"
within_lines = 3
[detector.verify]
method = "GET"
url = "https://qualysapi.qualys.com/qps/rest/portal/version"
allowed_domains = ["qualysapi.qualys.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "QUALYS: Ebbt5xjwLUIN"
test_negative = "QUALYS: YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
