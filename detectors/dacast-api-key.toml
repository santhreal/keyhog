# Docs: https://docs.dacast.com/docs/api-key-documentation
# Format: API Key is a 32-character alphanumeric string
# Verify: GET /v3/lives with X-Api-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "dacast-api-key"
name = "Dacast API Key"
service = "dacast"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["dacast", "DACAST", "dacast.com", "BROADKEY"]

[[detector.patterns]]
regex = '''(?:dacast|DACAST)[_\-\s]*(?:api_key|API_KEY|apikey)[=:\s"'']+([a-f0-9]{32})'''
description = "Dacast API Key with context anchor"
group = 1

[[detector.patterns]]
regex = "DACAST_API_KEY[=:\\s\"'']+([a-f0-9]{32})"
description = "Dacast API Key from environment variable"
group = 1

[[detector.patterns]]
regex = "(?:BROADKEY|broadkey)[=:\\s\"'']+([a-f0-9]{32})"
description = "Dacast Broadkey (legacy name) with context anchor"
group = 1

[[detector.tests]]
test_positive = "DACAST_apikey = e8b57db06c18562a458356bda6c62f31"
test_negative = "dacast_api_key=94b3"
