# Docs: https://prometheus.io/docs/alerting/latest/configuration/#webhook_config
# Format: Webhook URL with embedded basic auth or bearer token for alert notifications
# Verify: no public verification endpoint (webhook receiver specific)
# Prefix: none (requires context anchoring)

[detector]
id = "prometheus-alertmanager-webhook"
name = "Prometheus Alertmanager Webhook"
service = "prometheus"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["webhook_configs", "webhook_url", "alertmanager"]

[[detector.patterns]]
regex = "webhook_configs:\\s*\\n\\s*-\\s*url:\\s*[\"\\']?https?://[^:]+:([^@]+)@[a-zA-Z0-9.-]+"
description = "Alertmanager webhook URL with embedded credentials"
group = 1

[[detector.patterns]]
regex = "(?:webhook_url|webhook\\.url)[=:\\s\"\\']+(https?://[a-zA-Z0-9._-]+/hooks/[a-zA-Z0-9/_-]+)"
description = "Generic webhook URL in Alertmanager config"
group = 1

[[detector.tests]]
test_positive = "webhook_url=https://_EAl6PnnHt219ecRFVqmq.KCUwXJEgxe8lSfCNbSuBUhXRem2nao7nKXJrNvv/hooks/Iy"
test_negative = "webhook_url=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
