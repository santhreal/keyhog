# Docs: https://advertising.amazon.com/API/docs/en-us/get-started/generate-api-tokens
# Format: amzn1.application-oa2-client.xxxxxxxx followed by a client secret
# Verify: POST to https://api.amazon.com/auth/o2/token with client credentials
# Prefix: amzn1.application-oa2-client.

[detector]
id = "amazon-advertising-api-credentials"
name = "Amazon Advertising API Credentials"
service = "amazon-advertising"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["amzn1.application-oa2-client", "amazon_advertising", "amazon_ads"]

[[detector.patterns]]
regex = "(?:amzn1\\.application-oa2-client\\.)[a-zA-Z0-9_-]+"
description = "Amazon Advertising API client ID (amzn1.application-oa2-client. prefix)"

[[detector.companions]]
name = "client_secret"
regex = "(?:client_secret|AMAZON_ADVERTISING_CLIENT_SECRET)[=:\\s\"'']+([a-zA-Z0-9]{20,})"
within_lines = 5

[[detector.tests]]
test_positive = "amzn1.application-oa2-client.Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "amzn1.application-oa2-client."
