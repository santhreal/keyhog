# Docs: https://developer.hashicorp.com/packer/docs/hcp
# Format: HCP Service Principal credentials - Client ID and Client Secret pair
# Verify: POST https://auth.idp.hashicorp.com/oauth2/token with client_credentials
# Prefix: none (HCP Client ID is typically a UUID)

[detector]
id = "packer-credentials"
name = "HashiCorp Packer HCP Credentials"
service = "packer"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["HCP_CLIENT_ID", "HCP_CLIENT_SECRET", "hcp_client_id", "hcp_client_secret"]

[[detector.patterns]]
regex = "(?:HCP_CLIENT_ID|hcp_client_id)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "HCP Service Principal Client ID"
group = 1

[[detector.companions]]
name = "hcp_client_secret"
regex = "(?:HCP_CLIENT_SECRET|hcp_client_secret)[=:\\s\"'']+([a-zA-Z0-9_\\-]{40,})"
within_lines = 5

[[detector.tests]]
test_positive = "HCP_CLIENT_ID=2741f27f-279a-1657-afb4-30b08a3d35d0"
test_negative = "HCP_CLIENT_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
