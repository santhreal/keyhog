# Docs: https://developers.booking.com/connectivity/docs/basic-authentication
# Format: Username and password for Basic Auth (Base64 encoded)
# Verify: POST to OTA or B.XML endpoints with Basic Auth header
# Prefix: none (requires context anchoring)

[detector]
id = "booking-com-api-credentials"
name = "Booking.com API Credentials"
service = "booking-com"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "OTA" removed: case-insensitive over-trigger (quota/toyota/dakota/iota all
# contain "ota") that no regex references, every pattern self-anchors on
# `booking[_-]com`. Recall-neutral. (BXML, booking's XML format, is specific, kept.)
keywords = ["BOOKING_COM", "booking.com", "booking_com", "BXML"]

[[detector.patterns]]
regex = "(?:BOOKING_COM|booking[_-]com|booking_com)[_\\s]?(?:USER(?:NAME)?|user(?:name)?)[=:\\s\"'']+([A-Za-z0-9_-]+)"
description = "Booking.com API username"
group = 1

[[detector.companions]]
name = "booking-password"
regex = "(?:BOOKING_COM|booking[_-]com|booking_com)[_\\s]?(?:PASS(?:WORD)?|pass(?:word)?)[=:\\s\"'']+[A-Za-z0-9_-]+"
within_lines = 5

[[detector.tests]]
test_positive = "BOOKING_COM_USERNAME=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "BOOKING_COM_USER="
