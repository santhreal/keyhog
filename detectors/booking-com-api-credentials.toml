# Docs: https://developers.booking.com/connectivity/docs/basic-authentication
# Format: Username and password for Basic Auth (Base64 encoded)
# Verify: POST to OTA or B.XML endpoints with Basic Auth header
# Prefix: none (requires context anchoring)

[detector]
id = "booking-com-api-credentials"
name = "Booking.com API Credentials"
service = "booking-com"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "OTA" removed: case-insensitive over-trigger (quota/toyota/dakota/iota all
# contain "ota") that no regex references, every pattern self-anchors on
# `booking[_-]com`. Recall-neutral. (BXML, booking's XML format, is specific, kept.)
keywords = ["BOOKING_COM", "booking.com", "booking_com", "BXML"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:BOOKING_COM|booking[_\-\s]*com|booking_com)[_\-\s]*(?:USER(?:NAME)?|user(?:name)?)[=:\s"'']+([A-Za-z0-9_-]+)'''
description = "Booking.com API username"
group = 1
weak_anchor = true

[[detector.companions]]
name = "booking-password"
regex = '''(?:BOOKING_COM|booking[_\-\s]*com|booking_com)[_\-\s]*(?:PASS(?:WORD)?|pass(?:word)?)[=:\s"'']+[A-Za-z0-9_-]+'''
within_lines = 5

[[detector.tests]]
test_positive = "BOOKING_COM_USERNAME=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "BOOKING_COM_USER="
