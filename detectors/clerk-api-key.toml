# Docs: https://clerk.com/docs/references/nextjs/clerk-middleware
# Format: pk_ prefix followed by live or test, underscore, and 32 alphanumeric chars (publishable key)
# Verify: No verify endpoint (client-side key)
# Prefix: pk_

[detector]
id = "clerk-api-key"
name = "Clerk Publishable API Key"
service = "clerk"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["pk_", "clerk"]

[[detector.patterns]]
regex = 'pk_(?:live|test)_[a-zA-Z0-9]{32}'
description = "Clerk publishable API key (pk_live_ or pk_test_)"
# `pk_*` keys are the publishable variant - they ship in the
# browser bundle with <ClerkProvider>. Server-side auth uses the
# Clerk secret key (separate detector).
client_safe = true

[[detector.tests]]
test_positive = "pk_live_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "pk_live_short"
