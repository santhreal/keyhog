# Docs: https://docs.etherscan.io/
# Format: 32 character hexadecimal string (no distinctive prefix)
# Verify: GET /api with apikey parameter returns JSON with status "1" if valid
# Prefix: none (32 hex chars, requires context keywords)

[detector]
id = "etherscan-api-key"
name = "Etherscan API Key"
service = "etherscan"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
min_confidence = 0.2
keywords = ["etherscan", "ETHERSCAN", "ETHERSCAN_API_KEY", "etherscan_api_key", "etherscan.io", "api.etherscan.io"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32] }]

[[detector.patterns]]
regex = "(?:ETHERSCAN|etherscan)[_\\-\\.]?(?:API[_\\-\\.]?KEY|api[_\\-\\.]?key)[=:\\s\\\"']+([a-f0-9]{32})"
description = "Etherscan API key with context anchor"
group = 1

# The bare `apikey=<32hex>` pattern was deliberately removed (2026-05-29).
# It was attributing every random 32-char hex string in any `apikey=` /
# `apikey:` assignment to Etherscan, mis-claiming git commit shas, sha256
# prefixes, sha1 digests, and generic 32-hex API keys from 113 unrelated
# services. SecretBench mirror v22: 226 FPs (27.5% of all FPs in the
# corpus) all traced to this single pattern. Etherscan keys carry no
# distinctive prefix - the ONLY way to attribute one is the surrounding
# `etherscan` keyword, which pattern #1 above already requires. The
# remaining pattern catches every shape the contract enforces
# (ETHERSCAN_API_KEY=, etherscan.api.key:, ETHERSCAN-API-KEY=).

[detector.verify]
method = "GET"
url = "https://api.etherscan.io/v2/api?chainid=1&module=stats&action=ethprice&apikey={{match}}"
allowed_domains = ["api.etherscan.io"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ETHERSCAN_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "etherscan_api_key=short"
