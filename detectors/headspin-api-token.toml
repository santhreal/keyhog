# Docs: https://www.headspin.io/docs/adb-api
# Format: 32 character hexadecimal API token passed as Bearer token
# Verify: GET /v0/adb/devices with Bearer token returns 200 if valid
# Prefix: none (hexadecimal, requires context keyword or companion detection)

[detector]
id = "headspin-api-token"
name = "HeadSpin API Token"
service = "headspin"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["HEADSPIN_API_TOKEN", "headspin_api_token", "api-dev.headspin.io"]

[[detector.patterns]]
regex = "(?:HEADSPIN_API_TOKEN|headspin_api_token|headspin-token)[=:\\s\"'']+([a-f0-9]{32})"
description = "HeadSpin API token (32 hex chars) with context anchor"
group = 1

[[detector.patterns]]
regex = "https://[a-z0-9-]*\\.headspin\\.io[^\\s\"'']*"
description = "HeadSpin API endpoint URL"

[[detector.tests]]
test_positive = "HEADSPIN_API_TOKEN=31c67e127d98564a16c172d54be4e7f8"
test_negative = "HEADSPIN_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
