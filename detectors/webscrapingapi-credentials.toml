# Docs: https://docs.webscrapingapi.com/
# Format: api_key parameter OR username:password for proxy auth
# Verify: GET /v1?api_key=...&url=... returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "webscrapingapi-credentials"
name = "WebScrapingAPI Credentials"
service = "webscrapingapi"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["webscrapingapi", "WEBSCRAPINGAPI", "webscraping", "proxy.webscrapingapi.com"]

[[detector.patterns]]
regex = "(?:webscrapingapi|WEBSCRAPINGAPI)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "WebScrapingAPI key with context anchor"
group = 1

[[detector.patterns]]
regex = "webscrapingapi\\.[a-z_=]+:[a-zA-Z0-9_-]+"
description = "WebScrapingAPI proxy username format"

[[detector.patterns]]
regex = '''(?:api[_\-\s]*key|apikey)[=:\s"'']+([a-zA-Z0-9_-]{20,}).{0,50}(?:webscrapingapi)'''
description = "WebScrapingAPI key with api_key prefix and webscrapingapi context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.webscrapingapi.com/v1"
allowed_domains = ["api.webscrapingapi.com"]

[detector.verify.auth]
type = "query"
param = "api_key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "WEBSCRAPINGAPI: '   \"  \"\" \"= ' =:   : =' '=  ':  == :   :'  \"      :'\"\":= \"\"  =   :: :     ' mmTXtj_4wSdwowA5MQHBNDMfSK7ysYuSbYs-xpwseyaAI9my02mS7r_Q2FoLFnktsuv2NjbbCATmHyLFF_8pQ9gjR8cjoSUh"
test_negative = "WEBSCRAPINGAPI: '   \"  \"\" \"= ' =:   : =' '=  ':  == :   :'  \"      :'\"\":= \"\"  =   :: :     ' YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
