# Docs: https://github.com/okta/okta-signin-widget/blob/master/docs/classic.md
# Format: Okta Sign-In Widget configuration with clientId and redirectUri
# Verify: no public verification endpoint (requires Okta domain context)
# Prefix: none (requires context anchoring)

[detector]
id = "okta-widget-api-credentials"
name = "Okta Sign-In Widget API Credentials"
service = "okta"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["OktaSignIn", "clientId", "redirectUri", "baseUrl"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:OktaSignIn|okta-sign-in-widget)[\\s\\S]{0,200}?clientId[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]+)[\"\\']"
description = "Okta Sign-In Widget client ID in configuration"
group = 1
weak_anchor = true

[[detector.companions]]
name = "redirectUri"
regex = "redirectUri[\"\\']?\\s*[:=]\\s*[\"\\'](https?://[^\"\\']+)[\"\\']"
within_lines = 5

[[detector.tests]]
test_positive = "const widget = new OktaSignIn({ clientId: \"0oa1b2c3d4e5f6g7h8i9\" });"
test_negative = "const widget = new OktaSignIn({ clientId: \"YOUR_API_KEY_HERE_PLACEHOLDER_VALUE\" });"
