# Docs: https://www.elastic.co/guide/en/elasticsearch/reference/current/security-api-create-api-key.html
# Format: Base64-encoded id:api_key pair or raw API key string
# Verify: GET /_cluster/health with Authorization: ApiKey header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "elasticsearch-basic-auth"
name = "Elasticsearch API Key"
service = "elasticsearch"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["ELASTICSEARCH_API_KEY", "ELASTIC_API_KEY", "ES_API_KEY", "elasticsearch_api_key", "elastic_api_key"]

[[detector.patterns]]
regex = '''(?:ELASTICSEARCH[_\-\s]*API[_\-\s]*KEY|ELASTIC[_\-\s]*API[_\-\s]*KEY|ES[_\-\s]*API[_\-\s]*KEY|elasticsearch[_\-\s]*api[_\-\s]*key|elastic[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{48,})'''
required_literals = ["ELASTICSEARCH", "ELASTIC", "ES"]
description = "Elasticsearch API key with context anchor (48+ chars)"
group = 1

[[detector.patterns]]
regex = '''(?:ELASTICSEARCH[_\-\s]*API[_\-\s]*KEY|ELASTIC[_\-\s]*API[_\-\s]*KEY|ES[_\-\s]*API[_\-\s]*KEY|elasticsearch[_\-\s]*api[_\-\s]*key|elastic[_\-\s]*api[_\-\s]*key)[=:\s"'']+([A-Za-z0-9+/]{40,}={0,2})'''
required_literals = ["ELASTICSEARCH", "ELASTIC", "ES"]
description = "Elasticsearch API key (base64 encoded) with context anchor"
group = 1

[[detector.tests]]
test_positive = "ELASTICSEARCH_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "ELASTICSEARCH_API_KEY=short"

[[detector.tests]]
test_positive = "ELASTIC-API-KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "ELASTIC-API-KEY=short"

[[detector.tests]]
test_positive = "ES_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "ES_API_KEY=short"
