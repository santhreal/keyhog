# Docs: https://pan.dev/compute/api/access-api-self-hosted/
# Format: JWT token obtained from /api/v1/authenticate endpoint, or Basic auth with username:password
# Verify: GET /api/v1/policies/runtime/container with Bearer token
# Prefix: none (JWT format)

[detector]
id = "prisma-cloud-api-token"
name = "Prisma Cloud API Token"
service = "prisma-cloud"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["prisma", "twistlock", "PRISMA", "TWISTLOCK"]

[[detector.patterns]]
regex = '''(?:prisma|twistlock|PRISMA|TWISTLOCK)[_\-\s]*(?:API[_\-\s]*)?(?:TOKEN|KEY|SECRET)[=:\s"'']+(eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*)'''
description = "Prisma Cloud JWT token with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:prisma|twistlock|PRISMA|TWISTLOCK)[_\-\s]*(?:CONSOLE[_\-\s]*)?(?:URL|ADDRESS)[=:\s"'']+(https?://[^\s"'']+)'''
description = "Prisma Cloud console URL with context anchor"
group = 1

# Console URL companion: needed to template the verify host. Pin to the
# documented Prisma Cloud Compute SaaS hosts; self-hosted Twistlock
# deployments live on customer-chosen hosts and aren't safely verifiable
# without an explicit per-customer URL - those will fall to Unverifiable.
[[detector.companions]]
name = "prisma_console"
regex = 'https?://[a-zA-Z0-9-]+\.(?:prismacloud\.io|paloaltonetworks\.com|twistlock\.com)'
within_lines = 5

[detector.verify]
method = "GET"
# Earlier this used single-brace `{console}` which interpolate.rs ignored;
# the URL went out as a literal `{console}/api/...` segment.
url = "{{companion.prisma_console}}/api/v1/policies/runtime/container"
allowed_domains = [
    "prismacloud.io",
    "paloaltonetworks.com",
    "twistlock.com",
]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "PRISMA_API_KEY=eyJ1Gk3_5qIWlCW9vrWA_Zc-CikFlEy5grq-2ah0D7iS150sDBETlYuoN_r_XnRJK0Q.A8Lrhe179XcO43ta8Er9KpU33H_dwrJBsHKF1z7bspluw3wF7r4mGMKpVCr9U5s-P58CXz3eACIeqezEPDEGO4PUH4LR9w.yO6nijlKQf5R0gF1JB"
test_negative = "PRISMA_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
