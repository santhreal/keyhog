# Docs: https://developer-tripadvisor.com/content-api/
# Format: 32-64 character alphanumeric string with no unique prefix
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "tripadvisor-api-key"
name = "TripAdvisor API Key"
service = "tripadvisor"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["TRIPADVISOR_API_KEY", "tripadvisor", "trip_advisor", "TA_API_KEY"]

[[detector.patterns]]
regex = "(?:TRIPADVISOR|tripadvisor|trip_advisor|TA_API_KEY)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "TripAdvisor API key hex format with context"
group = 1

[[detector.patterns]]
regex = "(?:TRIPADVISOR|tripadvisor)[=:\\s\"'']+([A-Za-z0-9_-]{32,64})"
description = "TripAdvisor API key generic format with context"
group = 1

[[detector.tests]]
test_positive = "trip_advisor=aedf902ad3666643f5392685a7ca4a50"
test_negative = "trip_advisor=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
