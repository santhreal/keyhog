# Docs: https://moosendapp.docs.apiary.io/#introduction/authentication
# Format: 32-character hex string (API key) with account-specific format
# Verify: GET /v3/subscribers with X-Api-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "moosend-api-key"
name = "Moosend API Key"
service = "moosend"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["MOOSEND", "moosend", "MOOSEND_API_KEY", "moosend_api_key"]

[[detector.patterns]]
regex = "(?:MOOSEND|moosend)[._-]?(?:API|api)?[._-]?(?:KEY|key)[=:\\s\"'']+([a-f0-9-]{32,36})"
description = "Moosend API key (32 hex characters, may include dashes)"
group = 1

[[detector.patterns]]
regex = '''(?is)api\.moosend\.com.{0,256}x[_\-\s]*api[_\-\s]*key[=:\s"'']+([a-f0-9-]{32,36})'''
required_literals = ["api.moosend.com"]
description = "Moosend API key header following the Moosend API endpoint"
group = 1

[[detector.patterns]]
# Explicit `\x20` keeps this detector-owned bounded shape out of global separator expansion.
regex = "(?is)x[\\x20_\\t\\r\\n-]?api[\\x20_\\t\\r\\n-]?key[=:\\s\"'']+([a-f0-9-]{32,36}).{0,256}api\\.moosend\\.com"
required_literals = ["api.moosend.com"]
description = "Moosend API key header preceding the Moosend API endpoint"
group = 1

[detector.verify]
method = "GET"
url = "https://api.moosend.com/v3/subscribers.json"
allowed_domains = ["api.moosend.com"]

[detector.verify.auth]
type = "query"
param = "apikey"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "MOOSEND_API_KEY=a4f4f-7a6c28--633f18a1a2b0ff571464fc"
test_negative = "MOOSEND_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"

[[detector.tests]]
test_positive = "https://api.moosend.com/v3/subscribers.json\nX-Api-Key: a4f4f-7a6c28--633f18a1a2b0ff571464fc"
test_negative = "X-Api-Key: a4f4f-7a6c28--633f18a1a2b0ff571464fc"
