# Docs: https://developer.helpscout.com/docs-api/
# Format: 20-character alphanumeric API key
# Verify: GET /v1/sites with Basic auth (key as username, X as password)
# Prefix: none (requires context anchoring)

[detector]
id = "helpscout-api-key"
name = "Help Scout API Key"
service = "helpscout"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["HELPSCOUT", "help_scout", "helpscout_api", "docsapi"]

[[detector.patterns]]
regex = '''(?i)(?:HELPSCOUT|HELP_SCOUT|helpscout)[_\-\s]*(?:API[_\-\s]*KEY|KEY)[=:\s"'']+([a-f0-9]{20})'''
description = "Help Scout Docs API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)docsapi\\.helpscout\\.net.*[=:\\s\"'']+([a-f0-9]{20})"
description = "Help Scout Docs API endpoint with embedded key"
group = 1

[detector.verify]
method = "GET"
url = "https://docsapi.helpscout.net/v1/sites"
allowed_domains = ["docsapi.helpscout.net"]

[detector.verify.auth]
type = "basic"
username = "match"
password = "X"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "HELPSCOUT_API_KEY=f5b0cdd4581ec28b6767"
test_negative = "HELPSCOUT_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
