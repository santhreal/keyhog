# Docs: https://developers.deepl.com/docs/getting-started/auth
# Format: UUID-like string, free keys end with ':fx' (e.g., 279a2e9d-83b3-c416-7e2d-f721593e42a0:fx)
# Verify: GET /v2/usage with DeepL-Auth-Key header returns 200 if valid
# Prefix: none for free keys. The `:fx` suffix is the route marker; it is
# declared on the bare pattern below, so every backend prefilters that exact
# `uuid:fx` route without requiring a DeepL context word.

[detector]
id = "deepl-api-key"
name = "DeepL API Key"
service = "deepl"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
min_confidence = 0.2
keywords = [":fx"]

[[detector.patterns]]
regex = "(?:DEEPL_API_KEY|DEEPL_AUTH_KEY|DEEPL.KEY|deepl.api.key)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?::fx)?)"
description = "DeepL API key with context anchor (free/pro format)"
group = 1

[[detector.patterns]]
regex = "DeepL-Auth-Key\\s+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?::fx)?)"
description = "DeepL API key in Authorization header"
group = 1

[[detector.patterns]]
regex = '''(?:^|[^A-Za-z0-9_-])([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}:fx)(?:$|[^A-Za-z0-9_-])'''
required_literals = [":fx"]
description = "Bare DeepL free API key shape"
group = 1

[detector.verify]
method = "GET"
url = "https://api-free.deepl.com/v2/usage"
allowed_domains = ["api-free.deepl.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "DeepL-Auth-Key {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "DEEPL_API_KEY=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d:fx"
test_negative = "DEEPL_API_KEY=7b3e5d8c-1a9f"
