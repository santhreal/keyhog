# Docs: https://developer.adobe.com/commerce/webapi/get-started/authentication/gs-authentication-token/
# Format: 32 hexadecimal characters or Bearer token from admin/integration authentication
# Verify: POST /rest/V1/integration/admin/token returns token
# Prefix: none (requires context anchoring)

[detector]
id = "magento-rest-api-token"
name = "Magento REST API Token"
service = "magento"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# "access_token" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["magento", "MAGE", "MAGENTO", "rest_token", "admin_token"]

[[detector.patterns]]
regex = '''(?:magento|MAGE|MAGENTO)[_=:\s"'']+(?:rest[_\-\s]*token|admin[_\-\s]*token|access[_\-\s]*token)?[=:\s"'']*([a-f0-9]{32})'''
description = "Magento REST API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:magento|MAGE)[_=:\\s\"'']+(?:bearer|token)[=:\\s\"'']+([a-zA-Z0-9_-]{100,})"
description = "Magento Bearer token with context anchor"
group = 1

[[detector.tests]]
test_positive = "magento=293559c821020c9320063f6627da753a"
test_negative = "magento=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
