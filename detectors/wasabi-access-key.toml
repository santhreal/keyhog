# Docs: https://docs.wasabi.com/docs/access-keys-1
# Format: Access Key ID is 20 alphanumeric chars (often starts with A or J), Secret is 40 base64 chars
# Verify: https://docs.wasabi.com/docs/using-the-wasabi-api
# Prefix: none (generic format, requires context anchoring)

[detector]
id = "wasabi-access-key"
name = "Wasabi Access Key"
service = "wasabi"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["WASABI", "wasabi_access_key", "WASABI_ACCESS_KEY", "wasabi-access-key"]

[[detector.patterns]]
regex = "(?:WASABI|wasabi)[._-]?(?:ACCESS[._-]?)?(?:KEY|key)[=:\\s\"']+([A-Z0-9]{20})"
description = "Wasabi Access Key ID with context anchor"
group = 1

[[detector.companions]]
name = "secret_access_key"
regex = '''(?:WASABI[_\-\s]*SECRET(?:[_\-\s]*KEY)?|secret[_\-\s]*access[_\-\s]*key|aws[_\-\s]*secret[_\-\s]*access[_\-\s]*key)[=:\s"']+([A-Za-z0-9/+=]{40})'''
within_lines = 5
[detector.verify]
method = "GET"
url = "https://s3.wasabisys.com/"
allowed_domains = ["s3.wasabisys.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "AWS {{match}}:{{companion.secret_access_key}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "WASABIKEY=D1R7E3FCOQ5SBACMK1F2"
test_negative = "WASABIKEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
