# Docs: https://developer.hashicorp.com/vault/docs/auth/approle
# Format: RoleID is a UUID-like string, SecretID is a UUID-like string (no unique prefix)
# Verify: POST /v1/auth/approle/login with RoleID and SecretID
# Prefix: none (requires context anchoring)

[detector]
id = "hashicorp-vault-approle-credentials"
name = "HashiCorp Vault AppRole Credentials"
service = "hashicorp-vault"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["VAULT_ROLE_ID", "VAULT_SECRET_ID", "role_id", "secret_id", "approle"]

[[detector.patterns]]
regex = '''(?:VAULT_ROLE_ID|role_id)[=:\s"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "HashiCorp Vault AppRole Role ID with context anchor"
group = 1

[[detector.companions]]
name = "Vault Secret ID"
regex = '''(?:VAULT_SECRET_ID|secret_id)[=:\s"']+[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'''
within_lines = 5

[[detector.tests]]
test_positive = "VAULT_ROLE_ID=6994e225-eb46-e3ed-0312-0e0c10f2b2b7"
test_negative = "VAULT_ROLE_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
