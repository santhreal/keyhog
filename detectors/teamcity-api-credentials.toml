# Docs: https://www.jetbrains.com/help/teamcity/teamcity-rest-api.html
# Format: Bearer token or Basic auth with username/password
# Verify: GET /app/rest/server with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "teamcity-api-credentials"
name = "TeamCity API Credentials"
service = "teamcity"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["TEAMCITY", "teamcity", "TC_TOKEN", "Authorization"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:TEAMCITY[_\-\s]*TOKEN|TEAMCITY[_\-\s]*API[_\-\s]*TOKEN|TC[_\-\s]*TOKEN)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
required_literals = ["TOKEN"]
description = "TeamCity API token with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:TEAMCITY[_\-\s]*USERNAME|TC[_\-\s]*USERNAME)[=:\s"'']+([a-zA-Z0-9_-]+)'''
required_literals = ["USERNAME"]
description = "TeamCity username"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = '''(?:TEAMCITY[_\-\s]*PASSWORD|TC[_\-\s]*PASSWORD)[=:\s"'']+([a-zA-Z0-9!@#$%^&*._-]+)'''
required_literals = ["PASSWORD"]
description = "TeamCity password"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "http://[^/]+:[0-9]+/app/rest/"
description = "TeamCity REST API endpoint URL pattern"

[[detector.tests]]
test_positive = "TC-TOKEN \"  \"'  =    '  =     ==  :   : :' \":':'\"=     \":  '':\"  \"   :'  : \"\"\"' '= 8u0EpKYjbPuC8z3W6duEdOUg6KIxmtu2rifNWzzHLqB1lG80_K4ZkbM8jQEoV4_vppf9ckjIBuAgph7fvgEv_E3pvHUTBornOA"
test_negative = "TC-TOKEN \"  \"'  =    '  =     ==  :   : :' \":':'\"=     \":  '':\"  \"   :'  : \"\"\"' '= YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
