# Docs: https://api.smugmug.com/api/v2/doc
# Format: OAuth Consumer Key (alphanumeric, ~8-32 chars)
# Verify: no public verification endpoint (requires OAuth 1.0a flow)
# Prefix: none (requires context anchoring)

[detector]
id = "smugmug-api-key"
name = "SmugMug API Key"
service = "smugmug"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["SMUGMUG", "smugmug", "SMUG_MUG", "smug_mug"]

[[detector.patterns]]
regex = '(?:SMUGMUG|smugmug|SMUG.MUG|smug.mug)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\s""]+([a-zA-Z0-9]{8,32})'
description = "SmugMug API key with context anchor"
group = 1

[[detector.patterns]]
regex = '(?:SMUGMUG|smugmug|SMUG.MUG|smug.mug)[._-]?(?:CONSUMER|consumer)[._-]?(?:KEY|key)[=:\s""]+([a-zA-Z0-9]{8,32})'
description = "SmugMug consumer key with context anchor"
group = 1

[[detector.patterns]]
regex = 'oauth_consumer_key[=:\s""]+([a-zA-Z0-9]{8,32})'
description = "OAuth consumer key (potentially SmugMug)"
group = 1

[[detector.companions]]
name = "smugmug-oauth-secret"
# Earlier alternation `SMUGMUG|smugmug|SMUG.MUG|smug.mug` overlapped: the
# `.` in `SMUG.MUG` matches the empty separator that `SMUGMUG` already
# covers, which the validator caught as `has_quantified_overlapping_
# alternation`. Collapse to a single case-insensitive branch with an
# explicit optional separator - same set of accepted spellings, no
# alternation overlap, and the literal anchors `oauth`/`secret` keep
# false-positive rate bounded.
regex = '(?i:smug[._-]?mug)?[._-]?(?:oauth)?[._-]?secret[=:\s""]+[a-zA-Z0-9]{16,48}'
within_lines = 5

[[detector.tests]]
test_positive = "SMUGMUG_API_KEY=TxmLs09HULxSNfTW"
test_negative = "SMUGMUG_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
