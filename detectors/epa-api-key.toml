# Docs: https://www.epa.gov/comptox-tools/computational-toxicology-and-exposure-apis
# Format: 32-40 character alphanumeric API key passed as query parameter or header
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "epa-api-key"
name = "EPA API Key"
service = "epa"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["EPA_API_KEY", "EPA_API", "epa"]

[[detector.patterns]]
regex = "(?:EPA_API_KEY|EPA_API|epa_api)[=:\\s\"'\\']+([a-zA-Z0-9]{32,40})"
description = "EPA API key (32-40 alphanumeric chars) with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:api[_\-\s]*key|X-Api-Key)[=:\s"'\']+([a-zA-Z0-9]{32,40}).*(?:epa\.gov|EPA)'''
description = "EPA API key in header or query with EPA context"
group = 1

[[detector.tests]]
test_positive = "EPA_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "EPA_API_KEY=short"
