# Docs: https://vercel.com/docs/edge-config/vercel-api
# Format: ecfg_ prefix followed by alphanumeric characters for Edge Config ID; tokens are UUID-like strings
# Verify: GET /v1/edge-config/{id}/items with Bearer token returns 200 if valid
# Prefix: ecfg_

[detector]
id = "vercel-edge-function-credentials"
name = "Vercel Edge Function Credentials"
service = "vercel"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["EDGE_CONFIG", "VERCEL_EDGE", "ecfg_"]

[[detector.patterns]]
# Bounded the capture length: Vercel Edge Config IDs are alphanumeric with
# underscores/dashes. Capping at 8..=128 keeps the match recognisable without
# matching arbitrary multi-KB identifiers in the middle of longer strings.
regex = "(?:^|[^A-Za-z0-9_])(ecfg_[a-zA-Z0-9_-]{8,128})(?:$|[^A-Za-z0-9_-])"
description = "Vercel Edge Config ID (ecfg_ prefix)"
group = 1
# Explicit token boundaries stop case-insensitive mid-identifier matches such as
# cuDNN's `CUDNN_BACKEND_ENGINECFG_DESCRIPTOR`, while keeping real token-position
# matches (`ecfg_...`, `EDGE_CONFIG=ecfg_...`) firing.

[[detector.patterns]]
regex = '''(?:EDGE_CONFIG|VERCEL_EDGE[_\-\s]*CONFIG)[=:\s"'']+(ecfg_[a-zA-Z0-9_-]{8,128})'''
description = "Edge Config with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.vercel.com/v1/edge-config"
allowed_domains = ["api.vercel.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ecfg_VWTr5j5Y"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
