# Docs: https://developer.smartthings.com/docs/getting-started/authorization-and-permissions
# Format: Personal Access Token (PAT) - long alphanumeric string with hyphens
# Verify: GET /v1/devices with Authorization: Bearer token header
# Prefix: none (requires context anchoring)

[detector]
id = "smartthings-api-token"
name = "SmartThings API Token"
service = "smartthings"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["smartthings", "personal_access_token", "api.smartthings.com"]

[[detector.patterns]]
regex = '''(?:smartthings|SMARTTHINGS)[._-]?(?:PAT|pat|PERSONAL[_\-\s]*ACCESS[_\-\s]*TOKEN|personal[_\-\s]*access[_\-\s]*token|ACCESS[_\-\s]*TOKEN|access[_\-\s]*token)[=:\s"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "SmartThings Personal Access Token (UUID format)"
group = 1

[[detector.patterns]]
regex = '''(?:smartthings|SMARTTHINGS)[._-]?(?:PAT|pat|PERSONAL[_\-\s]*ACCESS[_\-\s]*TOKEN|personal[_\-\s]*access[_\-\s]*token|ACCESS[_\-\s]*TOKEN|access[_\-\s]*token)[=:\s"'']+([a-f0-9]{36,64})'''
description = "SmartThings API token (hex format)"
group = 1

[[detector.tests]]
test_positive = "SMARTTHINGS_ACCESS_TOKEN=be96d2f7-20dc-a4ec-aa3a-c4179112746d"
test_negative = "SMARTTHINGS_ACCESS_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
