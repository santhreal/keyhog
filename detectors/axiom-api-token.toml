# Docs: https://axiom.co/docs/restapi/introduction
# Format: xapt- prefix followed by alphanumeric characters
# Verify: GET /v1/datasets with Authorization header returns 200 if valid
# Prefix: xapt-

[detector]
id = "axiom-api-token"
name = "Axiom API Token"
service = "axiom"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["xapt-", "axiom", "AXIOM_API_TOKEN"]

[[detector.patterns]]
regex = 'xapt-[a-zA-Z0-9_-]+'
description = "Axiom API token (xapt- prefix)"

[detector.verify]
method = "GET"
url = "https://api.axiom.co/v1/datasets"
allowed_domains = ["api.axiom.co"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "xapt-Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "xapt-"
