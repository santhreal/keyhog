# Docs: https://docs.jwplayer.com/platform/reference/getting-started-with-apis
# Format: API Key (v1) starts with API_KEY; API Secret is base64-like string
# Verify: GET /v2/sites with API Key header returns 200 if valid
# Prefix: API_KEY_

[detector]
id = "jw-player-api-credentials"
name = "JW Player API Credentials"
service = "jwplayer"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["jwplayer", "JWPLAYER", "jw_player", "JW_PLAYER", "API_KEY_", "jwplatform.com", "jwplayer.com"]

[[detector.patterns]]
regex = "(?i)(?:jwplayer|jw[_.-]?player)[_.\\s-]?(?:api[_.-]?)?key[=:\\s\"']+(API_KEY_[a-zA-Z0-9]{16,32})"
required_literals = ["API_KEY_"]
description = "JW Player API Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:jwplayer|jw[_.-]?player)[_.\\s-]?(?:api[_.-]?)?secret[=:\\s\"']+([a-zA-Z0-9]{32,64})"
required_literals = ["secret"]
description = "JW Player API Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "API_KEY_[a-zA-Z0-9]{16,32}"
description = "JW Player API Key (API_KEY_ prefix)"

[[detector.tests]]
test_positive = "jwplayersecret=NhmHzQ4gpTIlduEQY1lNWAyzRTzOjB1K"
test_negative = "jwplayersecret=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
