# Docs: https://docs.rollbar.com/reference/getting-started-1
# Format: 32 hexadecimal characters
# Verify: GET /api/1/item with X-Rollbar-Access-Token header returns 200 if valid
# Prefix: none (32 hex characters, requires keyword context)

[detector]
id = "rollbar-access-token"
name = "Rollbar Access Token"
service = "rollbar"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "access_token" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["ROLLBAR_ACCESS_TOKEN", "rollbar_access_token", "X-Rollbar-Access-Token", "ROLLBAR_TOKEN", "rollbarToken"]

[[detector.patterns]]
regex = '''(?:ROLLBAR[_\-\s]*ACCESS[_\-\s]*TOKEN|rollbar[_\-\s]*access[_\-\s]*token|X-Rollbar-Access-Token|ROLLBAR[_\-\s]*TOKEN|rollbarToken)[=:\s\"']+([a-f0-9]{32})'''
description = "Rollbar project access token (32 hex chars with context anchor)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.rollbar.com/api/1/item/1"
allowed_domains = ["api.rollbar.com"]

[detector.verify.auth]
type = "header"
name = "X-Rollbar-Access-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "X-Rollbar-Access-Token=08c0fee0abeb7224113fd958de7528ab"
test_negative = "X-Rollbar-Access-Token=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
