# Docs: https://docs.retool.com/data/sources/postgresql
# Format: PostgreSQL connection string with host, port, username, password
# Verify: no public verification endpoint (self-hosted database)
# Prefix: none (requires context anchoring)

[detector]
id = "retool-database-credentials"
name = "Retool Database Credentials"
service = "retool"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["RETOOL_DB", "RETOOL_DATABASE", "hammerhead_production"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:RETOOL_DB|RETOOL_DATABASE|retool_db|retool_database)[_\\.\\s]*(?:PASSWORD|password|pwd)[=:\\s\"'']+([^\\s\"'']{16,})"
description = "Retool database password in environment variable"
group = 1

[[detector.patterns]]
regex = "postgres(?:ql)?://[^\\s\"'']*[:@][^\\s\"'']*@(?:retool|hammerhead)[^\\s\"'']*"
description = "Retool PostgreSQL connection string"

[[detector.patterns]]
regex = "(?:RETOOL_DB|RETOOL_DATABASE)[_\\.\\s]*(?:HOST|host)[=:\\s\"'']+([a-zA-Z0-9._-]+)"
description = "Retool database host configuration"
group = 1
weak_anchor = true

[[detector.tests]]
test_positive = "RETOOL_DB_PASSWORD=RetoolDbPass123456"
test_negative = "RETOOL_DB_PASSWORD=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
