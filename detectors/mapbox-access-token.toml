# Docs: https://docs.mapbox.com/help/getting-started/access-tokens/
# Format: pk.eyJ or sk.eyJ prefix followed by JWT-like structure (public/secret tokens)
# Verify: GET request to Mapbox tokens API with access_token query parameter
# Prefix: pk.eyJ or sk.eyJ

[detector]
id = "mapbox-access-token"
name = "Mapbox Access Token"
service = "mapbox"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["pk.eyJ", "sk.eyJ"]

[[detector.patterns]]
regex = 'pk\.eyJ[0-9A-Za-z_-]{60,128}\.[0-9A-Za-z_-]{20,64}'
description = "Mapbox public access token"
# `pk.eyJ` tokens are explicitly the publishable variant - Mapbox
# shows them next to the API docs as "Default public token" and
# expects them in browser/mobile bundles. URL-restriction + scope
# settings on the token page are the security boundary, not the
# token itself. `sk.eyJ` tokens stay critical.
client_safe = true

[[detector.patterns]]
regex = 'sk\.eyJ[0-9A-Za-z_-]{60,128}\.[0-9A-Za-z_-]{20,64}'
description = "Mapbox secret access token"

[detector.verify]
method = "GET"
url = "https://api.mapbox.com/tokens/v2?access_token={{match}}"
allowed_domains = ["api.mapbox.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pk.eyJA5HA_hbDTF1ehFQcw04n1IbyKHrAsL0Ii98UNshdQVdyf43_duDPPNyWFZzVb06zdZNhAI8KWT_MieYZ.2VSbx2uM9jl7Sw75lvz9IFDKTSCPhLMo"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
