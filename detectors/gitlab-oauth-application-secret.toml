# Docs: https://docs.gitlab.com/ee/integration/oauth_provider.html
# Format: gloas- prefix followed by 20+ alphanumeric/_/- characters.
#   The OAuth application secret authenticates a GitLab OAuth application;
#   leaking one lets an attacker impersonate the app in the authorization-code
#   / client-credentials flows, so the severity is critical.
# Verify: POST /oauth/token with the client_id + this secret; reported unverified
#   here (needs the matching client_id, which may not be co-located).
# Prefix: gloas-

[detector]
id = "gitlab-oauth-application-secret"
name = "GitLab OAuth Application Secret"
service = "gitlab"
severity = "critical"
# "oauth" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["gloas-", "gitlab", "client_secret"]

[[detector.patterns]]
regex = 'gloas-[a-zA-Z0-9_\-]{20,}'
description = "GitLab OAuth application secret (gloas- prefix)"

[[detector.tests]]
test_positive = "gloas-Jb3Mn7Pq2Rs8Tv5Wx1Yz4Ac6D"
test_negative = "gloas-short"
