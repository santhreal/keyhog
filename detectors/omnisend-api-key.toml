# Docs: https://api.omnisend.com/v3/docs
# Format: 32-character hex string
# Verify: GET /v3/account with X-API-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "omnisend-api-key"
name = "Omnisend API Key"
service = "omnisend"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["OMNISEND", "omnisend", "OMNISEND_API_KEY", "omnisend_api_key"]

[[detector.patterns]]
regex = "(?:OMNISEND|omnisend)[._-]?(?:API|api)?[._-]?(?:KEY|key)[=:\\s\"'']+([a-f0-9]{32})"
description = "Omnisend API key (32 hex characters) with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?is)api\.omnisend\.com.{0,256}x[_\-\s]*api[_\-\s]*key[=:\s"'']+([a-f0-9]{32})'''
required_literals = ["api.omnisend.com"]
description = "Omnisend API key header following the Omnisend API endpoint"
group = 1

[[detector.patterns]]
# Explicit `\x20` keeps this detector-owned bounded shape out of global separator expansion.
regex = "(?is)x[\\x20_\\t\\r\\n-]?api[\\x20_\\t\\r\\n-]?key[=:\\s\"'']+([a-f0-9]{32}).{0,256}api\\.omnisend\\.com"
required_literals = ["api.omnisend.com"]
description = "Omnisend API key header preceding the Omnisend API endpoint"
group = 1

[detector.verify]
method = "GET"
url = "https://api.omnisend.com/v3/account"
allowed_domains = ["api.omnisend.com"]

[detector.verify.auth]
type = "header"
name = "X-API-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "accountID"
json_path = "$.accountID"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "OMNISEND_API_KEY=614030930ca9626eedd2b6b73c763ac9"
test_negative = "OMNISEND_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"

[[detector.tests]]
test_positive = "https://api.omnisend.com/v3/account\nX-API-Key: 614030930ca9626eedd2b6b73c763ac9"
test_negative = "X-API-Key: 614030930ca9626eedd2b6b73c763ac9"
