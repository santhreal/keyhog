# Docs: https://cloud.google.com/artifact-registry/docs/docker/authentication
# Format: Service account JSON key file with type: service_account field
# Verify: gcloud auth activate-service-account with JSON key
# Prefix: none (requires context anchoring)

[detector]
id = "google-artifact-registry-key"
name = "Google Artifact Registry Service Account Key"
service = "google-artifact-registry"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["_json_key", "artifactregistry", "googleusercontent.com", "service_account"]

[[detector.patterns]]
regex = "\"type\"\\s*:\\s*\"service_account\"[^}]*\"private_key\"\\s*:\\s*\"(-----BEGIN PRIVATE KEY-----)"
description = "Google service account JSON key with private key (Artifact Registry authentication)"
group = 1

[[detector.patterns]]
regex = '''(?:_json_key|(?:GAR|GOOGLE_ARTIFACT)[\w_]*(?:PASSWORD|KEY))[=:\s"'']+\{[^}\n]*(?:\\?")type(?:\\?")\s*:\s*(?:\\?")service_account(?:\\?")[^}\n]*(?:\\?")private_key(?:\\?")\s*:\s*(?:\\?")(-----BEGIN PRIVATE KEY-----)'''
required_literals = ["-----BEGIN PRIVATE KEY-----"]
description = "Google Artifact Registry JSON key in an environment variable, including escaped JSON"
group = 1

[[detector.patterns]]
regex = "\"client_email\"\\s*:\\s*\"([a-z0-9-]+@[a-z0-9-]+\\.iam\\.gserviceaccount\\.com)\"[^}]*\"private_key_id\""
description = "Google service account email pattern with private key ID for GAR auth"
group = 1

[[detector.tests]]
test_positive = '''_json_key={\"type\":\"service_account\",\"private_key\":\"-----BEGIN PRIVATE KEY-----\\nMIIE\\n-----END PRIVATE KEY-----\"}'''
test_negative = '''_json_key={\"type\": \"service_account\", \"project_id\": \"demo\"}'''
