# Docs: https://cloud.google.com/artifact-registry/docs/docker/authentication
# Format: Service account JSON key file with type: service_account field
# Verify: gcloud auth activate-service-account with JSON key
# Prefix: none (requires context anchoring)

[detector]
id = "google-artifact-registry-key"
name = "Google Artifact Registry Service Account Key"
service = "google-artifact-registry"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["_json_key", "artifactregistry", "googleusercontent.com", "service_account"]
# Service-specific GAR attribution owns the complete raw JSON PEM block over
# confidence-lifted generic or SSH findings recovered from decoded JSON.
private_key_block = true
resolution_priority = 4

[[detector.patterns]]
regex = '"type"\s*:\s*"service_account"[^}]*"private_key"\s*:\s*"(-----BEGIN PRIVATE KEY-----[\s\S]*?-----END PRIVATE KEY-----)(?:\\n|\\r\\n|[\r\n])?"'
required_literals = ['"type"', '"private_key"', "-----BEGIN PRIVATE KEY-----"]
description = "Google service account JSON with a complete Artifact Registry private key"
group = 1

[[detector.patterns]]
regex = '''(?:_json_key|(?:GAR|GOOGLE_ARTIFACT)[\w_]*(?:PASSWORD|KEY))[=:\s"'']+\{[^}\n]*(?:\\?")type(?:\\?")\s*:\s*(?:\\?")service_account(?:\\?")[^}\n]*(?:\\?")private_key(?:\\?")\s*:\s*(?:\\?")(-----BEGIN PRIVATE KEY-----[\s\S]*?-----END PRIVATE KEY-----)'''
required_literals = ["-----BEGIN PRIVATE KEY-----"]
description = "Google Artifact Registry environment JSON with a complete private key"
group = 1

[[detector.patterns]]
regex = "\"client_email\"\\s*:\\s*\"([a-z0-9-]+@[a-z0-9-]+\\.iam\\.gserviceaccount\\.com)\"[^}]*\"private_key_id\""
description = "Google service account email pattern with private key ID for GAR auth"
group = 1

[[detector.tests]]
test_positive = '''_json_key={\"type\":\"service_account\",\"private_key\":\"-----BEGIN PRIVATE KEY-----\\nMIIE\\n-----END PRIVATE KEY-----\"}'''
test_negative = '''_json_key={\"type\": \"service_account\", \"project_id\": \"demo\"}'''
