# Docs: https://www.linode.com/docs/api/get-started/#get-an-access-token
# Format: 64 hexadecimal characters
# Verify: GET /v4/account with Bearer token returns 200
# Prefix: none (64 hex chars, requires keyword context)

[detector]
id = "linode-pat"
name = "Linode Personal Access Token"
service = "linode"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["LINODE", "linode", "LINODE_API", "linode_api", "LINODE_TOKEN"]

[[detector.patterns]]
regex = '''(?:LINODE|linode)[_\-\s]*(?:API|api|TOKEN|token)?[_\-\s]*(?:KEY|key|TOKEN|token)?[=:\s"']+([0-9a-f]{64})'''
description = "Linode personal access token with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization:\\s*[Bb]earer\\s+([0-9a-f]{64})[^\\n]*linode"
description = "Linode personal access token in Authorization header (same-line linode anchor; a bare Authorization: Bearer header alone is not service-attributable)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.linode.com/v4/account"
allowed_domains = ["api.linode.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "company"
json_path = "$.company"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "email"
json_path = "$.email"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "LINODE_TOKEN=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "LINODE_TOKEN=short"
