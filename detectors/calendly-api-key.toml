# Docs: https://developer.calendly.com/api-docs/authentication
# Format: Personal Access Token - hex format, 40 characters
# Verify: GET /users/me with Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "calendly-api-key"
name = "Calendly Personal Access Token"
service = "calendly"
severity = "high"
min_confidence = 0.2
keywords = ["CALENDLY", "calendly", "PAT"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED for it (per-detector, DetectorSpec::weak_anchor;
# was rules/detector-classification.toml weak_anchor list).
weak_anchor = true

[[detector.patterns]]
regex = '''(?:CALENDLY|calendly)[._-]?(?:TOKEN|token|PAT|pat|API|api)[=:\s"']+([a-f0-9]{40})'''
description = "Calendly Personal Access Token with context anchor (40 hex chars)"
group = 1

[[detector.patterns]]
regex = '''(?:CALENDLY|calendly)[._-]?(?:ACCESS|access)[._-]?(?:TOKEN|token)[=:\s"']+([a-f0-9]{40})'''
description = "Calendly access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.calendly.com/users/me"
allowed_domains = ["api.calendly.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "email"
json_path = "$.resource.email"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "CALENDLY_TOKEN=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d8e6a2b9f"
test_negative = "CALENDLY_TOKEN=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d8e6a2b9"
