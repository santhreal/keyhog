# Docs: https://developers.cloudflare.com/cloudflare-one/access-controls/service-credentials/service-tokens/
# Format: Client ID is UUID-like with .access suffix, Client Secret is a long random string
# Verify: POST to access application with CF-Access-Client-Id and CF-Access-Client-Secret headers
# Prefix: none (requires context anchoring)

[detector]
id = "cloudflare-zero-trust-service-token"
name = "Cloudflare Zero Trust Service Token"
service = "cloudflare"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CF-Access-Client-Id", "CF-Access-Client-Secret", "cloudflareaccess"]

[[detector.patterns]]
regex = "(?:CF-Access-Client-Id|CF.Access.Client.Id)[=:\\s\"'']+([a-f0-9]{32})\\.access"
required_literals = [".access"]
description = "Cloudflare Zero Trust service token Client ID"
group = 1

[[detector.companions]]
name = "client_secret"
regex = "(?:CF-Access-Client-Secret|CF.Access.Client.Secret)[=:\\s\"'']+[a-zA-Z0-9_-]{40,}"
within_lines = 3

[[detector.tests]]
test_positive = "CF-Access-Client-Id=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d.access"
test_negative = "CF-Access-Client-Id=short.access"
