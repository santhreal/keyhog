# Docs: https://developer.paypal.com/braintree/articles/control-panel/important-gateway-credentials
# Format: 8 lowercase alphanumeric characters, underscore, 8 chars, underscore, 8 chars
# Verify: none (requires paired private key and merchant ID)
# Prefix: none (structured format but needs context)

[detector]
id = "braintree-api-key"
name = "Braintree Public API Key"
service = "braintree"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["braintree", "BRAINTREE", "public_key"]

[[detector.patterns]]
regex = '''(?:braintree|BRAINTREE)[_\-\s]*(?:public_key|PUBLIC_KEY)[=:\s"']+([a-z0-9]{8}_[a-z0-9]{8}_[a-z0-9]{8})'''
description = "Braintree public API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:public_key)[=:\\s\"']+([a-z0-9]{8}_[a-z0-9]{8}_[a-z0-9]{8})"
description = "Braintree public key with assignment context"
group = 1

[[detector.companions]]
name = "braintree_private_key"
# Anchored to a private-key declaration so a wide search radius doesn't
# false-fire on every random 32-hex hash in the file. The validator
# previously flagged the bare `[a-f0-9]{32,40}` as too broad at
# within_lines=10.
regex = "(?:braintree[._-]?private[._-]?key|BRAINTREE_PRIVATE_KEY|private_key)[=:\\s\"']+[a-f0-9]{32,40}"
within_lines = 10
[detector.verify]
method = "GET"
url = "https://api.braintreegateway.com/"
allowed_domains = ["api.braintreegateway.com"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "{{match}}"

[[detector.tests]]
test_positive = "braintree_public_key=kp4qx7rm_sn5tb8vw_3yzkp4qx"
test_negative = "braintree_public_key=kp4qx7rm_sn5tb8vw"
