# Docs: https://docs.deno.com/deploy/kv/manual/
# Format: Deno KV access token with ddn or ddc prefix followed by 64+ hex chars
# Verify: no public verification endpoint
# Prefix: ddn_ or ddc_

[detector]
id = "deno-kv-credentials"
name = "Deno KV Access Token"
service = "deno"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ddn_", "ddc_", "DENO_KV", "denokv"]

[[detector.patterns]]
regex = 'dd[npc]_[a-f0-9]{64}'
description = "Deno KV access token (ddn_, ddp_, or ddc_ prefix)"

[[detector.tests]]
test_positive = "ddn_7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ddn_7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
