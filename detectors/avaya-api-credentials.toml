# Docs: https://developers.avayacloud.com/documentation
# Format: Avaya Experience Platform uses OAuth2 client credentials
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "avaya-api-credentials"
name = "Avaya API Credentials"
service = "avaya"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["avaya", "AVAYA", "Avaya", "avaya_cloud", "avayacloud"]

[[detector.patterns]]
regex = '''(?i)\bavaya[_\-\s]*(?:cloud)?[_\-\s]*(?:client[_\-\s]*secret|clientsecret)[=:\s"'']+([a-zA-Z0-9_-]{20,60})\b(?:[^a-zA-Z0-9_.-]|$)'''
description = "Avaya Client Secret with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?i)\bavaya[_\-\s]*(?:api[_\-\s]*key|apikey)[=:\s"'']+([a-zA-Z0-9_-]{20,60})\b(?:[^a-zA-Z0-9_.-]|$)'''
description = "Avaya API Key with context anchor"
group = 1

[[detector.companions]]
name = "avaya_credential_pair"
regex = '''(?i)\bavaya[_\-\s]*(?:cloud)?[_\-\s]*(?:client[_\-\s]*id|clientid)[=:\s"'']+([a-zA-Z0-9_-]{20,50})\b(?:[^a-zA-Z0-9_.-]|$)'''
within_lines = 5

[[detector.tests]]
test_positive = "AVAYA_CLOUD_CLIENT_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "AVAYA_CLIENT_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3Y"
