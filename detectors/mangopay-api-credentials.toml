# Docs: https://docs.mangopay.com/sdks/php
# Format: ClientId and API key (passphrase) for basic authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "mangopay-api-credentials"
name = "Mangopay API Credentials"
service = "mangopay"
severity = "critical"
keywords = ["MANGOPAY", "mangopay", "MangoPay", "MANGOPAY_CLIENT_ID", "MANGOPAY_API_KEY"]

[[detector.patterns]]
regex = '''(?i)mangopay[_.]?(?:api[_.]?key|apikey|passphrase|password)[=:\s"']+([a-zA-Z0-9_-]{24,})\b(?:[^a-zA-Z0-9_.-]|$)'''
description = "Mangopay API key/passphrase with context anchor"
group = 1

[[detector.companions]]
name = "Mangopay client ID"
regex = '''(?i)mangopay[_.]?client[_.]?id[=:\s"']+([a-zA-Z0-9_-]{12,})\b(?:[^a-zA-Z0-9_.-]|$)'''
within_lines = 5

[[detector.tests]]
test_positive = "MANGOPAY_API_KEY=PQgFHmZoKVL1TM4ym7pGMCqTy-Opq"
test_negative = "MANGOPAY_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
