# Docs: https://docs.mangopay.com/sdks/php
# Format: ClientId and API key (passphrase) for basic authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "mangopay-api-credentials"
name = "Mangopay API Credentials"
service = "mangopay"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["MANGOPAY", "mangopay", "MangoPay", "MANGOPAY_CLIENT_ID", "MANGOPAY_API_KEY"]

[[detector.patterns]]
regex = '''(?i)mangopay[_.]?(?:api[_.]?key|apikey|passphrase|password)[=:\s"']+([a-zA-Z0-9_-]{24,})\b(?:[^a-zA-Z0-9_.-]|$)'''
description = "Mangopay API key/passphrase with context anchor"
group = 1

[[detector.companions]]
name = "Mangopay client ID"
regex = '''(?i)mangopay[_.]?client[_.]?id[=:\s"']+([a-zA-Z0-9_-]{12,})\b(?:[^a-zA-Z0-9_.-]|$)'''
within_lines = 5

[[detector.tests]]
test_positive = "MANGOPAY_API_KEY=PQgFHmZoKVL1TM4ym7pGMCqTy-Opq"
test_negative = "MANGOPAY_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
