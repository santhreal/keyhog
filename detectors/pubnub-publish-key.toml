# Docs: https://www.pubnub.com/docs/general/setup/connect-to-pubnub
# Format: Publish key starting with 'pub-c-' followed by a UUID (8-4-4-4-12 hex pattern)
# Verify: Must be paired with subscribe key; used for publishing messages to PubNub channels
# Prefix: pub-c-

[detector]
id = "pubnub-publish-key"
name = "PubNub Publish Key"
service = "pubnub"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["pub-c-"]

[[detector.patterns]]
regex = 'pub-c-[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'
description = "PubNub publish key (UUID format with pub-c- prefix)"

[[detector.tests]]
test_positive = "pub-c-d0743bdf-c3fe-a88e-492a-0ccb2ea13ddc"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
