# Docs: https://apireference.getresponse.com/
# Format: API key passed in X-Auth-Token header, alphanumeric string
# Verify: GET /v3/accounts with X-Auth-Token header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "getresponse-api-key"
name = "GetResponse API Key"
service = "getresponse"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["getresponse", "GETRESPONSE", "X-Auth-Token", "api_key"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32, 40, 48, 64] }]

[[detector.patterns]]
regex = '(?:GETRESPONSE|getresponse)[_\-\s]*(?:API|api)?[_\-\s]*(?:KEY|key|TOKEN|token)[=: ]+([a-zA-Z0-9_-]{20,})'
description = "GetResponse API key with context anchor"
group = 1

[[detector.patterns]]
regex = '(?:X[_\-\s]*Auth[_\-\s]*Token|x[_\-\s]*auth[_\-\s]*token)[=: ]+(?:api[_\-\s]*key )?([a-zA-Z0-9_-]{20,})'
required_literals = ["Token"]
description = "GetResponse X-Auth-Token header value"
group = 1

[detector.verify]
method = "GET"
url = "https://api.getresponse.com/v3/accounts"
allowed_domains = ["api.getresponse.com"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "X-Auth-Token"
value = "api-key {{match}}"

[[detector.tests]]
test_positive = "GETRESPONSE_API_KEY=qcTyZ5O-pgSF5zj9IUMf"
test_negative = "GETRESPONSE_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
