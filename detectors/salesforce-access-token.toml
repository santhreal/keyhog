# Docs: https://developer.salesforce.com/docs/service/messaging-partner/guide/generate-token.html
# Format: {orgId}!{token} or long OAuth access token (120+ chars)
# Verify: GET /services/oauth2/userinfo with Bearer token
# Prefix: 00D (org ID prefix) OR {orgId}! format

[detector]
id = "salesforce-access-token"
name = "Salesforce Access Token"
service = "salesforce"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["salesforce", "SALESFORCE", "force.com", "SF_ACCESS_TOKEN", "sf_access_token"]

[[detector.patterns]]
regex = "00D[a-zA-Z0-9]{12,18}![a-zA-Z0-9\\.\\-]{100,}"
description = "Salesforce session ID/access token with instance ID prefix (00D)"

[[detector.patterns]]
regex = "(?i)(?:salesforce|sf)[_.-]?(?:access[_.-]?)?token[=:\\s\"']+([a-zA-Z0-9]{120,})"
required_literals = ["token"]
description = "Salesforce OAuth access token with context anchor (long alphanumeric)"
group = 1

[[detector.tests]]
test_positive = "00Dl9EknYBnvVPAD5pXo5!tqBk6FKee.qQU89ru6oLQ2bJPgvjXk1.gKc4VP7pwxJAhDxk0hQ4WkRQRnOTvzj2R040Zk18jojez.HumrM7hrkdRMU0sSHMXdxB"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
