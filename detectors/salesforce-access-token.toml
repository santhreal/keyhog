# Docs: https://developer.salesforce.com/docs/service/messaging-partner/guide/generate-token.html
# Format: {orgId}!{token} or long OAuth access token (120+ chars)
# Verify: GET /services/oauth2/userinfo with Bearer token
# Prefix: 00D (org ID prefix) OR {orgId}! format

[detector]
id = "salesforce-access-token"
name = "Salesforce Access Token"
service = "salesforce"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["salesforce", "SALESFORCE", "force.com", "SF_ACCESS_TOKEN", "sf_access_token"]

[[detector.patterns]]
regex = "00D[a-zA-Z0-9]{12,18}![a-zA-Z0-9\\.\\-]{100,}"
description = "Salesforce session ID/access token with instance ID prefix (00D)"

[[detector.patterns]]
regex = "(?i)(?:salesforce|sf)[_.-]?(?:access[_.-]?)?token[=:\\s\"']+([a-zA-Z0-9]{120,})"
description = "Salesforce OAuth access token with context anchor (long alphanumeric)"
group = 1

[[detector.tests]]
test_positive = "00Dl9EknYBnvVPAD5pXo5!tqBk6FKee.qQU89ru6oLQ2bJPgvjXk1.gKc4VP7pwxJAhDxk0hQ4WkRQRnOTvzj2R040Zk18jojez.HumrM7hrkdRMU0sSHMXdxB"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
