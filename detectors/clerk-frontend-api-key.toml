# Docs: https://clerk.com/docs/guides/how-clerk-works/overview
# Format: pk_live_ / pk_test_ followed by the base64-encoded FAPI URL. The
# decoded payload ends in `$`; encoded length varies with the instance domain.
# Verify: no verify endpoint (client-side key)
# Prefix: pk_

[detector]
id = "clerk-frontend-api-key"
name = "Clerk Frontend API Key"
service = "clerk"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
decode_transforms = { reverse_prefixes = ["pk_live_", "pk_test_"], caesar_prefixes = ["pk_live_", "pk_test_"] }
keywords = ["pk_live_", "pk_test_"]

[[detector.patterns]]
regex = '(pk_(?:live|test)_[a-zA-Z0-9+/]{16,340}={0,2})(?:[^a-zA-Z0-9+/=]|$)'
description = "Clerk frontend publishable key with base64-encoded FAPI URL"
group = 1
# Clerk frontend key is designed to ship in Next.js / browser bundles
# alongside `<ClerkProvider>` - explicitly publishable. Server-side
# auth uses the Clerk secret key (separate detector).
client_safe = true

[[detector.tests]]
test_positive = "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_live_bG9uZ2VyLXByb2R1Y3Rpb24uYWNjb3VudHMuYWNtZS5kZXYk"
test_negative = "CLERK_SECRET_KEY=sk_test_ZXhhbXBsZS5hY2NvdW50cy5kZXYk"
