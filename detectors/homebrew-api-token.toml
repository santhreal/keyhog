# Docs: https://docs.brew.sh/Manpage#environment
# Format: GitHub Personal Access Token (ghp_ prefix or classic 40-char hex)
# Verify: Uses GitHub API verification (same as GitHub PAT)
# Prefix: ghp_ or 40-char hex

[detector]
id = "homebrew-api-token"
name = "Homebrew GitHub API Token"
service = "homebrew"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
validators = [{ type = "crc32-base62", prefixes = ["ghp_"], entropy_len = 30, checksum_len = 6, reject_overlong = true, confidence_floor = 0.9 }]
keywords = ["HOMEBREW_GITHUB_API_TOKEN", "HOMEBREW_GITHUB_PACKAGES_TOKEN"]

[[detector.patterns]]
regex = "(?:HOMEBREW_GITHUB_API_TOKEN|HOMEBREW_GITHUB_PACKAGES_TOKEN)[=:\\s\"'']+(ghp_[a-zA-Z0-9]{36}|[a-f0-9]{40})"
description = "Homebrew GitHub API token environment variable"
group = 1

[[detector.tests]]
test_positive = "HOMEBREW_GITHUB_API_TOKEN=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"
test_negative = "HOMEBREW_GITHUB_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
