# Docs: https://www.sanity.io/docs/http-auth
# Format: API token with sk prefix followed by project-specific identifier and 24-char hex secret
# Verify: GET /v1/data/query with Authorization header returns 200 if valid
# Prefix: sk

[detector]
id = "sanity-api-token"
name = "Sanity.io API Token"
service = "sanity"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["sanity", "sk", "SANITY_API_TOKEN", "@sanity/client"]

[[detector.patterns]]
regex = "sk[a-zA-Z0-9]{8,16}[a-f0-9]{24}"
description = "Sanity.io API token (sk prefix with project ID and secret)"

[[detector.patterns]]
regex = '''(?:SANITY|sanity)[_\-\s]*(?:API[_\-\s]*TOKEN|TOKEN)[=:\s"']+(sk[a-zA-Z0-9]{8,16}[a-f0-9]{24})'''
description = "Sanity.io API token with context anchor"
group = 1

[[detector.companions]]
name = "sanity_project_id"
regex = '''(?:SANITY|sanity)[_\-\s]*(?:PROJECT[_\-\s]*ID|project[_\-\s]*id)[=:\s"']+([a-z0-9]{8,12})'''
within_lines = 5

[[detector.tests]]
test_positive = "SANITY_API_TOKEN=sk4VI2EWMzmLvb5a9dd9403a8d3b0f37f91f289"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
