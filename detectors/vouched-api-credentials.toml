# Docs: https://docs.vouched.id/
# Format: API key for identity verification API
# Verify: https://docs.vouched.id/reference/jobs-1
# Prefix: none (requires context anchoring)

[detector]
id = "vouched-api-credentials"
name = "Vouched API Credentials"
service = "vouched"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["vouched", "VOUCHED"]

[[detector.patterns]]
regex = '''(?:vouched|VOUCHED)[_\-\s]*(api[_\-\s]*key)[=:;\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Vouched API key with context anchor"
group = 2

[[detector.patterns]]
regex = '''(?:vouched|VOUCHED)[_\-\s]*(api[_\-\s]*secret)[=:;\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Vouched API secret with context anchor"
group = 2

[detector.verify]
method = "GET"
url = "https://verify.vouched.id/api/v1/jobs"
allowed_domains = ["verify.vouched.id"]

[detector.verify.auth]
type = "header"
name = "X-Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "vouched api_key \"H_ZM9TBrKrmGsNmjQ8mT3OA94HhblZaQFP\""
test_negative = "VOUCHED_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
