# Docs: https://docs.vouched.id/
# Format: API key for identity verification API
# Verify: https://docs.vouched.id/reference/jobs-1
# Prefix: none (requires context anchoring)

[detector]
id = "vouched-api-credentials"
name = "Vouched API Credentials"
service = "vouched"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "api_key" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["vouched", "VOUCHED"]

[[detector.patterns]]
regex = "(?:vouched|VOUCHED)[_\\s]*(api[_\\s]*key)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Vouched API key with context anchor"
group = 2

[[detector.patterns]]
regex = "(?:vouched|VOUCHED)[_\\s]*(api[_\\s]*secret)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Vouched API secret with context anchor"
group = 2

[detector.verify]
method = "GET"
url = "https://verify.vouched.id/api/v1/jobs"
allowed_domains = ["verify.vouched.id"]

[detector.verify.auth]
type = "header"
name = "X-Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "vouched api_key \"H_ZM9TBrKrmGsNmjQ8mT3OA94HhblZaQFP\""
test_negative = "VOUCHED_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
