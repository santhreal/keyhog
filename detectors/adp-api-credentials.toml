# Docs: https://developers.adp.com/articles/get-started
# Format: OAuth 2.0 Client ID and Client Secret with SSL certificate authentication
# Verify: POST /auth/oauth/v2/token with client credentials and mTLS
# Prefix: none (requires context anchoring)

[detector]
id = "adp-api-credentials"
name = "ADP API Credentials"
service = "adp"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["ADP_CLIENT_ID", "ADP_CLIENT_SECRET", "adp"]

[[detector.patterns]]
regex = "(?:ADP_CLIENT_ID|adp_client_id)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "ADP API client ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ADP_CLIENT_SECRET|adp_client_secret)[=:\\s\"'']+([a-f0-9]{32,})"
description = "ADP API client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ADP_ACCESS_TOKEN|adp_access_token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "ADP access token with context anchor"
group = 1

[[detector.tests]]
test_positive = "ADP_CLIENT_ID=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "ADP_CLIENT_ID=not-a-uuid"
