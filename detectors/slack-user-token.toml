# Docs: https://api.slack.com/authentication/token-types
# Format: xoxp-{10-13 digits}-{10-13 digits}-{10-13 digits}-{32 hex chars}
# Verify: POST to slack.com/api/auth.test with Bearer token
# Prefix: xoxp-

[detector]
id = "slack-user-token"
name = "Slack User Token"
service = "slack"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
decode_transforms = { reverse_prefixes = ["xoxp-"], caesar_prefixes = ["xoxp-"] }
validators = [{ type = "pattern-shape", prefixes = ["xoxp-"], allow_overlong = false }]
# "user" removed: extremely over-broad (fires the detector on ANY text containing
# "user") and redundant, both regexes require the unambiguous `xoxp-` prefix
# (keyword "xoxp"), so "user" only forced wasted scan passes. Recall-neutral.
keywords = ["xoxp-", "slack"]
simdsieve_prefixes = ["xoxp-"]

[[detector.patterns]]
regex = 'xoxp-[0-9]{10,15}-[0-9]{10,15}(?:-[0-9]{10,13})?-[a-zA-Z0-9]{24,40}'
description = "Slack user token (xoxp- with optional numeric segment)"


[detector.verify]
method = "POST"
url = "https://slack.com/api/auth.test"
allowed_domains = ["slack.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "$.ok"
equals = "true"

[[detector.verify.metadata]]
name = "team"
json_path = "$.team"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "user"
json_path = "$.user"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "xoxp-1234567890123-2345678901234-3456789012345-7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "xoxp-123-456-789-abc"
