# Docs: https://api.slack.com/authentication/token-types
# Format: xoxp-{10-13 digits}-{10-13 digits}-{10-13 digits}-{32 hex chars}
# Verify: POST to slack.com/api/auth.test with Bearer token
# Prefix: xoxp-

[detector]
id = "slack-user-token"
name = "Slack User Token"
service = "slack"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
decode_transforms = { reverse_prefixes = ["xoxp-"], caesar_prefixes = ["xoxp-"] }
validators = [{ type = "pattern-shape", prefixes = ["xoxp-"], allow_overlong = false }]
# "user" removed: extremely over-broad (fires the detector on ANY text containing
# "user") and redundant, both regexes require the unambiguous `xoxp-` prefix
# (keyword "xoxp"), so "user" only forced wasted scan passes. Recall-neutral.
keywords = ["xoxp-", "slack"]
simdsieve_prefixes = ["xoxp-"]

[[detector.patterns]]
regex = 'xoxp-[0-9]{10,15}-[0-9]{10,15}(?:-[0-9]{10,13})?-[a-zA-Z0-9]{24,40}'
description = "Slack user token (xoxp- with optional numeric segment)"


[detector.verify]
method = "POST"
url = "https://slack.com/api/auth.test"
allowed_domains = ["slack.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "$.ok"
equals = "true"

[[detector.verify.metadata]]
name = "team"
json_path = "$.team"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "user"
json_path = "$.user"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "xoxp-1234567890123-2345678901234-3456789012345-7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "xoxp-123-456-789-abc"
