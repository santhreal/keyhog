# Docs: https://developer.musixmatch.com/documentation
# Format: 32 character hex API key
# Verify: GET /ws/1.1/chart.artists.get with apikey param returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "musixmatch-api-key"
name = "Musixmatch API Key"
service = "musixmatch"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["MUSIXMATCH", "musixmatch", "MUSIXMATCH_API_KEY", "musixmatch_api_key"]

[[detector.patterns]]
regex = '''(?:MUSIXMATCH|musixmatch)[_\-\s]*(?:API|api)?[_\-\s]*(?:KEY|key)?[=:\s"'']+([a-f0-9]{32})'''
description = "Musixmatch API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "MUSIXMATCH=431d32a80271b1e9ce85e2be0007d8ff"
test_negative = "MUSIXMATCH=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
