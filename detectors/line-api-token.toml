# Docs: https://developers.line.biz/en/docs/messaging-api/overview/
# Format: Channel access token - long-lived tokens start with specific patterns
# Verify: GET /v2/bot/info with Authorization: Bearer header
# Prefix: none (requires context anchoring)

[detector]
id = "line-api-token"
name = "LINE Messaging API Token"
service = "line"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["line", "LINE", "channel_access_token", "CHANNEL_ACCESS_TOKEN", "line-bot"]

[[detector.patterns]]
regex = "(?:line|LINE)[_\\-\\s]*(?:channel[_\\-\\s]*access[_\\-\\s]*token|CHANNEL[_\\-\\s]*ACCESS[_\\-\\s]*TOKEN)[=: \\s\"'']+([a-zA-Z0-9/+]{100,200}={0,2})"
description = "LINE channel access token (Base64) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:line|LINE)[_\\-\\s]*(?:channel[_\\-\\s]*secret|CHANNEL[_\\-\\s]*SECRET)[=: \\s\"'']+([a-f0-9]{32})"
description = "LINE channel secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "LINE CHANNEL_ACCESS_TOKEN=\"/ZM9TBrKrmGsNmjQ8mT3OA94HhblZa+QFPiyCEs5lkO/nMLpQAK4lXOELxyxeH8ilqtekYJEB1J5+TkPo/QyFcIoCVvQ2hmsCfjd==\""
test_negative = "CHANNEL_ACCESS_TOKEN=short"
