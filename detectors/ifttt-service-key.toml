# Docs: https://ifttt.com/docs/api_reference
# Format: 22 alphanumeric characters for webhook service key
# Verify: POST to webhook endpoint returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "ifttt-service-key"
name = "IFTTT Service/Webhook Key"
service = "ifttt"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "webhook" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["IFTTT", "ifttt", "maker.ifttt.com"]

[[detector.patterns]]
regex = "(?:IFTTT|ifttt)[=:\\s\"'']+([a-zA-Z0-9]{22})"
description = "IFTTT webhook/service key with context anchor"
group = 1

[[detector.patterns]]
regex = "maker\\.ifttt\\.com/trigger/[a-zA-Z0-9_]+/with/key/([a-zA-Z0-9]{22})"
description = "IFTTT maker webhook URL with key"
group = 1

[[detector.tests]]
test_positive = "IFTTT=BKrT2666jEnUtrVPk0CJeL"
test_negative = "IFTTT=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
