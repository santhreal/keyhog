# Docs: https://docs.airplane.dev/platform/api-keys
# Format: aptk_ prefix followed by alphanumeric characters
# Verify: no public verification endpoint
# Prefix: aptk_

[detector]
id = "airplane-api-key"
name = "Airplane API Key"
service = "airplane"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["aptk_", "AIRPLANE", "airplane"]

[[detector.patterns]]
regex = "aptk_[a-zA-Z0-9_\\-]{30,}"
description = "Airplane API key (aptk_ prefix)"

[[detector.patterns]]
regex = "(?:AIRPLANE|airplane)[_\\.\\s]*(?:API_KEY|api_key|token)[=:\\s\"'']+(aptk_[a-zA-Z0-9_\\-]{30,})"
description = "Airplane API key in environment variable"
group = 1

[[detector.patterns]]
regex = "Authorization[=:\\s\"'']+Bearer aptk_[a-zA-Z0-9_\\-]{30,}"
description = "Airplane API key in Authorization header"

[[detector.tests]]
test_positive = "aptk_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2SnTb"
test_negative = "aptk_short"
