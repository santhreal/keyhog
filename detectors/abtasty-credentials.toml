# Docs: https://developers.abtasty.com/
# Format: numeric client ID paired with API key/token
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "abtasty-credentials"
name = "AB Tasty Credentials"
service = "abtasty"
severity = "high"
keywords = ["ABTASTY", "abtasty", "AB_TASTY"]

[[detector.patterns]]
regex = "(?:ABTASTY|abtasty|AB_TASTY)[_:](?:API_KEY|api_key|TOKEN|token)[=:][\\s\"'']*([a-zA-Z0-9_-]{20,})"
description = "AB Tasty API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ABTASTY|abtasty|AB_TASTY)[_:](?:CLIENT_ID|client_id)[=:][\\s\"'']*(\\d+)"
description = "AB Tasty client ID"
group = 1

[[detector.tests]]
test_positive = "ABTASTY:API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
test_negative = "ABTASTY:API_KEY=short"
