# Docs: https://help.sap.com/docs/cloud-foundry/63f0b8af17584cbd99ddc2d1baa47600/e815ca26f4f34b259165956d37884f76.html
# Format: OAuth2 client credentials or API key for SAP Cloud Platform
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "sap-api-key"
name = "SAP API Key"
service = "sap"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["sap", "SAP_CLIENT_ID", "SAP_CLIENT_SECRET", "SAP_API_KEY"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:sap)[._-]?(?:client[_\-\s]*id)[=:\s"'']+([a-zA-Z0-9_-]{10,})'''
description = "SAP OAuth2 client ID with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:sap)[._-]?(?:client[_\-\s]*secret)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "SAP OAuth2 client secret with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:sap)[._-]?(?:api[_\-\s]*key|token)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "SAP API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:sap)[._-]?(?:username|user)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "SAP username with context anchor"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:sap)[._-]?(?:password|pass|pwd)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "SAP password with context anchor"
group = 1

[[detector.tests]]
test_positive = "sap_client_id=SapClientId12"
test_negative = "sap_client_id=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
