# Docs: https://docs.upstash.com/kafka
# Format: UPSTASH_KAFKA_REST_URL + UPSTASH_KAFKA_REST_USERNAME + UPSTASH_KAFKA_REST_PASSWORD
# Verify: no public verification endpoint
# Prefix: none (URL-based with username/password companion)

[detector]
id = "upstash-kafka-credentials"
name = "Upstash Kafka Credentials"
service = "upstash"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["UPSTASH_KAFKA", "UPSTASH_KAFKA_REST_URL", "upstash-kafka"]

[[detector.patterns]]
regex = "(https://[a-z0-9-]+-kafka\\.upstash\\.io)"
description = "Upstash Kafka REST URL"
group = 1

[[detector.companions]]
name = "rest_password"
regex = "UPSTASH_KAFKA_REST_PASSWORD[=:\\s\"'']+([A-Za-z0-9_-]+)"
within_lines = 5

[[detector.tests]]
test_positive = "https://afmi92zj0y0jmsj-kafka.upstash.io"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
