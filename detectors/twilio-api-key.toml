# Docs: https://www.twilio.com/docs/iam/api-keys/key-resource-v1
# Format: SK prefix followed by 32 hex characters
# Verify: GET /2010-04-01/Accounts/{SID}.json with Basic auth returns 200 if valid
# Prefix: SK

[detector]
id = "twilio-api-key"
name = "Twilio API Key"
service = "twilio"
severity = "high"
keywords = [
    # The "SK" prefix itself is 2 chars, below the AC prefilter's 4-char
    # floor (see engine/compile.rs), so it never reaches the prefilter
    # gate even if listed. Useful keywords are the full env-var names
    # and the vendor string, all >= 4 chars.
    "twilio",
    "TWILIO",
    "TWILIO_API_KEY_SID",
    "TWILIO_API_KEY",
    "TWILIO_SID",
    "twilio_api_key",
    "twilio_sid",
]

[[detector.patterns]]
regex = "SK[a-f0-9]{32}"
description = "Twilio API key SID (SK prefix + exactly 32 hex chars)"

[[detector.companions]]
name = "secret"
# Companion matching is case-sensitive unless the detector opts in. Config-key
# casing is not part of the credential format, so fold the anchor only.
regex = "(?i:(?:TWILIO[_-]?API[_-]?SECRET|SECRET))[=:\\s\"'']+([a-zA-Z0-9]{32})"
within_lines = 3
required = true
[detector.verify]
method = "GET"
url = "https://api.twilio.com/2010-04-01/Accounts/{{match}}.json"

[detector.verify.auth]
type = "basic"
username = "match"
password = "companion.secret"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "friendly_name"
json_path = "friendly_name"

[[detector.verify.metadata]]
name = "status"
json_path = "status"

[[detector.tests]]
test_positive = "TWILIO_API_KEY=SK3d5f7b9c1e2a4d6f8b0c2e4a6d8f1b3c\nTWILIO_API_SECRET=7a2c4e6f8b1d3a5c7e9f2b4d6a8c1e3f"
test_negative = "TWILIO_API_KEY=SK3d5f7b9c1e2a4d6f8b0c2e4a6d8f1b3c"

[[detector.tests]]
test_positive = "TWILIO_API_KEY=SK3d5f7b9c1e2a4d6f8b0c2e4a6d8f1b3c\nTwilio_Api_Secret=7a2c4e6f8b1d3a5c7e9f2b4d6a8c1e3f"
