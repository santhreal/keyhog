# Docs: https://api.slack.com/authentication/token-types
# Accepted contract: xoxb-{10-15 digits}-{10-15 digits}-{15-40 alphanumeric},
# plus the older xoxb-{10-15 digits}-{15-40 alphanumeric} form.
# Verify: POST to slack.com/api/auth.test with Bearer token
# Prefix: xoxb-

[detector]
id = "slack-bot-token"
name = "Slack Bot Token"
service = "slack"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
validators = [{ type = "pattern-shape", prefixes = ["xoxb-"], allow_overlong = false }]
# "bot" removed: over-broad (robot/bottom/bottle/abbot all contain it) and
# redundant: every regex requires the unambiguous `xoxb-` prefix (keyword
# "xoxb"), so "bot" only forced wasted scan passes. Recall-neutral.
keywords = ["xoxb-", "slack"]
simdsieve_prefixes = ["xoxb-"]

[[detector.patterns]]
regex = 'xoxb-[0-9]{10,15}-[0-9]{10,15}-[a-zA-Z0-9]{15,40}'
description = "Slack bot token (3-segment)"

[[detector.patterns]]
regex = 'xoxb-[0-9]{10,15}-[0-9A-Za-z]{15,40}'
description = "Slack bot token (2-segment or mixed)"

[detector.verify]
method = "POST"
url = "https://slack.com/api/auth.test"
allowed_domains = ["slack.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "$.ok"
equals = "true"

[[detector.verify.metadata]]
name = "team"
json_path = "$.team"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "user"
json_path = "$.user"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "team_id"
json_path = "$.team_id"
sensitivity = "hashed"



[[detector.tests]]
test_positive = "xoxb-1234567890-1234567890-AbCdEfGhIjKlMnOpQrStUvWx"
test_negative = "NOT_A_SECRET=totally_benign_example_12345"
