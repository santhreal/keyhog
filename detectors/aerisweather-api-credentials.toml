# Docs: https://www.aerisweather.com/support/docs/api/
# Format: Access ID and Secret Key pair (OAuth 2.0 style client credentials)
# Verify: GET with access_id and secret_key parameters returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "aerisweather-api-credentials"
name = "AerisWeather API Credentials"
service = "aerisweather"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["AERIS", "aeris", "AERISWEATHER", "aerisweather", "XWEATHER", "xweather"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32, 40] }]

[[detector.patterns]]
regex = '''(?:AERIS|aeris|AERISWEATHER|aerisweather)[_\-\s]*(?:CLIENT[_\-\s]*)?ID[=:\s"'']+([a-zA-Z0-9]{8,40})\b'''
description = "AerisWeather access/client ID"
group = 1

[[detector.patterns]]
regex = '''(?:AERIS|aeris|AERISWEATHER|aerisweather)[_\-\s]*(?:SECRET[_\-\s]*)?KEY[=:\s"'']+([a-zA-Z0-9]{20,40})\b'''
description = "AerisWeather secret key"
group = 1

[[detector.patterns]]
regex = "(?:access_id|ACCESS_ID)[=:\\s\"'']+([a-zA-Z0-9]{8,40})\\b"
description = "AerisWeather access_id parameter"
group = 1

[[detector.companions]]
name = "aerisweather_secret_key"
regex = "(?:secret_key|SECRET_KEY)[=:\\s\"'']+([a-zA-Z0-9]{20,40})\\b"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.aerisapi.com/forecasts/London,UK?client_id={{match}}&client_secret={{companion.aerisweather_secret_key}}"
allowed_domains = ["api.aerisapi.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AERIS_CLIENT_ID=Kp4Qx7Rm2Sn5Tb8V"
test_negative = "AERIS_CLIENT_ID=ab"
