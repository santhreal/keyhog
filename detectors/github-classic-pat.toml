# Docs: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
# Format: ghp_ prefix followed by exactly 36 alphanumeric characters
# Verify: GET /user with Bearer token returns 200 if valid
# Prefix: ghp_
#
# The trailing `\b` right-boundary makes this fixed-length token self-delimiting:
# a 40-char `ghp_` token embedded in a longer word-character run (e.g.
# `ghp_<40>X`) is NOT a valid classic PAT, so the regex must fail closed instead
# of reporting the 40-char prefix. Same convention as twilio-auth-token
# (`(?-i)\bAC[a-f0-9]{32}\b`). Trailing-only by design: a leading `\b` would
# diverge between the whole-text extraction path (which sees the preceding byte)
# and the simdsieve hot path (whose candidate slice begins at the `ghp_` literal
# and has already lost that context), reintroducing a hot-vs-regular mismatch.

[detector]
id = "github-classic-pat"
name = "GitHub Classic PAT"
service = "github"
severity = "critical"
resolution_priority = 2
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
decode_transforms = { reverse_prefixes = ["ghp_"], caesar_prefixes = ["ghp_"] }
validators = [{ type = "crc32-base62", prefixes = ["ghp_"], entropy_len = 30, checksum_len = 6, reject_overlong = true, confidence_floor = 0.9 }]
keywords = ["ghp_"]
simdsieve_prefixes = ["ghp_"]

[[detector.patterns]]
regex = 'ghp_[A-Za-z0-9]{36}\b'
description = "GitHub classic personal access token"

[detector.verify]
method = "GET"
url = "https://api.github.com/user"
allowed_domains = ["api.github.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[[detector.verify.headers]]
name = "User-Agent"
value = "keyhog-secret-scanner/{{version}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "GH_TOKEN=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"
test_negative = "ghp_ tag in a sentence"
