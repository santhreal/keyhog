# Docs: https://rapidapi.com/apidojo/api/shazam
# Format: RapidAPI key for Shazam API access (alphanumeric with dashes)
# Verify: no public verification endpoint (requires RapidAPI subscription)
# Prefix: none (requires context anchoring)

[detector]
id = "shazam-api-credentials"
name = "Shazam API Credentials"
service = "shazam"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["SHAZAM", "shazam", "SHAZAM_API_KEY", "shazam_api_key", "X-RapidAPI-Key"]

[[detector.patterns]]
regex = "(?:SHAZAM|shazam)[\\\\s_-]?(?:API|api)?[\\\\s_-]?(?:KEY|key)?[=:\\s\"'']+([a-f0-9]{32})"
description = "Shazam API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:RAPID|rapid)[\\\\s_-]?(?:API|api)[\\\\s_-]?(?:KEY|key)[=:\\s\"'']+([a-f0-9]{32})"
description = "RapidAPI key used for Shazam API"
group = 1

[[detector.tests]]
test_positive = "SHAZAM=85de8e8e1a3946c743f545a29af384f2"
test_negative = "SHAZAM=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
