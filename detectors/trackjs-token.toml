# Docs: https://docs.trackjs.com/QuickStart/
# Format: Base64-like string with specific TrackJS token format (32 chars + 24 chars separated by colon)
# Verify: none (no simple validation endpoint without customer ID)
# Prefix: none (unique TrackJS token format)

[detector]
id = "trackjs-token"
name = "TrackJS Token"
service = "trackjs"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["TrackJS", "trackJs", "trackjs", "TRACKJS", "token", "YOUR_TOKEN"]

[[detector.patterns]]
regex = "(?:TrackJS|trackJs|trackjs|TRACKJS)[=:\\s\\\"']*\\{[^}]*token[=:\\s\\\"']+([A-Za-z0-9+/]{32}:[A-Za-z0-9+/]{24})"
description = "TrackJS account token in install configuration"
group = 1

[[detector.patterns]]
regex = "trackjs.*token[=:\\s\\\"']+([A-Za-z0-9+/]{32}:[A-Za-z0-9+/]{24})"
description = "TrackJS token with context"
group = 1

[[detector.tests]]
test_positive = "trackJs     \"  =   \"=:= : =   ' ::\"  ='    = :\"\" =:\"    \" =:'  :     :   \"  =   '   {\"g$U!9Sn;9jh1?I<{ACM_CwKKy4gunU65OTL9>~token   = ::  :   ::=      \": = '     ': ' =   ': ZCLsL1ZLqacFatMzJYNYaxTkv/MBCWDu:bV8PI58J4RjmL5n1DLvmSZYO"
test_negative = "trackJs     \"  =   \"=:= : =   ' ::\"  ='    = :\"\" =:\"    \" =:'  :     :   \"  =   '   {\"g$U!9Sn;9jh1?I<{ACM_CwKKy4gunU65OTL9>~token   = ::  :   ::=      \": = '     ': ' =   ': YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
