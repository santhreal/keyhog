# Docs: https://developer.fiserv.com/product/CommerceHub/docs/?path=docs/Resources/Guides/Credentials.md
# Format: Service ID and API key (varies by integration type)
# Verify: POST to Worldpay/FISERV API with proper headers
# Prefix: none (requires context anchoring)

[detector]
id = "worldpay-api-credentials"
name = "Worldpay API Credentials"
service = "worldpay"
severity = "low"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "API_KEY" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
# "merchant_id" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept). Recall-neutral.
keywords = ["WORLDPAY", "worldpay", "SERVICE_ID", "fiserv", "FISERV"]

[[detector.patterns]]
regex = "(?i)worldpay[._-]?service[._-]?(?:id)?[=:\\s\"'']+([a-zA-Z0-9_-]{9,31}[a-zA-Z0-9_])\\b(?:[^a-zA-Z0-9_-]|$)"
description = "Worldpay Service ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)worldpay[._-]?merchant[._-]?(?:id)?[=:\\s\"'']+([a-zA-Z0-9]{8,20})\\b(?:[^a-zA-Z0-9_-]|$)"
description = "Worldpay Merchant ID with context anchor"
group = 1

[[detector.tests]]
test_positive = "WORLDPAY_SERVICE_ID=VkPWCSH92J12"
test_negative = "WORLDPAY_SERVICE_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"

[[detector.tests]]
test_positive = "worldpaySERVICEID=S2cd698Emai9RK4ljp9bjpvS6wc1UAvz"
test_negative = "worldpaySERVICEID=short"
