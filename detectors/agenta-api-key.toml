# Docs: https://agenta.ai/docs/reference/api/agenta-api
# Format: 32-character hex string, no unique prefix
# Verify: GET /apps with Authorization: ApiKey header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "agenta-api-key"
name = "Agenta API Key"
service = "agenta"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "ApiKey" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["AGENTA_API_KEY", "agenta"]

[[detector.patterns]]
regex = "(?:\\bAGENTA_API_KEY|\\bagenta\\.api\\.key)[=:\\s\"'']+([a-f0-9]{32})"
description = "Agenta API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://cloud.agenta.ai/api/apps"
allowed_domains = ["cloud.agenta.ai"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "ApiKey {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AGENTA_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "AGENTA_API_KEY=short"
