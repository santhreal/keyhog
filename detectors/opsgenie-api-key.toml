# Docs: https://docs.opsgenie.com/docs/api-key-management
# Format: UUID (8-4-4-4-12 hex segments) used with GenieKey prefix in Authorization header
# Verify: GET /v2/account with GenieKey authorization returns 200 if valid
# Prefix: none (UUID format, uses GenieKey keyword context)

[detector]
id = "opsgenie-api-key"
name = "OpsGenie API Key"
service = "opsgenie"
severity = "critical"
# "api_key" removed: over-broad generic prefilter the regex does NOT need — every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["GenieKey", "OPSGENIE", "opsgenie", "api-key"]

[[detector.patterns]]
regex = "(?:opsgenie|OPSGENIE)[._]?(?:API|api)?[._]?(?:KEY|key)?[=:\\s\"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "OpsGenie API key with context anchor (UUID format)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.opsgenie.com/v2/account"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "GenieKey {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "opsgenie=6b15696d-bb3e-5040-215f-e28bb6ac69a4"
test_negative = "opsgenie=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
