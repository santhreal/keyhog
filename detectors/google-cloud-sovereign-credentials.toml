# Docs: https://cloud.google.com/sovereign-cloud
# Format: Google Cloud service account JSON key for sovereign regions
# Verify: No public verification endpoint for sovereign regions
# Prefix: none (requires context anchoring)

[detector]
id = "google-cloud-sovereign-credentials"
name = "Google Cloud Sovereign Credentials"
service = "google-cloud-sovereign"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["GOOGLE_CLOUD_SOVEREIGN", "GOOGLE_SOVEREIGN", "europe-west3", "europe-west9"]

[[detector.patterns]]
regex = '''(?:GOOGLE[_\-\s]*CLOUD[_\-\s]*SOVEREIGN|GOOGLE[_\-\s]*SOVEREIGN)[_\-\s]*(?:PROJECT[_\-\s]*ID)[=:\s"'']+([a-z][a-z0-9-]{4,28})'''
description = "Google Cloud Sovereign project ID"
group = 1

[[detector.patterns]]
regex = '''(?:GOOGLE[_\-\s]*CLOUD[_\-\s]*SOVEREIGN|GOOGLE[_\-\s]*SOVEREIGN)[_\-\s]*(?:PRIVATE[_\-\s]*KEY[_\-\s]*ID)[=:\s"'']+([a-f0-9]{40})(?:[^a-f0-9]|$)'''
description = "Google Cloud Sovereign private key ID"
group = 1

[[detector.tests]]
test_positive = "GOOGLE_SOVEREIGN PRIVATE_KEY_ID=0123456789abcdef0123456789abcdef01234567"
test_negative = "GOOGLE_SOVEREIGN PRIVATE_KEY_ID=0123456789abcdef0123456789abcdef0123456789ab"

[[detector.patterns]]
regex = '''(?:GOOGLE[_\-\s]*CLOUD[_\-\s]*SOVEREIGN|GOOGLE[_\-\s]*SOVEREIGN)[_\-\s]*(?:CLIENT[_\-\s]*EMAIL)[=:\s"'']+([a-z0-9-_]+@[a-z0-9-]+\.iam\.gserviceaccount\.com)'''
description = "Google Cloud Sovereign service account email"
group = 1

[[detector.patterns]]
regex = '''(?:GOOGLE[_\-\s]*CLOUD[_\-\s]*SOVEREIGN|GOOGLE[_\-\s]*SOVEREIGN)[_\-\s]*(?:CLIENT[_\-\s]*ID)[=:\s"'']+([0-9]{21})'''
description = "Google Cloud Sovereign client ID"
group = 1
