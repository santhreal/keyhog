# Docs: https://developer.carbonblack.com/reference/carbon-black-cloud/authentication/
# Format: API key with CB prefix or custom org key, combined with API ID
# Verify: GET /appservices/v6/orgs/{org_key}/devices with X-Auth-Token header
# Prefix: none (requires context anchoring)

[detector]
id = "carbon-black-api-key"
name = "Carbon Black API Key"
service = "carbon-black"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["CARBONBLACK", "carbonblack", "CARBON_BLACK_KEY", "CB API KEY", "CB_API_KEY", "CB KEY", "VMWARE_CB"]
# `CARBON BLACK`, `CB API KEY`, and `VMWARE_CB KEY` are vendor-specific anchors,
# so a random 20–32-character hex body is positive evidence, not a generic hash
# candidate. Keep the detector-local all-zero fixture exclusion below instead
# of applying generic weak-anchor suppression to every valid Carbon Black key.
weak_anchor = false
allowlist_values = ["^0{20,32}$"]

[[detector.patterns]]
regex = '''(?:CARBON[_\-\s]*BLACK|carbon[_\-\s]*black|CB|vmware_cb)[_\-\s]*(?:API[_\-\s]*)?KEY[=:\s"'']+([A-F0-9]{20,32})'''
required_literals = ["CARBON", "CB"]
description = "Carbon Black API key with context anchor"
group = 1

[[detector.companions]]
name = "carbon_black_api_id"
# Anchored to the `CB_API_ID=` declaration; auto-detected capture group
# resolves `{{companion.carbon_black_api_id}}` to just the numeric id.
regex = '''(?:CARBON[_\-\s]*BLACK|carbon[_\-\s]*black|CB)[_\-\s]*(?:API[_\-\s]*)?ID[=:\s"'']+([0-9]+)'''
within_lines = 5

# Org key companion. Anchored to the `CB_ORG_KEY=` declaration so a stray
# 8-16 char uppercase token doesn't qualify; the capture group resolves
# `{{companion.org_key}}` to the key value alone.
[[detector.companions]]
name = "org_key"
regex = '''(?:CARBON[_\-\s]*BLACK|carbon[_\-\s]*black|CB)[_\-\s]*ORG[_\-\s]*KEY[=:\s"'']+([A-Z0-9]{8,16})'''
within_lines = 5

[detector.verify]
method = "GET"
# `{{companion.org_key}}` substitutes the matched org key. Earlier this used
# single-brace `{org_key}` which the interpolator never resolved - every
# verify hit a literal `{org_key}` segment in the URL path.
url = "https://defense.conferdeploy.net/appservices/v6/orgs/{{companion.org_key}}/devices"
allowed_domains = ["conferdeploy.net"]

[detector.verify.auth]
type = "header"
name = "X-Auth-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "CB API KEY=7B3E5D8C1A9F4E2B6C8D3A5E"
test_negative = "CB API KEY=short"
