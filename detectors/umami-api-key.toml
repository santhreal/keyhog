# Docs: https://umami.is/docs/api/authentication
# Format: UUID format (xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx) for website IDs, JWT-like tokens for auth
# Verify: GET /api/websites with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "umami-api-key"
name = "Umami Analytics API Key"
service = "umami"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["UMAMI_API_KEY", "umami_api_key", "umami.is"]

[[detector.patterns]]
regex = '''(?:UMAMI[_\-\s]*API[_\-\s]*KEY|umami[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Umami API key (website ID) in UUID format with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:UMAMI[_\-\s]*WEBSITE[_\-\s]*ID|umami[_\-\s]*website)[=:\s"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Umami website ID in UUID format"
group = 1

[[detector.tests]]
test_positive = "UMAMI_API_KEY=6ea17ead-9d16-752e-bc57-4e4ac8609e13"
test_negative = "UMAMI_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
