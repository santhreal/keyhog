# Docs: https://supabase.com/docs/guides/api/api-keys
# Format: eyJ... JWT with 'role: anon' claim
# Verify: no public verification endpoint (requires Supabase instance)
# Prefix: eyJ

[detector]
id = "supabase-anon-key"
name = "Supabase Anon Key"
service = "supabase"
severity = "medium"
keywords = ["supabase", "anon", "anon key", "SUPABASE_ANON_KEY"]

[[detector.patterns]]
regex = "(?:SUPABASE_ANON_KEY|anon key)[=:\\s\"'']+(eyJ[a-zA-Z0-9_-]+\\.eyJ[a-zA-Z0-9_-]+\\.[a-zA-Z0-9_-]+)"
description = "Supabase anon key with context anchor"
group = 1

[[detector.tests]]
test_positive = "SUPABASE_ANON_KEY=eyJhLD.eyJU16ZBmIIV3MOOWUXh-WS4UwUtRqqHlT9ANpC.KogxfWs1PZbn20DHnHLP5g78xRyaU82oYuwJ"
test_negative = "SUPABASE_ANON_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
