# Docs: https://docs.tomorrow.io/reference/welcome
# Format: API key passed as 'apikey' or 'location' parameter
# Verify: GET /v4/weather/forecast with apikey parameter returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "tomorrow-api-key"
name = "Tomorrow.io API Key"
service = "tomorrow"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["TOMORROW", "tomorrow", "TOMORROW_API_KEY", "CLIMACELL", "climacell"]

[[detector.patterns]]
regex = '''(?:TOMORROW|tomorrow|CLIMACELL|climacell)[_\-\s]*(?:API[_\-\s]*)?KEY[=:\s"'']+([a-zA-Z0-9]{20,})'''
description = "Tomorrow.io API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:apikey|APIKEY)[=:\\s\"'']+([a-zA-Z0-9]{20,})[^a-zA-Z0-9].*(?:tomorrow|climacell)"
description = "Tomorrow.io apikey parameter with URL context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.tomorrow.io/v4/weather/forecast?location=42.3601,-71.0589&apikey={{match}}"
allowed_domains = ["api.tomorrow.io"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "tomorrow      _     _   _     _              _      _    KEY '   \"' :'='       \"'     ' 4n3FhslpA2JoPccqUu2r5DQNogrUqgGidmASlLTHuAR1e9S"
test_negative = "tomorrow      _     _   _     _              _      _    KEY '   \"' :'='       \"'     ' YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
