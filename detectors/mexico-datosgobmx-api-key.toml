# Docs: https://datos.gob.mx/busca/api/3/
# Format: CKAN API key for Mexican open data portal (Sistema Ajolote)
# Verify: Authorization header with CKAN API key to datos.gob.mx
# Prefix: none (requires context anchoring)

[detector]
id = "mexico-datosgobmx-api-key"
name = "Mexico Datos.gob.mx API Key"
service = "mexico-datosgobmx"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["datos.gob.mx", "DATOS_GOB_MX", "SISTEMA_AJOLOTE", "datosgobmx"]

[[detector.patterns]]
regex = '''(?:datos\.gob\.mx|DATOS_GOB|AJOLOTE)[_.-]?(?:API[_\-\s]*KEY|api_key|CKAN[_\-\s]*KEY|ckan_key)[\s"'=:]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Mexico datos.gob.mx CKAN API key"
group = 1

[[detector.patterns]]
regex = '''(?:datos\.gob\.mx).{0,30}Authorization[:\s]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Mexico datos.gob.mx API key in Authorization header"
group = 1

[[detector.patterns]]
regex = '''(?:api|admin)[_.-]?key[\s"'=:]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}).{0,30}(?:datos\.gob\.mx|mexico)'''
description = "Mexico CKAN API key with trailing context"
group = 1

[[detector.tests]]
test_positive = "DATOS_GOB_API_KEY=f81a1948-ed21-1d74-ea77-cfb73d772899"
test_negative = "DATOS_GOB_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
