# Docs: https://www.cockroachlabs.com/docs/cockroachcloud/api-authentication
# Format: 7_7_7_6_3 uppercase alphanumeric segments separated by underscores
# Verify: GET /api/v1/clusters with Bearer token
# Prefix: none (unique segmented format with underscores)

[detector]
id = "cockroachdb-api-key"
name = "CockroachDB API Key"
service = "cockroachdb"
severity = "critical"
keywords = ["cockroachlabs", "cockroachdb", "COCKROACH_API_KEY"]

[[detector.patterns]]
regex = "(?:cockroachlabs|COCKROACH_API_KEY)[=:\\s\"']+([A-Z0-9]{7}_[A-Z0-9]{7}_[A-Z0-9]{7}_[A-Z0-9]{6}_[A-Z0-9]{3})"
description = "CockroachDB Cloud API secret key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://cockroachlabs.cloud/api/v1/clusters"
allowed_domains = ["cockroachlabs.cloud"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "COCKROACH_API_KEY=KP4QX7R_M2SN5TB_VW3YZKP_4QX7RM_2SN"
test_negative = "COCKROACH_API_KEY=short"
