# Docs: https://developer.drip.com/
# Format: API token used for Basic Auth (as username) or OAuth access token
# Verify: GET /v3/accounts with Basic auth (username=token, password=any) returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "drip-api-token"
name = "Drip API Token"
service = "drip"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "api_token", "access_token" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["drip", "DRIP"]

[[detector.patterns]]
regex = '''(?i)drip[_\-\s]*(?:api[_\-\s]*)?(?:token|key)[=:\s"']+([a-zA-Z0-9_-]{20,})'''
description = "Drip API token with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?i)drip[_\-\s]*(?:account[_\-\s]*)?id[=:\s"']+([a-zA-Z0-9]{6,})'''
description = "Drip Account ID"
group = 1

[[detector.patterns]]
regex = '''(?i)drip[_\-\s]*(?:oauth[_\-\s]*)?token[=:\s"']+([a-zA-Z0-9_-]{20,})'''
description = "Drip OAuth access token"
group = 1

[[detector.tests]]
test_positive = "drip_api_token=kEnydx9qWCA79ISjs8JHUdKF0"
test_negative = "drip_api_token=short"
