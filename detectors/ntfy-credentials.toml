# Docs: https://docs.ntfy.sh/publish/#access-tokens
# Format: tk_ prefix followed by alphanumeric characters (self-hosted may vary)
# Verify: GET with Authorization header returns 200 if valid
# Prefix: tk_

[detector]
id = "ntfy-credentials"
name = "Ntfy Credentials"
service = "ntfy"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["tk_", "ntfy", "NTFY"]

[[detector.patterns]]
regex = '(?-i)tk_[a-zA-Z0-9]{20,}'
description = "Ntfy access token (tk_ prefix)"

[[detector.tests]]
test_positive = "tk_p7ZTbNBEfRY8XTJ11XErKNuDX4bJeIZk"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
