# Docs: https://docs.arbitrum.io/
# Format: Arbitrum RPC endpoints use API keys in URL path or Authorization header
# Verify: no public verification endpoint
# Prefix: service-owned RPC URLs; generic hex API keys require context anchoring

[detector]
id = "arbitrum-api-credentials"
name = "Arbitrum API Credentials"
service = "arbitrum"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["arbitrum", "ARBITRUM", "arb", "ARB", "arbiscan", "arbitrum.io"]

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(?:arbitrum|ARBITRUM|arb|ARB)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+\.g\.alchemy\.com/v2/[a-zA-Z0-9_-]+)'
description = "Arbitrum RPC URL with Alchemy API key"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(https?://[a-zA-Z0-9._-]+\.g\.alchemy\.com/v2/[a-zA-Z0-9_-]+)(?:$|[^A-Za-z0-9_-])'
description = "Bare Arbitrum Alchemy RPC URL with API key"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(?:arbitrum|ARBITRUM|arb|ARB)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/arbitrum/[a-zA-Z0-9_-]+)'
description = "Arbitrum RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(https?://[a-zA-Z0-9._-]+/arbitrum/[a-zA-Z0-9_-]+)(?:$|[^A-Za-z0-9_-])'
description = "Bare Arbitrum path RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(?:arbitrum|ARBITRUM|arb|ARB)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/v2/[a-zA-Z0-9_-]+)'
description = "Arbitrum RPC URL with API version and key"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(?:arbitrum|ARBITRUM|arb|ARB)[._-]?(?:api|API)[._-]?key[=:"	\s]+([a-f0-9]{32})'
description = "Arbitrum API key (32 hex characters)"
group = 1

[[detector.tests]]
test_positive = "ARBITRUM_RPC_URL https://arb-mainnet.g.alchemy.com/v2/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "ARBITRUM_RPC_URL https://example.com/api"
