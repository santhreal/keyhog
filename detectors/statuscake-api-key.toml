# Docs: https://developers.statuscake.com/guides/api/authentication/
# Format: Bearer token authentication (alphanumeric string)
# Verify: GET /v1/uptime with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "statuscake-api-key"
name = "StatusCake API Key"
service = "statuscake"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["statuscake", "STATUSCAKE", "Authorization", "Bearer", "api.statuscake.com"]

[[detector.patterns]]
regex = '''(?:statuscake|STATUSCAKE)[_.\s-]*(?:api[_\-\s]*key|token)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "StatusCake API key with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization:\\s*Bearer\\s+([a-zA-Z0-9_-]{20,})[^\\n]*(?:statuscake|api\\.statuscake\\.com)"
description = "StatusCake bearer token with context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.statuscake.com/v1/uptime"
allowed_domains = ["api.statuscake.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "statuscake api_key abcdefghijklmnopqrstuvwx"
test_negative = "statuscake api_key abcdefghijklmnopqrs"
