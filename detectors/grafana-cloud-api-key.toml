# Docs: https://grafana.com/docs/grafana-cloud/account-management/authentication-and-permissions/access-policies/
# Format: `glc_<base64>` cloud access-policy tokens, `glsa_<32>_<8 hex>`
#         service-account tokens, and legacy `eyJrIjoi…` API keys (base64 of
#         a {"k":"…"} JSON blob). All carry distinctive vendor prefixes.
# Added: home-turf bench (DET-17) (grafana fixtures were false-negatives).

[detector]
id = "grafana-cloud-api-key"
name = "Grafana Cloud API Key"
service = "grafana"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["glc_", "glsa_", "eyJrIjoi", "grafana"]

[[detector.patterns]]
regex = 'glc_[A-Za-z0-9+/]{40,150}={0,2}'
description = "Grafana Cloud access-policy token (glc_…)"
group = 0

[[detector.patterns]]
regex = 'glsa_[A-Za-z0-9]{32}_[a-fA-F0-9]{8}'
description = "Grafana service-account token (glsa_<32>_<8 hex>)"
group = 0

[[detector.patterns]]
regex = 'eyJrIjoi[A-Za-z0-9+/]{40,380}={0,2}'
description = "Grafana legacy API key (base64 of {\"k\":…})"
group = 0

[[detector.tests]]
test_positive = 'GRAFANA_TOKEN=glsa_HOruNAb7SOiCdshU7algkrq7FDsNSLAa_5e1c2d3f'
test_negative = "GRAFANA_URL=https://grafana.example.com/dashboards"
