# Docs: https://help.chargeover.com/docs/integrations/vertex/
# Format: Trusted ID (alphanumeric password), Company code, Division code
# Verify: SOAP/REST call to Vertex O Series endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "vertex-api-credentials"
name = "Vertex API Credentials"
service = "vertex"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["VERTEX", "vertex", "trusted_id", "company_code"]

[[detector.patterns]]
regex = "(?:VERTEX|vertex)[._]?(?:TRUSTED|trusted)[._]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9_-]{8,})"
description = "Vertex Trusted ID (API password) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:VERTEX|vertex)[._]?(?:COMPANY|company)[._]?(?:CODE|code)[=:\\s\"'']+([A-Z0-9]{2,10})"
description = "Vertex Company code with context anchor"
group = 1

[[detector.tests]]
test_positive = "vertexTRUSTEDid  ':     = ' \"'    = :    =\" ':===  Lbn3bakS-hGQBezXay13tLoSHlow7ZWp_KLaADg8mRFQVnUJKCYdlt9Ncpb8sqakVxYZeMx"
test_negative = "vertexTRUSTEDid  ':     = ' \"'    = :    =\" ':===  YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
