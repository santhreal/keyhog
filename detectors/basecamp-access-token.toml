# Docs: https://github.com/basecamp/bc3-api
# Format: OAuth 2.0 bearer token, variable length alphanumeric
# Verify: GET /999999999/projects.json returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "basecamp-access-token"
name = "Basecamp Access Token"
service = "basecamp"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["BASECAMP_ACCESS_TOKEN", "BASECAMP_TOKEN"]

[[detector.patterns]]
regex = "(?:BASECAMP_ACCESS_TOKEN|BASECAMP_TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{40,60})"
description = "Basecamp OAuth 2.0 access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://3.basecampapi.com/identity.json"
allowed_domains = ["3.basecampapi.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "BASECAMP_ACCESS_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpKp"
test_negative = "BASECAMP_ACCESS_TOKEN=short"
