# Docs: https://docs.stripe.com/api/authentication
# Format: sk_live_ / sk_test_ / rk_live_ / rk_test_ followed by 24+ alphanumeric chars
# Verify: GET to api.stripe.com/v1/charges with Basic auth (key as username)
# Prefix: sk_live_, sk_test_, rk_live_, rk_test_

[detector]
id = "stripe-secret-key"
name = "Stripe Secret Key"
service = "stripe"
severity = "critical"
keywords = ["sk_live_", "sk_test_", "rk_live_", "rk_test_", "stripe"]
simdsieve_prefixes = ["sk_live_", "sk_test_", "rk_live_", "rk_test_"]

[[detector.patterns]]
regex = 'sk_live_[a-zA-Z0-9]{24,}'
description = "Stripe live secret key"

[[detector.patterns]]
regex = 'sk_test_[a-zA-Z0-9]{24,}'
description = "Stripe test secret key"

[[detector.patterns]]
# Stripe restricted live key. Same alphabet/length family as sk_; the
# Stripe checksum already lists rk_live_ as a valid prefix, but no
# regex actually emitted a finding for it. 22 SecretBench mirror fixtures
# of `stripe_restricted_key=rk_live_<...>` were silent before this.
regex = 'rk_live_[a-zA-Z0-9]{24,}'
description = "Stripe live restricted key"

[[detector.patterns]]
regex = 'rk_test_[a-zA-Z0-9]{24,}'
description = "Stripe test restricted key"

[detector.verify]
method = "GET"
url = "https://api.stripe.com/v1/charges?limit=1"

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "STRIPE_SECRET_KEY=sk_live_aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789aBcD"
test_negative = "sk_live_short"
