# Docs: https://sdk.abstract.com/docs/authentication/
# Format: API key passed in Authorization header as Bearer token
# Verify: GET https://ip-intelligence.abstractapi.com/v1/?api_key={key} returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "abstract-api-credentials"
name = "Abstract API Credentials"
service = "abstract"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ABSTRACT_API_KEY", "abstract", "goabstract"]

[[detector.patterns]]
regex = "(?:ABSTRACT|abstract)[_=:\\s\"''']+(?:api[_\\-\\s]*)?(?:key|token)[=:\\s\"''']+([a-zA-Z0-9_-]{20,50})"
description = "Abstract API key with context anchor"
group = 1

[[detector.patterns]]
regex = "https://share\\.goabstract\\.com/[a-zA-Z0-9-]+"
description = "Abstract share URL (may contain embedded tokens)"

[detector.verify]
method = "GET"
url = "https://ip-intelligence.abstractapi.com/v1/"
allowed_domains = ["ip-intelligence.abstractapi.com"]

[detector.verify.auth]
type = "query"
param = "api_key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ABSTRACT_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2"
test_negative = "ABSTRACT_API_KEY=short"
