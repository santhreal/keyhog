# Docs: https://sdk.abstract.com/docs/authentication/
# Format: API key passed in Authorization header as Bearer token
# Verify: GET https://ip-intelligence.abstractapi.com/v1/?api_key={key} returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "abstract-api-credentials"
name = "Abstract API Credentials"
service = "abstract"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["ABSTRACT_API_KEY", "abstract", "goabstract"]

[[detector.patterns]]
regex = "(?:ABSTRACT|abstract)[_=:\\s\"''']+(?:api[_\\-\\s]*)?(?:key|token)[=:\\s\"''']+([a-zA-Z0-9_-]{20,50})"
description = "Abstract API key with context anchor"
group = 1

[[detector.patterns]]
regex = "https://share\\.goabstract\\.com/[a-zA-Z0-9-]+"
description = "Abstract share URL (may contain embedded tokens)"

[detector.verify]
method = "GET"
url = "https://ip-intelligence.abstractapi.com/v1/"
allowed_domains = ["ip-intelligence.abstractapi.com"]

[detector.verify.auth]
type = "query"
param = "api_key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ABSTRACT_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2"
test_negative = "ABSTRACT_API_KEY=short"
