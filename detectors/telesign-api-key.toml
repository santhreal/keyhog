# Docs: https://developer.telesign.com/enterprise/docs/authentication
# Format: UUID (36 chars with dashes) for Customer ID, Base64-encoded string for API Key
# Verify: POST /v1/messaging with Digest auth (requires HMAC signature)
# Prefix: none (requires context anchoring)

[detector]
id = "telesign-api-key"
name = "Telesign API Credentials"
service = "telesign"
severity = "critical"
# "api_key", "API_KEY" removed: over-broad generic prefilter the regex does NOT need — every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["telesign", "TELESIGN", "customer_id"]

[[detector.patterns]]
regex = '''(?:telesign|TELESIGN)[_.-]?(?:customer|CUSTOMER)[_.-]?(?:id|ID)?[=:\s"\' ]+([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'''
description = "Telesign Customer ID (UUID format)"
group = 1

[[detector.patterns]]
regex = '''(?:telesign|TELESIGN)[_.-]?(?:api|API)[_.-]?(?:key|KEY|secret|SECRET)?[=:\s"\' ]+([A-Za-z0-9+/]{20,}={0,2})'''
description = "Telesign API Key (Base64-encoded string)"
group = 1

[[detector.tests]]
test_positive = "TELESIGNcustomer-   '  : '=    : ='  \"  =    :C640f2E9-9D9D-1baF-5ad2-06a2D0E5BCC1"
test_negative = "TELESIGNcustomer-   '  : '=    : ='  \"  =    :YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
