# Docs: https://developer.telesign.com/enterprise/docs/authentication
# Format: UUID (36 chars with dashes) for Customer ID, Base64-encoded string for API Key
# Verify: POST /v1/messaging with Digest auth (requires HMAC signature)
# Prefix: none (requires context anchoring)

[detector]
id = "telesign-api-key"
name = "Telesign API Credentials"
service = "telesign"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
# "api_key", "API_KEY" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["telesign", "TELESIGN", "customer_id"]

[[detector.patterns]]
regex = '''(?:telesign|TELESIGN)[_.-]?(?:customer|CUSTOMER)[_.-]?(?:id|ID)?[=:\s"\' ]+([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'''
description = "Telesign Customer ID (UUID format)"
group = 1

[[detector.patterns]]
regex = '''(?:telesign|TELESIGN)[_.-]?(?:api|API)[_.-]?(?:key|KEY|secret|SECRET)?[=:\s"\' ]+([A-Za-z0-9+/]{20,}={0,2})'''
description = "Telesign API Key (Base64-encoded string)"
group = 1

[[detector.tests]]
test_positive = "TELESIGNcustomer-   '  : '=    : ='  \"  =    :C640f2E9-9D9D-1baF-5ad2-06a2D0E5BCC1"
test_negative = "TELESIGNcustomer-   '  : '=    : ='  \"  =    :YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
