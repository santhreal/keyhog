# Docs: https://developers.deezer.com/api
# Format: Alphanumeric API key for Deezer API access
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "deezer-api-key"
name = "Deezer API Key"
service = "deezer"
severity = "medium"
keywords = ["DEEZER", "deezer", "DEEZER_API_KEY", "deezer_api_key"]

[[detector.patterns]]
regex = "(?:DEEZER|deezer)[\\\\s_-]?(?:API|api)?[\\\\s_-]?(?:KEY|key)?[=:\\s\"'']+([a-f0-9]{32})"
description = "Deezer API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "DEEZER_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "DEEZER_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c"
