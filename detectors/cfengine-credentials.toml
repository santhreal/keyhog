# Docs: https://docs.cfengine.com/docs/
# Format: CFEngine uses SSL key pairs and host authentication, not traditional API tokens
# Verify: cf-key generates keys; authentication is certificate-based
# Prefix: none (requires context anchoring)

[detector]
id = "cfengine-credentials"
name = "CFEngine Credentials"
service = "cfengine"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CFENGINE", "cfengine", "cf-key", "ppkeys", "cf_agent"]

[[detector.patterns]]
regex = '''(?:CFENGINE[_\-\s]*KEY|CFENGINE[_\-\s]*SECRET)[=:\s"'']+([a-zA-Z0-9/+=]{20,})'''
description = "CFEngine key or secret with context anchor"
group = 1

[[detector.patterns]]
regex = "/var/cfengine/ppkeys/[^\\s\"'']+"
description = "CFEngine private/public key file path"

[[detector.patterns]]
regex = "trustkey\\s*=>\\s*\"([^\"]+)\""
description = "CFEngine trust key in policy"
group = 1

[[detector.tests]]
test_positive = "CFENGINE_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz+"
test_negative = "CFENGINE_KEY=short"
