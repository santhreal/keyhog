# Docs: https://docs.medusajs.com/development/api/admin
# Format: API token configured in medusa-config.js, typically 32+ character alphanumeric
# Verify: GET /admin/users with x-medusa-access-token header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "medusa-api-key"
name = "Medusa API Key"
service = "medusa"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["medusa", "MEDUSA_API_KEY", "x-medusa-access-token", "MEDUSA_ADMIN"]

[[detector.patterns]]
regex = '''(?:MEDUSA|medusa)[_\-\s]*(?:API[_\-\s]*KEY|ADMIN[_\-\s]*API[_\-\s]*KEY)[=:\s"']+([a-zA-Z0-9]{32,64})'''
description = "Medusa API key with context anchor"
group = 1

[[detector.patterns]]
regex = "x-medusa-access-token[=:\\s\"']+([a-zA-Z0-9]{32,64})"
description = "Medusa API key in header context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.medusajs.com/admin/users"
allowed_domains = ["api.medusajs.com"]

[detector.verify.auth]
type = "header"
name = "x-medusa-access-token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "MEDUSA_API_KEY=kjxEBj2xZsZQ7L7gLbFmaoEWoFnUU0WUHceGVW0y"
test_negative = "MEDUSA_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
