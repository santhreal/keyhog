# Docs: https://docs.saucelabs.com/dev/api/
# Format: 36 character UUID (access key) used with username for HTTP Basic Auth
# Verify: GET /team-management/v1/users/{user_id}/access-key/ with Basic auth returns 200
# Prefix: none (UUID format, requires context keyword or companion detection)

[detector]
id = "saucelabs-access-key"
name = "SauceLabs Access Key"
service = "saucelabs"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["SAUCE_ACCESS_KEY", "sauce_access_key", "SAUCE_ACCESSKEY", "sauce-access-key"]

[[detector.patterns]]
regex = '''(?:SAUCE_ACCESS[_\-\s]*KEY|sauce_access[_\-\s]*key)[=:\s"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "SauceLabs access key (UUID format) with context anchor"
group = 1

[[detector.companions]]
name = "saucelabs-username"
regex = "(?:SAUCE_USERNAME|sauce_username)[=:\\s\"']+([a-zA-Z0-9_-]+)"
within_lines = 5

[[detector.tests]]
test_positive = "SAUCE_ACCESS_KEY=020932ee-9a19-8c18-b71b-8fb4c1643844"
test_negative = "SAUCE_ACCESS_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
