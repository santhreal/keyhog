# Docs: https://www.internal.io/docs
# Format: INTERNAL_ prefixed environment variables with API keys and secrets
# Verify: no public verification endpoint
# Prefix: INTERNAL_

[detector]
id = "internalio-credentials"
name = "Internal.io Credentials"
service = "internalio"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["INTERNAL_API_KEY", "INTERNAL_SECRET", "internal.io"]

[[detector.patterns]]
regex = "INTERNAL[_\\.\\s]*(?:API_KEY|api_key|TOKEN|token)[=:\\s\"'']+([a-zA-Z0-9_\\-]{32,})"
description = "Internal.io API key"
group = 1

[[detector.patterns]]
regex = "INTERNAL[_\\.\\s]*(?:SECRET|secret|PASSWORD|password)[=:\\s\"'']+([a-zA-Z0-9_!@#$%^&*+=\\-]{16,})"
description = "Internal.io secret or password"
group = 1

[[detector.patterns]]
regex = "(?:internal\\.io|internalio)[/\\s]*api[_\\.\\s]*key[=:\\s\"'']+([a-zA-Z0-9_\\-]{24,})"
description = "Internal.io API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "INTERNAL_API_KEY=Us3--opIWQZLTHv0vzgnO4VDodoNo44DYyi8zI6wJWxV"
test_negative = "INTERNAL_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
