# Docs: https://www.internal.io/docs
# Format: INTERNAL_ prefixed environment variables with API keys and secrets
# Verify: no public verification endpoint
# Prefix: INTERNAL_

[detector]
id = "internalio-credentials"
name = "Internal.io Credentials"
service = "internalio"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["INTERNAL_API_KEY", "INTERNAL_SECRET", "internal.io"]

[[detector.patterns]]
regex = "INTERNAL[_\\.\\s]*(?:API_KEY|api_key|TOKEN|token)[=:\\s\"'']+([a-zA-Z0-9_\\-]{32,})"
description = "Internal.io API key"
group = 1

[[detector.patterns]]
regex = "INTERNAL[_\\.\\s]*(?:SECRET|secret|PASSWORD|password)[=:\\s\"'']+([a-zA-Z0-9_!@#$%^&*+=\\-]{16,})"
description = "Internal.io secret or password"
group = 1

[[detector.patterns]]
regex = "(?:internal\\.io|internalio)[/\\s]*api[_\\.\\s]*key[=:\\s\"'']+([a-zA-Z0-9_\\-]{24,})"
description = "Internal.io API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "INTERNAL_API_KEY=Us3--opIWQZLTHv0vzgnO4VDodoNo44DYyi8zI6wJWxV"
test_negative = "INTERNAL_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
