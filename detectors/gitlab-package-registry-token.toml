# Docs: https://docs.gitlab.com/ee/user/packages/
# Format: GitLab Deploy Token (gldt-) or CI Job Token (glcbt-), or Personal Access Token
# Verify: GET /api/v4/packages with job token header returns 200 if valid
# Prefix: gldt- or glcbt- or glpat-

[detector]
id = "gitlab-package-registry-token"
name = "GitLab Package Registry Token"
service = "gitlab-package-registry"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
decode_transforms = { reverse_prefixes = ["glcbt-"], caesar_prefixes = ["glcbt-"] }
validators = [{ type = "pattern-shape", prefixes = ["gldt-", "glcbt-"], allow_overlong = true }]
keywords = ["gldt-", "glcbt-", "CI_JOB_TOKEN", "CI_DEPLOY_TOKEN"]

[[detector.patterns]]
regex = "gldt-[a-zA-Z0-9_.-]{20,64}"
description = "GitLab Deploy Token for Package Registry"

[[detector.patterns]]
regex = "glcbt-[a-zA-Z0-9_.-]{16,64}"
description = "GitLab CI Job Token for Package Registry"

[[detector.patterns]]
regex = "(?:CI_JOB_TOKEN|CI_DEPLOY_TOKEN|GITLAB_DEPLOY_TOKEN)[=:\\s\"'']+(gldt-[a-zA-Z0-9_.-]{20,64}|glcbt-[a-zA-Z0-9_.-]{16,64})"
description = "GitLab Package Registry token in environment variable"
group = 1

[[detector.tests]]
test_positive = "gldt-L0z4c8YgKC47G6B4E8vwb7hrm8K030EO"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
