# Docs: https://lbsyun.baidu.com/index.php?title=jspopularGL/guide/getkey
# Format: API key is a 24-32 character alphanumeric string (AK)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "baidu-maps-api-key"
name = "Baidu Maps API Key"
service = "baidu"
severity = "high"
# "ak" removed: a 2-char over-trigger (make/take/back/…) that NO regex references
#, every pattern here requires a `baidu[_.]maps[_.]key` anchor, so "ak" only
# wasted scan passes. Recall-neutral.
keywords = ["BAIDU_MAPS_KEY", "baidu.maps.key", "baidu_maps_key"]

[[detector.patterns]]
regex = "(?:BAIDU[_-]?MAPS[_-]?KEY|baidu[_-]?maps[_-]?key|baidu\\.maps\\.key)[=:\\s\"'']+([A-Za-z0-9]{24,32})"
description = "Baidu Maps API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "BAIDU_MAPS_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
test_negative = "BAIDU_MAPS_KEY=short"
