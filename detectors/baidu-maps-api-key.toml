# Docs: https://lbsyun.baidu.com/index.php?title=jspopularGL/guide/getkey
# Format: API key is a 24-32 character alphanumeric string (AK)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "baidu-maps-api-key"
name = "Baidu Maps API Key"
service = "baidu"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# "ak" removed: a 2-char over-trigger (make/take/back/…) that NO regex references
#, every pattern here requires a `baidu[_.]maps[_.]key` anchor, so "ak" only
# wasted scan passes. Recall-neutral.
keywords = ["BAIDU_MAPS_KEY", "baidu.maps.key", "baidu_maps_key"]

[[detector.patterns]]
regex = '''(?:BAIDU[_\-\s]*MAPS[_\-\s]*KEY|baidu[_\-\s]*maps[_\-\s]*key|baidu\.maps\.key)[=:\s"'']+([A-Za-z0-9]{24,32})'''
description = "Baidu Maps API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "BAIDU_MAPS_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
test_negative = "BAIDU_MAPS_KEY=short"
