# Docs: https://resend.com/docs/api-reference/introduction
# Format: API key starting with 're_' followed by 48 alphanumeric characters
# Verify: Bearer token sent to api.resend.com/api-keys, returns 200 on success
# Prefix: re_

[detector]
id = "resend-api-key"
name = "Resend API Key"
service = "resend"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["re_"]

[[detector.patterns]]
regex = 're_[a-zA-Z0-9]{48}'
description = "Resend API key (re_ prefix with 48 alphanumeric characters)"

[detector.verify]
method = "GET"
url = "https://api.resend.com/api-keys"
allowed_domains = ["api.resend.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "re_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
test_negative = "re_short"
