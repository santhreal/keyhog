# Docs: https://qdrant.tech/documentation/cloud/authentication/
# Format: Alphanumeric string, typically 36+ characters (no fixed prefix)
# Verify: GET /collections with api-key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "qdrant-api-key"
name = "Qdrant API Key"
service = "qdrant"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["QDRANT_API_KEY", "qdrant_api_key", "QDRANT_APIKEY", "qdrantApiKey"]

[[detector.patterns]]
regex = '''(?:QDRANT[_\-\s]*API[_\-\s]*KEY|qdrant[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{16,})'''
description = "Qdrant API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "QDRANT_API_KEY=qrp1jXxt6sBi2v6e"
test_negative = "QDRANT_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
