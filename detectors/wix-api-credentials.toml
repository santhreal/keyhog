# Docs: https://dev.wix.com/docs/build-apps/develop-your-app/access/authentication/authenticate-using-oauth
# Format: App ID (UUID format) + App Secret Key (long alphanumeric) + Instance ID
# Verify: https://dev.wix.com/docs/api-reference/app-management/app-instance/get-app-instance
# Prefix: none (requires context anchoring)

[detector]
id = "wix-api-credentials"
name = "Wix API Credentials"
service = "wix"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# "app_id" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept). Recall-neutral.
# "instance_id" removed: over-broad generic prefilter not in any regex, patterns
# require the wix anchor (kept). Recall-neutral.
keywords = ["wix", "WIX", "app_secret", "wix_app"]

[[detector.patterns]]
regex = '''(?:wix|WIX)[_=:\s"'']+(?:app[_\-\s]*id|client[_\-\s]*id)[=:\s"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
description = "Wix App ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:wix|WIX)[_=:\s"'']+(?:app[_\-\s]*secret|client[_\-\s]*secret)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Wix App Secret with context anchor"
group = 1

[[detector.companions]]
name = "instance_id"
regex = '''(?:wix|WIX)[_=:\s"'']+(?:instance[_\-\s]*id)[=:\s"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
within_lines = 5
[detector.verify]
method = "POST"
url = "https://www.wix.com/app-oauth2/v1/token"
allowed_domains = ["www.wix.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = "companion.instance_id"

[detector.verify.success]
status = 200
json_path = "$.access_token"

[[detector.tests]]
test_positive = "wix'\"\"_   : clientid \"='= ='  '   =\" ' \"  =    ::     : '  \"  ' \"  =a9a26a73-4d12-377a-7e7d-00b7bd466d95"
test_negative = "wix'\"\"_   : clientid \"='= ='  '   =\" ' \"  =    ::     : '  \"  ' \"  =YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
