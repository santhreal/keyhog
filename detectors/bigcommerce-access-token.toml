# Docs: https://developer.bigcommerce.com/docs/start/authentication/api-accounts
# Format: bbc_ prefix followed by 48+ alphanumeric characters (V2/V3 API tokens) or at_ prefix followed by 64+ alphanumeric characters (Stencil CLI tokens)
# Verify: GET /stores/{store_hash}/v3/store with X-Auth-Token header returns store info if valid
# Prefix: bbc_

[detector]
id = "bigcommerce-access-token"
name = "BigCommerce Access Token"
service = "bigcommerce"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["bbc_", "bigcommerce", "access_token", "X-Auth-Token"]

[[detector.patterns]]
regex = "bbc_[a-zA-Z0-9]{48,}"
description = "BigCommerce V2/V3 API access token (bbc_ prefix)"

[[detector.patterns]]
regex = "at_[a-zA-Z0-9]{64,}"
description = "BigCommerce Stencil CLI access token (at_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.bigcommerce.com/stores/v3/store"
allowed_domains = ["api.bigcommerce.com"]

[detector.verify.auth]
type = "header"
name = "X-Auth-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "store_name"
json_path = "$.name"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "bbc_AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCdEfGhIjKlMnOpQrStUvWxYz"
test_negative = "bbc_short"
