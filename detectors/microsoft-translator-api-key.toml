# Docs: https://learn.microsoft.com/en-us/azure/cognitive-services/translator/reference/v3-0-reference
# Format: 32 hex characters (e.g., a1b2c3d4e5f6789012345678abcdefab)
# Verify: POST /translate with Ocp-Apim-Subscription-Key header
# Prefix: none (requires context anchoring)

[detector]
id = "microsoft-translator-api-key"
name = "Microsoft Translator API Key"
service = "microsoft-translator"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["MS_TRANSLATOR_KEY", "AZURE_TRANSLATOR_KEY", "Ocp-Apim-Subscription-Key", "MICROSOFT_TRANSLATOR", "cognitiveservices"]

[[detector.patterns]]
regex = "(?:MS_TRANSLATOR_KEY|AZURE_TRANSLATOR_KEY|MICROSOFT_TRANSLATOR_KEY|AZURE_COGNITIVE_KEY)[=:\\s\"'']+([a-f0-9]{32})"
description = "Microsoft Translator API key with context anchor"
group = 1

[[detector.patterns]]
regex = "Ocp-Apim-Subscription-Key[:\\s\"'']+([a-f0-9]{32})"
description = "Microsoft Translator API key in header format"
group = 1

[[detector.patterns]]
regex = "(?:api\\.cognitive\\.microsofttranslator\\.com|cognitiveservices\\.azure\\.com).*[=:\\s\"'']+([a-f0-9]{32})"
description = "Microsoft Translator API key with endpoint context"
group = 1

[detector.verify]
method = "POST"
url = "https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&to=en"
allowed_domains = ["api.cognitive.microsofttranslator.com"]

[detector.verify.auth]
type = "header"
name = "Ocp-Apim-Subscription-Key"
template = "{{match}}"

[detector.verify.success]
status = 400

[[detector.tests]]
test_positive = "MS_TRANSLATOR_KEY=1dcd0b60e5b037569d8c72e160975b2c"
test_negative = "MS_TRANSLATOR_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
