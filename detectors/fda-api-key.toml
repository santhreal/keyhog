# Docs: https://open.fda.gov/apis/authentication/
# Format: 40-character alphanumeric API key passed as query parameter or Basic Auth
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "fda-api-key"
name = "FDA Open API Key"
service = "fda"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["FDA_API_KEY", "OPENFDA_API_KEY", "openfda", "fda", "open.fda.gov"]

[[detector.patterns]]
regex = "(?:FDA|OPENFDA)_API_KEY[=:\\s\"'\\']+([a-zA-Z0-9]{40})"
description = "FDA API key (40 alphanumeric chars) with context anchor"
group = 1

[[detector.patterns]]
regex = "open\\.fda\\.gov.*[?&]api_key=([a-zA-Z0-9]{40})"
description = "FDA API key in URL query parameter"
group = 1

[[detector.tests]]
test_positive = "FDA_API_KEY=P9Zu9Et3gR9l0wzCFBMXTtYj4rssu8aHN3ahXjJd"
test_negative = "FDA_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
