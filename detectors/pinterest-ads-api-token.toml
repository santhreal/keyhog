# Docs: https://developers.pinterest.com/docs/api/v5/#tag/Authentication
# Format: OAuth 2.0 access token, typically starting with pina_ for v5 API
# Verify: GET https://api.pinterest.com/v5/user_account with Bearer token
# Prefix: pina_

[detector]
id = "pinterest-ads-api-token"
name = "Pinterest Ads API Token"
service = "pinterest-ads"
severity = "critical"
keywords = ["pina_", "pinterest_ads", "PINTEREST_ADS"]

[[detector.patterns]]
regex = 'pina_[a-zA-Z0-9_-]{50,}'
description = "Pinterest Ads API v5 access token (pina_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.pinterest.com/v5/user_account"
allowed_domains = ["api.pinterest.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pina_6jF09OFQeEGcfCNWG_Efi20A0rRdBYglQ7yhqzafB1Xwqt8EqJUOjeRyg7sP4t6-eD1Fj6eHvitl4J8"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
