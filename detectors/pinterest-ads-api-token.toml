# Docs: https://developers.pinterest.com/docs/api/v5/#tag/Authentication
# Format: OAuth 2.0 access token, typically starting with pina_ for v5 API
# Verify: GET https://api.pinterest.com/v5/user_account with Bearer token
# Prefix: pina_

[detector]
id = "pinterest-ads-api-token"
name = "Pinterest Ads API Token"
service = "pinterest-ads"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["pina_", "pinterest_ads", "PINTEREST_ADS"]

[[detector.patterns]]
regex = 'pina_[a-zA-Z0-9_-]{50,}'
description = "Pinterest Ads API v5 access token (pina_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.pinterest.com/v5/user_account"
allowed_domains = ["api.pinterest.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "pina_6jF09OFQeEGcfCNWG_Efi20A0rRdBYglQ7yhqzafB1Xwqt8EqJUOjeRyg7sP4t6-eD1Fj6eHvitl4J8"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
