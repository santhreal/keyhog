# Docs: https://intelowl.readthedocs.io/
# Format: Random alphanumeric API key
# Verify: GET /api/auth/token/verify with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "intelowl-api-key"
name = "IntelOwl API Key"
service = "intelowl"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["intelowl", "INTELOWL_API_KEY", "intel_owl"]

[[detector.patterns]]
regex = '''(?:intelowl|INTELOWL|intel[_\-\s]*owl)[_\-\s]*(?:api[_\-\s]*key|key)[=:\s"'']+([a-zA-Z0-9_-]{20,64})'''
description = "IntelOwl API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "intelowlkey=3hjArTco0NPvH-0aKSYr"
test_negative = "intelowlkey=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
