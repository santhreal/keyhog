# Docs: https://developer.fedex.com/api/en-us/catalog/authorization/docs.html
# Format: OAuth 2.0 Client ID (API Key) and Client Secret - alphanumeric strings
# Verify: POST /oauth/token to get bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "fedex-api-credentials"
name = "FedEx API Credentials"
service = "fedex"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["FEDEX_CLIENT_ID", "FEDEX_CLIENT_SECRET", "FEDEX_API_KEY", "apis.fedex.com"]

[[detector.patterns]]
regex = "(?:FEDEX|fedex)[._](?:CLIENT|client|API|api)[._](?:ID|id|KEY|key)[=:\\s\"'']+([A-Za-z0-9_-]{32,64})"
description = "FedEx API Client ID/Key"
group = 1

[[detector.patterns]]
regex = "(?:FEDEX|fedex)[._](?:ACCOUNT|account)[._](?:NUM(?:BER)?|num(?:ber)?)?[=:\\s\"'']+([0-9]{9,12})"
description = "FedEx Account Number"
group = 1

[[detector.patterns]]
regex = "(?:FEDEX|fedex)[._](?:CLIENT|client|API|api)[._](?:SECRET|secret)[=:\\s\"'']+([A-Za-z0-9_-]{32,64})"
description = "FedEx Client Secret"
group = 1

[[detector.tests]]
test_positive = "FEDEX_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "FEDEX_CLIENT_ID=short"
