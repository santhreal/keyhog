# Docs: https://developers.upcloud.com/1-introduction/
# Format: Username is alphanumeric, Password is user-defined (8-256 chars with complexity requirements)
# Verify: GET /1.3/account with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring for username, password has no pattern)

[detector]
id = "upcloud-api-credentials"
name = "UpCloud API Credentials"
service = "upcloud"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["UPCLOUD_USERNAME", "UPCLOUD_PASSWORD", "upcloud"]

[[detector.patterns]]
regex = "(?:UPCLOUD_PASSWORD|upcloud_password)[=:\\s\"'']+([A-Za-z0-9!@#$%^&*()_+\\-=\\[\\]{};\\'\":\"\\\\|,.<>/?]{8,256})"
description = "UpCloud API password with context anchor"
group = 1

[[detector.companions]]
name = "upcloud_username"
regex = "(?:UPCLOUD_USERNAME|upcloud_username)[=:\\s\"'']+([a-z0-9_]+)"
within_lines = 3

[[detector.tests]]
test_positive = "upcloud_password  = '       \"=       :    : \"    = ' : \"   :      ' ' \" \" Nof>d!U-[st51o|GX%zxSDQ.]HM^:4Rm<zs&V_6USihGd;gIr2"
test_negative = "upcloud_password  = '       \"=       :    : \"    = ' : \"   :      ' ' \" \" YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
