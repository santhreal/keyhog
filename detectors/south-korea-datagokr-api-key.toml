# Docs: https://www.data.go.kr/en/
# Format: Korean government data portal API key (service key)
# Verify: GET requests with serviceKey parameter to api.data.go.kr
# Prefix: none (requires context anchoring)

[detector]
id = "south-korea-datagokr-api-key"
name = "South Korea data.go.kr API Key"
service = "south-korea-datagokr"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["data.go.kr", "DATA_GO_KR", "serviceKey", "공공데이터포털"]

[[detector.patterns]]
regex = '''(?:data\.go\.kr|DATA_GO_KR|datagokr)[_.-]?(?:SERVICE[_\-\s]*KEY|service_key|API[_\-\s]*KEY|api_key)[\s"''=:]+([a-zA-Z0-9]{20,50})'''
description = "Korea data.go.kr service API key"
group = 1

[[detector.patterns]]
regex = "serviceKey[\\s\"''=:]+([a-zA-Z0-9%]{30,60})"
description = "Korea data.go.kr serviceKey parameter"
group = 1

[[detector.patterns]]
regex = "(?:api\\.data\\.go\\.kr|data\\.go\\.kr).{0,40}serviceKey[=:]+([a-zA-Z0-9%]{30,60})"
description = "Korea data.go.kr serviceKey in URL"
group = 1

[[detector.tests]]
test_positive = "data.go.krapi_key kVZ1IaWiI91uDEBI6tzGKy9soXY7baXffP0dRA9FjLiH1CWx"
test_negative = "data.go.krapi_key YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
