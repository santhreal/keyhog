# Docs: https://docs.aws.amazon.com/ses/latest/dg/smtp-credentials.html
# Format: IAM username format with SMTP-specific signature version 4 hash
# Verify: none (safe verification requires an SMTP AUTH probe against the regional SES endpoint, which the generic HTTP verifier cannot perform)
# Prefix: AKIA (username) or ASIA (temporary credentials)

[detector]
id = "aws-ses-smtp-credentials"
name = "AWS SES SMTP Credentials"
service = "aws-ses"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["email-smtp", "SES_SMTP", "AWS_SES", "ses+smtp", "AWS_SES_SMTP"]

[[detector.patterns]]
regex = "(?i:email-smtp|ses_smtp|aws_ses_smtp)[._-]?(?i:username)?[=:\\s\"'']+(AKIA[0-9A-Z]{16})(?:[^A-Za-z0-9/+=]|$)"
description = "AWS SES SMTP username (starts with AKIA)"
group = 1

[[detector.patterns]]
regex = "(?i:ses)[._-]?(?i:smtp)[._-]?(?i:host)?[=:\\s\"'']+(email-smtp\\.[a-z0-9-]+\\.amazonaws\\.com)"
description = "AWS SES SMTP endpoint hostname"
group = 1

[[detector.patterns]]
regex = "(?i:ses_smtp|aws_ses_smtp|email-smtp)[._-]?(?i:password)[=:\\s\"'']+([A-Za-z0-9/+=]{44})(?:[^A-Za-z0-9/+=]|$)"
description = "AWS SES SMTP password"
group = 1

# Companion credential for SMTP password when username is found
[[detector.companions]]
name = "aws-ses-smtp-password"
regex = "(?i:ses_smtp|aws_ses_smtp|email-smtp)[._-]?(?i:password)[=:\\s\"'']+([A-Za-z0-9/+=]{44})(?:[^A-Za-z0-9/+=]|$)"
within_lines = 3

[[detector.tests]]
test_positive = "AWS_SES_SMTP_PASSWORD=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpZQ"
test_negative = "AWS_SES_SMTP_PASSWORD=short"
