# Docs: https://data.gov.au/data/api/1/util/snippet/api_info.html
# Format: CKAN API key - 36 character UUID format
# Verify: Authorization header with CKAN API key to data.gov.au/api/action
# Prefix: none (requires context anchoring)

[detector]
id = "australia-data-gov-api-key"
name = "Australia Data.gov.au API Key"
service = "australia-data-gov"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["data.gov.au", "CKAN_API_KEY", "auckan"]

[[detector.patterns]]
regex = '''(?:data\.gov\.au|CKAN|AUSTRALIA)[_.-]?(?:API[_\-\s]*KEY|apikey)[\s"''=:]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Australia data.gov.au CKAN API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:data\\.gov\\.au).{0,30}Authorization[:\\s]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Australia data.gov.au API key in Authorization header"
group = 1

[detector.verify]
method = "GET"
url = "https://data.gov.au/data/api/3/action/package_list?limit=1"
allowed_domains = ["data.gov.au"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "data.gov.au_API_KEY=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "data.gov.au_API_KEY=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4"
