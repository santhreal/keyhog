# Docs: https://learn.microsoft.com/en-us/azure/api-management/api-management-subscriptions
# Format: 32 character hexadecimal string
# Verify: GET /subscriptions with Ocp-Apim-Subscription-Key header returns 200 if valid
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "azure-subscription-key"
name = "Azure Subscription Key"
service = "azure"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.3
keywords = [
  "Ocp-Apim-Subscription-Key",
  "OCP_APIM_SUBSCRIPTION_KEY",
  "ocp_apim_subscription_key",
  "ocp-apim-subscription-key",
  "azure_subscription_key",
  "subscription-key",
  "subscription_key",
  "SUBSCRIPTION_KEY",
  "AZURE_SUBSCRIPTION_KEY",
  "azureSubscriptionKey",
]

[[detector.patterns]]
regex = '''(?i)(?:(?:ocp[-_.]?apim|azure)[-_.]?)?subscription[_.-]?key\s*["']?\s*[=:]\s*["']?([a-f0-9]{32})["']?'''
required_literals = ["subscription"]
description = "Azure subscription key - case-insensitive anchor (APIM/Azure env, yaml, camelCase, kebab, dotted, or bare `subscription_key`)."
group = 1

[[detector.patterns]]
regex = '''Ocp-Apim-Subscription-Key\s*[:=]\s*([a-f0-9]{32})'''
description = "Azure subscription key in HTTP header format."
group = 1

[detector.verify]
method = "GET"
url = "https://management.azure.com/subscriptions?api-version=2020-01-01"
allowed_domains = ["management.azure.com"]

[detector.verify.auth]
type = "header"
name = "Ocp-Apim-Subscription-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "azure_subscription_key=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "Ocp-Apim-Subscription-Key: short"
