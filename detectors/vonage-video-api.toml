# Docs: https://api.support.vonage.com/hc/en-us/articles/11002799982492-How-to-obtain-my-account-level-Video-API-key-and-API-secret
# Format: API Key is an 8-character alphanumeric string, API Secret is a 16-character alphanumeric string
# Verify: GET /v2/project/{api_key}/archive with API key and API secret
# Prefix: none (requires context anchoring)

[detector]
id = "vonage-video-api"
name = "Vonage Video API Secret"
service = "vonage"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["VONAGE_API_KEY", "VONAGE_API_SECRET", "vonage", "api_key", "api_secret", "video"]

[[detector.patterns]]
regex = '''(?i)VONAGE[_.-]API[_.-]SECRET["'\s]*[=:]\s*["']?([a-z0-9]{16})(?:[^a-z0-9]|$)'''
description = "Vonage Video API secret with context anchor"
group = 1

[[detector.companions]]
name = "vonage_api_key"
regex = '''(?i)VONAGE[_.-]API[_.-]KEY["'\s]*[=:]\s*["']?([a-z0-9]{8})(?:[^a-z0-9]|$)'''
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.opentok.com/v2/project/{{companion.vonage_api_key}}/archive"
allowed_domains = ["opentok.com"]

[detector.verify.auth]
type = "basic"
username = "companion.vonage_api_key"
password = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "VONAGE_API_KEY=54689afc\nVONAGE_API_SECRET=0123456789abcdef"
test_negative = "VONAGE_API_KEY=54689afc"
