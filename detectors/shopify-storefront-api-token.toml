# Docs: https://shopify.dev/docs/api/storefront
# Format: shpss_ prefix followed by 32 hexadecimal characters
# Verify: POST to {{shop}}.myshopify.com/api/2024-01/graphql.json with X-Shopify-Storefront-Access-Token header
# Prefix: shpss_

[detector]
id = "shopify-storefront-api-token"
name = "Shopify Storefront API Token"
service = "shopify"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["shpss_", "storefront", "SHOPIFY_STOREFRONT"]

[[detector.patterns]]
regex = 'shpss_[a-f0-9]{32}'
description = "Shopify Storefront API access token (shpss_ prefix)"

# NOTE: live verification disabled. `{{shop}}` was undefined. kimi-wave3 §1.

[[detector.tests]]
test_positive = "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"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
