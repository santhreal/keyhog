# Docs: https://min.io/docs/minio/linux/integrations/presigned-put-from-browser.html
# Format: Presigned URL with X-Amz-Algorithm=AWS4-HMAC-SHA256 and X-Amz-Signature
# Verify: HEAD request to presigned URL returns 200 if valid
# Prefix: X-Amz-Algorithm (requires context anchoring)

[detector]
id = "minio-presigned-credentials"
name = "MinIO Presigned Credentials"
service = "minio"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["X-Amz-Signature", "X-Amz-Credential", "presigned", "minio"]

[[detector.patterns]]
regex = "(https?://[^\\s\"'']*X-Amz-Algorithm=AWS4-HMAC-SHA256[^\\s\"'']*X-Amz-Signature=[a-f0-9]{64})"
description = "MinIO/AWS presigned URL with signature"
group = 1

[[detector.patterns]]
regex = "X-Amz-Credential[=:]([A-Z0-9]{20})%2F\\d{8}%2F[^%]+%2Fs3%2Faws4_request"
description = "MinIO presigned URL credential (URL-encoded access key)"
group = 1

[[detector.patterns]]
regex = "MINIO_(?:ROOT_)?USER[=:\\s\"'']+([a-zA-Z0-9]{5,})"
description = "MinIO root/user credential with context anchor"
group = 1

[[detector.patterns]]
regex = "MINIO_(?:ROOT_)?PASSWORD[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*]{8,})"
description = "MinIO root/password with context anchor"
group = 1

[[detector.tests]]
test_positive = "MINIO_ROOT_USER=adminuser12345"
test_negative = "MINIO_ROOT_USER=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
