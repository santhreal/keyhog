# Docs: https://docs.n8n.io/integrations/builtin/credentials/wise/
# Format: API token with no fixed prefix, alphanumeric/dash/underscore characters (22+ chars)
# Verify: GET /v1/profiles with Bearer auth
# Prefix: none (requires context anchoring)

[detector]
id = "wise-api-token"
name = "Wise API Token"
service = "wise"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["WISE_API_TOKEN", "WISE_TOKEN", "transferwise", "Wise-Token"]

[[detector.patterns]]
regex = "(?:WISE_API_TOKEN|WISE_TOKEN|wise_token|Wise-Token)[\\s]*[=:]+[\\s]*[\"']?([a-zA-Z0-9_-]{22,})[\"']?"
description = "Wise API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.wise.com/v1/profiles"
allowed_domains = ["api.wise.com"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "Bearer {{match}}"

[[detector.tests]]
test_positive = "Wise-Token                                                                                  :=:==:=:::=::=:::::===:=:====:=:==:=:====:::==:===:==:::::=::::=               hHntXBBhcMghHhw15s27KqbT1Q8'"
test_negative = "Wise-Token                                                                                  :=:==:=:::=::=:::::===:=:====:=:==:=:====:::==:===:==:::::=::::=               YOUR_API_KEY_HERE_PLACEHOLDER_VALUE'"
