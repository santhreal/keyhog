# Docs: https://segment.com/docs/connections/sources/catalog/libraries/server/http-api/
# Format: Base64-encoded string, typically starts with pattern when decoded
# Verify: POST to /v1/import or /v1/track with Basic auth; returns 200 if valid
# Prefix: none (base64, requires keyword context)

[detector]
id = "segment-write-key"
name = "Segment Write Key"
service = "segment"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
min_confidence = 0.3
keywords = ["segment", "SEGMENT_WRITE_KEY", "writeKey", "write_key"]

[[detector.patterns]]
regex = "(?:segment|SEGMENT)[_.]?(?:write[_.]?)?key[=:\\s\"']+([A-Za-z0-9+/]{30,}=?)"
description = "Segment write key (base64) with context anchor"
group = 1
# Segment write keys are write-only and ship in every analytics.js /
# Analytics SDK initialization on the client. They can track events
# from the browser but cannot read source data; server-side admin
# access uses a Segment Sources API token (separate detector,
# segment-sources-api-token, which stays high).
client_safe = true

[[detector.tests]]
test_positive = "segment_write_key=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY="
test_negative = "segment_write_key=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
