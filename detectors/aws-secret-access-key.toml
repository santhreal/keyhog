# Docs: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_identifiers.html#identifiers-access-keys
# Format: 40-char base62 + `/+` body (no fixed prefix); ONLY identifiable
# from a service-specific anchor since the body shape is indistinguishable
# from arbitrary base64.
# Verify: none on its own (a secret key needs the matching access key ID
# to call STS GetCallerIdentity). The companion-coupled `aws-access-key`
# detector verifies when both are present; this detector exists to
# surface a leaked SECRET that appears alone (e.g. half-leak from one
# of two env vars).
# Prefix: none - strictly anchor-driven.

[detector]
id = "aws-secret-access-key"
name = "AWS Secret Access Key"
service = "aws"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# EVERY pattern requires the AWS secret env-var/field anchor immediately before
# the 40-char body (the body alone is indistinguishable from base64 and is never
# matched bare), so the match is anchor-driven and safe at a low floor. The
# 40-char base64 body scores only ~0.32 confidence on entropy alone - below the
# 0.40 global floor - so a real `awsSecretKey = "<40 b64>"` was dropped as a
# false negative (SecretBench mirror: cloud-service-credential misses in go/
# json/properties anchored exactly this way; DET-18 class). Self-declare a floor
# under the observed score; FP risk is bounded by the mandatory anchor.
min_confidence = 0.25
keywords = [
  "AWS_SECRET_ACCESS_KEY",
  "aws_secret_access_key",
  "AWS_SECRET_KEY",
  "aws_secret_key",
]

[[detector.patterns]]
regex = '''(?i)(?:AWS[_\-\s]*SECRET[_\-\s]*ACCESS[_\-\s]*KEY|AWS[_\-\s]*SECRET[_\-\s]*KEY)[=:\s"']+([0-9a-zA-Z/+=]{40})(?:[^0-9a-zA-Z/+=]|$)'''
description = "AWS secret access key anchored on the canonical env-var name (40-char base64 body)."
group = 1

[[detector.patterns]]
regex = '''(?:awsSecretAccessKey|awsSecretKey)\s*[=:]\s*["']?([0-9a-zA-Z/+=]{40})(?:["']|[^0-9a-zA-Z/+=]|$)'''
description = "AWS secret access key in JS/JSON camelCase anchor (40-char base64 body)."
group = 1

[[detector.patterns]]
regex = '''(?:aws[._-]?secret[._-]?access[._-]?key)\s*[:=]\s*["']?([0-9a-zA-Z/+=]{40})(?:["']|[^0-9a-zA-Z/+=]|$)'''
description = "AWS secret access key in INI/properties anchor (40-char base64 body)."
group = 1

[[detector.tests]]
test_positive = "AWS_SECRET_ACCESS_KEY=ev0BsFtSD7S/4VWYObxiEhME3hJBXeYzR43jgiB1"
test_negative = "AWS_SECRET_ACCESS_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
