# Docs: https://docs.microsoft.com/en-us/azure/devops/organizations/accounts/use-personal-access-tokens-to-authenticate
# Format: 52 character base64-like string (no unique prefix)
# Verify: GET /_apis/connectionData with Basic auth (token as username)
# Prefix: none (requires context anchoring)

[detector]
id = "azure-devops-pat"
name = "Azure DevOps Personal Access Token"
service = "azure-devops"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["azure", "devops", "AZURE_DEVOPS", "ADO_PAT", "vsopenapi"]

[[detector.patterns]]
regex = '''(?:azure[_\-\s]*devops|AZURE[_\-\s]*DEVOPS|ado[_\-\s]*pat|ADO[_\-\s]*PAT)[=:\s"'']+([a-zA-Z0-9]{52})'''
description = "Azure DevOps PAT with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:vsopenapi|VSOPENAPI)[=:\\s\"'']+([a-zA-Z0-9]{52})"
description = "Azure DevOps PAT (vsopenapi context)"
group = 1

[detector.verify]
method = "GET"
url = "https://dev.azure.com/_apis/connectionData"
allowed_domains = ["dev.azure.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AZURE_DEVOPS=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Z"
test_negative = "AZURE_DEVOPS=short"
