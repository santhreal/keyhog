# Docs: https://resend.com/docs/dashboard/webhooks
# Format: String starting with 'whsec_' followed by alphanumeric characters
# Verify: no public verification endpoint (signature verification using HMAC-SHA256)
# Prefix: whsec_

[detector]
id = "resend-webhook-signing-secret"
name = "Resend Webhook Signing Secret"
service = "resend"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["whsec_", "RESEND_WEBHOOK", "resend_webhook", "webhook_secret"]

[[detector.patterns]]
regex = "whsec_[a-zA-Z0-9]{20,}"
description = "Resend webhook signing secret (whsec_ prefix)"

[[detector.patterns]]
regex = "(?:RESEND|resend)[._-]?(?:WEBHOOK|webhook)[._-]?(?:SECRET|secret|SIGNING|signing)[=:\\s\"'']+(whsec_[a-zA-Z0-9]{20,})"
description = "Resend webhook signing secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "whsec_XabErUS2Y5QkC0OSzR9WBr5ho8NBfAgG"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
