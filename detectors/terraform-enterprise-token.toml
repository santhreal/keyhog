# Docs: https://developer.hashicorp.com/terraform/enterprise/api-docs
# Format: Same as Terraform Cloud - {id}.atlasv1.{secret} or team/organization tokens
# Verify: GET /api/v2/account/details with Bearer token
# Prefix: .atlasv1. (infix)

[detector]
id = "terraform-enterprise-token"
name = "Terraform Enterprise API Token"
service = "terraform-enterprise"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = [".atlasv1.", "TFE_TOKEN", "tfe_token", "TERRAFORM_ENTERPRISE_TOKEN", "terraform_enterprise_token"]

[[detector.patterns]]
regex = "[a-zA-Z0-9]{14}\\.atlasv1\\.[a-zA-Z0-9]{67,}"
required_literals = [".atlasv1."]
description = "Terraform Enterprise API token (atlasv1 infix format)"

[[detector.patterns]]
regex = "(?:TFE_TOKEN|tfe_token|TERRAFORM_ENTERPRISE_TOKEN|terraform_enterprise_token)[=:\\s\"'']+([a-zA-Z0-9]{14}\\.atlasv1\\.[a-zA-Z0-9]{67,})"
description = "Terraform Enterprise token in environment variable"
group = 1

[detector.verify]
method = "GET"
url = "https://app.terraform.io/api/v2/account/details"
allowed_domains = ["app.terraform.io"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "gI0K0lFi9sRt6a.atlasv1.pjqKbeILsS9prSy4rJKA1mJkK4NG3iIsHrn4dAeHHYYvyPyGSVh8TcjSx4sgN3ONTyqGEUhq40bJJtI6OFNkZRN"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
