# Docs: https://docs.workato.com/workato-api.html
# Format: Bearer token for API client authentication
# Verify: GET /api/users/me with Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "workato-api-credentials"
name = "Workato API Credentials"
service = "workato"
severity = "critical"
keywords = ["WORKATO", "workato", "x-user-token", "x-user-email"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED for it (per-detector, DetectorSpec::weak_anchor;
# was rules/detector-classification.toml weak_anchor list).
weak_anchor = true

[[detector.patterns]]
regex = "(?:WORKATO[_\\.]?API[_\\.]?TOKEN|workato[_\\.]?api[_\\.]?token)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})\\b"
description = "Workato API token with context anchor"
group = 1

[[detector.patterns]]
regex = "x-user-token[=:\\s\"'']+([a-f0-9]{32,})\\b"
description = "Workato legacy API key header"
group = 1

[detector.verify]
method = "GET"
url = "https://www.workato.com/api/users/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "WORKATOAPI_TOKEN\"\" :      :     ':\":  ' \" \"  = ' -uOG1KLSt8AoYg6TRrtWYrm41kbm_5cczjZHsQrwuwK-WUhpsKOZlfUBYp0WJeEKbJV1Tykub"
test_negative = "WORKATOAPI_TOKEN\"\" :      :     ':\":  ' \" \"  = ' YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
