# Docs: https://druid.apache.org/docs/latest/operations/security-overview/
# Format: Basic auth or kerberos credentials for Druid services
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "druid-credentials"
name = "Apache Druid Credentials"
service = "druid"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["DRUID", "druid", "DRUID_HOST", "DRUID_COORDINATOR"]

[[detector.patterns]]
regex = '''(?:DRUID)[_\-\s]*(?:URL|HOST)[=:\s"'']+(?:https?://|druid://)?(?:[^:@]+):([^@]+)@'''
description = "Druid connection string with password"
group = 1

[[detector.companions]]
name = "druid_username"
regex = '''(?:DRUID)[_\-\s]*(?:USER|USERNAME)[=:\s"'']+([^"'']+)'''
within_lines = 5
[[detector.patterns]]
regex = '''(?:DRUID)[_\-\s]*(?:PASSWORD|PASS)[=:\s"'']+([a-zA-Z0-9_!@#$%^&*+=-]{16,})'''
description = "Druid password with context anchor"
group = 1

[[detector.tests]]
test_positive = "DRUID_PASSWORD=AFHzLDdEbht+JO%$Qr"
test_negative = "DRUID_PASSWORD=short"
