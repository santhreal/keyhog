# Docs: https://docs.maltego.com/
# Format: Various API key formats for different integrations
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "maltego-api-key"
name = "Maltego API Key"
service = "maltego"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["maltego", "MALTEGO_API_KEY", "transform_hub"]

[[detector.patterns]]
regex = "(?:maltego|MALTEGO)[\\s_-]*(?:api[_-]?key|key)[=:\\s\"'']+([a-zA-Z0-9_-]{16,64})"
description = "Maltego API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "maltegokey=QaoH6LgKMjTTuEuU"
test_negative = "maltegokey=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
