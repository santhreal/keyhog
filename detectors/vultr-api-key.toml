# Docs: https://www.vultr.com/api/
# Format: 36 character uppercase alphanumeric string (no unique prefix)
# Verify: GET /v2/account with Bearer token returns 200 if valid
# Prefix: none (36 char uppercase alphanumeric, requires keyword context)

[detector]
id = "vultr-api-key"
name = "Vultr API Key"
service = "vultr"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["vultr", "VULTR", "VULTR_API_KEY", "vultr_api_key", "Authorization"]

[[detector.patterns]]
regex = "(?:vultr|VULTR)[_\\-\\s]*(?:api[_\\-\\s]*key|API[_\\-\\s]*KEY)[=:\\s\\\"']+([A-Z0-9]{36})"
description = "Vultr API key with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization:\\s*[Bb]earer\\s+([A-Z0-9]{36})"
description = "Vultr API key in Authorization header"
group = 1

[detector.verify]
method = "GET"
url = "https://api.vultr.com/v2/account"
allowed_domains = ["api.vultr.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "email"
json_path = "$.account.email"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "name"
json_path = "$.account.name"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "VULTR     _       --   -        -   _    _ _       -   api       -       - _ _       -         _  - -    key \"  :    \"\"\"  :    ' \":  \"  M49195NUQSS5Y3NI88IUJABUUEJM9QWZZERI"
test_negative = "VULTR     _       --   -        -   _    _ _       -   api       -       - _ _       -         _  - -    key \"  :    \"\"\"  :    ' \":  \"  YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
