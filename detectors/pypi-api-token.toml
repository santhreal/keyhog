# Docs: https://pypi.org/help/#apitoken
# Format: Token starting with 'pypi-' followed by 100+ alphanumeric characters, underscores, or hyphens (Base64 URL-safe)
# Verify: Used as password with username '__token__' for Basic Auth to upload.pypi.org
# Prefix: pypi-

[detector]
id = "pypi-api-token"
name = "PyPI API Token"
service = "pypi"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
decode_transforms = { reverse_prefixes = ["pypi-"], caesar_prefixes = ["pypi-"] }
validators = [{ type = "base64-payload", prefixes = ["pypi-"], alphabet = "url-safe-no-pad", min_encoded_len = 100, max_encoded_len = 128, min_decoded_len = 32, confidence_floor = 0.9 }]
keywords = ["pypi-"]

[[detector.patterns]]
regex = 'pypi-[a-zA-Z0-9_-]{100,128}'
description = "PyPI API token (100-128 chars after prefix)"

[detector.verify]
method = "GET"
url = "https://upload.pypi.org/legacy/"
allowed_domains = ["upload.pypi.org"]

[detector.verify.auth]
type = "basic"
username = "__token__"
password = "match"

[detector.verify.success]
status_not = 403
status = 200

[[detector.tests]]
test_positive = "pypi-EUJykml7ZgrfPCV8aS7QTdFqbB2uTkz8KP4a8d3M1JxnuJn7UfyK_Dalj4zgPh-hecYl8DYcWbo6yT2c7xfyT0QjAXikOrHrbMNH"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
