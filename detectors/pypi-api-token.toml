# Docs: https://pypi.org/help/#apitoken
# Format: Token starting with 'pypi-' followed by 100+ alphanumeric characters, underscores, or hyphens (Base64 URL-safe)
# Verify: Used as password with username '__token__' for Basic Auth to upload.pypi.org
# Prefix: pypi-

[detector]
id = "pypi-api-token"
name = "PyPI API Token"
service = "pypi"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["pypi-"]

[[detector.patterns]]
regex = 'pypi-[a-zA-Z0-9_-]{100,128}'
description = "PyPI API token (100-128 chars after prefix)"

[detector.verify]
method = "GET"
url = "https://upload.pypi.org/legacy/"
allowed_domains = ["upload.pypi.org"]

[detector.verify.auth]
type = "basic"
username = "__token__"
password = "match"

[detector.verify.success]
status_not = 403
status = 200

[[detector.tests]]
test_positive = "pypi-EUJykml7ZgrfPCV8aS7QTdFqbB2uTkz8KP4a8d3M1JxnuJn7UfyK_Dalj4zgPh-hecYl8DYcWbo6yT2c7xfyT0QjAXikOrHrbMNH"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
