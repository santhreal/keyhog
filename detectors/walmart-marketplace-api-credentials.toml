# Docs: https://developer.walmart.com/doc/us/us-mp/us-mp-reports/
# Format: OAuth 2.0 credentials - Client ID and Client Secret pair
# Verify: POST /v3/token with Basic auth
# Prefix: none (requires context anchoring)

[detector]
id = "walmart-marketplace-api-credentials"
name = "Walmart Marketplace API Credentials"
service = "walmart"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["WALMART_CLIENT_ID", "WALMART_CLIENT_SECRET", "WM_CONSUMER_ID", "WM_PRIVATE_KEY", "walmart", "marketplace"]

[[detector.patterns]]
regex = "(?:WALMART|walmart)[_=:\\s\"'']+(?:client_id|clientId)[=:\\s\"'']+([a-f0-9-]{20,})"
description = "Walmart Marketplace Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:WALMART|walmart)[_=:\\s\"'']+(?:client_secret|clientSecret)[=:\\s\"'']+([a-zA-Z0-9_]{20,})"
description = "Walmart Marketplace Client Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:WM_CONSUMER_ID|wm_consumer_id)[=:\\s\"'']+([a-f0-9-]{8,})"
description = "Walmart Consumer ID (legacy auth)"
group = 1

[[detector.patterns]]
regex = "(?:WM_PRIVATE_KEY|wm_private_key)[=:\\s\"'']+([a-zA-Z0-9/+=]{100,})"
description = "Walmart Private Key (legacy auth)"
group = 1

[detector.verify]
method = "POST"
url = "https://marketplace.walmartapis.com/v3/token"
allowed_domains = ["marketplace.walmartapis.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "WALMART  : '    '  '=     __ \"  = \"=\" =  \"_\"_ \" :   _: '  \"clientId \"\":'=    :' '  =  '=':   :   '=\"  \"       :: \"\"  '' :  \" \":       '\" =' :   : :'=\"  \" :  ::     068280992b5faa0e16ee85-9e89"
test_negative = "WALMART  : '    '  '=     __ \"  = \"=\" =  \"_\"_ \" :   _: '  \"clientId \"\":'=    :' '  =  '=':   :   '=\"  \"       :: \"\"  '' :  \" \":       '\" =' :   : :'=\"  \" :  ::     YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
