# Docs: https://docs.databricks.com/en/dev-tools/auth/pat.html
# Format: dapi followed by 32+ hex characters, typically 40+ chars total
# Verify: GET /api/2.0/token/get with Bearer token returns 200 if valid
# Prefix: dapi

[detector]
id = "databricks-token"
name = "Databricks Personal Access Token"
service = "databricks"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["dapi", "DATABRICKS", "databricks"]

[[detector.patterns]]
# Require WORD boundary before `dapi` and 32+ hex chars after. Word
# boundary stops `the dapi prefix marks...` (prose mention) and
# `dapi-too-short` (no hex body, dash is not in [a-f0-9]) from
# firing - both used to slip through on the bare `dapi` AC literal.
regex = "(?:\\b)(dapi[a-f0-9]{32,})(?:\\b)"
description = "Databricks personal access token (dapi prefix, hex body, word-bounded)"
group = 1

[[detector.patterns]]
regex = "(?i)databricks[._-]?token[=:\\s\"']+(dapi[a-f0-9]{32,})"
description = "Databricks token with context anchor"
group = 1

[[detector.companions]]
name = "workspace_url"
# Anchored to a `DATABRICKS_HOST=` / `databricks_workspace=` declaration so a
# stray cloud.databricks.com URL in a comment doesn't qualify; the auto-
# detected capture group makes `{{companion.workspace_url}}` resolve to
# just the URL portion. (CompiledCompanion picks group 1 whenever the
# regex has any capture group - see scanner/compiler.rs:369.)
regex = "(?:DATABRICKS|databricks)[._-]?(?:host|workspace)[=:\\s\"'']+(https?://[a-z0-9-]+\\.cloud\\.databricks\\.com)"
within_lines = 5
[detector.verify]
method = "GET"
url = "{{companion.workspace_url}}/api/2.0/token/get"
# Companion regex pins the host to *.cloud.databricks.com, but the
# allowlist makes that explicit and authoritative.
allowed_domains = ["cloud.databricks.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "dapi9a3b7c2e4d1f6a8b0c5d9e3f7a1b4c2d"
test_negative = "dapi-too-short"
