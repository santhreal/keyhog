# Docs: https://developer.8x8.com/connect/docs/authentication
# Format: API Key is a Bearer token (long alphanumeric string)
# Verify: GET /stats with Authorization: Bearer header
# Prefix: none (requires context anchoring)

[detector]
id = "8x8-api-credentials"
name = "8x8 API Credentials"
service = "8x8"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["8x8", "8X8", "eightxeight", "8x8_api"]

[[detector.patterns]]
regex = '''(?i)(?:8x8|8X8)[_\-\s]*(?:api[_\-\s]*key|apikey)[=:\s"'']+([a-zA-Z0-9_-]{30,100})'''
description = "8x8 API Key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?is)(?:api\.)?8x8\.com.{0,256}x[_\-\s]*api[_\-\s]*key[=:\s"'']+([a-zA-Z0-9_-]{30,100})'''
required_literals = ["8x8.com"]
description = "8x8 API key header following an 8x8 service URL"
group = 1

[[detector.patterns]]
# Explicit `\x20` keeps this detector-owned bounded shape out of global separator expansion.
regex = "(?is)x[\\x20_\\t\\r\\n-]?api[\\x20_\\t\\r\\n-]?key[=:\\s\"'']+([a-zA-Z0-9_-]{30,100}).{0,256}(?:api\\.)?8x8\\.com"
required_literals = ["8x8.com"]
description = "8x8 API key header preceding an 8x8 service URL"
group = 1

[[detector.patterns]]
regex = '''(?i)(?:8x8|8X8)[_\-\s]*(?:subaccount[_\-\s]*id|subaccount)[=:\s"'']+([a-zA-Z0-9_-]{10,50})'''
description = "8x8 Subaccount ID"
group = 1

[detector.verify]
method = "GET"
url = "https://api.8x8.com/stats"
allowed_domains = ["api.8x8.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "8x8_api_key=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "8x8_api_key=short"

[[detector.tests]]
test_positive = "https://api.8x8.com/stats\nX-Api-Key: Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "X-Api-Key: Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"

[[detector.tests]]
test_positive = "X-Api-Key: Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5\nhttps://api.8x8.com/stats"
test_negative = "8x8 integration notes\nX-Api-Key: Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
