# Docs: https://developer.zendesk.com/api-reference/introduction/security-and-auth/
# Format: email/token:40_char_alphanumeric or standalone 40 char token
# Verify: GET /api/v2/users/me.json with Basic auth returns 200 if valid
# Prefix: none (40 char alphanumeric, requires keyword context or email/token format)

[detector]
id = "zendesk-api-token"
name = "Zendesk API Token"
service = "zendesk"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["zendesk", "ZENDESK", "/token", "zendesk_api_token", "ZENDESK_API_TOKEN"]

[[detector.patterns]]
regex = "[a-zA-Z0-9_.\\-]+@[a-zA-Z0-9_.\\-]+\\.zendesk\\.com/token:([a-zA-Z0-9]{40})"
required_literals = [".zendesk.com/token:"]
description = "Zendesk API token with email (email/token:format)"
group = 1

[[detector.patterns]]
regex = "(?:zendesk|ZENDESK)[_\\-\\s]*(?:api[_\\-\\s]*token|API[_\\-\\s]*TOKEN)[=:\\s\\\"']+([a-zA-Z0-9]{40})"
description = "Zendesk API token with context anchor"
group = 1

[[detector.tests]]
test_positive = "agent@subdomain.zendesk.com/token:5wSb6t3sE96nM6VaHoI2GWl6bp7zB8loar6sPi5w"
test_negative = "ZENDESK_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
