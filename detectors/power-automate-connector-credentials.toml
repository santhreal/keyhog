# Docs: https://learn.microsoft.com/en-us/connectors/custom-connectors/define-blank
# Format: Various credential types - API keys, OAuth tokens, or connection strings
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "power-automate-connector-credentials"
name = "Power Automate Connector Credentials"
service = "power-automate"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["POWER_AUTOMATE", "power-automate", "flow.microsoft.com", "MS_FLOW"]

[[detector.patterns]]
regex = "(?:POWER[_\\.]?AUTOMATE|POWER[_\\.]?FLOW|MS[_\\.]?FLOW)[=:\\s\"'']+(?:API[_\\.]?)?(?:KEY|TOKEN)[=:\\s\"'']+([a-zA-Z0-9_.-]{40,})"
required_literals = ["AUTOMATE", "FLOW"]
description = "Power Automate API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:Ocp-Apim-Subscription-Key)[=:\\s\"'']+([a-zA-Z0-9]{32,})"
description = "Power Automate custom connector subscription key"
group = 1

[[detector.patterns]]
regex = "https?://[^/]*\\.flow\\.microsoft\\.com/[a-zA-Z0-9/_-]+\\?api-version=[0-9.]+"
description = "Power Automate API endpoint with version"

[[detector.tests]]
test_positive = "Ocp-Apim-Subscription-Key=livZCKcy1cPhsIIWJc4XipePPWJZ4rxO"
test_negative = "Ocp-Apim-Subscription-Key=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
