# Docs: https://learn.microsoft.com/en-us/connectors/custom-connectors/define-blank
# Format: Various credential types - API keys, OAuth tokens, or connection strings
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "power-automate-connector-credentials"
name = "Power Automate Connector Credentials"
service = "power-automate"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["POWER_AUTOMATE", "power-automate", "flow.microsoft.com", "MS_FLOW"]

[[detector.patterns]]
regex = "(?:POWER[_\\.]?AUTOMATE|POWER[_\\.]?FLOW|MS[_\\.]?FLOW)[=:\\s\"'']+(?:API[_\\.]?)?(?:KEY|TOKEN)[=:\\s\"'']+([a-zA-Z0-9_.-]{40,})"
required_literals = ["AUTOMATE", "FLOW"]
description = "Power Automate API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:Ocp-Apim-Subscription-Key)[=:\\s\"'']+([a-zA-Z0-9]{32,})"
description = "Power Automate custom connector subscription key"
group = 1

[[detector.patterns]]
regex = "https?://[^/]*\\.flow\\.microsoft\\.com/[a-zA-Z0-9/_-]+\\?api-version=[0-9.]+"
description = "Power Automate API endpoint with version"

[[detector.tests]]
test_positive = "Ocp-Apim-Subscription-Key=livZCKcy1cPhsIIWJc4XipePPWJZ4rxO"
test_negative = "Ocp-Apim-Subscription-Key=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
