# Docs: https://goatcounter.com/help/api
# Format: 32-character hexadecimal string (API token)
# Verify: GET /api/v0/me with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "goatcounter-api-credentials"
name = "GoatCounter API Credentials"
service = "goatcounter"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["GOATCOUNTER_API_KEY", "goatcounter"]

[[detector.patterns]]
regex = '''(?:GOATCOUNTER[_\-\s]*API[_\-\s]*KEY|goatcounter[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-f0-9]{32})'''
description = "GoatCounter API key - 32 hex characters with context anchor"
group = 1

[[detector.patterns]]
regex = "goatcounter\\.com.*Authorization[=:\\s\"'']+Bearer[=:\\s\"'']+([a-f0-9]{32})"
description = "GoatCounter API call with Bearer token"
group = 1

[[detector.tests]]
test_positive = "GOATCOUNTER_API_KEY=51bd6a0a677c98b398762cab326e0689"
test_negative = "GOATCOUNTER_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
