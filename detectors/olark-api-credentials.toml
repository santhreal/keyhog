# Docs: https://www.olark.com/help/zapier-pro
# Format: API Key and Token pair for Zapier Pro integration
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "olark-api-credentials"
name = "Olark API Credentials"
service = "olark"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["OLARK", "olark_api", "olark_token", "olark_key"]

[[detector.patterns]]
regex = "(?i)olark[_\\s]?(?:api[_\\s]?key|key)[=:\\s\"'']+([a-f0-9]{32,40})\\b"
description = "Olark API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)olark[_\\s]?(?:api[_\\s]?token|token)[=:\\s\"'']+([a-f0-9]{32,40})\\b"
description = "Olark API token with context anchor"
group = 1

[[detector.companions]]
name = "olark_credentials_pair"
regex = "(?i)olark[_\\s]?(?:api[_\\s]?token|token)[=:\\s\"'']+([a-f0-9]{32,40})\\b"
within_lines = 5

[[detector.tests]]
test_positive = "OLARK_API_KEY=2c3d4ccd8047838a93ea899679132d920e8b52a9"
test_negative = "OLARK_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
