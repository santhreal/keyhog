# Docs: https://huggingface.co/docs/hub/en/security-tokens
# Format: hf_ prefix followed by 34 alphanumeric characters
# Verify: GET request to HuggingFace /api/whoami-v2 endpoint with Bearer token
# Prefix: hf_

[detector]
id = "huggingface-api-key"
name = "HuggingFace API Key"
service = "huggingface"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["hf_"]

[[detector.patterns]]
regex = 'hf_[a-zA-Z0-9]{34}'
description = "HuggingFace API token (hf_)"

[detector.verify]
method = "GET"
url = "https://huggingface.co/api/whoami-v2"
allowed_domains = ["huggingface.co"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "hf_9X3kQp7VbT2hYRzNcMfWj4DgEsLuHaIoBn"
test_negative = "hf_short"
