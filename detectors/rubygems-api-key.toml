# Docs: https://guides.rubygems.org/rubygems-org-api/
# Format: rubygems_ prefix followed by 48 hexadecimal characters
# Verify: GET /api/v1/gems.json with Authorization header returns 200 if valid
# Prefix: rubygems_

[detector]
id = "rubygems-api-key"
name = "RubyGems API Key"
service = "rubygems"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
decode_transforms = { reverse_prefixes = ["rubygems_"], caesar_prefixes = ["rubygems_"] }
keywords = ["rubygems_", "RUBYGEMS_API_KEY", "gem push", "rubygems.org"]

[[detector.patterns]]
regex = "rubygems_[a-f0-9]{48}"
description = "RubyGems API key with rubygems_ prefix"

[[detector.patterns]]
regex = "(?:RUBYGEMS_API_KEY|rubygems.api.key|:rubygems_api_key:)[=:\\s\"'']+(rubygems_[a-f0-9]{48})"
description = "RubyGems API key in environment/config context"
group = 1

[[detector.patterns]]
regex = "(?:RUBYGEMS_API_KEY|rubygems.api.key|:rubygems_api_key:)[=:\\s\"'']([a-f0-9]{48})\\b"
description = "Legacy RubyGems API key in environment/config context without prefix"
group = 1

[[detector.tests]]
test_positive = "rubygems_8ba813318e80dc5764a1f36c0d275492825aa46472f2d75f"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
