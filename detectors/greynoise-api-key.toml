# Docs: https://docs.greynoise.io/reference/get_v3-community_ip
# Format: Alphanumeric string
# Verify: GET /v3/community/8.8.8.8 with key query param returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "greynoise-api-key"
name = "GreyNoise API Key"
service = "greynoise"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["GREYNOISE_API_KEY", "greynoise", "GREYNOISE_KEY"]

[[detector.patterns]]
regex = "(?:GREYNOISE|greynoise)(?:_API)?(?:_KEY)?[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "GreyNoise API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.greynoise.io/v3/community/8.8.8.8?key={{match}}"
allowed_domains = ["api.greynoise.io"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "GREYNOISE=_4XCZ6jfqICQrr43YH0c"
test_negative = "GREYNOISE=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
