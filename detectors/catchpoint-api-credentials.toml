# Docs: https://docs.catchpoint.com/v1/docs/terraform-provider
# Format: REST API V2 Key (long alphanumeric string)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "catchpoint-api-credentials"
name = "Catchpoint API Credentials"
service = "catchpoint"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "api_token", "client_id", "client_secret" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["catchpoint", "CATCHPOINT", "rest_api_key"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '''(?:catchpoint|CATCHPOINT)[_.]?(?:api[_\-\s]*token|rest[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Catchpoint API token with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:catchpoint|CATCHPOINT)[_.]?client[_\-\s]*id[=:\s"'']+([a-zA-Z0-9_-]+)'''
description = "Catchpoint OAuth client ID"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = '''(?:catchpoint|CATCHPOINT)[_.]?client[_\-\s]*secret[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Catchpoint OAuth client secret"
group = 1

[[detector.tests]]
test_positive = "catchpoint_api_token=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "catchpoint_api_token=short"
