# Docs: https://developers.sinch.com/docs/est/api-reference
# Format: key_id (UUID) and key_secret (long alphanumeric string)
# Verify: Basic auth with key_id:key_secret to any Sinch API
# Prefix: none (requires context anchoring)

[detector]
id = "sinch-api-key"
name = "Sinch API Credentials"
service = "sinch"
severity = "critical"
# "project_id" removed: over-broad generic prefilter(s) the regex does NOT need — every
# pattern requires the service name as a leading anchor (kept). Recall-neutral.
keywords = ["sinch", "SINCH", "key_id", "key_secret"]

[[detector.patterns]]
regex = '''(?:sinch|SINCH)[_.-]?(?:key|KEY)[_.-]?(?:id|ID)?[=:\s"\' ]+([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'''
description = "Sinch Key ID (UUID format)"
group = 1

[[detector.patterns]]
regex = '''(?:sinch|SINCH)[_.-]?(?:key|KEY)[_.-]?(?:secret|SECRET)?[=:\s"\' ]+([a-zA-Z0-9_-]{40,})'''
description = "Sinch Key Secret (long alphanumeric string)"
group = 1

[[detector.patterns]]
regex = '''(?:sinch|SINCH)[_.-]?(?:project|PROJECT)[_.-]?(?:id|ID)?[=:\s"\' ]+([0-9a-fA-F]{32})'''
description = "Sinch Project ID (32 hex chars)"
group = 1

[[detector.tests]]
test_positive = "sinchproject=6fea9b0996bEa7A40e325382d2eEc4CE"
test_negative = "sinchproject=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
