# Docs: https://otx.alienvault.com/api
# Format: 64 hexadecimal characters
# Verify: GET /api/v1/user/me with X-OTX-API-KEY header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "alienvault-otx-api-key"
name = "AlienVault OTX API Key"
service = "alienvault"
severity = "medium"
keywords = ["OTX_API_KEY", "ALIENVAULT_API_KEY", "otx", "alienvault"]

[[detector.patterns]]
regex = "(?:OTX|ALIENVAULT|alienvault|otx)(?:_API)?(?:_KEY)?[=:\\s\"'']+([a-f0-9]{64})"
description = "AlienVault OTX API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://otx.alienvault.com/api/v1/user/me"
allowed_domains = ["otx.alienvault.com"]

[detector.verify.auth]
type = "header"
name = "X-OTX-API-KEY"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "OTX_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d8e6a2b9f0c3d7e1a5f8c2b9d6a3c4e1f"
test_negative = "OTX_API_KEY=short"
