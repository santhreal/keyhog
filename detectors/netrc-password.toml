# Docs: https://everything.curl.dev/usingcurl/netrc + git-credential-netrc
# Format: a `~/.netrc` / `~/.authinfo` machine entry. The stored credential is
# the token after `password`, on one line or split across lines:
#   machine api.example.com login deploy password s3cr3tValue
#   machine api.example.com
#   login deploy
#   password s3cr3tValue
# `password` here is whitespace-separated (not `=`), so generic key=value
# detectors miss it. The `machine … login … password` triple is the anchor.
# Verify: no generic probe (the protected resource is host-specific).
# Prefix: machine … login … password

[detector]
id = "netrc-password"
name = "netrc Stored Password"
service = "netrc"
severity = "high"
# All three literals are required by the regex, so listing them as the prefilter
# keys never causes a silent miss (a match implies all three are present).
keywords = ["machine", "login", "password"]
# Structural slot: the machine/login/password triple makes the value a
# credential even when it is a low-entropy human password. min_confidence = 0.2
# keeps it past the global floor (same idiom as the url/sql/cli password slots).
min_confidence = 0.2

# Anchor on the full `machine <host> login <user> password <secret>` triple
# (`\s+` spans the single-line AND newline-separated layouts) and capture ONLY
# the secret (group 1). The value class excludes whitespace, quotes, and the
# `$ { } < >` template/markup chars, so `password ${NETRC_PW}` and
# `password <value>` placeholders never match; the `{6,}` floor drops the short
# canonical placeholders.
[[detector.patterns]]
regex = '''machine\s+\S+\s+login\s+\S+\s+password\s+([^\s"'<>${}]{6,})'''
description = "Password stored in a .netrc/.authinfo machine entry"
group = 1

[[detector.tests]]
test_positive = "machine api.example.com login deploy password Zx9Qw3Rt7Lp2Mk"
test_negative = "machine api.example.com login deploy password ${NETRC_PW}"
