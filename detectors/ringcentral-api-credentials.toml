# Docs: https://developers.ringcentral.com/guide/authentication/quick-start
# Format: Client ID and Client Secret pair (OAuth2 client credentials)
# Verify: POST /restapi/oauth/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "ringcentral-api-credentials"
name = "RingCentral API Credentials"
service = "ringcentral"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["ringcentral", "RINGCENTRAL", "RC_APP_CLIENT_ID", "RC_APP_CLIENT_SECRET"]

[[detector.patterns]]
regex = '''(?i)(?:ringcentral|rc)[_\-\s]*(?:app[_\-\s]*)?(?:client[_\-\s]*id|clientid)[=:\s"'']+([a-zA-Z0-9_-]{20,40})'''
required_literals = ["client"]
description = "RingCentral Client ID with context anchor"
group = 1

[[detector.companions]]
name = "ringcentral_client_pair"
regex = '''(?i)(?:ringcentral|rc)[_\-\s]*(?:app[_\-\s]*)?(?:client[_\-\s]*secret|clientsecret)[=:\s"'']+[a-zA-Z0-9_-]{20,40}'''
within_lines = 5

[[detector.tests]]
test_positive = "ringcentralclientid=Iqt1Wwep_ED4e1JzZYKZ"
test_negative = "ringcentralclientid=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
