# Docs: https://render.com/docs/api
# Format: API key starting with 'rnd_' followed by 24 alphanumeric characters
# Verify: Bearer token sent to api.render.com/v1/services, returns 200 on success
# Prefix: rnd_

[detector]
id = "render-api-key"
name = "Render API Key"
service = "render"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["rnd_"]

[[detector.patterns]]
regex = 'rnd_[a-zA-Z0-9]{24}\b'
description = "Render API key (rnd_ prefix followed by 24 alphanumeric characters)"

[detector.verify]
method = "GET"
url = "https://api.render.com/v1/services?limit=1"
allowed_domains = ["api.render.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "rnd_9X3kQp7VbT2hYRzNcMfWj4Dg"
test_negative = "rnd_short"
