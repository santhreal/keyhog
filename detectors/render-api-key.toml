# Docs: https://render.com/docs/api
# Format: API key starting with 'rnd_' followed by 24 alphanumeric characters
# Verify: Bearer token sent to api.render.com/v1/services, returns 200 on success
# Prefix: rnd_

[detector]
id = "render-api-key"
name = "Render API Key"
service = "render"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["rnd_"]

[[detector.patterns]]
regex = 'rnd_[a-zA-Z0-9]{24}\b'
description = "Render API key (rnd_ prefix followed by 24 alphanumeric characters)"

[detector.verify]
method = "GET"
url = "https://api.render.com/v1/services?limit=1"
allowed_domains = ["api.render.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "rnd_9X3kQp7VbT2hYRzNcMfWj4Dg"
test_negative = "rnd_short"
