# Docs: https://developers.brevo.com/docs/quickstart-reference
# Format: xkeysib- prefix followed by 64 hexadecimal characters
# Verify: GET request to Brevo account endpoint with api-key header
# Prefix: xkeysib-

[detector]
id = "brevo-api-key"
name = "Brevo/Sendinblue API Key"
service = "brevo"
severity = "critical"
keywords = ["xkeysib-", "brevo", "sendinblue"]

[[detector.patterns]]
regex = 'xkeysib-[a-f0-9]{64}'
description = "Brevo/Sendinblue API v3 key (xkeysib- prefix with 64 hex characters)"

[detector.verify]
method = "GET"
url = "https://api.brevo.com/v3/account"

[detector.verify.auth]
type = "header"
name = "api-key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "xkeysib-7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "xkeysib-short"
