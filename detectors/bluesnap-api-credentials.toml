# Docs: https://developers.bluesnap.com/reference/api-credentials
# Format: API User Key (alphanumeric) and API Password (12-128 chars with special chars)
# Verify: GET to BlueSnap API with Basic authentication
# Prefix: none (requires context anchoring)

[detector]
id = "bluesnap-api-credentials"
name = "BlueSnap API Credentials"
service = "bluesnap"
severity = "critical"
keywords = ["BLUESNAP", "bluesnap", "BSAPIUser", "BSAPIPassword", "api_user", "api_password"]

[[detector.patterns]]
regex = "(?i)bluesnap[._-]?(?:api)?[._-]?(?:user|key)?[=:\\s\"'']+([a-zA-Z0-9]{20,40})\\b(?:[^a-zA-Z0-9_-]|$)"
description = "BlueSnap API User Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:BLUESNAP)[._-]?(?:API)?[._-]?PASS(?:WORD)?[=:\\s\"'']+([a-zA-Z0-9_~!@#&$%^*()|'-]{12,128})(?:[^a-zA-Z0-9_~!@#&$%^*()|'-]|$)"
description = "BlueSnap API Password with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)bsapiuser[=:\\s\"'']+([a-zA-Z0-9]{20,40})\\b(?:[^a-zA-Z0-9_-]|$)"
description = "BlueSnap BsAPIUser plist/config key"
group = 1

[[detector.patterns]]
regex = "(?i)BsAPIPassword[=:\\s\"'']+([a-zA-Z0-9_~!@#&$%^*()|'-]{12,128})(?:[^a-zA-Z0-9_~!@#&$%^*()|'-]|$)"
description = "BlueSnap BsAPIPassword plist/config key"
group = 1

[[detector.companions]]
name = "bluesnap_password"
regex = "(?i)(?:BLUESNAP|BsAPI)[._-]?(?:API)?[._-]?PASS(?:WORD)?[=:\\s\"'']+([a-zA-Z0-9_~!@#&$%^*()|'-]{12,128})(?:[^a-zA-Z0-9_~!@#&$%^*()|'-]|$)"
within_lines = 5

[[detector.tests]]
test_positive = "BLUESNAP_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "BLUESNAP_KEY=short"
