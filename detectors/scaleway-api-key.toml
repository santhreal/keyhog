# Docs: https://www.scaleway.com/en/docs/scaleway-sdk/python-sdk/
# Format: Access key starting with SCW followed by 20 alphanumeric chars, Secret key is UUID format
# Verify: GET /iam/v1/api-keys with x-auth-token header returns 200 if valid
# Prefix: SCW (for access key)

[detector]
id = "scaleway-api-key"
name = "Scaleway API Key"
service = "scaleway"
severity = "critical"
keywords = ["SCW", "SCALEWAY_ACCESS_KEY", "scaleway"]

[[detector.patterns]]
# Anchor narrowed to SCW_SECRET_KEY / scaleway_secret_key only
# (2026-05-29). The previous alternation included a bare `secret[_-]key`
# arm with NO Scaleway prefix - any `secret_key=<uuid>` shape in any
# Vault, Stripe, AWS, GCP, k8s config trip-fired Scaleway. Mirror v23:
# 12 FPs. Every contract positive / evasion anchors on SCW_SECRET_KEY,
# so the narrowed regex preserves recall on every contract shape.
regex = "(?:SCW_SECRET_KEY|scaleway_secret_key)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Scaleway secret key (SCW-anchored, UUID body)"
group = 1

[[detector.companions]]
name = "scaleway_access_key"
regex = "(?:SCW|SCALEWAY_ACCESS_KEY|scaleway.access.key)[=:\\s\"'']+(SCW[A-Z0-9]{20})"
within_lines = 5

[[detector.tests]]
test_positive = "SCW_SECRET_KEY=6179c5db-a4be-f4b3-0d77-79da118cfc39"
test_negative = "SCW_SECRET_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
