# Docs: https://docs.memcached.org/protocols/binarysasl/
# Format: Username and password via SASL PLAIN authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "memcached-sasl-credentials"
name = "Memcached SASL Credentials"
service = "memcached"
severity = "high"
keywords = ["MEMCACHE_USERNAME", "MEMCACHE_PASSWORD", "memcached", "sasl"]

[[detector.patterns]]
regex = "MEMCACHE_USERNAME\\s*=\\s*[\"'']?([^\"'\"\\s]{3,})[\"'']?"
description = "Memcached SASL username in environment variable"
group = 1

[[detector.companions]]
name = "memcached_sasl_password"
regex = "MEMCACHE_PASSWORD\\s*=\\s*[\"'']?([^\"'\"\\s]{3,})[\"'']?"
within_lines = 3
