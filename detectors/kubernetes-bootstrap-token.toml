# Docs: https://kubernetes.io/docs/reference/access-authn-authz/bootstrap-tokens/
# Format: <6 chars>.<16 chars> all lowercase alphanumeric (token-id.token-secret).
#   Bootstrap tokens authenticate a node joining a cluster - leaking one lets
#   an attacker register a new control-plane node and execute arbitrary code
#   in the cluster, so the severity is critical.
# Verify: no public endpoint (cluster-internal authentication); marked unverified.
# Prefix: none. The format is distinctive enough that the regex alone is high-precision.

[detector]
id = "kubernetes-bootstrap-token"
name = "Kubernetes Bootstrap Token"
service = "kubernetes"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# Only bootstrap-token-SPECIFIC anchors. The generic cluster terms
# (kubernetes/kube/k8s/kubelet/kube-controller-manager) were removed: they
# fire the loose `[a-z0-9]{6}.[a-z0-9]{16}` pattern on any k8s-mentioning PROSE
# (measured CredData FP: `after1.10goesoutthedoor` in a doc that mentions
# Kubernetes) with zero recall benefit, a real bootstrap token always sits
# next to `kubeadm join`, `--token`, `bootstrap-token`, or `token-id`.
keywords = [
    "bootstrap-token",
    "bootstrap_token",
    "bootstrapToken",
    "BOOTSTRAP_TOKEN",
    "tokenID",
    "token-id",
    "kubeadm",
]

[[detector.patterns]]
# Format spec: `[a-z0-9]{6}\.[a-z0-9]{16}` - 6-char token-id, 16-char token-secret,
# joined by a literal dot. \b boundaries reject substrings of longer identifiers.
regex = '\b([a-z0-9]{6}\.[a-z0-9]{16})\b'
description = "Kubernetes bootstrap token (token-id.token-secret, lowercase alnum)"
group = 1

[[detector.tests]]
test_positive = "kubeadm join 10.0.0.1:6443 --token k3m9zq.4r8w2nq3p6vt5b1z --discovery-token-ca-cert-hash sha256:abc"
test_negative = "kubeadm version: v1.29.3"
