# Docs: https://docs.cyberark.com/PAS/Latest/en/Content/SDK/CyberArk%20Authentication.htm
# Format: CyberArk Central Credential Provider uses AppID with various auth methods
# Verify: varies by deployment - no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "cyberark-credentials"
name = "CyberArk Credential"
service = "cyberark"
severity = "critical"
keywords = ["CYBERARK", "cyberark", "AIMWebService", "AppID", "ccpass"]

[[detector.patterns]]
# Capped the trailing capture at 256 chars; the original `{8,}` had
# no upper bound and `cargo install`-shape lockfile lines could
# produce 10k-character backtracking attempts.
regex = '''(?:CYBERARK|cyberark)[._](?:APPID|appid|PASSWORD|password|API_KEY|api_key)[=:\s"']+([a-zA-Z0-9_-]{8,256})'''
description = "CyberArk AppID or credential with context anchor"
group = 1

[[detector.patterns]]
# Bounded the bridge between AIMWebService and AppID to 256 non-
# newline chars (the field appears in the same XML/JSON element in
# every real CyberArk config) and capped the capture at 256 chars.
# Replaces an unbounded `.*` + unbounded `+` that could match
# megabytes apart and burn CPU on big config dumps.
regex = '''AIMWebService[^\n]{0,128}AppID[=:\s"']+([a-zA-Z0-9_-]{1,256})'''
description = "CyberArk AIM Web Service AppID reference"
group = 1
