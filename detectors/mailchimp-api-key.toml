# Docs: https://mailchimp.com/developer/marketing/docs/fundamentals/#api-structure
# Format: 32 hex characters followed by datacenter code (e.g., -us1, -us2, -eu1)
# Verify: GET /3.0/ with Basic auth (username=any, password=key) returns 200
# Prefix: none (hex with datacenter suffix is distinctive but needs context)

[detector]
id = "mailchimp-api-key"
name = "Mailchimp API Key"
service = "mailchimp"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.3
keywords = ["MAILCHIMP_API_KEY", "mailchimp_api_key", "mailchimp", "-us", "-eu", "-uk"]

[[detector.patterns]]
regex = '''(?:MAILCHIMP|mailchimp)[_\-\s]*(?:API|api)?[_\-\s]*(?:KEY|key)?[=:\s"'']+([a-f0-9]{32}-(?:us|eu|uk)[0-9]{1,2})'''
description = "Mailchimp API key with context anchor"
group = 1

[[detector.patterns]]
regex = "([a-f0-9]{32}-us[0-9]{1,2})"
description = "Mailchimp API key with US datacenter"
group = 1

[[detector.patterns]]
regex = "([a-f0-9]{32}-eu[0-9]{1,2})"
description = "Mailchimp API key with EU datacenter"
group = 1

[[detector.patterns]]
regex = "([a-f0-9]{32}-uk[0-9]{1,2})"
description = "Mailchimp API key with UK datacenter"
group = 1

[[detector.tests]]
test_positive = "MAILCHIMP_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d-us12"
test_negative = "MAILCHIMP_API_KEY=short"
