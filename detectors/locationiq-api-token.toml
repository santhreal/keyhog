# Docs: https://locationiq.com/docs
# Format: pk.{32+hex} for public tokens, sk.{32+hex} for secret tokens
# Verify: GET /v1/reverse.php with key parameter returns 200
# Prefix: pk. or sk.

[detector]
id = "locationiq-api-token"
name = "LocationIQ API Token"
service = "locationiq"
severity = "high"
keywords = ["pk.", "sk.", "LOCATIONIQ"]

[[detector.patterns]]
regex = '(?:pk|sk)\.[a-f0-9]{32,}'
description = "LocationIQ API token (pk. or sk. prefix)"

[detector.verify]
method = "GET"
url = "https://eu1.locationiq.com/v1/reverse.php"

[detector.verify.auth]
type = "query"
param = "key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "LOCATIONIQ_API_KEY=pk.b02a70db24b788f217af47231d91e27e96c388b92f008b39c24addc0706"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
