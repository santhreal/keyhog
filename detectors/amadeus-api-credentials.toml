# Docs: https://developers.amadeus.com/self-service/apis-docs/guides/developer-guides/API-Keys/authorization
# Format: API Key (client_id) and API Secret (client_secret) for OAuth2
# Verify: POST to /v1/security/oauth2/token returns access token
# Prefix: none (requires context anchoring)

[detector]
id = "amadeus-api-credentials"
name = "Amadeus API Credentials"
service = "amadeus"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["AMADEUS", "amadeus", "AMADEUS_API_KEY", "AMADEUS_CLIENT_ID", "client_id", "client_secret"]

[[detector.patterns]]
regex = '''(?:AMADEUS|amadeus)[_\-\s]*(?:CLIENT_ID|client_id|API_KEY|api_key)[=:\s"'']+([A-Za-z0-9]{32})'''
description = "Amadeus API Key/Client ID"
group = 1

[[detector.patterns]]
regex = '''(?:AMADEUS|amadeus)[_\-\s]*(?:CLIENT_SECRET|client_secret|API_SECRET|api_secret)[=:\s"'']+([A-Za-z0-9]{32})'''
description = "Amadeus API Secret/Client Secret"
group = 1

[detector.verify]
method = "POST"
url = "https://test.api.amadeus.com/v1/security/oauth2/token"
allowed_domains = ["test.api.amadeus.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AMADEUS_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "AMADEUS_API_KEY=short"
