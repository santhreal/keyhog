# Docs: https://docs.rapyd.net/en/index.html
# Format: Access Key and Secret Key pair for request signing with HMAC-SHA256
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "rapyd-api-credentials"
name = "Rapyd API Credentials"
service = "rapyd"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["RAPYD", "rapyd", "RAPYD_ACCESS_KEY", "RAPYD_SECRET_KEY"]

[[detector.patterns]]
regex = "(?:RAPYD|rapyd)[_.]?(?:SECRET_KEY|secret_key|SECRETKEY|secretkey)[=:\\s\"']+([a-f0-9]{48,})"
description = "Rapyd Secret Key with context anchor"
group = 1

[[detector.companions]]
name = "rapyd_access_key"
regex = "(?:RAPYD|rapyd)[_.]?(?:ACCESS_KEY|access_key|ACCESSKEY|accesskey|API_KEY|api_key)[=:\\s\"']+([a-f0-9]{24,})"
within_lines = 5

[[detector.tests]]
test_positive = "RAPYD_ACCESS_KEY=799d33f560acc53abefd6d1c\nRAPYD_SECRET_KEY=71a7fcfca44e9d5a60decd648ff5ca3aba7559f21ae1aa2043aa43c9bddae55"
test_negative = "RAPYD_ACCESS_KEY=799d33f560acc53abefd6d1c"
