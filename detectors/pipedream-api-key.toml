# Docs: https://pipedream.com/docs/rest-api
# Format: Bearer token - api_<40+ alphanumeric characters>
# Verify: GET /v1/users/me with Bearer token
# Prefix: api_

[detector]
id = "pipedream-api-key"
name = "Pipedream API Key"
service = "pipedream"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["api_", "pipedream", "PIPEDREAM_API_KEY"]

[[detector.patterns]]
# `api_` alone is a generic prefix (any `api_token`, `api_<hash>`, concatenated
# `api_someLongIdentifier`). A real Pipedream key body is high-entropy base62
# that mixes upper- and lower-case with digits, so require at least one
# UPPERCASE letter in the body. That single non-overlapping anchor rejects the
# common false-positive shapes the old `api_[a-zA-Z0-9]{40,}` matched:
# all-lowercase identifiers and all-lowercase hex digests (`api_<40+ hex>`),
# while still firing on canonical keys (`api_kaxHrCzkGkCZm0h4Zg42...`).
# `(?-i)` is required: keyhog compiles regexes case-insensitive by default,
# which would make `[A-Z]` match a lowercase letter and defeat the
# mixed-case discriminator. With `(?-i)` the `api_` prefix is also pinned
# lowercase (the real key prefix) and `[A-Z]` means a genuine uppercase byte.
regex = '(?-i)api_[a-z0-9]*[A-Z][a-zA-Z0-9]{39,}'
description = "Pipedream API key (api_ prefix)"

[[detector.tests]]
test_positive = "api_kaxHrCzkGkCZm0h4Zg42FLRQ1Iqt8C3BqyDXJdHXjYDOxYxMyWbUshf83I2z8LS5NF42L57S3Wv0rftjdzgVoFuwd5"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
