# Docs: https://vercel.com/docs/storage/vercel-blob
# Format: 40+ character alphanumeric token used for blob storage access
# Verify: HEAD / with x-token header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "vercel-blob-credentials"
name = "Vercel Blob Token"
service = "vercel"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["BLOB_READ_WRITE_TOKEN", "BLOB_TOKEN", "vercel_blob"]

[[detector.patterns]]
regex = "BLOB_READ_WRITE_TOKEN[=:\\s\"'']+([A-Za-z0-9_-]{40,})"
description = "Vercel Blob read-write token with context anchor"
group = 1

[[detector.patterns]]
regex = "BLOB_TOKEN[=:\\s\"'']+([A-Za-z0-9_-]{40,})"
description = "Vercel Blob token with context anchor"
group = 1

[[detector.tests]]
test_positive = "BLOB_READ_WRITE_TOKEN     ': :    \":  :' \"'\"=='   = 2TZ_q3QusTj118A74fyBF2OY-83r5AU55Zxq8tYP20ludPUbx"
test_negative = "BLOB_READ_WRITE_TOKEN     ': :    \":  :' \"'\"=='   = YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
