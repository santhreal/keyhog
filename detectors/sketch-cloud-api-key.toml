# Docs: https://developer.sketch.com/
# Format: Personal Access Token for Sketch Cloud API
# Verify: GET /v1/user with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "sketch-cloud-api-key"
name = "Sketch Cloud API Key"
service = "sketch"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["SKETCH", "sketch", "SKETCH_API_KEY", "sketchapp"]

[[detector.patterns]]
regex = '''(?:SKETCH|sketch)[_=:\s"'']+(?:api[_\-\s]*)?(?:key|token)[=:\s"'']+([a-zA-Z0-9_-]{20,50})'''
description = "Sketch Cloud API key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:sketch[_\-\s]*cloud|SKETCH_CLOUD)[_=:\s"'']+(?:api[_\-\s]*)?(?:key|token)[=:\s"'']+([a-zA-Z0-9_-]{20,50})'''
description = "Sketch Cloud API token"
group = 1

[detector.verify]
method = "GET"
url = "https://api.sketch.com/v1/user"
allowed_domains = ["api.sketch.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "id"
json_path = "$.id"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "name"
json_path = "$.name"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "email"
json_path = "$.email"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "sketch_api_key=abcdefghijklmnopqrstuvwxyz1234567890"
test_negative = "sketch_api_key=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
