# Docs: https://developer.amazon.com/docs/music/API_reference.html
# Format: OAuth 2.0 client_id and client_secret for LWA (Login with Amazon)
# Verify: POST /auth/o2/token returns 200 if valid
# Prefix: amzn.application-oa2-client.

[detector]
id = "amazon-music-api-credentials"
name = "Amazon Music API Credentials"
service = "amazon-music"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["AMAZON_MUSIC", "amazon_music", "AMAZON_CLIENT_ID", "AMAZON_CLIENT_SECRET", "LWA_CLIENT_ID"]

[[detector.patterns]]
regex = '''(?i)amazon[\s_-]?(?:music[\s_-]?)?client[\s_-]?id[=:\s"']+(amzn[.]application-oa2-client[.][a-f0-9]{32})(?:[^\w-]|$)'''
description = "Amazon Music client ID with amzn prefix"
group = 1

[[detector.patterns]]
regex = '''(?i)amazon[\s_-]?(?:music[\s_-]?)?client[\s_-]?secret[=:\s"']+([a-f0-9]{64})(?:[^\w-]|$)'''
description = "Amazon Music client secret (64 hex chars)"
group = 1

[[detector.patterns]]
regex = '''(?i)lwa[\s_-]?client[\s_-]?id[=:\s"']+(amzn[.]application-oa2-client[.][a-f0-9]{32})(?:[^\w-]|$)'''
description = "Login with Amazon client ID"
group = 1

[[detector.companions]]
name = "amazon_music_client_secret"
regex = '''(?i)amazon[\s_-]?(?:music[\s_-]?)?client[\s_-]?secret[=:\s"']+([a-f0-9]{64})(?:[^\w-]|$)'''
within_lines = 5

[[detector.tests]]
test_positive = "AMAZON_MUSIC_CLIENT_ID=amzn.application-oa2-client.7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "AMAZON_CLIENT_ID=amzn.application-oa2-client.7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4"

[[detector.tests]]
test_positive = "AMAZON_MUSIC_CLIENT_SECRET=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "AMAZON_MUSIC_CLIENT_SECRET=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4"
