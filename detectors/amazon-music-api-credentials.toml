# Docs: https://developer.amazon.com/docs/login-with-amazon/glossary.html
# Format: OAuth 2.0 client identifier and confidential client secret for LWA
# Verify: POST /auth/o2/token returns 200 if valid
# Client identifiers are non-secret and are retained only as companion evidence.

[detector]
id = "amazon-music-api-credentials"
name = "Amazon Music API Credentials"
service = "amazon-music"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["AMAZON_MUSIC", "amazon_music", "AMAZON_CLIENT_SECRET", "LWA_CLIENT_SECRET"]

[[detector.patterns]]
regex = '''(?i)(?:amazon[\s_.-]?(?:music[\s_.-]?)?|lwa[\s_.-]?)client[\s_.-]?secret[=:\s"']+([a-z0-9_-]{8,64})(?:[^a-z0-9_-]|$)'''
description = "Login with Amazon confidential client secret"
group = 1

[[detector.companions]]
name = "amazon_music_client_id"
regex = '''(?i)(?:amazon[\s_.-]?(?:music[\s_.-]?)?|lwa[\s_.-]?)client[\s_.-]?id[=:\s"']+((?:amzn1?[.]application-oa2-client[.])[a-z0-9_-]{8,64})(?:[^a-z0-9_-]|$)'''
within_lines = 5

[[detector.tests]]
test_positive = "AMAZON_MUSIC_CLIENT_SECRET=Y76SDl2F"
test_negative = "AMAZON_MUSIC_CLIENT_ID=amzn1.application-oa2-client.7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"

[[detector.tests]]
test_positive = "AMAZON_MUSIC_CLIENT_SECRET=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "AMAZON_MUSIC_CLIENT_SECRET=Y76SDl2"
