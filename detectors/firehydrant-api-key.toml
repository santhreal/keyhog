# Docs: https://support.firehydrant.io/hc/en-us/articles/360058262813-API-Keys
# Format: fhc prefix followed by 64 hex characters
# Verify: GET /v1/organizations with Authorization header
# Prefix: fhc

[detector]
id = "firehydrant-api-key"
name = "FireHydrant API Key"
service = "firehydrant"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["fhc", "FIREHYDRANT_API_KEY", "firehydrant"]

[[detector.patterns]]
regex = 'fhc[a-f0-9]{64}'
description = "FireHydrant API key with fhc prefix"

[detector.verify]
method = "GET"
url = "https://api.firehydrant.io/v1/organizations"
allowed_domains = ["api.firehydrant.io"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "fhc7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "fhcshort"
