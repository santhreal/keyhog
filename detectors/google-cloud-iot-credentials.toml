# Docs: https://cloud.google.com/iot/docs/concepts/device-security
# Format: JSON service account key or device credentials
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "google-cloud-iot-credentials"
name = "Google Cloud IoT Credentials"
service = "google-cloud-iot"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["cloudiot", "GOOGLE_CLOUD_IOT", "IOT_CORE", "gcp-iot"]

[[detector.patterns]]
regex = '''(?:CLOUDIOT|cloudiot|IOT[_\-\s]*CORE|iot[_\-\s]*core)[=:\s"'']+(\{[\s\S]*"type"[\s]*:[\s]*"service_account"[\s\S]*\})'''
description = "Google Cloud IoT service account JSON"
group = 1

[[detector.patterns]]
regex = '''(?:CLOUDIOT|cloudiot)[._\s-]?PROJECT[_\-\s]*ID[=:\s"'']+([a-z][a-z0-9-]{4,28}[a-z0-9])'''
description = "Google Cloud IoT project ID"
group = 1

[[detector.patterns]]
regex = '''(?:CLOUDIOT|cloudiot)[._\s-]?REGISTRY[_\-\s]*ID[=:\s"'']+([a-zA-Z][a-zA-Z0-9-._~%+]{0,254})'''
description = "Google Cloud IoT registry ID"
group = 1

[[detector.tests]]
test_positive = "cloudiot PROJECT_ID=my-iot-project-01"
test_negative = "cloudiot PROJECT_ID=short"
