# Docs: https://cloud.google.com/iot/docs/concepts/device-security
# Format: JSON service account key or device credentials
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "google-cloud-iot-credentials"
name = "Google Cloud IoT Credentials"
service = "google-cloud-iot"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["cloudiot", "GOOGLE_CLOUD_IOT", "IOT_CORE", "gcp-iot"]

[[detector.patterns]]
regex = "(?:CLOUDIOT|cloudiot|IOT[_-]?CORE|iot[_-]?core)[=:\\s\"'']+(\\{[\\s\\S]*\"type\"[\\s]*:[\\s]*\"service_account\"[\\s\\S]*\\})"
description = "Google Cloud IoT service account JSON"
group = 1

[[detector.patterns]]
regex = "(?:CLOUDIOT|cloudiot)[._\\s-]?PROJECT[_-]?ID[=:\\s\"'']+([a-z][a-z0-9-]{4,28}[a-z0-9])"
description = "Google Cloud IoT project ID"
group = 1

[[detector.patterns]]
regex = "(?:CLOUDIOT|cloudiot)[._\\s-]?REGISTRY[_-]?ID[=:\\s\"'']+([a-zA-Z][a-zA-Z0-9-._~%+]{0,254})"
description = "Google Cloud IoT registry ID"
group = 1

[[detector.tests]]
test_positive = "cloudiot PROJECT_ID=my-iot-project-01"
test_negative = "cloudiot PROJECT_ID=short"
