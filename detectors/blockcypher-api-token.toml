# Docs: https://www.blockcypher.com/dev/
# Format: 24-32 character hexadecimal string (no distinctive prefix)
# Verify: GET /v1/btc/main with token query parameter returns 200 if valid
# Prefix: none (hex string, requires context keywords)

[detector]
id = "blockcypher-api-token"
name = "BlockCypher API Token"
service = "blockcypher"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["blockcypher", "BLOCKCYPHER", "BLOCKCYPHER_TOKEN", "blockcypher_token", "blockcypher.com"]

[[detector.patterns]]
regex = "(?:BLOCKCYPHER|blockcypher)[_\\-\\.]?(?:TOKEN|token|API[_\\-\\.]?TOKEN|api[_\\-\\.]?token)[=:\\s\\\"']+([a-f0-9]{24,32})"
description = "BlockCypher API token with context anchor"
group = 1

# `?token=<hex>` query-param shape - scoped to api.blockcypher.com so
# we don't fire on every `Authorization: token <hex>` line in any
# REST API test fixture. The earlier `token[=:\s"']+([a-f0-9]{24,32})`
# matched 41 Shopify API test SHAs in v0.5.19 dogfood (every test
# fixture access-token-shaped hex). Real BlockCypher tokens travel as
# `?token=` query params against `api.blockcypher.com` - gating on
# that host keeps recall for real usage and kills the cross-service FP.
[[detector.patterns]]
regex = "api\\.blockcypher\\.com/[^\\s\"']*[?&]token=([a-f0-9]{24,32})"
description = "BlockCypher token in api.blockcypher.com URL query"
group = 1

[detector.verify]
method = "GET"
url = "https://api.blockcypher.com/v1/btc/main?token={{match}}"
allowed_domains = ["api.blockcypher.com"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "BLOCKCYPHER_TOKEN=7b3e5d8c1a9f4e2b6c8d3a5e9f1b"
test_negative = "BLOCKCYPHER_TOKEN=short"
