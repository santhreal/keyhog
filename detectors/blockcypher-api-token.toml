# Docs: https://www.blockcypher.com/dev/
# Format: 24-32 character hexadecimal string (no distinctive prefix)
# Verify: GET /v1/btc/main with token query parameter returns 200 if valid
# Prefix: none (hex string, requires context keywords)

[detector]
id = "blockcypher-api-token"
name = "BlockCypher API Token"
service = "blockcypher"
severity = "high"
keywords = ["blockcypher", "BLOCKCYPHER", "BLOCKCYPHER_TOKEN", "blockcypher_token", "blockcypher.com"]

[[detector.patterns]]
regex = "(?:BLOCKCYPHER|blockcypher)[_\\-\\.]?(?:TOKEN|token|API[_\\-\\.]?TOKEN|api[_\\-\\.]?token)[=:\\s\\\"']+([a-f0-9]{24,32})"
description = "BlockCypher API token with context anchor"
group = 1

# `?token=<hex>` query-param shape - scoped to api.blockcypher.com so
# we don't fire on every `Authorization: token <hex>` line in any
# REST API test fixture. The earlier `token[=:\s"']+([a-f0-9]{24,32})`
# matched 41 Shopify API test SHAs in v0.5.19 dogfood (every test
# fixture access-token-shaped hex). Real BlockCypher tokens travel as
# `?token=` query params against `api.blockcypher.com` - gating on
# that host keeps recall for real usage and kills the cross-service FP.
[[detector.patterns]]
regex = "api\\.blockcypher\\.com/[^\\s\"']*[?&]token=([a-f0-9]{24,32})"
description = "BlockCypher token in api.blockcypher.com URL query"
group = 1

[detector.verify]
method = "GET"
url = "https://api.blockcypher.com/v1/btc/main?token={{match}}"

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200
