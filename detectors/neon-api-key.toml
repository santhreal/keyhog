# Docs: https://neon.com/docs/manage/api-keys
# Format: Randomly generated bearer API token
# Verify: GET /api/v2/projects with Authorization: Bearer token returns 200 if valid
# Prefix: neon_api_ for current API keys; legacy/context fixtures may be 64 hex

[detector]
id = "neon-api-key"
name = "Neon API Key"
service = "neon"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["NEON_API_KEY", "neon.tech", "Authorization"]

[[detector.patterns]]
regex = "(?:NEON_API_KEY|neon.?api.?key)[=:\\s\"'']+([a-f0-9]{64})"
description = "Neon API key with context anchor"
group = 1

[[detector.patterns]]
regex = "neon_api_[A-Za-z0-9_-]{48}"
description = "Neon API key with neon_api_ prefix"

[[detector.patterns]]
regex = "(?:NEON_API_KEY|neon.?api.?key)[=:\\s\"'']+(neon_api_[A-Za-z0-9_-]{48})"
description = "Neon API key with context anchor and neon_api_ prefix"
group = 1

[detector.verify]
method = "GET"
url = "https://console.neon.tech/api/v2/projects"
allowed_domains = ["console.neon.tech"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "NEON_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "NEON_API_KEY=short"
