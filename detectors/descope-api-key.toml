# Docs: https://docs.descope.com/api/management/users
# Format: Project ID (P2 followed by alphanumeric) and Management Key pair used as Bearer token
# Verify: GET /v1/management/users with Bearer token (ProjectID:ManagementKey)
# Prefix: P2 (project ID prefix)

[detector]
id = "descope-api-key"
name = "Descope Management API Key"
service = "descope"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["P2", "descope", "management key"]

[[detector.patterns]]
regex = "(?:descope|DESCOPE)[\\s\\S]{0,100}?(P2[a-zA-Z0-9_-]+)[\"\\']?"
description = "Descope Project ID with context"
group = 1

[[detector.companions]]
name = "management_key"
regex = "(?:management[_-]?key|api[_-]?secret)[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]{20,})[\"\\']"
within_lines = 5

[[detector.tests]]
test_positive = "descope project P2Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "descope project P2"
