# Docs: https://developer.deel.com/docs/authentication
# Format: Organization tokens with 'organization_' or 'org_' prefix followed by
# random base62 (mixed-case alphanumeric, no underscores, no hyphens).
# Earlier `[a-zA-Z0-9_-]{30,}` matched Java JNI mangled macro names like
# `org_sqlite_jni_capi_CApi_SQLITE_UTF16` (every Java-bindings header in
# existence). Real Deel keys never contain `_` after the prefix - they're
# opaque base62 strings. Dropping `_` and `-` from the suffix alphabet kills
# the JNI FP class entirely while still matching real keys.
# Verify: GET /rest/v2/me with Bearer token returns 200 if valid
# Prefix: organization_ or org_

[detector]
id = "deel-api-key"
name = "Deel API Key"
service = "deel"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["organization_", "org_", "DEEL_API_KEY", "deel_token"]

[[detector.patterns]]
regex = "organization_[a-zA-Z0-9]{30,}"
description = "Deel organization token with organization_ prefix (base62 body)"
[[detector.patterns]]
regex = "(?:DEEL_API_KEY|DEEL_TOKEN|deel_api_key|deel_token)[=:\\s\"'']+([a-zA-Z0-9_-]{30,})"
description = "Deel API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.letsdeel.com/rest/v2/me"
allowed_domains = ["api.letsdeel.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "organization_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "organization_Kp4Qx7Rm"
