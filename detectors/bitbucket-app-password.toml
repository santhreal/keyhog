# Docs: https://support.atlassian.com/bitbucket-cloud/docs/app-passwords/
# Format: 32 character alphanumeric string (randomly generated)
# Verify: GET /2.0/user with Basic auth (username:app_password) returns 200 if valid
# Prefix: none (generic alphanumeric, requires keyword context)

[detector]
id = "bitbucket-app-password"
name = "Bitbucket App Password"
service = "bitbucket"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["bitbucket", "BITBUCKET", "app_password", "app password"]

[[detector.patterns]]
regex = "(?:bitbucket|BITBUCKET)[_\\s]?(?:app_?password|APP_?PASSWORD)[=:\\s\"']+([A-Za-z0-9]{32})"
description = "Bitbucket app password with context anchor"
group = 1

[[detector.companions]]
name = "username"
regex = "(?:bitbucket|BITBUCKET)[_\\s]?(?:user(?:name)?|USER(?:NAME)?)[=:\\s\"']+([A-Za-z0-9._-]+)"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.bitbucket.org/2.0/user"
allowed_domains = ["api.bitbucket.org"]

[detector.verify.auth]
type = "basic"
username = "companion.username"
password = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "bitbucket_app_password=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
test_negative = "BITBUCKET_APP_PASSWORD=short"
