# Docs: https://docs.newrelic.com/docs/apis/intro-apis/new-relic-api-keys/
# Format: NRAK- prefix followed by 27 uppercase alphanumeric characters
# Verify: GET request to New Relic API /users.json with Api-Key header
# Prefix: NRAK-

[detector]
id = "newrelic-user-api-key"
name = "New Relic User API Key"
service = "newrelic"
severity = "critical"
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.12
keywords = ["NRAK-"]

[[detector.patterns]]
regex = 'NRAK-[A-Z0-9]{27}'
description = "New Relic user API key (NRAK- prefix)"

[detector.verify]
method = "GET"
url = "https://api.newrelic.com/v2/users.json"
allowed_domains = ["api.newrelic.com"]

[detector.verify.auth]
type = "header"
name = "Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "NRAK-2EYOINJXROC0URJH7T52XQYNDJX"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
