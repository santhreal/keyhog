# Docs: https://api.aweber.com/
# Format: OAuth 2.0 client ID and client secret for app authentication
# Verify: POST https://auth.aweber.com/oauth2/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "aweber-api-credentials"
name = "AWeber API Credentials"
service = "aweber"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "client_id", "client_secret", "access_token" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["aweber", "AWEBER"]

[[detector.patterns]]
regex = '''\b(?:AWEBER|aweber)[_\-\s]*(?:CLIENT|client)?[_\-\s]*(?:ID|id)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "AWeber OAuth Client ID"
group = 1

[[detector.patterns]]
regex = '''\b(?:AWEBER|aweber)[_\-\s]*(?:CLIENT|client)?[_\-\s]*(?:SECRET|secret)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "AWeber OAuth Client Secret"
group = 1

[[detector.patterns]]
regex = '''\b(?:AWEBER|aweber)[_\-\s]*(?:ACCESS|access)?[_\-\s]*(?:TOKEN|token)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "AWeber Access Token"
group = 1

[[detector.patterns]]
regex = '''\b(?:AWEBER|aweber)[_\-\s]*(?:CONSUMER|consumer)?[_\-\s]*(?:KEY|key)[=:\s"'']+([a-zA-Z0-9]{20,})'''
description = "AWeber Legacy Consumer Key"
group = 1

[[detector.tests]]
test_positive = "AWEBER_CLIENT_ID Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
test_negative = "AWEBER_CLIENT_ID short"
