# Docs: https://docs.aws.amazon.com/bedrock/latest/userguide/api-keys.html
# Format: long-term key, literal prefix `ABSK` + the deterministic base64
#         header `QmVkcm9ja0FQSUtleS` (the head of base64("BedrockAPIKey…"),
#         which makes the 22-char anchor effectively unique), followed by a
#         base64 body; 132 chars total (110-char body after the anchor).
#         AWS's own detection regex anchors on `ABSKQmVkcm9ja0FQSUtleS`
#         followed by `[A-Za-z0-9+/]+={0,2}`. Short-term keys
#         (`bedrock-api-key-` + presigned URL) are ephemeral and their body is
#         NOT authoritatively bounded, so they are deliberately NOT shipped
#         here (soundness over reach (a guessed shape would FP)).
# Verify: Bedrock bearer credential (`Authorization: Bearer <key>` /
#         `AWS_BEARER_TOKEN_BEDROCK`); no standalone checksum.
# Prefix: ABSK
# Source: Wiz (a-new-type-of-long-lived-key-on-aws-bedrock-api-keys), AWS docs,
#         GitHub Secret Scanning partner pattern (Aug 2025).

[detector]
id = "aws-bedrock-api-key"
name = "AWS Bedrock API Key"
service = "aws"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
# Defensive floor: the 22-char fixed anchor dilutes entropy scoring, but the
# anchor is itself the precision guarantee (it encodes "BedrockAPIKey"), so a
# low self-declared floor preserves recall without risking false positives.
min_confidence = 0.2
keywords = ["ABSK", "bedrock", "bedrock-api-key", "AWS_BEARER_TOKEN_BEDROCK"]

[[detector.patterns]]
# Long-term Bedrock API key: `ABSK` + `QmVkcm9ja0FQSUtleS` header + base64
# body, 132 chars total. Body bounded to {100,130}+padding so the compiled
# NFA stays linear (AWS's published form uses an unbounded `+`).
regex = 'ABSKQmVkcm9ja0FQSUtleS[A-Za-z0-9+/]{100,130}={0,2}'
description = "AWS Bedrock long-term API key (ABSK prefix, BedrockAPIKey anchor, 132 chars)"

[[detector.tests]]
test_positive = "ABSKQmVkcm9ja0FQSUtleSYGcEYmTIBr6ysnXHravYjroDShigIQLS0PNHDWjrpil9o3qRwpbzFl0vePrls1cDN8QvUdbqJwNSlzq23meO5ACW3zsuzeDQgwLd92dO3gFCPF"
test_negative = "ABSK_not_a_bedrock_key_missing_the_base64_anchor_value_here"
