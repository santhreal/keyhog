# Docs: https://developers.expediagroup.com/xap-apis/api/integration-guide/authentication-and-authorization
# Format: XAP API Key and Authorization string (Base64 encoded)
# Verify: GET /xap/pricing/v1/hotels with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "expedia-api-credentials"
name = "Expedia API Credentials"
service = "expedia"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
# "x-api-key" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["EXPEDIA_API_KEY", "EXPEDIA", "expedia"]

[[detector.patterns]]
regex = '''(?:EXPEDIA|expedia)[_\-\s]*(?:API_KEY|api_key|KEY|key)[=:\s"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Expedia XAP API key UUID format"
group = 1

[[detector.patterns]]
regex = '''(?:EXPEDIA|expedia)[_\-\s]*(?:API_KEY|api_key|KEY|key)[=:\s"'']+([A-Za-z0-9_-]{20,50})'''
description = "Expedia API key generic format"
group = 1

[detector.verify]
method = "GET"
url = "https://api.expediagroup.com/xap/pricing/v1/hotels"
allowed_domains = ["api.expediagroup.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Basic {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "EXPEDIA_API_KEY=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "expedia_api_key=short"
