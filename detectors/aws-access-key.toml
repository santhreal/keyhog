# Docs: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_identifiers.html
# Format: AKIA or ASIA prefix followed by 16 uppercase alphanumeric characters
# Verify: GET /?Action=GetCallerIdentity with AWS Signature V4
# Prefix: AKIA or ASIA

[detector]
id = "aws-access-key"
name = "AWS Access Key"
service = "aws"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["AKIA", "ASIA"]
simdsieve_prefixes = ["AKIA", "ASIA"]

# Credential shape: an AWS access key ID is EXACTLY 20 bytes (AKIA/ASIA + 16).
# A candidate of any other length is not a valid key id and is suppressed by the
# shape gate. Per-detector (DetectorSpec::credential_shape; was the centralized
# rules/detector-credential-shapes.toml list).
[detector.credential_shape]
exact_length = 20

[[detector.patterns]]
# `(?-i)` forces case-sensitive matching (keyhog compiles every regex
# case-insensitive by default). AKIA/ASIA ids are ALWAYS uppercase; without
# this the lowercase look-alike `Akiaqylpmn…` (a doc/test placeholder) matches
# and surfaces a false positive.
#
# Trailing `\b` right-boundary: an AWS access key ID is EXACTLY 20 chars
# (AKIA/ASIA + 16). A longer contiguous `[0-9A-Z]` run is not a valid key, so
# the regex must fail closed instead of reporting the 20-char prefix, the same
# self-delimiting-token contract as github-classic-pat / twilio-auth-token. This
# also aligns the whole-text extraction path with the simdsieve hot path, whose
# candidate validator already dropped overlong runs via its word-char check.
# Single-quoted (literal) so `\b` reaches the regex engine intact, a
# double-quoted TOML string would decode `\b` as a backspace byte.
regex = '(?-i)(AKIA|ASIA)[0-9A-Z]{16}\b'
description = "AWS access key ID"

# NOT marked `required`: a leaked AKIA on its own is still a reportable
# finding. When the secret isn't co-located, verification correctly
# downgrades to "unverified" but the match still surfaces - partial leaks
# are exactly what an attacker pivots on.
[[detector.companions]]
regex = "(?i:AWS[_-]?SECRET[_-]?ACCESS[_-]?KEY|SECRET[_-]?KEY|AWS[_-]?SECRET(?:[_-]?KEY)?)[=:\\s\"'']+([0-9a-zA-Z/+=]{40})"
within_lines = 5
name = "secret_key"

[[detector.companions]]
# Config/header field casing is not part of the session-token value. Fold only
# the anchor so the base64 credential body retains its detector-owned alphabet.
regex = "(?i:AWS[_-]?SESSION[_-]?TOKEN|X-Amz-Security-Token)[=:\\s\"'']+([A-Za-z0-9/+=]{80,})"
within_lines = 5
name = "session_token"

[detector.verify]
method = "GET"
url = "https://sts.amazonaws.com/?Action=GetCallerIdentity&Version=2011-06-15"
allowed_domains = ["sts.amazonaws.com"]

[detector.verify.auth]
type = "aws_v4"
access_key = "match"
secret_key = "companion.secret_key"
session_token = "companion.session_token"
region = "us-east-1"
service = "sts"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AKIAQYLPMN5HFIQR7XYA"
test_negative = "AKIA tag in a sentence with spaces"
