# Docs: https://developers.notion.com/reference/authentication
# Format: Internal integration tokens - legacy 'secret_' prefix or current 'ntn_' prefix followed by 43-50 alphanumeric characters
# Verify: Bearer token sent to api.notion.com/v1/search endpoint, returns 200 on success
# Prefix: secret_, ntn_

[detector]
id = "notion-integration-token"
name = "Notion Integration Token"
service = "notion"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["secret_", "ntn_"]

[[detector.patterns]]
regex = 'secret_[a-zA-Z0-9]{43,50}'
description = "Notion internal integration token (secret_ prefix - legacy format, 43-50 chars)"

[[detector.patterns]]
regex = 'ntn_[a-zA-Z0-9]{43,50}'
description = "Notion internal integration token (ntn_ prefix - current format, 43-50 chars)"

[detector.verify]
method = "POST"
url = "https://api.notion.com/v1/search"
allowed_domains = ["api.notion.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "results"
json_path = "$.results"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "ntn_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpRm"
test_negative = "ntn_short"
