# Docs: https://www.rome2rio.com/documentation/
# Format: 32-64 character alphanumeric string with no prefix
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "rome2rio-api-key"
name = "Rome2Rio API Key"
service = "rome2rio"
severity = "low"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["ROME2RIO", "rome2rio", "R2R", "r2r", "ROME2RIO_API_KEY"]

[[detector.patterns]]
regex = "(?:ROME2RIO|rome2rio|R2R_API_KEY|r2r_api_key)[=:\\s\"'']+([A-Za-z0-9]{32,64})"
description = "Rome2Rio API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:rome2rio|Rome2rio|Rome2Rio)[=:\\s\"'']+([A-Za-z0-9]{32,64})"
description = "Rome2Rio key generic context"
group = 1

[[detector.tests]]
test_positive = "ROME2RIO=EQyfbMZcdFc6SF9DRRkxIwJyyING7kfZ5GzIprLv"
test_negative = "ROME2RIO=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
