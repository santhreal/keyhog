# Docs: https://docs.opensea.io/reference/api-keys
# Format: 32+ character alphanumeric string passed in X-API-Key header
# Verify: GET /api/v1/collections with X-API-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "opensea-api-key"
name = "OpenSea API Key"
service = "opensea"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["opensea", "OPENSEA_API_KEY"]

[[detector.patterns]]
regex = "(?:opensea|OPENSEA)[\\s]*[=:][\\s]*[\"'']+([a-zA-Z0-9_-]{32,})[\"'']+"
description = "OpenSea API key in assignment context"
group = 1

[[detector.patterns]]
regex = "(?is)api\\.opensea\\.io.{0,256}x[_\\-\\s]?api[_\\-\\s]?key[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
required_literals = ["api.opensea.io"]
description = "OpenSea API key header following the OpenSea API endpoint"
group = 1

[[detector.patterns]]
regex = "(?is)x[_\\-\\s]?api[_\\-\\s]?key[=:\\s\"'']+([a-zA-Z0-9_-]{32,}).{0,256}api\\.opensea\\.io"
required_literals = ["api.opensea.io"]
description = "OpenSea API key header preceding the OpenSea API endpoint"
group = 1

[[detector.tests]]
test_positive = "opensea=\"2sIuLPADN-nQyiY2sVUsxowxpKZUoKKW\""
test_negative = "opensea=\"YOUR_API_KEY_HERE_PLACEHOLDER_VALUE\""

[[detector.tests]]
test_positive = "https://api.opensea.io/api/v2/collections\nX-API-KEY: 2sIuLPADN-nQyiY2sVUsxowxpKZUoKKW"
test_negative = "X-API-KEY: 2sIuLPADN-nQyiY2sVUsxowxpKZUoKKW"
