# Docs: https://developers.cloudflare.com/d1/
# Format: Cloudflare D1 uses API tokens (40-char alphanumeric) and database IDs (UUID format)
# Verify: GET /client/v4/user/tokens/verify with Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "cloudflare-d1-credentials"
name = "Cloudflare D1 Credentials"
service = "cloudflare"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CF_D1_API_TOKEN", "CLOUDFLARE_D1", "D1_DATABASE_ID", "D1_TOKEN"]

[[detector.patterns]]
regex = '''(?:CF_D1_API_TOKEN|CLOUDFLARE_D1[_\-\s]*TOKEN|D1[_\-\s]*TOKEN)[=:\s"'']+([a-zA-Z0-9_-]{40,})'''
required_literals = ["TOKEN"]
description = "Cloudflare D1 API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:D1_DATABASE_ID)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Cloudflare D1 database ID (UUID format)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.cloudflare.com/client/v4/user/tokens/verify"
allowed_domains = ["api.cloudflare.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "CF_D1_API_TOKEN=AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
test_negative = "CF_D1_API_TOKEN=short"
