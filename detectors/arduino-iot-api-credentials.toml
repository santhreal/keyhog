# Docs: https://docs.arduino.cc/arduino-cloud/api/arduino-iot-api/
# Format: OAuth2 client credentials - client_id and client_secret pair
# Verify: POST to /iot/v1/clients/token with client_credentials grant type
# Prefix: none (requires context anchoring)

[detector]
id = "arduino-iot-api-credentials"
name = "Arduino IoT Cloud API Credentials"
service = "arduino"
severity = "high"
# "client_id", "client_secret" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["arduino", "api2.arduino.cc"]

[[detector.patterns]]
regex = "(?:arduino|ARDUINO)[._-]?(?:CLIENT[_-]?ID|client[_-]?id)[=:\\s\"'']+([a-f0-9]{32,40})"
description = "Arduino IoT Cloud client ID"
group = 1

[[detector.patterns]]
regex = "(?:arduino|ARDUINO)[._-]?(?:CLIENT[_-]?SECRET|client[_-]?secret)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Arduino IoT Cloud client secret"
group = 1

[[detector.tests]]
test_positive = "ARDUINO_CLIENT_ID=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "ARDUINO_CLIENT_ID=short"
