# Docs: https://docs.together.ai/docs/get-started
# Format: 64 character hex string (no unique prefix)
# Verify: GET /v1/models with Bearer token returns 200 if valid
# Prefix: none (64 character hex, requires keyword context)

[detector]
id = "togetherai-api-key"
name = "Together AI API Key"
service = "togetherai"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.3
keywords = ["together", "togetherai", "TOGETHER_API_KEY", "TOGETHERAI_API_KEY"]

[[detector.patterns]]
regex = "(?i)together(?:ai)?[_.-]?(?:api[_.-]?)?key[=:\\s\"']+([a-f0-9]{64})"
description = "Together AI API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)together(?:ai)?\\s*[=:]\\s*[\"']?([a-f0-9]{64})[\"']?"
description = "Together AI API key without explicit `key` suffix (bare keyword =)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.together.xyz/v1/models"
allowed_domains = ["api.together.xyz"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "TOGETHER_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "TOGETHER_API_KEY=short"
