# Docs: https://docs.netlify.com/configure-builds/build-hooks/
# Format: URL containing UUID at https://api.netlify.com/build_hooks/{uuid}
# Verify: POST to hook URL triggers build (no auth required for POST)
# Prefix: https://api.netlify.com/build_hooks/

[detector]
id = "netlify-build-hook"
name = "Netlify Build Hook"
service = "netlify"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["netlify", "build_hooks"]

[[detector.patterns]]
regex = "https://api\\.netlify\\.com/build_hooks/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
description = "Netlify build hook URL with UUID"

[[detector.patterns]]
regex = "(?:NETLIFY|netlify)[_\\-\\s]*(?:BUILD|build)[_\\-\\s]*(?:HOOK|hook)[_\\-\\s]*(?:URL|url)?[=:\\s\"'\\']+https://api\\.netlify\\.com/build_hooks/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Netlify build hook URL with context anchor"
group = 1

[[detector.tests]]
test_positive = "https://api.netlify.com/build_hooks/f6b93ba3-06a8-5cd8-44c8-76c1a0a29b9d"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
