# Docs: https://stytch.com/docs/api-reference/magic-links/send
# Format: public-token- prefix followed by 36 alphanumeric characters
# Verify: no public verification endpoint (client-side token)
# Prefix: public-token-

[detector]
id = "stytch-magic-link-credentials"
name = "Stytch Magic Link Public Token"
service = "stytch"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["public-token-"]

[[detector.patterns]]
regex = 'public-token-[a-zA-Z0-9]{36}'
description = "Stytch public token for Magic Link (public-token- prefix)"

[[detector.tests]]
test_positive = "public-token-nn0jNL1VcvphMW3FPn9XgheHCSC4NgTYnDOA"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
