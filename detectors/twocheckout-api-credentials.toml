# Docs: https://verifone.com/docs/developer/api-reference
# Format: Merchant Code (numeric) and Secret Key (alphanumeric)
# Verify: POST to 2Checkout API with signature-based authentication
# Prefix: none (requires context anchoring)

[detector]
id = "twocheckout-api-credentials"
name = "2Checkout/Verifone API Credentials"
service = "twocheckout"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["2CHECKOUT", "TWOCHECKOUT", "verifone", "VERIFONE", "MERCHANT_CODE", "SECRET_KEY", "2CO"]

[[detector.patterns]]
regex = "(?:2CHECKOUT|TWOCHECKOUT|2checkout|twocheckout)[._-]?(?:MERCHANT|merchant)?[._-]?(?:CODE|code)?[=:\\s\"'']+(\\d{8,12})"
description = "2Checkout Merchant Code with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:VERIFONE|verifone)[._-]?(?:MERCHANT|merchant)?[._-]?(?:CODE|code|ID|id)?[=:\\s\"'']+(\\d{8,12})"
description = "Verifone Merchant Code with context anchor"
group = 1

[[detector.companions]]
name = "twocheckout_companion"
regex = "(?m)^TWOCHECKOUTMERCHANT(?:[=:\\s]|$)"
within_lines = 5

[[detector.tests]]
test_positive = "twocheckoutmerchant='=:   '366424303731"
test_negative = "twocheckoutmerchant='=:   'YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
