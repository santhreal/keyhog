# Docs: https://docs.threatconnect.com/en/latest/rest_api/quick_start.html
# Format: Access ID (20 digits) and Secret Key (base64 HMAC) or API token
# Verify: GET /v3/indicators with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "threatconnect-api-key"
name = "ThreatConnect API Key"
service = "threatconnect"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["threatconnect", "THREATCONNECT", "TC_TOKEN", "Access ID", "Secret Key"]

[[detector.patterns]]
regex = '''(?:threatconnect|THREATCONNECT)[_\-\s]*(?:api[_\-\s]*key|token|access[_\-\s]*id)[=:\s"'']+(\d{20})'''
description = "ThreatConnect Access ID with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:threatconnect|THREATCONNECT)[_\-\s]*secret[=:\s"'']+([A-Za-z0-9+/]{40,80}=?)'''
description = "ThreatConnect Secret Key with context anchor"
group = 1

[[detector.tests]]
test_positive = "THREATCONNECT-    -   token :  : 05166866232440590975"
test_negative = "THREATCONNECT-    -   token :  : YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
