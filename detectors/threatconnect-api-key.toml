# Docs: https://docs.threatconnect.com/en/latest/rest_api/quick_start.html
# Format: Access ID (20 digits) and Secret Key (base64 HMAC) or API token
# Verify: GET /v3/indicators with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "threatconnect-api-key"
name = "ThreatConnect API Key"
service = "threatconnect"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["threatconnect", "THREATCONNECT", "TC_TOKEN", "Access ID", "Secret Key"]

[[detector.patterns]]
regex = "(?:threatconnect|THREATCONNECT)[\\s_-]*(?:api[_-]?key|token|access[_-]?id)[=:\\s\"'']+(\\d{20})"
description = "ThreatConnect Access ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:threatconnect|THREATCONNECT)[\\s_-]*secret[=:\\s\"'']+([A-Za-z0-9+/]{40,80}=?)"
description = "ThreatConnect Secret Key with context anchor"
group = 1

[[detector.tests]]
test_positive = "THREATCONNECT-    -   token :  : 05166866232440590975"
test_negative = "THREATCONNECT-    -   token :  : YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
