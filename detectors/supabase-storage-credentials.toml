# Docs: https://supabase.com/docs/guides/storage
# Format: JWT token with storage API endpoint URL
# Verify: GET /storage/v1/bucket with Bearer token returns 200
# Prefix: service-owned Storage URLs; JWT keys require context anchoring

[detector]
id = "supabase-storage-credentials"
name = "Supabase Storage Credentials"
service = "supabase"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["SUPABASE_STORAGE_URL", "SUPABASE_STORAGE_KEY", "storage.supabase.co"]

[[detector.patterns]]
regex = "SUPABASE_STORAGE_URL[=:\\s\"'']+(https?://[a-z0-9-]+\\.supabase\\.co[:/]storage[/v0-9]*)"
description = "Supabase Storage API URL with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:^|[^A-Za-z0-9_])(https?://[a-z0-9-]+\\.supabase\\.co[:/]storage[/v0-9]*)(?:$|[^A-Za-z0-9_/])"
description = "Bare Supabase Storage API URL"
group = 1

[[detector.patterns]]
regex = "SUPABASE_STORAGE_KEY[=:\\s\"'']+(eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*)"
description = "Supabase Storage JWT key with context anchor"
group = 1

[[detector.patterns]]
regex = "storage\\.supabase\\.co[/:]v1"
description = "Supabase Storage v1 API endpoint direct match"

[[detector.tests]]
test_positive = "SUPABASE_STORAGE_URL=https://kj6shbgqc5b-yh9f14qphbef4toqnydt3md4k-h16s40wfz9aqcukpb4seba53rhc298ircp621odxitx4wa6kvttwvh.supabase.co/storage45289v31847774vvv7v298"
test_negative = "SUPABASE_STORAGE_URL=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
