# Docs: https://developers.klaviyo.com/en/reference/api_overview
# Format: pk_ prefix followed by alphanumeric string for public API keys, sk_ for private
# Verify: GET /api/profiles/ with Authorization header returns 200 if valid
# Prefix: pk_ (public) or sk_ (private)

[detector]
id = "klaviyo-api-key"
name = "Klaviyo API Key"
service = "klaviyo"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["pk_", "sk_", "KLAVIYO", "klaviyo", "KLAVIYO_API_KEY"]

[[detector.patterns]]
regex = "(?-i)\\bpk_[a-zA-Z0-9]{30,50}"
description = "Klaviyo public API key (pk_ prefix)"

[[detector.patterns]]
regex = "(?-i)\\bsk_[a-zA-Z0-9]{30,50}"
description = "Klaviyo private API key (sk_ prefix)"

[[detector.patterns]]
regex = "(?:KLAVIYO|klaviyo)[._-]?(?:API|api)?[._-]?(?:KEY|key)[=:\\s\"'']+(pk_[a-zA-Z0-9]{30,50})"
description = "Klaviyo public API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:KLAVIYO|klaviyo)[._-]?(?:API|api)?[._-]?(?:KEY|key)[=:\\s\"'']+(sk_[a-zA-Z0-9]{30,50})"
description = "Klaviyo private API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://a.klaviyo.com/api/profiles/"
allowed_domains = ["a.klaviyo.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Klaviyo-API-Key {{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "data"
json_path = "$.data"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "pk_a4XfZQFqVQ39GLNmbBMF2LMaiwZjZoEb"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
