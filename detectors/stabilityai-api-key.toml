# Docs: https://platform.stability.ai/docs/api-reference
# Format: sk- followed by 48 alphanumeric characters
# Verify: GET to api.stability.ai/v1/user/balance with Bearer token
# Prefix: sk-

[detector]
id = "stabilityai-api-key"
name = "Stability AI API Key"
service = "stabilityai"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["sk-", "stability", "stabilityai"]

# Anchor `sk-` to start-of-string or non-identifier byte. Unanchored
# the prefix fires inside ELF binary content (metasploitable3 sinatra
# aws/loader, 2 FPs in dogfood 2026-05-26) and Caesar-decoded text.
[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(sk-[a-zA-Z0-9]{48})'
description = "Stability AI API key (sk- prefix, anchored)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.stability.ai/v1/user/balance"
allowed_domains = ["api.stability.ai"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "sk-OMnteYvYJjTJJnaDUVtiV1BAzmBQ2oOu18uWz8HSrx419wAP"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
