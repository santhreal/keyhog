# Docs: https://fusionauth.io/docs/lifecycle/authenticate-users/oauth/
# Format: UUID-like API key
# Verify: GET /api/user with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "fusionauth-api-key"
name = "FusionAuth API Key"
service = "fusionauth"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["FUSIONAUTH_API_KEY", "FUSIONAUTH_KEY", "fusionauth"]

[[detector.patterns]]
regex = '''(?:FUSIONAUTH[_\-\s]*API[_\-\s]*KEY|FUSIONAUTH[_\-\s]*KEY)[=:\s"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "FusionAuth API key with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization:\\s*[Bb]earer\\s+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})[^\\n]*fusionauth"
description = "FusionAuth API key in Authorization header (same-line fusionauth anchor; a bare Authorization header with any UUID is not service-attributable)"
group = 1

[[detector.tests]]
test_positive = "FUSIONAUTH_API_KEY=ce182726-b648-cd71-b829-85ccb18fb1e8"
test_negative = "FUSIONAUTH_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
