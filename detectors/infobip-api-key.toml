# Docs: https://www.infobip.com/docs/api/authentication
# Format: 32 hex characters with 4 hyphens (UUID-like), prefixed with "App " in Authorization header
# Verify: GET /account/1/balance with App {{api_key}} Authorization header
# Prefix: none (UUID format, requires context anchoring)

[detector]
id = "infobip-api-key"
name = "Infobip API Key"
service = "infobip"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
# "app" removed: an over-trigger (application/apple/happen/…) that no regex
# requires: the two patterns anchor on `infobip` and `Authorization` (both
# still keywords). The `(?:App|APP)?` in the auth regex is optional and gated by
# the `Authorization` trigger, not by an "app" keyword. Recall-neutral.
keywords = ["infobip", "INFOBIP", "authorization"]

[[detector.patterns]]
regex = '''(?:infobip|INFOBIP)[_.-]?(?:api|API)?[_.-]?(?:key|KEY)?[=:\s"\' ]+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Infobip API Key (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = '''Authorization[=:\s"\' ]+(?:App|APP)?\s+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Infobip API Key in Authorization header"
group = 1

[[detector.tests]]
test_positive = "infobip=521605cd-2e1a-7f93-dc93-62773b2dba23"
test_negative = "infobip=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
