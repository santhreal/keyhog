# Docs: https://docs.clickatell.com/archive/channels/sms-http-s-api-archived/using-the-http-api/
# Format: API Key for One API (alphanumeric string) or API ID + Username + Password for HTTP API
# Verify: POST /messages with Authorization: {{api_key}} header (One API)
# Prefix: none (requires context anchoring)

[detector]
id = "clickatell-api-key"
name = "Clickatell API Key"
service = "clickatell"
severity = "critical"
# "api_key" removed: over-broad generic prefilter the regex does NOT need — every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["clickatell", "CLICKATELL", "clickatell.com", "api_id"]

[[detector.patterns]]
regex = '''(?:clickatell|CLICKATELL)[_.-]?(?:api|API)?[_.-]?(?:key|KEY)?[=:\s"\' ]+([a-zA-Z0-9_-]{20,})'''
description = "Clickatell API Key with context anchor"
group = 1

# Defect #75: the original `Authorization[=:\s"\' ]+([a-zA-Z0-9_-]{20,})`
# was completely service-agnostic - anything in an HTTP Authorization
# header anywhere in any source tree would match (Rails Ruby files
# triggered it on `Authorization: 'ALLOWED_HOSTS_IN_DEVELOPMENT'`-shaped
# config). A Clickatell token has no distinguishing shape from any
# other bearer token in an Authorization header, so this rule has zero
# Clickatell-specific signal. Removing it; the keyword-anchored
# pattern above still catches the standard `CLICKATELL_API_KEY=xxx`
# form, which is the actual high-precision detection surface.

[[detector.patterns]]
regex = '''(?:clickatell|CLICKATELL)[_.-]?(?:api|API)?[_.-]?(?:id|ID)?[=:\s"\' ]+(\d{6,8})'''
description = "Clickatell API ID (6-8 digit number)"
group = 1

[detector.verify]
method = "GET"
url = "https://platform.clickatell.com/public-client/authenticate"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "CLICKATELL_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "CLICKATELL_API_KEY=Kp4Qx7Rm2Sn"
