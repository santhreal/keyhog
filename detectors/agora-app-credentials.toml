# Docs: https://docs.agora.io/en/agora-analytics/reference/agora-console-rest-api
# Format: App ID is a 32-character hex string, App Certificate is a 32-character hex string
# Verify: GET /dev/v1/projects with Basic auth (Customer ID + Customer Secret) returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "agora-app-credentials"
name = "Agora App ID and Certificate"
service = "agora"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["AGORA_APP_ID", "AGORA_APP_CERTIFICATE", "agora", "app_id", "app_certificate"]

[[detector.patterns]]
regex = "(?:\\bAGORA_APP_ID|\\bagora_app_id)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-f0-9]{32})[\"\\']?"
description = "Agora App ID (32 hex characters) with context anchor"
group = 1

# App Certificate is a companion to App ID
[[detector.companions]]
name = "agora_app_certificate"
regex = "(?:AGORA_APP_CERTIFICATE|agora_app_certificate|app_certificate|cert)[=:\\s\"'']+([a-f0-9]{32})"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.agora.io/dev/v1/projects"
allowed_domains = ["api.agora.io"]

[detector.verify.auth]
type = "basic"
# `password = "companion"` (no `.<name>`) silently resolved to the literal
# string "companion" via the resolve_field fallthrough. Reference the
# companion by name so basic_auth gets the App Certificate.
username = "match"
password = "companion.agora_app_certificate"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AGORA_APP_ID=39bd4eecd4534c9808f4df2988459df7"
test_negative = "AGORA_APP_ID=short"
