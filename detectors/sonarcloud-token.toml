# Docs: https://docs.sonarsource.com/sonarcloud/advanced-setup/web-api/
# Format: 40-character alphanumeric string (SHA-1 hash style)
# Verify: GET /api/measures/component with Authorization: Bearer header
# Prefix: none (40 char hex/alphanumeric, requires context anchoring)

[detector]
id = "sonarcloud-token"
name = "SonarCloud API Token"
service = "sonarcloud"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["SONARCLOUD", "sonarcloud.io", "SONAR_TOKEN", "SONAR_CLOUD_TOKEN"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [40] }]

[[detector.patterns]]
regex = "(?:SONAR|sonar)(?:_?CLOUD|_?cloud)?(?:_?TOKEN|_?token)?[=:\\s\"'']+([a-f0-9]{40})"
description = "SonarCloud API token with context anchor (40 hex characters)"
group = 1

[detector.verify]
method = "GET"
url = "https://sonarcloud.io/api/measures/component?component=test&metricKeys=ncloc"
allowed_domains = ["sonarcloud.io"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "SONAR=800f231fa32c35248b0ccb25668b8f4e691e9381"
test_negative = "SONAR=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
