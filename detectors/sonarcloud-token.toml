# Docs: https://docs.sonarsource.com/sonarcloud/advanced-setup/web-api/
# Format: 40-character alphanumeric string (SHA-1 hash style)
# Verify: GET /api/measures/component with Authorization: Bearer header
# Prefix: none (40 char hex/alphanumeric, requires context anchoring)

[detector]
id = "sonarcloud-token"
name = "SonarCloud API Token"
service = "sonarcloud"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["SONARCLOUD", "sonarcloud.io", "SONAR_TOKEN", "SONAR_CLOUD_TOKEN"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true

[[detector.patterns]]
regex = "(?:SONAR|sonar)(?:_?CLOUD|_?cloud)?(?:_?TOKEN|_?token)?[=:\\s\"'']+([a-f0-9]{40})"
description = "SonarCloud API token with context anchor (40 hex characters)"
group = 1

[detector.verify]
method = "GET"
url = "https://sonarcloud.io/api/measures/component?component=test&metricKeys=ncloc"
allowed_domains = ["sonarcloud.io"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "SONAR=800f231fa32c35248b0ccb25668b8f4e691e9381"
test_negative = "SONAR=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
