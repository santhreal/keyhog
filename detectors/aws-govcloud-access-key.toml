# Docs: https://docs.aws.amazon.com/govcloud-us/latest/UserGuide/using-govcloud-endpoints.html
# Format: AKIA or ASIA prefix followed by 16 uppercase alphanumeric characters (same format as commercial)
# Verify: GET /?Action=GetCallerIdentity with AWS Signature V4 to us-gov-west-1 endpoint
# Prefix: AKIA or ASIA

[detector]
id = "aws-govcloud-access-key"
name = "AWS GovCloud Access Key"
service = "aws-govcloud"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["AKIA", "ASIA", "govcloud", "us-gov-"]

[[detector.patterns]]
regex = '''(?:AWS[_\-\s]*GOVCLOUD|GOVCLOUD)[_\-\s]*(?:ACCESS[_\-\s]*KEY|KEY[_\-\s]*ID)[=:\s"'']+((?-i:(?:AKIA|ASIA)[0-9A-Z]{16}))\b'''
description = "AWS GovCloud access key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:AWS[_\-\s]*REGION|REGION)[=:\s"'']+(us-gov-[a-z]+-[0-9])'''
description = "AWS GovCloud region identifier"
group = 1

[[detector.companions]]
regex = '''(?i:AWS[_\-\s]*SECRET[_\-\s]*ACCESS[_\-\s]*KEY|SECRET[_\-\s]*KEY|AWS[_\-\s]*SECRET)[=:\s"'']+([0-9a-zA-Z/+=]{40})'''
within_lines = 5
name = "secret_key"

[[detector.companions]]
regex = '''(?i:AWS[_\-\s]*SESSION[_\-\s]*TOKEN|X-Amz-Security-Token)[=:\s"'']+([A-Za-z0-9/+=\-]{80,})'''
within_lines = 5
name = "session_token"

[detector.verify]
method = "GET"
url = "https://sts.us-gov-west-1.amazonaws.com/?Action=GetCallerIdentity&Version=2011-06-15"
allowed_domains = ["sts.us-gov-west-1.amazonaws.com"]

[detector.verify.auth]
type = "aws_v4"
access_key = "match"
secret_key = "companion.secret_key"
session_token = "companion.session_token"
region = "us-gov-west-1"
service = "sts"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AWS_GOVCLOUD_ACCESS_KEY=AKIAKPQXRMSNTBVWYZBN"
test_negative = "AWS_GOVCLOUD_ACCESS_KEY=akiakpqxrmsntbvwyzbn"
