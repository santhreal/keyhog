# Docs: https://marker.io/
# Format: API credentials for issue tracking integration
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "marker-io-credentials"
name = "Marker.io API Credentials"
service = "markerio"
severity = "medium"
keywords = ["MARKER_IO", "marker.io", "markerio", "MARKERIO"]

[[detector.patterns]]
regex = "(?:MARKER[_.-]?IO|marker[_.-]?io|MARKERIO)[_a-zA-Z0-9]*[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Marker.io API credential with context anchor"
group = 1

[[detector.tests]]
test_positive = "MARKERIO=dtxQEDX8Y5R6RgO9aPrm"
test_negative = "MARKERIO=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
