# Docs: https://docs.cypress.io/cloud/faq
# Format: GUID format (8-4-4-4-12 hex digits) used to authenticate recording to Cypress Cloud
# Verify: POST to Cypress Cloud recording API with key returns 200 if valid
# Prefix: none (UUID/GUID format, requires context keyword or companion detection)

[detector]
id = "cypress-record-key"
name = "Cypress Record Key"
service = "cypress"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CYPRESS_RECORD_KEY", "cypress_record_key", "record_key", "record-key", "--record --key"]

[[detector.patterns]]
regex = '''(?:CYPRESS_RECORD_KEY|cypress[_\-\s]*record[_\-\s]*key)[=:\s"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Cypress record key (GUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "--record(?:\\s+--key\\s+|\\s+-k\\s+)[\"']?([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Cypress record key in CLI command"
group = 1

[[detector.companions]]
name = "cypress-project-id"
regex = "(?:projectId|CYPRESS_PROJECT_ID)[=:\\s\"']+([a-zA-Z0-9]{6,})"
within_lines = 10

[[detector.tests]]
test_positive = "CYPRESS_RECORD_KEY=42136df0-709e-8c36-3ba2-01818f559a75"
test_negative = "cypress_record_key=not-a-uuid"
