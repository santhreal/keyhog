# Docs: https://docs.github.com/en/authentication
# Format: gho_ prefix followed by 36 alphanumeric characters
# Prefix: gho_

[detector]
id = "github-oauth-access-token"
name = "GitHub OAuth Access Token"
service = "github"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
validators = [{ type = "crc32-base62", prefixes = ["gho_"], entropy_len = 30, checksum_len = 6, reject_overlong = true, confidence_floor = 0.9 }]
keywords = ["gho_"]

[[detector.patterns]]
regex = 'gho_[A-Za-z0-9]{36}'
description = "GitHub OAuth Access Token (gho_ prefix)"

[detector.verify]
method = "GET"
url = "https://api.github.com/user"
allowed_domains = ["api.github.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[[detector.verify.headers]]
name = "User-Agent"
value = "keyhog-secret-scanner/{{version}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "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"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
