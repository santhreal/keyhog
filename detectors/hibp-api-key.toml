# Docs: https://haveibeenpwned.com/API/v3
# Format: 32-character hexadecimal string
# Verify: GET /api/v3/breachedaccount/test@example.com with hibp-api-key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "hibp-api-key"
name = "Have I Been Pwned API Key"
service = "hibp"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["hibp-api-key", "haveibeenpwned", "HIBP_API_KEY"]

[[detector.patterns]]
regex = "(?:hibp-api-key|HIBP_API_KEY|haveibeenpwned)[=:\\s\"'']+([a-f0-9]{32})"
description = "HIBP API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://haveibeenpwned.com/api/v3/breachedaccount/test@hibp-integration-tests.com"
allowed_domains = ["haveibeenpwned.com"]

[detector.verify.auth]
type = "header"
name = "hibp-api-key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "hibp-api-key=1d8744f744361c8c3e27549b337d5863"
test_negative = "hibp-api-key=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
