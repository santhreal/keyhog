# Docs: https://plaid.com/docs/api/
# Format: 24-character hexadecimal string
# Verify: POST /item/public_token/exchange with PLAID-CLIENT-ID header
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "plaid-client-id"
name = "Plaid Client ID"
service = "plaid"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["PLAID_CLIENT_ID", "plaid_client_id", "PLAID-CLIENT-ID", "client_id"]

[[detector.patterns]]
regex = "(?:PLAID|plaid)[._-]?(?:CLIENT|client)?[._-]?(?:ID|id)?[=:\\s\"']+([a-f0-9]{24})"
description = "Plaid API client ID with context anchor"
group = 1

[[detector.companions]]
name = "plaid_secret"
regex = "(?:PLAID|plaid)[._-]?(?:SECRET|secret)[=:\\s\"']+([a-f0-9]{30,40})"
within_lines = 5

[[detector.tests]]
test_positive = "PLAID=c1517b308bdbe0ebd278e1b7"
test_negative = "PLAID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
