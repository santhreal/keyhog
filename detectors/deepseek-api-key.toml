# Docs: https://api-docs.deepseek.com/
# Format: sk- prefix followed by 32 hexadecimal characters
# Verify: HTTP GET to /v1/models with Bearer token authentication
# Prefix: sk-

[detector]
id = "deepseek-api-key"
name = "DeepSeek API Key"
service = "deepseek"
severity = "critical"
keywords = ["sk-", "deepseek"]

[[detector.patterns]]
regex = 'sk-[a-f0-9]{32}\b'
description = "DeepSeek API key (sk- prefix with 32 hex chars)"

[detector.verify]
method = "GET"
url = "https://api.deepseek.com/v1/models"
allowed_domains = ["api.deepseek.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "sk-7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "sk-short"
