# Docs: https://developer.zendesk.com/api-reference/live-chat/introduction/
# Format: OAuth access token (Bearer token)
# Verify: GET /api/v2/chat/agents/me with Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "zendesk-chat-credentials"
name = "Zendesk Chat Access Token"
service = "zendesk"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["ZENDESK_CHAT", "zendesk_chat", "zopim", "chat_api"]

[[detector.patterns]]
regex = '''(?i)(?:ZENDESK[_\-\s]*CHAT|ZOPIM|CHAT[_\-\s]*API)[_\-\s]*(?:TOKEN|KEY|SECRET|ACCESS[_\-\s]*TOKEN)[=:\s"'']+([a-f0-9]{32,64})'''
description = "Zendesk Chat OAuth access token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:zendesk\\.com/api/v2/chat|zopim\\.com/api/v2)[^\\n\"'']*[=:\\s\"'']+([a-f0-9]{32,})"
description = "Zendesk Chat API endpoint with embedded token"
group = 1

[detector.verify]
method = "GET"
url = "https://www.zopim.com/api/v2/agents/me"
allowed_domains = ["www.zopim.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ZOPIMSECRET=a8ad2fc7e8a7d712303a5288a071d1c7"
test_negative = "ZOPIMSECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
