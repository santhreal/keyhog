# Docs: https://opencagedata.com/api
# Format: 32 character hexadecimal string
# Verify: GET /geocode/v1/json with key parameter
# Prefix: none (requires context anchoring)

[detector]
id = "opencage-api-key"
name = "OpenCage API Key"
service = "opencage"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["OPENCAGE_API_KEY", "opencage.api.key", "opencage_api_key"]

[[detector.patterns]]
regex = "(?:OPENCAGE[_-]?API[_-]?KEY|opencage[_-]?api[_-]?key|opencage\\.api\\.key)[=:\\s\"'']+([a-f0-9]{32})"
description = "OpenCage API key with context anchor (32 hex chars)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.opencagedata.com/geocode/v1/json"
allowed_domains = ["api.opencagedata.com"]

[detector.verify.auth]
type = "query"
param = "key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "OPENCAGE_API_KEY=5fe803b283c6a2636d7b471b25b406ab"
test_negative = "OPENCAGE_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
