# Docs: https://docs.brightdata.com/api-reference/authentication
# Format: API key (64-char hex) OR username:password for proxy auth
# Verify: GET /zone with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "brightdata-credentials"
name = "Bright Data Credentials"
service = "brightdata"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["brightdata", "BRIGHTDATA", "bright_data", "brd-customer"]

[[detector.patterns]]
regex = "(?:brightdata|BRIGHTDATA|BRIGHT_DATA)[=:\\s\"'']+([A-Fa-f0-9]{64})(?:[^A-Fa-f0-9]|$)"
description = "Bright Data API key (64 hex chars) with context anchor and trailing hex boundary"
group = 1

[[detector.patterns]]
regex = "brd-customer-[a-zA-Z0-9_-]+-zone-[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+"
description = "Bright Data proxy username:password format"

[detector.verify]
method = "GET"
url = "https://api.brightdata.com/zone"
allowed_domains = ["api.brightdata.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "brightdata=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d3a5e9f1b7c4d3a5e9f1b7c4d3a5e9f1b"
test_negative = "brightdata=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d3a5e9f1b7c4d3a5e9f1b7c4d3a5e9f1"
