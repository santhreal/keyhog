# Docs: https://www.runatlantis.io/docs/
# Format: GitHub/GitLab/Bitbucket token + webhook secret (random string > 24 chars)
# Verify: no public verification endpoint (self-hosted Atlantis)
# Prefix: glpat- (GitLab), ghp_ (GitHub), or none

[detector]
id = "atlantis-credentials"
name = "Atlantis Webhook and VCS Credentials"
service = "atlantis"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
validators = [
  { type = "crc32-base62", prefixes = ["ghp_"], entropy_len = 30, checksum_len = 6, reject_overlong = true, confidence_floor = 0.9 },
  { type = "pattern-shape", prefixes = ["glpat-"], allow_overlong = true },
]
keywords = ["ATLANTIS_GH_TOKEN", "ATLANTIS_GL_TOKEN", "ATLANTIS_WEBHOOK_SECRET", "ATLANTIS_SECRET", "atlantis"]

[[detector.patterns]]
regex = "(?:ATLANTIS_GH_TOKEN|ATLANTIS_GITHUB_TOKEN)[=:\\s\"'']+(ghp_[a-zA-Z0-9]{36})"
description = "Atlantis GitHub Personal Access Token"
group = 1

[[detector.patterns]]
regex = "(?:ATLANTIS_GL_TOKEN|ATLANTIS_GITLAB_TOKEN)[=:\\s\"'']+(glpat-[a-zA-Z0-9\\-_]{20,})"
description = "Atlantis GitLab Personal Access Token"
group = 1

[[detector.patterns]]
regex = "(?:ATLANTIS_SECRET|ATLANTIS_WEBHOOK_SECRET)[=:\\s\"'']+([a-zA-Z0-9]{24,})"
description = "Atlantis webhook secret"
group = 1

[[detector.patterns]]
regex = "-gh-webhook-secret[=:\\s\"'']+([a-zA-Z0-9]{24,})"
description = "Atlantis GitHub webhook secret in CLI"
group = 1

[[detector.patterns]]
regex = "-gitlab-webhook-secret[=:\\s\"'']+([a-zA-Z0-9]{24,})"
description = "Atlantis GitLab webhook secret in CLI"
group = 1

[[detector.tests]]
test_positive = "ATLANTIS_GH_TOKEN=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"
test_negative = "ATLANTIS_GH_TOKEN=ghp_short"
