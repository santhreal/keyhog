# Docs: https://learn.microsoft.com/en-us/azure/storage/common/storage-sas-overview
# Format: Query string starting with ?sv= containing signature and expiry
# Verify: GET request to blob URL with SAS token returns 200
# Prefix: ?sv= (SAS version parameter)

[detector]
id = "azure-blob-sas-token"
name = "Azure Blob SAS Token"
service = "azure"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# "se=", "sp=", "srt=" removed: over-broad SAS query-param prefilters (se= fires on
# case=/response=, sp= on resp=/disp=) that no regex references. Every matchable SAS
# token carries sv= AND sig= (pattern 1 requires both); the connection-string and
# env-var forms carry blob.core.windows.net / sv=. So sv=/sig=/host cover both the
# trigger and the keyword_nearby signal (the three params are redundant. Recall-neutral).
keywords = ["sig=", "sv=", "blob.core.windows.net"]

[[detector.patterns]]
regex = "(\\?sv=\\d{4}-\\d{2}-\\d{2}&[^\\s\"'']*sig=[a-zA-Z0-9%]{20,})"
description = "Azure Blob SAS token query string with signature"
group = 1

[[detector.patterns]]
regex = "BlobEndpoint[=:\\s\"'']+https?://[^\\s\"'']+;[^\\s\"'']*SharedAccessSignature[=:\\s\"'']+([^\\s\"'']+)"
description = "Azure Blob connection string with embedded SAS"
group = 1

[[detector.patterns]]
regex = "AZURE_STORAGE_SAS_TOKEN[=:\\s\"'']+(\\?sv=[^\\s\"'']+)"
description = "Azure Storage SAS token environment variable"
group = 1

# NOTE: live verification disabled. The match is a query string
# (e.g. `?sv=...&sig=...`), so `https://{{match}}` produced a
# malformed URL with no host. kimi-wave3 §1.

[[detector.tests]]
test_positive = "?sv=2023-08-03&ss=b&srt=co&sp=rwdlacx&se=2030-12-31T00:00:00Z&st=2023-01-01T00:00:00Z&spr=https&sig=AbCdEfGhIjKlMnOpQrStUvWxYz1234567890%2F%2BabCD%3D"
test_negative = "?sv=2023-08-03"
