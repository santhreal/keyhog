# Docs: https://docs.slack.dev/authentication/tokens/ (app-level tokens / Socket Mode)
# Format: xapp-{digit}-{A0-Z0-9 app id}-{digits}-{lowercase hex}
#         e.g. xapp-1-A012B3CDEFG-1234567890123-abc...hex
# Verify: POST https://slack.com/api/apps.connections.open with Bearer token.
# Prefix: xapp-

[detector]
id = "slack-app-token"
name = "Slack App-Level Token"
service = "slack"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
# xapp- is a distinctive 4-segment vendor prefix, but it is NOT in the
# scanner's KNOWN_PREFIXES floor list (which carries xoxb-/xoxp-/xoxa-/
# xoxr-/xoxs- but not xapp-/xoxe-), so the captured token can score below
# the global floor and be dropped. The structured prefix bounds FP risk;
# declare the per-detector floor so the detector ships working.
min_confidence = 0.5
keywords = ["xapp-", "slack", "SLACK_APP_TOKEN", "app-level"]

[[detector.patterns]]
# gitleaks `slack-app-token` shape: xapp-<digit>-<A-Z0-9>+-<digits>-<lower-hex>.
# Tighten the trailing secret to a 32+ char floor so it requires a real
# token body, not the bare 4-segment skeleton.
regex = 'xapp-[0-9]-[A-Z0-9]+-[0-9]+-[a-f0-9]{32,}'
description = "Slack app-level token (xapp- prefix, Socket Mode)"

[detector.verify]
method = "POST"
url = "https://slack.com/api/apps.connections.open"
allowed_domains = ["slack.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "$.ok"
equals = "true"

[[detector.tests]]
test_positive = "xapp-1-A012B3CDEFG-1234567890123-1f9a0b7c4e2d6a8b3c5f7e9d0a1b2c3d"
test_negative = "NOT_A_SECRET=totally_benign_example_value_123456"
