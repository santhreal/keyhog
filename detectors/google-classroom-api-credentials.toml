# Docs: https://developers.google.com/classroom/reference/rest
# Format: JSON service account or OAuth2 credentials
# Verify: GET /v1/courses with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "google-classroom-api-credentials"
name = "Google Classroom API Credentials"
service = "google-classroom"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["classroom", "CLASSROOM", "google_classroom", "classroom_api"]

[[detector.patterns]]
regex = '''(?:classroom|google[_\-\s]*classroom)[_\s.-]*(?:api[_\s.-]*)?(?:key|token)[=:\s"'']+(ya29\.[a-zA-Z0-9_-]+)'''
description = "Google Classroom OAuth2 access token with context anchor"
group = 1

[[detector.patterns]]
# Bounded the `.*` between the two JSON literals - real
# service-account JSON keeps `"type"` and `"classroom"` within a few
# hundred bytes of each other (one minified-JSON line, or two adjacent
# pretty-printed fields). 128 non-newline chars is generous and stops
# the regex matching arbitrary cross-file JSON. kimi-4 audit.
regex = "\"type\"\\s*:\\s*\"service_account\"[^\\n]{0,128}\"classroom\""
description = "Google Classroom service account JSON"

[[detector.patterns]]
regex = "(?:classroom)[_\\s.-]*(?:private[_\\s.-]*key)[=:\\s\"'']+(-----BEGIN PRIVATE KEY-----[^'\"]+-----END PRIVATE KEY-----)"
description = "Google Classroom private key with context anchor"
group = 1

[[detector.tests]]
test_positive = "classroom api key ya29.Habcdefghijklmnopqrstuvwxyz1234567890abcd"
test_negative = "classroom=short"
