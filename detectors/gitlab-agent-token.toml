# Docs: https://docs.gitlab.com/ee/user/clusters/agent/
# Format: glagent- prefix followed by 20+ alphanumeric/_/- characters.
#   The GitLab Agent for Kubernetes authenticates to the agent server (KAS)
#   with this token; leaking one lets an attacker impersonate the agent and
#   reach the connected cluster, so the severity is critical.
# Verify: no public endpoint (cluster-internal / KAS authentication); unverified.
# Prefix: glagent-

[detector]
id = "gitlab-agent-token"
name = "GitLab Agent for Kubernetes Token"
service = "gitlab"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "kas" removed: over-broad 3-char prefilter (kaspersky/alaska/…) that no regex
# references: the pattern requires the unambiguous `glagent-` prefix (keyword
# "glagent-"), so "kas" only forced wasted scan passes. Recall-neutral.
keywords = ["glagent-", "gitlab", "agentk"]

[[detector.patterns]]
regex = 'glagent-[a-zA-Z0-9_\-]{20,}'
description = "GitLab Agent for Kubernetes token (glagent- prefix)"

[[detector.tests]]
test_positive = "glagent-Hx7Kp2Qm9Rn4Sb6Tw8Vz1Yc3"
test_negative = "glagent-short"
