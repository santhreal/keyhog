# Docs: https://developers.wrike.com/documentation/api/overview
# Format: Permanent access token, typically alphanumeric string
# Verify: GET /api/v4/contacts?me=true with Bearer token returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "wrike-access-token"
name = "Wrike Access Token"
service = "wrike"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["WRIKE_ACCESS_TOKEN", "WRIKE_TOKEN", "WRIKE_API_TOKEN"]

[[detector.patterns]]
regex = "(?:WRIKE_ACCESS_TOKEN|WRIKE_TOKEN|WRIKE_API_TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{30,50})"
description = "Wrike permanent access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://www.wrike.com/api/v4/contacts?me=true"
allowed_domains = ["www.wrike.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "WRIKE_ACCESS_TOKEN=2XE9ph0wHZ8cNfIMR56S5DHN4Pzoa4"
test_negative = "WRIKE_ACCESS_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
