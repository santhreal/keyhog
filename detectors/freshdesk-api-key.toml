# Docs: https://developers.freshdesk.com/api/#authentication
# Format: 20 character alphanumeric string, used with Basic auth (key:X)
# Verify: GET /api/v2/tickets with Basic auth (api_key:X)
# Prefix: none (20 char alphanumeric, requires context anchoring)

[detector]
id = "freshdesk-api-key"
name = "Freshdesk API Key"
service = "freshdesk"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["FRESHDESK_API_KEY", "freshdesk_api_key", "freshdesk.com"]

[[detector.patterns]]
regex = "(?:FRESHDESK_API_KEY|freshdesk_api_key)[=:\\s\"']+([A-Za-z0-9]{20})"
description = "Freshdesk API key (20 character alphanumeric) with context anchor"
group = 1

# NOTE: live verification disabled. `{{subdomain}}` was undefined.
