# Docs: https://developers.google.com/identity/protocols/oauth2
# Format: OAuth client secret - 24 alphanumeric characters (GOCSPX- prefix for newer secrets)
# Verify: POST to oauth2.googleapis.com/token with client credentials
# Prefix: GOCSPX- (newer format) or none (legacy 24-char hex)

[detector]
id = "google-oauth-client-secret"
name = "Google OAuth Client Secret"
service = "google"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
# Every pattern here carries a unique literal anchor (`GOCSPX-`, a
# `GOOGLE_CLIENT_SECRET`-style context word, or the `.apps.googleusercontent.com`
# suffix), so the body cannot collide with ordinary text. The client-ID body is
# base62-ish and scores only ~0.22 confidence on entropy alone, below the 0.40
# global floor - so a real `…-….apps.googleusercontent.com` ID was dropped as a
# false negative (SecretBench mirror: 55 cloud-service-credential×json misses
# led here, DET-18 class). Self-declare a lower floor; FP risk is negligible
# because the anchors are unforgeable.
min_confidence = 0.15
keywords = [
  "GOOGLE_CLIENT_SECRET",
  "google_client_secret",
  "GOCSPX",
  "apps.googleusercontent.com",
  "GOOGLE_CLIENT_ID",
  "google_client_id",
]

[[detector.patterns]]
regex = "GOCSPX-[a-zA-Z0-9_-]{20,28}"
description = "Google OAuth client secret (GOCSPX- prefix format)"

[[detector.patterns]]
regex = "(?:GOOGLE|google)[_.]?(?:CLIENT|client)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{24,28})"
description = "Google OAuth client secret with context anchor"
group = 1

[[detector.patterns]]
# Google OAuth 2.0 Client ID: `<10-12 digits>-<24-40 url-safe chars>
# .apps.googleusercontent.com`. The literal `.apps.googleusercontent.com`
# suffix is the unique anchor; the regex cannot match anything else by
# construction. Client IDs are not as critical as the secret on their
# own (they ship in browser apps), but pairing them with the secret
# leaks the full credential. Severity stays at the detector default
# (critical) because this detector's verify path will pair both halves
# when present.
regex = '[0-9]{10,12}-[A-Za-z0-9_-]{24,40}\.apps\.googleusercontent\.com'
required_literals = [".apps.googleusercontent.com"]
description = "Google OAuth 2.0 Client ID (apps.googleusercontent.com)"

[[detector.tests]]
test_positive = "google_client_secret=\"GOCSPX-TNohK9B6l7Hlnft6mAVzKLQHRG\""
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
