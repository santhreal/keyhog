# Docs: https://ninjaforms.com/docs/
# Format: WordPress REST API key with public and secret components
# Verify: no public verification endpoint (requires WordPress instance)
# Prefix: none (requires context anchoring)

[detector]
id = "ninja-forms-api-credentials"
name = "Ninja Forms API Credentials"
service = "ninjaforms"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["ninjaforms", "NINJA_FORMS", "ninja_forms"]

[[detector.patterns]]
regex = '''(?i)ninja[_\-\s]*forms[_\-\s]*api[_\-\s]*key[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Ninja Forms API key with context anchor"
group = 1

[[detector.companions]]
name = "ninja_forms_secret"
regex = '''(?i)ninja[_\-\s]*forms[_\-\s]*secret[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
within_lines = 3

[[detector.tests]]
test_positive = "ninja forms api key \"Bnmjw375HtQpjp2HwPIkcpgYWCS0lDEq2t2B8lynabcd\""
test_negative = "ninja forms api key \"YOUR_API_KEY_HERE_PLACEHOLDER_VALUE\""
