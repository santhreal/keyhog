# Docs: https://docs.gitlab.com/ee/user/profile/personal_access_tokens.html
# Format: glpat- prefix followed by alphanumeric characters and hyphens (20+ chars)
# Verify: HTTP GET to /api/v4/user with Private-Token header
# Prefix: glpat-

[detector]
id = "gitlab-personal-access-token"
name = "GitLab Personal Access Token"
service = "gitlab"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
decode_transforms = { reverse_prefixes = ["glpat-"], caesar_prefixes = ["glpat-"] }
validators = [{ type = "pattern-shape", prefixes = ["glpat-"], allow_overlong = true }]
keywords = ["glpat-", "gitlab"]

[[detector.patterns]]
# Allow `_` in the body: real GitLab glpat tokens (and SecretBench
# fixtures) use base64url-safe characters including underscore (see
# mirror-pos-0000033.ini: `glpat-_fOrNLbqhvJPZGZDzQ9P`). The previous
# `[a-zA-Z0-9\-]` class rejected underscores and dropped these tokens
# to entropy fallback.
regex = 'glpat-[a-zA-Z0-9_.\-]{20,64}'
description = "GitLab personal access token (glpat- prefix, 20-64 routable-token chars)"

[detector.verify]
method = "GET"
url = "https://gitlab.com/api/v4/user"
allowed_domains = ["gitlab.com"]

[detector.verify.auth]
type = "header"
name = "Private-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "username"
json_path = "$.username"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "glpat-aB3kQp7VbT2hYRzNcMfW"
test_negative = "glpat-short"
