# Docs: https://docs.gitlab.com/ee/user/profile/personal_access_tokens.html
# Format: glpat- prefix followed by alphanumeric characters and hyphens (20+ chars)
# Verify: HTTP GET to /api/v4/user with Private-Token header
# Prefix: glpat-

[detector]
id = "gitlab-personal-access-token"
name = "GitLab Personal Access Token"
service = "gitlab"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["glpat-", "gitlab"]

[[detector.patterns]]
# Allow `_` in the body: real GitLab glpat tokens (and SecretBench
# fixtures) use base64url-safe characters including underscore (see
# mirror-pos-0000033.ini: `glpat-_fOrNLbqhvJPZGZDzQ9P`). The previous
# `[a-zA-Z0-9\-]` class rejected underscores and dropped these tokens
# to entropy fallback.
regex = 'glpat-[a-zA-Z0-9_\-]{20,64}'
description = "GitLab personal access token (glpat- prefix, 20-64 base64url chars)"

[detector.verify]
method = "GET"
url = "https://gitlab.com/api/v4/user"
allowed_domains = ["gitlab.com"]

[detector.verify.auth]
type = "header"
name = "Private-Token"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "username"
json_path = "$.username"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "glpat-aB3kQp7VbT2hYRzNcMfW"
test_negative = "glpat-short"
