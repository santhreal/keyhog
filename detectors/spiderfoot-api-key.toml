# Docs: https://www.spiderfoot.net/documentation/
# Format: Alphanumeric API key
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "spiderfoot-api-key"
name = "SpiderFoot API Key"
service = "spiderfoot"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["spiderfoot", "SPIDERFOOT_API_KEY", "sf_api_key"]

[[detector.patterns]]
regex = '''(?:spiderfoot|SPIDERFOOT|sf_)[_\-\s]*(?:api[_\-\s]*key|token)[=:\s"'']+([a-zA-Z0-9_-]{20,64})'''
description = "SpiderFoot API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "spiderfoottoken=QT3EUl0GUeQm_rjcUr_T"
test_negative = "spiderfoottoken=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
