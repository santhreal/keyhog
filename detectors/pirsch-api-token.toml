# Docs: https://docs.pirsch.io/api-sdks/api-guide
# Format: Access keys start with "pa_" prefix followed by alphanumeric characters, or JWT tokens for OAuth
# Verify: GET /api/v1/domain with Bearer token returns 200 if valid
# Prefix: pa_

[detector]
id = "pirsch-api-token"
name = "Pirsch Analytics API Token"
service = "pirsch"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
min_confidence = 0.25
keywords = ["pa_", "PIRSCH_CLIENT_ID", "pirsch.io"]

[[detector.patterns]]
# Word-boundary anchored Pirsch access key. The previous unbounded
# `pa_[a-zA-Z0-9]{32,}` regex could latch onto the middle of a longer
# high-entropy run (e.g. cross-file reassembled fragments that happen
# to spell `pa_<random alnum>`). Pirsch tokens are documented as 32-40
# chars; the negative lookahead prevents merging into a longer run.
regex = "pa_[a-zA-Z0-9]{32,40}"
description = "Pirsch access key starting with pa_ prefix (length-bounded)"

[[detector.patterns]]
regex = "(?:PIRSCH[_\\-\\s]?CLIENT[_\\-\\s]?ID|pirsch[_\\-\\s]?client[_\\-\\s]?id)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Pirsch OAuth client ID with context anchor"
group = 1

[[detector.tests]]
test_positive = "pa_6p9KJHPwVUfCna4zMLnGUFMfL7SXbkwN"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
