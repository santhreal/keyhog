# Docs: https://ipinfo.io/developers
# Format: Alphanumeric string, often starting with specific patterns
# Verify: GET /me with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "ipinfo-api-token"
name = "IPinfo API Token"
service = "ipinfo"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["IPINFO_TOKEN", "IPINFO_API_TOKEN", "ipinfo"]

[[detector.patterns]]
regex = "(?:IPINFO|ipinfo)(?:_API)?(?:_TOKEN)?[=:\\s\"'']+([a-zA-Z0-9]{10,})"
description = "IPinfo API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://ipinfo.io/me"
allowed_domains = ["ipinfo.io"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "IPINFO=ic1pO5L3hs"
test_negative = "IPINFO=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
