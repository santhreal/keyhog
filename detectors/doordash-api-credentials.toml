# Docs: https://developer.doordash.com/en-US/docs/marketplace/overview/getting_started/jwts_getting_started/
# Format: JWT-based auth - Developer ID, Key ID, and Signing Secret
# Verify: POST /drive/v2/deliveries with JWT Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "doordash-api-credentials"
name = "DoorDash API Credentials"
service = "doordash"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["DOORDASH_DEVELOPER_ID", "DOORDASH_KEY_ID", "DOORDASH_SIGNING_SECRET", "doordash", "developer_id"]

[[detector.patterns]]
regex = "(?i)doordash[_.\\s\"'-]+developer[_.-]?id[=:\\s\"']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "DoorDash Developer ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)doordash[_.\\s\"'-]+key[_.-]?id[=:\\s\"']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "DoorDash Key ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)doordash[_.\\s\"'-]+signing[_.-]?secret[=:\\s\"']+([a-zA-Z0-9_-]{20,})"
description = "DoorDash Signing Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)doordash[_.\\s\"'-]+(?:access|api)[_.-]?key[=:\\s\"']+([a-zA-Z0-9_-]{20,})"
description = "DoorDash Access Key with context anchor"
group = 1

[[detector.tests]]
test_positive = "DOORDASH_developer_id=0a82d930-0311-5873-e7cb-7c3a6be1eacf"
test_negative = "DOORDASH_developer_id=short"
