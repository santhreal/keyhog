# Docs: https://docs.corbado.com/api-reference/authentication
# Format: Project ID (pro- prefix) and API Secret (corbado1_ prefix) pair for Basic auth
# Verify: GET /v2/socialAccounts with Basic auth (base64 of projectID:apiSecret)
# Prefix: pro- (project ID)

[detector]
id = "corbado-api-credentials"
name = "Corbado API Credentials"
service = "corbado"
severity = "critical"
keywords = ["pro-", "corbado1_", "CORBADO_PROJECT_ID", "CORBADO_API_SECRET"]

[[detector.patterns]]
regex = "(?:CORBADO_PROJECT_ID|project[_-]?id)[\"\\']?\\s*[:=]\\s*[\"\\'](pro-[a-zA-Z0-9_-]+)[\"\\']"
description = "Corbado Project ID (pro- prefix)"
group = 1

[[detector.companions]]
name = "api_secret"
regex = "(?:CORBADO_API_SECRET|api[_-]?secret)[\"\\']?\\s*[:=]\\s*[\"\\'](corbado1_[a-zA-Z0-9_-]+)[\"\\']"
within_lines = 5

[[detector.tests]]
test_positive = "CORBADO_PROJECT_ID=\"pro-abc123def456\"\nCORBADO_API_SECRET=\"corbado1_Kp4Qx7Rm2Sn5Tb8\""
test_negative = "CORBADO_PROJECT=abc123def456"
