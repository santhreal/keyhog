# Docs: https://www.campaignmonitor.com/api/getting-started/
# Format: 40-character hexadecimal API key used with HTTP Basic Auth
# Verify: GET /api/v3.3/clients.json with Basic auth (username=api_key, password=x) returns 200
# Prefix: none (requires context anchoring - hex pattern too generic)

[detector]
id = "campaign-monitor-api-key"
name = "Campaign Monitor API Key"
service = "campaignmonitor"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["campaignmonitor", "CAMPAIGNMONITOR", "campaign_monitor", "createsend"]

[[detector.patterns]]
regex = '''(?i)(?:campaign[_\-\s]*monitor|createsend)[_\-\s]*(?:api[_\-\s]*)?key[=:\s"']+([a-f0-9]{40})'''
description = "Campaign Monitor API key (40 hex chars) with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?i)campaign[_\-\s]*monitor[_\-\s]*(?:client[_\-\s]*)?id[=:\s"']+([a-f0-9]{32})'''
description = "Campaign Monitor Client ID"
group = 1

[[detector.tests]]
test_positive = "campaignmonitor_api_key=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d8e6a2b9f"
test_negative = "campaignmonitor_api_key=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d8e6a2b9"
