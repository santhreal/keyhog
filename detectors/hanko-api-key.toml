# Docs: https://docs.hanko.io/api-reference/public/status
# Format: API key for tenant-specific endpoints
# Verify: GET to tenant-specific status endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "hanko-api-key"
name = "Hanko API Key"
service = "hanko"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["HANKO_API_KEY", "HANKO_KEY", "hanko"]

[[detector.patterns]]
regex = '''(?:HANKO[_\-\s]*API[_\-\s]*KEY|HANKO[_\-\s]*KEY)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Hanko API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:hanko\\.io|hanko\\.cloud).*[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Hanko API key with URL context"
group = 1

[[detector.tests]]
test_positive = "HANKO_API_KEY=QXjK-nCvdgB1eKnjRTfl"
test_negative = "HANKO_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
