# Docs: https://canvas.instructure.com/doc/api/file.oauth.html
# Format: 64-71 character alphanumeric token prefixed with canvas-specific context
# Verify: GET /api/v1/users/self with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "canvas-api-token"
name = "Canvas LMS API Token"
service = "canvas"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["canvas", "instructure", "CANVAS_API_TOKEN", "canvas_token"]

[[detector.patterns]]
regex = "(?:canvas|instructure)[_\\s.-]*(?:api[_\\s.-]*)?(?:token|key|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{64,71})"
description = "Canvas LMS API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:Bearer|Token)[=:\\s]+([a-zA-Z0-9_-]{64,71}).*canvas"
description = "Canvas token in Authorization header context"
group = 1

[[detector.companions]]
name = "canvas_domain"
# Tightened: only `*.instructure.com` is recognized. The previous
# `canvas[^\s"']*` alternative let an attacker substitute
# `canvas.evil.com` and ship the Bearer token there. kimi-wave3 §1.
regex = "https?://[a-zA-Z0-9_-]+\\.instructure\\.com"
within_lines = 5
[detector.verify]
method = "GET"
# Companion captures the full `https?://<host>.instructure.com` URL, so we
# don't prepend a scheme - doing so produced `https://https://...` and
# every verification 400'd. The runtime allowlist below catches any future
# regex drift that would let a non-Instructure host slip in.
url = "{{companion.canvas_domain}}/api/v1/users/self"
allowed_domains = ["instructure.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "canvas_api_token=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S"
test_negative = "canvas_token=short"
