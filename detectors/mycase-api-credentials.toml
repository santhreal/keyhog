# Docs: https://support.mycase.com/en/articles/mycase-developer-api
# Format: API Bearer token - alphanumeric string, often prefixed with mycase_ or 40+ chars
# Verify: no public verification endpoint
# Prefix: mycase_

[detector]
id = "mycase-api-credentials"
name = "MyCase API Credentials"
service = "mycase"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["MYCASE_API_KEY", "MYCASE_TOKEN", "mycase_api_key", "mycase_"]

[[detector.patterns]]
regex = "mycase_[a-zA-Z0-9_\\-]{32,}"
description = "MyCase API key with mycase_ prefix"

[[detector.patterns]]
regex = '''(?:MYCASE|mycase)[_\-\s]*(?:API[_\-\s]*KEY|TOKEN)[=:\s"'']+([a-zA-Z0-9_\-]{40,})'''
description = "MyCase API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "mycase_i6EdHsGPI5sMobxNZTaZh300HPgk7a5x"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
