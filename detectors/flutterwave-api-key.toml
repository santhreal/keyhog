# Docs: https://developer.flutterwave.com/docs/authentication
# Format: Secret keys start with FLWSECK_TEST- or FLWSECK_LIVE-, public keys with FLWPUBK_TEST- or FLWPUBK_LIVE-
# Verify: GET /v3/transactions with Bearer token returns 200 if valid
# Prefix: FLWSECK_, FLWPUBK_

[detector]
id = "flutterwave-api-key"
name = "Flutterwave API Key"
service = "flutterwave"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["FLWSECK_", "FLWPUBK_", "FLUTTERWAVE", "flutterwave", "FLW_SECRET_KEY"]

[[detector.patterns]]
regex = '(FLWSECK_(?:TEST|LIVE)-[a-f0-9]{32,64}-X)'
description = "Flutterwave secret key (FLWSECK_TEST/LIVE prefix)"

[[detector.patterns]]
regex = '(FLWPUBK_(?:TEST|LIVE)-[a-f0-9]{32,64}-X)'
description = "Flutterwave public key (FLWPUBK_TEST/LIVE prefix)"

[detector.verify]
method = "GET"
url = "https://api.flutterwave.com/v3/transactions"
allowed_domains = ["api.flutterwave.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "FLWSECK_TEST-7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d-X"
test_negative = "FLWSECK_TEST-short-X"
