# Docs: https://goharbor.io/docs/2.11.0/administration/robot-accounts/
# Format: Robot password is a JWT-like token or 40+ character alphanumeric string
# Verify: POST /api/v2.0/robots/{id} with Basic auth or Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "harbor-robot-credentials"
name = "Harbor Robot Account Credentials"
service = "harbor"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["robot$", "HARBOR", "harbor", "robot_password", "robot_username"]

[[detector.patterns]]
regex = "(?:robot|HARBOR|harbor)[\\w_]*(?:password|token|secret)[=:\\s\"'']+([A-Za-z0-9_-]{40,})"
description = "Harbor robot account password or token with context anchor"
group = 1

[[detector.patterns]]
regex = "robot\\$[a-zA-Z0-9_-]+[=:\\s\"'']+([A-Za-z0-9_-]{30,})"
description = "Harbor robot account with robot$ prefix username and captured password"
group = 1

[[detector.tests]]
test_positive = "robot_password=AyRAn1jcr9OMzmqXYd0OfTuVUz3cUtGgFGTsMvK15lkcvd6PTCI-"
test_negative = "robot_password=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
