# Docs: https://docs.footprint.network/
# Format: 32 character alphanumeric string
# Verify: no public verification endpoint
# Prefix: none (32 char alphanumeric, requires context anchoring)

[detector]
id = "footprint-api-key"
name = "Footprint Analytics API Key"
service = "footprint"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "api_key", "apikey" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["footprint", "FOOTPRINT"]

[[detector.patterns]]
regex = "(?:FOOTPRINT|footprint)[_a-zA-Z0-9]*[=:\\s\"'']+([a-zA-Z0-9]{32})"
description = "Footprint Analytics API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "footprint_api_key=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S5T"
test_negative = "footprint=short"
