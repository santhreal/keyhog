# Docs: https://raygun.com/documentation/product-guides/deployment-tracking/overview/
# Format: Alphanumeric string, no unique prefix - requires context anchoring
# Verify: POST to /v3/applications/api-key/{api_key}/deployments with Bearer auth
# Prefix: none (requires context anchoring)

[detector]
id = "raygun-api-key"
name = "Raygun API Key"
service = "raygun"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["RAYGUN_API_KEY", "RAYGUN_APIKEY", "raygun_api_key", "apiKey: \"", "apiKey: '", "api_key"]

[[detector.patterns]]
regex = "(?:RAYGUN[_.-]?API[_.-]?KEY|raygun[_.-]?api[_.-]?key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Raygun API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "RAYGUN_API_KEY=zHHPHPTJ-SaJd915YTMi"
test_negative = "RAYGUN_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
