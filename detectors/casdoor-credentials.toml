# Docs: https://casdoor.org/docs/basic/public-api
# Format: Client ID and Client Secret pair (hex strings) or Access Key/Secret
# Verify: POST to /api/login/oauth/access_token or direct API call
# Prefix: none (requires context anchoring)

[detector]
id = "casdoor-credentials"
name = "Casdoor Credentials"
service = "casdoor"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CASDOOR_CLIENT_ID", "CASDOOR_CLIENT_SECRET", "casdoor"]

[[detector.patterns]]
regex = '''(?:CASDOOR[_\-\s]*CLIENT[_\-\s]*ID)[=:\s"'']+([a-f0-9]{20})'''
description = "Casdoor client ID (20 hex characters)"
group = 1

[[detector.patterns]]
regex = '''(?:CASDOOR[_\-\s]*CLIENT[_\-\s]*SECRET)[=:\s"'']+([a-f0-9]{32,40})'''
description = "Casdoor client secret (32-40 hex characters)"
group = 1

[[detector.patterns]]
regex = '''(?:CASDOOR[_\-\s]*ACCESS[_\-\s]*KEY)[=:\s"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
description = "Casdoor user access key (UUID format)"
group = 1

[[detector.tests]]
test_positive = "CASDOOR_CLIENT_ID=7b3e5d8c1a9f4e2b6c8d"
test_negative = "CASDOOR_CLIENT_ID=short"
