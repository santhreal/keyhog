# Docs: https://www.canva.dev/docs/connect/authentication/
# Format: OAuth2 access token - base64url encoded string, variable length
# Verify: GET /rest/v1/oauth/introspect or API calls with Bearer token
# Prefix: none (OAuth2 standard token)

[detector]
id = "canva-api-token"
name = "Canva API Access Token"
service = "canva"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["CANVA", "canva", "cnvca"]

[[detector.patterns]]
regex = '''(?:CANVA|canva)[._-]?(?:TOKEN|token|ACCESS|access)[=:\s"']+([a-zA-Z0-9_-]{50,})'''
description = "Canva access token with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:CANVA|canva)[._-]?(?:CLIENT|client)[._-]?(?:SECRET|secret)[=:\s"']+(cnvca[a-zA-Z0-9]{20,})'''
description = "Canva client secret (cnvca prefix)"
group = 1

[[detector.tests]]
test_positive = "CANVA_TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S"
test_negative = "CANVA_TOKEN=short"
