# Docs: https://typesense.org/docs/30.1/api/api-keys.html
# Format: Alphanumeric string, typically auto-generated (no fixed prefix)
# Verify: GET /health with X-Typesense-API-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "typesense-api-key"
name = "Typesense API Key"
service = "typesense"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["TYPESENSE_API_KEY", "typesense_api_key", "TYPESENSE_APIKEY", "typesenseApiKey"]

[[detector.patterns]]
regex = '''(?:TYPESENSE[_\-\s]*API[_\-\s]*KEY|typesense[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{16,})'''
description = "Typesense API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "typesense_apikey  =  \":=:          '\"      :\"    '    \" ' '_NwUTwDJ0AkkHfG_SILwMoE_aPXONvjo_PoY4rp"
test_negative = "typesense_apikey  =  \":=:          '\"      :\"    '    \" ' 'YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
