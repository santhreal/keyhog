# Docs: https://documentation.mailgun.com/docs/mailgun/api-reference/api-overview
# Format: key- prefix followed by 32 hexadecimal characters
# Verify: GET request to Mailgun /v3/domains with HTTP Basic Auth (api:key)
# Prefix: key-

[detector]
id = "mailgun-api-key"
name = "Mailgun API Key"
service = "mailgun"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.12
# The bare `key-` 4-char keyword was getting dropped by the AC keyword
# floor in low-info-keyword filters, leaving .tf / properties / log-line
# fixtures unrouted. Widen to canonical Mailgun anchors so the pre-filter
# has a 7+ char surface that survives the floor.
keywords = [
  "key-",
  "mailgun",
  "MAILGUN",
  "MAILGUN_API_KEY",
  "mailgun_api_key",
  "api.mailgun.net",
]

[[detector.patterns]]
regex = 'key-[a-f0-9]{32}'
description = "Mailgun API key (key- prefix with 32 hex characters)"

[[detector.patterns]]
# Anchored fallback for `.tf` `mailgun_api_key { default = "..." }` and
# similar HCL / properties shapes where the bare key- prefix may be
# absent or wrapped, but the strong `mailgun_api_key` context keyword is
# present in the same window.
regex = '''(?i)mailgun[._-]?(?:api[._-]?)?key\s*[=:]\s*["']?([a-zA-Z0-9_-]{20,})["']?'''
description = "Mailgun API key with `mailgun_api_key` context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.mailgun.net/v3/domains"
allowed_domains = ["api.mailgun.net"]

[detector.verify.auth]
type = "basic"
username = "api"
password = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "key-9a3b7c2e4d1f6a8b0c5d9e3f7a1b4c2d"
test_negative = "key-short"
