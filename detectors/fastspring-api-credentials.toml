# Docs: https://developer.fastspring.com/docs/integrations
# Format: Username and password pair generated in Developer Tools > API Credentials
# Verify: GET /accounts with basic auth returns 200 if valid
# Prefix: none (requires context anchoring for both username and password)

[detector]
id = "fastspring-api-credentials"
name = "FastSpring API Credentials"
service = "fastspring"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["FASTSPRING", "fastspring", "FS_API_USER"]

[[detector.patterns]]
regex = '''(?i)fastspring[_\-\s]*api[_\-\s]*user(?:name)?[=:\s"'']+([A-Za-z0-9_-]{8,})'''
description = "FastSpring API username with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?i)fastspring[_\-\s]*api[_\-\s]*pass(?:word)?[=:\s"'']+([A-Za-z0-9_!@#$%^&*+=/-]{16,})'''
description = "FastSpring API password with context anchor"
group = 1

[[detector.companions]]
name = "fastspring_password"
regex = '''(?i)fastspring[_\-\s]*api[_\-\s]*pass(?:word)?[=:\s"'']+([A-Za-z0-9_!@#$%^&*+=/-]{16,})'''
within_lines = 5

[[detector.tests]]
test_positive = "FASTSPRING_API_USERNAME=Kp4Qx7Rm"
test_negative = "FASTSPRING_API_USER=short"
