# Docs: https://github.com/ovh/php-ovh
# Format: Application key (16-32 chars), Application secret (32+ chars), Consumer key (32+ chars)
# Verify: OAuth2 flow required - no simple public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "ovh-api-credentials"
name = "OVH Cloud API Credentials"
service = "ovh"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["OVH_APPLICATION_KEY", "OVH_APPLICATION_SECRET", "OVH_CONSUMER_KEY", "ovh-eu", "ovh-us", "ovh-ca"]

[[detector.patterns]]
regex = "(?:OVH_APPLICATION_KEY|ovh_application_key)[=:\\s\"'']+([a-z0-9]{16,})"
description = "OVH application key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:OVH_APPLICATION_SECRET|ovh_application_secret)[=:\\s\"'']+([a-z0-9]{32,})"
description = "OVH application secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:OVH_CONSUMER_KEY|ovh_consumer_key)[=:\\s\"'']+([a-z0-9]{32,})"
description = "OVH consumer key with context anchor"
group = 1

[[detector.tests]]
test_positive = "OVH_APPLICATION_KEY=zv5mr12kbiab0vke"
test_negative = "OVH_APPLICATION_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
