# Docs: https://docs.avax.network/
# Format: Avalanche RPC endpoints use access tokens in URL or x-api-key header
# Verify: no public verification endpoint
# Prefix: service-owned Avalanche RPC URLs; generic hex API keys require context anchoring

[detector]
id = "avalanche-api-credentials"
name = "Avalanche API Credentials"
service = "avalanche"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["avalanche", "AVALANCHE", "avax", "AVAX", "snowtrace", "avax.network"]

[[detector.patterns]]
regex = '(?:avalanche|AVALANCHE|avax|AVAX)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+\.avax\.[a-z]+/[a-zA-Z0-9_-]+)'
description = "Avalanche RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:^|[^A-Za-z0-9_])(https?://[a-zA-Z0-9._-]+\.avax\.[a-z]+/[a-zA-Z0-9_-]+)(?:$|[^A-Za-z0-9_-])'
description = "Bare Avalanche RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:avalanche|AVALANCHE|avax|AVAX)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://api\.[a-zA-Z0-9._-]+/ext/bc/C/rpc)'
description = "Avalanche C-Chain RPC endpoint"
group = 1

[[detector.patterns]]
regex = '(?:avalanche|AVALANCHE|avax|AVAX)[._-]?(?:api|API)[._-]?key[=:"	\s]+([a-f0-9]{32})'
description = "Avalanche API key (32 hex characters)"
group = 1

[[detector.tests]]
test_positive = "avalanche_rpc_url=https://api.avax.network/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "avalanche_rpc_url=https://example.com/api"
