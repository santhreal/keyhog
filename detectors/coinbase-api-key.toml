# Docs: https://docs.cdp.coinbase.com/advanced-trade/docs/rest-api-auth/
# Format: organizations/ followed by UUID/apiKeys/ followed by UUID (API Key ID)
# Verify: No verify endpoint (requires private key for authentication)
# Prefix: organizations/

[detector]
id = "coinbase-api-key"
name = "Coinbase API Key"
service = "coinbase"
severity = "critical"
keywords = ["organizations/", "apiKeys", "coinbase"]

[[detector.patterns]]
regex = 'organizations/[a-f0-9-]+/apiKeys/[a-f0-9-]+'
description = "Coinbase Cloud API Key ID (organization-scoped)"

[[detector.tests]]
test_positive = "key_id = \"organizations/7d3e5b8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d/apiKeys/4c9a8f6e-3b7d-1a2c-5e8f-0b9d6a3c4e1f\""
test_negative = "organizations/teamA/apiKeys/listAll"
