# Docs: https://developer.fullstory.com/server/v1/getting-started/
# Format: Data center prefix (na1, eu1) followed by token, e.g., "na1.xxxxx"
# Verify: GET /me with Basic Authorization header
# Prefix: na1., eu1.

[detector]
id = "fullstory-api-key"
name = "FullStory API Key"
service = "fullstory"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["FULLSTORY_API_KEY", "fullstory_api_key", "na1.", "eu1.", "fs_api_key"]

[[detector.patterns]]
regex = "(?:FULLSTORY[_.-]?API[_.-]?KEY|fullstory[_.-]?api[_.-]?key)[=:\\s\"'']+((?:na1|eu1)\\.[a-zA-Z0-9_-]{20,})"
description = "FullStory API key with datacenter prefix"
group = 1

[[detector.patterns]]
regex = "[^\\w]((na1|eu1)\\.[a-zA-Z0-9_-]{32,})"
description = "FullStory API key with datacenter prefix (standalone)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.fullstory.com/me"
allowed_domains = ["api.fullstory.com"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "Basic {{match}}"

[[detector.tests]]
test_positive = "FULLSTORY_API_KEY=na1.ylPfzLN_HDUWbwrKqwThoQUtlcBtscgCtYvQG04QvayuUORdk1v1QdsZZWUOoHw5jFS52CijRBH1MSO6dcQ9NmJQG2ae4hn"
test_negative = "FULLSTORY_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
