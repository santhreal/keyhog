# Docs: https://developer.fullstory.com/server/v1/getting-started/
# Format: Data center prefix (na1, eu1) followed by token, e.g., "na1.xxxxx"
# Verify: GET /me with Basic Authorization header
# Prefix: na1., eu1.

[detector]
id = "fullstory-api-key"
name = "FullStory API Key"
service = "fullstory"
severity = "high"
keywords = ["FULLSTORY_API_KEY", "fullstory_api_key", "na1.", "eu1.", "fs_api_key"]

[[detector.patterns]]
regex = "(?:FULLSTORY[_.-]?API[_.-]?KEY|fullstory[_.-]?api[_.-]?key)[=:\\s\"'']+((?:na1|eu1)\\.[a-zA-Z0-9_-]{20,})"
description = "FullStory API key with datacenter prefix"
group = 1

[[detector.patterns]]
regex = "[^\\w]((na1|eu1)\\.[a-zA-Z0-9_-]{32,})"
description = "FullStory API key with datacenter prefix (standalone)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.fullstory.com/me"
allowed_domains = ["api.fullstory.com"]
[detector.verify.success]
status = 200

[[detector.verify.headers]]
name = "Authorization"
value = "Basic {{match}}"

[[detector.tests]]
test_positive = "FULLSTORY_API_KEY=na1.ylPfzLN_HDUWbwrKqwThoQUtlcBtscgCtYvQG04QvayuUORdk1v1QdsZZWUOoHw5jFS52CijRBH1MSO6dcQ9NmJQG2ae4hn"
test_negative = "FULLSTORY_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
