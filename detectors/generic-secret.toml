# Generic secret bridge (phase-2). A bare secret/token value assigned to a
# secret/token field with no vendor shape. No regex anchor, fires in phase 2 on
# keywords + entropy_floor. Single home for the generic-secret detector's knobs.

[detector]
id = "generic-secret"
name = "Generic Secret"
service = "generic"
entropy_roles = ["keyword-free"]
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "authoritative", weight = 1.0, context_radius_lines = 5 }
kind = "phase2-generic"
generic_vendor_suffix_fallback = true
keywords = ["secret", "token", "secret_key", "client_secret", "auth_token", "authtoken", "access_token", "private_key", "signing_secret", "app_secret", "webhook_url"]
canonical_hex_key_material = [
    { lengths = [32, 48], keywords = ["secret", "private_key", "signing_secret"], suffixes = ["key", "secret"], excluded_keywords = ["license_key"] },
    { lengths = [64], keywords = ["private_key", "signing_secret"] },
]
entropy_high = 4.5
entropy_low = 3.0
entropy_very_high = 5.8
sensitive_path_entropy_very_high = 5.5
plausibility = { mixed_alnum_floor = 4.0, symbolic_entropy_floor = 3.5, second_half_entropy_floor = 2.5, second_half_min_len = 17, unique_chars_min_len = 17, min_unique_chars = 8, unanchored_hex_max_len = 10, identical_char_max_len = 4, structured_dotted_min_len = 40, mixed_alnum_min_len = 20, isolated_mixed_entropy_floor = 3.65, isolated_symbolic_min_len = 18, isolated_symbolic_min_symbols = 2, isolated_symbolic_requires_non_underscore = true, isolated_colon_left_min_len = 20, isolated_colon_right_min_len = 16, leading_slash_base64_entropy_floor = 4.8, leading_slash_base64_min_len = 40, keyword_free_operator_margin = 1.0, reject_repeated_blocks = true, allow_alphabetic_credential = true, reject_program_identifiers = true, reject_source_symbol_identifiers = true, reject_dash_segmented_alnum = true }
# Lowest explicit generic family priority. Unique keywords remain owned here,
# while more specific bridges win overlaps.
entropy_policy_priority = 40
bpe_enabled = true
# Admit the lowercase-random CredData boundary (2.286 bytes/token) without
# approaching the 3.8+ word-like FP band.
bpe_max_bytes_per_token = 2.3
# Generic value-shape admission floor. This was historically an engine literal;
# keeping it here makes the shipped detector the policy owner.
min_len = 8
# Shapeless assignment values above 512 bytes are payloads/blobs rather than a
# single generic credential. Reject whole; never truncate into a finding.
max_len = 512
keyword_free_min_len = 20
stopwords = ["example", "sample", "test", "dummy", "placeholder", "changeme", "xxxxxxxx", "your_key_here", "000000"]
public_identifier_assignment_markers = [
    "_ADDR=", "_ADDR ", "_ADDR\"", "_ADDR:",
    "_ADDRS=", "_ADDRS ", "_ADDRS\"",
    "_ADDRESS=", "_ADDRESS ", "_ADDRESS\"",
    "_WALLET=", "_WALLET ", "_WALLET\"", "_MINT_ADDR",
    "_PUBKEY=", "_PUBKEY ", "_PUBLIC_KEY=", "_PUBLIC_KEY ", "_PUBLIC_KEY\"",
    "_CONTRACT=", "_CONTRACT ", "_OWNER=", "_ACCOUNT_ID=", "_PEER_ID=", "_NODE_ID=",
]

entropy_floor = [
    { max_len = 24, floor = 2.8 },
    { max_len = 40, floor = 3.2 },
    { floor = 3.5 },
]

[[detector.entropy_shapes]]
charset = "lower-alnum"
entropy_floor = 3.9
special_min_length = 16
grouping = { group_count = 4, group_length = 4, separator = "-" }
require_non_hex_alpha = true
require_group_alpha_digit = true

[detector.entropy_fallback]
class = "generic"
id = "entropy-generic"
name = "Generic High-Entropy Secret"
service = "generic"

[[detector.tests]]
test_positive = "app_secret=kdheufnzbwqmaslr"
test_negative = "app_secret=example"
