# Docs: https://learn.microsoft.com/en-us/gaming/gdk/_content/gc/live/concepts/live-concepts-overview
# Format: UUID-like or 40-char base64 string, no unique prefix
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "xboxlive-api-key"
name = "Xbox Live API Key"
service = "xboxlive"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["XBOX_API_KEY", "XBOX_LIVE_KEY", "XSTS_TOKEN", "XboxLiveAPI"]

[[detector.patterns]]
regex = '''(?:XBOX_API_KEY|XBOX_LIVE_KEY|XSTS_TOKEN|XboxLiveAPI)[=:\s"']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}|[A-Za-z0-9+/]{40}=?)'''
description = "Xbox Live API key or XSTS token (UUID-like or 40-char base64 with context anchor)"
group = 1

[[detector.tests]]
test_positive = "XboxLiveAPI:      \"  = \"     \":   :    M5Nbb3hRr6iZuT74aXW6c9c7PhQdj71UQ1PxIpCB="
test_negative = "XboxLiveAPI:      \"  = \"     \":   :    YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
