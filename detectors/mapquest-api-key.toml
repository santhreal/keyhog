# Docs: https://developer.mapquest.com/documentation/
# Format: API key is a 32 character alphanumeric string
# Verify: GET /directions/v2/route with key parameter
# Prefix: none (requires context anchoring)

[detector]
id = "mapquest-api-key"
name = "MapQuest API Key"
service = "mapquest"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["MAPQUEST_API_KEY", "mapquest.api.key", "mapquest_api_key"]

[[detector.patterns]]
regex = '''(?:MAPQUEST[_\-\s]*API[_\-\s]*KEY|mapquest[_\-\s]*api[_\-\s]*key|mapquest\.api\.key)[=:\s"'']+([A-Za-z0-9]{32})'''
description = "MapQuest API key with context anchor (32 chars)"
group = 1

[detector.verify]
method = "GET"
url = "https://www.mapquestapi.com/directions/v2/route"
allowed_domains = ["www.mapquestapi.com"]

[detector.verify.auth]
type = "query"
param = "key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "MAPQUEST_API_KEY=dVwxYfM2hWRAGmgpCyRcAZUJGrlt7uU4"
test_negative = "MAPQUEST_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
