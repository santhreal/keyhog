# Docs: https://developers.google.com/maps/documentation/javascript/get-api-key
# Format: AIza + 35 alphanumeric characters (Base64-like)
# Verify: GET request to Google APIs with key parameter
# Prefix: AIza

[detector]
id = "google-api-key"
name = "Google/YouTube API Key"
service = "google"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.12
keywords = ["AIza", "AIzaSy", "BLOGGER", "DRIVE_API_KEY", "GOOGLE_ADDRESS_VALIDATION", "GOOGLE_API_KEY", "GOOGLE_DRIVE", "GOOGLE_TRANSLATE_API_KEY", "PLACES_API_KEY", "YOUTUBE", "YOUTUBE_API_KEY", "addressvalidation.googleapis.com", "blogger", "cloudfunctions", "firebase", "google", "google_api_key", "googleapis", "googleapis.com/youtube", "places", "translation.googleapis.com", "youtube"]

[[detector.patterns]]
regex = 'AIza[0-9A-Za-z_-]{35}'
description = "Google API Key (YouTube, Maps, etc.)"

[[detector.patterns]]
regex = "https://[a-z0-9-]+-[a-z0-9]+-uc\\.a\\.run\\.app.*[?&]key=(AIza[0-9A-Za-z_-]{35})"
description = "Google Cloud Functions URL with API key in query string"
group = 1

[[detector.patterns]]
regex = "(?:CLOUDFUNCTIONS|cloudfunctions|CLOUD_FUNCTIONS|cloud_functions)[_\\-\\s]*(?:API|api)?[_\\-\\s]*(?:KEY|key)[=:\\s\"'\\']+(AIza[0-9A-Za-z_-]{35})"
description = "Google Cloud Functions API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:GOOGLE_TRANSLATE_API_KEY|GOOGLE_CLOUD_TRANSLATION_API_KEY|GOOGLE_API_KEY)[=:\\s\"'']+(AIza[0-9A-Za-z_-]{35})"
description = "Google Cloud Translation API key with context anchor"
group = 1

[[detector.patterns]]
regex = "translation\\.googleapis\\.com.*key[=:](AIza[0-9A-Za-z_-]{35})"
description = "Google Cloud Translation API key in URL"
group = 1

[[detector.patterns]]
regex = '''(?:DRIVE|GOOGLE_DRIVE)[._-]?API[._-]?KEY[=:\s"']+(AIza[0-9A-Za-z_-]{35})'''
description = "Google Drive API key with context anchor"
group = 1

[[detector.patterns]]
regex = 'AIzaSy[A-Za-z0-9_-]{33}'
description = "Google Places API key (AIzaSy prefix)"

[[detector.patterns]]
regex = "(?:youtube|YOUTUBE)[_\\s]?(?:api_key|API_KEY|key)[=:\\s\"'']+(AIza[0-9A-Za-z_-]{35})"
description = "YouTube API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://www.googleapis.com/drive/v3/about?fields=user&key={{match}}"
allowed_domains = ["www.googleapis.com"]

[detector.verify.auth]
type = "query"
param = "key"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "AIza9X3kQp7VbT2hYRzNcMfWj4DgEsLuHaIoBnV"
test_negative = "AIza"
