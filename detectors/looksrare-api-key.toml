# Docs: https://looksrare.dev/
# Format: 32+ character alphanumeric string passed in X-Looks-Api-Key header
# Verify: GET /api/v2/collections with X-Looks-Api-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "looksrare-api-key"
name = "LooksRare API Key"
service = "looksrare"
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["looksrare", "X-Looks-Api-Key", "LOOKSRARE_API_KEY"]

[[detector.patterns]]
regex = '''(?:looksrare|LOOKSRARE)[_\-\s]*(?:API[_\-\s]*)?KEY[_\-\s]*[=:][\s]*["'']+([a-zA-Z0-9_-]{32,})["'']+'''
description = "LooksRare API key in assignment context"
group = 1

[[detector.patterns]]
regex = "X-Looks-Api-Key[\\s]*[=:][\\s]*[\"'']?([a-zA-Z0-9_-]{32,})[\"'']?"
description = "LooksRare API key in HTTP header"
group = 1

[[detector.tests]]
test_positive = "X-Looks-Api-Key=\"fedcba9876543210fedcba9876543210abcd\""
test_negative = "X-Looks-Api-Key=short"
