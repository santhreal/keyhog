# Docs: https://help.tableau.com/current/api/rest_api/en-us/REST/rest_api_concepts_auth.htm
# Format: Personal Access Token with name and secret pair
# Verify: POST /api/{version}/auth/signin with token credentials
# Prefix: none (requires context anchoring)

[detector]
id = "tableau-api-token"
name = "Tableau Personal Access Token"
service = "tableau"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
min_confidence = 0.20
keywords = ["TABLEAU", "tableau", "PAT_NAME", "PAT_SECRET"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:TABLEAU|tableau)[._-]?(?:server|host|url)[=:\\s\"'']+(https?://[a-z0-9.-]+)"
description = "Tableau Server URL"
group = 1

[[detector.patterns]]
regex = '''(?:TABLEAU|tableau)[._-]?(?:token[_\-\s]*name|pat[_\-\s]*name)[=:\s"'']+([a-zA-Z0-9_-]+)'''
description = "Tableau personal access token name"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = '''(?:TABLEAU|tableau)[._-]?(?:token[_\-\s]*secret|pat[_\-\s]*secret)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "Tableau personal access token secret"
group = 1

[[detector.patterns]]
regex = '''(?:TABLEAU|tableau)[._-]?(?:site[_\-\s]*id|site)[=:\s"'']+([a-zA-Z0-9_-]+)'''
description = "Tableau site ID"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:TABLEAU|tableau)[._-]?(?:username|user)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Tableau username"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:TABLEAU|tableau)[._-]?(?:password|pass|pwd)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "Tableau password"
group = 1

[[detector.tests]]
test_positive = "tableauhost     = =   ::     : ' =   :':'\" '   \": :  '     :\"'  =\"  \" =   := ': https://bykdk.3g95t0-fowsha52wde-3d00ste1678p5eq98.9p"
test_negative = "tableauhost     = =   ::     : ' =   :':'\" '   \": :  '     :\"'  =\"  \" =   := ': YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
