# Generic API-key bridge (phase-2). A shapeless API key — a high-entropy token
# assigned to an api_key/access_key/secret_key field — has no vendor prefix to
# anchor a regex on, so this detector carries NO patterns. It fires in phase 2,
# gated by its keywords + entropy_floor. Every knob lives HERE (Tier-B), not in
# engine constants: this is the single home for the generic-api-key detector.

[detector]
id = "generic-api-key"
name = "Generic API Key"
service = "generic"
severity = "medium"
kind = "phase2-generic"
keywords = ["api_key", "apikey", "api-key", "access_key", "accesskey", "secret_key", "secretkey", "client_secret", "x-api-key", "apitoken", "api_token", "auth_key", "signing_key", "encryption_key", "master_key", "masterkey", "license_key"]
entropy_high = 4.5
entropy_low = 3.0
entropy_very_high = 5.8
mixed_alnum_floor = 4.0
bpe_max_bytes_per_token = 2.2
keyword_free_min_len = 20
stopwords = ["example", "sample", "test", "dummy", "placeholder", "changeme", "xxxxxxxx", "your_key_here", "000000"]

# Length-bucketed low-entropy floor. Short api-key values are legitimately
# lower-entropy than long ones, so the floor relaxes for shorter candidates and
# tightens for long word-y noise. First bucket whose max_len >= L applies.
entropy_floor = [
    { max_len = 24, floor = 3.0 },
    { max_len = 40, floor = 2.8 },
    { floor = 3.5 },
]
