# Docs: https://teller.io/docs
# Format: API key starts with 'live_' or 'test_' followed by alphanumeric string
# Verify: GET /accounts with Bearer token returns 200 if valid
# Prefix: live_, test_

[detector]
id = "teller-api-credentials"
name = "Teller API Credentials"
service = "teller"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["TELLER_API_KEY", "teller_key", "live_", "test_"]

[[detector.patterns]]
regex = "(?:TELLER|teller)[._-]?(?:API|api)?[._-]?(?:KEY|key)?[=:\\s\"'']+((?:live_|test_)[a-zA-Z0-9_-]{20,60})"
description = "Teller API key with live_ or test_ prefix"
group = 1

[[detector.tests]]
test_positive = "TELLER-.KEY  \":test_ts4a011Jz-TCNEVmVqD5JIDXu0OS1Mj9Lzlt"
test_negative = "TELLER-.KEY  \":YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
