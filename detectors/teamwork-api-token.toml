# Docs: https://developer.teamwork.com/guides/authentication/
# Format: Base64 encoded string or alphanumeric token
# Verify: GET /authenticate.json with Bearer token returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "teamwork-api-token"
name = "Teamwork API Token"
service = "teamwork"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["TEAMWORK_API_TOKEN", "TEAMWORK_TOKEN"]

[[detector.patterns]]
regex = "(?:TEAMWORK_API_TOKEN|TEAMWORK_TOKEN)[=:\\s\"'']+([A-Za-z0-9+/=]{20,60})"
description = "Teamwork API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.teamwork.com/authenticate.json"
allowed_domains = ["api.teamwork.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "TEAMWORK_API_TOKEN=Br3i8EE3pYXqvoXwCoXB"
test_negative = "TEAMWORK_API_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
