# Docs: https://apidocs.canopy.rent/
# Format: x-api-key header with API key; JWT-based authentication with client_id/client_secret
# Verify: API calls to Canopy endpoints with proper headers
# Prefix: none (requires context anchoring)

[detector]
id = "canopy-tax-api-credentials"
name = "Canopy Tax API Credentials"
service = "canopy-tax"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# "x-api-key", "client_id", "client_secret" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["CANOPY", "canopy"]

[[detector.patterns]]
regex = "(?:CANOPY|canopy)[._]?(?:API|api)?[._]?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Canopy API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:CANOPY|canopy)[._]?(?:CLIENT|client)[._]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9_-]{10,})"
description = "Canopy OAuth client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:CANOPY|canopy)[._]?(?:CLIENT|client)[._]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Canopy OAuth client secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "CANOPY_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "CANOPY_API_KEY=short"
