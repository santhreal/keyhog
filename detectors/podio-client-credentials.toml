# Docs: https://developers.podio.com/authentication
# Format: Client ID and Client Secret for OAuth 2.0
# Verify: POST to oauth/token endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "podio-client-credentials"
name = "Podio Client Credentials"
service = "podio"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["PODIO_CLIENT_ID", "PODIO_CLIENT_SECRET"]

[[detector.patterns]]
regex = "(?:PODIO_CLIENT_ID)[=:\\s\"'']+([0-9]+)"
description = "Podio OAuth client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PODIO_CLIENT_SECRET)[=:\\s\"'']+([a-f0-9]{32,40})"
description = "Podio OAuth client secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "PODIO_CLIENT_ID=7222973"
test_negative = "PODIO_CLIENT_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
