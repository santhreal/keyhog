# Docs: https://support.powerschool.com/developer/#/page/PowerSchool-Developer-Portal
# Format: Client ID and Client Secret for OAuth 2.0 authentication
# Verify: POST /oauth/access_token with client credentials returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "powerschool-api-credentials"
name = "PowerSchool API Credentials"
service = "powerschool"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["powerschool", "POWERSCHOOL", "ps_api", "ps_client"]

[[detector.patterns]]
regex = "(?:powerschool|ps)[_\\s.-]*(?:client[_\\s.-]*id)[=:\\s\"'']+([a-f0-9]{32})"
required_literals = ["client"]
description = "PowerSchool API client ID (32 hex chars) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:powerschool|ps)[_\\s.-]*(?:client[_\\s.-]*secret)[=:\\s\"'']+([a-zA-Z0-9_-]{40,64})"
required_literals = ["secret"]
description = "PowerSchool API client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:powerschool|ps)[_\\s.-]*(?:api[_\\s.-]*key|plugin[_\\s.-]*key)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "PowerSchool API/plugin key with context anchor"
group = 1

[[detector.tests]]
test_positive = "powerschool_client_id=25168b919a519680ded6beb446bde58f"
test_negative = "powerschool_client_id=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
