# Docs: https://neon.tech/docs/connect/connect-from-any-app
# Format: postgresql://user:password@host.neon.tech/database
# Verify: no public verification endpoint (requires psql connection)
# Prefix: postgres:// or postgresql:// with .neon.tech hostname

[detector]
id = "neon-db-connection-string"
name = "Neon Database Connection String"
service = "neon"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["neon.tech", "NEON_DATABASE_URL", "NEON_CONNECTION_STRING"]

[[detector.patterns]]
regex = 'postgres(?:ql)?://[^:]+:[^@]+@[a-z0-9-]+\.neon\.tech/[a-zA-Z0-9_-]+'
description = "Neon database connection string with embedded credentials"

[[detector.patterns]]
regex = 'neon_conn_[a-z0-9]{20,}'
description = "Neon connection string identifier"

[[detector.tests]]
test_positive = "postgres://\"']oT &k$0_PJ9@[3(o#<a5\"H^ubLhQ72qh:vp|PdAvLM,z\">N:&%!@j01tpmv2ygaalu4lbioiis43-hx3wr-ackyl5w38je-9empd71ch4cl.neon.tech/eFffOlBTrz16jBlSz6dLnrfMn05NZRI4PbHnC0L8Al-Az8ol"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
