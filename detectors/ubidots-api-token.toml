# Docs: https://docs.ubidots.com/v1.6/reference/how-ubidots-works
# Format: BBFF- prefix followed by 40 alphanumeric characters
# Verify: GET /api/v1.6/devices with X-Auth-Token header returns device list
# Prefix: BBFF-

[detector]
id = "ubidots-api-token"
name = "Ubidots API Token"
service = "ubidots"
severity = "high"
# "auth_token", "X-Auth-Token" removed: over-broad generic prefilter(s) the regex does NOT need — every
# pattern requires the service name as a leading anchor (kept). Recall-neutral.
keywords = ["BBFF-", "ubidots"]

[[detector.patterns]]
regex = 'BBFF-[a-zA-Z0-9]{40}'
description = "Ubidots API token (BBFF- prefix)"

[[detector.tests]]
test_positive = "BBFF-XQ8OBlzu2R0HzEBkpYHfJouztyi1Yx41cHgw5Tvm"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
