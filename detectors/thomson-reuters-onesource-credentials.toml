# Docs: https://developers.thomsonreuters.com/pages/api-catalog/a4247340-69e0-48cf-b60e-832187e09b2e
# Format: OAuth 2.0 Client ID and Client Secret (M2M credentials)
# Verify: POST /oauth/token with client_credentials grant
# Prefix: none (requires context anchoring)

[detector]
id = "thomson-reuters-onesource-credentials"
name = "Thomson Reuters ONESOURCE Credentials"
service = "thomson-reuters-onesource"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# "client_id", "client_secret" removed: over-broad generic prefilter(s) the regex does NOT need, every
# pattern requires the service name as a leading anchor (kept), present in any real
# match and thus also the keyword_nearby signal. Verified recall-neutral.
keywords = ["ONESOURCE", "onesource", "thomson_reuters"]

[[detector.patterns]]
regex = "(?:ONESOURCE|onesource|THOMSON_REUTERS|thomson_reuters)[._]?(?:CLIENT|client)[._]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9_-]{16,})"
description = "Thomson Reuters ONESOURCE OAuth client ID with context anchor"
group = 1

[[detector.companions]]
name = "onesource_client_secret"
regex = "(?:ONESOURCE|onesource|THOMSON_REUTERS|thomson_reuters)[._]?(?:CLIENT|client)[._]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
within_lines = 5

[[detector.tests]]
test_positive = "THOMSON_REUTERS_client.ID'=    : : :\" = jzlQoG8xuMsBEChPSNDSAYVkMiuYMV1x2g7mJA"
test_negative = "THOMSON_REUTERS_client.ID'=    : : :\" = YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
