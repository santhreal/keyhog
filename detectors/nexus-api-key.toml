# Docs: https://help.sonatype.com/repomanager3/security/security-concepts
# Format: 64-character hexadecimal string or username:password format
# Verify: GET /service/rest/v1/status with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "nexus-api-key"
name = "Nexus Repository API Key"
service = "nexus"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["NEXUS", "nexus", "NEXUS_API_KEY", "NXRM"]

[[detector.patterns]]
regex = "(?i)nexus[_.-]?(?:api[_.-]?)?key[=:\\s\"']+([a-f0-9]{64})"
description = "Nexus Repository Manager API key (64 hex chars)"
group = 1

[[detector.patterns]]
regex = "(?i)nexus[_.\\s-]*username[=:\\s\"']+\\S+\\s*nexus[_.\\s-]*(?:password|api[_.-]?key)[=:\\s\"']+([a-fA-F0-9]{32,64})"
description = "Nexus credentials with API key/password"
group = 1

[[detector.tests]]
test_positive = "NEXUS_API_KEY=926820561f663070c952112c7f4f5fa46b37c427601aa7dc9e98614469cca8c1"
test_negative = "NEXUS_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
