# Docs: https://developer.genesys.cloud/authorization/platform-api/creating-oauth-client
# Format: Client ID and Client Secret pair (UUID format)
# Verify: POST /oauth/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "genesys-cloud-credentials"
name = "Genesys Cloud Client Credentials"
service = "genesys"
severity = "critical"
keywords = ["GENESYS", "genesys_cloud", "genesyscloud", "purecloud"]

[[detector.patterns]]
regex = "(?i)(?:genesys(?:_cloud)?|purecloud)[_\\s]?client[_\\s]?(?:id|key)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})\\b"
description = "Genesys Cloud Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:genesys(?:_cloud)?|purecloud)[_\\s]?client[_\\s]?(?:secret|key)[=:\\s\"'']+([a-f0-9]{32,})\\b"
description = "Genesys Cloud Client Secret with context anchor"
group = 1

[[detector.companions]]
name = "genesys_client_pair"
regex = "(?i)(?:genesys(?:_cloud)?|purecloud)[_\\s]?client[_\\s]?secret[=:\\s\"'']+([a-f0-9]{32,})\\b"
within_lines = 5

[[detector.tests]]
test_positive = "GENESYS_CLIENT_ID=2963950e-3ed2-e3dc-49d5-740982bac6a9"
test_negative = "GENESYS=short"
