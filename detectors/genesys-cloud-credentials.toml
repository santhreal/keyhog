# Docs: https://developer.genesys.cloud/authorization/platform-api/creating-oauth-client
# Format: Client ID and Client Secret pair (UUID format)
# Verify: POST /oauth/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "genesys-cloud-credentials"
name = "Genesys Cloud Client Credentials"
service = "genesys"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["GENESYS", "genesys_cloud", "genesyscloud", "purecloud"]
# Explicitly reject the canonical nil UUID fixture while preserving real
# service-owned UUID client IDs. This detector-local value allowlist is narrower
# than the generic UUID suppression used by weak anchors.
allowlist_values = ["^0{8}-0{4}-0{4}-0{4}-0{12}$"]

[[detector.patterns]]
regex = "(?i)genesys[_\\s]client[_\\s]?(?:id|key)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})\\b"
description = "Genesys Cloud Client ID with Genesys context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)genesys_cloud[_\\s]?client[_\\s]?(?:id|key)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})\\b"
description = "Genesys Cloud Client ID with explicit Genesys Cloud context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)purecloud[_\\s]?client[_\\s]?(?:id|key)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})\\b"
description = "Genesys Cloud Client ID with PureCloud context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)genesys[_\\s]client[_\\s]?(?:secret|key)[=:\\s\"'']+([a-f0-9]{32,})\\b"
description = "Genesys Cloud Client Secret with Genesys context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)genesys_cloud[_\\s]?client[_\\s]?(?:secret|key)[=:\\s\"'']+([a-f0-9]{32,})\\b"
description = "Genesys Cloud Client Secret with explicit Genesys Cloud context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)purecloud[_\\s]?client[_\\s]?(?:secret|key)[=:\\s\"'']+([a-f0-9]{32,})\\b"
description = "Genesys Cloud Client Secret with PureCloud context anchor"
group = 1

[[detector.companions]]
name = "genesys_client_pair"
regex = "(?i)(?:genesys(?:_cloud)?|purecloud)[_\\s]?client[_\\s]?secret[=:\\s\"'']+([a-f0-9]{32,})\\b"
within_lines = 5

[[detector.tests]]
test_positive = "GENESYS_CLIENT_ID=2963950e-3ed2-e3dc-49d5-740982bac6a9"
test_negative = "GENESYS=short"
