# Docs: https://docs.bitquery.io/
# Format: 32 character hexadecimal string
# Verify: POST to graphql endpoint with X-API-KEY header, returns 200 if valid
# Prefix: none (32 char hex, requires context anchoring)

[detector]
id = "bitquery-api-key"
name = "Bitquery API Key"
service = "bitquery"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
# "api_key", "apikey" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["bitquery", "BITQUERY"]

[[detector.patterns]]
regex = "(?:BITQUERY|bitquery)[_a-zA-Z0-9]*[=:\\s\"'']+([a-f0-9]{32})"
description = "Bitquery API key with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "https://graphql.bitquery.io"
allowed_domains = ["graphql.bitquery.io"]
body = '{"query": "{ bitcoin { blocks { count } } }"}'

[detector.verify.auth]
type = "header"
name = "X-API-KEY"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "BITQUERY_API_KEY=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
test_negative = "BITQUERY_API_KEY=short"
