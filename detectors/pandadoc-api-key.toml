# Docs: https://developers.pandadoc.com/reference/authentication
# Format: API key - 64 character hexadecimal string
# Verify: GET https://api.pandadoc.com/public/v1/documents with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "pandadoc-api-key"
name = "PandaDoc API Key"
service = "pandadoc"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["PANDADOC_API_KEY", "PANDADOC_KEY", "pandadoc_api_key", "Authorization: API-Key"]

[[detector.patterns]]
regex = '''(?:PANDADOC|pandadoc)[_\-\s]*(?:API[_\-\s]*KEY|KEY)[=:\s"'']+([a-f0-9]{64})'''
description = "PandaDoc API key (64 hex characters)"
group = 1

[[detector.patterns]]
regex = "API-Key [a-f0-9]{64}"
description = "PandaDoc API key in Authorization header"

[detector.verify]
method = "GET"
url = "https://api.pandadoc.com/public/v1/documents"
allowed_domains = ["api.pandadoc.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "API-Key {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "PANDADOC_API_KEY=9a6d3f4b584413eda52b0e42239102d605f5c8d843fdcbe6891a202d4a1432e9"
test_negative = "PANDADOC_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
