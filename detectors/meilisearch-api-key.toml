# Docs: https://www.meilisearch.com/docs/learn/security/master_api_keys
# Format: Alphanumeric string, typically 36+ characters (no fixed prefix)
# Verify: GET /health with Authorization: Bearer header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "meilisearch-api-key"
name = "Meilisearch API Key"
service = "meilisearch"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["MEILISEARCH_API_KEY", "MEILISEARCH_MASTER_KEY", "meilisearch_api_key", "meilisearch_master_key"]

[[detector.patterns]]
regex = '''(?:MEILISEARCH[_\-\s]*(?:API|MASTER|ADMIN)[_\-\s]*KEY|meilisearch[_\-\s]*(?:api|master|admin)[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{16,})'''
description = "Meilisearch API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "MEILISEARCH_API_KEY=zbNdq6Fp78ZTADck"
test_negative = "MEILISEARCH_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
