# Docs: https://www.weatherbit.io/api
# Format: API key passed as 'key' parameter
# Verify: GET /v2.0/current with key parameter returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "weatherbit-api-key"
name = "Weatherbit API Key"
service = "weatherbit"
severity = "medium"
keywords = ["WEATHERBIT", "weatherbit", "WEATHERBIT_API_KEY"]

[[detector.patterns]]
regex = "(?:WEATHERBIT|weatherbit)[_\\s]*(?:API[_\\s]*)?KEY[=:\\s\"'']+([a-zA-Z0-9]{20,})"
description = "Weatherbit API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:key|KEY)[=:\\s\"'']+([a-zA-Z0-9]{20,})[^a-zA-Z0-9].*weatherbit"
description = "Weatherbit key parameter with URL context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.weatherbit.io/v2.0/current?city=London&key={{match}}"
allowed_domains = ["api.weatherbit.io"]

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "WEATHERBIT  __ __    _     __ _  _ _    _ _             _                _     __          _     __      API  _    _   KEY=\":=do7f9H1T085pk2OEzhOjdnH7SnHwHU1dhKaY28nS61FJjZWxUvfnK1xk9Jh"
test_negative = "WEATHERBIT  __ __    _     __ _  _ _    _ _             _                _     __          _     __      API  _    _   KEY=\":=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
