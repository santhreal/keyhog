# Docs: https://www.twilio.com/docs/iot/supersim/api
# Format: Account SID, Auth Token, and Super SIM specific credentials
# Verify: GET /v1/Sims with Basic auth returns 200 if valid
# Prefix: AC for Account SID, PK for API Key

[detector]
id = "twilio-iot-credentials"
name = "Twilio IoT Credentials"
service = "twilio-iot"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["TWILIO_IOT", "twilio_iot", "SuperSim", "SUPERSIM", "wireless.twilio"]

[[detector.patterns]]
regex = '''TWILIO[_\-\s]*IOT[._-]?ACCOUNT[_\-\s]*SID[=:\s"'']+(AC[a-f0-9]{32})'''
description = "Twilio IoT Account SID with context anchor"
group = 1

[[detector.patterns]]
regex = '''SUPERSIM[._-]?API[_\-\s]*KEY[=:\s"'']+(PK[a-f0-9]{32})'''
description = "Twilio Super SIM API key"
group = 1

[[detector.patterns]]
regex = "wireless\\.twilio\\.com"
description = "Twilio Wireless/IoT API endpoint"

# Auth token companion paired with the Account SID match. Auto-detected
# capture group resolves `{{companion.twilio_iot_auth_token}}` to just the
# 32-hex value. The verify spec previously referenced `companion.secret`
# which was never declared - every probe shipped the literal string as
# the basic-auth password and 401'd.
[[detector.companions]]
name = "twilio_iot_auth_token"
# Companion regexes compile case-sensitively, so make only the config-key
# anchor caseless. The hexadecimal credential body keeps its declared alphabet.
regex = '''(?i:TWILIO[_\-\s]*IOT[._-]?AUTH[_\-\s]*TOKEN)[=:\s"'']+([a-f0-9]{32})'''
within_lines = 5
required = true

[detector.verify]
method = "GET"
url = "https://wireless.twilio.com/v1/Sims"
allowed_domains = ["wireless.twilio.com"]

[detector.verify.auth]
type = "basic"
username = "match"
password = "companion.twilio_iot_auth_token"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "TWILIO_IOT_ACCOUNT_SID=AC2c4e6d8a1b3f5e7c9d2a4b6e8f1c3d5a\nTWILIO_IOT_AUTH_TOKEN=8d3e5b7c9a1f2e4d6c8b0d2a4c6e8f1b"
test_negative = "TWILIO_IOT_ACCOUNT_SID=AC2c4e6d8a1b3f5e7c9d2a4b6e8f1c3d5a"

[[detector.tests]]
test_positive = "twilio_iot_account_sid=AC2c4e6d8a1b3f5e7c9d2a4b6e8f1c3d5a\ntwilio_iot_auth_token=8d3e5b7c9a1f2e4d6c8b0d2a4c6e8f1b"
