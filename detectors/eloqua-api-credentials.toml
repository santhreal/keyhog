# Docs: https://docs.oracle.com/en/cloud/saas/marketing/eloqua-develop/pdf/OracleEloqua_DeveloperGuide.pdf
# Format: Site name, username, and password used in Basic Auth (siteName\\username:password)
# Verify: GET /api/REST/2.0/system/cloud with Basic Auth returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "eloqua-api-credentials"
name = "Oracle Eloqua API Credentials"
service = "eloqua"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["eloqua", "ELOQUA", "site_name", "company_name"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_\-\s]*(?:SITE|site)?[_\-\s]*(?:NAME|name)?[=: ]+([a-zA-Z0-9_-]+)'
description = "Eloqua Site/Company Name"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_\-\s]*(?:USERNAME|user[_\-\s]*name|USER|user)[=: ]+([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+)'
description = "Eloqua username/email"
group = 1

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_\-\s]*(?:PASS(?:WORD)?|pass(?:word)?)[=: ]+([^ ]{8,})'
description = "Eloqua password"
group = 1

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_\-\s]*(?:CLIENT[_\-\s]*ID|client[_\-\s]*id)[=: ]+([a-zA-Z0-9_-]{10,})'
description = "Eloqua OAuth Client ID"
group = 1

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_\-\s]*(?:CLIENT[_\-\s]*SECRET|client[_\-\s]*secret)[=: ]+([a-zA-Z0-9_-]{10,})'
description = "Eloqua OAuth Client Secret"
group = 1

[[detector.tests]]
test_positive = "ELOQUA_SITE_NAME=Kp4Qx7Rm2Sn5Tb8V"
test_negative = "site_name=short"
