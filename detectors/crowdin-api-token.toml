# Docs: https://developer.crowdin.com/api/v2/#section/Authentication
# Format: Personal access token (40 hex characters) or OAuth token
# Verify: GET /api/v2/user with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "crowdin-api-token"
name = "Crowdin API Token"
service = "crowdin"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
min_confidence = 0.2
keywords = ["CROWDIN", "CROWDIN_API_KEY", "CROWDIN_TOKEN", "crowdin.com"]
# Weak-anchor: the vendor prefix does not tightly bound the captured value (it
# collides with a generic hex/base64 run), so scanner suppression keeps the
# generic shape/entropy gates ENGAGED through this detector-owned flag.
weak_anchor = true

[[detector.patterns]]
regex = """(?i)crowdin[_.-]?(?:api[_.-]?)?(?:key|token)["']?[=:\\s\"']+([a-f0-9]{40})"""
description = "Crowdin API token with context anchor (personal access token)"
group = 1

[[detector.patterns]]
regex = """crowdin\\.com.*[=:\\s\"']+([a-f0-9]{40})"""
description = "Crowdin API token with domain context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.crowdin.com/api/v2/user"
allowed_domains = ["api.crowdin.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "CROWDIN_API_TOKEN = 3b70df2c347b7e02b642198793dc0b8a9827bb4c"
test_negative = "crowdin token abcdef"
