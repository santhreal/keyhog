# Docs: https://docs.polygonpos.technology/
# Format: Polygon RPC endpoints use API keys in URL path or x-api-key header
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "polygon-api-credentials"
name = "Polygon API Credentials"
service = "polygon"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["polygon", "POLYGON", "matic", "MATIC", "polygon-rpc", "polygonscan"]

[[detector.patterns]]
regex = '(?:polygon|POLYGON|matic|MATIC)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+\.g\.alchemy\.com/v2/[a-zA-Z0-9_-]+)'
description = "Polygon RPC URL with Alchemy API key"
group = 1

[[detector.patterns]]
regex = '(?:polygon|POLYGON|matic|MATIC)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/v2/[a-zA-Z0-9_-]+)'
description = "Polygon RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:polygon|POLYGON|matic|MATIC)[._-]?(?:api|API)[._-]?key[=:"	\s]+([a-f0-9]{32})'
description = "Polygon API key (32 hex characters)"
group = 1

[[detector.tests]]
test_positive = "polygonapikey=1a9679ce735bc2524b5591c5d933feb2"
test_negative = "polygonapikey=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
