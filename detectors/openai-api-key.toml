# Docs: https://platform.openai.com/docs/quickstart/step-2-set-up-your-api-key
# Format: Project keys start with 'sk-proj-' plus 100+ chars; service-account
#         keys 'sk-svcacct-' and admin keys 'sk-admin-' share the same url-safe
#         body (…T3BlbkFJ… infix); legacy keys 'sk-' plus 48 alphanumeric chars.
# Verify: Bearer token sent to api.openai.com/v1/models, returns 200 on success
# Prefix: sk-proj-, sk-svcacct-, sk-admin-, sk-

[detector]
id = "openai-api-key"
name = "OpenAI API Key"
service = "openai"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
decode_transforms = { reverse_prefixes = ["sk-proj-", "sk-svcacct-", "sk-admin-", "sk-"], caesar_prefixes = ["sk-proj-", "sk-svcacct-", "sk-admin-", "sk-"] }
keywords = ["sk-proj-", "sk-svcacct-", "sk-admin-", "sk-"]
simdsieve_prefixes = ["sk-proj-"]

[[detector.patterns]]
regex = 'sk-proj-[a-zA-Z0-9_-]{40,164}'
description = "OpenAI project API key (sk-proj-)"

[[detector.patterns]]
# Service-account keys (sk-svcacct-), introduced after the proj- form and
# absent from the original detector, so every `sk-svcacct-…` key fell through
# to the generic path and scored as a false-negative on betterleaks' own
# openai fixtures (home-turf bench, DET-17). Same url-safe body as proj keys;
# the distinctive 11-char prefix keeps FP risk negligible.
regex = 'sk-svcacct-[a-zA-Z0-9_-]{40,200}'
description = "OpenAI service-account API key (sk-svcacct-)"

[[detector.patterns]]
# Admin keys (sk-admin-) (same story as sk-svcacct- above).
regex = 'sk-admin-[a-zA-Z0-9_-]{40,200}'
description = "OpenAI admin API key (sk-admin-)"

[[detector.patterns]]
# Trailing `\b`: the legacy key is EXACTLY 48 chars after `sk-`. A longer
# contiguous alphanumeric run is not a valid legacy key, so the regex fails
# closed rather than reporting the 48-char prefix of a longer token (the
# self-delimiting-token contract shared with github-classic-pat / aws-access-key).
regex = 'sk-[a-zA-Z0-9]{48}\b'
description = "OpenAI legacy API key (exactly 48 chars after sk-)"

[detector.verify]
method = "GET"
url = "https://api.openai.com/v1/models"
allowed_domains = ["api.openai.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "sk-9X3kQp7VbT2hYRzNcMfWj4DgEsLuHaIoBnVkPxKqRtYwM8vZ"
test_negative = "sk-too-short"
