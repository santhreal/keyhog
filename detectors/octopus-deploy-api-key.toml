# Docs: https://octopus.com/docs/octopus-rest-api/getting-started
# Format: API-XXXXXXXXXXXXXXXXXX - starts with "API-" prefix followed by alphanumeric
# Verify: GET /api with X-Octopus-ApiKey header returns 200 if valid
# Prefix: API-

[detector]
id = "octopus-deploy-api-key"
name = "Octopus Deploy API Key"
service = "octopus-deploy"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["API-", "OCTOPUS_API_KEY", "X-Octopus-ApiKey"]

[[detector.patterns]]
# `(?-i)` forces case-sensitive matching (keyhog compiles every regex
# case-insensitive by default), so the prefix must be the UPPERCASE `API-`
# of a real Octopus key, not a lowercase `api-` word. The body must also
# contain at least one digit: Octopus keys are base-36-style and digit-dense
# (e.g. API-7X68S9206QLQW4S2FVP), whereas generic uppercase tokens such as
# `API-DOCUMENTATION` / `API-REFERENCE` / `API-RESPONSE` are pure letters and
# previously matched the bare `API-[A-Z0-9]{16,}` pattern as false positives.
regex = "(?-i)API-[A-Z0-9]{0,15}[0-9][A-Z0-9]{15,}"
description = "Octopus Deploy API key with API- prefix"

[[detector.patterns]]
regex = '''(?:OCTOPUS[_\-\s]*API[_\-\s]*KEY|OCTOPUS[_\-\s]*KEY)[=:\s"'']+((?-i:API-[A-Z0-9]{0,15}[0-9][A-Z0-9]{15,}))'''
description = "Octopus Deploy API key with context anchor"
group = 1

[[detector.patterns]]
regex = "X-Octopus-ApiKey[=:\\s\"'']+((?-i:API-[A-Z0-9]{0,15}[0-9][A-Z0-9]{15,}))"
description = "Octopus Deploy X-Octopus-ApiKey header"
group = 1

[[detector.tests]]
test_positive = "API-7X68S9206QLQW4S2FVP"
test_negative = "OCTOPUS_API_KEY=api-7x68s9206qlqw4s2fvp"
