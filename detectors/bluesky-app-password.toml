# Docs: https://docs.bsky.app/docs/get-started
# Format: App passwords are 4 groups of 4 lowercase letters/digits separated by dashes
# Verify: com.atproto.server.createSession endpoint with password
# Prefix: none (app password format with dashes)

[detector]
id = "bluesky-app-password"
name = "Bluesky App Password"
service = "bluesky"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
keywords = ["bluesky", "BLUESKY", "bsky", "app_password"]

[[detector.patterns]]
regex = '''(?:bluesky|BLUESKY|bsky|app[_\-\s]*password)[=:\s"\']+([a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4})'''
description = "Bluesky app password with context anchor (4-4-4-4 format)"
group = 1

[[detector.tests]]
test_positive = "bluesky=kp4q-x7rm-2sn5-tb8v"
test_negative = "bluesky=short"
