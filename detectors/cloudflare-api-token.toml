# Docs: https://developers.cloudflare.com/fundamentals/api/get-started/create-token/
# Format: 40 character alphanumeric with underscores and hyphens (e.g., 8a7b6c5d4e3f...)
# Verify: GET /client/v4/user/tokens/verify with Bearer auth returns 200 if valid
# Prefix: none (generic base64-like, requires keyword context)

[detector]
id = "cloudflare-api-token"
name = "Cloudflare API Token"
service = "cloudflare"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# DET-18 floor override: vendor anchor is distinctive; the body scores below the
# 0.40 global floor on entropy alone, dropping a real token as a false negative
# (SecretBench mirror floor-gate analysis). FP risk bounded by the anchor.
min_confidence = 0.28
keywords = ["cloudflare", "CLOUDFLARE", "CF_API_TOKEN", "cloudflareApiToken"]

[[detector.patterns]]
regex = '''(?i)(?:cloudflare[_.-]?api[_.-]?token|cf[_.-]?api[_.-]?token|cloudflareApiToken)\s*[=:]\s*["']?([a-zA-Z0-9_-]{40})["']?'''
required_literals = ["token"]
description = "Cloudflare API token with case-insensitive context anchor."
group = 1

[[detector.patterns]]
regex = '''CF_API_TOKEN[=:\s"']+([a-zA-Z0-9_-]{40})'''
description = "Cloudflare API token from CF_API_TOKEN env var."
group = 1

[detector.verify]
method = "GET"
url = "https://api.cloudflare.com/client/v4/user/tokens/verify"
allowed_domains = ["api.cloudflare.com"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "$.success"
equals = "true"

[[detector.verify.metadata]]
name = "status"
json_path = "$.result.status"
sensitivity = "public"

[[detector.tests]]
test_positive = "CF_API_TOKEN=AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
test_negative = "CF_API_TOKEN=short"
