# Docs: https://docs.goldsky.com/
# Format: 32 character hexadecimal string
# Verify: no public verification endpoint
# Prefix: none (32 char hex, requires context anchoring)

[detector]
id = "goldsky-api-key"
name = "Goldsky API Key"
service = "goldsky"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
# "api_key", "apikey" removed: over-broad generic prefilter the regex does NOT need, every
# pattern self-anchors on the service name (kept), which is present in any real
# match and so also carries the case-sensitive keyword_nearby signal. Recall-neutral.
keywords = ["goldsky", "GOLDSKY"]

[[detector.patterns]]
regex = "(?:GOLDSKY|goldsky)[_a-zA-Z0-9]*[=:\\s\"'']+([a-f0-9]{32})"
description = "Goldsky API key with context anchor"
group = 1

[[detector.tests]]
test_positive = "GOLDSKY=d659b9c912fa62843c5d8226bcb17ea0"
test_negative = "GOLDSKY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
