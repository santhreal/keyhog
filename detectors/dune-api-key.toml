# Docs: https://docs.dune.com/api-reference/overview/authentication
# Format: 32 character hexadecimal string
# Verify: GET /api/v1/user with x-dune-api-key header, returns 200 if valid
# Prefix: none (32 char hex, requires context anchoring)

[detector]
id = "dune-api-key"
name = "Dune Analytics API Key"
service = "dune"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["dune", "DUNE", "x-dune-api-key", "DUNE_API_KEY"]

[[detector.patterns]]
regex = '''(?:DUNE|dune)[_=:\s"'']+(?:api[_\-\s]*)?key[=:\s"'']+([a-f0-9]{32})'''
description = "Dune Analytics API key with context anchor"
group = 1

[[detector.patterns]]
regex = "x-dune-api-key[=:\\s\"'']+([a-f0-9]{32})"
description = "Dune API key in header format"
group = 1

[detector.verify]
method = "GET"
url = "https://api.dune.com/api/v1/user"
allowed_domains = ["api.dune.com"]

[detector.verify.auth]
type = "header"
name = "x-dune-api-key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "dune_api_key=466426fae9480469a7737ec218a5dca3"
test_negative = "dune_api_key=short"
