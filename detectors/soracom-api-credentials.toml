# Docs: https://developers.soracom.io/en/docs/api/
# Format: AuthKeyId and AuthKey for SORACOM API authentication
# Verify: POST /auth with API credentials returns 200 if valid
# Prefix: keyId-

[detector]
id = "soracom-api-credentials"
name = "SORACOM API Credentials"
service = "soracom"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["SORACOM", "soracom", "SORACOM_API", "keyId-"]

[[detector.patterns]]
regex = '''(?:SORACOM|soracom)[._-]?AUTH[_\-\s]*KEY[_\-\s]*ID[=:\s"'']+(keyId-[a-zA-Z0-9]{8}-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{12})'''
description = "SORACOM AuthKeyId with context anchor"
group = 1

[[detector.patterns]]
regex = "(keyId-[a-zA-Z0-9]{8}-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{12})"
description = "SORACOM AuthKeyId (keyId- prefix)"
group = 1

[[detector.patterns]]
regex = '''(?:SORACOM|soracom)[._-]?AUTH[_\-\s]*KEY[=:\s"'']+([a-zA-Z0-9+/]{40,60}=*)'''
description = "SORACOM AuthKey secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "keyId-fWeqR7Ch-gpIA-kP1f-hatI-fNcS7cg8NnPp"
test_negative = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
