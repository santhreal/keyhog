# Docs: https://www.ns1.com/api
# Format: API key passed in X-NSONE-Key header, typically 32-64 character alphanumeric
# Verify: GET /v1/account/settings with X-NSONE-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "ns1-api-key"
name = "NS1 API Key"
service = "ns1"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["NS1", "ns1", "NSONE", "nson", "X-NSONE-Key", "X-NS1-Key"]

[[detector.patterns]]
regex = '''(?:NS1|ns1|NSONE|nsone)(?:_API)?[_\-\s]*(?:KEY|key)[=:\s"']+([a-zA-Z0-9_-]{32,64})'''
description = "NS1 API key with context anchor"
group = 1

[[detector.patterns]]
regex = "X-NSONE-Key[=:\\s\"']+([a-zA-Z0-9_-]{32,64})"
description = "NS1 API key in X-NSONE-Key header format"
group = 1

[detector.verify]
method = "GET"
url = "https://api.nsone.net/v1/account/settings"
allowed_domains = ["api.nsone.net"]

[detector.verify.auth]
type = "header"
name = "X-NSONE-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "name"
json_path = "$.name"
sensitivity = "hashed"

[[detector.verify.metadata]]
name = "email"
json_path = "$.email"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "NS1_API_KEY=LMg_4h12QvVuiYMIkeb9azkXGNDu3GdphrBLzm4h"
test_negative = "NS1_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
