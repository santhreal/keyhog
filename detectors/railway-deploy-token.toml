# Docs: https://docs.railway.com/integrations/github-actions
# Format: RAILWAY_TOKEN environment variable with UUID v4 format
# Verify: POST /graphql/v2 with Authorization: Bearer token returns 200 with me { id }
# Prefix: none (UUID format, requires keyword context)

[detector]
id = "railway-deploy-token"
name = "Railway Deploy Token"
service = "railway"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["RAILWAY_TOKEN", "railway_token", "RAILWAY", "railway"]

[[detector.patterns]]
regex = "(?:RAILWAY|railway)[_\\-\\s]*(?:DEPLOY|deploy)?[_\\-\\s]*(?:TOKEN|token)[=:\\s\"'\\']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Railway deploy token with context anchor (UUID v4 format)"
group = 1

[[detector.patterns]]
regex = "(?:RAILWAY_TOKEN|railway_token)[=:\\s\"'\\']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Railway deploy token from environment variable"
group = 1

[detector.verify]
method = "POST"
url = "https://backboard.railway.app/graphql/v2"
allowed_domains = ["backboard.railway.app"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "user_id"
json_path = "$.data.me.id"
sensitivity = "hashed"

[[detector.tests]]
test_positive = "RAILWAY_TOKEN=5b6f0b69-5f6b-8bfc-2209-8840057e3182"
test_negative = "RAILWAY_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
