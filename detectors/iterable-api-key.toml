# Docs: https://api.iterable.com/api/docs
# Format: 32-character hex string or UUID-like format
# Verify: GET /api/users/me with Api-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "iterable-api-key"
name = "Iterable API Key"
service = "iterable"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["ITERABLE", "iterable", "ITERABLE_API_KEY"]

[[detector.patterns]]
regex = "(?:ITERABLE|iterable)[._-]?(?:API|api)?[._-]?(?:KEY|key)?[=:\\s\"'']+([a-f0-9]{32})"
description = "Iterable API key (32 hex characters, Iterable-anchored)"
group = 1

# The bare `(?:Api-Key|api-key)[=:]<32hex>` HTTP-header pattern was
# dropped 2026-05-29. `Api-Key` is a generic HTTP header used by
# Iterable, Heroku Connect, Lighthouse, SuperOffice, Brevo, Mailgun,
# OneSignal, Postmark, Sendinblue, Resend, and dozens of others -
# attributing every 32-hex body following an `Api-Key:` header to
# Iterable is wrong by construction. Mirror v23 traced 71 FPs to this
# single pattern. Every Iterable contract positive / evasion anchors
# on `ITERABLE`, so the surviving pattern still catches everything the
# contract enforces.

[detector.verify]
method = "GET"
url = "https://api.iterable.com/api/users/me"
allowed_domains = ["api.iterable.com"]

[detector.verify.auth]
type = "header"
name = "Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ITERABLE=425d50e126cedeee2e523de4e609df80"
test_negative = "ITERABLE=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
