# Docs: https://api.iterable.com/api/docs
# Format: 32-character hex string or UUID-like format
# Verify: GET /api/users/me with Api-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "iterable-api-key"
name = "Iterable API Key"
service = "iterable"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ITERABLE", "iterable", "ITERABLE_API_KEY"]

[[detector.patterns]]
regex = "(?:ITERABLE|iterable)[._-]?(?:API|api)?[._-]?(?:KEY|key)?[=:\\s\"'']+([a-f0-9]{32})"
description = "Iterable API key (32 hex characters, Iterable-anchored)"
group = 1

# The bare `(?:Api-Key|api-key)[=:]<32hex>` HTTP-header pattern was
# dropped 2026-05-29. `Api-Key` is a generic HTTP header used by
# Iterable, Heroku Connect, Lighthouse, SuperOffice, Brevo, Mailgun,
# OneSignal, Postmark, Sendinblue, Resend, and dozens of others -
# attributing every 32-hex body following an `Api-Key:` header to
# Iterable is wrong by construction. Mirror v23 traced 71 FPs to this
# single pattern. Every Iterable contract positive / evasion anchors
# on `ITERABLE`, so the surviving pattern still catches everything the
# contract enforces.

[detector.verify]
method = "GET"
url = "https://api.iterable.com/api/users/me"
allowed_domains = ["api.iterable.com"]

[detector.verify.auth]
type = "header"
name = "Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ITERABLE=425d50e126cedeee2e523de4e609df80"
test_negative = "ITERABLE=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
