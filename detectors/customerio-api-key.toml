# Docs: https://customer.io/docs/api/track/#section/Authentication
# Format: Site ID (alphanumeric) and API Key (base64 string starting with specific prefixes)
# Verify: GET /v1/accounts/region with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "customerio-api-key"
name = "Customer.io API Key"
service = "customerio"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["CUSTOMER_IO", "CUSTOMERIO", "CIO_SITE_ID", "CIO_API_KEY", "customer.io"]

[[detector.patterns]]
regex = "(?:CUSTOMERIO|CUSTOMER_IO|customerio|customer_io)[._-]?(?:SITE|site)[._-]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9]{20,40})"
description = "Customer.io Site ID"
group = 1

[[detector.patterns]]
regex = "(?:CUSTOMERIO|CUSTOMER_IO|customerio|customer_io)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Customer.io API Key"
group = 1

[[detector.patterns]]
regex = "(?:CIO|cio)[._-]?(?:SITE|site)[._-]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9]{20,40})"
description = "Customer.io Site ID (CIO_ prefix format)"
group = 1

[[detector.patterns]]
regex = "(?:CIO|cio)[._-]?(?:API|api)[._-]?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Customer.io API Key (CIO_ prefix format)"
group = 1

[detector.verify]
method = "GET"
url = "https://track.customer.io/api/v1/accounts/region"
allowed_domains = ["track.customer.io"]

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "region"
json_path = "$.region"
sensitivity = "public"

[[detector.tests]]
test_positive = "CIO_SITE_ID=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
test_negative = "CIO_SITE_ID=short"
