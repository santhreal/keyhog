# Bearer Authorization credential: `Authorization: Bearer <token>` (RFC 6750).
#
# Why this detector:
#   On the Samsung/CredData benchmark the "Bearer Authorization" class is ~75
#   labeled positives whose value is the opaque token following the `Bearer`
#   scheme keyword (`Authorization: Bearer <token>`, `- Bearer <40-hex>`,
#   `"Bearer r7yzGzH0SW5Xtx1lMFQ5xA6pCS0fZLJlG8P6"`). keyhog was WHOLLY BLIND to
#   this class (recalled 0 of 75), there was a `basic-auth-credentials` detector
#   for the sibling `Basic <base64>` scheme but none for `Bearer`, and the
#   dominant token shape is a 36-40 char hex/alphanumeric string that the generic
#   entropy/shape pipeline suppresses as a bare hash digest. The `Bearer` keyword
#   in an Authorization context is unambiguous credential evidence, so this
#   surfaces the token that the hash-digest suppression otherwise drops.
#
# Why it is STRONG-anchor (structural-password-slot family):
#   The token lives in a structurally fixed slot, after the `Bearer` scheme
#   keyword and whitespace. We capture ONLY that slot (group 1). The real tokens
#   are high-entropy but their SHAPE (bare 40-hex, 32-char base64url) is exactly
#   what the Tier-B hash-digest / random-byte arms suppress; a JWT bearer
#   (`Bearer eyJ...`) is already covered by `jwt-token` and dedup'd by value. So
#   this detector is deliberately strong-anchor (NOT in the `weak_anchor` list):
#   the suppression pipeline skips the Tier-B randomness/digest floor
#   (`apply_tier_b=false`) via this detector's `structural_password_slot`, and
#   placeholder precision is restored WITHOUT that floor by:
#     * the value is `{16,}`: short placeholders (`token`, `secret`) never match;
#     * the regex char class excludes `<` `>`, so `Bearer <token>` templates and
#       `Bearer $TOKEN` markers never match (the `$` / `<` breaks the token run);
#     * the `dictionary_word_placeholder` gate (api.rs, structural-slot-only)
#       drops a value the English bigram model is CONFIDENT is a real word
#       (`Bearer password`, `Bearer yourtokenhere`) while keeping random tokens.
#
# Mirror safety:
#   The mirror corpus plants no `Bearer <random>` negatives (its bearer/JWT
#   positives are dedup'd by value against `jwt-token`), so re-surfacing this slot
#   cannot add a mirror FP. Verified on the CredData + mirror differential bench.
#
# Verify: no verification endpoint (the protected resource is host-specific).

[detector]
id = "bearer-authorization"
name = "Bearer Authorization Credentials"
service = "generic"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["Bearer", "bearer"]
# Strong-anchor free-form password slot: apply the placeholder-word gate, skip
# the Tier-B randomness floor (family declared per-detector, see DetectorSpec).
structural_password_slot = true

[[detector.patterns]]
# `Bearer <token>`: the scheme keyword, whitespace, then a 16+-char token.
#   - `\b` whole-word on `bearer` so `unbearable`/`overbearing` do not trip it.
#   - value: `[A-Za-z0-9._~+/\-]{16,}`: the RFC 6750 `token68` character set
#     (base64url + JWT `.` separators); `<` `>` `$` are absent from the class so
#     `Bearer <token>` / `Bearer $TOKEN` placeholders never match. The `16` floor
#     drops the short scheme placeholders (`token`, `secret`).
regex = '''(?i)\bbearer\s+([A-Za-z0-9._~+/\-]{16,})'''
description = "opaque token following the Bearer authorization scheme keyword"
group = 1

# No verify block (generic detector, protected resource is host-specific).

[[detector.tests]]
test_positive = "Authorization: Bearer a3f9c1e07b42d85f6098ac1de2f3b4c5d6e7f809"
test_negative = "Authorization: Bearer <access_token>"
