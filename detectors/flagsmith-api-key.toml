# Docs: https://docs.flagsmith.com/quickstart
# Format: ser. prefix followed by 40+ alphanumeric characters
# Verify: GET /api/v1/flags with X-Environment-Key header
# Prefix: ser.

[detector]
id = "flagsmith-api-key"
name = "Flagsmith API Key"
service = "flagsmith"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["ser.", "FLAGSMITH_KEY", "FLAGSMITH_API_KEY"]

# Defect #74: the original regex `ser\.[a-zA-Z0-9]{40,}` matched the
# substring `ser.` anywhere - INCLUDING `parser.handleSomethingLongMethod`
# (the `ser.` inside `parser.…`). Word-boundary anchor `\b` requires the
# `s` to start a new word (preceded by non-word char or string start),
# so `parser.foo` no longer matches but `KEY=ser.<token>` still does.
[[detector.patterns]]
regex = '\bser\.[a-zA-Z0-9]{40,}'
description = "Flagsmith server-side API key (ser. prefix, word-boundary anchored)"

[detector.verify]
method = "GET"
url = "https://edge.api.flagsmith.com/api/v1/flags"
allowed_domains = ["edge.api.flagsmith.com"]

[detector.verify.auth]
type = "header"
name = "X-Environment-Key"
template = "{{match}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "ser.Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz"
test_negative = "ser.short"
