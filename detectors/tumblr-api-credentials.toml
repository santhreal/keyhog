# Docs: https://www.tumblr.com/docs/en/api/v2
# Format: OAuth Consumer Key (50 alphanumeric chars) and Secret pair
# Verify: GET /v2/user/info with api_key query parameter
# Prefix: none (50 char alphanumeric, requires context anchoring)

[detector]
id = "tumblr-api-credentials"
name = "Tumblr API Credentials"
service = "tumblr"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["tumblr", "TUMBLR", "consumer_key", "oauth_consumer_key", "consumer_secret", "oauth_consumer_secret"]

[[detector.patterns]]
regex = '''(?i)(?:tumblr[._-]?(?:consumer[._-]?)?key|oauth[._-]?consumer[._-]?key|tumblr)[=:\s"\']+([a-zA-Z0-9]{50})(?:[^a-zA-Z0-9_-]|$)'''
description = "Tumblr OAuth Consumer Key with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?i)(?:tumblr[._-]?consumer[._-]?secret|oauth[._-]?consumer[._-]?secret|consumer[._-]?secret)[=:\s"\']+([a-zA-Z0-9]{50})(?:[^a-zA-Z0-9_-]|$)'''
description = "Tumblr OAuth Consumer Secret with context anchor"
group = 1

[[detector.companions]]
name = "tumblr_consumer_secret"
regex = '''(?i)(?:tumblr[._-]?consumer[._-]?secret|oauth[._-]?consumer[._-]?secret|consumer[._-]?secret)[=:\s"\']+([a-zA-Z0-9]{50})(?:[^a-zA-Z0-9_-]|$)'''
within_lines = 5

[[detector.tests]]
test_positive = "tumblr=0L7COzZC7L1Us4KFuA38IgMTNhea3Dgy8xyvfRc36MMFQif73h"
test_negative = "tumblr=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
