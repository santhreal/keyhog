# Docs: https://prometheus.io/docs/alerting/latest/configuration/
# Format: Basic auth credentials for Alertmanager web UI/API
# Verify: GET /-/healthy with Basic auth
# Prefix: none (requires context anchoring)

[detector]
id = "alertmanager-credentials"
name = "AlertManager Credentials"
service = "alertmanager"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55 }
min_confidence = 0.20
keywords = ["ALERTMANAGER_PASSWORD", "ALERTMANAGER_PASS", "alertmanager"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]
canonical_hex_key_material = [{ lengths = [32, 40, 48, 64] }]

[[detector.patterns]]
regex = '''(?:ALERTMANAGER|alertmanager)[_\-\s]*PASS(?:WORD)?[=:\s"\']+([a-zA-Z0-9!@#$%^&*._-]+)'''
description = "AlertManager password with context anchor"
group = 1
weak_anchor = true

[[detector.companions]]
name = "alertmanager_username"
regex = '''(?:ALERTMANAGER|alertmanager)[_\-\s]*USER(?:NAME)?[=:\s"\']+([a-zA-Z0-9_-]+)'''
within_lines = 5

# Verify intentionally omitted: alertmanager is self-hosted with no fixed
# cloud endpoint. The previous TOML had `type = "basic" / username = "match"
# / password = "companion"` written as bare keys following the companion
# block - they were never parsed as verify auth (serde ignored unknown
# fields on `[[detector.companions]]`), so the detector loaded as
# Unverifiable anyway. Making the omission explicit instead.

[[detector.tests]]
test_positive = "ALERTMANAGER_USER=admin_user_kp4qx7rm2sn\nALERTMANAGER_PASSWORD=Kr6vtSWYiEiFtyZ57KOOJcBN9fbInvPq"
test_negative = "ALERTMANAGER_USER=admin_user_kp4qx7rm2sn"
