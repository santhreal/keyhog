# Generic keyword-anchored secret bridge (phase-2). The weakest-signal member:
# a value sitting next to a strong secret keyword but with low structural
# entropy (e.g. a short human-set password). Its floor is the lowest so genuine
# low-entropy keyworded secrets survive; keyword proximity carries the signal.
# No regex anchor — fires in phase 2 on keywords + entropy_floor.

[detector]
id = "generic-keyword-secret"
name = "Generic Keyword Secret"
service = "generic"
severity = "medium"
kind = "phase2-generic"
keywords = ["secret", "password", "passwd", "pwd", "pass", "token", "apikey", "api_key", "credential", "auth", "passphrase", "private_key", "authorization"]
entropy_high = 4.5
entropy_low = 3.0
entropy_very_high = 5.8
mixed_alnum_floor = 4.0
# This bridge deliberately admits human-chosen, keyword-anchored secrets such
# as passphrases. BPE word-likeness is not negative evidence for that class.
bpe_enabled = false
keyword_free_min_len = 20
min_len = 8
max_len = 128
stopwords = ["example", "sample", "test", "dummy", "placeholder", "changeme", "xxxxxxxx", "your_key_here", "000000"]

entropy_floor = [{ floor = 1.5 }]

[[detector.tests]]
test_positive = "password = \"gjbubxsu\""
test_negative = "password=aaaaaa"
