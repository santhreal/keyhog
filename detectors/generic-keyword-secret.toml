# Generic keyword-anchored secret bridge (phase-2). The weakest-signal member:
# a value sitting next to a strong secret keyword but with low structural
# entropy (e.g. a short human-set password). Its floor is the lowest so genuine
# low-entropy keyworded secrets survive; keyword proximity carries the signal.
# Shapeless assignments fire in phase 2 on keywords + entropy_floor. Optional
# JSON envelopes below preserve structured low-entropy secrets under this same
# detector owner.

[detector]
id = "generic-keyword-secret"
name = "Generic Keyword Secret"
service = "generic"
entropy_roles = ["isolated-bare"]
severity = "medium"
ml = { match_mode = "lift", entropy_mode = "authoritative", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, low_promise_confidence = 0.10, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
kind = "phase2-generic"
keywords = ["secret", "password", "passwd", "pwd", "pass", "token", "apikey", "api_key", "credential", "auth", "passphrase", "private_key", "authorization"]
entropy_high = 4.5
entropy_low = 3.0
entropy_very_high = 5.8
# Map this detector's entropy evidence to report confidence without scanner defaults.
entropy_fallback_confidence = { low_entropy_max = 0.55, high_entropy = 0.65, very_high_entropy = 0.75, keyword_lift = 0.1, max_confidence = 0.9 }
sensitive_path_entropy_very_high = 5.8
# The isolated owner admits 16-byte mixed symbolic credentials. Pure
# underscore-delimited mixed tokens remain governed by the mixed entropy floor,
# while the exact 4x4 lower-dash layout remains owned by `entropy_shapes` below.
plausibility = { mixed_alnum_floor = 4.0, symbolic_entropy_floor = 3.5, second_half_entropy_floor = 2.5, second_half_min_len = 17, unique_chars_min_len = 17, min_unique_chars = 8, unanchored_hex_max_len = 10, identical_char_max_len = 4, structured_dotted_min_len = 40, mixed_alnum_min_len = 20, isolated_mixed_entropy_floor = 3.65, isolated_symbolic_min_len = 16, isolated_symbolic_min_symbols = 2, isolated_symbolic_requires_non_underscore = true, isolated_alpha_only_min_symbols = 3, isolated_alpha_only_min_alpha_ratio = 0.5, min_alnum_ratio = 0.5, source_type_name_max_len = 40, source_type_name_min_uppercase = 2, url_path_high_entropy_min_len = 41, isolated_colon_left_min_len = 20, isolated_colon_right_min_len = 16, leading_slash_base64_entropy_floor = 4.8, leading_slash_base64_min_len = 40, reject_repeated_blocks = true, allow_alphabetic_credential = true, reject_program_identifiers = true, reject_source_symbol_identifiers = true, reject_dash_segmented_alnum = true }
# Broad keyword context yields to password and API-key family policy when their
# keyword sets overlap.
entropy_policy_priority = 60
# This bridge deliberately admits human-chosen, keyword-anchored secrets such
# as passphrases. BPE word-likeness is not negative evidence for that class.
bpe_enabled = false
min_len = 8
# Keyword-anchored human secrets may be phrases, but a 256-byte assignment is
# already a document/blob boundary rather than one password or passphrase.
max_len = 256
keyword_free_min_len = 20
stopwords = ["example", "sample", "test", "dummy", "placeholder", "changeme", "xxxxxxxx", "your_key_here", "000000"]
public_identifier_assignment_markers = [
    "_ADDR=", "_ADDR ", "_ADDR\"", "_ADDR:",
    "_ADDRS=", "_ADDRS ", "_ADDRS\"",
    "_ADDRESS=", "_ADDRESS ", "_ADDRESS\"",
    "_WALLET=", "_WALLET ", "_WALLET\"", "_MINT_ADDR",
    "_PUBKEY=", "_PUBKEY ", "_PUBLIC_KEY=", "_PUBLIC_KEY ", "_PUBLIC_KEY\"",
    "_CONTRACT=", "_CONTRACT ", "_OWNER=", "_ACCOUNT_ID=", "_PEER_ID=", "_NODE_ID=",
]

entropy_floor = [{ floor = 1.5 }]

[[detector.entropy_shapes]]
charset = "lower-alnum"
entropy_floor = 3.9
special_min_length = 16
grouping = { group_count = 4, group_length = 4, separator = "-" }
require_non_hex_alpha = true
require_group_alpha_digit = true

[detector.generic_assignment_confidence]
ordinary_base = 0.60
test_base = 0.25
documentation_base = 0.30
comment_base = 0.30
scanned_comment_base = 0.60
entropy_reference = 3.5
entropy_gain_per_bit = 0.10
entropy_lift_max = 0.25
length_reference = 16
length_gain_per_byte = 0.005
length_lift_max = 0.15
max_confidence = 0.95

[detector.entropy_fallback]
class = "token"
id = "entropy-token"
name = "API Token (Entropy Detected)"
service = "generic"

# Explicit JSON envelopes live with the secret/token owner rather than the
# password detector. These patterns preserve low-entropy wrapped credentials
# that the entropy bridge may correctly decline while keeping classification
# stable across CPU/GPU trigger producers.
[[detector.patterns]]
regex = "(?i)\"secret\"\\s*:\\s*\"([a-zA-Z0-9/+=_.!@#$%^&*-]{12,80})\""
description = "Secret value in a JSON object field"
group = 1

[[detector.patterns]]
regex = "(?i)\"token\"\\s*:\\s*\"([a-zA-Z0-9/+=_.!@#$%^&*-]{12,80})\""
description = "Token value in a JSON object field"
group = 1

[[detector.patterns]]
regex = '(?i)"client[_\-\s]*secret"\s*:\s*"([a-zA-Z0-9/+=_.!@#$%^&*-]{12,80})"'
description = "Client secret value in a JSON object field"
group = 1

[[detector.tests]]
test_positive = "passphrase = \"gjbubxsu\""
test_negative = "passphrase=aaaaaa"

[[detector.tests]]
test_positive = "secret = \"BadCbc0#-DE&1$FA\""
test_negative = "secret = ClientSecretConfigValue2"
