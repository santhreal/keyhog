# Generic keyword-anchored secret bridge (phase-2). The weakest-signal member:
# a value sitting next to a strong secret keyword but with low structural
# entropy (e.g. a short human-set password). Its floor is the lowest so genuine
# low-entropy keyworded secrets survive; keyword proximity carries the signal.
# Shapeless assignments fire in phase 2 on keywords + entropy_floor. Optional
# JSON envelopes below preserve structured low-entropy secrets under this same
# detector owner.

[detector]
id = "generic-keyword-secret"
name = "Generic Keyword Secret"
service = "generic"
severity = "medium"
kind = "phase2-generic"
keywords = ["secret", "password", "passwd", "pwd", "pass", "token", "apikey", "api_key", "credential", "auth", "passphrase", "private_key", "authorization"]
entropy_high = 4.5
entropy_low = 3.0
entropy_very_high = 5.8
mixed_alnum_floor = 4.0
# Broad keyword context yields to password and API-key family policy when their
# keyword sets overlap.
entropy_policy_priority = 60
# This bridge deliberately admits human-chosen, keyword-anchored secrets such
# as passphrases. BPE word-likeness is not negative evidence for that class.
bpe_enabled = false
min_len = 8
# Keyword-anchored human secrets may be phrases, but a 256-byte assignment is
# already a document/blob boundary rather than one password or passphrase.
max_len = 256
keyword_free_min_len = 20
stopwords = ["example", "sample", "test", "dummy", "placeholder", "changeme", "xxxxxxxx", "your_key_here", "000000"]

entropy_floor = [{ floor = 1.5 }]

[detector.entropy_fallback]
id = "entropy-token"
name = "API Token (Entropy Detected)"
service = "generic"

# Explicit JSON envelopes live with the secret/token owner rather than the
# password detector. These patterns preserve low-entropy wrapped credentials
# that the entropy bridge may correctly decline while keeping classification
# stable across CPU/GPU trigger producers.
[[detector.patterns]]
regex = "(?i)\"secret\"\\s*:\\s*\"([a-zA-Z0-9/+=_.!@#$%^&*-]{12,80})\""
description = "Secret value in a JSON object field"
group = 1

[[detector.patterns]]
regex = "(?i)\"token\"\\s*:\\s*\"([a-zA-Z0-9/+=_.!@#$%^&*-]{12,80})\""
description = "Token value in a JSON object field"
group = 1

[[detector.patterns]]
regex = "(?i)\"client[_-]?secret\"\\s*:\\s*\"([a-zA-Z0-9/+=_.!@#$%^&*-]{12,80})\""
description = "Client secret value in a JSON object field"
group = 1

[[detector.tests]]
test_positive = "password = \"gjbubxsu\""
test_negative = "password=aaaaaa"
