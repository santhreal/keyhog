# Docs: https://weaviate.io/developers/weaviate/configuration/authentication
# Format: Alphanumeric string, typically 32+ characters (no fixed prefix)
# Verify: https://weaviate.io/developers/weaviate/api/rest/v1
# Prefix: none (requires context anchoring)

[detector]
id = "weaviate-api-key"
name = "Weaviate API Key"
service = "weaviate"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8, post_match = { placeholder_multiplier = 0.05, minimum_byte_diversity = 0.1, low_diversity_multiplier = 0.1, maximum_repeat_ratio = 0.8, degenerate_run_min_length = 10, degenerate_repeat_multiplier = 0.1, fixture_path_multiplier = 0.5, ml_context_reapply_below = 0.95 } }
keywords = ["WEAVIATE_API_KEY", "weaviate_api_key", "WEAVIATE_APIKEY", "weaviateApiKey"]

[[detector.patterns]]
regex = '''(?:WEAVIATE[_\-\s]*API[_\-\s]*KEY|weaviate[_\-\s]*api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{32,})'''
description = "Weaviate API key with context anchor"
group = 1

# Weaviate is self-hosted: every deployment lives under a customer-chosen
# host with no fixed apex domain. The previous verify used single-brace
# `{host}` (which the interpolator didn't honor) and had no allowlist -
# unsafe to verify. We capture the host via companion only when a
# `WEAVIATE_URL=` / `WEAVIATE_HOST=` declaration is nearby, and pin the
# allowlist to the Weaviate Cloud Service network. For self-hosted
# deployments we deliberately Unverifiable rather than blindly POST a
# Bearer token to an attacker-controlled hostname.
[[detector.companions]]
name = "weaviate_url"
regex = 'https://[a-z0-9-]+\.weaviate\.(?:network|io|cloud)'
within_lines = 5

[detector.verify]
method = "GET"
url = "{{companion.weaviate_url}}/v1/meta"
allowed_domains = ["weaviate.network", "weaviate.io", "weaviate.cloud"]

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
json_path = "$.version"

[[detector.tests]]
test_positive = "WEAVIATE_API_KEY = ='\":  '  : ''=''  fFYVh4YwwAywcTqCYxW_T2KAznn8C1t-T93ToYqujuK-OboPiSPuXAQDkb2l7eozXdiBA8"
test_negative = "WEAVIATE_API_KEY = ='\":  '  : ''=''  YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
