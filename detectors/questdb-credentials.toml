# Docs: https://questdb.io/docs/develop/connect/
# Format: PostgreSQL wire protocol or InfluxDB line protocol credentials
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "questdb-credentials"
name = "QuestDB Credentials"
service = "questdb"
severity = "critical"
keywords = ["QUESTDB", "questdb"]

[[detector.patterns]]
regex = "(?:QUESTDB)[_\\s]*(?:HOST|URL)[=:\\s\"'']+(?:postgres(?:ql)?://)([^:@]+):([^@]+)@"
description = "QuestDB connection string with credentials"
group = 2

[[detector.companions]]
name = "questdb_username"
regex = "(?:QUESTDB)[_\\s]*(?:USER|USERNAME)[=:\\s\"'']+([^\"'']+)"
within_lines = 5
[[detector.patterns]]
regex = "(?:QUESTDB)[_\\s]*(?:PASSWORD|PASS|TOKEN)[=:\\s\"'']+([a-zA-Z0-9_-]{16,})"
description = "QuestDB password/token with context anchor"
group = 1

[[detector.tests]]
test_positive = "QUESTDB_URL=postgresql://quest:QuestPass123@db.example.com:8812/qdb"
test_negative = "QUESTDB_URL=postgresql://quest:YOUR_API_KEY_HERE_PLACEHOLDER_VALUE@db.example.com:8812/qdb"
