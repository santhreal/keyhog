# Docs: https://mlflow.org/docs/latest/self-hosting/security/basic-http-auth/
# Format: Username/password pair for MLflow tracking server authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "mlflow-tracking-credentials"
name = "MLflow Tracking Credentials"
service = "mlflow"
severity = "high"
keywords = ["MLFLOW_TRACKING_USERNAME", "MLFLOW_TRACKING_PASSWORD", "mlflow"]

[[detector.patterns]]
regex = "(?:MLFLOW_TRACKING_USERNAME|mlflow.tracking.username)[=: \\s\"'']+([a-zA-Z0-9_-]+)"
description = "MLflow tracking username with context anchor"
group = 1

[[detector.companions]]
name = "MLflow tracking password"
regex = "(?:MLFLOW_TRACKING_PASSWORD|mlflow.tracking.password)[=: \\s\"'']+[a-zA-Z0-9_-]+"
within_lines = 3

[[detector.tests]]
test_positive = "MLFLOW_TRACKING_USERNAME=JcLZllEQlfGHhqpCJb0Z7BH8qYiTYKVs"
test_negative = "MLFLOW_TRACKING_USERNAME=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
