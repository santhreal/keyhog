# Docs: https://help.perfecto.io/perfecto-help/content/perfecto/rest-api/rest-api-authentication.htm
# Format: Security token used in Perfecto-Authorization header (base64-encoded or JWT)
# Verify: GET /services/handsets with Perfecto-Authorization header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "perfecto-api-credentials"
name = "Perfecto API Credentials"
service = "perfecto"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["PERFECTO_TOKEN", "PERFECTO_SECURITY_TOKEN", "perfecto_token", "Perfecto-Authorization"]

[[detector.patterns]]
regex = "(?:PERFECTO_TOKEN|PERFECTO_SECURITY_TOKEN|perfecto_token|perfecto-security-token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,}|[a-zA-Z0-9+/]{40,}=*)"
description = "Perfecto security token with context anchor"
group = 1

[[detector.patterns]]
regex = "Perfecto-Authorization[=:\\s\"'']+(?:Bearer\\s+)?([a-zA-Z0-9_-]{20,}|[a-zA-Z0-9+/]{40,}=*)"
description = "Perfecto Authorization header token"
group = 1

[[detector.tests]]
test_positive = "PERFECTO_TOKEN=2MAVAz2q7AI1W9P17EB71Wdb9ge0nhEj"
test_negative = "PERFECTO_TOKEN=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
