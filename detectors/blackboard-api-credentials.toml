# Docs: https://developer.blackboard.com/portal/displayApi
# Format: 32-character UUID format (API key) with separate secret
# Verify: POST /learn/api/public/v3/oauth2/token with basic auth returns 200 if valid
# Prefix: none (requires context anchoring - UUID format)

[detector]
id = "blackboard-api-credentials"
name = "Blackboard API Credentials"
service = "blackboard"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05 }
keywords = ["blackboard", "BLACKBOARD", "bb_learn", "BbLearn"]

[[detector.patterns]]
regex = '''(?:blackboard|bb[_\-\s]*learn)[_\s.-]*(?:api[_\s.-]*)?(?:key|id|client[_\s.-]*id)[=:\s"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})'''
required_literals = ["blackboard", "learn"]
description = "Blackboard API client ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:blackboard|bb[_\-\s]*learn)[_\s.-]*(?:api[_\s.-]*)?(?:secret|client[_\s.-]*secret)[=:\s"'']+([a-zA-Z0-9_-]{32,64})'''
required_literals = ["secret"]
description = "Blackboard API client secret with context anchor"
group = 1

[[detector.tests]]
test_positive = "blackboard_api_key=7b3e5d8c-1a9f-4e2b-6c8d-3a5e9f1b7c4d"
test_negative = "blackboard_key=7b3e5d8c-1a9f"
