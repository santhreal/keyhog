# Docs: https://docs.sumsub.com/
# Format: App Token and Secret Key for HMAC-SHA256 authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "sumsub-api-credentials"
name = "Sumsub API Credentials"
service = "sumsub"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
keywords = ["sumsub", "SUMSUB", "app_token", "app_secret"]

[[detector.patterns]]
regex = "(?:sumsub|SUMSUB)[_\\s]*(app[_\\s]*token)[=:;\\s\"'']+([a-zA-Z0-9_-]{10,})"
description = "Sumsub App Token with context anchor"
group = 2

[[detector.patterns]]
regex = "(?:sumsub|SUMSUB)[_\\s]*(app[_\\s]*secret|secret[_\\s]*key)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Sumsub App Secret with context anchor"
group = 2

[[detector.patterns]]
regex = "(?:sumsub|SUMSUB)[_\\s]*(api[_\\s]*key)[=:;\\s\"'']+([a-zA-Z0-9_-]{10,})"
description = "Sumsub API key with context anchor"
group = 2

[[detector.tests]]
test_positive = "sumsub app_token=SumsubAppTok1"
test_negative = "sumsub app_token=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
