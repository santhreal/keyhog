# Docs: https://www.checklyhq.com/docs/cli/authentication
# Format: cu_ prefix followed by 24 alphanumeric characters
# Verify: GET /v1/checks with X-Checkly-Account header and Bearer token returns 200
# Prefix: cu-

[detector]
id = "checkly-api-key"
name = "Checkly API Key"
service = "checkly"
severity = "high"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["cu_", "CHECKLY_API_KEY", "checkly_api_key"]

[[detector.patterns]]
regex = "cu_[a-zA-Z0-9]{24}"
description = "Checkly API key (cu- prefix)"

[[detector.patterns]]
regex = "(?:CHECKLY_API_KEY|checkly_api_key)[=:\\s\"'']+(cu_[a-zA-Z0-9]{24})"
description = "Checkly API key with context anchor"
group = 1

[[detector.companions]]
name = "account_id"
regex = "(?:CHECKLY_ACCOUNT_ID|checkly_account_id)[=:\\s\"'']+([a-f0-9-]{36}|[a-zA-Z0-9]+)"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.checklyhq.com/v1/checks"
allowed_domains = ["api.checklyhq.com"]

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[[detector.verify.headers]]
name = "X-Checkly-Account"
value = "{{companion.account_id}}"

[detector.verify.success]
status = 200

[[detector.tests]]
test_positive = "CHECKLY_API_KEY=cu_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
test_negative = "cu_short"
