# Docs: https://docs.servicenow.com/bundle/xanadu-platform-administration/page/administer/security/concept/c_IntegrateWithThirdParty.html
# Format: Base64 encoded username:password or token for REST API authentication
# Verify: GET /api/now/table/sys_user with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "servicenow-api-key"
name = "ServiceNow API Key"
service = "servicenow"
severity = "critical"
ml = { match_mode = "lift", entropy_mode = "disabled", weight = 1.0, context_radius_lines = 5 }
match_confidence = { literal_prefix_weight = 0.35, context_anchor_weight = 0.20, entropy_weight = 0.20, high_entropy_partial_weight = 0.12, moderate_entropy_threshold = 3.0, moderate_entropy_weight = 0.05, low_entropy_penalty_floor = 2.0, low_entropy_min_match_length = 10, low_entropy_penalty_multiplier = 0.60, keyword_nearby_weight = 0.10, sensitive_file_weight = 0.10, companion_weight = 0.05, very_high_entropy_margin = 1.2999999999999998, named_anchor_floor = 0.55, assignment_context_multiplier = 1.0, string_literal_context_multiplier = 0.9, unknown_context_multiplier = 0.8, documentation_context_multiplier = 0.3, comment_context_multiplier = 0.4, test_context_multiplier = 0.3, encrypted_context_multiplier = 0.05, soft_context_suppression_threshold = 0.5, encrypted_context_suppression_threshold = 0.8 }
keywords = ["servicenow", "SN_INSTANCE", "SN_USER", "SN_PASSWORD"]
entropy_high = 4.5
entropy_floor = [{ max_len = 24, floor = 3.0 }, { max_len = 40, floor = 2.8 }, { floor = 3.5 }]

[[detector.patterns]]
regex = "(?:servicenow|SN)[._-]?(?:instance|url)[=:\\s\"'']+([a-z0-9-]+\\.service-now\\.com)"
required_literals = [".service-now.com"]
description = "ServiceNow instance URL"
group = 1

[[detector.patterns]]
regex = "(?:servicenow|SN)[._-]?(?:user|username)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
required_literals = ["user"]
description = "ServiceNow username with context anchor"
group = 1
weak_anchor = true

[[detector.patterns]]
regex = "(?:servicenow|SN)[._-]?(?:pass|password|pwd)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "ServiceNow password with context anchor"
group = 1

[[detector.patterns]]
regex = '''(?:servicenow|SN)[._-]?(?:token|api[_\-\s]*key)[=:\s"'']+([a-zA-Z0-9_-]{20,})'''
description = "ServiceNow API token with context anchor"
group = 1

[[detector.tests]]
test_positive = "servicenow_instance=dev12345.service-now.com"
test_negative = "servicenow_instance=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
