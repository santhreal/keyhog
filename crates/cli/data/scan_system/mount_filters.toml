# Tier-B data — scan-system mount filters (Law: no hardcoded lists in code).
#
# `keyhog scan-system` enumerates real mount roots from /proc/mounts and skips
# pseudo / virtual filesystems, (unless --include-network) network filesystems,
# and volatile path prefixes. These lists are the shipped BASELINE; they are
# always applied. To extend them for an exotic host WITHOUT recompiling, drop a
# `mount_filters.toml` with the same keys into your keyhog config dir
# (`<config>/keyhog/mount_filters.toml`) — its entries are UNIONED onto this
# baseline. A user file that exists but does not parse is a hard error, never a
# silent fall back to defaults (Law 10).

# Pseudo / virtual filesystems that never hold user files worth scanning.
skip_fs_types = [
  "proc", "sysfs", "tmpfs", "devtmpfs", "devpts", "cgroup", "cgroup2",
  "pstore", "bpf", "tracefs", "debugfs", "securityfs", "configfs", "fusectl",
  "binfmt_misc", "rpc_pipefs", "ramfs", "autofs", "mqueue", "hugetlbfs",
  "fuse.gvfsd-fuse", "overlay", "squashfs", "nsfs", "fuse.portal",
  "fuse.snapfuse", "fuse.gvfs-fuse-daemon", "fuse.fusectl", "rootfs",
  "devfs",
]

# Volatile / synthetic path prefixes skipped regardless of filesystem type.
skip_path_prefixes = ["/run/", "/proc/", "/sys/", "/dev/", "/snap/"]

# Network filesystems — skipped unless the operator passes --include-network
# (scanning a mounted NFS/CIFS export can be enormous and is rarely intended).
network_fs_types = [
  "nfs", "nfs4", "cifs", "smb", "smbfs", "fuse.sshfs", "fuse.rclone",
  "9p", "afs", "ceph", "afpfs",
]
