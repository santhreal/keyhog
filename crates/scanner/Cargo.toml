# TARGET-SPEC perf worklist (FAILING-BY-DESIGN): the 10x goal expressed as
# executable contracts. RED until batched-GPU phase-2 verify lands; each red
# line is one tracked gap. Subdir files need explicit [[test]] paths to be
# discovered as their own test binaries (same wiring as the property/* tests).
[[test]]
name = "target_spec_perf_10x_fullscan"
path = "tests/target_spec/perf_10x_fullscan.rs"

[[test]]
name = "target_spec_perf_10x_phase2_batch"
path = "tests/target_spec/perf_10x_phase2_batch.rs"

[[test]]
name = "target_spec_perf_10x_backend_matrix"
path = "tests/target_spec/perf_10x_backend_matrix.rs"

# TARGET-SPEC recall worklist (FAILING-BY-DESIGN): the candidate-GENERATION gap
# expressed as executable contracts, prefix-free real-world secret shapes the
# shipped scanner does not surface. RED until keyword/shape generation lands;
# each red is one tracked recall miss (Law 6). Subdir file needs an explicit
# [[test]] path to be discovered as its own test binary.
[[test]]
name = "target_spec_recall_generation_gap"
path = "tests/target_spec/recall_generation_gap.rs"
