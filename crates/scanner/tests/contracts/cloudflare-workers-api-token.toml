schema_version = 1
detector_id = "cloudflare-workers-api-token"
service = "cloudflare"
severity = "critical"

[[positive]]
text = "CLOUDFLARE_WORKERS_API_TOKEN=AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
credential = "AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
reason = "Canonical env-var with exactly 40 alnum/underscore/hyphen chars."

[[positive]]
text = "workers_token=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5Tw8Vk9B"
credential = "Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5Tw8Vk9B"
reason = "Lowercase workers_token anchor with 40 alnum/underscore/hyphen chars."

[[negative]]
text = "CLOUDFLARE_WORKERS_API_TOKEN=short"
reason = "Body not exactly 40 chars; regex requires exactly 40."

[[evasion]]
text = "Authorization: Bearer CLOUDFLARE_WORKERS_API_TOKEN=AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
credential = "AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
reason = "Bearer-header wrap around the assignment."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Cloudflare Workers token."
