schema_version = 1
detector_id = "notion-oauth-secret"
service = "notion"
severity = "high"

[[positive]]
text = "NOTION_CLIENT_SECRET=secret_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpRm"
credential = "secret_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpRm"
reason = "Notion OAuth client secret env-var (secret_ prefix + 43 alnum)."

[[positive]]
text = "notion_client_secret: \"secret_Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5Tw8Vk9BVkQ\""
credential = "secret_Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5Tw8Vk9BVkQ"
reason = "Lowercase YAML-style notion_client_secret."

[[negative]]
text = "NOTION_CLIENT_SECRET=secret_short"
reason = "Body below 43 alnum chars after secret_ prefix."

[[evasion]]
text = "notion.client.secret=secret_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpRm"
credential = "secret_Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpRm"
reason = "Dot-separated notion.client.secret — regex covers `[_.]?`."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Notion OAuth secret."
