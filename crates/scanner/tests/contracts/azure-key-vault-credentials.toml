schema_version = 1
detector_id = "azure-key-vault-credentials"
service = "azure-key-vault"
severity = "critical"

[[positive]]
text = "https://prod-app-vault.vault.azure.net/"
credential = "https://prod-app-vault.vault.azure.net/"
reason = "Azure Key Vault URL endpoint."

[[positive]]
text = "VAULT_URL=https://staging-secrets.vault.azure.net/"
credential = "https://staging-secrets.vault.azure.net/"
reason = "Env-var wrap around vault URL."

[[negative]]
text = "https://example.com/api"
reason = "Not a vault.azure.net URL."

[[evasion]]
text = "https://prod-app-vault.vault.azure.net/"
credential = "https://prod-app-vault.vault.azure.net/"
reason = "Adversarial header_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Key Vault URL."
