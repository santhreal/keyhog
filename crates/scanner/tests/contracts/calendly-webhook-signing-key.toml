schema_version = 1
detector_id = "calendly-webhook-signing-key"
service = "calendly"
severity = "medium"

[[positive]]
text = "calendly signing_key \"Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S\""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S"
reason = "Lowercase context with quoted 28-char signing key."

[[positive]]
text = "CALENDLY SIGNING_KEY 'Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5'"
credential = "Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5"
reason = "Uppercase context with single-quoted 32-char signing key."

[[negative]]
text = "calendly signing_key short"
reason = "Body below 10 chars — must not match."

[[evasion]]
text = "\"calendly signing_key 'Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S'\""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S"
reason = "Double-quoted JSON-style wrapper still surfaces the key."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Calendly webhook signing key."
