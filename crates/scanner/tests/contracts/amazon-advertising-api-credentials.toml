schema_version = 1
detector_id = "amazon-advertising-api-credentials"
service = "amazon-advertising"
severity = "critical"

[[positive]]
text = "amzn1.application-oa2-client.Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "amzn1.application-oa2-client.Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Amazon Advertising client ID (amzn1.application-oa2-client. prefix)."

[[positive]]
text = "AMAZON_ADS_CLIENT=amzn1.application-oa2-client.Vk9Bn3Lp7Qm2Rs5Tw8Vk"
credential = "amzn1.application-oa2-client.Vk9Bn3Lp7Qm2Rs5Tw8Vk"
reason = "Env-var wrap around prefix detector."

[[negative]]
text = "amzn1.application-oa2-client."
reason = "Empty body after prefix."

[[evasion]]
text = "client_id: \"amzn1.application-oa2-client.Kp4Qx7Rm2Sn5Tb8Vw3Yz\""
credential = "amzn1.application-oa2-client.Kp4Qx7Rm2Sn5Tb8Vw3Yz"
