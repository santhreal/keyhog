schema_version = 1
detector_id = "ceph-rados-gateway-credentials"
service = "ceph"
severity = "high"

[[positive]]
text = "CEPH_ACCESS_KEY=KP4QX7RM2SN5TB8VW3YZ"
credential = "KP4QX7RM2SN5TB8VW3YZ"
reason = "Uppercase CEPH_ACCESS_KEY prefix with 20 uppercase alnum chars."

[[positive]]
text = "CEPH_RADOS_ACCESS_KEY=VK9BN3LP7QM2RS5TW8VK"
credential = "VK9BN3LP7QM2RS5TW8VK"
reason = "Full CEPH_RADOS_ACCESS_KEY prefix with 20 uppercase alnum chars."

[[negative]]
text = "CEPH_ACCESS_KEY=lowercasekp4qx7rm2s"
reason = "Body contains lowercase chars, regex requires [A-Z0-9]."

[[evasion]]
text = "CEPH_ACCESS_KEY=KP4QX7RM2SN5TB8VW3YZ"
credential = "KP4QX7RM2SN5TB8VW3YZ"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
