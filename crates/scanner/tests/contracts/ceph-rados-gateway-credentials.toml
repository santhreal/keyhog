schema_version = 1
detector_id = "ceph-rados-gateway-credentials"
service = "ceph"
severity = "high"

[[positive]]
text = "CEPH_ACCESS_KEY=KP4QX7RM2SN5TB8VW3YZ"
credential = "KP4QX7RM2SN5TB8VW3YZ"
reason = "Uppercase CEPH_ACCESS_KEY prefix with 20 uppercase alnum chars."

[[positive]]
text = "CEPH_RADOS_ACCESS_KEY=VK9BN3LP7QM2RS5TW8VK"
credential = "VK9BN3LP7QM2RS5TW8VK"
reason = "Full CEPH_RADOS_ACCESS_KEY prefix with 20 uppercase alnum chars."

[[positive]]
text = "CEPH_ACCESS_KEY=fooAccessKey12345678"
credential = "fooAccessKey12345678"
reason = "Ceph permits a user-defined mixed-case 20-character access key; the field anchor remains caseless."

[[negative]]
text = "CEPH_ACCESS_KEY=lowercasekp4qx7rm2s"
reason = "Body is only 19 characters; casing is intentionally not the rejection reason."

[[negative]]
text = "CEPHKEY=jxZytDQUEy0SrmdAxAoF1PWOn9tOtMcWyHzHeiMK"
reason = "A 40-character secret must not be truncated into a 20-character access-key finding."

[[evasion]]
text = "CEPH_ACCESS_KEY=KP4QX7RM2SN5TB8VW3YZ"
credential = "KP4QX7RM2SN5TB8VW3YZ"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted ceph credential."
