schema_version = 1
detector_id = "fastspring-api-credentials"
service = "fastspring"
severity = "critical"

[[positive]]
text = "FASTSPRING_API_USERNAME=Kp4Qx7Rm"
credential = "Kp4Qx7Rm"
reason = "Uppercase FASTSPRING_API_USERNAME with equals separator and 8-char alnum body."

[[positive]]
text = "fastspring API PASSWORD=\"Kp4Qx7Rm2Sn5Tb8V\""
credential = "Kp4Qx7Rm2Sn5Tb8V"
reason = "Lowercase fastspring with space-separated API PASSWORD and quoted 16-char alnum body."

[[negative]]
text = "FASTSPRING_API_USER=short"
reason = "Body too short, below 8 minimum."

[[evasion]]
text = "FASTSPRING_API_USERNAME=\"Kp4Qx7Rm2Sn5Tb8V\""
credential = "Kp4Qx7Rm2Sn5Tb8V"
reason = "Uppercase prefix with quoted credential instead of bare equals."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted fastspring credential."
