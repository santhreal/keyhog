schema_version = 1
detector_id = "soundcloud-client-credentials"
service = "soundcloud"
severity = "high"

# SoundCloud OAuth has two patterns (client_id, client_secret) gated by the
# `soundcloud_credential_pair` companion which looks back ±5 lines for the
# OTHER half. Companion is optional, so either half alone still surfaces.

[[positive]]
text = """SOUNDCLOUD_CLIENT_ID=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q
SOUNDCLOUD_CLIENT_SECRET=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn"""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
reason = "Standard env-var pair — both halves visible, companion satisfied."

[[positive]]
text = "soundcloud_client_id: \"Kn7XbWqYpRm9SvLt2HdJgFc8\""
credential = "Kn7XbWqYpRm9SvLt2HdJgFc8"
reason = "YAML-style id only — companion optional so detection fires standalone."

[[negative]]
text = "soundcloud_client_id=tooShort"
reason = "Body fails the {20,32} length constraint."

[[evasion]]
text = "SOUNDCLOUD_CLIENT_ID=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q\nSOUNDCLOUD_CLIENT_SECRET=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Q"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted SoundCloud client_id."
