schema_version = 1
detector_id = "google-artifact-registry-key"
service = "google-artifact-registry"
severity = "critical"




[[positive]]
text = """{"type": "service_account", "private_key": "-----BEGIN PRIVATE KEY-----\nMIIE\n-----END PRIVATE KEY-----"}"""
credential = "-----BEGIN PRIVATE KEY-----"
reason = "Hand-tuned positive matching detector regex (R2-F adversarial batch)."

[[positive]]
text = """_json_key={"type":"service_account","private_key":"-----BEGIN PRIVATE KEY-----\nMIIE\n-----END PRIVATE KEY-----"}"""
credential = "-----BEGIN PRIVATE KEY-----"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "_json_key=short"
reason = "Truncated value below detector minimum length."

[[negative]]
text = "_json_key token abcdef"
reason = "Keyword context without valid credential body."

[[evasion]]
text = '# docker login -u _json_key -p {"type":"service_account","private_key":"-----BEGIN PRIVATE KEY-----\nabc\n-----END PRIVATE KEY-----"}'
credential = "-----BEGIN PRIVATE KEY-----"
reason = "Comment-adjacent GAR JSON key material."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
