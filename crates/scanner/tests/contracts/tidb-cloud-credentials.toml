schema_version = 1
detector_id = "tidb-cloud-credentials"
service = "tidbcloud"
severity = "high"

# TiDB Cloud private keys require a `TIDB_PRIVATE_KEY` context anchor. The
# optional public-key companion raises confidence when both halves appear.

[[positive]]
text = """TIDB_PUBLIC_KEY=abc123def456ghi789jkl012
TIDB_PRIVATE_KEY=abc123def456ghi789jkl012mnopqrstuvwx"""
credential = "abc123def456ghi789jkl012mnopqrstuvwx"
reason = "Standard env-var pair — private key with public-key companion."

[[positive]]
text = "TIDB_PRIVATE_KEY=abc123def456ghi789jkl012mnopqrstuvwx"
credential = "abc123def456ghi789jkl012mnopqrstuvwx"
reason = "Private key alone — anchor satisfied, companion optional."

[[negative]]
text = "TIDB_PRIVATE_KEY=short"
reason = "Body fails the {32,64} length constraint."

[[negative]]
text = "TIDB_PRIVATE_KEY=YOUR_PRIVATE_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder body — suppression gate strips it."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted TiDB private key."
