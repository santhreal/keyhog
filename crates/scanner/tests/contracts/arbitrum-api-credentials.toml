schema_version = 1
detector_id = "arbitrum-api-credentials"
service = "arbitrum"
severity = "high"

[[positive]]
text = "ARBITRUM_RPC_URL https://arb-mainnet.g.alchemy.com/v2/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "https://arb-mainnet.g.alchemy.com/v2/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Arbitrum RPC URL with Alchemy API key."

[[positive]]
text = "https://arb-mainnet.g.alchemy.com/v2/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "https://arb-mainnet.g.alchemy.com/v2/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Service-owned Arbitrum Alchemy RPC URL is credential-sufficient."

[[positive]]
text = "arb_rpc_url=https://rpc.arbitrum-one.io/arbitrum/Vk9Bn3Lp7Qm2Rs5Tw"
credential = "https://rpc.arbitrum-one.io/arbitrum/Vk9Bn3Lp7Qm2Rs5Tw"
reason = "Arbitrum RPC URL with embedded access token (realistic host; the reserved example.com host is a placeholder word the named-detector confidence penalty correctly discounts, as the /v2/ and /api negatives below still rely on)."

[[negative]]
text = "ARBITRUM_RPC_URL https://example.com/api"
reason = "Not an Alchemy or /arbitrum/-pattern URL."

[[negative]]
text = "https://rpc.example.com/v2/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Bare generic /v2/ URLs are not enough to claim Arbitrum."

[[evasion]]
text = "ARB_RPC_URL=https://arb-mainnet.g.alchemy.com/v2/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "https://arb-mainnet.g.alchemy.com/v2/Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "ARB shortform + ENDPOINT alias."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Arbitrum RPC URL."
