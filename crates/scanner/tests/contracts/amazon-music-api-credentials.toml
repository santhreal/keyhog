schema_version = 1
detector_id = "amazon-music-api-credentials"
service = "amazon-music"
severity = "high"

[[positive]]
text = "AMAZON_MUSIC_CLIENT_ID=amzn.application-oa2-client.7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
credential = "amzn.application-oa2-client.7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
reason = "Amazon Music client ID with amzn prefix and 32 hex."

[[positive]]
text = "LWA_CLIENT_ID=amzn.application-oa2-client.4c9a8f6e3b7d1a2c5e8f0b9d6a3c4e1f"
credential = "amzn.application-oa2-client.4c9a8f6e3b7d1a2c5e8f0b9d6a3c4e1f"
reason = "Login with Amazon client ID form."

[[negative]]
text = "AMAZON_CLIENT_ID=amzn.application-oa2-client.7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4"
reason = "Last hex segment 31 chars, below 32 required."

[[evasion]]
text = "amazon_music_client_id=amzn.application-oa2-client.7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
credential = "amzn.application-oa2-client.7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
reason = "Lowercase env-var form around prefix detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted amazon-music credential."
