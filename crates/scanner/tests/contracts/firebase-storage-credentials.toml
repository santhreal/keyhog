schema_version = 1
detector_id = "firebase-storage-credentials"
service = "firebase"
severity = "high"

[[positive]]
text = "gs://my-project-12345.appspot.com"
credential = "my-project-12345.appspot.com"
reason = "Firebase Storage bucket gs:// URL with appspot.com domain."

[[positive]]
text = "\"storageBucket\":\"my-project-12345.firebaseapp.com\""
credential = "my-project-12345.firebaseapp.com"
reason = "Firebase config storageBucket field with firebaseapp.com domain."

[[negative]]
text = "gs://MYPROJECT.appspot.com"
reason = "Uppercase letters in bucket name; regex requires lowercase a-z0-9 and hyphen only."

[[evasion]]
text = "gs://my-project-12345.appspot.com"
credential = "my-project-12345.appspot.com"
reason = "Adversarial header_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted firebase credential."
