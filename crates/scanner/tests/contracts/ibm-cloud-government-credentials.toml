schema_version = 1
detector_id = "ibm-cloud-government-credentials"
service = "ibm-cloud-government"
severity = "critical"

[[positive]]
text = "IBM_CLOUD_GOV API_KEY=\"AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCdEfGhIj\""
credential = "AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCdEfGh"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "IBM_CLOUD_GOV REGION=us-south"
credential = "us-south"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "IBM_CLOUD_GOV=short"
reason = "Truncated value below detector minimum length."

[[negative]]
text = "IBM_CLOUD_GOV token abcdef"
reason = "Keyword context without valid credential body."

[[evasion]]
text = "IBM_CLOUD_GOV API_KEY=\"AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCdEfGhIj\""
credential = "AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCdEfGh"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted IBM Cloud Government Credentials credential."
