schema_version = 1
detector_id = "clerk-frontend-api-key"
service = "clerk"
severity = "medium"

[[positive]]
text = "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_YWNtZS5hY2NvdW50cy5kZXYk"
credential = "pk_test_YWNtZS5hY2NvdW50cy5kZXYk"
reason = "Current Clerk publishable format: a variable-length base64-encoded FAPI URL."

[[positive]]
text = "pk_live_bG9uZ2VyLXByb2R1Y3Rpb24uYWNjb3VudHMuYWNtZS5kZXYk"
credential = "pk_live_bG9uZ2VyLXByb2R1Y3Rpb24uYWNjb3VudHMuYWNtZS5kZXYk"
reason = "Production instance domains produce publishable bodies longer than 32 bytes."

[[negative]]
text = "pk_live_c2hvcnQk"
reason = "A short base64-like suffix is not a complete Clerk publishable key."

[[negative]]
text = "CLERK_SECRET_KEY=sk_test_ZXhhbXBsZS5hY2NvdW50cy5kZXYk"
reason = "Clerk server secrets are not publishable keys and must never be marked client-safe."

[[evasion]]
text = "<ClerkProvider publishableKey=\"pk_test_YWNtZS5hY2NvdW50cy5kZXYk\">"
credential = "pk_test_YWNtZS5hY2NvdW50cy5kZXYk"
reason = "JSX attribute form used by Clerk frontend SDKs."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted current-format Clerk publishable key."
