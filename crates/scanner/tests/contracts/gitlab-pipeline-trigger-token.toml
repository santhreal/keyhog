schema_version = 1
detector_id = "gitlab-pipeline-trigger-token"
service = "gitlab"
severity = "high"

[[positive]]
text = "glptt-Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "glptt-Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "GitLab pipeline trigger token (glptt- + 20 alnum body)."

[[positive]]
text = "TRIGGER_TOKEN=glptt-Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp"
credential = "glptt-Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp"
reason = "Env-var assignment around prefix detector."

[[negative]]
text = "glptt-short"
reason = "Body below 20 alnum chars after `glptt-` prefix."

[[evasion]]
text = "curl -X POST https://gitlab.com/api/v4/projects/42/trigger/pipeline -F token=glptt-Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "glptt-Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Inline `-F token=` form trigger curl command."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted GitLab trigger token."
