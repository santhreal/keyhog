schema_version = 1
detector_id = "dhl-api-credentials"
service = "dhl"
severity = "high"

[[positive]]
text = "DHL.API.KEY=ZX0SakOvfcEiU6MgQmtf61SR1jdCcIKr"
credential = "ZX0SakOvfcEiU6MgQmtf61SR1jdCcIKr"
reason = "DHL API key with dot separators and 32-char alnum body."

[[positive]]
text = "DHL-API-Key: C372xGw30nSx5QdQuTxy"
credential = "C372xGw30nSx5QdQuTxy"
reason = "DHL-API-Key header style with any-length alnum body."

[[negative]]
text = "DHL.API.KEY=short"
reason = "Body too short / wrong shape."

[[evasion]]
text = "DHL.API.KEY=ZX0SakOvfcEiU6MgQmtf61SR1jdCcIKr"
credential = "ZX0SakOvfcEiU6MgQmtf61SR1jdCcIKr"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted DHL credential."
