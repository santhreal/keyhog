schema_version = 1
detector_id = "questdb-credentials"
service = "questdb"
severity = "critical"

[[positive]]
text = "QUESTDB_URL=postgresql://quest:QuestPass123@db.example.com:8812/qdb"
credential = "QuestPass123"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "QUESTDB_URL=\"postgresql://quest:QuestPass123@db.example.com:8812/qdb\""
credential = "QuestPass123"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "QUESTDB_URL=postgresql://quest:YOUR_API_KEY_HERE_PLACEHOLDER_VALUE@db.example.com:8812/qdb"
reason = "Placeholder-keyword body (suppression gate matches PLACEHOLDER prefix)."

[[negative]]
text = "QUESTDB_URL=postgresql://quest:QuestEXAMPLEEXAMPLEss123@db.example.com:8812/qdb"
reason = "EXAMPLE token marker inside the body (suppression gate strips it)."

[[evasion]]
text = "{\"secret\":\"QuestPass123\"}"
credential = "QuestPass123"
reason = "Adversarial envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
