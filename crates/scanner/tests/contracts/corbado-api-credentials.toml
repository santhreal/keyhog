schema_version = 1
detector_id = "corbado-api-credentials"
service = "corbado"
severity = "critical"

[[positive]]
text = "CORBADO_PROJECT_ID=\"pro-abc123def456\"\nCORBADO_API_SECRET=\"corbado1_Kp4Qx7Rm2Sn5Tb8\""
credential = "pro-abc123def456"
reason = "Project ID with pro- prefix and api_secret companion within 5 lines."

[[positive]]
text = "project_id = 'pro-xyz789abc123'\napi_secret = \"corbado1_Vk9Bn3Lp7Qm2Rs5\""
credential = "pro-xyz789abc123"
reason = "Lowercase snake_case anchor with single-quoted project ID and companion."

[[negative]]
text = "CORBADO_PROJECT=abc123def456"
reason = "Missing _ID or -id suffix, so regex anchor fails."

[[evasion]]
text = "Authorization: Basic project-id=\"pro-abc123def456\"\napi-secret=\"corbado1_Vk9Bn3Lp7Qm2Rs5\""
credential = "pro-abc123def456"
reason = "Basic auth header with hyphenated key names and quoted values."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted corbado credential."
