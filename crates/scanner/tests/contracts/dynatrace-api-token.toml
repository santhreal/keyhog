# Dynatrace token shape: dt0 + 1 alpha + 2 digits + . + 24 uppercase-hex + . + 64 uppercase-hex.
# Segment 2 must be EXACTLY 24 chars; segment 3 must be EXACTLY 64 chars.
# Mixed-distribution uppercase to dodge sequential-hex test-key suppressor.
