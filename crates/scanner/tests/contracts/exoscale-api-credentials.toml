schema_version = 1
detector_id = "exoscale-api-credentials"
service = "exoscale"
severity = "critical"

[[positive]]
text = "EXOSCALE_API_KEY=EXO7b3e5d8c1a9f4e2b6c8d"
credential = "EXO7b3e5d8c1a9f4e2b6c8d"
reason = "Uppercase EXOSCALE_API_KEY with EXO-prefixed 20-char hex body."

[[positive]]
text = "exoscale_api_secret=\"Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Q=\""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4Q="
reason = "Lowercase exoscale_api_secret with quoted 44-char base64 body plus padding."

[[negative]]
text = "EXOSCALE_API_KEY=EXOshort"
reason = "Body too short, EXO prefix plus 5 chars below 20 hex minimum."

[[negative]]
text = "EXOSCALE_API_KEY=EXO7b3e5d8c1a9f4e2b6c8d-extra"
reason = "A continuation after the fixed 20-hex body must not produce a truncated API-key finding."

[[evasion]]
text = "EXOSCALE_API_KEY=EXO7b3e5d8c1a9f4e2b6c8d"
credential = "EXO7b3e5d8c1a9f4e2b6c8d"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted exoscale credential."
