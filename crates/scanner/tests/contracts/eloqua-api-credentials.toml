# Per-detector contract: eloqua-api-credentials

schema_version = 1
detector_id = "eloqua-api-credentials"
service = "eloqua"
severity = "critical"

[[positive]]
text = "ELOQUA_SITE_NAME=Kp4Qx7Rm2Sn5Tb8V"
credential = "Kp4Qx7Rm2Sn5Tb8V"
reason = "ELOQUA_SITE_NAME with 16-char alphanumeric site name."

[[positive]]
text = "eloqua_password=Kp4Qx7Rm2Sn5Tb8V"
credential = "Kp4Qx7Rm2Sn5Tb8V"
reason = "Lowercase eloqua_password with 16-char password body."

[[negative]]
text = "site_name=short"
reason = "Keyword site_name present but no eloqua prefix — regex requires ELOQUA/eloqua at start."

[[evasion]]
text = "ELOQUA_CLIENT_ID = Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Space-separated assignment with ELOQUA_CLIENT_ID prefix."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Eloqua credential."
