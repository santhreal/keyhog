schema_version = 1
detector_id = "kafka-sasl-credentials"
service = "kafka"
severity = "high"

[[positive]]
text = "KAFKA_SASL_PASSWORD=SecretPass123456"
credential = "SecretPass123456"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"kafkauser\" password=\"SecretPass123456\";"
credential = "SecretPass123456"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "SASL_PLAINTEXT=short"
reason = "Truncated value below detector minimum length."

[[negative]]
text = "SASL_PLAINTEXT token abcdef"
reason = "Keyword context without valid credential body."

[[evasion]]
text = "KAFKA_SASL_PASSWORD=SecretPass123456"
credential = "SecretPass123456"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Kafka SASL Credentials credential."
