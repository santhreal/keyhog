schema_version = 1
detector_id = "drake-api-credentials"
service = "drake"
severity = "high"

[[positive]]
text = "drake_account_number=739104"
credential = "739104"
reason = "Drake account number with drake_account_number prefix and 6 digits."

[[positive]]
text = "DRAKE.SERIAL.NUMBER=K3P9Q7R2M8N4B6V1"
credential = "K3P9Q7R2M8N4B6V1"
reason = "Drake serial number with DRAKE.SERIAL.NUMBER prefix and 16 uppercase alnum chars."

[[negative]]
text = "drake_account_number=short"
reason = "Body too short — only 5 digits."

[[evasion]]
text = "drake_account_number=739104"
credential = "739104"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted drake credential."
