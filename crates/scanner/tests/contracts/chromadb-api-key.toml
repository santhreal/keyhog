schema_version = 1
detector_id = "chromadb-api-key"
service = "chromadb"
severity = "high"

[[positive]]
text = "CHROMA_AUTH_TOKEN=Kp4Qx7Rm2Sn5Tb8V"
credential = "Kp4Qx7Rm2Sn5Tb8V"
reason = "ChromaDB auth token env-var (16 alnum, above 8 min)."

[[positive]]
text = "X-Chroma-Token: Vk9Bn3Lp7Qm2Rs5Tw8"
credential = "Vk9Bn3Lp7Qm2Rs5Tw8"
reason = "X-Chroma-Token header form (18 alnum)."

[[negative]]
text = "CHROMA_AUTH_TOKEN=short"
reason = "Body 5 chars, below 8 minimum."

[[evasion]]
text = "Bearer X-Chroma-Token=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Bearer prefix before X-Chroma-Token header form."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted chromadb credential."
