schema_version = 1
detector_id = "rabbitmq-credentials"
service = "rabbitmq"
severity = "high"

[[positive]]
text = "amqp://user:SecretPass123456@rabbitmq.example.com:5672/vhost"
credential = "SecretPass123456"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "RABBITMQ_URL=\"amqps://admin:AnotherRabbitPass456@broker.example.com:5671/\""
credential = "AnotherRabbitPass456"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "amqps://YOUR_API_KEY_HERE_PLACEHOLDER_VALUE:YOUR_API_KEY_HERE_PLACEHOLDER_VALUE@rabbitmq.example.com:5671/vhost"
reason = "Placeholder-keyword body — suppression gate matches PLACEHOLDER prefix."

[[negative]]
text = "amqps://adminEXAMPLEEXAMPLE:YOUR_API_KEY_HERE_PLACEHOLDER_VALUE@rabbitmq.example.com:5671/vhost"
reason = "EXAMPLE token marker inside the body — suppression gate strips it."

[[evasion]]
text = "amqp://user:SecretPass123456@rabbitmq.example.com:5672/vhost"
credential = "SecretPass123456"
reason = "Adversarial header_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
