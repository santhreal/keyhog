schema_version = 1
detector_id = "libsql-credentials"
service = "libsql"
severity = "high"

[[positive]]
text = "libsql://78167825"
credential = "78167825"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "libsql://78167825=\"78167825\""
credential = "78167825"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "libsql://YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body — suppression gate matches PLACEHOLDER prefix."

[[negative]]
text = "libsql://78167825_EXAMPLE"
reason = "EXAMPLE token marker inside the body — suppression gate strips it."

[[evasion]]
text = "libsql://78167825"
credential = "78167825"
reason = "Adversarial header_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
