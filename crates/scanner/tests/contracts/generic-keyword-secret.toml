schema_version = 1
detector_id = "generic-keyword-secret"
service = "generic"
severity = "medium"

# Weakest-signal phase-2 member: it owns the LOW-entropy band [1.5, 2.8) beside a
# strong password/secret keyword, genuine short human-set secrets that sit BELOW
# generic-secret's 2.8 floor. A high-entropy body (>=2.8) is claimed by
# generic-secret instead, so the positive MUST use an in-band (~2.5) value.
# Proven-firing shapes lifted from regression_keyword_bridge_floor.rs.

[[positive]]
text = "password = \"gjbubxsu\""
credential = "gjbubxsu"
reason = "password keyword + in-band body (entropy ~2.5): above the 1.5 floor, below generic-secret's 2.8, so the keyword-secret family claims it."

[[positive]]
text = "SES_PASS=dzdvnffvqp"
credential = "dzdvnffvqp"
reason = "PASS-suffixed keyword + in-band body (entropy ~2.7)."

[[negative]]
text = "password=aaaaaa"
reason = "Repeated-char body (entropy 0) sits below even the 1.5 floor (generic-keyword-secret must not fire)."

[[evasion]]
text = "GRAPHITE_PASS=gjbubxsu"
credential = "gjbubxsu"
reason = "Uppercase _PASS keyword variant + in-band body."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted keyword secret."
