schema_version = 1
detector_id = "wechat-api-credentials"
service = "wechat"
severity = "critical"

[[positive]]
text = '''WECHAT_APPID=wxb044e1c1cb3f7ece
wechat app_secret=a1b2c3d4e5f678901234567890123456'''
credential = "a1b2c3d4e5f678901234567890123456"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = '''appid: wxc155d2e3cb4f8fdf
WECHAT app_secret="b2c3d4e5f67890123456789012345678"'''
credential = "b2c3d4e5f67890123456789012345678"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body — suppression gate matches PLACEHOLDER prefix."

[[negative]]
text = "wxb04EXAMPLEEXAMPLEf7ece"
reason = "EXAMPLE token marker inside the body — suppression gate strips it."

[[evasion]]
text = "export wechat app_secret=a1b2c3d4e5f678901234567890123456"
credential = "a1b2c3d4e5f678901234567890123456"
reason = "Adversarial envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
