schema_version = 1
detector_id = "docusign-api-credentials"
service = "docusign"
severity = "critical"

[[positive]]
text = "DOCUSIGN_INTEGRATION_KEY=0a82d930-0311-5873-e7cb-7c3a6be1eacf"
credential = "0a82d930-0311-5873-e7cb-7c3a6be1eacf"
reason = "DocuSign Integration Key with env-var anchor and lowercase hex UUID."

[[positive]]
text = "DOCUSIGN_API_PASSWORD=LIGGJ9sj2pGnyhw0"
credential = "LIGGJ9sj2pGnyhw0"
reason = "DocuSign legacy API password with 16-char alnum body."

[[negative]]
text = "DOCUSIGN_INTEGRATION_KEY=short"
reason = "Body too short / wrong shape."

[[evasion]]
text = "DOCUSIGN_INTEGRATION_KEY=0a82d930-0311-5873-e7cb-7c3a6be1eacf"
credential = "0a82d930-0311-5873-e7cb-7c3a6be1eacf"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted DocuSign credential."
