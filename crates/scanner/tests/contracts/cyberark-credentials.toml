schema_version = 1
detector_id = "cyberark-credentials"
service = "cyberark"
severity = "critical"

[[positive]]
text = "cyberark.appid = Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "cyberark.appid anchor with 20-char alphanumeric value."

[[positive]]
text = "AIMWebService endpoint AppID:z0PbVqvHtsi0H0WJVoDJnedvagQP3o9o"
credential = "z0PbVqvHtsi0H0WJVoDJnedvagQP3o9o"
reason = "AIMWebService context with AppID delimiter."

[[negative]]
text = "cyberark_appid=ab"
reason = "Only 2 chars, below 8-character minimum."

[[evasion]]
text = "cyberark.api_key=\"Kp4Qx7Rm2Sn5Tb8Vw3Yz\""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Quoted JSON value for cyberark API key."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted CyberArk credential."
