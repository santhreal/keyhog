# Per-detector contract: stripe-secret-key
#
# The Stripe docs demo key (`sk_live_4eC39HqLyjWDarjtT1zdp7dc`) is
# suppressed by the bundled `data/suppressions/test-fixtures.toml`
# Tier-B list, this contract uses different sample keys so the
# detector contract is independent of the suppression list.

schema_version = 1
detector_id = "stripe-secret-key"
service = "stripe"
severity = "critical"
# README claim (top-level scalar, see every_contract_readme_claim_present):
readme_claim = "Stripe"

# ---- POSITIVES ------------------------------------------------------

[[positive]]
text = "STRIPE_SECRET_KEY=sk_live_aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789aBcD"
credential = "sk_live_aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789aBcD"
reason = "env-var-style assignment, common CI shape."

[[positive]]
text = "stripe.secret = \"sk_test_1234567890ABCDEFghijklmnopqrstuvwxyz1234\""
credential = "sk_test_1234567890ABCDEFghijklmnopqrstuvwxyz1234"
reason = "Quoted assignment with sk_test_ prefix."

[[positive]]
text = "Authorization: Bearer sk_live_zZxXcCvVbBnNmMqQwWeErRtTyYuUiIoOpP1234"
credential = "sk_live_zZxXcCvVbBnNmMqQwWeErRtTyYuUiIoOpP1234"
reason = "HTTP Authorization header."

# ---- NEGATIVES ------------------------------------------------------

[[negative]]
text = "sk_live_short"
reason = "Too short (pattern requires 24+ alphanumerics after sk_live_)."

[[negative]]
text = "sk_live_with-dashes-in-it-not-valid12"
reason = "Dashes break the [a-zA-Z0-9]{24,} class."

[[negative]]
text = "the regex is sk_live_[a-zA-Z0-9]{24,}"
reason = "Detector's own regex string appearing as text."

# ---- EVASIONS -------------------------------------------------------

[[evasion]]
text = "STRIPE_SECRET_KEY=sk_live_aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789aBcD"
credential = "sk_live_aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789aBcD"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[[evasion]]
text = "<config><stripe>sk_test_xMlEnCoDeDxMlEnCoDeDxMlEnCoDeDxMl</stripe></config>"
credential = "sk_test_xMlEnCoDeDxMlEnCoDeDxMlEnCoDeDxMl"
reason = "Inside an XML element body."

# ---- PERF / SCALE ---------------------------------------------------

[perf]
fixture_bytes = 4096
max_microseconds = 15000
note = "Same baseline as aws-access-key."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 1.0
note = "Smaller scale than aws-access-key, keyhog's chunk-level bigram-bloom early-reject filter is more selective for sk_live_ than for AKIA, so the planted secret needs to land within a 1 MiB window of contextual bigrams to survive prefilter on the synthetic filler. Tighten when bigram-bloom is replaced by the lego-block alphabet_screen."
