schema_version = 1
detector_id = "vertexai-service-account"
service = "vertexai"
severity = "critical"

# The detector is JSON-only by design: it anchors on the
# type=service_account -> project_id -> private_key field chain of a
# GCP service-account key file. It deliberately does NOT fire on the
# bare `GOOGLE_APPLICATION_CREDENTIALS` env-var name, which names the
# path to such a file and appears in countless non-secret configs.
# (The original gen_contracts.py stub asserted the bare env-var name as
# a positive, which the detector correctly refuses; fixtures corrected.)

[[positive]]
text = "{\"type\": \"service_account\", \"project_id\": \"my-proj-123\", \"private_key\": \"-----BEGIN PRIVATE KEY-----"
credential = "service_account"
reason = "Real service-account JSON: the type/project_id/private_key field chain the detector regex anchors on."

[[positive]]
text = "type=service_account project_id=acme-prod private_key=-----BEGIN PRIVATE KEY-----"
credential = "service_account"
reason = "Unquoted key=value variant of the service-account blob."

[[negative]]
text = "{\"type\": \"authorized_user\", \"project_id\": \"my-proj-123\"}"
reason = "Wrong account type (authorized_user) and no private_key chain - not a service-account key."

[[negative]]
text = "GOOGLE_APPLICATION_CREDENTIALS=/etc/gcp/sa.json"
reason = "Bare env-var naming the credentials PATH, not a key blob - must not fire."
