schema_version = 1
detector_id = "alertmanager-credentials"
service = "alertmanager"
severity = "high"

[[positive]]
text = "ALERTMANAGER_USER=admin_user_kp4qx7rm2sn\nALERTMANAGER_PASSWORD=Kr6vtSWYiEiFtyZ57KOOJcBN9fbInvPq"
credential = "Kr6vtSWYiEiFtyZ57KOOJcBN9fbInvPq"
reason = "AlertManager password paired with its username."

[[positive]]
text = "alertmanager PASSWORD=Qp7VbT2hYRzNcMfWj4DgEsLuHaIoBnVk"
credential = "Qp7VbT2hYRzNcMfWj4DgEsLuHaIoBnVk"
reason = "Lowercase alertmanager + space + PASSWORD form."

[[negative]]
text = "ALERTMANAGER_USER=monitoring_user_vk9bn"
reason = "A username without a password is public identity, not a credential."

[[evasion]]
text = "ALERTMANAGER PASS: Vw3YzKp4Qx7Rm2Sn5Tb8NcMfWj4DgEsL"
credential = "Vw3YzKp4Qx7Rm2Sn5Tb8NcMfWj4DgEsL"
reason = "Space + colon between ALERTMANAGER and PASS."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted AlertManager creds."
