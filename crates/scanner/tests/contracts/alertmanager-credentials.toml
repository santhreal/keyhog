schema_version = 1
detector_id = "alertmanager-credentials"
service = "alertmanager"
severity = "high"

[[positive]]
text = "ALERTMANAGER_USER=admin_user_kp4qx7rm2sn"
credential = "admin_user_kp4qx7rm2sn"
reason = "AlertManager username env-var."

[[positive]]
text = "alertmanager USERNAME=monitoring_user_vk9bn"
credential = "monitoring_user_vk9bn"
reason = "Lowercase alertmanager + space + USERNAME form."

[[negative]]
text = "ALERTMANAGER_USER="
reason = "Empty body."

[[evasion]]
text = "ALERTMANAGER USER: admin_user_kp4qx7rm2sn"
credential = "admin_user_kp4qx7rm2sn"
reason = "Space + colon between ALERTMANAGER and USER."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted AlertManager creds."
