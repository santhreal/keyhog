schema_version = 1
detector_id = "fivetran-api-credentials"
service = "fivetran"
severity = "critical"

[[positive]]
text = "FIVETRAN_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Standard env-var assignment with uppercase prefix."

[[positive]]
text = "fivetran.api.key:7b3e5d8c1a9f4e2b6c8d"
credential = "7b3e5d8c1a9f4e2b6c8d"
reason = "Lowercase dotted prefix with colon separator."

[[negative]]
text = "fivetran_api_key=short"
reason = "Body too short (5 chars) for 20+ alnum requirement."

[[evasion]]
text = 'export FIVETRAN_API_KEY="Kp4Qx7Rm2Sn5Tb8Vw3Yz"'
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Quoted shell export with keyword prefix."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted fivetran credential."
