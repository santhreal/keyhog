# Per-detector contract: dwolla-client-credentials

schema_version = 1
detector_id = "dwolla-client-credentials"
service = "dwolla"
severity = "critical"

[[positive]]
text = "DWOLLA_CLIENT_ID=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4"
reason = "env-var-style DWOLLA_CLIENT_ID with 22-char alphanumeric body."

[[positive]]
text = "dwolla_secret=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4"
reason = "Lowercase dwolla_secret with 44-char body matching the secret pattern."

[[negative]]
text = "DWOLLA_CLIENT_ID=short"
reason = "Body too short — pattern requires 20+ chars for ID."

[[evasion]]
text = "set DWOLLA_CLIENT_SECRET=\"Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4\""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKp4"
reason = "Quoted shell-style assignment with DWOLLA_CLIENT_SECRET prefix."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Dwolla credential."
