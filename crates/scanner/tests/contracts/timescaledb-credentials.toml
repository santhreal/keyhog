schema_version = 1
detector_id = "timescaledb-credentials"
service = "timescaledb"
severity = "critical"

[[positive]]
text = "TIMESCALEDB PASSWORD=TimescaleDbPass1234"
credential = "TimescaleDbPass1234"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "TIMESCALE TOKEN=\"TimescaleDbPass12345678\""
credential = "TimescaleDbPass12345678"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "TIMESCALE_PASSWORD=shortpassword"
reason = "Body fails the {16,} length constraint."

[[negative]]
text = "TIMESCALE_PASSWORD=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder password (suppression gate strips it)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted TimescaleDB password."

# ---- EVASION (adversarial) -----------------------------------------

[[evasion]]
text = "# TIMESCALEDB_PASSWORD=TimescaleDbPass1234  # db"
credential = "TimescaleDbPass1234"
reason = "Commented-out config; TIMESCALEDB PASSWORD keyword + password intact inside the comment."
