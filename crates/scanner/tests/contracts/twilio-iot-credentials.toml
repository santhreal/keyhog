schema_version = 1
detector_id = "twilio-iot-credentials"
service = "twilio-iot"
severity = "critical"

[[positive]]
text = """TWILIO_IOT_ACCOUNT_SID=AC2c4e6d8a1b3f5e7c9d2a4b6e8f1c3d5a
TWILIO_IOT_AUTH_TOKEN=8d3e5b7c9a1f2e4d6c8b0d2a4c6e8f1b"""
credential = "AC2c4e6d8a1b3f5e7c9d2a4b6e8f1c3d5a"
reason = "IoT Account SID paired with required auth token."

[[positive]]
text = """TWILIO_IOT_AUTH_TOKEN=8d3e5b7c9a1f2e4d6c8b0d2a4c6e8f1b
TWILIO_IOT_ACCOUNT_SID=ACabcdef1234567890abcdef1234567890"""
credential = "ACabcdef1234567890abcdef1234567890"
reason = "Auth token before SID — still within companion window."

[[negative]]
text = "TWILIO_IOT_ACCOUNT_SID=AC2c4e6d8a1b3f5e7c9d2a4b6e8f1c3d5a"
reason = "Account SID alone — required auth-token companion missing."

[[negative]]
text = "TWILIO_IOT_AUTH_TOKEN=8d3e5b7c9a1f2e4d6c8b0d2a4c6e8f1b"
reason = "Auth token alone — no Account SID primary."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Twilio IoT credentials."
