[[positive]]
text = "PLAID=\"c1517b308bdbe0ebd278e1b7\""
credential = "c1517b308bdbe0ebd278e1b7"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "PLAID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body (suppression gate matches PLACEHOLDER prefix)."

[[negative]]
text = "PLAID=c1517EXAMPLEEXAMPLE8e1b7"
