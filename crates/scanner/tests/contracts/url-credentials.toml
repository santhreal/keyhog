# Per-detector contract: url-credentials
#
# Detector regex: `(?i)[a-z][a-z0-9+.-]*://[^/@\s:]*:([^/@\s<>]{6,128})@[a-z0-9._-]`
# — scheme `://` [user] `:` (password, group 1) `@` host. Captures ONLY the
# userinfo password slot for ANY scheme. STRONG-anchor (not weak): the structural
# slot proves the credential position, so the Tier-B randomness floor is skipped
# and SHORT all-lowercase random passwords surface. Placeholders are dropped by
# (a) the `{6,128}` value floor (short words `pass`/`admin`), (b) the
# `dictionary_word_placeholder` gate (confident English words `password`/`secret`),
# (c) the regex `<>` exclusion (templates) and the Tier-A `$VAR` marker gate.

schema_version = 1
detector_id = "url-credentials"
service = "generic"
severity = "high"

# ---- POSITIVES (recall) ---------------------------------------------

[[positive]]
text = "ftp://deploy:Xy9KmPq2LvWnB7tR@ftp.internal.example.com:8021/release/"
credential = "Xy9KmPq2LvWnB7tR"
reason = "ftp:// userinfo password — a scheme the database-specific detectors never cover."

[[positive]]
text = "amqp://svc:zK4mP9qL2vW7nB3t@broker.prod.example.net:5672/vhost"
credential = "zK4mP9qL2vW7nB3t"
reason = "AMQP broker URL — generic userinfo capture, not a database connection string."

[[positive]]
text = "repo = 'https://ci-bot:Rt8Vy3Bn6Kc4mLp9@git.example.org/team/repo.git'"
credential = "Rt8Vy3Bn6Kc4mLp9"
reason = "https git remote with an embedded token-as-password — the dominant CI leak shape."

[[positive]]
text = "mqtt://device01:h84mLpQw7RtVy1Bn@mqtt.example.io:1883"
credential = "h84mLpQw7RtVy1Bn"
reason = "MQTT device URL — IoT credential in userinfo, no database scheme involved."

[[positive]]
text = "ftp://deploy:nxrhoapftbufvq@ftp.internal.example.com/incoming/"
credential = "nxrhoapftbufvq"
reason = "All-lowercase random password — the strong anchor recovers it where the generic random-vs-dictionary floor would decline a short lowercase token."

# ---- NEGATIVES (precision) ------------------------------------------

[[negative]]
text = "https://username:password@repo.example.org/team/repo.git"
reason = "`password` is a confident dictionary word — the dictionary_word_placeholder gate must drop it."

[[negative]]
text = "redis://app:secret@cache.example.com:6379/0"
reason = "`secret` is a confident dictionary word (6 chars, English bigrams) — must stay suppressed."

[[negative]]
text = "https://user:pass@host.example.com/"
reason = "`pass` is 4 chars — below the `{6,128}` value floor, the regex never matches."

[[negative]]
text = "postgres://user:changeme@db.example.com:5432/app"
reason = "`changeme` is a canonical placeholder word, not a real secret."

[[negative]]
text = "Connect to the API at https://api.example.com:8443/v1/users for details."
reason = "host:port with NO userinfo `@` — the regex cannot match (no credential slot)."

[[negative]]
text = "clone the mirror with `git clone https://github.com/example/repo.git`"
reason = "A plain URL with no userinfo component — nothing to capture."

[[negative]]
text = "DATABASE_URL=postgres://user:<password>@db.example.com:5432/app"
reason = "An angle-bracket template — `<` `>` are excluded from the value class, so it never matches."

[[negative]]
text = "redis://cache:$REDIS_PASSWORD@cache.example.net:6379/0"
reason = "A shell-variable reference, not a literal secret — the example gauntlet must drop it."

# ---- EVASIONS (adversarial) -----------------------------------------

[[evasion]]
text = "redis://:Qw7RtVy1Bn6Kc4mL@cache.example.com:6379/0"
credential = "Qw7RtVy1Bn6Kc4mL"
reason = "EMPTY username (`redis://:pw@`) — the optional-user branch must still capture the password."

[[evasion]]
text = "FTP://Deploy:Vy3Bn6Kc4mLp9Rt8@FTP.EXAMPLE.COM/incoming/"
credential = "Vy3Bn6Kc4mLp9Rt8"
reason = "Upper-cased scheme and host — the (?i) flag must still surface the password."

[[evasion]]
text = "proxy = http://operator:p9RdK3y7mQ2xV6nL@proxy.example.com:8080"
credential = "p9RdK3y7mQ2xV6nL"
reason = "An http proxy URL with an embedded credential — must fire on the proxy scheme too."

# ---- PERFORMANCE / SCALE BUDGETS ------------------------------------

[perf]
fixture_bytes = 4096
max_microseconds = 15000
note = "Single anchored pattern gated behind the `://` literal prefilter; the bounded `[^/@\\s<>]{6,128}` capture between `:` and `@` cannot run away."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB of plain-URL filler (no userinfo) with one planted credential URL; the regex fast-fails every URL lacking a `:<value>@host` authority."
