schema_version = 1
detector_id = "google-cloud-iot-credentials"
service = "google-cloud-iot"
severity = "critical"

[[positive]]
text = "cloudiot_PROJECT_ID=my-iot-project-01"
credential = "my-iot-project-01"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "CLOUDIOT_REGISTRY_ID=my-registry-01"
credential = "my-registry-01"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "GOOGLE_CLOUD_IOT=short"
reason = "Truncated value below detector minimum length."

[[negative]]
text = "GOOGLE_CLOUD_IOT token abcdef"
reason = "Keyword context without valid credential body."

[[evasion]]
text = "cloudiot_PROJECT_ID=my-iot-project-01"
credential = "my-iot-project-01"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Google Cloud IoT Credentials credential."
