schema_version = 1
detector_id = "kafka-connect-credentials"
service = "kafka-connect"
severity = "critical"

[[positive]]
text = "CONNECT_PASSWORD=KafkaConnectPass123"
credential = "KafkaConnectPass123"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "connect.password=\"KafkaConnectPass123\""
credential = "KafkaConnectPass123"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "connect.password=short"
reason = "Truncated value below detector minimum length."

[[negative]]
text = "connect.password token abcdef"
reason = "Keyword context without valid credential body."

[[evasion]]
text = "CONNECT_PASSWORD=KafkaConnectPass123"
credential = "KafkaConnectPass123"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Apache Kafka Connect Credentials credential."
