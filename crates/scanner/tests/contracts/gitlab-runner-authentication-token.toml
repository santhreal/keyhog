schema_version = 1
detector_id = "gitlab-runner-authentication-token"
service = "gitlab"
severity = "high"

[[positive]]
text = 'CI_RUNNER_TOKEN=glrt-2CR8_eVxiioB1QmzPZwa'
credential = "glrt-2CR8_eVxiioB1QmzPZwa"
reason = "Standard glrt- runner auth token (20 base64url body chars)."

[[positive]]
text = 'runner_token = "glrt-t1_AbCdEfGhIjKlMnOpQrStUvWxYz0.9z8y7x6w5"'
credential = "glrt-t1_AbCdEfGhIjKlMnOpQrStUvWxYz0.9z8y7x6w5"
reason = "Routable glrt-t<n>_ variant: body, dot separator, 9-char suffix."

[[negative]]
text = 'glrt-short'
reason = "Body far below the 20-char minimum; cannot be a runner token."

[[evasion]]
text = "export CI_SERVER_TOKEN='glrt-2CR8_eVxiioB1QmzPZwa'"
credential = "glrt-2CR8_eVxiioB1QmzPZwa"
reason = "Shell export with single quotes around the token."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted GitLab runner token."
