schema_version = 1
detector_id = "akoya-client-credentials"
service = "akoya"
severity = "critical"

[[positive]]
text = "AKOYA_CLIENT_ID=Kp4Qx7Rm2Sn\nAKOYA_CLIENT_SECRET=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5"
credential = "Kp4Qx7Rm2Sn"
reason = "Akoya client ID with required client_secret companion."

[[positive]]
text = "akoya.client.id:\"Vk9Bn3Lp7Qm2Rs5Tw8\"\nakoya.client.secret:\"Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz\""
credential = "Vk9Bn3Lp7Qm2Rs5Tw8"
reason = "Lowercase dot-separated form with secret companion."

[[positive]]
text = "Akoya_Client_Id=Kp4Qx7Rm2Sn\nAkoya_Client_Secret=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5"
credential = "Kp4Qx7Rm2Sn"
reason = "Mixed-case config keys must resolve the required companion just like uppercase and lowercase keys."

[[negative]]
text = "AKOYA_CLIENT_ID=Kp4Qx7Rm2Sn"
reason = "Missing required akoya_client_secret companion."

[[evasion]]
text = "Bearer akoya-client-id=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4\nakoya-client-secret=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4"
reason = "Bearer prefix with hyphen-separated key names."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
