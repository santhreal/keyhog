schema_version = 1
detector_id = "prometheus-remote-write-credentials"
service = "prometheus"
severity = "high"

[[positive]]
text = '''remote_write:
  - url: https://prom.example.com/api/v1/write
    basic_auth:
      username: prom_remote_user
      password: s3cr3t'''
credential = "prom_remote_user"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = '''remote_write:
  - url: https://prom.example.com/api/v1/write
    basic_auth:
      username: prom_remote_user
      password: s3cr3t'''
credential = "prom_remote_user"
reason = "YAML remote_write basic_auth username variant."

[[negative]]
text = '''remote_write:
  - url: https://prom.example.com/api/v1/write
    basic_auth:
      username: YOUR_API_KEY_HERE_PLACEHOLDER_VALUE
      password: s3cr3t'''
reason = "Placeholder-keyword body — suppression gate matches PLACEHOLDER prefix."

[[negative]]
text = '''remote_write:
  - url: https://prom.example.com/api/v1/write
    basic_auth:
      username: prom_EXAMPLEEXAMPLE_user
      password: s3cr3t'''
reason = "EXAMPLE token marker inside the body — suppression gate strips it."

[[evasion]]
text = "remote_write:\n  - url: https://prom.example.com/api/v1/write\n    basic_auth:\n      username: prom_remote_user\n      password: s3cr3t"
credential = "prom_remote_user"
reason = "Adversarial header_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
