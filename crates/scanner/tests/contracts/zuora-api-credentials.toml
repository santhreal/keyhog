schema_version = 1
detector_id = "zuora-api-credentials"
service = "zuora"
severity = "critical"

# Zuora OAuth client IDs require a `ZUORA_CLIENT_ID` context anchor. The
# client-secret companion is optional but raises confidence when paired.

[[positive]]
text = """ZUORA_CLIENT_ID=abc123def4567890abc123def4567890abc123def4
ZUORA_CLIENT_SECRET=def4567890abc123def4567890abc123def4567890"""
credential = "abc123def4567890abc123def4567890abc123def4"
reason = "Standard env-var pair (client ID with secret companion)."

[[positive]]
text = "zuora_client_id=abc123def4567890abc123def4567890abc123def4"
credential = "abc123def4567890abc123def4567890abc123def4"
reason = "Lowercase client ID alone (companion optional)."

[[negative]]
text = "ZUORA_CLIENT_ID=tooshort"
reason = "Body fails the {32,64} hex length constraint."

[[negative]]
text = "ZUORA_CLIENT_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder body (suppression gate strips it)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Zuora client ID."

# ---- EVASION (adversarial) -----------------------------------------

[[evasion]]
text = "# ZUORA_CLIENT_ID=abc123def4567890abc123def4567890abc123def4  # billing"
credential = "abc123def4567890abc123def4567890abc123def4"
reason = "Commented-out config; ZUORA_CLIENT_ID keyword + id intact inside the comment."
