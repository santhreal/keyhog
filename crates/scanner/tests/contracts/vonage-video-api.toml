schema_version = 1
detector_id = "vonage-video-api"
service = "vonage"
severity = "critical"

[[positive]]
text = "VONAGE_API_KEY=54689afc\nVONAGE_API_SECRET=0123456789abcdef"
credential = "0123456789abcdef"
reason = "Video API secret is the finding and the API key is companion context."

[[positive]]
text = "vonage_api_secret = 'A1b2C3d4E5f6G7h8'"
credential = "A1b2C3d4E5f6G7h8"
reason = "Standalone mixed-case alphanumeric Video API secret."

[[negative]]
text = "VONAGE_API_KEY=54689afc"
reason = "An account API key alone is an identifier, not the confidential secret."

[[negative]]
text = "VONAGE_API_SECRET=0123456789abcde"
reason = "Secret below the exact 16-character shape."

[[negative]]
text = "VONAGE_API_SECRET=0123456789abcdef0"
reason = "Secret above the exact 16-character shape."

[[negative]]
text = "0123456789abcdef"
reason = "Bare 16-character value without a Vonage secret anchor."

[[evasion]]
text = "# VONAGE_API_KEY=54689afc\n# VONAGE_API_SECRET=0123456789abcdef"
credential = "0123456789abcdef"
reason = "Commented configuration still exposes the confidential secret."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler plus a planted Vonage Video API secret."
