schema_version = 1
detector_id = "bunnycdn-api-key"
service = "bunnycdn"
severity = "critical"

[[positive]]
text = "bunnycdn-key=abcdef12-3456-7890-abcd-ef1234567890"
credential = "abcdef12-3456-7890-abcd-ef1234567890"
reason = "Standard bunnycdn-key prefix with UUID body."

[[positive]]
text = "AccessKey=9a3b7c2e-4d1f-6a8b-0c5d-9e3f7a1b4c2d"
credential = "9a3b7c2e-4d1f-6a8b-0c5d-9e3f7a1b4c2d"
reason = "AccessKey header variant with UUID body."

[[negative]]
text = "bunnycdn-key=short"
reason = "Body below UUID length."

[[evasion]]
text = "{\"bunnycdn_token\":\"abcdef12-3456-7890-abcd-ef1234567890\"}"
credential = "abcdef12-3456-7890-abcd-ef1234567890"
reason = "JSON-quoted variant still matches via quote in separator class."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted BunnyCDN API key."
