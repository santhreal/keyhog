schema_version = 1
detector_id = "looker-api-credentials"
service = "looker"
severity = "high"






[[positive]]
text = "LOOKERSDK_base_url=https://demo.cloud.looker.com:19999"
credential = "https://demo.cloud.looker.com:19999"
reason = "Hand-tuned positive matching detector regex (R2-F adversarial batch)."

[[positive]]
text = "LOOKERSDK_client_id=\"abc123def456ghi789\""
credential = "abc123def456ghi789"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "LOOKERSDK_BASE_URL=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body (suppression gate matches PLACEHOLDER prefix)."

[[negative]]
text = "LOOKERSDK_BASE_URL=httpsEXAMPLEEXAMPLE19999"
reason = "EXAMPLE token marker inside the body (suppression gate strips it)."

[[evasion]]
text = "LOOKERSDK_base_url=https://demo.cloud.looker.com:19999"
credential = "https://demo.cloud.looker.com:19999"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
