schema_version = 1
detector_id = "okta-widget-api-credentials"
service = "okta"
severity = "high"

[[positive]]
text = "const widget = new OktaSignIn({ clientId: \"0oa1b2c3d4e5f6g7h8i9\" });"
credential = "0oa1b2c3d4e5f6g7h8i9"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "const widget = new OktaSignIn({ clientId: \"0oa1b2c3d4e5f6g7h8i9\" });"
credential = "0oa1b2c3d4e5f6g7h8i9"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "const widget = new OktaSignIn({ clientId: \"YOUR_API_KEY_HERE_PLACEHOLDER_VALUE\" });"
reason = "Placeholder-keyword body — suppression gate matches PLACEHOLDER prefix."

[[negative]]
text = "const widget = new OktaSignIn({ clientId: \"0oa1bEXAMPLEEXAMPLE7h8i9\" });"
reason = "EXAMPLE token marker inside the body — suppression gate strips it."

[[evasion]]
text = "export const widget = new OktaSignIn({ clientId: \"0oa1b2c3d4e5f6g7h8i9\" });"
credential = "0oa1b2c3d4e5f6g7h8i9"
reason = "Adversarial env_export envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
