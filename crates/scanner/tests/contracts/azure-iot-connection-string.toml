schema_version = 1
detector_id = "azure-iot-connection-string"
service = "azure-iot-hub"
severity = "critical"

[[positive]]
text = "HostName=prod-hub.azure-devices.net;SharedAccessKeyName=iothubowner;SharedAccessKey=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpZQ"
credential = "HostName=prod-hub.azure-devices.net;SharedAccessKeyName=iothubowner;SharedAccessKey=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpZQ"
reason = "Azure IoT Hub connection string with SharedAccessKey (44 base64)."

[[positive]]
text = "HostName=device-hub.azure-devices.net;DeviceId=device001;SharedAccessKey=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5Tw8Vk9BVkQR"
credential = "HostName=device-hub.azure-devices.net;DeviceId=device001;SharedAccessKey=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5Tw8Vk9BVkQR"
reason = "Azure IoT Hub device connection string."

[[negative]]
text = "HostName=example.com;Other=value"
reason = "Not an azure-devices.net hostname."

[[evasion]]
text = "IOTHUB_CONNECTION_STRING='HostName=prod-hub.azure-devices.net;SharedAccessKeyName=iothubowner;SharedAccessKey=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpZQ'"
credential = "HostName=prod-hub.azure-devices.net;SharedAccessKeyName=iothubowner;SharedAccessKey=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3YzKpZQ"
reason = "IOTHUB_CONNECTION_STRING env-var form (third pattern, captures whole string)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted IoT Hub connection."
