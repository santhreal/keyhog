schema_version = 1
detector_id = "auth0-spa-credentials"
service = "auth0"
severity = "high"

[[positive]]
text = "auth0 config client_id: 'Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn'"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn"
reason = "Auth0 SPA client_id with context anchor."

[[positive]]
text = "auth0Config = { client_id: 'Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs' }"
credential = "Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs"
reason = "JavaScript auth0Config form."

[[negative]]
text = "auth0 client_id: 'short'"
reason = "Body below 20 alnum chars."

[[evasion]]
text = "AUTH0_CONFIG = { client_id: \"Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn\" }"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn"
reason = "Uppercase AUTH0 wrapping form."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Auth0 SPA credentials."
