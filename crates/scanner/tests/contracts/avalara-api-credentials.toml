schema_version = 1
detector_id = "avalara-api-credentials"
service = "avalara"
severity = "critical"

[[positive]]
text = "AVALARA_ACCOUNT_ID=1234567\nAVALARA_LICENSE_KEY=Kp4Qx7Rm2Sn5Tb8V"
credential = "Kp4Qx7Rm2Sn5Tb8V"
reason = "Avalara license key with required account_id companion."

[[positive]]
text = "avalara.account.id=2345678\navalara.license.KEY=Vk9Bn3Lp7Qm2Rs5T"
credential = "Vk9Bn3Lp7Qm2Rs5T"
reason = "Lowercase avalara.account.id + license.KEY form (regex needs uppercase KEY)."

[[negative]]
text = "LICENSE_KEY=Kp4Qx7Rm2Sn5Tb8V"
reason = "Unscoped license key without Avalara/Avatax context."

[[evasion]]
text = "AVATAX_ACCOUNT_ID=9876543\nAVATAX_LICENSE_KEY=Kp4Qx7Rm2Sn5Tb8V"
credential = "Kp4Qx7Rm2Sn5Tb8V"
reason = "AVATAX alias for AVALARA."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Avalara creds + account companion."
