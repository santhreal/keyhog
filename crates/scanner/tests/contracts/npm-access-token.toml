# Per-detector contract: npm-token
#
# Format: `npm_` + exactly 36 alphanumeric chars. Fixed-width; precision
# is high because the prefix + exact length is distinctive.

schema_version = 1
detector_id = "npm-access-token"
service = "npm"
severity = "critical"

# ---- POSITIVES (recall) ---------------------------------------------

[[positive]]
text = "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"
credential = "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"
reason = "Bare canonical npm token, exactly 36 chars after npm_."

[[positive]]
text = "NPM_TOKEN=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"
credential = "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"
reason = "Standard env-var name from npm-cli docs."

[[positive]]
text = "//registry.npmjs.org/:_authToken=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"
credential = "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"
reason = "Verbatim `.npmrc` _authToken shape (the #1 npm leak path on GitHub)."

# ---- NEGATIVES (precision) ------------------------------------------

[[negative]]
text = "npm_short"
reason = "Body shorter than 36 chars."

[[negative]]
text = "npm_9X3kQp7VbT2hYRzNcMfWj4DgEsLuHaXXXXXX"
reason = "Correct length (36 chars after npm_) but invalid CRC32 base62 checksum (must be rejected by the npm checksum validator)."

[[negative]]
text = "npm install some-package"
reason = "`npm ` followed by a command, not the `npm_` prefix (must not match)."

# ---- EVASIONS (adversarial) -----------------------------------------

[[evasion]]
text = "# NPM_TOKEN=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"
credential = "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"
reason = "Shell-comment `.npmrc` line (engineers stash these in scripts)."

[[evasion]]
text = "Authorization: Bearer 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"
credential = "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"
reason = "Bearer-token header context."

# ---- PERFORMANCE / SCALE BUDGETS ------------------------------------

[perf]
fixture_bytes = 4096
max_microseconds = 15000
note = "Standard single-file budget; 36-char fixed extraction is fast."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler with one planted npm token. Fixed-width regex can't run greedy."
