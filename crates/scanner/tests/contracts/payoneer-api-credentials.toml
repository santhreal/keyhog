[[evasion]]
text = "export PAYONEERCLIENTSECRET=0XDdFBQiYgzN6zGNHJk7ky3v1b89yfc1DIbzaRI_hy"
credential = "0XDdFBQiYgzN6zGNHJk7ky3v1b89yfc1DIbzaRI_hy"
