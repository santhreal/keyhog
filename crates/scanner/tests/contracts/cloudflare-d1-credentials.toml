schema_version = 1
detector_id = "cloudflare-d1-credentials"
service = "cloudflare"
severity = "high"

[[positive]]
text = "CF_D1_API_TOKEN=AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
credential = "AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
reason = "Canonical CF_D1_API_TOKEN env-var with 40 alnum chars."

[[positive]]
text = "D1_TOKEN=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5Tw8Vk9B"
credential = "Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp7Qm2Rs5Tw8Vk9B"
reason = "Short D1_TOKEN anchor with 42 alnum chars."

[[negative]]
text = "CF_D1_API_TOKEN=short"
reason = "Body below 40 chars; regex requires at least 40."

[[evasion]]
text = "Authorization: Bearer CF_D1_API_TOKEN=AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
credential = "AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd"
reason = "Bearer-header wrap around the assignment."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Cloudflare D1 token."
