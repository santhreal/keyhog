[[evasion]]
text = "{\"routee_application_secret\":\"efd599b0b2565062026f2555\"}"
credential = "efd599b0b2565062026f2555"
reason = "JSON-config envelope evasion: the credential is wrapped in JSON but the service key (routee_application_secret) survives as the field name, so the detector still surfaces it. A context-free {\"secret\":\"<hex>\"} carries no service marker and is correctly NOT claimed (firing on it would flag any JSON hash field)."

