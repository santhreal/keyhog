schema_version = 1
detector_id = "foundation-api-key"
service = "foundation"
severity = "medium"

[[positive]]
text = "foundation API KEY= \"M9TBrKrmGsNmjQ8mT3OA12345678\""
credential = "M9TBrKrmGsNmjQ8mT3OA12345678"
reason = "Quoted Foundation API key assignment matching detector anchor."

[[positive]]
text = "FOUNDATION_API_KEY=\"odFX1GOZrhrztAQpiN0k12345678\""
credential = "odFX1GOZrhrztAQpiN0k12345678"
reason = "Env-var quoted variant of the canonical positive."

[[negative]]
text = "foundation=short"
reason = "Truncated value below detector minimum length."

[[negative]]
text = "foundation token abcdef"
reason = "Keyword context without valid credential body."

[[evasion]]
text = "foundation API KEY= \"M9TBrKrmGsNmjQ8mT3OA12345678\""
credential = "M9TBrKrmGsNmjQ8mT3OA12345678"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Foundation API Key credential."
