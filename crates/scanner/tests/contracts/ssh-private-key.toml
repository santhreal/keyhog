schema_version = 1
detector_id = "ssh-private-key"
service = "ssh"
severity = "critical"

[[positive]]
text = "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASC\n-----END PRIVATE KEY-----"
credential = "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASC\n-----END PRIVATE KEY-----"
reason = "Canonical full PEM block surfaces as one credential, not a header marker."

[[positive]]
text = "SSH_PRIVATE_KEY=\"-----BEGIN EC PRIVATE KEY-----\nMHcCAQEEIOm3mXvR6x1N8z4Gq9nV0lQaB7yZpC2sTdUf5hJkLmNo\n-----END EC PRIVATE KEY-----\""
credential = "-----BEGIN EC PRIVATE KEY-----\nMHcCAQEEIOm3mXvR6x1N8z4Gq9nV0lQaB7yZpC2sTdUf5hJkLmNo\n-----END EC PRIVATE KEY-----"
reason = "Quoted assignment variant captures the full EC PEM block."

[[negative]]
text = "-----BEGIN EC PRIVATE KEY-----"
reason = "Header-only PEM markers must not fire; full-block capture prevents dedup collapse."

[[negative]]
text = "-----BEGIN EC PRIVATE KEY-----\nMHcCAQEEIOm3mXvR6x1N8z4Gq9nV0lQaB7yZpC2sTdUf5hJkLmNo\n-----END RSA PRIVATE KEY-----"
reason = "Mismatched PEM algorithm boundaries must not over-capture."

[[negative]]
text = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body — suppression gate matches PLACEHOLDER prefix."

[[negative]]
text = "-----EXAMPLEEXAMPLE-----"
reason = "EXAMPLE token marker inside the body — suppression gate strips it."

[[evasion]]
text = "Authorization: Bearer token=\"-----BEGIN OPENSSH PRIVATE KEY-----\nb3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAA=\n-----END OPENSSH PRIVATE KEY-----\""
credential = "-----BEGIN OPENSSH PRIVATE KEY-----\nb3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAA=\n-----END OPENSSH PRIVATE KEY-----"
reason = "Adversarial envelope still surfaces the full OpenSSH PEM block."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
