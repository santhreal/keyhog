schema_version = 1
detector_id = "worldpay-api-credentials"
service = "worldpay"
severity = "low"

[[positive]]
text = "WORLDPAY_SERVICE_ID=VkPWCSH92J12"
credential = "VkPWCSH92J12"
reason = "Service ID anchor — primary pattern."

[[positive]]
text = "WORLDPAY_MERCHANT_ID=VkPWCSH92J12ab"
credential = "VkPWCSH92J12ab"
reason = "Merchant ID anchor — tertiary pattern."

[[positive]]
text = "worldpaySERVICEID=S2cd698Emai9RK4ljp9bjpvS6wc1UAvz"
credential = "S2cd698Emai9RK4ljp9bjpvS6wc1UAvz"
reason = "Mixed-case keyword and value from companion migration."

[[positive]]
text = "worldpayMerchantID=VkPWCSH92J12ab"
credential = "VkPWCSH92J12ab"
reason = "Mixed-case merchant ID pattern."

[[negative]]
text = "WORLDPAY_SERVICE_ID=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder body — suppression gate strips it."

[[negative]]
text = "WORLDPAY_SERVICE_ID=short"
reason = "Body fails the {10,30} length constraint."

[[negative]]
text = "WORLDPAY_SERVICE_ID=VkPWCSH92J12VkPWCSH92J12VkPWCSH9X"
reason = "Service ID exceeds the 32-character length constraint."

[[negative]]
text = "WORLDPAY_SERVICE_ID=S2cd698Emai9RK4ljp9bjpvS6wc1UAvz-extra"
reason = "A hyphen continuation after the 32-character maximum must not allow a valid-looking prefix to be reported."

[[negative]]
text = "WORLDPAY_MERCHANT_ID=VkPWCSH92J12abVkPWCSH9"
reason = "Merchant ID exceeds 20 character length constraint."

[[negative]]
text = "WORLDPAY_MERCHANT_ID=VkPWCSH"
reason = "Merchant ID fails the 8 character minimum length constraint."

[[negative]]
text = "WORLDPAY "
reason = "Noise pattern without a valid credential body."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Worldpay service ID."

# ---- EVASION (adversarial) -----------------------------------------

[[evasion]]
text = "# worldpay_service_id=VkPWCSH92J12  # payments"
credential = "VkPWCSH92J12"
reason = "Commented-out config; worldpay_service_id keyword + id intact inside the comment."
