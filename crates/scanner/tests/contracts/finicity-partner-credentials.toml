schema_version = 1
detector_id = "finicity-partner-credentials"
service = "finicity"
severity = "critical"

[[positive]]
text = "FINICITY_PARTNER_ID=1234567"
credential = "1234567"
reason = "Finicity partner ID with 7-digit numeric body."

[[positive]]
text = "finicity_partner_secret=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
reason = "Finicity partner secret with 32-char alphanumeric body."

[[negative]]
text = "FINICITY_PARTNER_ID=short"
reason = "Body is non-numeric and too short; does not meet 6-10 digit requirement."

[[evasion]]
text = "FINICITY_PARTNER_ID=1234567"
credential = "1234567"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted finicity credential."
