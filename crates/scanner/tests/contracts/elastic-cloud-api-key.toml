[[negative]]
text = "ELASTIC_CLOUD_API_KEY=short"
reason = "Body too short (id:key pattern requires 20+:16+ and base64 requires 40+)."

[[evasion]]
text = "{\"ELASTIC_CLOUD_API_KEY\": \"Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz:Kp4Qx7Rm2Sn5Tb8V\"}"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5Tb8Vw3Yz:Kp4Qx7Rm2Sn5Tb8V"
reason = "JSON-encoded assignment with quoted id:key value."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
