schema_version = 1
detector_id = "catchpoint-api-credentials"
service = "catchpoint"
severity = "critical"

[[positive]]
text = "catchpoint_api_token=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Lowercase catchpoint prefix with api_token and 20 alnum chars."

[[positive]]
text = "CATCHPOINT.rest-api-key=\"Vk9Bn3Lp7Qm2Rs5Tw8Vk9\""
credential = "Vk9Bn3Lp7Qm2Rs5Tw8Vk9"
reason = "Uppercase CATCHPOINT prefix with rest-api-key in quotes."

[[negative]]
text = "catchpoint_api_token=short"
reason = "Body too short (only 5 alnum chars)."

[[evasion]]
text = "Authorization: Bearer catchpoint_api_token=\"Kp4Qx7Rm2Sn5Tb8Vw3Yz\""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Wrapped in Bearer authorization header still matches."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted catchpoint credential."
