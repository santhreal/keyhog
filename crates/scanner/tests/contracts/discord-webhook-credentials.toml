schema_version = 1
detector_id = "discord-webhook-credentials"
service = "discord"
severity = "high"

[[positive]]
text = "https://discord.com/api/webhooks/12345678901234567/IO0l8rdbq6tdAdwgnLsh3gU6UBHE5IxcSHBos0IwhMeZvisjRREI6Flk1z6yxaxa"
credential = "https://discord.com/api/webhooks/12345678901234567/IO0l8rdbq6tdAdwgnLsh3gU6UBHE5IxcSHBos0IwhMeZvisjRREI6Flk1z6yxaxa"
reason = "Raw Discord webhook URL with 17-digit ID and 64-char token."

[[positive]]
text = "DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/12345678901234567890/IO0l8rdbq6tdAdwgnLsh3gU6UBHE5IxcSHBos0IwhMeZvisjRREI6Flk1z6yxaxa"
credential = "https://discord.com/api/webhooks/12345678901234567890/IO0l8rdbq6tdAdwgnLsh3gU6UBHE5IxcSHBos0IwhMeZvisjRREI6Flk1z6yxaxa"
reason = "Env-var anchored webhook URL with 20-digit ID."

[[negative]]
text = "https://discord.com/api/webhooks/12345678901234567/short"
reason = "Token too short (5 chars, needs 60-80)."

[[evasion]]
text = "https://discord.com/api/webhooks/12345678901234567/IO0l8rdbq6tdAdwgnLsh3gU6UBHE5IxcSHBos0IwhMeZvisjRREI6Flk1z6yxaxa"
credential = "https://discord.com/api/webhooks/12345678901234567/IO0l8rdbq6tdAdwgnLsh3gU6UBHE5IxcSHBos0IwhMeZvisjRREI6Flk1z6yxaxa"
reason = "Adversarial header_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Discord webhook credential."
