# Per-detector contract: github-pat-fine-grained
#
# GitHub's fine-grained PAT format is fixed:
#   github_pat_{22 alphanumerics}_{59 alphanumerics}
#
# That's an 11-char prefix + 22 + 1 + 59 = 93-char fixed token. The
# detector regex anchors to those exact widths; this contract pins
# the recall, the underscore-mid-token shape, and the negative case
# where one segment is one char short.

schema_version = 1
detector_id = "github-pat-fine-grained"
service = "github"
severity = "critical"
# README claim (top-level scalar, see every_contract_readme_claim_present):
readme_claim = "GitHub PATs (with CRC32 checksum)"

