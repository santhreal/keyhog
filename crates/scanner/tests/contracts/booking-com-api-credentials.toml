schema_version = 1
detector_id = "booking-com-api-credentials"
service = "booking-com"
severity = "high"

[[positive]]
text = "BOOKING_COM_USERNAME=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Booking.com username env-var."

[[positive]]
text = "booking_com_password=Vk9Bn3Lp7Qm2Rs5Tw8Vk9"
credential = "Vk9Bn3Lp7Qm2Rs5Tw8Vk9"
reason = "Booking.com password env-var."

[[negative]]
text = "BOOKING_COM_USER="
reason = "Empty body after assignment."

[[evasion]]
text = "BOOKING_COM_USERNAME=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
