schema_version = 1
detector_id = "cloudflare-zero-trust-service-token"
service = "cloudflare"
severity = "high"

[[positive]]
text = "CF-Access-Client-Id=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d.access"
credential = "7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
reason = "Canonical Client ID with 32 hex chars before .access suffix."

[[positive]]
text = "CF.Access.Client.Id: a3f5c7d9e1b8a4f2c6d0e5b7a9f3c1d8.access"
credential = "a3f5c7d9e1b8a4f2c6d0e5b7a9f3c1d8"
