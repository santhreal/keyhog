[[negative]]
text = "CF-Access-Client-Id=short.access"
reason = "Body not exactly 32 hex chars before .access suffix."

[[evasion]]
text = "Authorization: Bearer CF-Access-Client-Id=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d.access"
credential = "7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
reason = "Bearer-header wrap around the assignment."

