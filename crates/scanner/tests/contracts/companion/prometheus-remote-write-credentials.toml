schema_version = 1
detector_id = "prometheus-remote-write-credentials"
service = "prometheus"
severity = "high"

[positive_with_companion]
text = "remote_write:\n  url: https://prometheus.example.com/api/v1/write\n  basic_auth:\n    username: prom_user\n    password: s3cr3t_p@ssw0rd"
expected_findings = ["prometheus-remote-write-credentials"]
expected_companions = { prometheus_remote_write_password = "s3cr3t_p@ssw0rd" }
reason = "Remote write basic_auth username paired with password."

[positive_primary_only]
text = "remote_write:\n  url: https://prometheus.example.com/api/v1/write\n  basic_auth:\n    username: prom_user"
expected_findings = ["prometheus-remote-write-credentials"]
must_not_verify = true
reason = "Primary found without companion prometheus_remote_write_password; verification must NOT proceed."

[negative_companion_lookalike]
text = "password: s3cr3t_p@ssw0rd"
expected_findings = []
reason = "Standalone password line without remote_write basic_auth username."
