schema_version = 1
detector_id = "livekit-api-credentials"
service = "livekit"
severity = "critical"

[positive_with_companion]
text = "LIVEKIT_API_KEY=APIcXfzjJ8K\nLiveKit_Api_Secret=vnycj9mNgNUz4dPBLz8heBHQS6DozmrA"
expected_findings = ["livekit-api-credentials"]
expected_companions = { livekit_api_secret = "vnycj9mNgNUz4dPBLz8heBHQS6DozmrA" }
reason = "API key paired with the exact mixed-case client-secret field body."

[positive_primary_only]
text = "LIVEKIT_API_KEY=APIcXfzjJ8K"
expected_findings = ["livekit-api-credentials"]
must_not_verify = true
reason = "Primary found without companion livekit_api_secret; verification must NOT proceed."

[negative_companion_lookalike]
text = "LIVEKIT_API_SECRET=vnycj9mNgNUz4dPBLz8heBHQS6DozmrA"
expected_findings = ["livekit-api-credentials"]
reason = "A secret field is also an intentional standalone primary, so it remains reportable without an API key."
