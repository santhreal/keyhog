schema_version = 1
detector_id = "tidb-cloud-credentials"
service = "tidbcloud"
severity = "high"

[positive_with_companion]
text = "TIDB_PRIVATE_KEY=AbCdEfGhIjKlMnOpQrStUvWxYz123456\nTIDB_PUBLIC_KEY=7b3e5d8c1a9f4e2b"
expected_findings = ["tidb-cloud-credentials"]
expected_companions = { "TiDB Public Key" = "TIDB_PUBLIC_KEY=7b3e5d8c1a9f4e2b" }
reason = "Private key paired with TiDB public key."

[positive_primary_only]
