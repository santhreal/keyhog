schema_version = 1
detector_id = "storj-api-credentials"
service = "storj"
severity = "high"

[positive_with_companion]
text = "STORJ_ACCESS_KEY=ABCD1234EFGH5678IJKL\nSTORJ_SECRET_KEY=abcd1234efgh5678ijkl9012mnop3456qrst7890"
expected_findings = ["storj-api-credentials"]
expected_companions = { secret_access_key = "abcd1234efgh5678ijkl9012mnop3456qrst7890" }
reason = "StorJ access key paired with secret key."

[positive_primary_only]
text = "STORJ_ACCESS_KEY=ABCD1234EFGH5678IJKL"
expected_findings = ["storj-api-credentials"]
must_not_verify = true
reason = "Primary found without companion secret_access_key; verification must NOT proceed."

[negative_companion_lookalike]
text = "STORJ_SECRET_KEY=abcd1234efgh5678ijkl9012mnop3456qrst7890"
expected_findings = []
reason = "Secret key alone without access key."
