schema_version = 1
detector_id = "digitalocean-spaces-credentials"
service = "digitalocean-spaces"
severity = "high"

[positive_with_companion]
text = "DO_SPACES_ACCESS_KEY=ABCD1234EFGH5678IJKL\nDO_SPACES_SECRET_KEY=abcd1234efgh5678ijkl9012mnop3456qrst7890ab"
expected_findings = ["digitalocean-spaces-credentials"]
expected_companions = { secret_key = "abcd1234efgh5678ijkl9012mnop3456qrst7890ab" }
reason = "Spaces access key paired with secret key."

[positive_primary_only]
text = "DO_SPACES_ACCESS_KEY=ABCD1234EFGH5678IJKL"
expected_findings = ["digitalocean-spaces-credentials"]
must_not_verify = true
reason = "Primary found without companion secret_key; verification must NOT proceed."

[negative_companion_lookalike]
text = "DO_SPACES_SECRET_KEY=abcd1234efgh5678ijkl9012mnop3456qrst7890ab"
expected_findings = []
reason = "Secret key alone without access key."
