schema_version = 1
detector_id = "ringcentral-api-credentials"
service = "ringcentral"
severity = "critical"

[positive_with_companion]
text = "ringcentral_client_id=rc_client_123456789012345\nringcentral_client_secret=rc_secret_123456789012345"
expected_findings = ["ringcentral-api-credentials"]
expected_companions = { ringcentral_client_pair = "ringcentral_client_secret=rc_secret_123456789012345" }
reason = "Client ID paired with client secret (companion regex anchored to client_secret= assignment)."

[positive_primary_only]
text = "ringcentral_client_id=rc_client_123456789012345"
expected_findings = ["ringcentral-api-credentials"]
must_not_verify = true
reason = "Primary found without companion ringcentral_client_pair; verification must NOT proceed."

[negative_companion_lookalike]
text = "ringcentral_client_secret=rc_secret_123456789012345"
expected_findings = []
reason = "Client secret alone without client ID."
