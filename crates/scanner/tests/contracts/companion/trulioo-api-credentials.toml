schema_version = 1
detector_id = "trulioo-api-credentials"
service = "trulioo"
severity = "high"

[positive_with_companion]
text = "trulioo_client_id=trulioox7y8z9w0q1r2\ntrulioo_client_secret=trulioosecret12345"
expected_findings = ["trulioo-api-credentials"]
expected_companions = { trulioo_client_secret = "client_secret" }
reason = "Client ID paired with client secret (companion regex captures group 1 label, not group 2 value)."

[positive_primary_only]
text = "trulioo_client_id=trulioox7y8z9w0q1r2"
expected_findings = ["trulioo-api-credentials"]
must_not_verify = true
reason = "Primary found without companion trulioo_client_secret; verification must NOT proceed."

[negative_companion_lookalike]
text = "trulioo_client_secret=trulioosecret12345"
expected_findings = []
reason = "Client secret alone without client ID."
