schema_version = 1
detector_id = "booking-com-api-credentials"
service = "booking-com"
severity = "high"

[positive_with_companion]
text = "booking_com_username=x7y8z9w0q1r2m3n4\nbooking_com_password=x7y8z9w0q1r2m3n4"
expected_findings = ["booking-com-api-credentials"]
expected_companions = { "booking-password" = "booking_com_password=x7y8z9w0q1r2m3n4" }
