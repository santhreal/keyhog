schema_version = 1
detector_id = "jumio-api-credentials"
service = "jumio"
severity = "high"

[positive_with_companion]
text = "JUMIO_CLIENT_ID=N1OhWA13I3MeS545lGEnVLB4AKUeb\nJUMIO_API_SECRET=dZmeSTm4Dw1mNID8w1JxXOmQW"
expected_findings = ["jumio-api-credentials"]
expected_companions = { jumio_secret = "dZmeSTm4Dw1mNID8w1JxXOmQW" }
reason = "Jumio client ID paired with the exact nearby API-secret value."

[positive_primary_only]
text = "JUMIO_CLIENT_ID=N1OhWA13I3MeS545lGEnVLB4AKUeb"
expected_findings = ["jumio-api-credentials"]
must_not_verify = true
reason = "A client ID alone must not self-populate the secret companion."

[negative_companion_lookalike]
text = "JUMIO_API_SECRET=dZmeSTm4Dw1mNID8w1JxXOmQW"
expected_findings = ["jumio-api-credentials"]
reason = "A Jumio API secret is intentionally detectable as a standalone primary."
