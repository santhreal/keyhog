schema_version = 1
detector_id = "fastspring-api-credentials"
service = "fastspring"
severity = "critical"

[positive_with_companion]
text = "FastSpring_API_Username=KAFVYYvcqfVr7Cxz\nfastspring_API_PASSWORD=V@747SrLUklE5Pq/wCfrDURwBv$Xu1$Sq"
expected_findings = ["fastspring-api-credentials"]
expected_companions = { fastspring_password = "V@747SrLUklE5Pq/wCfrDURwBv$Xu1$Sq" }
reason = "FastSpring username paired with the exact nearby API-password value."

[positive_primary_only]
text = "FastSpring_API_Username=KAFVYYvcqfVr7Cxz"
expected_findings = ["fastspring-api-credentials"]
must_not_verify = true
reason = "A username alone must not self-populate the password companion."

[negative_companion_lookalike]
text = "fastspring_API_PASSWORD=V@747SrLUklE5Pq/wCfrDURwBv$Xu1$Sq"
expected_findings = ["fastspring-api-credentials"]
reason = "A FastSpring password is intentionally detectable as a standalone primary."
