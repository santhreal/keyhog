schema_version = 1
detector_id = "checkmarx-api-credentials"
service = "checkmarx"
severity = "critical"

[positive_with_companion]
text = "CX_CLIENT_ID=release-scanner\nCHECKMARX_CLIENT_SECRET=AfON5YGWmLgetXDb6QNi3S5L5ftbh3U-AiYvaExsnWNoFTAeY"
expected_findings = ["checkmarx-api-credentials"]
expected_companions = { checkmarx_client_id = "release-scanner" }
reason = "Secret primary carries the exact descriptive Checkmarx client ID."

[positive_primary_only]
text = "CHECKMARX_CLIENT_SECRET=AfON5YGWmLgetXDb6QNi3S5L5ftbh3U-AiYvaExsnWNoFTAeY"
expected_findings = ["checkmarx-api-credentials"]
must_not_verify = true
reason = "A Checkmarx client secret remains reportable without its client ID."

[negative_companion_lookalike]
text = "CX_CLIENT_ID=release-scanner"
expected_findings = []
reason = "A Checkmarx client ID alone is not a secret finding."
