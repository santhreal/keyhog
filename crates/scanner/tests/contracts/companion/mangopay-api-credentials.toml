schema_version = 1
detector_id = "mangopay-api-credentials"
service = "mangopay"
severity = "critical"

[positive_with_companion]
text = "MANGOPAY_API_KEY=PQgFHmZoKVL1TM4ym7pGMCqTy-Opq\nMANGOPAY_CLIENT_ID=my-client-id-12"
expected_findings = ["mangopay-api-credentials"]
expected_companions = { "Mangopay client ID" = "my-client-id-12" }
reason = "Primary (API Key) paired with companion (Client ID) exactly extracted."

[positive_primary_only]
text = "MANGOPAY_API_KEY=PQgFHmZoKVL1TM4ym7pGMCqTy-Opq"
expected_findings = ["mangopay-api-credentials"]
must_not_verify = true
reason = "Primary API Key found without companion Client ID; verification must NOT proceed."

[negative_companion_lookalike]
text = "MANGOPAY_CLIENT_ID=my-client-id-12"
expected_findings = []
reason = "Companion Client ID lookalike without primary API Key does not fire."
