schema_version = 1
detector_id = "olark-api-credentials"
service = "olark"
severity = "medium"

[positive_with_companion]
text = "OLARK_API_KEY=c6cf429a87fcc89c894ee5ab26489d49\nolark_api_token=88a882d74e5280e5eeac4bc96b8c7a0f"
expected_findings = ["olark-api-credentials"]
expected_companions = { olark_credentials_pair = "88a882d74e5280e5eeac4bc96b8c7a0f" }
reason = "Olark API key paired with the exact nearby API token value."

[positive_primary_only]
text = "OLARK_API_KEY=c6cf429a87fcc89c894ee5ab26489d49"
expected_findings = ["olark-api-credentials"]
must_not_verify = true
reason = "An API key alone must not self-populate the token companion."

[negative_companion_lookalike]
text = "olark_api_token=88a882d74e5280e5eeac4bc96b8c7a0f"
expected_findings = ["olark-api-credentials"]
reason = "An Olark API token is intentionally detectable as a standalone primary."
