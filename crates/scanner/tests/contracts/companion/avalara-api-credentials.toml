schema_version = 1
detector_id = "avalara-api-credentials"
service = "avalara"
severity = "critical"

[positive_with_companion]
text = "AVALARA_ACCOUNT_ID=2745931\nAVALARA_LICENSE_KEY=K8m3R7p2qN5wL4xT"
expected_findings = ["avalara-api-credentials"]
expected_companions = { account_id = "2745931" }
reason = "License key paired with numeric account ID."

[positive_primary_only]
text = "AVALARA_LICENSE_KEY=K8m3R7p2qN5wL4xT"
expected_findings = ["avalara-api-credentials"]
must_not_verify = true
reason = "License key reports without account_id; verification still requires the companion."

[negative_companion_lookalike]
text = "AVALARA_ACCOUNT_ID=123456"
expected_findings = []
reason = "Account ID alone without license key."
