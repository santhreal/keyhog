schema_version = 1
detector_id = "canopy-tax-api-credentials"
service = "canopy-tax"
severity = "high"

[[positive]]
text = "CANOPY_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Uppercase CANOPY_API_KEY with 20-char alnum body."

[[positive]]
text = "canopy.key:Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2S"
reason = "Dot-separated lowercase key with colon separator."

[[negative]]
text = "CANOPY_API_KEY=short"
reason = "Body below 20 chars."

[[evasion]]
text = "export CANOPY_KEY=\"Kp4Qx7Rm2Sn5Tb8Vw3Yz\""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Quoted shell export with optional API omitted still matches."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Canopy Tax API credential."
