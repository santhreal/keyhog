schema_version = 1
detector_id = "aws-codecommit-credentials"
service = "aws"
severity = "critical"

[[positive]]
text = "codecommit_username=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
reason = "AWS CodeCommit Git username env-var (20+ alnum)."

[[positive]]
text = "git-codecommit.us-east-1.amazonaws.com/v1/repos/my-repo"
credential = "git-codecommit.us-east-1.amazonaws.com/v1/repos/my-repo"
reason = "AWS CodeCommit repository URL."

[[negative]]
text = "codecommit_username=short"
reason = "Body below 20 alnum chars."

[[evasion]]
text = "codecommit_username=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted CodeCommit creds."
