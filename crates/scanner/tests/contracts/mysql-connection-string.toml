schema_version = 1
detector_id = "mysql-connection-string"
service = "mysql"
severity = "critical"

[[positive]]
text = "mysql://dbuser:Np3DnCDi231ZUBYp@prod-db.example.com"
credential = "mysql://dbuser:Np3DnCDi231ZUBYp@prod-db.example.com"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "mysql://dbuser:Np3DnCDi231ZUBYp@prod-db.example.com=\"mysql://dbuser:Np3DnCDi231ZUBYp@prod-db.example.com\""
credential = "mysql://dbuser:Np3DnCDi231ZUBYp@prod-db.example.com"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body (suppression gate matches PLACEHOLDER prefix)."

[[negative]]
text = "mysqlEXAMPLEEXAMPLEe.com"
reason = "EXAMPLE token marker inside the body (suppression gate strips it)."

[[evasion]]
text = "<token>mysql://dbuser:Np3DnCDi231ZUBYp@prod-db.example.com</token>"
credential = "mysql://dbuser:Np3DnCDi231ZUBYp@prod-db.example.com"
reason = "Adversarial xml envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
