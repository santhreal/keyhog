schema_version = 1
detector_id = "zoom-phone-api-credentials"
service = "zoom"
severity = "critical"

# Zoom Server-to-Server OAuth pairs a client_id with a client_secret. The
# `zoom_client_pair` companion looks for the OTHER half ±5 lines but is
# optional, so either half alone still surfaces.

[[positive]]
text = """ZOOM_CLIENT_ID=Kp4Qx7Rm2Sn5Tb8Vw3YzKp
ZOOM_CLIENT_SECRET=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp"""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp"
reason = "Standard env-var pair (companion satisfied)."

[[positive]]
text = "zoomPhoneClientId: 'Kn7XbWqYpRm9SvLt2HdJ'"
credential = "Kn7XbWqYpRm9SvLt2HdJ"
reason = "camelCase JS object key (regex (?i) covers the case-mixing)."

[[negative]]
text = "zoom_client_id=tooShort"
reason = "Body fails the {20,40} length constraint."

[[evasion]]
text = "ZOOM_CLIENT_ID=Kp4Qx7Rm2Sn5Tb8Vw3YzKp\nZOOM_CLIENT_SECRET=Vk9Bn3Lp7Qm2Rs5Tw8Vk9Bn3Lp"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Zoom client_id."
