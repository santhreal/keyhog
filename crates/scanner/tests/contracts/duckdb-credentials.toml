schema_version = 1
detector_id = "duckdb-credentials"
service = "duckdb"
severity = "medium"

[[positive]]
text = "MOTHERDUCK_TOKEN=blu17rNy8H6h8l7qgATtLF"
credential = "blu17rNy8H6h8l7qgATtLF"
reason = "MotherDuck token with MOTHERDUCK_TOKEN prefix and 22-char alnum/underscore/hyphen body."

[[positive]]
text = "DUCKDB_PASSWORD=xJpRa5HSUPwePut0Ss"
credential = "xJpRa5HSUPwePut0Ss"
reason = "DuckDB password with DUCKDB_PASSWORD prefix and 18-char alnum/underscore/hyphen body."

[[negative]]
text = "DUCKDB_PASSWORD=short"
reason = "Body too short (only 5 chars after prefix)."

[[evasion]]
text = "MOTHERDUCK_TOKEN=blu17rNy8H6h8l7qgATtLF"
credential = "blu17rNy8H6h8l7qgATtLF"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted duckdb credential."
