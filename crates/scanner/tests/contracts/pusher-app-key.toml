schema_version = 1
detector_id = "pusher-app-key"
service = "pusher"
severity = "high"

[[positive]]
text = "PUSHER=7a5c6e6b26ccfcb788cb"
credential = "7a5c6e6b26ccfcb788cb"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "PUSHER=\"7a5c6e6b26ccfcb788cb\""
credential = "7a5c6e6b26ccfcb788cb"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "PUSHER=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body (suppression gate matches PLACEHOLDER prefix)."

[[negative]]
text = "PUSHER=7a5c6EXAMPLEEXAMPLE788cb"
reason = "EXAMPLE token marker inside the body (suppression gate strips it)."

[[evasion]]
text = "{\"pusher_app_key\":\"7a5c6e6b26ccfcb788cb\"}"
credential = "7a5c6e6b26ccfcb788cb"
reason = "JSON-config envelope evasion: the credential is wrapped in JSON but the service key (pusher_app_key) survives as the field name, so the detector still surfaces it. A context-free {\"secret\":\"<hex>\"} carries no service marker and is correctly NOT claimed (firing on it would flag any JSON hash field)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
