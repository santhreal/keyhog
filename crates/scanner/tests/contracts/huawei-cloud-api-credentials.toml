[[negative]]
text = "HUAWEICLOUDAK=GR6FV9QT0XGHN4KNOALV"
reason = "Huawei defines AK as the identifier paired with the confidential SK."

[[negative]]
text = "HUAWEI_CLOUD_PROJECT_ID=7b3e5d8c1a9f4e2b6c8d3a5e9f1b7c4d"
reason = "Project IDs are neither secret primaries nor credential companions."

[[negative]]
text = "HW_SECRET_KEY=9zYwf1uabSQY0JTnFqbUqG7vcfqYBaTdXde2GUc"
reason = "Secret access key below 40 characters."

[[negative]]
text = "HW_SECRET_KEY=9zYwf1uabSQY0JTnFqbUqG7vcfqYBaTdXde2GUcq0"
reason = "Secret access key above 40 characters."

[[evasion]]
text = "export HW_SECRET_KEY=9zYwf1uabSQY0JTnFqbUqG7vcfqYBaTdXde2GUcq"
credential = "9zYwf1uabSQY0JTnFqbUqG7vcfqYBaTdXde2GUcq"
reason = "Shell export envelope around a valid secret."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

