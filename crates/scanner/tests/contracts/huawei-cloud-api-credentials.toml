[[positive]]
text = "HW_ACCESS_KEY=HCY8BGCN1YM5ZWYOK1MH\nHW_SECRET_KEY=9zYwf1uabSQY0JTnFqbUqG7vcfqYBaTdXde2GUcq"
credential = "9zYwf1uabSQY0JTnFqbUqG7vcfqYBaTdXde2GUcq"
