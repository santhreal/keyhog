schema_version = 1
detector_id = "cch-axcess-api-credentials"
service = "cch-axcess"
severity = "critical"

[[positive]]
text = "CCH_AXCESS_API_KEY=Kp4Qx7Rm2Sn5Tb8Vw3Yz"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Full CCH_AXCESS_API_KEY prefix with 20 alnum chars."

[[positive]]
text = "axcess.key=\"Vk9Bn3Lp7Qm2Rs5Tw8Vk9\""
credential = "Vk9Bn3Lp7Qm2Rs5Tw8Vk9"
reason = "Minimal axcess.key prefix with quotes."

[[negative]]
text = "CCH_AXCESS_KEY=short"
reason = "Body too short (only 5 alnum chars)."

[[evasion]]
text = "x-api-key: CCH_AXCESS_API_KEY=\"Kp4Qx7Rm2Sn5Tb8Vw3Yz\""
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "Prefixed with x-api-key header label still matches."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
