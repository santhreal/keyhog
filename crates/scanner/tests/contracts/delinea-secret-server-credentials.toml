schema_version = 1
detector_id = "delinea-secret-server-credentials"
service = "delinea"
severity = "critical"

[[positive]]
text = "DELINEA.TOKEN=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
reason = "Uppercase DELINEA.TOKEN env-var with 32 alnum chars."

[[positive]]
text = "thycotic_password=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
reason = "Lowercase thycotic_password form with 32 alnum chars."

[[negative]]
text = "DELINEA.TOKEN="
reason = "Empty credential body, regex requires at least one allowed char."

[[evasion]]
text = 'delinea.TOKEN:"Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"'
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
reason = "Lowercase anchor with colon and double-quote wrapper (32 alnum)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
