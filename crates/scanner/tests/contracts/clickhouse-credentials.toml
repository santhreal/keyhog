schema_version = 1
detector_id = "clickhouse-credentials"
service = "clickhouse"
severity = "critical"

[[positive]]
text = "CLICKHOUSE_URL=clickhouse://default:Kp4Qx7Rm2Sn5Tb8V@clickhouse.local"
credential = "Kp4Qx7Rm2Sn5Tb8V"
reason = "ClickHouse connection string with 16-char password."

[[positive]]
text = "CLICKHOUSE_USERNAME=admin\nCLICKHOUSE_PASSWORD=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
reason = "ClickHouse password with username companion within 5 lines (32 alnum)."

[[negative]]
text = "CLICKHOUSE_PASSWORD=short"
reason = "Body 5 chars, below 16 minimum."

[[evasion]]
text = "CLICKHOUSE_URL=https://user:Kp4Qx7Rm2Sn5Tb8Vw3Yz@clickhouse.local"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3Yz"
reason = "HTTPS connection string variant (regex covers https?:// optional prefix)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted clickhouse credential."
