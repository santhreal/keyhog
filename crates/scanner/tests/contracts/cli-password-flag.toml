# Per-detector contract: cli-password-flag
#
# Detector regex: `(?i)--?(?:password|passwd)[=\s]+(\S{6,128})`: the value
# after a `--password` / `-Password` / `--passwd` command-line flag (group 1).
# The flag is a strong STRUCTURAL credential context, so this is a strong-anchor
# member of the structural-password-slot family (NOT weak_anchor): the Tier-B
# randomness floor is skipped so short low-alpha passwords surface, while
# placeholder/variable values (`changeme`, `welcome`, `$DB_PASSWORD`,
# `<YOUR_PASSWORD>`) are dropped by the `dictionary_word_placeholder` gate +
# the `{6,128}` floor + the Tier-A `$VAR` marker.

schema_version = 1
detector_id = "cli-password-flag"
service = "generic"
severity = "high"

# ---- POSITIVES (recall) ---------------------------------------------

[[positive]]
text = "mysql -u root --password Xy9KmPq2LvWnB7tR -e 'SELECT 1'"
credential = "Xy9KmPq2LvWnB7tR"
reason = "Classic mysql client invocation with a random --password value."

[[positive]]
text = "deploy --env prod --password=zK4mP9qL2vW7nB3t"
credential = "zK4mP9qL2vW7nB3t"
reason = "The `=`-joined `--password=VALUE` form must capture the value."

[[positive]]
text = "Connect-Service -Server db01 -Password p2Qw7RtVy1Bn6Kc4"
credential = "p2Qw7RtVy1Bn6Kc4"
reason = "PowerShell single-dash `-Password VALUE` form (case-insensitive)."

[[positive]]
text = "curl --user admin --passwd Rt8Vy3Bn6Kc4mLp9 https://api.internal/health"
credential = "Rt8Vy3Bn6Kc4mLp9"
reason = "The `--passwd` long-flag spelling carrying a random secret."

# ---- NEGATIVES (precision) ------------------------------------------

[[negative]]
text = "mytool deploy --password changeme"
reason = "`changeme` is a dictionary placeholder (the identifier gauntlet must drop it)."

[[negative]]
text = "run-migration --host db01 --password $DB_PASSWORD"
reason = "`$DB_PASSWORD` is a shell variable reference, not a literal secret."

[[negative]]
text = "deploy --password <YOUR_PASSWORD>"
reason = "An angle-bracket placeholder, not a real credential."

[[negative]]
text = "See the documentation to set the password value before deploying."
reason = "Prose containing the word `password` but no `--password` flag (the regex cannot match)."

[[negative]]
text = "kubectl create secret --password=password"
reason = "The literal value `password` is a dictionary placeholder, not a secret."

# ---- EVASIONS (adversarial) -----------------------------------------

[[evasion]]
text = "MYTOOL --PASSWORD h84mLpQw7RtVy1Bn"
credential = "h84mLpQw7RtVy1Bn"
reason = "Upper-cased flag (the (?i) flag must still surface the value)."

[[evasion]]
text = "spawn('worker', ['--password=qL2vW7nB3tR8sY1c', '--once'])"
credential = "qL2vW7nB3tR8sY1c"
reason = "Flag value embedded in an argv array literal in application code (must still fire)."

# ---- PERFORMANCE / SCALE BUDGETS ------------------------------------

[perf]
fixture_bytes = 4096
max_microseconds = 15000
note = "Single anchored alternation gated behind the `password`/`passwd` keyword prefilter; bounded `\\S{6,128}` capture."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler with one planted --password flag; the keyword prefilter keeps the regex off the vast majority of lines."
