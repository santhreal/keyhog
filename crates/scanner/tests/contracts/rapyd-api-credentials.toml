schema_version = 1
detector_id = "rapyd-api-credentials"
service = "rapyd"
severity = "critical"

[[positive]]
text = "RAPYD_API_KEY=799d33f560acc53abefd6d1c"
credential = "799d33f560acc53abefd6d1c"
reason = "Canonical anchor + synthesized body satisfying detector's primary regex."

[[positive]]
text = "RAPYD_API_KEY=\"799d33f560acc53abefd6d1c\""
credential = "799d33f560acc53abefd6d1c"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "RAPYD_API_KEY=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body (suppression gate matches PLACEHOLDER prefix)."

[[negative]]
text = "RAPYD_API_KEY=799d3EXAMPLEEXAMPLEd6d1c"
reason = "EXAMPLE token marker inside the body (suppression gate strips it)."

[[evasion]]
text = "{\"rapyd_access_key\":\"799d33f560acc53abefd6d1c\"}"
credential = "799d33f560acc53abefd6d1c"
reason = "JSON-config envelope evasion: the credential is wrapped in JSON but the service key (rapyd_access_key) survives as the field name, so the detector still surfaces it. A context-free {\"secret\":\"<hex>\"} carries no service marker and is correctly NOT claimed (firing on it would flag any JSON hash field)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
