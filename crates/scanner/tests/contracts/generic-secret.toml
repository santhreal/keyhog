schema_version = 1
detector_id = "generic-secret"
service = "generic"
severity = "medium"

# Phase-2 entropy-gated bridge: no vendor prefix, fires on a `secret`-family
# keyword next to a high-entropy value above the length-bucketed floor
# (len<=24 -> 2.8). Values are 16-char lowercase (entropy ~3.5+, above floor).

[[positive]]
text = "secret_key=ufnlbbavawsdeecn"
credential = "ufnlbbavawsdeecn"
reason = "secret_key anchor + 16-char high-entropy body clears the len<=24 floor (2.8)."

[[positive]]
text = "app_secret = \"kdheufnzbwqmaslr\""
credential = "kdheufnzbwqmaslr"
reason = "app_secret keyword + quoted high-entropy body."

[[negative]]
text = "secret_key=example"
reason = "Dictionary body 'example' — entropy ~2.5 below the 2.8 len-bucket floor, generic-secret must not fire."

[[evasion]]
text = "signing_secret: \"ufnlbbavawsdeecn\""
credential = "ufnlbbavawsdeecn"
reason = "signing_secret keyword + colon-quoted body (whitespace-separated form)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted generic secret."
