schema_version = 1
detector_id = "nats-credentials"
service = "nats"
severity = "high"



[[positive]]
text = "NATS_URL=nats://user:SecretPass123456@nats.example.com:4222"
credential = "SecretPass123456"
reason = "Hand-tuned positive matching detector regex (R2-F adversarial batch)."

[[positive]]
text = "NATS_PASSWORD=\"AnotherNatsPass456\""
credential = "AnotherNatsPass456"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body (suppression gate matches PLACEHOLDER prefix)."

[[negative]]
text = "nats:EXAMPLEEXAMPLE0&eI@"
reason = "EXAMPLE token marker inside the body (suppression gate strips it)."

[[evasion]]
text = "# nats://A)A/RB!I:.=n=X*xV->4NY})}Q-p_5F,c~9rW/e>GThYEU:}D)vzxaQ+jF7?=$oY]9u:C;}.]{v{8/0&eI@"
credential = "nats://A)A/RB!I:.=n=X*xV->4NY})}Q-p_5F,c~9rW/e>GThYEU:}D)vzxaQ+jF7?=$oY]9u:C;}.]{v{8/0&eI@"
reason = "Adversarial envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
