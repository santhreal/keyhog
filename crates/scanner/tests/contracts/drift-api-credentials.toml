schema_version = 1
detector_id = "drift-api-credentials"
service = "drift"
severity = "high"

[[positive]]
text = "drift_token=drft_rFfveashtVcNiYVn2TeAS7lqX9gfWuy4VQ3UZPLd"
credential = "drft_rFfveashtVcNiYVn2TeAS7lqX9gfWuy4VQ3UZPLd"
reason = "Drift OAuth token with drft_ prefix and 40-char alnum/underscore/hyphen body."

[[positive]]
text = "DRIFT drft_66wObFNsA1jDfy4Nb2QHstlNd8gNKxrCv_PHQFjb_2gNY"
credential = "drft_66wObFNsA1jDfy4Nb2QHstlNd8gNKxrCv_PHQFjb_2gNY"
reason = "Drift token with DRIFT keyword context and 45-char body."

[[negative]]
text = "drift drft_short"
reason = "Body too short (only 5 chars after prefix)."

[[evasion]]
text = "drift_token=drft_rFfveashtVcNiYVn2TeAS7lqX9gfWuy4VQ3UZPLd"
credential = "drft_rFfveashtVcNiYVn2TeAS7lqX9gfWuy4VQ3UZPLd"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted drift credential."
