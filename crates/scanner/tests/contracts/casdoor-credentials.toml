schema_version = 1
detector_id = "casdoor-credentials"
service = "casdoor"
severity = "critical"

[[positive]]
text = "CASDOOR_CLIENT_ID=7b3e5d8c1a9f4e2b6c8d"
credential = "7b3e5d8c1a9f4e2b6c8d"
reason = "Uppercase CASDOOR_CLIENT_ID prefix with 20 hex chars."

[[positive]]
text = "config.CASDOOR_CLIENT_ID = \"a3f7e2b8c5d9a1f4e6b2\""
credential = "a3f7e2b8c5d9a1f4e6b2"
reason = "Context-anchored with quotes and spaces."

[[negative]]
text = "CASDOOR_CLIENT_ID=short"
reason = "Body too short (only 5 hex chars)."

[[evasion]]
text = "\"CASDOOR_CLIENT_ID\":\"7b3e5d8c1a9f4e2b6c8d\""
credential = "7b3e5d8c1a9f4e2b6c8d"
reason = "JSON-quoted key-value pair still matches."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
