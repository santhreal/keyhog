schema_version = 1
detector_id = "google-cloud-sovereign-credentials"
service = "google-cloud-sovereign"
severity = "critical"






[[positive]]
text = "GOOGLE_SOVEREIGN PROJECT_ID=my-sovereign-project"
credential = "my-sovereign-project"
reason = "Hand-tuned positive matching detector regex (R2-F adversarial batch)."

[[positive]]
text = "GOOGLE_CLOUD_SOVEREIGN PROJECT_ID=\"eu-sovereign-demo\""
credential = "eu-sovereign-demo"
reason = "Quoted-value variant of the canonical positive."

[[negative]]
text = "GOOGLE_CLOUD_SOVEREIGN=short"
reason = "Truncated value below detector minimum length."

[[negative]]
text = "GOOGLE_CLOUD_SOVEREIGN token abcdef"
reason = "Keyword context without valid credential body."

[[evasion]]
text = "GOOGLE_CLOUD_SOVEREIGN PROJECT_ID=my-sovereign-project-01"
credential = "my-sovereign-project-01"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Google Cloud Sovereign Credentials credential."
