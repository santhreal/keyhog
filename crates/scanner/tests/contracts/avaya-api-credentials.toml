[[positive]]
text = "avaya_apikey:\"Vk9Bn3Lp7Qm2Rs5Tw8YzKp4Qx7Rm2Sn5Tw8Yz\""
credential = "Vk9Bn3Lp7Qm2Rs5Tw8YzKp4Qx7Rm2Sn5Tw8Yz"
