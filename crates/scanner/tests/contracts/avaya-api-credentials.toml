[[negative]]
text = "AVAYA_CLIENT_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3Y"
reason = "Body only 19 chars, below 20 minimum."

[[negative]]
text = "AVAYA_CLIENT_ID=eM1DjkCPS7EA5hmLqChi40cLMUudHQXx"
reason = "A public OAuth client ID is not a standalone secret finding."

[[negative]]
text = "AVAYA_CLIENT_SECRET=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5.invalid"
reason = "A dotted continuation must not produce a truncated client-secret finding."

[[evasion]]
text = "avaya-cloud-client-secret=Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
credential = "Kp4Qx7Rm2Sn5Tb8Vw3YzKp4Qx7Rm2Sn5"
reason = "Hyphen-separated avaya-cloud-client-secret form."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
