# Per-detector contract: netrc-password
#
# The `~/.netrc` / `.authinfo` `machine ... login ... password <secret>` triple
# (whitespace-separated, single- or multi-line). Captured credential is the
# password (group 1) only.

schema_version = 1
detector_id = "netrc-password"
service = "netrc"
severity = "high"

# ---- POSITIVES (recall) ---------------------------------------------

[[positive]]
text = "machine api.example.com login deploy password Zx9Qw3Rt7Lp2Mk"
credential = "Zx9Qw3Rt7Lp2Mk"
reason = "Single-line netrc entry; capture is the password field only."

[[positive]]
text = "machine api.example.com\nlogin deploy\npassword Mk7Lp2Rt9Qw3Zx"
credential = "Mk7Lp2Rt9Qw3Zx"
reason = "Multi-line netrc layout — the machine/login/password fields span newlines."

# ---- NEGATIVES (precision) ------------------------------------------

[[negative]]
text = "machine api.example.com login deploy password ${NETRC_PW}"
reason = "Env-var template — the value class excludes ${}."

[[negative]]
text = "machine api.example.com password Zx9Qw3Rt7Lp2Mk"
reason = "Missing the login field — not the full machine/login/password triple."

# ---- EVASIONS (adversarial) -----------------------------------------

[[evasion]]
text = "# ~/.netrc backup\nmachine api.example.com login deploy password Ev9Sn3Wq7Lp2Bk"
credential = "Ev9Sn3Wq7Lp2Bk"
reason = "Shell-commented netrc line — credential must still surface."

# ---- PERFORMANCE / SCALE BUDGETS ------------------------------------

[perf]
fixture_bytes = 4096
max_microseconds = 15000
note = "Triple-anchored extraction; fast."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler with one planted netrc entry."
