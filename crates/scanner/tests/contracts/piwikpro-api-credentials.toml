[[evasion]]
text = "export PIWIK_PRO_CLIENT_ID=8ab42f49-89fb-d2fe-b83e-f0ea8a1fe14e"
credential = "8ab42f49-89fb-d2fe-b83e-f0ea8a1fe14e"
reason = "Adversarial env_export envelope — credential must still surface under this detector."

[perf]
