[[negative]]
text = "MLFLOW_TRACKING_USERNAME=JcLZlEXAMPLEEXAMPLETYKVs"
reason = "EXAMPLE token marker inside the body (suppression gate strips it)."

[[evasion]]
text = "export MLFLOW_TRACKING_USERNAME=JcLZllEQlfGHhqpCJb0Z7BH8qYiTYKVs"
credential = "JcLZllEQlfGHhqpCJb0Z7BH8qYiTYKVs"
reason = "Adversarial env_export envelope (credential must still surface under this detector)."

[perf]
