schema_version = 1
detector_id = "aws-secrets-manager-arn"
service = "aws-secrets-manager"
severity = "info"

[[positive]]
text = "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/db/password-AbCdEf"
credential = "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/db/password-AbCdEf"
reason = "AWS Secrets Manager ARN (region:account:secret:name-suffix)."

[[positive]]
text = "SECRET_ARN=arn:aws:secretsmanager:eu-west-2:987654321098:secret:api/key/v2-XyZ123"
credential = "arn:aws:secretsmanager:eu-west-2:987654321098:secret:api/key/v2-XyZ123"
reason = "Env-var wrap around ARN detector."

[[negative]]
text = "arn:aws:secretsmanager"
reason = "Incomplete ARN missing region/account/path."

[[evasion]]
text = "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/db/password-AbCdEf"
credential = "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/db/password-AbCdEf"
reason = "Adversarial header_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted Secrets Manager ARN."
