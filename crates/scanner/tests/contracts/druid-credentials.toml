schema_version = 1
detector_id = "druid-credentials"
service = "druid"
severity = "critical"

[[positive]]
text = "DRUID_PASSWORD=AFHzLDdEbht+JO%$Qr"
credential = "AFHzLDdEbht+JO%$Qr"
reason = "Druid password with DRUID_PASSWORD prefix and 18-char mixed special/alnum body."

[[positive]]
text = "DRUID_PASS=MA*cBYSP4r_%cyACNsW#"
credential = "MA*cBYSP4r_%cyACNsW#"
reason = "Druid password with DRUID_PASS prefix and 20-char mixed special/alnum body."

[[negative]]
text = "DRUID_PASSWORD=short"
reason = "Body too short (only 5 chars after prefix)."

[[evasion]]
text = "DRUID_PASSWORD=AFHzLDdEbht+JO%$Qr"
credential = "AFHzLDdEbht+JO%$Qr"
reason = "Adversarial env_bare envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted druid credential."
