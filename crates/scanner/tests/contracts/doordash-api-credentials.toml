schema_version = 1
detector_id = "doordash-api-credentials"
service = "doordash"
severity = "critical"

[[positive]]
text = "DOORDASH_developer_id=0a82d930-0311-5873-e7cb-7c3a6be1eacf"
credential = "0a82d930-0311-5873-e7cb-7c3a6be1eacf"
reason = "DoorDash Developer ID with env-var anchor and lowercase hex UUID."

[[positive]]
text = "doordash_signing_secret=ZX0SakOvfcEiU6MgQmtf61SR1jdCcIKr"
credential = "ZX0SakOvfcEiU6MgQmtf61SR1jdCcIKr"
reason = "DoorDash signing secret with lowercase context and 32-char alnum body."

[[negative]]
text = "DOORDASH_developer_id=short"
reason = "Body too short / wrong shape."

[[evasion]]
text = "DOORDASH_developer_id=0a82d930-0311-5873-e7cb-7c3a6be1eacf"
credential = "0a82d930-0311-5873-e7cb-7c3a6be1eacf"
reason = "Adversarial env_bare envelope — credential must still surface under this detector."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted DoorDash credential."
