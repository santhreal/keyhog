schema_version = 1
detector_id = "mpesa-api-credentials"
service = "mpesa"
severity = "critical"

[[positive]]
text = "MPESA_CONSUMER_SECRET=40lryYegedHSfXuz872RgvPu"
credential = "40lryYegedHSfXuz872RgvPu"
reason = "Primary-only: Canonical anchor + secret body."

[[positive]]
text = "MPESA_CONSUMER_SECRET=\"40lryYegedHSfXuz872RgvPu\""
credential = "40lryYegedHSfXuz872RgvPu"
reason = "Quoted-value variant of the canonical positive."

[[positive]]
text = "MPESA_CONSUMER_SECRET=40lryYegedHSfXuz872RgvPu\nMPESA_CONSUMER_KEY=xhrsfH4i4vtN2axyMXKMQnNP"
credential = "40lryYegedHSfXuz872RgvPu"
reason = "Paired: Primary secret with companion consumer key."

[[positive]]
text = "mpesa_consumer_secret=40lryYegedHSfXuz872RgvPu"
credential = "40lryYegedHSfXuz872RgvPu"
reason = "Mixed-case primary secret."

[[positive]]
text = "mpesaapikey=40lryYegedHSfXuz872RgvPu"
credential = "40lryYegedHSfXuz872RgvPu"
reason = "Mixed-case standalone primary api key."

[[negative]]
text = "MPESA_CONSUMER_KEY=xhrsfH4i4vtN2axyMXKMQnNP"
reason = "Companion-only: Consumer Key alone is not a secret/primary credential."

[[negative]]
text = "MPESA_CONSUMER_SECRET=40lryYegedHSfXuz872RgvPu_extra"
reason = "An invalid token continuation must be rejected whole instead of truncating the secret prefix."

[[negative]]
text = "MPESA_CONSUMER_SECRET=YOUR_API_KEY_HERE_PLACEHOLDER_VALUE"
reason = "Placeholder-keyword body (suppression gate matches PLACEHOLDER prefix)."

[[negative]]
text = "MPESA_CONSUMER_SECRET=40lryEXAMPLEEXAMPLERgvPu"
reason = "EXAMPLE token marker inside the body (suppression gate strips it)."

[[negative]]
text = "MPESA_CONSUMER_SECRET=40lryYegedHSfXuz872RgvP"
reason = "Under minimum length of 24 characters."

[[evasion]]
text = "export MPESA_CONSUMER_SECRET=40lryYegedHSfXuz872RgvPu"
credential = "40lryYegedHSfXuz872RgvPu"
reason = "Adversarial env_export envelope (credential must still surface under this detector)."

[perf]
fixture_bytes = 4096
max_microseconds = 25000
note = "Standard single-file budget."

[scale]
fixture_bytes = 1048576
min_findings = 1
max_seconds = 2.0
note = "1 MiB filler + planted credential."
