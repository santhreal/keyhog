[[entry]]
cve_id = "SENDGRID-API-KEY-DOCS-SHAPE"
source_url = "https://docs.sendgrid.com/ui/account-and-settings/api-keys"
redacted_credential_pattern = '^SG\.[a-zA-Z0-9_-]{22,32}\.[a-zA-Z0-9_-]{43,47}$'
fixture_text = """
# SendGrid key in an env file, env-var style.
SENDGRID_API_KEY=SG.9X3kQp7VbT2hYRzNcMfWj4.DgEsLuHaIoBnVkPxKqRtYwMPqW3rTaB1yIoX0aBcDeF
"""

# ── Mailgun API key. Mailgun's docs and TruffleHog use the same
