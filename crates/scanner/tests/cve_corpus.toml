[[entry]]
cve_id = "MAILGUN-API-KEY-DOCS-SHAPE"
source_url = "https://documentation.mailgun.com/en/latest/api-intro.html#authentication"
redacted_credential_pattern = '^key-[a-f0-9]{32}$'
fixture_text = """
# Mailgun API key in a curl URL embedded in a deploy script.
curl https://api:key-9a3b7c2e4d1f6a8b0c5d9e3f7a1b4c2d@api.mailgun.net/v3/example.com/messages -F from='Excited <mailgun@example.com>'
"""

# ── Google API key. The AIza-prefixed shape behind the
