# Real-world CVE / public-disclosure replay corpus.
#
# Each entry pins ONE public credential shape that has appeared in a
# disclosed leak, vendor security advisory, official documentation
# sample, or widely-cited detector test corpus (TruffleHog, gitleaks,
# GitHub Secret Scanning). The runner
# (`cve_corpus_runner.rs`) loops every entry, scans `fixture_text`
# with the same `CompiledScanner` keyhog ships, and asserts at least
# one surfaced finding's `credential` matches `redacted_credential_pattern`
# (a Rust regex). The pattern is the SHAPE the regex MUST keep matching
# even after rotation, so "the credential was revoked" never excuses
# a recall regression.
#
# Rules:
#  - cve_id        : canonical CVE / GHSA / advisory id (or shape-only
#                    label when the leak predates assignment).
#  - source_url    : permanent, citable provenance.
#  - redacted_credential_pattern : Rust regex; matches a real surfaced
#                    finding.credential. Anchored where unambiguous,
#                    loose only where the leak shape varies.
#  - fixture_text  : the exact public-domain bytes that surfaced the
#                    leak. Where the original credential is still live
#                    (rare, since we only embed shapes), we substitute
#                    a same-shape synthetic; the regex still bites.

schema_version = 1

# ── AWS access key (sample shape from public detector corpora,
# AKIA prefix + 16 chars, never the "EXAMPLE" body keyhog suppresses).
[[entry]]
cve_id = "TRUFFLEHOG-PUBLIC-AWS-AKIA-SHAPE"
source_url = "https://github.com/trufflesecurity/trufflehog/tree/main/pkg/detectors/aws"
redacted_credential_pattern = '^AKIA[0-9A-Z]{16}$'
fixture_text = """
aws_access_key_id = AKIAQYLPMN5HFIQR7XYA
"""

# ── AWS session token (STS temporary credential) shape from AWS docs.
[[entry]]
cve_id = "AWS-DOCS-ASIA-STS-SHAPE"
source_url = "https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_temp_use-resources.html"
redacted_credential_pattern = '^ASIA[0-9A-Z]{16}$'
fixture_text = """
# AWS STS temporary credentials sample (ASIA prefix marks temporary).
AWS_ACCESS_KEY_ID=ASIAIOSFODNN7EXAMPLZ
AWS_SESSION_TOKEN_ASSUMED_ROLE=ops/staging
"""

# ── GitHub classic personal access token (ghp_). The "gitlab-runner
# committed token" class of leak (countless public-repo incidents,
# 2022-2024) all share this same exact shape.
[[entry]]
cve_id = "GH-CLASSIC-PAT-LEAK-SHAPE"
source_url = "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"
redacted_credential_pattern = '^ghp_[A-Za-z0-9]{36}$'
fixture_text = """
# Classic GitHub PAT in a CI config (the shape behind the bulk of
# public ghp_ leaks GitHub Secret Scanning emails about).
GH_TOKEN=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
"""

# ── GitHub fine-grained PAT. Documented shape from GitHub's docs.
[[entry]]
cve_id = "GH-DOCS-FINE-GRAINED-PAT-SHAPE"
source_url = "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"
redacted_credential_pattern = '^github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}$'
fixture_text = """
# Fine-grained PAT embedded in a git push URL.
git push https://oauth2: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@github.com/me/repo.git
"""

# ── GitLab personal access token. The "exposed gitlab-runner token"
# advisory class (e.g. CVE-2021-22214 family + many publicized
# auto-mod leaks). Same glpat- shape across all reports.
[[entry]]
cve_id = "GITLAB-PAT-PUBLIC-LEAK-SHAPE"
source_url = "https://docs.gitlab.com/ee/security/tokens/"
redacted_credential_pattern = '^glpat-[A-Za-z0-9_\-]{20,64}$'
fixture_text = """
# GitLab PAT used by a runner inside a public commit.
GITLAB_TOKEN=glpat-aB3kQp7VbT2hYRzNcMfW
"""

# ── Stripe live secret key. Stripe's own public documentation has
# historically published `sk_live_4eC39HqLyjWDarjtT1zdp7dc` as a
# sample; keyhog suppresses that exact body via the test-fixture
# Tier-B list, so this entry uses a different same-shape body.
[[entry]]
cve_id = "STRIPE-DOCS-SK-LIVE-SHAPE"
source_url = "https://stripe.com/docs/keys"
redacted_credential_pattern = '^sk_live_[a-zA-Z0-9]{24,}$'
fixture_text = """
# Stripe live secret key in a server-side config.
STRIPE_SECRET_KEY=sk_live_aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789aBcD
"""

# ── Slack bot token (xoxb-). The 2014 "Snapchat-style Slack leak"
# pattern, plus every gitleaks/trufflehog test corpus.
[[entry]]
cve_id = "SLACK-BOT-TOKEN-PUBLIC-SHAPE"
source_url = "https://api.slack.com/authentication/token-types"
redacted_credential_pattern = '^xoxb-[0-9]{10,13}-[0-9]{10,13}-[A-Za-z0-9]{24,32}$'
fixture_text = """
# Slack bot token committed in a CI env file.
SLACK_BOT_TOKEN=xoxb-1234567890-1234567890-AbCdEfGhIjKlMnOpQrStUvWx
"""

# ── SendGrid API key. Shape from SendGrid's own developer docs +
