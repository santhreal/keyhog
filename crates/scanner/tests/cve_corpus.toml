[[entry]]
cve_id = "DATABRICKS-PAT-DAPI-SHAPE"
source_url = "https://docs.databricks.com/dev-tools/auth.html#personal-access-token"
redacted_credential_pattern = '^dapi[a-f0-9]{32,}$'
