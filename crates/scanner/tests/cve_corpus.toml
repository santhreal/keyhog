cve_id = "GOOGLE-API-KEY-AIZA-SHAPE"
source_url = "https://cloud.google.com/docs/authentication/api-keys"
redacted_credential_pattern = '^AIza[0-9A-Za-z_-]{35}$'
fixture_text = """
# Google Maps API key inside a public JavaScript bundle.
const MAPS_KEY = "AIza9X3kQp7VbT2hYRzNcMfWj4DgEsLuHaIoBnV";
"""

