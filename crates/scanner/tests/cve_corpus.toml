[[entry]]
cve_id = "OPENAI-API-KEY-SK-SHAPE"
source_url = "https://platform.openai.com/docs/api-reference/authentication"
redacted_credential_pattern = '^sk-[a-zA-Z0-9]{48}$'
fixture_text = """
# OpenAI API key in a Python client init.
import os
from openai import OpenAI
client = OpenAI(api_key="sk-9X3kQp7VbT2hYRzNcMfWj4DgEsLuHaIoBnVkPxKqRtYwM8vZ")
"""

