Authorization: Bearer dapi9a3b7c2e4d1f6a8b0c5d9e3f7a1b4c2d
"""

# ── RSA PEM private key block. The class behind the Mirai-era
# "hardcoded SSH key" leaks (CVE-2016-10401 family of hardcoded-
# credential CVEs) and every k8s/Helm chart key-in-config incident.
[[entry]]
cve_id = "RSA-PRIVATE-KEY-PEM-BLOCK-SHAPE"
source_url = "https://github.com/kubernetes/kubernetes/tree/master/cmd/kube-apiserver/app/testing/testdata"
redacted_credential_pattern = '(?s)-----BEGIN (?:RSA )?PRIVATE KEY-----.*?-----END (?:RSA )?PRIVATE KEY-----'
fixture_text = """
# RSA private key inlined in a Kubernetes secret YAML (not under
# testdata/, so test-context suppression does not apply).
apiVersion: v1
kind: Secret
metadata:
  name: tls-cert
data:
  tls.key: |
    -----BEGIN RSA PRIVATE KEY-----
    MIIEowIBAAKCAQEA3UzRe60Sgbw7Szrwkw4I97rbfs7+bvtt8ZAs9uO+Qz502eyS
    toqQrh3psgmPPDOlcmgZCKgFb75dy2Ykvh7t4HfvHpW3RqwsULLotTK1HAIPDqAT
    Pve1M6CgtxzBSBRKasyo1SSq+T21dxfF1yAUHk
    -----END RSA PRIVATE KEY-----
"""

# ── JWT (HS256 header + payload + signature). The 2024 Snowflake
# breach class of "long-lived JWT in client storage" disclosures
# all share this canonical eyJhbGci... triple-segment shape.
[[entry]]
cve_id = "SNOWFLAKE-2024-JWT-SHAPE"
source_url = "https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-228a"
redacted_credential_pattern = '^eyJhbGci[a-zA-Z0-9_-]{5,256}\.eyJ[a-zA-Z0-9_-]{10,1000}\.[a-zA-Z0-9_-]{10,512}$'
fixture_text = """
# Long-lived service JWT in an Authorization header.
Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiI5OTk5OTk5OTk5IiwidGVuYW50Ijoia2V5aG9nLWUyZSIsImlhdCI6MTc0ODA3MjAwMH0.K3xqLnZWP4UlH9oZcQK7nBmJrEzVfYp2N1RsAtX5Y8w
"""

