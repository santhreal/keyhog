  <!-- Self-contained banner: an opaque dark card plus inline fill colors, so
       it renders identically on GitHub's light AND dark README themes. We do
       NOT use a <style> block / @media query: GitHub sanitizes SVGs served
       through <img> and strips <style>, which left the class-driven wordmark
       with no fill (invisible on the dark theme) and, with a raw angle bracket
       in the style comment, broke XML parsing outright. Inline attributes on a
       fixed dark card need neither. -->
