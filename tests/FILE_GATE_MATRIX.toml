# FILE_GATE_MATRIX (LR2-A8 audit artifact)
#
# One [[module]] entry per Rust source file in workspace crates/. Used by the
# A8 harness to enumerate the set of files that need file_gate test coverage
# and to catch silent module-deletion (a row vanishing here is now a build
# failure, not a quiet code drop).
#
# Regenerate after a module add/remove:
#   find crates -name "*.rs" -path "*/src/*" | sort | \
#     awk '{print "[[module]]\npath = \"" $0 "\"\n"}' > tests/FILE_GATE_MATRIX.toml

