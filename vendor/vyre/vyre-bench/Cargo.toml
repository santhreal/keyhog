vyre-reference = { workspace = true }
vyre-runtime = { workspace = true }
vyre-libs = { workspace = true }
vyre-primitives = { workspace = true }
vyre-intrinsics = { workspace = true }
vyre-lower = { workspace = true }
vyre-emit-ptx = { workspace = true }
vyre-spec = { workspace = true }
weir = { workspace = true }
vyre-frontend-c = { path = "../vyre-frontend-c" }
blake3 = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
clap = { workspace = true }
toml = { workspace = true }
inventory = { workspace = true }
regex = { workspace = true }
hashbrown = { workspace = true }
pcre2 = { workspace = true }
