[package]
name = "vyre-cc"
version = "0.1.0"
edition = "2021"

[dependencies]
vyre = { path = "../vyre-core" }
# vyre-foundation: needed for `vyre_foundation::hash::fnv1a32_words`
# after the 2026-05-20 dedup sweep collapsed three FNV-1a clones.
vyre-foundation = { path = "../vyre-foundation" }
vyre-libs = { path = "../vyre-libs", default-features = false, features = ["c-parser"] }
vyre-driver-wgpu = { path = "../vyre-driver-wgpu" }
vyre-primitives = { path = "../vyre-primitives", default-features = false, features = ["matching"] }
surgec-grammar-gen = { path = "../shared/surgec-grammar-gen" }
vyre-runtime = { path = "../vyre-runtime" }
object = { version = "0.36", default-features = false, features = ["write"] }
