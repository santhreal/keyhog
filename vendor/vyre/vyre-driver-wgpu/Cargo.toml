[package]
name = "vyre-driver-wgpu"
version = "0.4.1"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "wgpu backend for vyre IR — implements VyreBackend, owns GPU runtime, buffer pool, pipeline cache"
readme = "README.md"
keywords = ["gpu", "wgpu", "ir", "backend", "vyre"]
categories = ["graphics", "rendering::graphics-api", "hardware-support"]
documentation = "https://docs.rs/vyre-wgpu"

[features]
default = []
wgpu = []
parity-testing = []
c-parser = ["vyre-libs/c-parser"]
math-linalg = ["vyre-libs/math-linalg"]
math-scan = ["vyre-libs/math-scan"]
matching-substring = ["vyre-libs/matching-substring"]
matching-dfa = ["vyre-libs/matching-dfa"]
matching-nfa = ["vyre-libs/matching-nfa"]
megakernel-batch = ["vyre-runtime/megakernel-batch"]
uring-cmd-nvme = ["vyre-runtime/uring-cmd-nvme"]

[dependencies]
vyre-driver = { workspace = true, features = ["self-substrate-adapters"] }
vyre-runtime = { workspace = true, features = ["self-substrate-adapters"] }
vyre-foundation = { workspace = true }
vyre-spec = { workspace = true }
vyre-lower.workspace = true
vyre-emit-naga.workspace = true
naga = { workspace = true, features = ["wgsl-out"] }
wgpu.workspace = true
pollster.workspace = true
bytemuck.workspace = true
crossbeam-queue = "0.3"
crossbeam-channel.workspace = true
arc-swap = "1.7"
tokio.workspace = true
tracing.workspace = true
thiserror.workspace = true
rustc-hash.workspace = true
blake3.workspace = true
serde.workspace = true
toml.workspace = true
inventory.workspace = true
dashmap = "6.1.0"
smallvec.workspace = true
crc32fast = "1.5.0"
fs2.workspace = true
libm.workspace = true
bincode = "1.3"

[dev-dependencies]
criterion.workspace = true
stats_alloc.workspace = true
tokio.workspace = true
tempfile.workspace = true
proptest.workspace = true
vyre.workspace = true
vyre-libs = { workspace = true, features = ["matching", "parsing", "c-parser"] }
vyre-primitives = { version = "0.4.1", path = "../vyre-primitives", default-features = false, features = ["graph", "predicate"] }
vyre-reference = { workspace = true, features = ["subgroup-ops"] }
vyre-runtime = { version = "0.4.1", path = "../vyre-runtime", features = ["self-substrate-adapters"] }
vyre-test-harness.workspace = true
vyre-intrinsics.workspace = true
tracing-subscriber.workspace = true
libc = { version = "0.2", default-features = false }
surgec-grammar-gen = { version = "0.6.0", path = "../../../../shared/surgec-grammar-gen" }
tree-sitter = "=0.26.8"
tree-sitter-go = "=0.25.0"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true



[[bin]]
name = "vyre-wgpu"
path = "src/bin/vyre.rs"
