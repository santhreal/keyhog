[package]
name = "vyre-driver-cuda"
version = "0.4.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/vyre-driver-cuda"
description = "CUDA/PTX backend for vyre through the CUDA driver API."
readme = "README.md"
keywords = ["gpu", "compute", "cuda", "ptx", "vyre"]
categories = ["hardware-support"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
default = []
cuda = []

[dependencies]
vyre-driver = { workspace = true }
vyre-foundation = { workspace = true }
vyre-spec = { workspace = true }
vyre-lower.workspace = true
vyre-emit-ptx.workspace = true
inventory.workspace = true
tracing.workspace = true
blake3.workspace = true
smallvec.workspace = true
cudarc.workspace = true
rustc-hash.workspace = true
crossbeam-queue = "0.3"
dashmap.workspace = true

[dev-dependencies]
tempfile.workspace = true
vyre.workspace = true
vyre-primitives = { version = "0.4.1", path = "../vyre-primitives", features = ["decode"] }
vyre-libs = { version = "0.4.1", path = "../vyre-libs" }
pollster.workspace = true
