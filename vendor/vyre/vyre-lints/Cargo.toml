[package]
name = "vyre-lints"
version = "0.4.2"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Lego-block enforcement lints for vyre. Forbids raw IR construction in dialect crates."
repository = "https://github.com/santhsecurity/vyre"
homepage = "https://github.com/santhsecurity/vyre"
documentation = "https://docs.rs/vyre-lints"
readme = "README.md"
categories = ["development-tools", "compilers"]
keywords = ["vyre", "lint", "ir", "compiler"]

[[bin]]
name = "vyre-lints"
path = "src/main.rs"

[lib]
name = "vyre_lints"
path = "src/lib.rs"

[dependencies]
syn = { version = "2", features = ["full", "visit", "extra-traits"] }
proc-macro2 = { version = "1", features = ["span-locations"] }
walkdir = "2"
toml = "0.8"
serde = { version = "1", features = ["derive"] }
anyhow = "1"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
