[package]
name = "vyre-libs"
version = "0.4.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "vyre Category A library ecosystem — pure-IR compositions over vyre-ops hardware primitives"
readme = "README.md"
keywords = ["gpu", "ml", "linear-algebra", "cryptography", "vyre"]
categories = ["algorithms", "science"]
documentation = "https://docs.rs/vyre-libs"

[lib]
path = "src/lib.rs"

[features]
# Default: ML / linear-algebra / matching / decode core. Crypto + the
# heavy nn-attention surface ride opt-in. Keeps `cargo add vyre-libs`
# from compiling blake3/fnv for consumers that only need matmul +
# substring scanning. Audit item #63 — reduced default blast radius.
default = [
    "math-linalg", "math-scan", "math-broadcast",
    "nn-activation", "nn-linear", "nn-norm",
    "matching-substring", "matching-dfa",
    "decode",
]
# `full` aggregates everything that used to be in default + crypto +
# the algebra/succinct/attention extras. Consumers that previously
# relied on the wide default flip to `full` (no behavior change).
full = [
    "math-linalg", "math-scan", "math-broadcast", "math-algebra", "math-succinct",
    "nn-activation", "nn-linear", "nn-norm", "nn-attention",
    "matching-substring", "matching-dfa",
    "decode",
    "crypto-fnv", "crypto-blake3",
]
bench = []
math = ["math-linalg", "math-scan", "math-broadcast", "math-algebra", "math-succinct"]
nn = ["nn-activation", "nn-linear", "nn-norm", "nn-attention"]
matching = ["matching-substring", "matching-dfa"]
crypto = ["crypto-fnv", "crypto-blake3"]
decode = []
logical = []
rule = ["dep:regex"]

"math-linalg" = []
"math-scan" = []
"math-broadcast" = []
"math-algebra" = []
"math-succinct" = []
"nn-activation" = []
"nn-linear" = ["math-linalg"]
"nn-norm" = []
"nn-attention" = ["nn-norm", "math-linalg"]
"nn-moe" = ["nn-attention"]
"matching-substring" = []
"matching-dfa" = []
"matching-nfa" = ["matching-dfa"]
"matching-regex" = ["matching-nfa", "dep:regex-syntax"]
"intern" = []
"crypto-fnv" = []
"crypto-blake3" = []
"visual" = []
"parsing" = ["c-parser", "go-parser", "python-parser"]
"c-parser" = []
"go-parser" = []
"python-parser" = []
"test-fixtures" = []
security = ["dep:weir"]
"self-substrate" = []

[dependencies]
vyre.workspace = true
vyre-foundation.workspace = true
vyre-harness.workspace = true
vyre-spec.workspace = true
vyre-driver.workspace = true
vyre-self-substrate = { workspace = true }
vyre-primitives = { workspace = true, features = ["text", "matching", "decode", "math", "nn", "hash", "parsing", "graph", "bitset", "reduce", "label", "predicate", "fixpoint", "nfa", "inventory-registry", "geom", "opt", "topology", "visual"] }
smallvec.workspace = true
inventory.workspace = true
thiserror.workspace = true
tracing.workspace = true
regex-syntax = { workspace = true, optional = true }
regex = { workspace = true, optional = true }
weir = { workspace = true, optional = true }
libm.workspace = true
rustc-hash.workspace = true
blake3.workspace = true
rayon.workspace = true

[dev-dependencies]
proptest.workspace = true
tempfile.workspace = true
vyre-reference = { workspace = true, features = ["subgroup-ops"] }
criterion.workspace = true
vyre-driver.workspace = true
vyre-self-substrate = { workspace = true }
vyre-intrinsics.workspace = true
surgec-grammar-gen = { version = "0.6.0", path = "../../../../shared/surgec-grammar-gen" }
tree-sitter = "=0.26.8"
tree-sitter-go = "=0.25.0"


[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true
